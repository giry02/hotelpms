<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등급 회원 기준 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/crm.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-crm.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/vip-criteria.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .membership-head{display:flex;align-items:center;justify-content:space-between;gap:16px;margin:22px 0 14px}
        .membership-head-title{display:flex;flex-direction:column;gap:4px;min-width:0}
        .membership-head-title h2{margin:0;font-size:1.05rem;font-weight:850;color:var(--txt)}
        .membership-head-title p{margin:0;font-size:.78rem;font-weight:650;color:var(--txt3)}
        .membership-actions{display:flex;align-items:center;gap:8px;flex:0 0 auto}
        .membership-actions .btn-primary-sm,.membership-actions .btn-outline{height:38px;border-radius:7px;padding:0 14px;font-size:.78rem;font-weight:750;display:inline-flex;align-items:center;gap:7px}
        .membership-grid{display:grid;grid-template-columns:minmax(0,1.1fr) minmax(320px,.9fr);gap:16px;align-items:start}
        .membership-panel{background:#fff;border:1px solid var(--border);border-radius:8px;box-shadow:var(--shadow);overflow:hidden}
        .membership-panel-header{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:16px 18px;border-bottom:1px solid var(--border2)}
        .membership-panel-title{display:flex;align-items:center;gap:8px;font-size:.92rem;font-weight:850;color:var(--txt)}
        .membership-panel-title i{color:var(--primary)}
        .membership-panel-sub{font-size:.72rem;font-weight:650;color:var(--txt3)}
        .criteria-list{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:16px}
        .criteria-card{border:1px solid var(--border);border-radius:8px;padding:14px;background:#fff;display:flex;gap:12px;min-height:112px}
        .criteria-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
        .criteria-name{font-size:.95rem;font-weight:850;color:var(--txt);line-height:1.2}
        .criteria-desc{font-size:.72rem;font-weight:650;color:var(--txt3);line-height:1.45;margin-top:5px}
        .criteria-metrics{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
        .criteria-chip{display:inline-flex;align-items:center;gap:5px;border-radius:999px;background:#f8fafc;border:1px solid var(--border2);padding:5px 9px;font-size:.7rem;font-weight:800;color:var(--txt2)}
        .recent-list{display:flex;flex-direction:column;padding:8px 0}
        .recent-item{display:grid;grid-template-columns:44px minmax(0,1fr) auto;gap:12px;align-items:center;width:100%;border:0;border-bottom:1px solid var(--border2);background:#fff;text-align:left;padding:13px 18px;font-family:var(--font);cursor:pointer}
        .recent-item:last-child{border-bottom:0}
        .recent-item:hover{background:#f8fafc}
        .recent-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center}
        .recent-name{font-size:.86rem;font-weight:850;color:var(--txt);line-height:1.25}
        .recent-detail{font-size:.73rem;font-weight:650;color:var(--txt2);line-height:1.45;margin-top:3px}
        .recent-date{font-size:.7rem;font-weight:800;color:var(--txt3);white-space:nowrap}
        .empty-state-line{padding:28px 16px;text-align:center;color:var(--txt3);font-size:.82rem;font-weight:650}
        .tier-criteria-modal{max-width:620px!important;width:94vw!important}
        .tier-guest-modal{max-width:660px!important;width:94vw!important}
        .modal-body.membership-modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
        .guest-head{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--border);border-radius:8px;background:#f8fafc}
        .guest-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:850;flex:0 0 auto}
        .guest-name{font-size:1.05rem;font-weight:850;color:var(--txt);line-height:1.2}
        .guest-sub{font-size:.76rem;color:var(--txt2);font-weight:650;margin-top:4px}
        .guest-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .guest-field{border:1px solid var(--border);border-radius:7px;padding:12px;background:#fff;min-width:0}
        .guest-field-label{font-size:.68rem;font-weight:800;color:var(--txt3);margin-bottom:5px}
        .guest-field-value{font-size:.86rem;font-weight:750;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .change-box{border:1px solid #dbeafe;border-radius:8px;background:#eff6ff;padding:14px}
        .change-title{font-size:.76rem;font-weight:850;color:#1d4ed8;margin-bottom:10px;display:flex;align-items:center;gap:7px}
        .change-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
        .change-meta{font-size:.74rem;color:var(--txt2);line-height:1.5}
        .vip-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .vip-form-box{border:1px solid var(--border);border-radius:8px;padding:14px;background:#fff}
        .vip-form-title{font-size:.86rem;font-weight:850;margin-bottom:12px;display:flex;align-items:center;gap:7px}
        .vip-form-field label{display:block;font-size:.72rem;font-weight:750;color:var(--txt2);margin-bottom:6px}
        .vip-form-field input,.vip-form-field select{width:100%;height:36px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff}
        @media(max-width:1100px){.membership-grid{grid-template-columns:1fr}.criteria-list{grid-template-columns:1fr 1fr}}
        @media(max-width:768px){
            .membership-head{align-items:stretch;flex-direction:column}
            .membership-actions{display:grid;grid-template-columns:1fr 1fr}
            .criteria-list{grid-template-columns:1fr}
            .recent-item{grid-template-columns:40px minmax(0,1fr)}
            .recent-date{grid-column:2}
            .guest-grid,.vip-form-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="main">
    <header class="topbar"><h1 data-i18n-key="Tier Member Criteria">등급 회원 기준</h1></header>

    <div class="content">
        <div class="tier-overview" id="tierOverview">
            <div class="tier-card diamond"><div class="tier-card-icon"><i class="fa-solid fa-gem"></i></div><div class="tier-card-info"><div class="tier-card-count" id="countDiamond">0</div><div class="tier-card-name">다이아몬드</div></div><div class="tier-card-criteria" id="criteriaTextDiamond">20회 이상 투숙 · 연 ₱10,000+</div></div>
            <div class="tier-card platinum"><div class="tier-card-icon"><i class="fa-solid fa-star"></i></div><div class="tier-card-info"><div class="tier-card-count" id="countPlatinum">0</div><div class="tier-card-name">플래티넘</div></div><div class="tier-card-criteria" id="criteriaTextPlatinum">10회 이상 투숙 · 연 ₱5,000+</div></div>
            <div class="tier-card gold"><div class="tier-card-icon"><i class="fa-solid fa-crown"></i></div><div class="tier-card-info"><div class="tier-card-count" id="countGold">0</div><div class="tier-card-name">골드</div></div><div class="tier-card-criteria" id="criteriaTextGold">5회 이상 투숙 · 연 ₱2,000+</div></div>
            <div class="tier-card standard"><div class="tier-card-icon"><i class="fa-solid fa-user"></i></div><div class="tier-card-info"><div class="tier-card-count" id="countStandard">0</div><div class="tier-card-name">일반</div></div><div class="tier-card-criteria">일반 회원 · 가입 즉시</div></div>
        </div>

        <div class="membership-head">
            <div class="membership-head-title">
                <h2>등급별 회원 현황 및 기준</h2>
                <p>현재 고객 등급 분포, 승급 기준, 최근 등급 변동 이력을 함께 확인합니다.</p>
            </div>
            <div class="membership-actions">
                <button class="btn-outline" onclick="openModal('tierCriteriaModal')"><i class="fa-solid fa-layer-group"></i> 등급 기준</button>
                <button class="btn-primary-sm" onclick="openVipCriteriaModal()"><i class="fa-solid fa-sliders"></i> 승급 기준 관리</button>
            </div>
        </div>

        <div class="membership-grid">
            <section class="membership-panel">
                <div class="membership-panel-header">
                    <div>
                        <div class="membership-panel-title"><i class="fa-solid fa-layer-group"></i> 등급 기준 요약</div>
                        <div class="membership-panel-sub">고객 등급 산정에 사용하는 투숙/결제 기준입니다.</div>
                    </div>
                </div>
                <div class="criteria-list" id="criteriaList"></div>
            </section>

            <section class="membership-panel">
                <div class="membership-panel-header">
                    <div>
                        <div class="membership-panel-title"><i class="fa-solid fa-clock-rotate-left"></i> 최근 등급 변동</div>
                        <div class="membership-panel-sub">승급 및 수동 조정 내역을 최근순으로 표시합니다.</div>
                    </div>
                    <a class="btn-outline" style="height:32px;padding:0 10px;font-size:.72rem" href="tier-history.html"><i class="fa-solid fa-arrow-up-right-from-square"></i> 전체 보기</a>
                </div>
                <div class="recent-list" id="tierChangesList"></div>
            </section>
        </div>
    </div>
</div>

<div class="modal-overlay" id="tierCriteriaModal" onclick="if(event.target===this) closeModal('tierCriteriaModal')">
    <div class="modal-card tier-criteria-modal">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-layer-group"></i> 등급 기준</h3>
            <button class="modal-close" onclick="closeModal('tierCriteriaModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body membership-modal-body">
            <div class="criteria-list" id="criteriaModalList"></div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary-sm" onclick="closeModal('tierCriteriaModal')"><i class="fa-solid fa-check"></i> 확인</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="tierGuestModal" onclick="if(event.target===this) closeModal('tierGuestModal')">
    <div class="modal-card tier-guest-modal">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-address-card"></i> 고객 정보</h3>
            <button class="modal-close" onclick="closeModal('tierGuestModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body membership-modal-body" id="tierGuestModalBody"></div>
        <div class="modal-footer">
            <button class="btn-primary-sm" onclick="closeModal('tierGuestModal')"><i class="fa-solid fa-check"></i> 확인</button>
        </div>
    </div>
</div>

<div class="modal-overlay" id="vipCriteriaModal" onclick="if(event.target===this) closeModal('vipCriteriaModal')">
    <div class="modal-card" style="max-width:540px;width:94vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-sliders"></i> 승급 기준 관리</h3>
            <button class="modal-close" onclick="closeModal('vipCriteriaModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body membership-modal-body">
            <div class="vip-form-box">
                <div class="vip-form-field">
                    <label for="vipMinimumTier">우수 고객 집계 기준</label>
                    <select id="vipMinimumTier">
                        <option value="gold">골드 이상</option>
                        <option value="platinum">플래티넘 이상</option>
                        <option value="diamond">다이아몬드만</option>
                    </select>
                </div>
            </div>
            <div class="vip-form-grid">
                <div class="vip-form-box"><div class="vip-form-title" style="color:#D97706"><i class="fa-solid fa-crown"></i> 골드</div><div class="vip-form-field"><label>최소 투숙 횟수</label><input id="criteriaGoldStays" type="number" min="0"></div><div class="vip-form-field" style="margin-top:10px"><label>최소 결제 금액</label><input id="criteriaGoldSpend" type="number" min="0"></div></div>
                <div class="vip-form-box"><div class="vip-form-title" style="color:#8B5CF6"><i class="fa-solid fa-star"></i> 플래티넘</div><div class="vip-form-field"><label>최소 투숙 횟수</label><input id="criteriaPlatinumStays" type="number" min="0"></div><div class="vip-form-field" style="margin-top:10px"><label>최소 결제 금액</label><input id="criteriaPlatinumSpend" type="number" min="0"></div></div>
                <div class="vip-form-box" style="grid-column:1/-1"><div class="vip-form-title" style="color:#2563EB"><i class="fa-solid fa-gem"></i> 다이아몬드</div><div class="vip-form-grid"><div class="vip-form-field"><label>최소 투숙 횟수</label><input id="criteriaDiamondStays" type="number" min="0"></div><div class="vip-form-field"><label>최소 결제 금액</label><input id="criteriaDiamondSpend" type="number" min="0"></div></div></div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('vipCriteriaModal')">닫기</button>
            <button class="btn-primary-sm" onclick="saveVipCriteria()"><i class="fa-solid fa-check"></i> 저장</button>
        </div>
    </div>
</div>

<script>
const tierMeta = {
    standard: { label: '일반', icon: 'fa-user', color: '#6B7280', bg: 'rgba(107,114,128,.12)', desc: '가입 즉시 적용되는 기본 등급입니다.' },
    silver: { label: '실버', icon: 'fa-medal', color: '#64748B', bg: 'rgba(100,116,139,.12)', desc: '기본 등급보다 높은 재방문 고객 구간입니다.' },
    gold: { label: '골드', icon: 'fa-crown', color: '#D97706', bg: 'rgba(245,158,11,.14)', desc: '반복 투숙 또는 일정 결제액을 충족한 우수 고객입니다.' },
    platinum: { label: '플래티넘', icon: 'fa-star', color: '#8B5CF6', bg: 'rgba(139,92,246,.12)', desc: '장기 투숙 및 높은 결제 실적을 가진 핵심 고객입니다.' },
    diamond: { label: '다이아몬드', icon: 'fa-gem', color: '#2563EB', bg: 'rgba(37,99,235,.12)', desc: '최상위 등급으로 특별 관리 대상 고객입니다.' },
    group: { label: '단체', icon: 'fa-users', color: '#059669', bg: 'rgba(5,150,105,.12)', desc: '단체/행사 투숙객을 별도로 분류하는 등급입니다.' }
};

const knownReasons = {
    'TH-1001': '누적 투숙 10회 달성',
    'TH-1002': '연 누적 결제 금액 ₱10,000 돌파',
    'TH-1003': '누적 투숙 5회 달성',
    'TH-1004': '중복 VIP 프로필 병합 후 등급 정정',
    'TH-1005': '법인 장기투숙 실적 수동 반영',
    'TH-1006': '누적 투숙 5회 달성'
};

let membershipGuests = [];
let membershipTiers = [];
let tierHistory = [];

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
}

function money(value) {
    return typeof window.pmsFormatCurrency === 'function'
        ? window.pmsFormatCurrency(value)
        : `₱${Number(value || 0).toLocaleString()}`;
}

function openModal(id) {
    const el = document.getElementById(id);
    if (el) el.classList.add('active');
    if (id === 'tierCriteriaModal') renderCriteria();
}

function closeModal(id) {
    const el = document.getElementById(id);
    if (el) el.classList.remove('active');
}

function tierId(value) {
    return String(value || 'standard').toLowerCase();
}

function tierInfo(value) {
    return tierMeta[tierId(value)] || tierMeta.standard;
}

function tierLabel(value) {
    return tierInfo(value).label;
}

function tierBadge(value) {
    const meta = tierInfo(value);
    return `<span class="tier-badge" style="background:${meta.bg};color:${meta.color}"><i class="fa-solid ${meta.icon}"></i> ${meta.label}</span>`;
}

function currentConfig() {
    return window.PMS_VIP_CRITERIA ? window.PMS_VIP_CRITERIA.getConfig() : {
        vipMinimumTier: 'platinum',
        thresholds: {
            gold: { stays: 5, spend: 2000 },
            platinum: { stays: 10, spend: 5000 },
            diamond: { stays: 20, spend: 10000 }
        }
    };
}

function thresholdFor(id) {
    const cfg = currentConfig();
    const defaults = {
        standard: { stays: 0, spend: 0 },
        silver: { stays: 0, spend: 300 },
        group: { stays: 0, spend: 0 }
    };
    return cfg.thresholds?.[id] || defaults[id] || { stays: 0, spend: 0 };
}

function updateKpiCriteria() {
    const cfg = currentConfig();
    ['gold', 'platinum', 'diamond'].forEach(id => {
        const threshold = cfg.thresholds?.[id] || thresholdFor(id);
        const el = document.getElementById(`criteriaText${id.charAt(0).toUpperCase() + id.slice(1)}`);
        if (el) el.textContent = `${threshold.stays}회 이상 투숙 · 연 ${money(threshold.spend)}+`;
    });
}

function renderCounts() {
    const counts = { diamond: 0, platinum: 0, gold: 0, standard: 0 };
    membershipGuests.forEach(guest => {
        const id = tierId(guest.tier);
        if (counts[id] === undefined) counts.standard += 1;
        else counts[id] += 1;
    });
    document.getElementById('countDiamond').textContent = counts.diamond.toLocaleString();
    document.getElementById('countPlatinum').textContent = counts.platinum.toLocaleString();
    document.getElementById('countGold').textContent = counts.gold.toLocaleString();
    document.getElementById('countStandard').textContent = counts.standard.toLocaleString();
}

function buildCriteriaItems() {
    const ids = ['diamond', 'platinum', 'gold', 'standard'];
    return ids.map(id => ({ id, ...tierInfo(id), threshold: thresholdFor(id) }));
}

function renderCriteria() {
    const html = buildCriteriaItems().map(item => `
        <div class="criteria-card">
            <div class="criteria-icon" style="background:${item.bg};color:${item.color}"><i class="fa-solid ${item.icon}"></i></div>
            <div>
                <div class="criteria-name">${escapeHtml(item.label)}</div>
                <div class="criteria-desc">${escapeHtml(item.desc)}</div>
                <div class="criteria-metrics">
                    <span class="criteria-chip"><i class="fa-solid fa-bed"></i> ${Number(item.threshold.stays || 0).toLocaleString()}회 이상</span>
                    <span class="criteria-chip"><i class="fa-solid fa-coins"></i> ${money(item.threshold.spend || 0)}+</span>
                </div>
            </div>
        </div>`).join('');
    const list = document.getElementById('criteriaList');
    const modalList = document.getElementById('criteriaModalList');
    if (list) list.innerHTML = html;
    if (modalList) modalList.innerHTML = html;
}

function cleanReason(change) {
    if (knownReasons[change.id]) return knownReasons[change.id];
    return change.reason || '등급 기준 충족';
}

function renderRecentChanges() {
    const root = document.getElementById('tierChangesList');
    if (!root) return;
    const items = tierHistory.slice(0, 6);
    if (!items.length) {
        root.innerHTML = '<div class="empty-state-line">최근 등급 변동 이력이 없습니다.</div>';
        return;
    }
    root.innerHTML = items.map(change => {
        const isManual = change.changeType === 'manual';
        const toMeta = tierInfo(change.to);
        return `<button type="button" class="recent-item" data-change-id="${escapeHtml(change.id)}">
            <span class="recent-icon" style="background:${isManual ? 'rgba(245,158,11,.14)' : 'rgba(16,185,129,.14)'};color:${isManual ? '#D97706' : '#059669'}"><i class="fa-solid ${isManual ? 'fa-user-pen' : 'fa-arrow-up'}"></i></span>
            <span>
                <span class="recent-name">${escapeHtml(change.name)}</span>
                <span class="recent-detail">${escapeHtml(tierLabel(change.from))} → <strong style="color:${toMeta.color}">${escapeHtml(tierLabel(change.to))}</strong> · ${escapeHtml(cleanReason(change))}</span>
            </span>
            <span class="recent-date">${escapeHtml(change.date || '-')}</span>
        </button>`;
    }).join('');
    root.querySelectorAll('.recent-item').forEach(item => {
        item.addEventListener('click', () => openTierGuestModal(item.dataset.changeId));
    });
}

function findGuest(change) {
    return membershipGuests.find(guest => guest.id === change?.guestId)
        || membershipGuests.find(guest => guest.name === change?.name)
        || null;
}

function initial(name) {
    return String(name || 'G').split(/\s+/).map(part => part[0]).join('').slice(0, 2).toUpperCase();
}

function openTierGuestModal(changeId) {
    const change = tierHistory.find(item => String(item.id) === String(changeId));
    const body = document.getElementById('tierGuestModalBody');
    if (!body) return;
    if (!change) {
        body.innerHTML = '<div class="empty-state-line">등급 변동 데이터를 찾을 수 없습니다.</div>';
        openModal('tierGuestModal');
        return;
    }
    const guest = findGuest(change) || {};
    const displayName = guest.name || change.name;
    const meta = tierInfo(guest.tier || change.to);
    body.innerHTML = `
        <div class="guest-head">
            <div class="guest-avatar" style="background:${escapeHtml(guest.color || meta.color)}">${escapeHtml(guest.init || initial(displayName))}</div>
            <div style="min-width:0">
                <div class="guest-name">${escapeHtml(displayName)}</div>
                <div class="guest-sub">${tierBadge(guest.tier || change.to)}</div>
            </div>
        </div>
        <div class="guest-grid">
            <div class="guest-field"><div class="guest-field-label">국적</div><div class="guest-field-value">${escapeHtml(guest.nation || guest.nationality || '-')}</div></div>
            <div class="guest-field"><div class="guest-field-label">연락처</div><div class="guest-field-value">${escapeHtml(guest.phone || '-')}</div></div>
            <div class="guest-field"><div class="guest-field-label">이메일</div><div class="guest-field-value">${escapeHtml(guest.email || '-')}</div></div>
            <div class="guest-field"><div class="guest-field-label">최근 투숙</div><div class="guest-field-value">${escapeHtml(guest.last || guest.lastStayDate || '-')}</div></div>
            <div class="guest-field"><div class="guest-field-label">방문 횟수</div><div class="guest-field-value">${Number(guest.visits || 0).toLocaleString()}회</div></div>
            <div class="guest-field"><div class="guest-field-label">누적 금액</div><div class="guest-field-value">${money(guest.spend || 0)}</div></div>
        </div>
        <div class="change-box">
            <div class="change-title"><i class="fa-solid fa-arrow-up-right-dots"></i> 등급 변동 정보</div>
            <div class="change-flow">${tierBadge(change.from)} <i class="fa-solid fa-arrow-right" style="color:var(--txt3);font-size:.72rem"></i> ${tierBadge(change.to)}</div>
            <div class="change-meta">${escapeHtml(cleanReason(change))}<br>${escapeHtml(change.by || '-')} · ${escapeHtml(change.date || '-')}</div>
        </div>`;
    openModal('tierGuestModal');
}

function fillVipCriteriaModal() {
    const cfg = currentConfig();
    document.getElementById('vipMinimumTier').value = cfg.vipMinimumTier || 'platinum';
    document.getElementById('criteriaGoldStays').value = cfg.thresholds.gold.stays;
    document.getElementById('criteriaGoldSpend').value = cfg.thresholds.gold.spend;
    document.getElementById('criteriaPlatinumStays').value = cfg.thresholds.platinum.stays;
    document.getElementById('criteriaPlatinumSpend').value = cfg.thresholds.platinum.spend;
    document.getElementById('criteriaDiamondStays').value = cfg.thresholds.diamond.stays;
    document.getElementById('criteriaDiamondSpend').value = cfg.thresholds.diamond.spend;
}

function openVipCriteriaModal() {
    fillVipCriteriaModal();
    openModal('vipCriteriaModal');
}

function saveVipCriteria() {
    if (!window.PMS_VIP_CRITERIA) return;
    const next = {
        vipMinimumTier: document.getElementById('vipMinimumTier').value,
        thresholds: {
            gold: { stays: Number(document.getElementById('criteriaGoldStays').value || 0), spend: Number(document.getElementById('criteriaGoldSpend').value || 0) },
            platinum: { stays: Number(document.getElementById('criteriaPlatinumStays').value || 0), spend: Number(document.getElementById('criteriaPlatinumSpend').value || 0) },
            diamond: { stays: Number(document.getElementById('criteriaDiamondStays').value || 0), spend: Number(document.getElementById('criteriaDiamondSpend').value || 0) }
        }
    };
    window.PMS_VIP_CRITERIA.saveConfig(next);
    updateKpiCriteria();
    renderCriteria();
    if (window.showToast) showToast('승급 기준이 저장되었습니다.', 'success');
    closeModal('vipCriteriaModal');
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const [guests, tiers, history] = await Promise.all([
            window.PmsAPI?.getGuests ? PmsAPI.getGuests() : Promise.resolve([]),
            window.PmsAPI?.getMembershipTiers ? PmsAPI.getMembershipTiers() : Promise.resolve([]),
            window.PmsAPI?.getHistory ? PmsAPI.getHistory() : Promise.resolve([])
        ]);
        membershipGuests = guests || [];
        membershipTiers = tiers || [];
        tierHistory = (history || []).sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')));
        updateKpiCriteria();
        renderCounts();
        renderCriteria();
        renderRecentChanges();
        if (typeof window.changeLang === 'function') {
            window.changeLang(localStorage.getItem('pms_lang') || 'ko');
        }
    } catch (error) {
        console.error(error);
        const root = document.getElementById('tierChangesList');
        if (root) root.innerHTML = '<div class="empty-state-line">등급 데이터를 불러오지 못했습니다.</div>';
    }
});
</script>
</body>
</html>
