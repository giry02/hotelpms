<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등급 변동 이력 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/crm.css">
<style>
/* Mobile filter trigger */
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;width:100px}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.m-filter-trigger span{flex:1;text-align:left}

/* Bottom sheet */
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:60vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{overflow-y:auto;flex:1;padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-label{flex:1}
.bs-option-desc{font-size:.68rem;color:var(--txt3);font-weight:400;margin-top:2px}
.tier-history-row{cursor:pointer}
.tier-history-row:hover{background:#f8fafc}
.tier-history-row:focus-visible{outline:2px solid var(--primary);outline-offset:-2px}
.tier-guest-modal{max-width:620px!important;width:94vw!important}
.tier-guest-modal .modal-title{display:flex;align-items:center;gap:8px}
.tier-guest-modal .modal-title i{color:var(--primary);font-size:.9rem}
.tier-guest-modal .modal-body{padding:20px;display:flex;flex-direction:column;gap:14px}
.tier-criteria-empty{text-align:center;padding:28px 12px;color:var(--txt3);font-size:.82rem}
.tier-guest-head{display:flex;align-items:center;gap:14px;padding:16px;border:1px solid var(--border);border-radius:7px;background:#f8fafc}
.tier-guest-avatar{width:48px;height:48px;border-radius:12px;display:flex;align-items:center;justify-content:center;color:#fff;font-weight:850;flex:0 0 auto}
.tier-guest-name{font-size:1.05rem;font-weight:850;color:var(--txt);line-height:1.2}
.tier-guest-sub{font-size:.76rem;color:var(--txt2);font-weight:650;margin-top:4px}
.tier-guest-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.tier-guest-field{border:1px solid var(--border);border-radius:7px;padding:12px;background:#fff;min-width:0}
.tier-guest-field-label{font-size:.68rem;font-weight:800;color:var(--txt3);margin-bottom:5px}
.tier-guest-field-value{font-size:.86rem;font-weight:750;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tier-change-box{border:1px solid #dbeafe;border-radius:7px;background:#eff6ff;padding:14px}
.tier-change-title{font-size:.76rem;font-weight:850;color:#1d4ed8;margin-bottom:10px;display:flex;align-items:center;gap:7px}
.tier-change-flow{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px}
.tier-change-meta{font-size:.74rem;color:var(--txt2);line-height:1.5}

@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-chips{display:none!important}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:nowrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
    .tier-guest-grid{grid-template-columns:1fr}
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-crm.js"></script>
    <script src="../common/js/vip-criteria.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <h1 data-i18n-key="Tier Change History">등급 변동 이력</h1>
    </header>

    <div class="content">
        <!-- KPI Summary -->
        <div class="tier-overview">
            <div class="tier-card" style="background:#fff;border:1px solid rgba(16,185,129,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#059669,#10B981)"></div>
                <div class="tier-card-icon" style="background:rgba(16,185,129,.15);color:#059669"><i class="fa-solid fa-arrow-up"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiUpgrades">0</div>
                    <div class="tier-card-name">이번 달 승급</div>
                </div>
                <div class="tier-card-criteria">전월 대비 +5</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(59,130,246,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2563EB,#3B82F6)"></div>
                <div class="tier-card-icon" style="background:rgba(59,130,246,.15);color:#2563EB"><i class="fa-solid fa-users"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiVipCustomers">0</div>
                    <div class="tier-card-name">우수 고객</div>
                </div>
                <div class="tier-card-criteria" id="kpiVipCriteria">설정된 우수 고객 기준</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(139,92,246,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7C3AED,#8B5CF6)"></div>
                <div class="tier-card-icon" style="background:rgba(139,92,246,.15);color:#7C3AED"><i class="fa-solid fa-star"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiNewVip">0</div>
                    <div class="tier-card-name">신규 우수 고객</div>
                </div>
                <div class="tier-card-criteria" data-i18n-key="New entries this month">이번 달 신규 진입</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(245,158,11,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#D97706,#F59E0B)"></div>
                <div class="tier-card-icon" style="background:rgba(245,158,11,.15);color:#D97706"><i class="fa-solid fa-user-pen"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiManualChanges">0</div>
                    <div class="tier-card-name">수동변경</div>
                </div>
                <div class="tier-card-criteria" data-i18n-key="Admin reason required">관리자 사유 필수</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <div class="filter-left">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="고객명 검색..." oninput="currentPage=1;renderHistory()">
                </div>
                <div class="filter-chips">
                    <button class="chip active" onclick="setDir(this,'all')">전체</button>
                    <button class="chip" onclick="setDir(this,'up')"><i class="fa-solid fa-arrow-up" style="color:var(--success)"></i> 승급</button>
                    <button class="chip" onclick="setDir(this,'down')"><i class="fa-solid fa-arrow-down" style="color:var(--danger)"></i> 강등</button>
                    <button class="chip" onclick="setDir(this,'manual')"><i class="fa-solid fa-user-pen" style="color:var(--warning)"></i> 수동변경</button>
                </div>
                <button class="m-filter-trigger" onclick="openBottomSheet()">
                    <i class="fa-solid fa-filter"></i>
                    <span id="mFilterLabel">전체</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <select class="hotel-select" id="monthFilter" onchange="currentPage=1;renderHistory()" style="width:140px">
                    <option value="all">전체 기간</option>
                    <option value="2026-06" selected>2026년 6월</option>
                    <option value="2026-05">2026년 5월</option>
                    <option value="2026-04">2026년 4월</option>
                    <option value="2026-03">2026년 3월</option>
                    <option value="2026-02">2026년 2월</option>
                    <option value="2026-01">2026년 1월</option>
                </select>
                <button class="btn-outline" onclick="window.location.href='../download/Export_Data.xlsx'"><i class="fa-solid fa-download"></i> 엑셀 다운로드</button>
            </div>
        </div>

        <!-- Desktop Table -->
        <div class="card desktop-only" style="margin-top:16px">
            <div class="card-body" style="padding:0">
                <div class="table-wrap">
                    <table><thead><tr>
                        <th>일자</th><th>고객</th><th>변동</th><th>변경 방식</th><th>이전 등급</th><th>변경 등급</th><th>사유</th><th>처리</th>
                    </tr></thead>
                    <tbody id="historyBody"></tbody></table>
                </div>
            </div>
        </div>

        <!-- Mobile Cards -->
        <div class="mobile-cards mobile-only" id="historyMobile"></div>

        <!-- Pagination -->
        <div class="pagination" style="margin-top:16px">
            <div style="display:flex;align-items:center;gap:10px">
                <span class="page-info">총 <b id="totalCount">0</b>건</span>
                <select id="pageSizeSelect" onchange="changePageSize()" style="height:30px;border:1px solid var(--border);border-radius:4px;padding:0 6px;font-size:.75rem;font-family:var(--font);color:var(--txt2);background:#fff;cursor:pointer">
                    <option value="10" selected>10개씩</option>
                    <option value="15">15개씩</option>
                    <option value="20">20개씩</option>
                    <option value="30">30개씩</option>
                </select>
            </div>
            <div class="page-btns" id="pageButtons"></div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeBottomSheet()"></div>
<div class="bottom-sheet" id="bsPanel">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">변동 유형 선택</div>
    <div class="bottom-sheet-options">
        <button class="bs-option selected" onclick="selectFilter('all','전체')">
            <div class="bs-option-icon" style="background:var(--border2);color:var(--txt2)"><i class="fa-solid fa-list"></i></div>
            <div class="bs-option-label">전체<div class="bs-option-desc">모든 등급 변동</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectFilter('up','승급')">
            <div class="bs-option-icon" style="background:rgba(16,185,129,.1);color:#059669"><i class="fa-solid fa-arrow-up"></i></div>
            <div class="bs-option-label">승급<div class="bs-option-desc">등급이 올라간 변동만</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectFilter('down','강등')">
            <div class="bs-option-icon" style="background:rgba(239,68,68,.1);color:#DC2626"><i class="fa-solid fa-arrow-down"></i></div>
            <div class="bs-option-label">강등<div class="bs-option-desc">등급이 내려간 변동만</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectFilter('manual','수동변경')">
            <div class="bs-option-icon" style="background:rgba(245,158,11,.1);color:#D97706"><i class="fa-solid fa-user-pen"></i></div>
            <div class="bs-option-label">수동변경<div class="bs-option-desc">관리자가 사유를 남긴 변경만</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
    </div>
</div>

<!-- Tier Change Guest Modal -->
<div class="modal-overlay" id="tierGuestModal" onclick="if(event.target===this) closeModal('tierGuestModal')">
    <div class="modal-card tier-guest-modal">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-address-card"></i> 고객 정보</h3>
            <button class="modal-close" onclick="closeModal('tierGuestModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="tierGuestModalBody">
            <div class="tier-criteria-empty">고객 정보를 불러오는 중입니다.</div>
        </div>
        <div class="modal-footer">
            <button class="btn-primary-sm" onclick="closeModal('tierGuestModal')"><i class="fa-solid fa-check"></i> 확인</button>
        </div>
    </div>
</div>

<script>
const tierCfg = {
    diamond:{label:'다이아몬드',icon:'fa-gem',color:'#60A5FA',bg:'rgba(96,165,250,.1)'},
    platinum:{label:'플래티넘',icon:'fa-star',color:'#A78BFA',bg:'rgba(167,139,250,.1)'},
    gold:{label:'골드',icon:'fa-crown',color:'#F59E0B',bg:'rgba(245,158,11,.1)'},
    standard:{label:'일반',icon:'fa-user',color:'#9CA3AF',bg:'rgba(156,163,175,.1)'}
};

let history = [];
let guests = [];

let currentDir = 'all';
let currentPage = 1;
let pageSize = 10;

function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const month = document.getElementById('monthFilter').value;
    return history.filter(h => {
        if (currentDir === 'up' && h.dir !== 'up') return false;
        if (currentDir === 'down' && h.dir !== 'down') return false;
        if (currentDir === 'manual' && h.changeType !== 'manual') return false;
        if (search && !h.name.toLowerCase().includes(search)) return false;
        if (month !== 'all' && !h.date.startsWith(month)) return false;
        return true;
    });
}

function currentMonthItems() {
    const selected = document.getElementById('monthFilter')?.value || 'all';
    return history.filter(h => selected === 'all' || h.date.startsWith(selected));
}

function textFor(key) {
    const lang = localStorage.getItem('pms_lang') || window.currentLang || 'ko';
    const localDict = typeof translations !== 'undefined' ? translations[lang] || {} : {};
    const globalDict = window.translations ? window.translations[lang] || {} : {};
    return localDict[key] || globalDict[key] || key;
}

function historyEscape(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function money(value) {
    return typeof window.pmsFormatCurrency === 'function'
        ? window.pmsFormatCurrency(value)
        : '₱' + Number(value || 0).toLocaleString();
}

function localizedValue(value) {
    const lang = localStorage.getItem('pms_lang') || window.currentLang || 'ko';
    if (value && typeof value === 'object' && !Array.isArray(value)) return value[lang] || value.ko || value.en || '';
    return value ?? '';
}

function tierDisplayMeta(tier) {
    const id = String(tier || '').toLowerCase();
    return tierCfg[id] || { label: tier || '-', icon: 'fa-layer-group', color: '#2563EB', bg: 'rgba(37,99,235,.12)' };
}

function tierLabel(tier) {
    const id = String(tier || '').toLowerCase();
    const labels = {
        standard: { ko: '일반', en: 'Standard' },
        silver: { ko: '실버', en: 'Silver' },
        gold: { ko: '골드', en: 'Gold' },
        platinum: { ko: '플래티넘', en: 'Platinum' },
        diamond: { ko: '다이아몬드', en: 'Diamond' }
    };
    return localizedValue(labels[id]) || tierDisplayMeta(id).label || tier || '-';
}

function tierBadge(tier) {
    const meta = tierDisplayMeta(tier);
    return `<span class="tier-badge" style="background:${meta.bg};color:${meta.color}"><i class="fa-solid ${meta.icon}"></i> ${historyEscape(tierLabel(tier))}</span>`;
}

function tierRank(tier) {
    const ranks = { standard: 0, silver: 1, gold: 2, platinum: 3, diamond: 4 };
    return ranks[String(tier || 'standard').toLowerCase()] ?? 0;
}

function tierChangeDisplay(change) {
    const fromRank = tierRank(change?.from);
    const toRank = tierRank(change?.to);
    const dir = toRank < fromRank ? 'down' : 'up';
    const lang = localStorage.getItem('pms_lang') || window.currentLang || 'ko';
    if (dir === 'down') return { label: lang === 'en' ? 'Downgrade' : '강등', color: 'var(--danger)', icon: 'fa-arrow-down' };
    return { label: textFor('Upgrade'), color: 'var(--success)', icon: 'fa-arrow-up' };
}

function tierChangeMethodDisplay(change) {
    const lang = localStorage.getItem('pms_lang') || window.currentLang || 'ko';
    const manual = change?.changeType === 'manual';
    return {
        label: manual ? (lang === 'en' ? 'Manual Change' : '수동변경') : (lang === 'en' ? 'Auto Change' : '자동변경'),
        color: manual ? 'var(--warning)' : 'var(--primary)',
        icon: manual ? 'fa-user-pen' : 'fa-gear'
    };
}

function crmInitialFallback(name) {
    return String(name || 'G').split(/\s+/).map(part => part[0]).join('').slice(0, 2).toUpperCase();
}

function findGuestForChange(change) {
    if (!change) return null;
    return guests.find(guest => guest.id === change.guestId)
        || guests.find(guest => guest.name === change.name)
        || null;
}

function updateKpis() {
    const config = window.PMS_VIP_CRITERIA?.getConfig?.();
    const monthItems = currentMonthItems();
    const upgrades = monthItems.filter(h => h.dir === 'up');
    const manualChanges = monthItems.filter(h => h.changeType === 'manual');
    const newVip = config
        ? upgrades.filter(h => window.PMS_VIP_CRITERIA.isVipTier(h.to, config) && !window.PMS_VIP_CRITERIA.isVipTier(h.from, config))
        : upgrades;
    const vipCustomers = config && window.PMS_VIP_CRITERIA
        ? window.PMS_VIP_CRITERIA.countVip(guests, config)
        : 0;

    const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
    };
    setText('kpiUpgrades', upgrades.length);
    setText('kpiVipCustomers', vipCustomers);
    setText('kpiNewVip', newVip.length);
    setText('kpiManualChanges', manualChanges.length);
    const criteria = document.getElementById('kpiVipCriteria');
    if (criteria && config && window.PMS_VIP_CRITERIA) {
        criteria.textContent = window.PMS_VIP_CRITERIA.vipSubtitle(config, localStorage.getItem('pms_lang') || window.currentLang || 'ko');
    }
}

function renderHistory() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * pageSize;
    const paged = filtered.slice(start, start + pageSize);

    document.getElementById('totalCount').textContent = total;
    updateKpis();

    // Desktop table
    document.getElementById('historyBody').innerHTML = paged.map(h => {
        const from = tierCfg[h.from], to = tierCfg[h.to];
        const changeMeta = tierChangeDisplay(h);
        const changeColor = changeMeta.color;
        const changeIcon = changeMeta.icon;
        const changeLabel = changeMeta.label;
        const methodMeta = tierChangeMethodDisplay(h);
        const reason = h.reason || textFor('Reason Required');
        return `<tr class="tier-history-row" data-change-id="${historyEscape(h.id)}" tabindex="0">
            <td style="white-space:nowrap;font-size:.78rem;color:var(--txt2)">${historyEscape(h.date)}</td>
            <td><div class="guest-cell"><strong>${historyEscape(h.name)}</strong></div></td>
            <td><span style="color:${changeColor};font-weight:700"><i class="fa-solid ${changeIcon}"></i> ${changeLabel}</span></td>
            <td><span style="color:${methodMeta.color};font-weight:700"><i class="fa-solid ${methodMeta.icon}"></i> ${methodMeta.label}</span></td>
            <td>${tierBadge(h.from)}</td>
            <td>${tierBadge(h.to)}</td>
            <td style="font-size:.78rem;color:var(--txt2);max-width:240px;white-space:normal">${historyEscape(reason)}</td>
            <td style="font-size:.72rem;color:var(--txt3)">${historyEscape(h.by)}</td>
        </tr>`;
    }).join('');

    // Mobile cards
    document.getElementById('historyMobile').innerHTML = paged.map(h => {
        const from = tierCfg[h.from], to = tierCfg[h.to];
        const changeMeta = tierChangeDisplay(h);
        const dirLabel = changeMeta.label;
        const dirColor = changeMeta.color;
        const dirIcon = changeMeta.icon;
        const methodMeta = tierChangeMethodDisplay(h);
        const reason = h.reason || textFor('Reason Required');
        return `<div class="m-res-card tier-history-row" data-change-id="${historyEscape(h.id)}" tabindex="0" style="border-left-color:${dirColor}">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div>
                        <div class="m-res-name">${historyEscape(h.name)}</div>
                        <div class="m-res-sub">${historyEscape(h.date)}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span style="font-size:.72rem;font-weight:700;color:${dirColor}"><i class="fa-solid ${dirIcon}"></i> ${dirLabel}</span>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail">
                    ${tierBadge(h.from)}
                    <i class="fa-solid fa-arrow-right" style="color:var(--txt3);font-size:.6rem"></i>
                    ${tierBadge(h.to)}
                </div>
                <div class="m-res-detail"><i class="fa-solid fa-clipboard-list"></i> ${historyEscape(reason)}</div>
                <div class="m-res-detail"><i class="fa-solid ${methodMeta.icon}"></i> ${methodMeta.label}</div>
                <div class="m-res-detail"><i class="fa-solid fa-user-check"></i> ${historyEscape(h.by)}</div>
            </div>
        </div>`;
    }).join('');
    attachHistoryRowHandlers();

    // Pagination buttons
    let btns = `<button class="page-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})"><i class="fa-solid fa-chevron-left"></i></button>`;
    for (let i = 1; i <= totalPages; i++) {
        btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    btns += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})"><i class="fa-solid fa-chevron-right"></i></button>`;
    document.getElementById('pageButtons').innerHTML = btns;
}

function attachHistoryRowHandlers() {
    document.querySelectorAll('.tier-history-row').forEach(row => {
        row.addEventListener('click', () => openTierGuestModal(row.dataset.changeId));
        row.addEventListener('keydown', event => {
            if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openTierGuestModal(row.dataset.changeId);
            }
        });
    });
}

function openModal(id) {
    document.getElementById(id)?.classList.add('active');
}

function closeModal(id) {
    document.getElementById(id)?.classList.remove('active');
}

function openTierGuestModal(changeId) {
    const change = history.find(item => String(item.id) === String(changeId));
    const guest = findGuestForChange(change);
    const body = document.getElementById('tierGuestModalBody');
    if (!body) return;
    if (!change) {
        body.innerHTML = `<div class="tier-criteria-empty">등급 변동 데이터를 찾을 수 없습니다.</div>`;
        openModal('tierGuestModal');
        return;
    }
    const displayGuest = guest || {
        name: change.name,
        init: change.init,
        color: change.color,
        tier: change.to
    };
    const notes = displayGuest.specialNotes
        ? `<div class="tier-guest-field" style="grid-column:1/-1"><div class="tier-guest-field-label">특이사항</div><div class="tier-guest-field-value" style="white-space:normal;line-height:1.45">${historyEscape(displayGuest.specialNotes)}</div></div>`
        : '';
    body.innerHTML = `
        <div class="tier-guest-head">
            <div style="min-width:0">
                <div class="tier-guest-name">${historyEscape(displayGuest.name || change.name)}</div>
                <div class="tier-guest-sub">${tierBadge(displayGuest.tier || change.to)}</div>
            </div>
        </div>
        <div class="tier-guest-grid">
            <div class="tier-guest-field"><div class="tier-guest-field-label">국적</div><div class="tier-guest-field-value">${historyEscape(displayGuest.nation || displayGuest.nationality || '-')}</div></div>
            <div class="tier-guest-field"><div class="tier-guest-field-label">연락처</div><div class="tier-guest-field-value">${historyEscape(displayGuest.phone || '-')}</div></div>
            <div class="tier-guest-field"><div class="tier-guest-field-label">이메일</div><div class="tier-guest-field-value">${historyEscape(displayGuest.email || '-')}</div></div>
            <div class="tier-guest-field"><div class="tier-guest-field-label">최근 투숙</div><div class="tier-guest-field-value">${historyEscape(displayGuest.last || displayGuest.lastStayDate || '-')}</div></div>
            <div class="tier-guest-field"><div class="tier-guest-field-label">방문 횟수</div><div class="tier-guest-field-value">${historyEscape(displayGuest.visits || 0)}회</div></div>
            <div class="tier-guest-field"><div class="tier-guest-field-label">누적 금액</div><div class="tier-guest-field-value">${money(displayGuest.spend || 0)}</div></div>
            ${notes}
        </div>
        <div class="tier-change-box">
            <div class="tier-change-title"><i class="fa-solid fa-arrow-up-right-dots"></i> 등급 변동 정보</div>
            <div class="tier-change-flow">${tierBadge(change.from)} <i class="fa-solid fa-arrow-right" style="color:var(--txt3);font-size:.7rem"></i> ${tierBadge(change.to)}</div>
            <div class="tier-change-meta">${historyEscape(change.reason || '-')}<br>${historyEscape(change.by || '-')} · ${historyEscape(change.date || '-')}</div>
        </div>`;
    openModal('tierGuestModal');
}

function goPage(p) { currentPage = p; renderHistory(); }
function changePageSize() { pageSize = parseInt(document.getElementById('pageSizeSelect').value); currentPage = 1; renderHistory(); }

function setDir(btn, dir) {
    currentDir = dir;
    currentPage = 1;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderHistory();
}

function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.sidebar-overlay').classList.toggle('active');
}

// Bottom sheet
function openBottomSheet() {
    document.getElementById('bsOverlay').classList.add('active');
    document.getElementById('bsPanel').classList.add('active');
}
function closeBottomSheet() {
    document.getElementById('bsOverlay').classList.remove('active');
    document.getElementById('bsPanel').classList.remove('active');
}
function selectFilter(dir, label) {
    currentDir = dir;
    currentPage = 1;
    // Update bottom sheet selected state
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    // Update mobile trigger label
    document.getElementById('mFilterLabel').textContent = label;
    // Sync desktop chips
    const chipWrap = document.querySelector('.filter-chips');
    const chips = chipWrap ? chipWrap.querySelectorAll('.chip') : [];
    chips.forEach(c => c.classList.remove('active'));
    if (dir === 'all' && chips[0]) chips[0].classList.add('active');
    else if (dir === 'up' && chips[1]) chips[1].classList.add('active');
    else if (dir === 'down' && chips[2]) chips[2].classList.add('active');
    else if (dir === 'manual' && chips[3]) chips[3].classList.add('active');
    closeBottomSheet();
    renderHistory();
}

            PmsAPI.getHistory(),
            PmsAPI.getGuests ? PmsAPI.getGuests() : Promise.resolve([])
        ]);
        history = tierHistory;
        guests = guestList;
        renderHistory();
