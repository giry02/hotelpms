<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>등급 변동 이력 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/crm.css">
<style>
.topbar-back-btn{height:32px;min-width:32px;padding:4px 8px;margin-right:8px;border:none;box-shadow:none;border-radius:6px;background:transparent;color:var(--txt);font-family:var(--font);font-size:.95rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .18s}
.topbar-back-btn:hover{color:var(--primary);background:var(--border2)}

/* Mobile filter trigger */
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0;width:100px}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.m-filter-trigger span{flex:1;text-align:left}

/* Bottom sheet */
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:60vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{overflow-y:auto;flex:1;padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:14px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-label{flex:1}
.bs-option-desc{font-size:.68rem;color:var(--txt3);font-weight:400;margin-top:2px}

@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-chips{display:none!important}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:nowrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-crm.js"></script>
    <script src="../common/js/vip-criteria.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <h1 data-i18n-key="Tier Change History">등급 변동 이력</h1>
    </header>

    <div class="content">
        <!-- KPI Summary -->
        <div class="tier-overview">
            <div class="tier-card" style="background:#fff;border:1px solid rgba(16,185,129,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#059669,#10B981)"></div>
                <div class="tier-card-icon" style="background:rgba(16,185,129,.15);color:#059669"><i class="fa-solid fa-arrow-up"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiUpgrades">0</div>
                    <div class="tier-card-name">이번 달 승급</div>
                </div>
                <div class="tier-card-criteria">전월 대비 +5</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(59,130,246,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#2563EB,#3B82F6)"></div>
                <div class="tier-card-icon" style="background:rgba(59,130,246,.15);color:#2563EB"><i class="fa-solid fa-users"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiVipCustomers">0</div>
                    <div class="tier-card-name">우수 고객</div>
                </div>
                <div class="tier-card-criteria" id="kpiVipCriteria">설정된 우수 고객 기준</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(139,92,246,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#7C3AED,#8B5CF6)"></div>
                <div class="tier-card-icon" style="background:rgba(139,92,246,.15);color:#7C3AED"><i class="fa-solid fa-star"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiNewVip">0</div>
                    <div class="tier-card-name">신규 우수 고객</div>
                </div>
                <div class="tier-card-criteria" data-i18n-key="New entries this month">이번 달 신규 진입</div>
            </div>
            <div class="tier-card" style="background:#fff;border:1px solid rgba(245,158,11,.2);box-shadow:var(--shadow)">
                <div style="position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,#D97706,#F59E0B)"></div>
                <div class="tier-card-icon" style="background:rgba(245,158,11,.15);color:#D97706"><i class="fa-solid fa-user-pen"></i></div>
                <div class="tier-card-info">
                    <div class="tier-card-count" id="kpiManualChanges">0</div>
                    <div class="tier-card-name">수동 변경</div>
                </div>
                <div class="tier-card-criteria" data-i18n-key="Admin reason required">관리자 사유 필수</div>
            </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
            <div class="filter-left">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="고객명 검색..." oninput="currentPage=1;renderHistory()">
                </div>
                <div class="filter-chips">
                    <button class="chip active" onclick="setDir(this,'all')">전체</button>
                    <button class="chip" onclick="setDir(this,'up')"><i class="fa-solid fa-arrow-up" style="color:var(--success)"></i> 승급</button>
                    <button class="chip" onclick="setDir(this,'manual')"><i class="fa-solid fa-user-pen" style="color:var(--warning)"></i> 수동 변경</button>
                </div>
                <button class="m-filter-trigger" onclick="openBottomSheet()">
                    <i class="fa-solid fa-filter"></i>
                    <span id="mFilterLabel">전체</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <select class="hotel-select" id="monthFilter" onchange="currentPage=1;renderHistory()" style="width:140px">
                    <option value="all">전체 기간</option>
                    <option value="2026-06" selected>2026년 6월</option>
                    <option value="2026-05">2026년 5월</option>
                    <option value="2026-04">2026년 4월</option>
                    <option value="2026-03">2026년 3월</option>
                    <option value="2026-02">2026년 2월</option>
                    <option value="2026-01">2026년 1월</option>
                </select>
                <button class="btn-outline" onclick="window.location.href='../download/Export_Data.xlsx'"><i class="fa-solid fa-download"></i> 엑셀 다운로드</button>
            </div>
        </div>

        <!-- Desktop Table -->
        <div class="card desktop-only" style="margin-top:16px">
            <div class="card-body" style="padding:0">
                <div class="table-wrap">
                    <table><thead><tr>
                        <th>일자</th><th>고객</th><th>변동</th><th>이전 등급</th><th>변경 등급</th><th>사유</th><th>처리</th>
                    </tr></thead>
                    <tbody id="historyBody"></tbody></table>
                </div>
            </div>
        </div>

        <!-- Mobile Cards -->
        <div class="mobile-cards mobile-only" id="historyMobile"></div>

        <!-- Pagination -->
        <div class="pagination" style="margin-top:16px">
            <div style="display:flex;align-items:center;gap:10px">
                <span class="page-info">총 <b id="totalCount">0</b>건</span>
                <select id="pageSizeSelect" onchange="changePageSize()" style="height:30px;border:1px solid var(--border);border-radius:4px;padding:0 6px;font-size:.75rem;font-family:var(--font);color:var(--txt2);background:#fff;cursor:pointer">
                    <option value="10" selected>10개씩</option>
                    <option value="15">15개씩</option>
                    <option value="20">20개씩</option>
                    <option value="30">30개씩</option>
                </select>
            </div>
            <div class="page-btns" id="pageButtons"></div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet-overlay" id="bsOverlay" onclick="closeBottomSheet()"></div>
<div class="bottom-sheet" id="bsPanel">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">변동 Type 선택</div>
    <div class="bottom-sheet-options">
        <button class="bs-option selected" onclick="selectFilter('all','전체')">
            <div class="bs-option-icon" style="background:var(--border2);color:var(--txt2)"><i class="fa-solid fa-list"></i></div>
            <div class="bs-option-label">전체<div class="bs-option-desc">모든 등급 변동</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectFilter('up','승급')">
            <div class="bs-option-icon" style="background:rgba(16,185,129,.1);color:#059669"><i class="fa-solid fa-arrow-up"></i></div>
            <div class="bs-option-label">승급<div class="bs-option-desc">등급이 올라간 변동만</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectFilter('manual','수동 변경')">
            <div class="bs-option-icon" style="background:rgba(245,158,11,.1);color:#D97706"><i class="fa-solid fa-user-pen"></i></div>
            <div class="bs-option-label">수동 변경<div class="bs-option-desc">관리자가 사유를 남긴 변경만</div></div>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
    </div>
</div>

<script>
const tierCfg = {
    diamond:{label:'다이아몬드',icon:'fa-gem',color:'#60A5FA',bg:'rgba(96,165,250,.1)'},
    platinum:{label:'플래티넘',icon:'fa-star',color:'#A78BFA',bg:'rgba(167,139,250,.1)'},
    gold:{label:'골드',icon:'fa-crown',color:'#F59E0B',bg:'rgba(245,158,11,.1)'},
    standard:{label:'일반',icon:'fa-user',color:'#9CA3AF',bg:'rgba(156,163,175,.1)'}
};

let history = [];
let guests = [];

let currentDir = 'all';
let currentPage = 1;
let pageSize = 10;

function getFiltered() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const month = document.getElementById('monthFilter').value;
    return history.filter(h => {
        if (currentDir === 'up' && h.dir !== 'up') return false;
        if (currentDir === 'manual' && h.changeType !== 'manual') return false;
        if (search && !h.name.toLowerCase().includes(search)) return false;
        if (month !== 'all' && !h.date.startsWith(month)) return false;
        return true;
    });
}

function currentMonthItems() {
    const selected = document.getElementById('monthFilter')?.value || 'all';
    return history.filter(h => selected === 'all' || h.date.startsWith(selected));
}

function textFor(key) {
    const lang = localStorage.getItem('pms_lang') || window.currentLang || 'ko';
    const localDict = typeof translations !== 'undefined' ? translations[lang] || {} : {};
    const globalDict = window.translations ? window.translations[lang] || {} : {};
    return localDict[key] || globalDict[key] || key;
}

function updateKpis() {
    const config = window.PMS_VIP_CRITERIA?.getConfig?.();
    const monthItems = currentMonthItems();
    const upgrades = monthItems.filter(h => h.dir === 'up');
    const manualChanges = monthItems.filter(h => h.changeType === 'manual');
    const newVip = config
        ? upgrades.filter(h => window.PMS_VIP_CRITERIA.isVipTier(h.to, config) && !window.PMS_VIP_CRITERIA.isVipTier(h.from, config))
        : upgrades;
    const vipCustomers = config && window.PMS_VIP_CRITERIA
        ? window.PMS_VIP_CRITERIA.countVip(guests, config)
        : 0;

    const setText = (id, value) => {
        const el = document.getElementById(id);
        if (el) el.textContent = value;
    };
    setText('kpiUpgrades', upgrades.length);
    setText('kpiVipCustomers', vipCustomers);
    setText('kpiNewVip', newVip.length);
    setText('kpiManualChanges', manualChanges.length);
    const criteria = document.getElementById('kpiVipCriteria');
    if (criteria && config && window.PMS_VIP_CRITERIA) {
        criteria.textContent = window.PMS_VIP_CRITERIA.vipSubtitle(config, localStorage.getItem('pms_lang') || window.currentLang || 'ko');
    }
}

function renderHistory() {
    const filtered = getFiltered();
    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    const start = (currentPage - 1) * pageSize;
    const paged = filtered.slice(start, start + pageSize);

    document.getElementById('totalCount').textContent = total;
    updateKpis();

    // Desktop table
    document.getElementById('historyBody').innerHTML = paged.map(h => {
        const from = tierCfg[h.from], to = tierCfg[h.to];
        const isManual = h.changeType === 'manual';
        const changeColor = isManual ? 'var(--warning)' : 'var(--success)';
        const changeIcon = isManual ? 'fa-user-pen' : 'fa-arrow-up';
        const changeLabel = textFor(isManual ? 'Manual Change' : 'Upgrade');
        const reason = h.reason || textFor('Reason Required');
        return `<tr>
            <td style="white-space:nowrap;font-size:.78rem;color:var(--txt2)">${h.date}</td>
            <td><div class="guest-cell"><div class="guest-avatar" style="background:${h.color}">${h.init}</div><strong>${h.name}</strong></div></td>
            <td><span style="color:${changeColor};font-weight:700"><i class="fa-solid ${changeIcon}"></i> ${changeLabel}</span></td>
            <td><span class="tier-badge" style="background:${from.bg};color:${from.color}"><i class="fa-solid ${from.icon}"></i> ${from.label}</span></td>
            <td><span class="tier-badge" style="background:${to.bg};color:${to.color}"><i class="fa-solid ${to.icon}"></i> ${to.label}</span></td>
            <td style="font-size:.78rem;color:var(--txt2);max-width:240px;white-space:normal">${reason}</td>
            <td style="font-size:.72rem;color:var(--txt3)">${h.by}</td>
        </tr>`;
    }).join('');

    // Mobile cards
    document.getElementById('historyMobile').innerHTML = paged.map(h => {
        const from = tierCfg[h.from], to = tierCfg[h.to];
        const isManual = h.changeType === 'manual';
        const dirLabel = textFor(isManual ? 'Manual Change' : 'Upgrade');
        const dirColor = isManual ? 'var(--warning)' : 'var(--success)';
        const dirIcon = isManual ? 'fa-user-pen' : 'fa-arrow-up';
        const reason = h.reason || textFor('Reason Required');
        return `<div class="m-res-card" style="border-left-color:${dirColor}">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div class="guest-avatar" style="background:${h.color}">${h.init}</div>
                    <div>
                        <div class="m-res-name">${h.name}</div>
                        <div class="m-res-sub">${h.date}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span style="font-size:.72rem;font-weight:700;color:${dirColor}"><i class="fa-solid ${dirIcon}"></i> ${dirLabel}</span>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail">
                    <span class="tier-badge" style="background:${from.bg};color:${from.color};font-size:.65rem"><i class="fa-solid ${from.icon}"></i> ${from.label}</span>
                    <i class="fa-solid fa-arrow-right" style="color:var(--txt3);font-size:.6rem"></i>
                    <span class="tier-badge" style="background:${to.bg};color:${to.color};font-size:.65rem"><i class="fa-solid ${to.icon}"></i> ${to.label}</span>
                </div>
                <div class="m-res-detail"><i class="fa-solid fa-clipboard-list"></i> ${reason}</div>
                <div class="m-res-detail"><i class="fa-solid fa-user-check"></i> ${h.by}</div>
            </div>
        </div>`;
    }).join('');

    // Pagination buttons
    let btns = `<button class="page-btn" ${currentPage <= 1 ? 'disabled' : ''} onclick="goPage(${currentPage-1})"><i class="fa-solid fa-chevron-left"></i></button>`;
    for (let i = 1; i <= totalPages; i++) {
        btns += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
    }
    btns += `<button class="page-btn" ${currentPage >= totalPages ? 'disabled' : ''} onclick="goPage(${currentPage+1})"><i class="fa-solid fa-chevron-right"></i></button>`;
    document.getElementById('pageButtons').innerHTML = btns;
}

function goPage(p) { currentPage = p; renderHistory(); }
function changePageSize() { pageSize = parseInt(document.getElementById('pageSizeSelect').value); currentPage = 1; renderHistory(); }

function setDir(btn, dir) {
    currentDir = dir;
    currentPage = 1;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderHistory();
}

function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.sidebar-overlay').classList.toggle('active');
}

// Bottom sheet
function openBottomSheet() {
    document.getElementById('bsOverlay').classList.add('active');
    document.getElementById('bsPanel').classList.add('active');
}
function closeBottomSheet() {
    document.getElementById('bsOverlay').classList.remove('active');
    document.getElementById('bsPanel').classList.remove('active');
}
function selectFilter(dir, label) {
    currentDir = dir;
    currentPage = 1;
    // Update bottom sheet selected state
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    event.currentTarget.classList.add('selected');
    // Update mobile trigger label
    document.getElementById('mFilterLabel').textContent = label;
    // Sync desktop chips
    const chipWrap = document.querySelector('.filter-chips');
    const chips = chipWrap ? chipWrap.querySelectorAll('.chip') : [];
    chips.forEach(c => c.classList.remove('active'));
    if (dir === 'all' && chips[0]) chips[0].classList.add('active');
    else if (dir === 'up' && chips[1]) chips[1].classList.add('active');
    else if (dir === 'manual' && chips[2]) chips[2].classList.add('active');
    closeBottomSheet();
    renderHistory();
}

// i18n
let currentLang=window.currentLang || localStorage.getItem('pms_lang') || 'ko';
const translations={ko: {
        "Main": "메인",
        "Front Desk": "프론트 데스크",
        "Guest & CRM": "투숙객 및 고객 관리",
        "Operations": "운영 관리",
        "Settings": "설정",
        "Dashboard": "대시보드",
        "Reservations": "예약 타임라인",
        "Booking List": "예약 목록",
        "Check-in/out": "체크인/아웃",
        "Guest CRM": "투숙객 관리",
        "VIP Members": "우수 고객 멤버십",
        "Room Mgmt": "객실 관리",
        "Room Types": "객실 유형",
        "Rates Calendar": "요금 캘린더",
        "Housekeeping": "하우스키핑",
        "Folio & Billing": "통합 정산",
        "Folio List": "정산 목록",
        "Revenue Analytics": "매출 분석",
        "Ancillary Svcs": "부가서비스",
        "Room Service": "룸서비스",
        "Golf": "골프",
        "Rent-a-car": "렌터카",
        "Hotel Settings": "호텔 설정",
        "Staff Mgmt": "직원 관리",
        "Billing & Payment": "요금 및 결제",

function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){currentLang=l;window.currentLang=l;localStorage.setItem('pms_lang', l);const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});document.getElementById('searchInput').placeholder=l==='en'?'Search guest name...':'고객명 검색...';renderHistory();}
document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});
</script>


<script>
function ensureTopbarBackButton() {
    const topbarLeft = document.querySelector('.topbar-left');
    const title = topbarLeft?.querySelector('h1');
    if (!topbarLeft || !title || topbarLeft.querySelector('.topbar-back-btn')) return;
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'topbar-back-btn';
    button.title = '뒤로';
    button.innerHTML = '<i class="fa-solid fa-arrow-left"></i>';
    button.onclick = () => { location.href = 'membership.html'; };
    topbarLeft.insertBefore(button, title);
}

document.addEventListener('DOMContentLoaded', async () => {
    setTimeout(ensureTopbarBackButton, 0);
    setTimeout(ensureTopbarBackButton, 200);
    try {
        const [tierHistory, guestList] = await Promise.all([
            PmsAPI.getHistory(),
            PmsAPI.getGuests ? PmsAPI.getGuests() : Promise.resolve([])
        ]);
        history = tierHistory;
        guests = guestList;
        renderHistory();
    } catch(e) { console.error(e); }
});
</script>
