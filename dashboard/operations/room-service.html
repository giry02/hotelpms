<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>룸서비스 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">

    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
    <header class="topbar"><h1 data-i18n-key="Room Service">룸서비스</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-bell"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiNewOrders">0</div>
                    <div class="kpi-label">신규 요청</div>
                    <div class="kpi-sub" id="kpiNewSub">접수 대기 중</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-fire-burner"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiPrepOrders">0</div>
                    <div class="kpi-label">준비/진행 중</div>
                    <div class="kpi-sub" id="kpiPrepSub">룸서비스 준비 중</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiDoneOrders">0</div>
                    <div class="kpi-label">완료</div>
                    <div class="kpi-sub" id="kpiDoneSub">서빙/서비스 완료</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiRevenue">$0</div>
                    <div class="kpi-label">예상 매출</div>
                    <div class="kpi-sub">정산 자동 청구액</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="객실번호 검색..." oninput="renderOrders()">
                </div>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-chips">
                    <button class="chip active" onclick="setFilter(this,'all')">전체 오더</button>
                    <button class="chip" onclick="setFilter(this,'breakfast')"><i class="fa-solid fa-mug-hot" style="color:var(--txt2)"></i> 조식</button>
                    <button class="chip" onclick="setFilter(this,'dining')"><i class="fa-solid fa-utensils" style="color:var(--txt2)"></i> 다이닝/야식</button>
                    <button class="chip" onclick="setFilter(this,'drink')"><i class="fa-solid fa-wine-glass" style="color:var(--txt2)"></i> 주류/음료</button>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('catalogModal')"><i class="fa-solid fa-list-check"></i> 항목 관리</button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> 수기 오더</button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="card">
            <div class="card-body" style="padding:0">
                <div class="hk-task-list" id="orderList">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let orders = [];

const tMap = {
    'breakfast': { label:'조식', icon:'fa-mug-hot', color:'var(--orange)' },
    'dining': { label:'다이닝/야식', icon:'fa-utensils', color:'var(--purple)' },
    'drink': { label:'주류/음료', icon:'fa-wine-glass', color:'var(--blue)' }
};

let currentFilter = 'all';

const serviceTypeAlias = {
    breakfast: 'breakfast',
    dining: 'dining',
    roomservice: 'dining',
    room_service: 'dining',
    drink: 'drink',
    minibar: 'drink'
};

function normalizeOrderStatus(status) {
    const value = String(status || 'new').replace(/[-_\s]/g, '').toLowerCase();
    if (['done', 'complete', 'completed', 'closed', 'paid', 'served'].includes(value)) return 'done';
    if (['prep', 'preparing', 'accepted', 'progress', 'processing', 'delivering', 'inprogress'].includes(value)) return 'prep';
    return 'new';
}

function normalizeRoomServiceOrder(item) {
    const rawType = String(item?.type || item?.category || '').replace(/[-\s]/g, '_').toLowerCase();
    const type = serviceTypeAlias[rawType];
    if (!type) return null;

    const items = Array.isArray(item.items)
        ? item.items.join(', ')
        : String(item.items || item.description || item.title || '서비스 항목 미입력');
    const total = item.total && typeof item.total === 'object'
        ? Number(item.total.amount || 0)
        : Number(item.total || item.amount || 0);

    return {
        id: item.id || `ORD-${Date.now()}`,
        room: String(item.roomNo || item.room || (item.roomId ? String(item.roomId).split('-').pop() : '') || '-'),
        type,
        guest: item.guest || item.guestName || '',
        items,
        total,
        currency: item.currency || item.totalCurrency || item.total?.currency || 'USD',
        status: normalizeOrderStatus(item.status),
        time: item.time || (item.createdAt ? String(item.createdAt).slice(11, 16) : '')
    };
}

function statusOverlay() {
    try { return JSON.parse(localStorage.getItem('pms_room_service_status') || '{}'); }
    catch(e) { return {}; }
}

function applyStatusOverlay(list) {
    const overlay = statusOverlay();
    return list.map(order => overlay[order.id] ? { ...order, status: overlay[order.id] } : order);
}

function saveStatusOverlay(id, status) {
    const overlay = statusOverlay();
    overlay[id] = status;
    localStorage.setItem('pms_room_service_status', JSON.stringify(overlay));
}

function formatMoney(amount, currency = 'USD') {
    const code = String(currency || 'USD').toUpperCase();
    const value = Number(amount || 0);
    try {
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: code,
            minimumFractionDigits: Number.isInteger(value) ? 0 : 2,
            maximumFractionDigits: code === 'USD' ? 2 : 0
        }).format(value);
    } catch(e) {
        const symbols = { USD: '$', KRW: '₩', VND: '₫', THB: '฿', JPY: '¥' };
        return `${symbols[code] || `${code} `}${value.toLocaleString()}`;
    }
}

function updateOrderKpis() {
    const newCount = orders.filter(o => o.status === 'new').length;
    const prepCount = orders.filter(o => o.status === 'prep').length;
    const doneCount = orders.filter(o => o.status === 'done').length;
    const total = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
    const currency = orders[0]?.currency || 'USD';

    document.getElementById('kpiNewOrders').textContent = newCount;
    document.getElementById('kpiPrepOrders').textContent = prepCount;
    document.getElementById('kpiDoneOrders').textContent = doneCount;
    document.getElementById('kpiRevenue').textContent = formatMoney(total, currency);
    document.getElementById('kpiNewSub').textContent = `${newCount}건 접수 대기`;
    document.getElementById('kpiPrepSub').textContent = `${prepCount}건 준비 중`;
    document.getElementById('kpiDoneSub').textContent = `${doneCount}건 완료`;
}

async function loadOrders() {
    const container = document.getElementById('orderList');
    container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">오더 데이터를 불러오는 중입니다.</div>';
    try {
        const raw = window.PmsAPI?.getOrders ? await PmsAPI.getOrders() : [];
        orders = applyStatusOverlay(raw.map(normalizeRoomServiceOrder).filter(Boolean));
    } catch(e) {
        console.warn('Room service orders load failed', e);
        orders = [];
    }
    renderOrders();
}

function renderOrders() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('orderList');
    updateOrderKpis();
    
    const filtered = orders.filter(o => {
        if (currentFilter !== 'all' && o.type !== currentFilter) return false;
        const haystack = [o.room, o.guest, o.id, o.items].join(' ').toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">해당하는 오더가 없습니다.</div>';
        return;
    }

    container.innerHTML = filtered.map(o => {
        const info = tMap[o.type] || tMap.dining;
        
        let sHtml, actBtn;
        if (o.status === 'new') {
            sHtml = `<span style="color:var(--danger);font-weight:700"><i class="fa-solid fa-circle-exclamation"></i> 신규 접수</span>`;
            actBtn = `<button class="btn-primary-sm" onclick="setOrderStatus('${o.id}','prep')"><i class="fa-solid fa-check"></i> 오더 수락</button>`;
        } else if (o.status === 'prep') {
            sHtml = `<span style="color:var(--primary);font-weight:700"><i class="fa-solid fa-fire-burner"></i> 준비 중</span>`;
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)" onclick="setOrderStatus('${o.id}','done')"><i class="fa-solid fa-check-double"></i> 서빙 완료</button>`;
        } else {
            sHtml = `<span style="color:var(--success)"><i class="fa-solid fa-check-circle"></i> 완료</span>`;
            actBtn = `<button class="btn-outline-sm" disabled>완료됨</button>`;
        }

        const amtHtml = o.total > 0 ? `<span style="font-weight:700;color:var(--txt)">${formatMoney(o.total, o.currency)}</span>` : `<span style="color:var(--txt3)">무료/안내</span>`;

        return `
        <div class="hk-task ${o.status === 'new' ? 'dirty' : (o.status === 'done' ? 'clean' : 'inspect')}">
            <div class="hk-task-left">
                <div class="hk-task-room">${o.room}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <i class="fa-solid ${info.icon}" style="color:${info.color}"></i> ${info.label}
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${o.id}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        ${o.items}
                    </div>
                    <div class="hk-task-meta">
                        ${sHtml}
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> 접수: ${o.time}</span>
                        <span style="color:var(--border)">|</span>
                        <span>청구액: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function setFilter(btn, filter) {
    currentFilter = filter;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

function setOrderStatus(id, status) {
    orders = orders.map(order => order.id === id ? { ...order, status } : order);
    saveStatusOverlay(id, status);
    renderOrders();
}

function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){currentLang=l;window.currentLang=l;localStorage.setItem('pms_lang', l);
    const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});
    document.getElementById('searchInput').placeholder=l==='en'?'Search room number...':'객실번호 검색...';
    if(tMap['breakfast']) tMap['breakfast'].label = l==='en'?'Breakfast':'조식';
    if(tMap['dining']) tMap['dining'].label = l==='en'?'Dining':'다이닝/야식';
    if(tMap['drink']) tMap['drink'].label = l==='en'?'Drinks':'주류/음료';
    renderOrders();
}

// 모달 및 오더 등록 로직
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function saveOrder() {
    showToast('새 룸서비스 오더가 시스템에 등록되었습니다.');
    closeModal('addOrderModal');
}

function handleItemSelect() {
    const sel = document.getElementById('itemSelect');
    const customInput = document.getElementById('customItemName');
    const priceInput = document.getElementById('orderPrice');
    
    if (sel.value === 'custom') {
        customInput.style.display = 'block';
        priceInput.readOnly = false;
        priceInput.value = '0.00';
    } else {
        customInput.style.display = 'none';
        if (sel.value !== '') {
            priceInput.readOnly = true;
            calculateTotal();
        }
    }
}

function calculateTotal() {
    const sel = document.getElementById('itemSelect');
    const qty = document.getElementById('itemQty').value;
    const priceInput = document.getElementById('orderPrice');
    
    if (sel.value && sel.value !== 'custom') {
        priceInput.value = (parseFloat(sel.value) * parseInt(qty)).toFixed(2);
    }
}

document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang);loadOrders()});
</script>

<!-- Add Order Modal -->
<div class="modal-overlay" id="addOrderModal" onclick="if(event.target===this) closeModal('addOrderModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">룸서비스 수기 등록</h3>
            <button class="modal-close" onclick="closeModal('addOrderModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">객실 번호 <span style="color:var(--danger)">*</span></label>
                    <input type="text" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 1401">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">메뉴 분류 <span style="color:var(--danger)">*</span></label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>조식</option>
                        <option>다이닝/야식</option>
                        <option>주류/음료</option>
                    </select>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">서비스 항목 <span style="color:var(--danger)">*</span></label>
                <div style="display:flex;gap:10px">
                    <select id="itemSelect" onchange="handleItemSelect()" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                        <option value="">항목을 선택하세요...</option>
                        <option value="5.00">아메리카노 ($5.00)</option>
                        <option value="15.00">클럽 샌드위치 ($15.00)</option>
                        <option value="80.00">아로마 마사지 60분 ($80.00)</option>
                        <option value="custom">직접 입력 (항목 및 가격 임의 설정)</option>
                    </select>
                    <input type="number" id="itemQty" value="1" min="1" onchange="calculateTotal()" style="width:60px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;text-align:center">
                </div>
                <input type="text" id="customItemName" placeholder="직접 입력할 서비스명..." style="display:none;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;margin-top:6px">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">청구 금액 ($) <span style="color:var(--danger)">*</span></label>
                    <input type="number" id="orderPrice" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" value="0.00">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">과금 방식</label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>객실 정산으로 합산 청구</option>
                        <option>현장 현금 결제</option>
                        <option>무료 서비스</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('addOrderModal')">취소</button>
            <button class="btn-primary-sm" onclick="saveOrder()"><i class="fa-solid fa-check"></i> 오더 전송</button>
        </div>
    </div>
</div>

<!-- Catalog Management Modal -->
<div class="modal-overlay" id="catalogModal" onclick="if(event.target===this) closeModal('catalogModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">룸서비스 메뉴 관리</h3>
            <button class="modal-close" onclick="closeModal('catalogModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">호텔 룸서비스 메뉴 항목과 단가를 미리 정의하여 일관성을 유지합니다.</p>
            
            <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
                <select style="flex:1;min-width:100px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                    <option>조식</option><option>다이닝</option><option>음료</option>
                </select>
                <input type="text" placeholder="새 메뉴명..." style="flex:2;min-width:150px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font)">
                <input type="number" placeholder="단가 ($)" style="width:80px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px">
                <button class="btn-primary-sm" style="width:auto">추가</button>
            </div>

            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span class="role-badge" style="background:var(--orange-lt);color:var(--orange)">조식</span> <strong style="margin-left:6px">아메리칸 브렉퍼스트</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$22.50</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span class="role-badge" style="background:var(--purple-lt);color:var(--purple)">다이닝</span> <strong style="margin-left:6px">클럽 샌드위치</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$15.00</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-primary-sm" onclick="closeModal('catalogModal')">확인</button>
        </div>
    </div>
</div>

<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
</body>
</html>
