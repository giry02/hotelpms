<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>매출 분석 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
/* Chart page specific styles */
.chart-grid { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
.chart-grid-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

/* Bar Chart */
.rev-bar-chart { display: flex; align-items: flex-end; gap: 12px; height: 220px; padding: 20px 0 0; }
.rev-bar-group { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 6px; }
.rev-bar-stack { display: flex; flex-direction: column; align-items: center; width: 100%; height: 180px; justify-content: flex-end; }
.rev-bar { width: 80%; transition: height .6s ease, opacity .2s; cursor: pointer; position: relative; min-height: 2px; border: 1px solid var(--card); border-bottom: none; }
.rev-bar:first-child { border-radius: 4px 4px 0 0; }
.rev-bar:hover { opacity: .85; }
.rev-bar.room { background: var(--primary); }
.rev-bar.fnb { background: var(--success); }
.rev-bar.spa { background: var(--purple); }
.rev-bar.other { background: var(--warning); }
.rev-bar-label { font-size: .75rem; color: var(--txt3); font-weight: 600; margin-top: 4px; }
.rev-bar-val { font-size: 0.9rem; font-weight: 800; color: var(--txt); margin-bottom: 4px; }
.rev-bar-group { border-radius: 8px; padding: 4px 3px; cursor: pointer; transition: background .15s, box-shadow .15s; }
.rev-bar-group:hover { background: #f8fafc; }
.rev-bar-group.active { background: #eff6ff; box-shadow: inset 0 0 0 1px #bfdbfe; }
.chart-click-detail {
    display: none; margin-top: 16px; padding: 14px 16px;
    border: 1px solid var(--border); border-radius: 10px; background: #f8fafc;
}
.chart-click-detail.active { display: block; }
.chart-detail-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 10px; }
.chart-detail-title { font-size: .9rem; font-weight: 800; color: var(--txt); }
.chart-detail-total { font-size: 1rem; font-weight: 850; color: var(--primary); }
.chart-detail-grid { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 8px; }
.chart-detail-item { display: flex; align-items: center; justify-content: space-between; gap: 8px; min-width: 0; padding: 8px 10px; border-radius: 8px; background: #fff; border: 1px solid var(--border2); font-size: .78rem; }
.chart-detail-label { display: flex; align-items: center; gap: 6px; color: var(--txt2); font-weight: 650; }
.chart-detail-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }
.chart-detail-value { font-weight: 800; color: var(--txt); font-variant-numeric: tabular-nums; }
.chart-hover-tooltip {
    position: fixed;
    display: none;
    background: rgba(15, 23, 42, .92);
    color: #fff;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: .85rem;
    z-index: 9999;
    box-shadow: 0 10px 25px rgba(0,0,0,.3);
    pointer-events: none;
    backdrop-filter: blur(4px);
    transition: opacity .12s;
    opacity: 0;
    transform: translate(-50%, -100%);
    margin-top: -15px;
    min-width: 210px;
}
.chart-hover-tooltip-title {
    font-weight: 700;
    margin-bottom: 6px;
    color: #CBD5E1;
    font-size: .75rem;
    border-bottom: 1px solid rgba(255,255,255,.1);
    padding-bottom: 4px;
}
.chart-hover-tooltip-content { line-height: 1.5; }
.chart-tooltip-row { display: flex; justify-content: space-between; gap: 20px; }
.chart-tooltip-row + .chart-tooltip-row { margin-top: 3px; }
.chart-tooltip-total {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid rgba(255,255,255,.12);
    font-weight: 800;
}

/* Donut Chart */
.donut-container { display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 10px 0; }
.donut-chart { width: 180px; height: 180px; border-radius: 50%; position: relative; display: flex; align-items: center; justify-content: center; }
.donut-hole { width: 100px; height: 100px; border-radius: 50%; background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; box-shadow: inset 0 0 8px rgba(0,0,0,.03); }
.donut-hole .val { font-size: 1.5rem; font-weight: 800; color: var(--txt); }
.donut-hole .sub { font-size: .68rem; color: var(--txt3); }
.donut-legend { display: flex; flex-direction: column; gap: 8px; width: 100%; }
.donut-leg-item { display: flex; align-items: center; gap: 10px; padding: 8px 12px; border-radius: var(--radius-sm); transition: background .15s; cursor: default; }
.donut-leg-item:hover { background: var(--border2); }
.donut-leg-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.donut-leg-label { font-size: .78rem; color: var(--txt); font-weight: 500; flex: 1; }
.donut-leg-val { font-size: .82rem; font-weight: 700; color: var(--txt); }
.donut-leg-pct { font-size: .7rem; color: var(--txt3); min-width: 36px; text-align: right; }

/* Department breakdown */
.dept-list { display: flex; flex-direction: column; gap: 32px; justify-content: center; padding: 10px 0; }
.dept-row { display: flex; align-items: center; gap: 12px; }
.dept-icon { width: 48px; height: 48px; font-size: 1.1rem; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: .85rem; flex-shrink: 0; }
.dept-info { flex: 1; min-width: 0; }
.dept-name { font-size: .95rem; font-weight: 600; color: var(--txt); }
.dept-sub { font-size: .75rem; color: var(--txt3); margin-top: 2px; }
.dept-bar-bg { height: 10px; margin-top: 10px; background: var(--border2); border-radius: 4px; overflow: hidden; margin-top: 6px; }
.dept-bar { height: 100%; border-radius: 4px; transition: width .8s ease; }
.dept-val { font-size: 1.1rem; font-weight: 800; color: var(--txt); text-align: right; min-width: 70px; flex-shrink: 0; }

/* Trend table */
.trend-table { width: 100%; border-collapse: collapse; }
.trend-table th { text-align: left; font-size: .7rem; text-transform: uppercase; letter-spacing: .5px; color: var(--txt3); font-weight: 600; padding: 10px 14px; border-bottom: 2px solid var(--border); }
.trend-table td { padding: 12px 14px; font-size: .82rem; border-bottom: 1px solid var(--border2); }
.trend-table tr:hover td { background: var(--border2); }
.trend-up { color: var(--success); font-weight: 600; font-size: .75rem; }
.trend-down { color: var(--danger); font-weight: 600; font-size: .75rem; }
.trend-bar-cell { width: 120px; }
.trend-bar-bg { height: 6px; background: var(--border2); border-radius: 3px; overflow: hidden; }
.trend-bar-fill { height: 100%; background: var(--primary); border-radius: 3px; transition: width .6s ease; }

@media(max-width:1024px) {
    .chart-grid { grid-template-columns: 1fr; }
    .chart-grid-equal { grid-template-columns: 1fr; }
}
@media(max-width:768px) {
    .rev-bar-chart { height: 180px; gap: 8px; }
    .rev-bar-group { min-width: 0; }
    .rev-bar-stack { height: 140px; }
    .rev-bar-val { max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-size: .72rem; }
    .rev-bar-label { font-size: .68rem; }
    .chart-detail-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .donut-chart { width: 150px; height: 150px; }
    .donut-hole { width: 84px; height: 84px; }
    .donut-hole .val { font-size: 1.2rem; }
    .trend-bar-cell { display: none; }
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <h1 data-i18n-key="Revenue Analytics">매출 분석</h1>
    </header>

    <div class="content">
        <!-- PERIOD SELECTOR -->
        <div class="filter-bar" style="margin-bottom: 20px;">
            <div class="filter-left" style="flex-wrap:wrap">
                <div class="filter-chips" style="margin-right:10px">
                    <button class="chip active" onclick="changeChartPeriod(this, 'week')">주별 (Weekly)</button>
                    <button class="chip" onclick="changeChartPeriod(this, 'month')">월별 (Monthly)</button>
                    <button class="chip" onclick="changeChartPeriod(this, 'year')">년도별 (Yearly)</button>
                </div>
                <div style="display:flex;gap:10px;align-items:center">
                    <select id="selYear" class="hotel-select" style="width:100px;height:36px;border:1px solid var(--border);border-radius:4px;padding:0 10px;background:#fff;font-family:var(--font)">
                        <option>2026년</option>
                        <option>2025년</option>
                    </select>
                    <select id="selMonth" class="hotel-select" style="width:80px;height:36px;border:1px solid var(--border);border-radius:4px;padding:0 10px;background:#fff;font-family:var(--font)">
                        <option>5월</option>
                        <option>4월</option>
                        <option>3월</option>
                    </select>
                    <select id="selWeek" class="hotel-select" style="width:90px;height:36px;border:1px solid var(--border);border-radius:4px;padding:0 10px;background:#fff;font-family:var(--font)">
                        <option>2주차</option>
                        <option>1주차</option>
                    </select>
                </div>
            </div>
            
        </div>

        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card green"><div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-chart-line"></i></div></div><div class="kpi-body"><div class="kpi-value" id="kpiTotal">$164,250</div><div class="kpi-label">주별 총 매출</div></div></div>
            <div class="kpi-card blue"><div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-bed"></i></div></div><div class="kpi-body"><div class="kpi-value" id="kpiRoom">$131,000</div><div class="kpi-label">객실 매출</div></div></div>
            <div class="kpi-card purple"><div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-utensils"></i></div></div><div class="kpi-body"><div class="kpi-value" id="kpiAnc">$22,800</div><div class="kpi-label">부가서비스 매출</div></div></div>
            <div class="kpi-card orange"><div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-arrow-trend-up"></i></div></div><div class="kpi-body"><div class="kpi-value" id="kpiDiff">+5.8%</div><div class="kpi-label">전주 대비</div></div></div>
        </div>

        <!-- ROW 1: Main Chart (Dynamic based on period) -->
        <div class="chart-grid">
            <!-- DAILY CARD -->
            <div class="card" id="cardDaily">
                <div class="card-header"><div class="card-title"><i class="fa-solid fa-chart-column"></i> 일별 매출 추이</div></div>
                <div class="card-body">
                    <div class="rev-bar-chart" id="barChart"></div>
                    <div style="display:flex;gap:16px;justify-content:center;margin-top:14px;flex-wrap:wrap">
                        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--primary)"></span> Room</div>
                        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--success)"></span> F&amp;B</div>
                        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--purple)"></span> 스파</div>
                        <div style="display:flex;align-items:center;gap:5px;font-size:.72rem;color:var(--txt2)"><span style="width:10px;height:10px;border-radius:2px;background:var(--warning)"></span> 기타</div>
                    </div>
                    <div class="chart-click-detail" id="dailyChartDetail"></div>
                    <div style="display:flex;justify-content:center;align-items:center;gap:30px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border2)">
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">해당 주차 총 매출</div>
                            <div style="font-size:1.3rem;font-weight:800;color:var(--txt)" id="summaryWeekTotal">$164,250</div>
                        </div>
                        <div style="width:1px;height:35px;background:var(--border2)"></div>
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">전주 대비</div>
                            <div style="font-size:1.1rem;font-weight:700;color:var(--success)" id="summaryWeekDiff"><i class="fa-solid fa-arrow-trend-up"></i> +5.8%</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- MONTHLY CARD -->
            <div class="card" id="cardMonthly" style="display:none;">
                <div class="card-header"><div class="card-title"><i class="fa-solid fa-calendar-alt"></i> 월별 매출 추이</div></div>
                <div class="card-body">
                    <div class="rev-bar-chart" id="monthlyChart" style="height:200px"></div>
                    <div class="chart-click-detail" id="monthlyChartDetail"></div>
                    <div style="display:flex;justify-content:center;align-items:center;gap:30px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border2)">
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">해당 월 총 매출</div>
                            <div style="font-size:1.3rem;font-weight:800;color:var(--txt)" id="summaryMonthTotal">$690,000</div>
                        </div>
                        <div style="width:1px;height:35px;background:var(--border2)"></div>
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">전월 대비</div>
                            <div style="font-size:1.1rem;font-weight:700;color:var(--success)" id="summaryMonthDiff"><i class="fa-solid fa-arrow-trend-up"></i> +18.2%</div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- YEARLY CARD -->
            <div class="card" id="cardYearly" style="display:none;">
                <div class="card-header"><div class="card-title"><i class="fa-solid fa-code-compare"></i> 작년 vs 올해 비교</div>
                    <div style="display:flex;gap:10px;font-size:.72rem;color:var(--txt2)">
                        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--border)"></span> 작년</span>
                        <span style="display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;border-radius:2px;background:var(--primary)"></span> 올해</span>
                    </div>
                </div>
                <div class="card-body">
                    <div id="yoyChart" style="height:200px"></div>
                    <div class="chart-click-detail" id="yoyChartDetail"></div>
                    <div style="display:flex;justify-content:center;align-items:center;gap:30px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border2)">
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">올해 누적 총 매출</div>
                            <div style="font-size:1.3rem;font-weight:800;color:var(--txt)">$3,140,000</div>
                        </div>
                        <div style="width:1px;height:35px;background:var(--border2)"></div>
                        <div style="text-align:center">
                            <div style="font-size:0.75rem;color:var(--txt3);font-weight:600;margin-bottom:4px">작년 대비</div>
                            <div style="font-size:1.1rem;font-weight:700;color:var(--success)"><i class="fa-solid fa-arrow-trend-up"></i> +18.2%</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- ROW 3: Dept + Trend -->
        <div class="chart-grid-equal">
            <div class="card">
                <div class="card-header"><div class="card-title"><i class="fa-solid fa-building"></i> 항목별 매출</div></div>
                <div class="card-body"><div class="dept-list" id="deptList"></div></div>
            </div>
            <div class="card">
                <div class="card-header"><div class="card-title"><i class="fa-solid fa-table-list"></i> 최근 7일 추이</div></div>
                <div class="card-body"><table class="trend-table"><thead><tr><th>Date</th><th style="text-align:right">객실</th><th style="text-align:right">통합 POS</th><th style="text-align:right">골프장</th><th style="text-align:right">렌트카</th></tr></thead><tbody id="trendBody"></tbody></table></div>
            </div>
        </div>
    </div>
</div>

<script>
let dailyData = [];
let selectedDailyIndex = null;
function chartMoney(v){return '$' + Number(v || 0).toLocaleString();}
const REPORT_TEXT = {
    ko: {
        weekBtn:'주별 (Weekly)', monthBtn:'월별 (Monthly)', yearBtn:'년도별 (Yearly)',
        weeklyTotal:'주별 총 매출', monthlyTotal:'월별 총 매출', yearlyTotal:'년도별 총 매출',
        roomRevenue:'객실 매출', ancillaryRevenue:'부가서비스 매출',
        vsLastWeek:'전주 대비', vsLastMonth:'전월 대비', vsLastYear:'전년 대비',
        dailyTitle:'일별 매출 추이', monthlyTitle:'월별 매출 추이', yoyTitle:'작년 vs 올해 비교',
        lastYear:'작년', thisYear:'올해', currentYear:'올해', previousYear:'전년',
        weeklySummary:'해당 주차 총 매출', monthlySummary:'해당 월 총 매출', yearlySummary:'올해 누적 총 매출',
        deptTitle:'항목별 매출', trendTitle:'최근 7일 추이',
        room:'객실', totalPos:'통합 POS', golf:'골프장', rentacar:'렌트카',
        roomsName:'객실 (Rooms)', roomsSub:'Room Revenue', posName:'통합 POS', posSub:'F&B, Retail',
        golfName:'골프장 (Golf)', golfSub:'Green Fee, Cart', carName:'렌트카 (Rent-a-car)', carSub:'Car Rentals',
        revenueDetail:'매출 상세', yearlyRevenue:'연도별 매출', totalRevenue:'총 매출',
        total:'합계', spa:'스파', other:'기타'
    },
    en: {
        weekBtn:'Weekly', monthBtn:'Monthly', yearBtn:'Yearly',
        weeklyTotal:'Weekly Total Revenue', monthlyTotal:'Monthly Total Revenue', yearlyTotal:'Yearly Total Revenue',
        roomRevenue:'Room Revenue', ancillaryRevenue:'Ancillary Revenue',
        vsLastWeek:'vs Last Week', vsLastMonth:'vs Last Month', vsLastYear:'vs Last Year',
        dailyTitle:'Daily Revenue Trend', monthlyTitle:'Monthly Revenue Trend', yoyTitle:'Last Year vs This Year',
        lastYear:'Last Year', thisYear:'This Year', currentYear:'This Year', previousYear:'Last Year',
        weeklySummary:'This Week Total Revenue', monthlySummary:'This Month Total Revenue', yearlySummary:'YTD Total Revenue',
        deptTitle:'Revenue by Department', trendTitle:'Recent 7-Day Trend',
        room:'Room', totalPos:'Unified POS', golf:'Golf', rentacar:'Rent-a-car',
        roomsName:'Rooms', roomsSub:'Room Revenue', posName:'Unified POS', posSub:'F&B, Retail',
        golfName:'Golf', golfSub:'Green Fee, Cart', carName:'Rent-a-car', carSub:'Car Rentals',
        revenueDetail:'Revenue Detail', yearlyRevenue:'Yearly Revenue', totalRevenue:'Total Revenue',
        total:'Total', spa:'Spa', other:'Other'
    }
};
function rt(key){return (REPORT_TEXT[currentLang] || REPORT_TEXT.ko)[key] || REPORT_TEXT.ko[key] || key;}
function monthLabel(value){
    const raw = String(value || '');
    const match = raw.match(/\d+/);
    return currentLang === 'en' && match ? `M${match[0]}` : raw;
}
function setText(selector, text){
    const el = document.querySelector(selector);
    if(el) el.textContent = text;
}
function setCardTitle(selector, iconClass, text){
    const el = document.querySelector(selector);
    if(el) el.innerHTML = `<i class="${iconClass}"></i> ${text}`;
}
function localizeDept(d){
    if(currentLang !== 'en') return d;
    const icon = d.icon || '';
    if(icon.includes('bed')) return {...d, name:rt('roomsName'), sub:rt('roomsSub')};
    if(icon.includes('cash-register')) return {...d, name:rt('posName'), sub:rt('posSub')};
    if(icon.includes('golf')) return {...d, name:rt('golfName'), sub:rt('golfSub')};
    if(icon.includes('car')) return {...d, name:rt('carName'), sub:rt('carSub')};
    return d;
}
function applyReportStaticI18n(){
    const chips = document.querySelectorAll('.filter-chips .chip');
    if(chips[0]) chips[0].textContent = rt('weekBtn');
    if(chips[1]) chips[1].textContent = rt('monthBtn');
    if(chips[2]) chips[2].textContent = rt('yearBtn');
    const yearOptions = document.querySelectorAll('#selYear option');
    yearOptions.forEach(opt => { opt.textContent = currentLang === 'en' ? opt.textContent.replace(/[^\d]/g, '') : (opt.textContent.replace(/[^\d]/g, '') + '년'); });
    const monthOptions = document.querySelectorAll('#selMonth option');
    monthOptions.forEach(opt => {
        const n = opt.textContent.replace(/[^\d]/g, '');
        if(n) opt.textContent = currentLang === 'en' ? `M${n}` : `${n}월`;
    });

function hasRevenueBreakdown(data){

function getRevenueTooltip(){
    let tooltip = document.getElementById('revenueChartTooltip');

    tooltip.className = 'chart-hover-tooltip';
    tooltip.innerHTML = '<div class="chart-hover-tooltip-title"></div><div class="chart-hover-tooltip-content"></div>';
    document.body.appendChild(tooltip);
    return tooltip;
}
function positionRevenueTooltip(event){
    const tooltip = getRevenueTooltip();
    tooltip.style.left = event.clientX + 'px';
    tooltip.style.top = event.clientY + 'px';
}
function showRevenueTooltip(event, title, content){
    event.stopPropagation();
    const tooltip = getRevenueTooltip();
    tooltip.querySelector('.chart-hover-tooltip-title').innerHTML = title;
    tooltip.querySelector('.chart-hover-tooltip-content').innerHTML = content;
    tooltip.style.display = 'block';
    void tooltip.offsetWidth;
    tooltip.style.opacity = '1';
    positionRevenueTooltip(event);
}
function hideRevenueTooltip(){

}
function revenueBreakdownContent(data, total){
    const categoryTotal = Number(data.room||0)+Number(data.fnb||0)+Number(data.spa||0)+Number(data.other||0);
    if(!categoryTotal && Number(total||0)){
        return `<div class="chart-tooltip-row chart-tooltip-total"><span>${rt('totalRevenue')}</span><strong>${chartMoney(total)}</strong></div>`;
    }
    return `<div class="chart-tooltip-row"><span>Room</span><strong style="color:#93c5fd">${chartMoney(data.room)}</strong></div>
        <div class="chart-tooltip-row"><span>F&amp;B</span><strong style="color:#86efac">${chartMoney(data.fnb)}</strong></div>
        <div class="chart-tooltip-row"><span>${rt('spa')}</span><strong style="color:#c4b5fd">${chartMoney(data.spa)}</strong></div>
        <div class="chart-tooltip-row"><span>${rt('other')}</span><strong style="color:#fbbf24">${chartMoney(data.other)}</strong></div>
        <div class="chart-tooltip-row chart-tooltip-total"><span>${rt('total')}</span><strong>${chartMoney(total)}</strong></div>`;
}
function attachRevenueTooltip(element, title, content){
    element.addEventListener('mouseenter', (event) => showRevenueTooltip(event, title, content));
    element.addEventListener('mousemove', positionRevenueTooltip);
    element.addEventListener('mouseleave', hideRevenueTooltip);

let depts = [];
let currentChartPeriod = 'week';
function parseMoneyValue(value){
    return Number(String(value || '').replace(/[^0-9.-]/g, '')) || 0;
}
function getPeriodDeptRows(type = currentChartPeriod){
    if(!depts.length) return [];
    const baseTotal = depts.reduce((sum, d) => sum + Number(d.amt || 0), 0) || 1;
    const targetTotal = parseMoneyValue(kpiData[type]?.total) || baseTotal;
    const scale = targetTotal / baseTotal;
    return depts.map(d => {
        const amt = Math.round(Number(d.amt || 0) * scale);
        return {
            ...d,
            amt,
            pct: targetTotal ? Math.max(2, Math.round((amt / targetTotal) * 100)) : Number(d.pct || 0)
        };
    });
}

function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){
    currentLang=l;
    window.currentLang=l;
    localStorage.setItem('pms_lang', l);
    const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});
    applyReportStaticI18n();
    const activeType = currentChartPeriod || 'week';
    const activeChip = document.querySelector(`.filter-chips .chip:nth-child(${activeType==='week'?1:activeType==='month'?2:3})`);
    if(activeChip) changeChartPeriod(activeChip, activeType);
    renderBarChart(); renderMonthly(); renderYoY(); renderDepts(activeType); renderTrend();
}
const kpiData = {
    'week': { total:'$164,250', room:'$131,000', anc:'$22,800', diff:'+5.8%', labelKey:'vsLastWeek', titleKey:'weeklyTotal' },
    'month': { total:'$690,000', room:'$560,000', anc:'$95,000', diff:'+18.2%', labelKey:'vsLastMonth', titleKey:'monthlyTotal' },
    'year': { total:'$3,140,000', room:'$2,450,000', anc:'$520,000', diff:'+18.2%', labelKey:'vsLastYear', titleKey:'yearlyTotal' }
};

function changeChartPeriod(btn, type) {
    currentChartPeriod = type;
    btn.parentElement.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    
    document.getElementById('selMonth').style.display = (type === 'week' || type === 'month') ? 'inline-block' : 'none';
    document.getElementById('selWeek').style.display = (type === 'week') ? 'inline-block' : 'none';
    
    document.getElementById('cardDaily').style.display = (type === 'week') ? 'block' : 'none';
    document.getElementById('cardMonthly').style.display = (type === 'month') ? 'block' : 'none';
    document.getElementById('cardYearly').style.display = (type === 'year') ? 'block' : 'none';
    
    document.getElementById('kpiTotal').textContent = kpiData[type].total;
    document.getElementById('kpiTotal').nextElementSibling.textContent = rt(kpiData[type].titleKey);
    document.getElementById('kpiRoom').textContent = kpiData[type].room;
    document.getElementById('kpiAnc').textContent = kpiData[type].anc;
    document.getElementById('kpiDiff').textContent = kpiData[type].diff;
    document.getElementById('kpiDiff').nextElementSibling.textContent = rt(kpiData[type].labelKey);
    applyReportStaticI18n();
    renderDepts(type);
}

renderBarChart();renderMonthly();renderYoY();renderDepts();renderTrend();
document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});
</script>
