<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>비품 구매 — Hotel PMS</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .expense-page{font-family:var(--font)}
        .expense-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
        .expense-search{display:flex;align-items:center;gap:8px;flex:1;min-width:260px;max-width:520px}
        .expense-search .form-input{height:40px;border-radius:10px;font-size:.82rem;font-weight:750}
        .expense-filterbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
        .expense-period-controls{display:flex;align-items:center;gap:6px;flex-wrap:nowrap}
        .expense-period-controls .form-input{height:40px;border-radius:10px;font-size:.78rem;font-weight:850;min-width:116px}
        .expense-period-controls .expense-date-input{width:132px;min-width:132px}
        .expense-period-separator{color:var(--txt3);font-weight:900}
        .expense-panel{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden}
        .expense-panel .card-header{background:#fff}
        .expense-table-wrap{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch}
        .expense-table{width:100%;min-width:1080px;border-collapse:collapse;white-space:normal}
        .expense-table th{white-space:nowrap;background:#f8fafc}
        .expense-table td{vertical-align:top}
        .expense-table .num{text-align:right;white-space:nowrap;font-weight:900;color:#dc2626}
        .expense-table .muted{display:block;margin-top:3px;font-size:.72rem;color:var(--txt3);font-weight:700;line-height:1.3}
        .expense-note-cell{max-width:230px;white-space:normal;line-height:1.35;color:var(--txt2)}
        .expense-action-cell{display:flex;align-items:center;justify-content:flex-end;gap:6px;white-space:nowrap}
        .expense-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
        .expense-summary-card{min-height:142px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.04);display:flex;flex-direction:column;gap:12px;min-width:0}
        .expense-summary-card.blue{border-color:#bfdbfe;box-shadow:inset 4px 0 0 var(--primary),0 2px 10px rgba(15,23,42,.04)}
        .expense-summary-card.green{border-color:#a7f3d0;box-shadow:inset 4px 0 0 #10b981,0 2px 10px rgba(15,23,42,.04)}
        .expense-summary-card.purple{border-color:#ddd6fe;box-shadow:inset 4px 0 0 #8b5cf6,0 2px 10px rgba(15,23,42,.04)}
        .expense-summary-card.orange{border-color:#fed7aa;box-shadow:inset 4px 0 0 #f59e0b,0 2px 10px rgba(15,23,42,.04)}
        .expense-summary-head{display:flex;align-items:center;gap:10px;min-width:0}
        .expense-summary-icon{width:34px;height:34px;border-radius:11px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 34px;background:var(--primary-lt);color:var(--primary)}
        .expense-summary-card.green .expense-summary-icon{background:#ecfdf5;color:#059669}
        .expense-summary-card.purple .expense-summary-icon{background:#f5f3ff;color:#7c3aed}
        .expense-summary-card.orange .expense-summary-icon{background:#fff7ed;color:#f59e0b}
        .expense-summary-title{min-width:0;color:var(--txt);font-size:.88rem;font-weight:950;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .expense-summary-sub{margin-top:2px;color:var(--txt3);font-size:.68rem;font-weight:850;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .expense-currency-lines{display:grid;gap:7px;min-width:0}
        .expense-currency-line{display:grid;grid-template-columns:24px minmax(42px,auto) minmax(0,1fr);align-items:center;gap:8px;min-height:26px;min-width:0}
        .expense-currency-icon{width:22px;height:22px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-size:.74rem;font-weight:950;line-height:1;background:#f1f5f9;color:var(--txt2)}
        .expense-currency-icon.php{background:#fff7ed;color:#c2410c}
        .expense-currency-icon.usd{background:#ecfdf5;color:#047857}
        .expense-currency-icon.krw{background:#eff6ff;color:#2563eb}
        .expense-currency-icon.vnd{background:#f5f3ff;color:#7c3aed}
        .expense-currency-label{color:var(--txt2);font-size:.76rem;font-weight:950;white-space:nowrap}
        .expense-currency-amount{color:var(--txt);font-size:.94rem;font-weight:950;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .expense-count-block{display:flex;align-items:flex-end;justify-content:space-between;gap:12px;margin-top:auto}
        .expense-count-value{font-size:2rem;font-weight:950;color:var(--txt);line-height:1}
        .expense-count-label{color:var(--txt3);font-size:.76rem;font-weight:900;white-space:nowrap}
        .expense-mobile-list{display:none;padding:12px;gap:10px}
        .expense-mobile-card{border:1px solid var(--border);border-radius:12px;background:#fff;padding:12px;display:grid;gap:10px}
        .expense-mobile-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
        .expense-mobile-title{font-weight:950;color:var(--txt);line-height:1.25}
        .expense-mobile-amount{font-weight:950;color:#dc2626;white-space:nowrap}
        .expense-mobile-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
        .expense-mobile-field{background:#f8fafc;border-radius:9px;padding:8px}
        .expense-mobile-field span{display:block;font-size:.68rem;font-weight:850;color:var(--txt3);margin-bottom:3px}
        .expense-mobile-field strong{font-size:.78rem;color:var(--txt);line-height:1.3}
        .expense-modal-card{max-width:720px;width:95vw}
        .expense-modal-body{padding:18px;display:grid;gap:12px;max-height:72vh;overflow:auto}
        .expense-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        .expense-field{display:grid;gap:6px}
        .expense-field label{font-size:.76rem;font-weight:900;color:var(--txt2)}
        .expense-field input,.expense-field select,.expense-field textarea{width:100%;box-sizing:border-box;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--txt);padding:0 11px;min-height:40px;font-family:var(--font);font-size:.84rem;font-weight:750;outline:none;transition:border-color .15s,box-shadow .15s}
        .expense-field input:focus,.expense-field select:focus,.expense-field textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
        .expense-field textarea{padding:10px 11px;min-height:82px;resize:vertical}
        .expense-currency-suffix{margin-left:4px;color:var(--txt3);font-weight:900}
        .expense-empty{padding:34px 16px;text-align:center;color:var(--txt3);font-weight:800}
        .expense-page .btn-outline,.expense-page .btn-primary-sm,.expense-page .btn-danger-sm,.expense-page .btn-icon-sm,
        #expenseFormModal .btn-outline,#expenseFormModal .btn-primary-sm,#expenseFormModal .btn-danger-sm,#expenseFormModal .btn-icon-sm{height:40px;min-height:40px;border-radius:10px;font-family:var(--font);font-size:.78rem;font-weight:900;text-decoration:none}
        .expense-page .btn-primary-sm,#expenseFormModal .btn-primary-sm{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;background:var(--primary);border:1px solid var(--primary);color:#fff}
        .expense-page .btn-primary-sm:hover,#expenseFormModal .btn-primary-sm:hover{background:var(--primary-dk);border-color:var(--primary-dk)}
        .expense-page .btn-outline,#expenseFormModal .btn-outline{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:0 14px;background:#fff;border:1px solid var(--border);color:var(--txt2)}
        .expense-page .btn-outline:hover,#expenseFormModal .btn-outline:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff}
        .expense-page .btn-icon-sm,#expenseFormModal .btn-icon-sm{width:36px;padding:0}
        .expense-action-cell .btn-icon-sm{display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--border);background:#fff;color:var(--txt2);box-shadow:none}
        .expense-action-cell .btn-icon-sm:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff}
        .expense-action-cell .btn-danger-sm{border-color:var(--border);color:#dc2626;background:#fff}
        .expense-action-cell .btn-danger-sm:hover{border-color:#fecaca;background:#fef2f2;color:#dc2626}
        @media(max-width:900px){
            .expense-summary-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
            .expense-search{max-width:none}
            .expense-row{grid-template-columns:1fr}
            .expense-table-wrap{display:none}
            .expense-mobile-list{display:grid}
            .expense-mobile-grid{grid-template-columns:1fr}
            .expense-toolbar{align-items:stretch}
            .expense-filterbar{width:100%;justify-content:stretch}
            .expense-period-controls{width:100%}
            .expense-period-controls .form-input{flex:1;min-width:0}
            .expense-period-controls .expense-date-input{width:auto;min-width:0}
            .expense-search{width:100%;min-width:0}
            .expense-toolbar>.btn-primary-sm{width:100%}
        }
        @media(max-width:520px){
            .expense-summary-grid{grid-template-columns:1fr}
        }
    </style>
</head>
<body>
<div class="main expense-page">
    <header class="topbar"><h1 data-i18n-key="page.expensePurchases">비품 구매</h1></header>
    <main class="content">
        <section class="expense-summary-grid">
            <div class="expense-summary-card blue">
                <div class="expense-summary-head">
                    <div class="expense-summary-icon"><i class="fa-solid fa-coins"></i></div>
                    <div>
                        <div class="expense-summary-title" data-i18n-key="expense.total">총 지출</div>
                        <div class="expense-summary-sub" data-i18n-key="expense.settlementImpact">정산 반영</div>
                    </div>
                </div>
                <div id="expenseTotal" data-keep-currency></div>
            </div>
            <div class="expense-summary-card green">
                <div class="expense-summary-head">
                    <div class="expense-summary-icon"><i class="fa-solid fa-money-bill-wave"></i></div>
                    <div>
                        <div class="expense-summary-title" data-i18n-key="expense.cash">현금 지출</div>
                        <div class="expense-summary-sub" data-i18n-key="expense.cash">현금 지출</div>
                    </div>
                </div>
                <div id="expenseCash" data-keep-currency></div>
            </div>
            <div class="expense-summary-card purple">
                <div class="expense-summary-head">
                    <div class="expense-summary-icon"><i class="fa-solid fa-calendar-days"></i></div>
                    <div>
                        <div class="expense-summary-title" data-i18n-key="expense.thisMonth">이번 달</div>
                        <div class="expense-summary-sub" data-i18n-key="expense.total">총 지출</div>
                    </div>
                </div>
                <div id="expenseMonth" data-keep-currency></div>
            </div>
            <div class="expense-summary-card orange">
                <div class="expense-summary-head">
                    <div class="expense-summary-icon"><i class="fa-solid fa-receipt"></i></div>
                    <div>
                        <div class="expense-summary-title" data-i18n-key="expense.count">등록 건수</div>
                        <div class="expense-summary-sub" data-i18n-key="expense.listTitle">비품 구매 목록</div>
                    </div>
                </div>
                <div class="expense-count-block">
                    <div class="expense-count-value" id="expenseCount">0</div>
                    <div class="expense-count-label" data-i18n-key="expense.count">등록 건수</div>
                </div>
            </div>
        </section>

        <section class="expense-panel">
            <div class="card-header expense-toolbar">
                <div class="card-title"><i class="fa-solid fa-list-ul"></i><span data-i18n-key="expense.listTitle">비품 구매 목록</span></div>
                <div class="expense-filterbar">
                    <div class="expense-period-controls">
                        <select id="expensePeriodFilter" class="form-input" onchange="handleExpensePeriodChange()"></select>
                        <input id="expenseStartDate" class="form-input expense-date-input" type="date" onchange="renderExpenses()" data-expense-date-sync>
                        <span class="expense-period-separator">~</span>
                        <input id="expenseEndDate" class="form-input expense-date-input" type="date" onchange="renderExpenses()" data-expense-date-sync>
                    </div>
                    <div class="expense-search">
                        <input id="expenseSearch" class="form-input" placeholder="항목, 구매처, 구매자 검색" data-i18n-placeholder="expense.search.placeholder" oninput="renderExpenses()">
                        <button class="btn-primary-sm" onclick="renderExpenses()"><i class="fa-solid fa-magnifying-glass"></i><span data-i18n-key="common.search">검색</span></button>
                    </div>
                    <button class="btn-primary-sm" onclick="openExpenseFormModal()"><i class="fa-solid fa-plus"></i><span data-i18n-key="expense.new">신규 등록</span></button>
                </div>
            </div>
            <div class="expense-table-wrap">
                <table class="expense-table">
                    <thead>
                    <tr>
                        <th data-i18n-key="expense.dateShort">일자</th>
                        <th data-i18n-key="expense.category">구분</th>
                        <th data-i18n-key="expense.item">항목</th>
                        <th data-i18n-key="expense.vendorShort">구매처</th>
                        <th data-i18n-key="expense.buyer">구매자</th>
                        <th data-i18n-key="expense.payment">결제</th>
                        <th data-i18n-key="expense.currency">통화</th>
                        <th class="num" data-i18n-key="expense.amount">금액</th>
                        <th data-i18n-key="expense.note">메모</th>
                        <th style="text-align:right" data-i18n-key="expense.actions">관리</th>
                    </tr>
                    </thead>
                    <tbody id="expenseBody" data-keep-currency></tbody>
                </table>
            </div>
            <div class="expense-mobile-list" id="expenseMobileBody" data-keep-currency></div>
        </section>
    </main>
</div>

<div class="modal-overlay" id="expenseFormModal" onclick="if(event.target===this)closeExpenseFormModal()">
    <div class="modal-card expense-modal-card">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-cart-shopping" style="color:var(--primary)"></i> <span id="expenseModalTitle" data-i18n-key="expense.input">지출 입력</span></h3>
            <button class="modal-close" onclick="closeExpenseFormModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="expense-modal-body">
            <input id="expenseEditId" type="hidden">
            <div class="expense-row">
                <div class="expense-field"><label for="expenseDate" data-i18n-key="expense.date">구매일</label><input id="expenseDate" type="date"></div>
                <div class="expense-field"><label for="expenseBuyer" data-i18n-key="expense.buyer">구매자</label><select id="expenseBuyer"></select></div>
            </div>
            <div class="expense-row">
                <div class="expense-field"><label for="expenseCategory" data-i18n-key="expense.category">구분</label><select id="expenseCategory"></select></div>
                <div class="expense-field"><label for="expenseMethod" data-i18n-key="expense.method">결제수단</label><select id="expenseMethod"></select></div>
            </div>
            <div class="expense-field"><label for="expenseItem" data-i18n-key="expense.item">항목</label><input id="expenseItem" placeholder="예: 차량 주유, 객실 비품, 기사 비용" data-i18n-placeholder="expense.item.placeholder"></div>
            <div class="expense-row">
                <div class="expense-field"><label for="expenseVendor" data-i18n-key="expense.vendor">구매처/대상</label><input id="expenseVendor" placeholder="예: Shell Station" data-i18n-placeholder="expense.vendor.placeholder"></div>
                <div class="expense-row" style="gap:8px">
                    <div class="expense-field">
                        <label for="expenseCurrency" data-i18n-key="expense.currency">통화</label>
                        <select id="expenseCurrency" data-keep-currency onchange="updateExpenseCurrencyLabel()"></select>
                    </div>
                    <div class="expense-field">
                        <label for="expenseAmount"><span data-i18n-key="expense.amount">금액</span><span id="expenseCurrencySuffix" class="expense-currency-suffix" data-keep-currency>(PHP)</span></label>
                        <input id="expenseAmount" type="number" min="0" step="1" placeholder="0">
                    </div>
                </div>
            </div>
            <div class="expense-field"><label for="expenseNote" data-i18n-key="expense.note">메모</label><textarea id="expenseNote" placeholder="영수증 번호, 차량번호, 정산 연결 메모 등" data-i18n-placeholder="expense.note.placeholder"></textarea></div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeExpenseFormModal()" data-i18n-key="expense.close">닫기</button>
            <button class="btn-outline" onclick="resetExpenseForm()" data-i18n-key="expense.reset">초기화</button>
            <button class="btn-primary-sm" onclick="saveExpensePurchase()"><i class="fa-solid fa-check"></i><span data-i18n-key="expense.save">저장</span></button>
        </div>
    </div>
</div>

<script>
const EXPENSE_KEY = 'pms_expense_purchases';
const CASH_SESSION_KEY = 'pms_night_audit_cash_sessions';
const EXPENSE_DEMO_VERSION_KEY = 'pms_expense_purchases_demo_version';
const EXPENSE_DEMO_VERSION = '2026-07-demo-v2';
const DEFAULT_EXPENSE_CURRENCY = 'PHP';
const ALL_EXPENSE_CURRENCIES = ['PHP', 'USD', 'KRW', 'VND'];

function expenseBaseCurrency() {
    const code = String((typeof window.pmsDefaultCurrency === 'function' ? window.pmsDefaultCurrency() : '') || localStorage.getItem('pms_default_currency') || localStorage.getItem('pms_currency') || DEFAULT_EXPENSE_CURRENCY).toUpperCase();
    return ALL_EXPENSE_CURRENCIES.includes(code) ? code : DEFAULT_EXPENSE_CURRENCY;
}

function expenseCurrencies() {
    return expenseBaseCurrency() === 'VND' ? ['VND', 'USD', 'KRW'] : ['PHP', 'USD', 'KRW'];
}

function normalizeExpenseCurrency(currency) {
    const code = String(currency || DEFAULT_EXPENSE_CURRENCY).toUpperCase();
    return (window.PMS_CURRENCY_META?.[code] || ALL_EXPENSE_CURRENCIES.includes(code)) ? code : DEFAULT_EXPENSE_CURRENCY;
}
function money(value, currency = DEFAULT_EXPENSE_CURRENCY) {
    const code = normalizeExpenseCurrency(currency);
    if (typeof window.pmsFormatCurrency === 'function') return window.pmsFormatCurrency(value, { currency: code });
    const meta = window.PMS_CURRENCY_META?.[code] || window.PMS_CURRENCY_META?.PHP || { locale:'en-PH' };
    const amount = Number(value || 0);
    return new Intl.NumberFormat(meta.locale, {
        style:'currency',
        currency: code,
        minimumFractionDigits: Number.isInteger(amount) ? 0 : 2,
        maximumFractionDigits: 2
    }).format(amount);
}
function currencySymbol(currency) {
    const code = normalizeExpenseCurrency(currency);
    return window.PMS_CURRENCY_META?.[code]?.symbol || code;
}
function expenseCurrencyLabel(currency) {
    const code = normalizeExpenseCurrency(currency);
    const labels = expenseLang() === 'en'
        ? { PHP:'Peso', USD:'Dollar', KRW:'Won', VND:'Dong' }
        : { PHP:'페소', USD:'달러', KRW:'원화', VND:'동' };
    return labels[code] || code;
}
function expenseCurrencyIcon(currency) {
    const code = normalizeExpenseCurrency(currency);
    return { PHP:'₱', USD:'$', KRW:'₩', VND:'₫' }[code] || code.slice(0, 1);
}
function moneySummary(rows) {
    const totals = rows.reduce((map, row) => {
        const currency = normalizeExpenseCurrency(row.currency);
        map[currency] = (map[currency] || 0) + Number(row.amount || 0);
        return map;
    }, {});
    const parts = expenseCurrencies()
        .filter(currency => Number(totals[currency] || 0) !== 0)
        .map(currency => money(totals[currency], currency));
    return parts.length ? parts.join(' / ') : money(0, expenseCurrencies()[0] || DEFAULT_EXPENSE_CURRENCY);
}
function moneySummaryHtml(rows) {
    const totals = rows.reduce((map, row) => {
        const currency = normalizeExpenseCurrency(row.currency);
        map[currency] = (map[currency] || 0) + Number(row.amount || 0);
        return map;
    }, {});
    const allowed = expenseCurrencies();
    const currencies = allowed.filter(currency => Number(totals[currency] || 0) !== 0);
    const visibleCurrencies = currencies.length ? currencies : [allowed[0] || DEFAULT_EXPENSE_CURRENCY];
    return `<div class="expense-currency-lines">${visibleCurrencies.map(currency => `
        <div class="expense-currency-line">
            <span class="expense-currency-icon ${currency.toLowerCase()}">${escapeHtml(expenseCurrencyIcon(currency))}</span>
            <span class="expense-currency-label">${escapeHtml(expenseCurrencyLabel(currency))}</span>
            <span class="expense-currency-amount">${money(totals[currency] || 0, currency)}</span>
        </div>
    `).join('')}</div>`;
}
function todayIso() {
    if (window.PmsDate?.todayIso) return window.PmsDate.todayIso();
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
}
function nowIso() {
    return window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString();
}
function operatorName() {
    return localStorage.getItem('pms_current_user_name') || localStorage.getItem('pms_staff_name') || 'Nguyen Kim';
}
function readJson(key, fallback) {

function sortedExpenses() {
    return expenses().sort((a, b) => String(b.date || '').localeCompare(String(a.date || '')) || String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
}
function parseExpenseDate(value) {
    const text = String(value || '').trim();
    if (!/^\d{4}-\d{2}-\d{2}$/.test(text)) return null;
    const date = new Date(`${text}T00:00:00`);
    return Number.isNaN(date.getTime()) ? null : date;
}
function expensePeriodRange() {
    const mode = document.getElementById('expensePeriodFilter')?.value || 'month';
    if (mode === 'all') return { mode, start: null, end: null };
    if (mode === 'custom') {
        return {
            mode,
            start: parseExpenseDate(document.getElementById('expenseStartDate')?.value),
            end: parseExpenseDate(document.getElementById('expenseEndDate')?.value)
        };
    }
    const today = parseExpenseDate(todayIso()) || new Date();
    const start = new Date(today.getFullYear(), today.getMonth(), 1);
    const end = new Date(today.getFullYear(), today.getMonth() + 1, 0);
    return { mode: 'month', start, end };
}
function rowMatchesExpensePeriod(row, range = expensePeriodRange()) {
    const date = parseExpenseDate(row.date);
    if (!date) return false;
    if (range.start && date < range.start) return false;
    if (range.end && date > range.end) return false;
    return true;
}
function periodExpenses() {
    const range = expensePeriodRange();
    return sortedExpenses().filter(row => rowMatchesExpensePeriod(row, range));
}
function filteredExpenses() {
    const q = String(document.getElementById('expenseSearch')?.value || '').toLowerCase();
    return periodExpenses().filter(row => !q || [row.item, row.buyer, row.vendor, row.category, row.method, row.note].join(' ').toLowerCase().includes(q));
}
function registeredExpenseBuyers() {
    const staffRows = readJson('pms_staff', []);
    const current = operatorName();
    const unique = new Map();
    if (Array.isArray(staffRows)) {
        staffRows.forEach(staff => {
            const name = String(staff?.name || '').trim();
            if (!name || staff?.terminationDate) return;
            if (!unique.has(name)) unique.set(name, { name, email: String(staff?.email || '').trim() });
        });
    }
    if (!unique.size && current) unique.set(current, { name: current, email: '' });
    return Array.from(unique.values()).sort((a, b) => {
        if (a.name === current) return -1;
        if (b.name === current) return 1;
        return a.name.localeCompare(b.name);
    });
}

function removeCashWithdrawal(expenseId) {
    if (!expenseId) return;
    const sessions = readJson(CASH_SESSION_KEY, []);
    const list = Array.isArray(sessions) ? sessions : [];
    let changed = false;
    list.forEach(session => {
        const before = Array.isArray(session.withdrawals) ? session.withdrawals : [];
        const after = before.filter(item => item.expenseId !== expenseId);
        if (after.length !== before.length) {
            session.withdrawals = after;
            changed = true;
        }
    });
    if (changed) {
        writeJson(CASH_SESSION_KEY, list);
        window.dispatchEvent(new CustomEvent('pms:cash-sessions-updated'));
    }
}
function syncCashWithdrawal(expense) {
    removeCashWithdrawal(expense.id);
    if (expense.method !== 'cash') return;
    const currency = normalizeExpenseCurrency(expense.currency);
    const breakdown = expenseCurrencies().reduce((map, code) => ({ ...map, [code]: 0 }), {});
    breakdown[currency] = Number(expense.amount || 0);
    const sessions = readJson(CASH_SESSION_KEY, []);
    const list = Array.isArray(sessions) ? sessions : [];
    let session = list.find(item => item.businessDate === expense.date);
    if (!session) {
        session = {
            id: `CASH-${expense.date}`,
            businessDate: expense.date,
            opening: {},
            withdrawals: [],
            createdAt: nowIso(),
            createdBy: operatorName()
        };
        list.push(session);
    }
    session.withdrawals = Array.isArray(session.withdrawals) ? session.withdrawals : [];
    session.withdrawals.push({
        id: `WD-${expense.id}`,
        expenseId: expense.id,
        amount: Number(expense.amount || 0),
        currency,
        breakdown,
        receiver: expense.buyer || operatorName(),
        note: `[비품 구매] ${categoryLabel(expense.category)} - ${expense.item}${expense.vendor ? ` - ${expense.vendor}` : ''}`,
        createdAt: expense.updatedAt || expense.createdAt,
        createdBy: expense.updatedBy || expense.createdBy
    });
    writeJson(CASH_SESSION_KEY, list);
    window.dispatchEvent(new CustomEvent('pms:cash-sessions-updated'));
}

function saveExpensePurchase() {
    const editId = document.getElementById('expenseEditId').value;
    const date = document.getElementById('expenseDate').value || todayIso();
    const buyer = document.getElementById('expenseBuyer').value.trim();
    const item = document.getElementById('expenseItem').value.trim();
    const amount = Number(document.getElementById('expenseAmount').value || 0);
    const currency = normalizeExpenseCurrency(document.getElementById('expenseCurrency').value);
    if (!buyer) return showToast(expenseText('구매자를 선택해 주세요.', 'Please select a buyer.'), 'error');
    if (!item) return showToast(expenseText('항목을 입력해 주세요.', 'Please enter an item.'), 'error');
    if (!amount || amount <= 0) return showToast(expenseText('금액을 입력해 주세요.', 'Please enter an amount.'), 'error');
    const rows = expenses();
    const existingIndex = rows.findIndex(row => row.id === editId);
    const previous = existingIndex >= 0 ? rows[existingIndex] : null;
    const row = {
        ...(previous || {}),
        id: editId || `EXP-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        date,
        buyer,
        category: document.getElementById('expenseCategory').value,
        method: document.getElementById('expenseMethod').value,
        item,
        vendor: document.getElementById('expenseVendor').value.trim(),
        amount,
        settlementAmount: -amount,
        currency,
        settlementCurrency: currency,
        note: document.getElementById('expenseNote').value.trim(),
        createdAt: previous?.createdAt || nowIso(),
        createdBy: previous?.createdBy || operatorName(),
        updatedAt: previous ? nowIso() : undefined,
        updatedBy: previous ? operatorName() : undefined
    };
    if (existingIndex >= 0) rows[existingIndex] = row;
    else rows.unshift(row);
    saveExpenses(rows);
    syncCashWithdrawal(row);
    renderExpenses();
    closeExpenseFormModal();
    showToast(existingIndex >= 0 ? expenseText('비품 구매 내역이 수정되었습니다.', 'Expense purchase has been updated.') : expenseText('비품 구매 지출이 저장되었습니다.', 'Expense purchase has been saved.'), 'success');
}

function bindExpenseActionButtons() {
    document.addEventListener('click', event => {
        const button = event.target.closest('[data-expense-action]');
        if (!button) return;
        event.preventDefault();
        event.stopPropagation();
        const id = button.dataset.expenseId || '';
        if (button.dataset.expenseAction === 'edit') {
            openExpenseFormModal(id);
            return;
        }
        if (button.dataset.expenseAction === 'delete') {
            deleteExpensePurchase(id);
        }
    });
}
function applyExpenseLanguage() {
    updateExpenseDocumentTitle();
    renderExpensePeriodOptions();
    syncExpensePeriodDateInputs();
    renderExpenseSelects();
    const mode = document.getElementById('expenseEditId')?.value ? 'edit' : 'create';
    setExpenseModalMode(mode);
}
window.applyLocalI18n = function applyExpensePurchasesLocalI18n() {
    applyExpenseLanguage();
    renderExpenses();
};
window.addEventListener('languagechange', () => window.applyLocalI18n());
document.addEventListener('DOMContentLoaded', () => {
    bindExpenseActionButtons();
    applyExpenseLanguage();
    resetExpenseForm();
    normalizeDemoExpenseCurrenciesForHotel();
    seedDemoExpensesIfNeeded();
    syncExpensePeriodDateInputs();
    renderExpenses();
    document.getElementById('langSelect')?.addEventListener('change', () => setTimeout(window.applyLocalI18n, 0));
});
</script>
</body>
</html>
