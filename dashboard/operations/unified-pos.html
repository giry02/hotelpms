<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 POS — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Unified POS">통합 POS</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-bell"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiNew">0</div>
                    <div class="kpi-label">New Requests</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-fire-burner"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiPrep">0</div>
                    <div class="kpi-label">Preparing</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiDone">0</div>
                    <div class="kpi-label">Completed</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiRev">$0</div>
                    <div class="kpi-label">Est. Revenue</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div style="display:flex;align-items:center;gap:8px">
                    <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="객실번호 검색..." oninput="renderOrders()">
                    </div>
                </div>
                <div class="filter-divider"></div>
                    <button onclick="renderOrders()" class="btn-primary-sm"
                        style="height:36px;padding:0 16px;border-radius:8px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fa-solid fa-magnifying-glass"></i> 검색
                    </button>
                </div>
                <div class="filter-chips">
                    <button class="chip active" onclick="setFilter(this,'all')">전체 오더</button>
                    <button class="chip" onclick="setFilter(this,'fnb')"><i class="fa-solid fa-utensils" style="color:var(--txt2)"></i> 식음료 (F&B)</button>
                    <button class="chip" onclick="setFilter(this,'golf')"><i class="fa-solid fa-golf-ball-tee" style="color:var(--txt2)"></i> 골프 예약</button>
                    <button class="chip" onclick="setFilter(this,'rentacar')"><i class="fa-solid fa-car" style="color:var(--txt2)"></i> 렌터카</button>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('catalogModal')"><i class="fa-solid fa-list-check"></i> 항목 관리</button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> 수동 오더 등록</button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="card">
            <div class="card-body" style="padding:0">
                <div class="hk-task-list" id="orderList">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let allOrders = [];

const categoryMap = {
    'breakfast': 'fnb',
    'dining': 'fnb',
    'drink': 'fnb',
    'club_a': 'golf',
    'club_b': 'golf',
    'lotte': 'rentacar',
    'sk': 'rentacar'
};

const tMap = {
    'breakfast': { label:'조식', icon:'fa-mug-hot', color:'var(--orange)' },
    'dining': { label:'다이닝/야식', icon:'fa-utensils', color:'var(--purple)' },
    'drink': { label:'주류/음료', icon:'fa-wine-glass', color:'var(--blue)' },
    'club_a': { label:'골프 (A코스)', icon:'fa-golf-ball-tee', color:'var(--success)' },
    'club_b': { label:'골프 (B코스)', icon:'fa-golf-ball-tee', color:'var(--success)' },
    'lotte': { label:'렌터카 (롯데)', icon:'fa-car', color:'var(--danger)' },
    'sk': { label:'렌터카 (SK)', icon:'fa-car', color:'var(--danger)' }
};

let currentFilter = 'all';

function renderOrders() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('orderList');
    
    const filtered = allOrders.filter(o => {
        const cat = categoryMap[o.type] || 'fnb';
        if (currentFilter !== 'all' && cat !== currentFilter) return false;
        if (search && !o.room.toLowerCase().includes(search)) return false;
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">해당하는 오더가 없습니다.</div>';
        return;
    }

    container.innerHTML = filtered.map(o => {
        const info = tMap[o.type] || { label:'기타', icon:'fa-receipt', color:'var(--txt2)' };
        
        let sHtml, actBtn;
        if (o.status === 'new') {
            sHtml = `<span style="color:var(--danger);font-weight:700"><i class="fa-solid fa-circle-exclamation"></i> 신규 접수</span>`;
            actBtn = `<button class="btn-primary-sm" onclick="acceptOrder('${o.id}')"><i class="fa-solid fa-check"></i> 오더 수락</button>`;
        } else if (o.status === 'prep') {
            sHtml = `<span style="color:var(--primary);font-weight:700"><i class="fa-solid fa-fire-burner"></i> Preparing</span>`;
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)" onclick="completeOrder('${o.id}')"><i class="fa-solid fa-check-double"></i> 처리 완료</button>`;
        } else {
            sHtml = `<span style="color:var(--success)"><i class="fa-solid fa-check-circle"></i> Completed</span>`;
            actBtn = `<button class="btn-outline-sm" disabled>Completed됨</button>`;
        }

        const amtHtml = o.total > 0 ? `<span style="font-weight:700;color:var(--txt)">$${o.total.toFixed(2)}</span>` : `<span style="color:var(--txt3)">무료/안내</span>`;

        return `
        <div class="hk-task ${o.status === 'new' ? 'dirty' : (o.status === 'done' ? 'clean' : 'inspect')}">
            <div class="hk-task-left">
                <div class="hk-task-room">${o.room}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <i class="fa-solid ${info.icon}" style="color:${info.color}"></i> ${info.label}
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${o.id}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        ${o.guest ? o.guest + ' - ' : ''}${o.items}
                    </div>
                    <div class="hk-task-meta">
                        ${sHtml}
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> 접수: ${o.time}</span>
                        <span style="color:var(--border)">|</span>
                        <span>청구액: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function updateKPIs() {
    let newReq = 0, prep = 0, done = 0, rev = 0;
    allOrders.forEach(o => {
        if(o.status === 'new') newReq++;
        else if(o.status === 'prep') prep++;
        else if(o.status === 'done') {
            done++;
            rev += o.total;
        }
    });
    
    document.getElementById('kpiNew').textContent = newReq;
    document.getElementById('kpiPrep').textContent = prep;
    document.getElementById('kpiDone').textContent = done;
    document.getElementById('kpiRev').textContent = '$' + rev.toFixed(0);
}

function setFilter(btn, filter) {
    currentFilter = filter;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

function acceptOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'prep'; renderOrders(); updateKPIs(); }
}

function completeOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'done'; renderOrders(); updateKPIs(); }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const [fnb, golf, rentacar] = await Promise.all([
            PmsAPI.getOrders(),
            PmsAPI.getGolfOrders(),
            PmsAPI.getRentacarOrders()
        ]);
        
        allOrders = [...fnb, ...golf, ...rentacar];
        allOrders.sort((a,b) => {
            if(a.status === 'new' && b.status !== 'new') return -1;
            if(b.status === 'new' && a.status !== 'new') return 1;
            return a.time.localeCompare(b.time);
        });
        
        updateKPIs();
        renderOrders();
        setupI18n();
    } catch(e) { console.error(e); }
});
</script>

<!-- Add Order Modal -->
<div class="modal-overlay" id="addOrderModal" onclick="if(event.target===this) closeModal('addOrderModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">통합 수기 오더 등록</h3>
            <button class="modal-close" onclick="closeModal('addOrderModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Room 번호 <span style="color:var(--danger)">*</span></label>
                    <input type="text" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 1401">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">카테고리 분류 <span style="color:var(--danger)">*</span></label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>F&B / 다이닝</option>
                        <option>골프 예약</option>
                        <option>렌터카</option>
                    </select>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">서비스 항목 <span style="color:var(--danger)">*</span></label>
                <div style="display:flex;gap:10px">
                    <select id="itemSelect" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                        <option value="">항목을 선택하세요...</option>
                        <option value="5.00">아메리카노 ($5.00)</option>
                        <option value="15.00">클럽 샌드위치 ($15.00)</option>
                        <option value="150.00">18홀 그린피 ($150.00)</option>
                        <option value="custom">직접 입력</option>
                    </select>
                    <input type="number" id="itemQty" value="1" min="1" style="width:60px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;text-align:center">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">청구 금액 ($) <span style="color:var(--danger)">*</span></label>
                    <input type="number" id="orderPrice" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" value="0.00">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">과금 방식</label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>Folio로 합산 청구 (Post to Room)</option>
                        <option>현장 현금 결제 (Paid in Cash)</option>
                        <option>무료 서비스 (Complimentary)</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('addOrderModal')">Cancel</button>
            <button class="btn-primary-sm" onclick="closeModal('addOrderModal'); showToast('오더가 전송되었습니다.', 'success');"><i class="fa-solid fa-check"></i> 오더 전송</button>
        </div>
    </div>
</div>

<!-- Catalog Management Modal -->
<div class="modal-overlay" id="catalogModal" onclick="if(event.target===this) closeModal('catalogModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">통합 카탈로그 관리</h3>
            <button class="modal-close" onclick="closeModal('catalogModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">호텔 내 모든 F&B 및 부가서비스 항목의 단가를 정의합니다.</p>
            
            <div style="display:flex;gap:10px;margin-bottom:10px;flex-wrap:wrap">
                <select style="flex:1;min-width:100px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                    <option>F&B</option><option>골프</option><option>렌터카</option>
                </select>
                <input type="text" placeholder="새 항목명..." style="flex:2;min-width:150px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font)">
                <input type="number" placeholder="단가 ($)" style="width:80px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px">
                <button class="btn-primary-sm" style="width:auto">추가</button>
            </div>

            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span class="role-badge" style="background:var(--orange-lt);color:var(--orange)">F&B</span> <strong style="margin-left:6px">아메리칸 브렉퍼스트</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$22.50</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span class="role-badge" style="background:var(--success-lt);color:var(--success)">골프</span> <strong style="margin-left:6px">18홀 그린피</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$150.00</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-primary-sm" onclick="closeModal('catalogModal')">확인</button>
        </div>
    </div>
</div>

<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
</body>
</html>
