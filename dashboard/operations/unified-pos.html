<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 포스 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.period-select, .category-select { height: 36px; min-width: 180px; border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--txt); font-family: var(--font); font-size: .78rem; font-weight: 700; padding: 0 34px 0 12px; outline: none; }
.category-select { min-width: 230px; }
.filter-chips .chip { white-space: nowrap; }
.period-select:focus, .category-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.08); }
.pos-category-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: var(--bg); color: var(--txt); border: 1px solid var(--border2); font-size: .76rem; font-weight: 800; white-space: nowrap; }
.pos-completion-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-size: .7rem; font-weight: 800; white-space: nowrap; }
.pos-completion-badge.open { background: var(--warning-lt); color: var(--warning); }
.pos-completion-badge.done { background: var(--success-lt); color: var(--success); }
.pos-status-detail { display: inline-flex; align-items: center; gap: 5px; font-weight: 800; }
.pos-status-detail.new { color: var(--danger); }
.pos-status-detail.prep { color: var(--primary); }
.pos-status-detail.done { color: var(--success); }
.order-summary { padding: 12px 20px; border-bottom: 1px solid var(--border2); color: var(--txt2); font-size: .82rem; font-weight: 600; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.order-summary strong { color: var(--txt); }
.kpi-card, .card { animation: none; opacity: 1; transform: none; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-divider { display: none; }
    .filter-group { width: 100%; }
    .period-select,
    .category-select { width: 100%; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Unified POS">통합 포스</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-bell"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiNew">0</div>
                    <div class="kpi-label" data-ko="신규 접수" data-en="New Orders">신규 접수</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-fire-burner"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiPrep">0</div>
                    <div class="kpi-label" data-ko="처리 중" data-en="In Progress">처리 중</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiDone">0</div>
                    <div class="kpi-label" data-ko="완료" data-en="Completed">완료</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiRev">$0</div>
                    <div class="kpi-label" data-ko="누적 매출" data-en="Total Sales">누적 매출</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" data-pms-no-search-button="true" data-ko="객실번호, 고객명, 오더번호 검색..." data-en="Search room, guest, or order no..." placeholder="객실번호, 고객명, 오더번호 검색..." oninput="renderOrders()" onkeydown="if(event.key==='Enter') renderOrders()">
                    </div>
                    <button onclick="renderOrders()" class="btn-primary-sm"
                        style="height:36px;padding:0 16px;border-radius:8px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fa-solid fa-magnifying-glass"></i> <span data-ko="검색" data-en="Search">검색</span>
                    </button>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <select id="periodFilterSelect" class="period-select" onchange="setPeriodFilter(this.value)">
                        <option value="week" data-ko="최근 7일" data-en="Last 7 days">최근 7일</option>
                        <option value="today" data-ko="오늘" data-en="Today">오늘</option>
                        <option value="month" data-ko="이번 달" data-en="This month">이번 달</option>
                        <option value="all" data-ko="전체 기간" data-en="All dates">전체 기간</option>
                    </select>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <div class="filter-chips" id="statusFilterChips">
                        <button class="chip active" onclick="setStatusFilter(this,'all')"><span data-ko="전체" data-en="All">전체</span> <span class="chip-count" id="statusAllCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'open')"><span data-ko="미완료" data-en="Open">미완료</span> <span class="chip-count" id="statusOpenCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'done')"><span data-ko="완료" data-en="Done">완료</span> <span class="chip-count" id="statusDoneCount">0</span></button>
                    </div>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <select id="categoryFilterSelect" class="category-select" onchange="setCategoryFilter(this.value)">
                        <option value="all" data-ko="전체 카테고리" data-en="All categories">전체 카테고리</option>
                    </select>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('catalogModal')"><i class="fa-solid fa-list-check"></i> <span data-ko="항목 관리" data-en="Item Management">항목 관리</span></button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> <span data-ko="수동 오더 등록" data-en="Manual Order">수동 오더 등록</span></button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="card">
            <div class="card-body" style="padding:0">
                <div class="order-summary" id="orderSummary"></div>
                <div class="hk-task-list" id="orderList">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let allOrders = [];
let inHouseReservations = [];
let folioByReservationId = new Map();

const statusInfo = {
    new: { labelKey:'newStatus', groupKey:'openGroup', cls:'new', icon:'fa-circle-exclamation', taskClass:'dirty' },
    prep: { labelKey:'prepStatus', groupKey:'openGroup', cls:'prep', icon:'fa-fire-burner', taskClass:'inspect' },
    done: { labelKey:'doneStatus', groupKey:'doneGroup', cls:'done', icon:'fa-check-circle', taskClass:'clean' }
};

let currentFilter = 'all';
let currentStatusFilter = 'all';
let currentPeriodFilter = 'week';
const CURRENT_POS_DATE = window.PmsDate?.todayIso ? window.PmsDate.todayIso() : '2026-06-10';
const POS_TEXT = {
    newStatus: { ko: '신규 접수', en: 'New Order' },
    prepStatus: { ko: '처리 중', en: 'In Progress' },
    doneStatus: { ko: '완료', en: 'Completed' },
    openGroup: { ko: '미완료', en: 'Open' },
    doneGroup: { ko: '완료', en: 'Done' },
    otherCost: { ko: '기타 비용', en: 'Other Charges' },
    allCategories: { ko: '전체 카테고리', en: 'All categories' },
    visibleOrders: { ko: '표시 오더', en: 'Visible orders' },
    openOrders: { ko: '미완료', en: 'Open' },
    visibleAmount: { ko: '표시 금액', en: 'Visible amount' },
    countSuffix: { ko: '건', en: '' },
    emptyOrders: { ko: '해당하는 오더가 없습니다.', en: 'No matching orders.' },
    acceptOrder: { ko: '오더 수락', en: 'Accept order' },
    completeOrder: { ko: '처리 완료', en: 'Mark complete' },
    completed: { ko: '완료됨', en: 'Completed' },
    freeInfo: { ko: '무료/안내', en: 'Free / Info' },
    received: { ko: '접수', en: 'Received' },
    billAmount: { ko: '청구액', en: 'Charge' },
    dining: { ko: '식음료', en: 'F&B' },
    roomservice: { ko: '룸서비스', en: 'Room Service' },
    spa: { ko: '스파', en: 'Spa' },
    laundry: { ko: '세탁', en: 'Laundry' },
    retail: { ko: '판매', en: 'Retail' },
    golf: { ko: '골프장', en: 'Golf' },
    rentacar: { ko: '렌터카', en: 'Rent-a-car' }
};

function posLang() {
    return localStorage.getItem('pms_lang') || window.currentLang || 'ko';
}

function posText(key) {
    const item = POS_TEXT[key];
    return item ? (item[posLang() === 'en' ? 'en' : 'ko'] || item.ko) : key;
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function normalizeOrderStatus(status) {
    const value = String(status || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['done', 'complete', 'completed', 'closed', 'paid'].includes(value)) return 'done';
    if (['prep', 'preparing', 'accepted', 'progress', 'processing', 'delivering'].includes(value)) return 'prep';
    return 'new';
}

function normalizeCategoryKey(category) {
    const value = String(category || 'other').trim();
    const compact = value.replace(/[-_\s]/g, '').toLowerCase();
    const aliases = {
        service: 'roomservice',
        roomservice: 'roomservice',
        restaurant: 'dining',
        fnb: 'dining',
        food: 'dining',
        bar: 'drink',
        beverage: 'drink',
        massage: 'spa',
        drycleaning: 'laundry',
        shop: 'retail'
    };
    return aliases[compact] || compact || 'other';
}

function categoryLabelFor(rawCategory, categoryKey, order) {
    return order.categoryLabel
        || order.categoryName
        || String(rawCategory || categoryKey || posText('otherCost'));
}

function categoryDisplayLabel(orderOrLabel, categoryKey) {
    const raw = typeof orderOrLabel === 'object' ? orderOrLabel.categoryLabel : orderOrLabel;
    const key = typeof orderOrLabel === 'object' ? orderOrLabel.categoryKey : categoryKey;
    const compact = String(key || raw || '').replace(/[-_\s]/g, '').toLowerCase();
    const normalized = {
        fnb: 'dining',
        food: 'dining',
        dining: 'dining',
        restaurant: 'dining',
        roomservice: 'roomservice',
        service: 'roomservice',
        spa: 'spa',
        massage: 'spa',
        laundry: 'laundry',
        drycleaning: 'laundry',
        retail: 'retail',
        shop: 'retail',
        golf: 'golf',
        rentacar: 'rentacar'
    }[compact];
    if (normalized && POS_TEXT[normalized]) return posText(normalized);
    if (posLang() === 'en') {
        const byLabel = {
            '식음료': 'F&B',
            '룸서비스': 'Room Service',
            '스파': 'Spa',
            '세탁': 'Laundry',
            '판매': 'Retail',
            '골프장': 'Golf',
            '렌터카': 'Rent-a-car',
            '기타 비용': 'Other Charges'
        };
        return byLabel[String(raw || '').trim()] || String(raw || key || posText('otherCost'));
    }
    return String(raw || key || posText('otherCost'));
}

function normalizeOrder(order) {
    const fullRoom = order.roomId || order.fullRoom || order.room || order.roomNo || '';
    const room = order.roomNo || String(fullRoom).split('-').pop() || fullRoom;
    const items = Array.isArray(order.items) ? order.items.join(', ') : (order.items || order.desc || '');
    const total = typeof order.total === 'object' ? order.total?.amount : order.total;
    const rawCategory = order.category || order.type || 'other';
    const categoryKey = normalizeCategoryKey(rawCategory);
    return {
        ...order,
        room: String(room || ''),
        fullRoom: String(fullRoom || room || ''),
        guest: order.guest || order.guestName || '',
        categoryKey,
        categoryLabel: categoryLabelFor(rawCategory, categoryKey, order),
        items,
        total: Number(total || 0),
        status: normalizeOrderStatus(order.status),
        date: order.date || CURRENT_POS_DATE,
        time: order.time || '--:--'
    };
}

function orderSort(a, b) {
    const priority = { new: 0, prep: 1, done: 2 };
    const statusDiff = (priority[a.status] ?? 3) - (priority[b.status] ?? 3);
    if (statusDiff) return statusDiff;
    return `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`);
}

function formatAmount(amount) {
    const value = Number(amount || 0);
    if (typeof window.pmsFormatCurrency === 'function') {
        return window.pmsFormatCurrency(value);
    }
    return new Intl.NumberFormat('en-PH', {
        style: 'currency',
        currency: 'PHP',
        minimumFractionDigits: Number.isInteger(value) ? 0 : 2,
        maximumFractionDigits: 2
    }).format(value);
}

function formatOrderTime(order) {
    const date = order.date ? order.date.slice(5).replace('-', '.') : '';
    return [date, order.time].filter(Boolean).join(' ');
}

function parseOrderDate(value) {
    if (!value) return null;
    const match = String(value).match(/(\d{4})-(\d{2})-(\d{2})/);
    const date = match ? new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3])) : new Date(String(value));
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function currentPosDate() {
    return parseOrderDate(CURRENT_POS_DATE) || new Date();
}

function periodRange(filter) {
    if (filter === 'all') return null;
    const today = currentPosDate();
    today.setHours(0, 0, 0, 0);
    if (filter === 'today') return { start: today, end: today };
    if (filter === 'month') {
        return {
            start: new Date(today.getFullYear(), today.getMonth(), 1),
            end: new Date(today.getFullYear(), today.getMonth() + 1, 0)
        };
    }
    const start = new Date(today);
    start.setDate(today.getDate() - 6);
    return { start, end: today };
}

function orderMatchesPeriod(order) {
    const range = periodRange(currentPeriodFilter);
    if (!range) return true;
    const date = parseOrderDate(order.date);
    if (!date) return true;
    return date >= range.start && date <= range.end;
}

function orderMatchesSearch(order, query) {
    if (!query) return true;
    const haystack = [
        order.id,
        order.room,
        order.fullRoom,
        order.roomId,
        order.guest,
        order.categoryLabel,
        categoryDisplayLabel(order),
        order.items
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(query);
}

function categoryEntries() {
    const map = new Map();
    allOrders.forEach(order => {
        if (!map.has(order.categoryKey)) {
            map.set(order.categoryKey, { key: order.categoryKey, label: categoryDisplayLabel(order), count: 0 });
        }
        map.get(order.categoryKey).count++;
    });
    return Array.from(map.values()).sort((a, b) => a.label.localeCompare(b.label, posLang() === 'en' ? 'en' : 'ko'));
}

function refreshCategoryControls() {
    const entries = categoryEntries();
    const filterSelect = document.getElementById('categoryFilterSelect');
    if (filterSelect) {
        const selectedExists = currentFilter === 'all' || entries.some(entry => entry.key === currentFilter);
        if (!selectedExists) currentFilter = 'all';
        filterSelect.innerHTML = [
            `<option value="all">${posText('allCategories')} (${allOrders.length})</option>`,
            ...entries.map(entry => `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)} (${entry.count})</option>`)
        ].join('');
        filterSelect.value = currentFilter;
    }

    const orderCategorySelect = document.getElementById('orderCategorySelect');
    if (orderCategorySelect) {
        orderCategorySelect.innerHTML = entries.map(entry => `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)}</option>`).join('');
    }

    const categoryDatalist = document.getElementById('categoryOptions');
    if (categoryDatalist) {
        categoryDatalist.innerHTML = entries.map(entry => `<option value="${escapeHtml(entry.label)}"></option>`).join('');
    }
}

function renderOrders() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const container = document.getElementById('orderList');
    
    const filtered = allOrders.filter(o => {
        if (currentFilter !== 'all' && o.categoryKey !== currentFilter) return false;
        if (currentStatusFilter === 'open' && o.status === 'done') return false;
        if (currentStatusFilter === 'done' && o.status !== 'done') return false;
        if (!orderMatchesPeriod(o)) return false;
        if (!orderMatchesSearch(o, search)) return false;
        return true;
    });

    const summary = document.getElementById('orderSummary');
    if (summary) {
        const openCount = filtered.filter(o => o.status !== 'done').length;
        const totalAmount = filtered.reduce((sum, o) => sum + Number(o.total || 0), 0);
        const suffix = (localStorage.getItem('pms_lang') || window.currentLang || document.documentElement.lang || 'ko') === 'en' ? '' : '건';
        summary.innerHTML = `
            <span>${posText('visibleOrders')} <strong>${filtered.length}</strong>${suffix} / ${posText('openOrders')} <strong>${openCount}</strong>${suffix}</span>
            <span>${posText('visibleAmount')} <strong>${formatAmount(totalAmount)}</strong></span>
        `;
    }

    if (filtered.length === 0) {
        container.innerHTML = `<div style="padding:40px;text-align:center;color:var(--txt3)">${posText('emptyOrders')}</div>`;
        return;
    }

    container.innerHTML = filtered.map(o => {
        const state = statusInfo[o.status] || statusInfo.new;
        
        let actBtn;
        if (o.status === 'new') {
            actBtn = `<button class="btn-primary-sm" onclick="acceptOrder('${o.id}')"><i class="fa-solid fa-check"></i> ${posText('acceptOrder')}</button>`;
        } else if (o.status === 'prep') {
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)" onclick="completeOrder('${o.id}')"><i class="fa-solid fa-check-double"></i> ${posText('completeOrder')}</button>`;
        } else {
            actBtn = `<button class="btn-outline-sm" disabled>${posText('completed')}</button>`;
        }

        const amtHtml = o.total > 0 ? `<span style="font-weight:700;color:var(--txt)">${formatAmount(o.total)}</span>` : `<span style="color:var(--txt3)">${posText('freeInfo')}</span>`;
        const safeId = escapeHtml(o.id);
        const stateLabel = posText(state.labelKey);
        const stateGroup = posText(state.groupKey);

        return `
        <div class="hk-task ${state.taskClass}">
            <div class="hk-task-left">
                <div class="hk-task-room">${escapeHtml(o.room)}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <span class="pos-category-badge">${escapeHtml(categoryDisplayLabel(o))}</span>
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${safeId}</span>
                        <span class="pos-completion-badge ${o.status === 'done' ? 'done' : 'open'}">${stateGroup}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        ${o.guest ? escapeHtml(o.guest) + ' - ' : ''}${escapeHtml(o.items)}
                    </div>
                    <div class="hk-task-meta">
                        <span class="pos-status-detail ${state.cls}"><i class="fa-solid ${state.icon}"></i> ${stateLabel}</span>
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> ${posText('received')}: ${formatOrderTime(o)}</span>
                        <span style="color:var(--border)">|</span>
                        <span>${posText('billAmount')}: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function scopedOrdersForMetrics() {
    return allOrders.filter(o => {
        if (currentFilter !== 'all' && o.categoryKey !== currentFilter) return false;
        return orderMatchesPeriod(o);
    });
}

function updateKPIs() {
    let newReq = 0, prep = 0, done = 0, rev = 0;
    const scopedOrders = scopedOrdersForMetrics();
    scopedOrders.forEach(o => {
        if(o.status === 'new') newReq++;
        else if(o.status === 'prep') prep++;
        else if(o.status === 'done') done++;
        rev += Number(o.total || 0);
    });
    
    document.getElementById('kpiNew').textContent = newReq;
    document.getElementById('kpiPrep').textContent = prep;
    document.getElementById('kpiDone').textContent = done;
    document.getElementById('kpiRev').textContent = formatAmount(rev);

    document.getElementById('statusAllCount').textContent = scopedOrders.length;
    document.getElementById('statusOpenCount').textContent = newReq + prep;
    document.getElementById('statusDoneCount').textContent = done;
}

function setCategoryFilter(filter) {
    currentFilter = filter;
    updateKPIs();
    renderOrders();
}

function setPeriodFilter(filter) {
    currentPeriodFilter = filter;
    updateKPIs();
    renderOrders();
}

function setStatusFilter(btn, filter) {
    currentStatusFilter = filter;
    document.getElementById('statusFilterChips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

function acceptOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'prep'; allOrders.sort(orderSort); updateKPIs(); renderOrders(); }
}

function completeOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'done'; allOrders.sort(orderSort); updateKPIs(); renderOrders(); }
}

window.addEventListener('languagechange', () => {
    refreshCategoryControls();
    updateKPIs();
    renderOrders();
});

function openModal(id) {
    const modal = document.getElementById(id);
    if (modal) modal.classList.add('active');
    if (id === 'addOrderModal') prepareManualOrderForm();
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if (modal) modal.classList.remove('active');
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const [orders, reservationsEnvelope, foliosEnvelope] = await Promise.all([
            PmsAPI.getOrders(),
            window.PmsMockApi?.request('GET', '/reservations').catch(() => null),
            window.PmsMockApi?.request('GET', '/folios').catch(() => null)
        ]);
        allOrders = orders.map(normalizeOrder).sort(orderSort);
        const reservations = window.PmsMockApi?.items ? window.PmsMockApi.items(reservationsEnvelope) : (reservationsEnvelope?.data?.items || []);
        const folios = window.PmsMockApi?.items ? window.PmsMockApi.items(foliosEnvelope) : (foliosEnvelope?.data?.items || []);
        inHouseReservations = (reservations || []).filter(item => {
            const status = String(item.status || '').replace(/[-_\s]/g, '').toLowerCase();
            return ['checkedin', 'inhouse', 'occupied'].includes(status) && (item.guestId || item.guestName || item.guest);
        });
        folioByReservationId = new Map((folios || [])
            .filter(item => item.reservationId)
            .map(item => [String(item.reservationId), item.folioId || item.id]));
        
        refreshCategoryControls();
        updateKPIs();
        renderOrders();
        setupI18n();
        if (typeof changeLang === 'function') changeLang(posLang());
    } catch(e) { console.error(e); }
});

function prepareManualOrderForm() {
    const select = document.getElementById('orderStaySelect');
    if (!select) return;
    const placeholder = posLang() === 'en' ? 'Select an in-house guest...' : '투숙 중인 객실/투숙객을 선택하세요...';
    select.innerHTML = [
        `<option value="">${escapeHtml(placeholder)}</option>`,
        ...inHouseReservations.map(item => {
            const reservationId = item.reservationId || item.id || '';
            const room = item.roomNo || item.room || String(item.roomId || '').split('-').pop();
            const guest = item.guestName || item.guest || '';
            const folioId = item.folioId || folioByReservationId.get(String(reservationId)) || '';
            return `<option value="${escapeHtml(reservationId)}" data-room="${escapeHtml(room)}" data-room-id="${escapeHtml(item.roomId || room)}" data-guest-id="${escapeHtml(item.guestId || '')}" data-guest="${escapeHtml(guest)}" data-folio-id="${escapeHtml(folioId)}">${escapeHtml(room)} · ${escapeHtml(guest)}</option>`;
        })
    ].join('');
    document.getElementById('itemSelect')?.dispatchEvent(new Event('change'));
}

function syncManualOrderPrice() {
    const item = document.getElementById('itemSelect');
    const quantity = Math.max(1, Number(document.getElementById('itemQty')?.value || 1));
    const unitPrice = Number(item?.value || 0);
    if (item?.value !== 'custom') document.getElementById('orderPrice').value = (unitPrice * quantity).toFixed(2);
}

async function submitManualOrder() {
    const stay = document.getElementById('orderStaySelect');
    const selectedStay = stay?.selectedOptions?.[0];
    const item = document.getElementById('itemSelect');
    const selectedItem = item?.selectedOptions?.[0];
    const billingMethod = document.getElementById('orderBillingMethod')?.value || 'folio';
    const amount = Number(document.getElementById('orderPrice')?.value || 0);
    const quantity = Math.max(1, Number(document.getElementById('itemQty')?.value || 1));
    const folioId = selectedStay?.dataset.folioId || '';
    if (!stay?.value) {
        showToast(posLang() === 'en' ? 'Select an in-house guest.' : '투숙 중인 객실과 투숙객을 선택해 주세요.', 'error');
        stay?.focus();
        return;
    }
    if (!item?.value || item.value === 'custom') {
        showToast(posLang() === 'en' ? 'Select a registered service item.' : '등록된 서비스 항목을 선택해 주세요.', 'error');
        item?.focus();
        return;
    }
    if (!Number.isFinite(amount) || amount < 0) {
        showToast(posLang() === 'en' ? 'Enter a valid charge amount.' : '올바른 청구 금액을 입력해 주세요.', 'error');
        document.getElementById('orderPrice')?.focus();
        return;
    }
    if (billingMethod === 'folio' && !folioId) {
        showToast(posLang() === 'en' ? 'No Folio is linked to this reservation.' : '선택한 예약에 연결된 Folio가 없습니다.', 'error');
        return;
    }
    const now = window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString();
    const body = {
        id: `ORD-MANUAL-${Date.now()}`,
        reservationId: stay.value,
        folioId,
        roomId: selectedStay.dataset.roomId || selectedStay.dataset.room || '',
        roomNo: selectedStay.dataset.room || '',
        guestId: selectedStay.dataset.guestId || '',
        guestName: selectedStay.dataset.guest || '',
        category: document.getElementById('orderCategorySelect')?.value || 'other',
        categoryLabel: document.getElementById('orderCategorySelect')?.selectedOptions?.[0]?.textContent || '',
        items: [`${selectedItem.textContent.replace(/\s*\([^)]*\)\s*$/, '').trim()} x${quantity}`],
        quantity,
        total: { amount, currency: localStorage.getItem('pms_default_currency') || 'PHP' },
        billingMethod,
        status: 'new',
        date: now.slice(0, 10),
        time: now.slice(11, 16),
        createdAt: now
    };
    try {
        const response = await window.PmsMockApi.request('POST', '/pos/orders', { body });
        const saved = response?.data?.item || body;
        allOrders.unshift(normalizeOrder(saved));
        allOrders.sort(orderSort);
        updateKPIs();
        renderOrders();
        closeModal('addOrderModal');
        showToast(posLang() === 'en' ? 'The order was saved.' : '오더가 저장되었습니다.', 'success');
    } catch (error) {
        console.error(error);
        showToast(posLang() === 'en' ? 'Failed to save the order.' : '오더 저장에 실패했습니다.', 'error');
    }
}
</script>
