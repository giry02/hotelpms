<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>통합 포스 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.category-select { height: 36px; min-width: 180px; border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--txt); font-family: var(--font); font-size: .78rem; font-weight: 700; padding: 0 34px 0 12px; outline: none; }
.category-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.08); }
.pos-category-badge { display: inline-flex; align-items: center; padding: 3px 8px; border-radius: 999px; background: var(--bg); color: var(--txt); border: 1px solid var(--border2); font-size: .76rem; font-weight: 800; white-space: nowrap; }
.pos-completion-badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 999px; font-size: .7rem; font-weight: 800; white-space: nowrap; }
.pos-completion-badge.open { background: var(--warning-lt); color: var(--warning); }
.pos-completion-badge.done { background: var(--success-lt); color: var(--success); }
.pos-status-detail { display: inline-flex; align-items: center; gap: 5px; font-weight: 800; }
.pos-status-detail.new { color: var(--danger); }
.pos-status-detail.prep { color: var(--primary); }
.pos-status-detail.done { color: var(--success); }
.order-summary { padding: 12px 20px; border-bottom: 1px solid var(--border2); color: var(--txt2); font-size: .82rem; font-weight: 600; display: flex; justify-content: space-between; gap: 12px; flex-wrap: wrap; }
.order-summary strong { color: var(--txt); }
.kpi-card, .card { animation: none; opacity: 1; transform: none; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-divider { display: none; }
    .filter-group { width: 100%; }
    .category-select { width: 100%; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Unified POS">통합 포스</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-bell"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiNew">0</div>
                    <div class="kpi-label">신규 접수</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-fire-burner"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiPrep">0</div>
                    <div class="kpi-label">처리 중</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiDone">0</div>
                    <div class="kpi-label">완료</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiRev">$0</div>
                    <div class="kpi-label">누적 매출</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" data-pms-no-search-button="true" placeholder="객실번호, 고객명, 오더번호 검색..." oninput="renderOrders()" onkeydown="if(event.key==='Enter') renderOrders()">
                    </div>
                    <button onclick="renderOrders()" class="btn-primary-sm"
                        style="height:36px;padding:0 16px;border-radius:8px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fa-solid fa-magnifying-glass"></i> 검색
                    </button>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <div class="filter-chips" id="statusFilterChips">
                        <button class="chip active" onclick="setStatusFilter(this,'all')">전체 <span class="chip-count" id="statusAllCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'open')">미완료 <span class="chip-count" id="statusOpenCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'done')">완료 <span class="chip-count" id="statusDoneCount">0</span></button>
                    </div>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <select id="categoryFilterSelect" class="category-select" onchange="setCategoryFilter(this.value)">
                        <option value="all">전체 카테고리</option>
                    </select>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('catalogModal')"><i class="fa-solid fa-list-check"></i> 항목 관리</button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> 수동 오더 등록</button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="card">
            <div class="card-body" style="padding:0">
                <div class="order-summary" id="orderSummary"></div>
                <div class="hk-task-list" id="orderList">
                    <!-- Generated by JS -->
                </div>
            </div>
        </div>
    </div>
</div>

<script>
let allOrders = [];

const knownCategoryLabels = {
    roomservice: '룸서비스',
    dining: '다이닝',
    breakfast: '조식',
    drink: '음료/바',
    minibar: '미니바',
    spa: '스파/마사지',
    laundry: '세탁',
    retail: '리테일',
    other: '기타 비용'
};

const statusInfo = {
    new: { label:'신규 접수', group:'미완료', cls:'new', icon:'fa-circle-exclamation', taskClass:'dirty' },
    prep: { label:'처리 중', group:'미완료', cls:'prep', icon:'fa-fire-burner', taskClass:'inspect' },
    done: { label:'완료', group:'완료', cls:'done', icon:'fa-check-circle', taskClass:'clean' }
};

let currentFilter = 'all';
let currentStatusFilter = 'all';

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function normalizeOrderStatus(status) {
    const value = String(status || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['done', 'complete', 'completed', 'closed', 'paid'].includes(value)) return 'done';
    if (['prep', 'preparing', 'accepted', 'progress', 'processing', 'delivering'].includes(value)) return 'prep';
    return 'new';
}

function normalizeCategoryKey(category) {
    const value = String(category || 'other').trim();
    const compact = value.replace(/[-_\s]/g, '').toLowerCase();
    const aliases = {
        service: 'roomservice',
        roomservice: 'roomservice',
        restaurant: 'dining',
        fnb: 'dining',
        food: 'dining',
        bar: 'drink',
        beverage: 'drink',
        massage: 'spa',
        drycleaning: 'laundry',
        shop: 'retail'
    };
    return aliases[compact] || compact || 'other';
}

function categoryLabelFor(rawCategory, categoryKey, order) {
    return order.categoryLabel
        || order.categoryName
        || knownCategoryLabels[categoryKey]
        || String(rawCategory || '기타 비용');
}

function normalizeOrder(order) {
    const fullRoom = order.roomId || order.fullRoom || order.room || order.roomNo || '';
    const room = order.roomNo || String(fullRoom).split('-').pop() || fullRoom;
    const items = Array.isArray(order.items) ? order.items.join(', ') : (order.items || order.desc || '');
    const total = typeof order.total === 'object' ? order.total?.amount : order.total;
    const rawCategory = order.category || order.type || 'other';
    const categoryKey = normalizeCategoryKey(rawCategory);
    return {
        ...order,
        room: String(room || ''),
        fullRoom: String(fullRoom || room || ''),
        guest: order.guest || order.guestName || '',
        categoryKey,
        categoryLabel: categoryLabelFor(rawCategory, categoryKey, order),
        items,
        total: Number(total || 0),
        status: normalizeOrderStatus(order.status),
        date: order.date || '2026-06-06',
        time: order.time || '--:--'
    };
}

function orderSort(a, b) {
    const priority = { new: 0, prep: 1, done: 2 };
    const statusDiff = (priority[a.status] ?? 3) - (priority[b.status] ?? 3);
    if (statusDiff) return statusDiff;
    return `${b.date} ${b.time}`.localeCompare(`${a.date} ${a.time}`);
}

function formatAmount(amount) {
    const value = Number(amount || 0);
    return '$' + value.toLocaleString(undefined, {
        minimumFractionDigits: Number.isInteger(value) ? 0 : 2,
        maximumFractionDigits: 2
    });
}

function formatOrderTime(order) {
    const date = order.date ? order.date.slice(5).replace('-', '.') : '';
    return [date, order.time].filter(Boolean).join(' ');
}

function orderMatchesSearch(order, query) {
    if (!query) return true;
    const haystack = [
        order.id,
        order.room,
        order.fullRoom,
        order.roomId,
        order.guest,
        order.categoryLabel,
        order.items
    ].filter(Boolean).join(' ').toLowerCase();
    return haystack.includes(query);
}

function categoryEntries() {
    const map = new Map();
    allOrders.forEach(order => {
        if (!map.has(order.categoryKey)) {
            map.set(order.categoryKey, { key: order.categoryKey, label: order.categoryLabel, count: 0 });
        }
        map.get(order.categoryKey).count++;
    });
    return Array.from(map.values()).sort((a, b) => a.label.localeCompare(b.label, 'ko'));
}

function refreshCategoryControls() {
    const entries = categoryEntries();
    const filterSelect = document.getElementById('categoryFilterSelect');
    if (filterSelect) {
        const selectedExists = currentFilter === 'all' || entries.some(entry => entry.key === currentFilter);
        if (!selectedExists) currentFilter = 'all';
        filterSelect.innerHTML = [
            `<option value="all">전체 카테고리 (${allOrders.length})</option>`,
            ...entries.map(entry => `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)} (${entry.count})</option>`)
        ].join('');
        filterSelect.value = currentFilter;
    }

    const orderCategorySelect = document.getElementById('orderCategorySelect');
    if (orderCategorySelect) {
        orderCategorySelect.innerHTML = entries.map(entry => `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)}</option>`).join('');
    }

    const categoryDatalist = document.getElementById('categoryOptions');
    if (categoryDatalist) {
        categoryDatalist.innerHTML = entries.map(entry => `<option value="${escapeHtml(entry.label)}"></option>`).join('');
    }
}

function renderOrders() {
    const search = document.getElementById('searchInput').value.trim().toLowerCase();
    const container = document.getElementById('orderList');
    
    const filtered = allOrders.filter(o => {
        if (currentFilter !== 'all' && o.categoryKey !== currentFilter) return false;
        if (currentStatusFilter === 'open' && o.status === 'done') return false;
        if (currentStatusFilter === 'done' && o.status !== 'done') return false;
        if (!orderMatchesSearch(o, search)) return false;
        return true;
    });

    const summary = document.getElementById('orderSummary');
    if (summary) {
        const openCount = filtered.filter(o => o.status !== 'done').length;
        const totalAmount = filtered.reduce((sum, o) => sum + Number(o.total || 0), 0);
        summary.innerHTML = `
            <span>표시 오더 <strong>${filtered.length}</strong>건 / 미완료 <strong>${openCount}</strong>건</span>
            <span>표시 금액 <strong>${formatAmount(totalAmount)}</strong></span>
        `;
    }

    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">해당하는 오더가 없습니다.</div>';
        return;
    }

    container.innerHTML = filtered.map(o => {
        const state = statusInfo[o.status] || statusInfo.new;
        
        let actBtn;
        if (o.status === 'new') {
            actBtn = `<button class="btn-primary-sm" onclick="acceptOrder('${o.id}')"><i class="fa-solid fa-check"></i> 오더 수락</button>`;
        } else if (o.status === 'prep') {
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)" onclick="completeOrder('${o.id}')"><i class="fa-solid fa-check-double"></i> 처리 완료</button>`;
        } else {
            actBtn = `<button class="btn-outline-sm" disabled>완료됨</button>`;
        }

        const amtHtml = o.total > 0 ? `<span style="font-weight:700;color:var(--txt)">${formatAmount(o.total)}</span>` : `<span style="color:var(--txt3)">무료/안내</span>`;
        const safeId = escapeHtml(o.id);

        return `
        <div class="hk-task ${state.taskClass}">
            <div class="hk-task-left">
                <div class="hk-task-room">${escapeHtml(o.room)}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <span class="pos-category-badge">${escapeHtml(o.categoryLabel)}</span>
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${safeId}</span>
                        <span class="pos-completion-badge ${o.status === 'done' ? 'done' : 'open'}">${state.group}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        ${o.guest ? escapeHtml(o.guest) + ' - ' : ''}${escapeHtml(o.items)}
                    </div>
                    <div class="hk-task-meta">
                        <span class="pos-status-detail ${state.cls}"><i class="fa-solid ${state.icon}"></i> ${state.label}</span>
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> 접수: ${formatOrderTime(o)}</span>
                        <span style="color:var(--border)">|</span>
                        <span>청구액: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function updateKPIs() {
    let newReq = 0, prep = 0, done = 0, rev = 0;
    allOrders.forEach(o => {
        if(o.status === 'new') newReq++;
        else if(o.status === 'prep') prep++;
        else if(o.status === 'done') done++;
        rev += Number(o.total || 0);
    });
    
    document.getElementById('kpiNew').textContent = newReq;
    document.getElementById('kpiPrep').textContent = prep;
    document.getElementById('kpiDone').textContent = done;
    document.getElementById('kpiRev').textContent = formatAmount(rev);

    document.getElementById('statusAllCount').textContent = allOrders.length;
    document.getElementById('statusOpenCount').textContent = newReq + prep;
    document.getElementById('statusDoneCount').textContent = done;
}

function setCategoryFilter(filter) {
    currentFilter = filter;
    renderOrders();
}

function setStatusFilter(btn, filter) {
    currentStatusFilter = filter;
    document.getElementById('statusFilterChips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

function acceptOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'prep'; allOrders.sort(orderSort); updateKPIs(); renderOrders(); }
}

function completeOrder(id) {
    const o = allOrders.find(x => x.id === id);
    if(o) { o.status = 'done'; allOrders.sort(orderSort); updateKPIs(); renderOrders(); }
}

function openModal(id) {
    const modal = document.getElementById(id);
    if (modal) modal.classList.add('active');
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if (modal) modal.classList.remove('active');
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        const orders = await PmsAPI.getOrders();
        allOrders = orders.map(normalizeOrder).sort(orderSort);
        
        refreshCategoryControls();
        updateKPIs();
        renderOrders();
        setupI18n();
    } catch(e) { console.error(e); }
});
</script>

<!-- Add Order Modal -->
<div class="modal-overlay" id="addOrderModal" onclick="if(event.target===this) closeModal('addOrderModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">통합 수기 오더 등록</h3>
            <button class="modal-close" onclick="closeModal('addOrderModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">객실 번호 <span style="color:var(--danger)">*</span></label>
                    <input type="text" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 1401">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">카테고리 분류 <span style="color:var(--danger)">*</span></label>
                    <select id="orderCategorySelect" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff"></select>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">서비스 항목 <span style="color:var(--danger)">*</span></label>
                <div style="display:flex;gap:10px">
                    <select id="itemSelect" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                        <option value="">항목을 선택하세요...</option>
                        <option value="25.00">클럽 샌드위치 ($25.00)</option>
                        <option value="15.00">아메리카노 ($15.00)</option>
                        <option value="8.00">에비앙 생수 (미니바) ($8.00)</option>
                        <option value="150.00">아로마 스파 60분 ($150.00)</option>
                        <option value="15.00">드라이클리닝 (셔츠) ($15.00)</option>
                        <option value="custom">직접 입력</option>
                    </select>
                    <input type="number" id="itemQty" value="1" min="1" style="width:60px;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;text-align:center">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">청구 금액 ($) <span style="color:var(--danger)">*</span></label>
                    <input type="number" id="orderPrice" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" value="0.00">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">과금 방식</label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>객실 정산으로 합산 청구</option>
                        <option>현장 현금 결제</option>

                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$22.50</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <span class="role-badge" style="background:var(--success-lt);color:var(--success)">스파</span> <strong style="margin-left:6px">아로마 테라피 60분</strong>
                </div>
                <div style="display:flex;align-items:center;gap:10px">
                    <span style="font-weight:700;font-size:0.9rem">$150.00</span>
                    <button class="btn-icon-sm" style="height:28px;width:28px;color:var(--danger);font-size:0.75rem"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">

<script>

(function(){
