<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정산 현황 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .settlement-page{font-family:var(--font)}
        .settlement-intro{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:16px;padding:18px 20px;border:1px solid var(--border);border-radius:14px;background:#fff;box-shadow:0 2px 10px rgba(15,23,42,.03)}
        .settlement-intro > div:first-child{flex:1;min-width:0}
        .settlement-intro h2{display:flex;align-items:center;gap:9px;margin:0 0 6px;font-size:1.05rem;color:var(--txt)}
        .settlement-intro p{margin:0;color:var(--txt2);font-size:.82rem;font-weight:750;line-height:1.55}
        .settlement-intro-actions{display:flex;align-items:center;gap:10px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end}
        .settlement-intro-actions .btn-outline-sm{height:42px;min-width:108px;padding:0 15px;border-radius:10px;font-size:.83rem;font-weight:850;color:var(--txt);background:#fff;box-shadow:0 1px 2px rgba(15,23,42,.04)}
        .settlement-intro-actions .btn-outline-sm i{font-size:.9rem;color:#475569}
        .settlement-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
        .settlement-kpi{display:flex;align-items:center;gap:13px;min-width:0;padding:16px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.03)}
        .settlement-kpi-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
        .settlement-kpi-icon.need{background:#eff6ff;color:#2563eb}
        .settlement-kpi-icon.unpaid{background:#fff1f2;color:#dc2626}
        .settlement-kpi-icon.deposit{background:#ecfdf5;color:#059669}
        .settlement-kpi-icon.group{background:#f5f3ff;color:#7c3aed}
        .settlement-kpi-value{font-size:1.35rem;font-weight:950;color:var(--txt);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-kpi-label{font-size:.75rem;font-weight:850;color:var(--txt3);margin-top:3px}
        .settlement-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:14px}
        .settlement-toolbar-left,.settlement-toolbar-right{display:flex;align-items:center;gap:8px;min-width:0}
        .settlement-toolbar-left{flex:1;flex-wrap:wrap;overflow:visible;padding-bottom:1px}
        .settlement-search{box-sizing:border-box;display:flex;align-items:center;gap:8px;width:auto;max-width:320px;min-width:220px;flex:1 1 280px;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
        .settlement-search:focus-within{border-color:var(--primary)}
        .settlement-search input{border:0;outline:0;background:transparent;font-family:var(--font);font-size:.8rem;font-weight:750;width:100%;min-width:0;color:var(--txt)}
        .settlement-toolbar-left .pms-search-button{flex:0 0 auto}
        .settlement-chip{height:34px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.74rem;font-weight:900;white-space:nowrap;cursor:pointer}
        .settlement-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .settlement-sort{height:38px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.78rem;font-weight:850;padding:0 32px 0 11px}
        .settlement-section{margin-bottom:22px}
        .settlement-section-head{display:flex;align-items:center;gap:9px;margin:0 0 10px;color:var(--txt);font-size:1rem;font-weight:900}
        .settlement-section-head span{font-size:.78rem;font-weight:750;color:var(--txt3)}
        .settlement-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
        .settlement-card{display:flex;flex-direction:column;gap:10px;min-width:0;min-height:246px;padding:15px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.unpaid{border-color:#fecdd3;box-shadow:inset 4px 0 0 #ef4444,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.ready{border-color:#bfdbfe;box-shadow:inset 4px 0 0 #3b82f6,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.paid{border-color:#bbf7d0;box-shadow:inset 4px 0 0 #10b981,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.refund{border-color:#fed7aa;box-shadow:inset 4px 0 0 #f97316,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
        .settlement-room{min-width:0}
        .settlement-room strong{display:block;color:var(--txt);font-size:1.15rem;font-weight:950;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-room span{display:block;color:var(--txt3);font-size:.7rem;font-weight:850;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-status{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:.67rem;font-weight:950;white-space:nowrap}
        .settlement-status.unpaid{background:#fff1f2;color:#be123c}
        .settlement-status.ready{background:#eff6ff;color:#1d4ed8}
        .settlement-status.paid{background:#dcfce7;color:#047857}
        .settlement-status.refund{background:#fff7ed;color:#c2410c}
        .settlement-guest{display:grid;gap:5px;min-width:0}
        .settlement-guest b{display:flex;align-items:center;gap:6px;min-width:0;font-size:.88rem;color:var(--txt);font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-guest span{display:flex;align-items:center;gap:6px;min-width:0;font-size:.72rem;color:var(--txt3);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-amounts{display:grid;gap:6px;margin-top:2px}
        .settlement-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 9px;border:1px solid var(--border2);border-radius:9px;background:#f8fafc;font-size:.74rem;font-weight:850;color:var(--txt2)}
        .settlement-row strong{font-size:.8rem;color:var(--txt);white-space:nowrap}
        .settlement-row.balance strong{color:#be123c}
        .settlement-row.deposit strong{color:#047857}
        .settlement-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:1px}
        .settlement-tag{display:inline-flex;align-items:center;gap:4px;max-width:100%;padding:3px 7px;border:1px solid var(--border2);border-radius:999px;background:#fff;font-size:.64rem;font-weight:900;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-actions{display:flex;gap:7px;margin-top:auto}
        .settlement-actions button{height:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0;border-radius:9px;font-family:var(--font);font-size:.73rem;font-weight:950;text-decoration:none;white-space:nowrap;cursor:pointer}
        .settlement-actions .primary{background:var(--primary);color:#fff}
        .settlement-actions .outline{border:1px solid var(--border);background:#fff;color:var(--txt2)}
        .settlement-legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:-4px 0 16px;padding:10px 14px;border:1px solid var(--border);border-radius:12px;background:#fff;color:var(--txt2);font-size:.72rem;font-weight:850}
        .legend-item{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
        .legend-dot{width:9px;height:9px;border-radius:999px;display:inline-block}
        .legend-dot.today{background:#3b82f6}
        .legend-dot.due{background:#f97316}
        .legend-dot.unpaid{background:#ef4444}
        .legend-dot.done{background:#10b981}
        .legend-dot.refund{background:#8b5cf6}
        .settlement-modal-card{max-width:860px;width:95vw}
        .settlement-modal-body{padding:20px;display:grid;gap:16px;background:#fff}
        .settlement-detail-summary{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
        .settlement-detail-card{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px;min-width:0}
        .settlement-detail-card span{display:flex;align-items:center;gap:6px;color:var(--txt3);font-size:.72rem;font-weight:900;margin-bottom:6px;white-space:nowrap}
        .settlement-detail-card strong{display:block;color:var(--txt);font-size:1rem;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-detail-card.danger strong{color:var(--danger)}
        .settlement-detail-card.warning strong{color:#b45309}
        .settlement-detail-section{border:1px solid var(--border2);border-radius:12px;background:#fff;overflow:visible}
        .settlement-detail-section-head{padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--border2);font-size:.86rem;font-weight:950;color:var(--txt);display:flex;align-items:center;gap:8px}
        .settlement-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;overflow:visible}
        .settlement-detail-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:10px;align-items:center;min-height:42px;padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.78rem;line-height:1.45;box-sizing:border-box}
        .settlement-detail-row span{color:var(--txt3);font-weight:900}
        .settlement-detail-row strong{color:var(--txt);font-weight:850;overflow-wrap:anywhere}
        .settlement-line-list,.settlement-history-list{display:grid;gap:8px;padding:12px}
        .settlement-line-item{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px}
        .settlement-line-main{display:flex;align-items:center;gap:8px;min-width:0;color:var(--txt2);font-size:.78rem;font-weight:900}
        .settlement-line-main i{color:var(--primary);width:16px;text-align:center}
        .settlement-line-amount{font-size:.82rem;font-weight:950;color:var(--txt);white-space:nowrap}
        .settlement-history-list{max-height:220px;overflow:auto}
        .settlement-history-item{display:grid;grid-template-columns:112px minmax(0,1fr) auto;gap:10px;align-items:start;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px;font-size:.76rem}
        .settlement-history-time{color:var(--txt3);font-weight:900;line-height:1.35}
        .settlement-history-main{min-width:0;color:var(--txt);font-weight:850;line-height:1.45}
        .settlement-history-main span{display:block;color:var(--txt3);font-size:.7rem;font-weight:800;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .settlement-history-amount{text-align:right;color:var(--primary);font-weight:950;white-space:nowrap}
        .settlement-history-empty{padding:18px;text-align:center;color:var(--txt3);font-size:.78rem;font-weight:850;border:1px dashed var(--border);border-radius:9px;background:#fbfdff}
        .settlement-detail-footer{padding:16px 20px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
        .settlement-detail-footer-left,.settlement-detail-footer-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .btn-settlement-complete{border:1px solid #059669;background:#059669;color:#fff;border-radius:6px;font-family:var(--font);font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;transition:all .15s}
        .btn-settlement-complete:hover{filter:brightness(.96)}
        .btn-settlement-complete:disabled{opacity:.5;cursor:not-allowed;filter:grayscale(.1)}
        .settlement-payment-grid{display:grid;grid-template-columns:1fr 150px;gap:12px}
        .settlement-payment-field{display:flex;flex-direction:column;gap:6px}
        .settlement-payment-field label{font-size:.76rem;font-weight:900;color:var(--txt2)}
        .settlement-payment-field input,.settlement-payment-field select{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-family:var(--font);font-size:.82rem;font-weight:750;color:var(--txt);background:#fff}
        .settlement-empty{padding:32px;border:1px dashed var(--border);border-radius:14px;background:#fff;text-align:center;color:var(--txt3);font-weight:850}
        @media(max-width:900px){
            .settlement-intro{flex-direction:column}
            .settlement-intro-actions{justify-content:flex-start}
            .settlement-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}
            .settlement-toolbar{align-items:stretch;flex-direction:column}
            .settlement-search{width:auto;max-width:none;flex:1 1 260px}
            .settlement-toolbar-right{justify-content:space-between}
            .settlement-sort{flex:1}
            .settlement-detail-summary,.settlement-detail-grid{grid-template-columns:1fr}
            .settlement-history-item{grid-template-columns:1fr}
            .settlement-history-amount{text-align:left}
            .settlement-detail-footer{align-items:stretch;flex-direction:column}
            .settlement-detail-footer-left,.settlement-detail-footer-right{width:100%}
            .settlement-detail-footer-left button,.settlement-detail-footer-right button{flex:1;justify-content:center}
            .settlement-payment-grid{grid-template-columns:1fr}
        }
        @media(max-width:560px){
            .settlement-kpis{grid-template-columns:1fr}
            .settlement-grid{grid-template-columns:1fr}
            .settlement-search{min-width:calc(100% - 80px);flex:1 1 calc(100% - 80px)}
            .settlement-toolbar-left .pms-search-button{min-width:72px;padding:0 12px}
        }
    </style>
</head>
<body>
<div class="main settlement-page">
    <header class="topbar"><h1>정산 현황</h1></header>
    <div class="content">
        <section class="settlement-intro">
            <div>
                <h2><i class="fa-solid fa-list-check"></i> 오늘 처리할 정산 큐</h2>
                <p>정산 현황은 오늘 확인하거나 처리할 수 있는 정산 대상만 모아 보여줍니다. 전체 과거 내역과 상세 수납/영수증 처리는 정산 목록에서 이어서 처리합니다.</p>
            </div>
            <div class="settlement-intro-actions">
                <a class="btn-outline-sm" href="folio.html"><i class="fa-solid fa-table-list"></i> 정산 목록</a>
                <a class="btn-outline-sm" href="night-audit.html"><i class="fa-solid fa-moon"></i> 일일 마감</a>
            </div>
        </section>

        <section class="settlement-kpis" aria-label="정산 현황 요약">
            <div class="settlement-kpi"><div class="settlement-kpi-icon need"><i class="fa-solid fa-right-from-bracket"></i></div><div><div class="settlement-kpi-value" id="kpiNeed">0</div><div class="settlement-kpi-label">금일 체크아웃</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon unpaid"><i class="fa-solid fa-circle-exclamation"></i></div><div><div class="settlement-kpi-value" id="kpiBalance">₱0</div><div class="settlement-kpi-label">미수금 합계</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon deposit"><i class="fa-solid fa-wallet"></i></div><div><div class="settlement-kpi-value" id="kpiDeposit">₱0</div><div class="settlement-kpi-label">예치금 보유</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon group"><i class="fa-solid fa-users-line"></i></div><div><div class="settlement-kpi-value" id="kpiGroup">0</div><div class="settlement-kpi-label">단체 정산</div></div></div>
        </section>

        <section class="settlement-toolbar" aria-label="정산 현황 필터">
            <div class="settlement-toolbar-left">
                <label class="settlement-search">
                    <i class="fa-solid fa-search"></i>
                    <input id="settlementSearch" type="search" placeholder="호실, 고객, 단체, 정산번호 검색">
                </label>
                <button class="settlement-chip active" data-filter="today"><i class="fa-solid fa-right-from-bracket"></i> 금일 체크아웃</button>
                <button class="settlement-chip" data-filter="unpaid"><i class="fa-solid fa-circle-exclamation"></i> 미수금</button>
                <button class="settlement-chip" data-filter="ready"><i class="fa-solid fa-clipboard-check"></i> 정산 필요</button>
                <button class="settlement-chip" data-filter="deposit"><i class="fa-solid fa-wallet"></i> 예치금</button>
                <button class="settlement-chip" data-filter="group"><i class="fa-solid fa-users"></i> 단체</button>
                <button class="settlement-chip" data-filter="refund"><i class="fa-solid fa-rotate-left"></i> 환불</button>
                <button class="settlement-chip" data-filter="all"><i class="fa-solid fa-list"></i> 전체</button>
            </div>
            <div class="settlement-toolbar-right">
                <select class="settlement-sort" id="settlementSort" aria-label="정산 현황 정렬">
                    <option value="room">호실순</option>
                    <option value="checkout">체크아웃 기준</option>
                    <option value="balance">미수금 큰순</option>
                    <option value="status">상태순</option>
                </select>
            </div>
        </section>

        <section class="settlement-legend" aria-label="정산현황 색상 안내">
            <span class="legend-item"><span class="legend-dot today"></span>금일 체크아웃</span>
            <span class="legend-item"><span class="legend-dot due"></span>수납/정산 필요</span>
            <span class="legend-item"><span class="legend-dot unpaid"></span>미수금</span>
            <span class="legend-item"><span class="legend-dot done"></span>정산/체크아웃 완료</span>
            <span class="legend-item"><span class="legend-dot refund"></span>환불 확인</span>
        </section>

        <div id="settlementSections"></div>
    </div>
</div>

<div class="modal-overlay" id="settlementStatusDetailModal" onclick="if(event.target===this) closeModal('settlementStatusDetailModal')">
    <div class="modal-card settlement-modal-card">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-list-check" style="color:var(--primary)"></i> 정산 상세</h3>
            <button class="modal-close" onclick="closeModal('settlementStatusDetailModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body settlement-modal-body" id="settlementStatusDetailContent"></div>
        <div class="modal-footer settlement-detail-footer" id="settlementStatusDetailFooter"></div>
    </div>
</div>

<div class="modal-overlay" id="settlementStatusPaymentModal" onclick="if(event.target===this) closeModal('settlementStatusPaymentModal')">
    <div class="modal-card" style="max-width:520px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-credit-card" style="color:var(--primary)"></i> 수납 등록</h3>
            <button class="modal-close" onclick="closeModal('settlementStatusPaymentModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:14px">
            <div class="settlement-payment-grid">
                <div class="settlement-payment-field">
                    <label for="settlementStatusPaymentAmount">수납 금액</label>
                    <input id="settlementStatusPaymentAmount" type="number" min="0" step="0.01">
                </div>
                <div class="settlement-payment-field">
                    <label for="settlementStatusPaymentMethod">수납 방식</label>
                    <select id="settlementStatusPaymentMethod">
                        <option value="cash">현금</option>
                        <option value="card">카드</option>
                        <option value="transfer">계좌이체</option>
                        <option value="deposit">예치금 차감</option>
                    </select>
                </div>
            </div>
            <div class="settlement-payment-field">
                <label for="settlementStatusPaymentNote">메모</label>
                <input id="settlementStatusPaymentNote" type="text" placeholder="수납 메모">
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('settlementStatusPaymentModal')">닫기</button>
            <button class="btn-primary-sm" onclick="processSettlementStatusPayment()"><i class="fa-solid fa-circle-check"></i> 수납 등록</button>
        </div>
    </div>
</div>

<script>
const settlementState = {
    folios: [],
    reservations: [],
    rooms: [],
    groups: [],
    filter: 'today',
    sort: 'room',
    query: '',
    currentFolioId: ''
};

const SETTLEMENT_PAYMENTS_KEY = 'pms_settlement_payments';
const SETTLEMENT_COMPLETIONS_KEY = 'pms_settlement_completions';

function settlementEscape(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function settlementAmount(value) {
    if (window.PmsMockApi?.amountValue) return Number(window.PmsMockApi.amountValue(value) || 0);
    if (value && typeof value === 'object') return Number(value.amount || 0);
    return Number(value || 0);
}

function settlementMoney(value) {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(Number(value || 0));
}

function settlementStorageJson(key, fallback) {
    try {
        const parsed = JSON.parse(localStorage.getItem(key) || '');
        return parsed ?? fallback;
    } catch(e) {
        return fallback;
    }
}

function settlementSetStorageJson(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
}

function settlementPaymentRecords() {
    const records = settlementStorageJson(SETTLEMENT_PAYMENTS_KEY, []);
    return Array.isArray(records) ? records : [];
}

function settlementCompletionRecords() {
    const records = settlementStorageJson(SETTLEMENT_COMPLETIONS_KEY, []);
    return Array.isArray(records) ? records : [];
}

function settlementCurrentOperator() {
    return localStorage.getItem('pms_current_user_name') || localStorage.getItem('pms_staff_name') || 'Nguyen Kim';
}

function settlementNowIso() {
    return window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString();
}

function settlementFormatDateTime(value) {
    const date = value ? new Date(value) : new Date();
    if (Number.isNaN(date.getTime())) return '-';
    return new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    }).format(date);
}

function openModal(id) {
    document.getElementById(id)?.classList.add('active');
}

function closeModal(id) {
    document.getElementById(id)?.classList.remove('active');
}

function settlementIso(value) {
    const text = String(value || '').trim();
    if (!text) return '';
    if (/^\d{4}-\d{2}-\d{2}/.test(text)) return text.slice(0, 10);
    const monthDay = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (monthDay) {
        const year = settlementTodayIso().slice(0, 4);
        return `${year}-${String(monthDay[1]).padStart(2, '0')}-${String(monthDay[2]).padStart(2, '0')}`;
    }
    return '';
}

function settlementTodayIso() {
    if (window.PmsDate?.todayIso) return window.PmsDate.todayIso();
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
}

function settlementRoomNo(value) {
    if (!value) return '';
    return window.PmsMockApi?.roomNoFromId ? window.PmsMockApi.roomNoFromId(value) : String(value).split('-').pop();
}

function settlementDateValue(isoDate) {
    const iso = settlementIso(isoDate);
    if (!iso) return NaN;
    const [year, month, day] = iso.split('-').map(Number);
    return Date.UTC(year, month - 1, day);
}

function settlementDateShort(isoDate) {
    const iso = settlementIso(isoDate);
    if (!iso) return '';
    const [, month, day] = iso.split('-');
    return `${Number(month)}/${Number(day)}`;
}

function settlementAddDays(isoDate, days) {
    const iso = settlementIso(isoDate);
    if (!iso) return '';
    const [year, month, day] = iso.split('-').map(Number);
    const date = new Date(Date.UTC(year, month - 1, day + Number(days || 0)));
    return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}-${String(date.getUTCDate()).padStart(2, '0')}`;
}

function settlementMinDate(values) {
    return values.map(settlementIso).filter(Boolean).sort()[0] || '';
}

function settlementMaxDate(values) {
    return values.map(settlementIso).filter(Boolean).sort().slice(-1)[0] || '';
}

function settlementStaySummary(startDate, endDate, fallbackNights = 0, estimateEndDate = '') {
    let start = settlementIso(startDate);
    let end = settlementIso(endDate);
    const estimatedEnd = settlementIso(estimateEndDate);
    let nights = Number(fallbackNights || 0);
    if (!end && estimatedEnd && nights) end = estimatedEnd;
    if (!start && end && nights) start = settlementAddDays(end, -nights);
    if (start && !end && nights) end = settlementAddDays(start, nights);
    if (start && end) {
        const diff = Math.round((settlementDateValue(end) - settlementDateValue(start)) / 86400000);
        nights = Math.max(1, diff);
    }
    if (!nights && estimatedEnd) {
        start = settlementAddDays(estimatedEnd, -1);
        end = estimatedEnd;
        nights = 1;
        const days = nights + 1;
        const period = `${settlementDateShort(start)}~${settlementDateShort(end)}`;
        return {
            period,
            text: `${period} · ${nights}박 ${days}일 추정`,
            nights,
            days,
            estimated: true
        };
    }
    if (!nights) return { period: '', text: '숙박일 미확인', nights: 0, days: 0 };
    const days = nights + 1;
    const period = start && end ? `${settlementDateShort(start)}~${settlementDateShort(end)}` : '';
    return {
        period,
        text: `${period ? `${period} · ` : ''}${nights}박 ${days}일`,
        nights,
        days,
        estimated: false
    };
}

function settlementRoomSortValue(room) {
    const text = String(room || '');
    if (text.toLowerCase() === 'group' || text.includes('단체')) return 900000;
    if (/ph/i.test(text)) return 200000 + Number((text.match(/\d+/) || [0])[0]);
    const digits = (text.match(/\d+/g) || ['0']).join('');
    return Number(digits || 0);
}

function settlementStatusInfo(folio) {
    const today = settlementIsTodayCheckout(folio);
    const overdue = folio.status === 'unpaid' && !today;
    const icon = overdue ? 'fa-circle-exclamation' : ({
        unpaid: 'fa-cash-register',
        ready: 'fa-clipboard-check',
        paid: 'fa-circle-check',
        refund: 'fa-rotate-left'
    }[folio.status] || 'fa-clipboard-check');
    const label = overdue ? '미수금' : ({
        unpaid: today ? '수납 필요' : '미수금',
        ready: '정산 필요',
        paid: '정산/체크아웃 완료',
        refund: '환불 확인'
    }[folio.status] || '정산 필요');
    return { icon, label };
}

function settlementServiceTags(charges) {
    const labels = {
        room: '객실',
        pos: 'POS',
        fnb: 'F&B',
        golf: '골프',
        rentacar: '렌터카',
        laundry: '세탁',
        minibar: '미니바'
    };
    const found = new Set();
    (charges || []).forEach(charge => {
        const type = String(charge.type || '').toLowerCase();
        if (labels[type]) found.add(labels[type]);
    });
    return [...found].slice(0, 4);
}

function settlementPaymentRecordsForFolio(folioId) {
    return settlementPaymentRecords().filter(item => String(item.folioId || '') === String(folioId || ''));
}

function settlementLocalPaymentTotals(folioId) {
    return settlementPaymentRecordsForFolio(folioId).reduce((acc, item) => {
        const amount = Number(item.appliedPhpAmount || 0);
        if (item.kind === 'deposit') acc.deposit += amount;
        else acc.settlement += amount;
        return acc;
    }, { settlement: 0, deposit: 0 });
}

function settlementFolioSignature(folio) {
    return [
        folio.folioId || folio.id || '',
        Number(folio.total || 0).toFixed(2),
        Number(folio.paid || 0).toFixed(2),
        Number(folio.balance || 0).toFixed(2),
        Number(folio.deposit || 0).toFixed(2)
    ].join('|');
}

function settlementCompletionForFolio(folio) {
    if (!folio || Number(folio.balance || 0) > 0) return null;
    if (folio.raw?.settlementCompleted) {
        return {
            completedAt: folio.raw.settlementCompletedAt || folio.raw.closedAt || folio.raw.issuedAt || '',
            completedBy: folio.raw.settlementCompletedBy || '시스템'
        };
    }
    const signature = settlementFolioSignature(folio);
    return settlementCompletionRecords()
        .filter(item => String(item.folioId || '') === String(folio.folioId || folio.id || ''))
        .sort((a, b) => String(b.completedAt || '').localeCompare(String(a.completedAt || '')))
        .find(item => !item.signature || item.signature === signature) || null;
}

function settlementReservationCheckoutTime(reservation) {
    return reservation?.checkOutTime
        || reservation?.departureTime
        || reservation?.stayTimes?.checkOutTime
        || reservation?.times?.checkOut
        || '12:00';
}

function reservationById(id) {
    if (!id) return null;
    return settlementState.reservations.find(res =>
        res.id === id || res.reservationId === id || (Array.isArray(res.reservationIds) && res.reservationIds.includes(id))
    ) || null;
}

function reservationsByIds(ids) {
    const normalized = new Set((ids || []).filter(Boolean).map(String));
    if (!normalized.size) return [];
    return settlementState.reservations.filter(res =>
        normalized.has(String(res.id || '')) ||
        normalized.has(String(res.reservationId || '')) ||
        (Array.isArray(res.reservationIds) && res.reservationIds.some(id => normalized.has(String(id))))
    );
}

function settlementNormalizeRoom(value) {
    const text = String(value || '').trim().toLowerCase();
    const digits = (text.match(/\d+/g) || []).join('').replace(/^0+(?=\d)/, '');
    return { text, digits };
}

function settlementSameRoom(left, right) {
    const a = settlementNormalizeRoom(left);
    const b = settlementNormalizeRoom(right);
    if (!a.text || !b.text) return false;
    if (a.text === b.text) return true;
    return !!(a.digits && b.digits && a.digits === b.digits);
}

function settlementNormalizeName(value) {
    return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function fallbackReservationsForFolio(item, checkoutDate) {
    const roomCandidates = [item.roomNo, item.roomId, item.room].filter(Boolean);
    const guestCandidates = [item.ownerName, item.guestName].map(settlementNormalizeName).filter(Boolean);
    if (!roomCandidates.length && !guestCandidates.length) return [];
    const checkoutValue = settlementDateValue(checkoutDate || item.settlementDate || item.closedAt || item.issuedAt);
    const matches = settlementState.reservations
        .filter(res => {
            const roomMatch = !roomCandidates.length || roomCandidates.some(room =>
                settlementSameRoom(room, res.roomNo || res.room || res.fullRoom || res.roomId)
            );
            const guestValue = settlementNormalizeName(res.guestName || res.guest || res.roomingGuestName);
            const guestMatch = !guestCandidates.length || guestCandidates.includes(guestValue);
            return roomMatch && guestMatch;
        })
        .map(res => {
            const resCheckout = settlementDateValue(res.checkOutDate || res.checkout || res.cout);
            const distance = Number.isFinite(checkoutValue) && Number.isFinite(resCheckout)
                ? Math.abs(checkoutValue - resCheckout) / 86400000
                : 9999;
            return { res, distance };
        })
        .filter(item => item.distance <= 45 || !Number.isFinite(checkoutValue))
        .sort((a, b) => a.distance - b.distance);
    return matches.length ? [matches[0].res] : [];
}

function mapSettlementFolio(item) {
    const charges = Array.isArray(item.charges) ? item.charges : [];
    const payments = Array.isArray(item.payments) ? item.payments : [];
    const folioId = item.folioId || item.id;
    const total = charges.reduce((sum, charge) => sum + settlementAmount(charge.amount), 0);
    let paid = payments.reduce((sum, payment) => sum + settlementAmount(payment.amount), 0);
    const depositPayments = payments.filter(payment => String(payment.method || payment.type || '').toLowerCase().includes('deposit'));
    let deposit = Number(item.depositAmount || 0) + depositPayments.reduce((sum, payment) => sum + settlementAmount(payment.amount), 0);
    let balance = settlementAmount(item.balance);
    if (!Number.isFinite(balance) || (!balance && String(item.status || '').toLowerCase() === 'open' && total > paid)) {
        balance = Math.max(total - paid, 0);
    }
    const localPayment = settlementLocalPaymentTotals(folioId);
    paid += localPayment.settlement;
    deposit += localPayment.deposit;
    balance = Math.max(balance - localPayment.settlement, 0);
    const reservationIds = [
        item.reservationId,
        ...(Array.isArray(item.reservationIds) ? item.reservationIds : [])
    ].filter(Boolean);
    const initialCheckoutDate = settlementIso(item.checkOutDate || item.checkoutDate || item.checkout || item.settlementDate || item.closedAt || item.issuedAt);
    let linkedReservations = reservationsByIds(reservationIds);
    if (!linkedReservations.length && !reservationIds.length) linkedReservations = fallbackReservationsForFolio(item, initialCheckoutDate);
    const reservation = linkedReservations[0] || reservationById(item.reservationId || item.reservationIds?.[0]);
    const statusText = String(item.status || '').toLowerCase();
    const settled = item.settlementCompleted || ['closed', 'settled', 'paid'].includes(statusText);
    const status = balance > 0 ? 'unpaid' : (paid > total && total > 0 ? 'refund' : (settled ? 'paid' : 'ready'));
    const roomList = Array.isArray(item.roomIds) ? item.roomIds.map(settlementRoomNo).filter(Boolean) : [];
    const room = item.folioType === 'group' || item.groupId
        ? '단체'
        : (item.roomNo || settlementRoomNo(item.roomId || item.room));
    const group = item.groupId ? settlementState.groups.find(g => g.id === item.groupId || g.eventId === item.groupId) : null;
    const stayStart = settlementMinDate([
        ...linkedReservations.map(res => res.checkInDate || res.checkin || res.cin),
        group?.checkInDate || group?.checkin
    ]);
    const stayEnd = settlementMaxDate([
        ...linkedReservations.map(res => res.checkOutDate || res.checkout || res.cout),
        group?.checkOutDate || group?.checkout
    ]);
    const checkoutDate = settlementIso(reservation?.checkOutDate || reservation?.checkout || stayEnd || item.checkOutDate || item.checkoutDate || item.checkout || item.settlementDate || item.closedAt || item.issuedAt);
    const fallbackNights = linkedReservations
        .map(res => Number(res.nights || res.len || 0))
        .filter(value => Number.isFinite(value) && value > 0)
        .reduce((max, value) => Math.max(max, value), 0);
    const stay = settlementStaySummary(stayStart, stayEnd, fallbackNights, checkoutDate || initialCheckoutDate);
    const mapped = {
        id: item.id || item.folioId,
        folioId,
        reservationId: item.reservationId || item.reservationIds?.[0] || '',
        groupId: item.groupId || '',
        groupName: group?.name || item.ownerName || item.companyName || '',
        folioType: item.folioType || (item.groupId ? 'group' : 'individual'),
        room,
        roomText: roomList.length ? roomList.join(', ') : room,
        guest: item.ownerName || item.guestName || reservation?.guestName || reservation?.guest || '-',
        checkoutDate,
        checkoutTime: settlementReservationCheckoutTime(reservation),
        stayStart,
        stayEnd,
        stayText: stay.text,
        stayNights: stay.nights,
        stayDays: stay.days,
        issuedDate: settlementIso(item.issuedAt),
        total,
        paid,
        balance,
        deposit,
        status,
        charges,
        tags: settlementServiceTags(charges),
        raw: item
    };
    const completion = settlementCompletionForFolio(mapped);
    return completion ? {
        ...mapped,
        status: 'paid',
        settlementCompleted: true,
        settlementCompletedAt: completion.completedAt || '',
        settlementCompletedBy: completion.completedBy || ''
    } : mapped;
}

function settlementIsTodayCheckout(folio) {
    return folio.checkoutDate === settlementTodayIso();
}

function settlementNeedsAction(folio) {
    return ['unpaid', 'ready', 'refund'].includes(folio.status);
}

function settlementIsActionable(folio) {
    return settlementIsTodayCheckout(folio) && settlementNeedsAction(folio);
}

function settlementIsOverdueUnpaid(folio) {
    return folio.status === 'unpaid' && folio.checkoutDate && folio.checkoutDate < settlementTodayIso();
}

function filterSettlementFolios() {
    const query = settlementState.query.trim().toLowerCase();
    let rows = settlementState.folios.filter(settlementIsTodayCheckout);
    if (settlementState.filter === 'all') rows = settlementState.folios.slice();
    if (settlementState.filter === 'unpaid') rows = settlementState.folios.filter(settlementIsOverdueUnpaid);
    if (settlementState.filter === 'ready') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && ['unpaid', 'ready'].includes(folio.status));
    if (settlementState.filter === 'deposit') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && folio.deposit > 0);
    if (settlementState.filter === 'group') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && (folio.folioType === 'group' || folio.groupId));
    if (settlementState.filter === 'refund') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && folio.status === 'refund');
    if (query) {
        rows = rows.filter(folio => [
            folio.id, folio.folioId, folio.room, folio.roomText, folio.guest, folio.groupName,
            folio.reservationId, folio.groupId, folio.status, settlementStatusInfo(folio).label,
            folio.stayText, folio.tags.join(' ')
        ].join(' ').toLowerCase().includes(query));
    }
    return rows.sort((a, b) => {
        if (settlementState.sort === 'balance') return b.balance - a.balance;
        if (settlementState.sort === 'checkout') return String(a.checkoutDate || '').localeCompare(String(b.checkoutDate || '')) || String(a.checkoutTime || '').localeCompare(String(b.checkoutTime || ''));
        if (settlementState.sort === 'status') return ['unpaid', 'ready', 'refund', 'paid'].indexOf(a.status) - ['unpaid', 'ready', 'refund', 'paid'].indexOf(b.status);
        return settlementRoomSortValue(a.roomText || a.room) - settlementRoomSortValue(b.roomText || b.room)
            || String(a.guest).localeCompare(String(b.guest));
    });
}

function renderSettlementKpis() {
    const todayCheckout = settlementState.folios.filter(settlementIsTodayCheckout);
    const actionable = todayCheckout.filter(folio => ['unpaid', 'ready'].includes(folio.status));
    const unpaid = settlementState.folios.filter(settlementIsOverdueUnpaid);
    const need = todayCheckout.length;
    const balance = unpaid.reduce((sum, folio) => sum + Math.max(0, folio.balance), 0);
    const deposit = todayCheckout.reduce((sum, folio) => sum + Math.max(0, folio.deposit), 0);
    const group = todayCheckout.filter(folio => folio.folioType === 'group' || folio.groupId).length;
    document.getElementById('kpiNeed').textContent = need;
    document.getElementById('kpiBalance').textContent = settlementMoney(balance);
    document.getElementById('kpiDeposit').textContent = settlementMoney(deposit);
    document.getElementById('kpiGroup').textContent = group;
}

function settlementCard(folio) {

        : `<button type="button" class="primary" onclick="openSettlementStatusDetail('${settlementEscape(folio.folioId || folio.id)}')"><i class="fa-solid fa-clipboard-check"></i> 정산 확인</button>`;

            <span><i class="fa-solid fa-calendar-days"></i>투숙 ${settlementEscape(folio.stayText || '숙박일 미확인')}</span>
            <span><i class="fa-regular fa-calendar-check"></i>체크아웃 ${settlementEscape(folio.checkoutDate || '-')} ${settlementEscape(folio.checkoutTime || '')}</span>

        <div class="settlement-amounts">
            <div class="settlement-row"><span>총 객실/서비스</span><strong>${settlementMoney(folio.total)}</strong></div>
            <div class="settlement-row"><span>수납 완료</span><strong>${settlementMoney(folio.paid)}</strong></div>

            <div class="settlement-row deposit"><span>예치금</span><strong>${settlementMoney(folio.deposit)}</strong></div>

        </div>
    </article>`;

function settlementFolioById(folioId) {
    return settlementState.folios.find(item => String(item.folioId || item.id || '') === String(folioId || '')) || null;
}

function settlementRefundValue(folio) {
    return Math.max(Number(folio?.paid || 0) - Number(folio?.total || 0), 0);
}

function settlementDetailStatus(folio) {
    const info = settlementStatusInfo(folio);
    return {
        ...info,
        badge: folio.status === 'paid' ? 'success' : folio.status === 'refund' ? 'danger' : folio.status === 'unpaid' ? 'warning' : 'ready'
    };
}

function settlementDetailRows(folio) {
    return [
        ['정산 번호', folio.folioId || folio.id || '-'],
        ['체크아웃', `${folio.checkoutDate || '-'} ${folio.checkoutTime || ''}`.trim()],

        ...(folio.groupName ? [['단체명', folio.groupName]] : []),

        ...(folio.settlementCompletedBy ? [['완료 담당자', folio.settlementCompletedBy]] : [])

}

function settlementDetailRowsHtml(folio) {

        <div class="settlement-detail-row">
            <span>${settlementEscape(label)}</span>

function settlementDetailLinesHtml(folio) {
    if (!folio.tags.length) {
        return `<div class="settlement-line-item">
            <div class="settlement-line-main"><i class="fa-solid fa-bed"></i><span>객실</span></div>
            <div class="settlement-line-amount">${settlementMoney(folio.total)}</div>

    }
    return folio.tags.map(tag => `
        <div class="settlement-line-item">
            <div class="settlement-line-main"><i class="fa-solid fa-tag"></i><span>${settlementEscape(tag)}</span></div>
            <div class="settlement-line-amount">${settlementMoney(folio.total)}</div>
        </div>
    `).join('');
}

function settlementDetailHistoryHtml(folio) {
    const payments = settlementPaymentRecordsForFolio(folio.folioId || folio.id).map(item => ({
        at: item.createdAt,
        title: item.kind === 'deposit' ? '예치금 수납' : '정산 수납',
        sub: [item.methodLabel || item.method, item.operator, item.note].filter(Boolean).join(' / '),
        amount: settlementMoney(item.appliedPhpAmount)
    }));
    const completion = settlementCompletionForFolio(folio);
    const rows = [
        ...payments,
        ...(completion ? [{
            at: completion.completedAt,
            title: '정산/체크아웃 완료',
            sub: completion.completedBy || '-',
            amount: settlementMoney(folio.paid)
        }] : [])
    ].sort((a, b) => String(b.at || '').localeCompare(String(a.at || '')));
    if (!rows.length) return '<div class="settlement-history-empty">등록된 수납/정산 완료 이력이 없습니다.</div>';
    return rows.map(item => `
        <div class="settlement-history-item">
            <div class="settlement-history-time">${settlementEscape(settlementFormatDateTime(item.at))}</div>
            <div class="settlement-history-main">${settlementEscape(item.title)}<span>${settlementEscape(item.sub || '-')}</span></div>
            <div class="settlement-history-amount">${settlementEscape(item.amount)}</div>
        </div>
    `).join('');
}

function renderSettlementStatusDetail(folioId) {
    const folio = settlementFolioById(folioId || settlementState.currentFolioId);
    if (!folio) return;
    settlementState.currentFolioId = folio.folioId || folio.id;
    const status = settlementDetailStatus(folio);
    const refund = settlementRefundValue(folio);
    const body = document.getElementById('settlementStatusDetailContent');
    const footer = document.getElementById('settlementStatusDetailFooter');
    if (body) {
        body.innerHTML = `
            <div class="settlement-detail-summary">
                <div class="settlement-detail-card"><span><i class="fa-solid fa-file-invoice-dollar"></i> 총 청구액</span><strong>${settlementMoney(folio.total)}</strong></div>
                <div class="settlement-detail-card"><span><i class="fa-solid fa-credit-card"></i> 수납액</span><strong>${settlementMoney(folio.paid)}</strong></div>
                <div class="settlement-detail-card warning"><span><i class="fa-solid fa-vault"></i> 예치금</span><strong>${settlementMoney(folio.deposit)}</strong></div>
                <div class="settlement-detail-card danger"><span><i class="fa-solid fa-triangle-exclamation"></i> 잔액</span><strong>${settlementMoney(folio.balance)}</strong></div>
                <div class="settlement-detail-card ${refund > 0 ? 'danger' : ''}"><span><i class="fa-solid fa-rotate-left"></i> 환불금</span><strong>${settlementMoney(refund)}</strong></div>
            </div>
            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid ${status.icon}" style="color:var(--primary)"></i> 정산 기본 정보</div>
                <div class="settlement-detail-grid">${settlementDetailRowsHtml(folio)}</div>
            </div>
            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid fa-layer-group" style="color:var(--primary)"></i> 청구 항목 요약</div>
                <div class="settlement-line-list">${settlementDetailLinesHtml(folio)}</div>
            </div>
            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid fa-clock-rotate-left" style="color:var(--primary)"></i> 처리 이력</div>
                <div class="settlement-history-list">${settlementDetailHistoryHtml(folio)}</div>
            </div>
        `;
    }
    if (footer) {
        const paymentButton = !folio.settlementCompleted && Number(folio.balance || 0) > 0
            ? `<button class="btn-primary-sm" onclick="openSettlementStatusPayment('${settlementEscape(folio.folioId || folio.id)}')"><i class="fa-solid fa-credit-card"></i> 수납 등록</button>`
            : '';
        const completeButton = folio.settlementCompleted
            ? '<button class="btn-settlement-complete" disabled><i class="fa-solid fa-circle-check"></i> 정산/체크아웃 완료</button>'
            : `<button class="btn-settlement-complete" onclick="completeSettlementStatusFolio('${settlementEscape(folio.folioId || folio.id)}')"><i class="fa-solid fa-door-open"></i> 정산 완료</button>`;
        footer.innerHTML = `
            <div class="settlement-detail-footer-left">
                <button class="btn-outline" onclick="closeModal('settlementStatusDetailModal')">닫기</button>
                <button class="btn-outline" onclick="window.print()"><i class="fa-solid fa-print"></i> 인쇄</button>
            </div>
            <div class="settlement-detail-footer-right">
                ${paymentButton}
                ${completeButton}
            </div>
        `;
    }
}

function openSettlementStatusDetail(folioId) {
    renderSettlementStatusDetail(folioId);
    openModal('settlementStatusDetailModal');
}

function openSettlementStatusPayment(folioId) {
    const folio = settlementFolioById(folioId);
    if (!folio) return;
    if (folio.settlementCompleted) {
        showToast('이미 정산/체크아웃 완료된 건입니다.', 'error');
        return;
    }
    settlementState.currentFolioId = folio.folioId || folio.id;
    const amount = document.getElementById('settlementStatusPaymentAmount');
    const method = document.getElementById('settlementStatusPaymentMethod');
    const note = document.getElementById('settlementStatusPaymentNote');
    if (amount) amount.value = Number(folio.balance || 0).toFixed(2);
    if (method) method.value = 'cash';
    if (note) note.value = '';
    closeModal('settlementStatusDetailModal');
    openModal('settlementStatusPaymentModal');
}

async function refreshSettlementStatusAfterMutation(folioId) {
    await loadSettlementData();
    renderSettlementSections();
    if (folioId) openSettlementStatusDetail(folioId);
}

async function processSettlementStatusPayment() {
    const folio = settlementFolioById(settlementState.currentFolioId);
    if (!folio) {
        showToast('정산 대상을 찾지 못했습니다.', 'error');
        return;
    }
    const amount = Number(document.getElementById('settlementStatusPaymentAmount')?.value || 0);
    if (!amount) {
        showToast('수납 금액을 입력해주세요.', 'error');
        return;
    }
    const methodSelect = document.getElementById('settlementStatusPaymentMethod');
    const method = methodSelect?.value || 'cash';
    const methodLabel = methodSelect?.selectedOptions?.[0]?.textContent || method;
    const isDeposit = method === 'deposit';
    const records = settlementPaymentRecords();
    records.push({
        id: `PAY-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.folioId || folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        kind: isDeposit ? 'deposit' : 'settlement',
        method,
        methodLabel,
        baseCurrency: 'PHP',
        appliedPhpAmount: isDeposit ? amount : Math.min(amount, Number(folio.balance || 0)),
        businessDate: settlementTodayIso(),
        createdAt: settlementNowIso(),
        operator: settlementCurrentOperator(),
        note: document.getElementById('settlementStatusPaymentNote')?.value || ''
    });
    settlementSetStorageJson(SETTLEMENT_PAYMENTS_KEY, records);
    window.dispatchEvent(new CustomEvent('pms:settlement-payments-updated'));
    showToast(isDeposit ? '예치금 수납 내역이 저장되었습니다.' : '정산 수납 내역이 저장되었습니다.', 'success');
    closeModal('settlementStatusPaymentModal');
    await refreshSettlementStatusAfterMutation(folio.folioId || folio.id);
}

async function completeSettlementStatusFolio(folioId) {
    const folio = settlementFolioById(folioId);
    if (!folio) {
        showToast('정산 대상을 찾지 못했습니다.', 'error');
        return;
    }
    if (folio.settlementCompleted) {
        showToast('이미 정산/체크아웃 완료된 건입니다.', 'success');
        return;
    }
    if (Number(folio.balance || 0) > 0) {
        showToast('잔액이 남아 있어 정산 완료 처리할 수 없습니다. 먼저 수납을 등록해주세요.', 'error');
        return;
    }
    const records = settlementCompletionRecords();
    records.push({
        id: `DONE-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.folioId || folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        total: Number(folio.total || 0),
        paid: Number(folio.paid || 0),
        bal: Number(folio.balance || 0),
        checkoutCompleted: true,
        roomNextStatus: 'dirty',
        signature: settlementFolioSignature(folio),
        businessDate: settlementTodayIso(),
        completedAt: settlementNowIso(),
        completedBy: settlementCurrentOperator()
    });
    settlementSetStorageJson(SETTLEMENT_COMPLETIONS_KEY, records);
    window.dispatchEvent(new CustomEvent('pms:settlement-completions-updated'));
    showToast('정산/체크아웃 완료 처리되었습니다. 객실은 청소 필요 상태로 전환됩니다.', 'success');
    await refreshSettlementStatusAfterMutation(folio.folioId || folio.id);
}

function renderSettlementSections() {
    renderSettlementKpis();
    const container = document.getElementById('settlementSections');
    const rows = filterSettlementFolios();
    if (!rows.length) {
        container.innerHTML = '<div class="settlement-empty">현재 조건에 맞는 정산 대상이 없습니다.</div>';
        return;
    }
    const groupRows = rows.filter(folio => folio.folioType === 'group' || folio.groupId);
    const individualRows = rows.filter(folio => !(folio.folioType === 'group' || folio.groupId));
    const sections = [];
    if (individualRows.length) {
        sections.push(`<section class="settlement-section">
            <h3 class="settlement-section-head"><i class="fa-solid fa-door-open"></i> 객실 정산 <span>${individualRows.length}건</span></h3>
            <div class="settlement-grid">${individualRows.map(settlementCard).join('')}</div>
        </section>`);
    }
    if (groupRows.length) {
        sections.push(`<section class="settlement-section">
            <h3 class="settlement-section-head"><i class="fa-solid fa-users-line"></i> 단체 정산 <span>${groupRows.length}건</span></h3>
            <div class="settlement-grid">${groupRows.map(settlementCard).join('')}</div>
        </section>`);
    }
    container.innerHTML = sections.join('');
}

async function loadSettlementData() {
    const [foliosEnv, reservations, rooms, groups] = await Promise.all([
        window.PmsMockApi ? window.PmsMockApi.request('GET', '/folios') : Promise.resolve({ data: { items: [] } }),
        window.PmsAPI?.getReservations ? window.PmsAPI.getReservations().catch(() => []) : [],
        window.PmsAPI?.getAllRooms ? window.PmsAPI.getAllRooms().catch(() => []) : [],
        window.PmsAPI?.getGroups ? window.PmsAPI.getGroups().catch(() => []) : []
    ]);
    settlementState.reservations = reservations || [];
    settlementState.rooms = rooms || [];
    settlementState.groups = groups || [];
    settlementState.folios = (window.PmsMockApi?.items(foliosEnv) || []).map(mapSettlementFolio);
}

function applySettlementUrlParams() {
    const params = new URLSearchParams(location.search);
    const query = params.get('query') || params.get('room') || '';
    const status = params.get('status') || params.get('filter') || '';
    if (query) {
        settlementState.query = query;
        const input = document.getElementById('settlementSearch');
        if (input) input.value = query;
    }
    if (status && ['today', 'actionable', 'unpaid', 'ready', 'deposit', 'group', 'refund', 'all'].includes(status)) {
        const normalizedStatus = status === 'actionable' ? 'today' : status;
        settlementState.filter = normalizedStatus;
        document.querySelectorAll('.settlement-chip').forEach(chip => chip.classList.toggle('active', chip.dataset.filter === normalizedStatus));
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    document.querySelectorAll('.settlement-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            settlementState.filter = chip.dataset.filter || 'actionable';
            document.querySelectorAll('.settlement-chip').forEach(item => item.classList.toggle('active', item === chip));
            renderSettlementSections();
        });
    });
    const search = document.getElementById('settlementSearch');
    if (search) search.addEventListener('input', () => {
        settlementState.query = search.value || '';
        renderSettlementSections();
    });
    const sort = document.getElementById('settlementSort');
    if (sort) sort.addEventListener('change', () => {
        settlementState.sort = sort.value || 'room';
        renderSettlementSections();
    });
    await loadSettlementData();
    applySettlementUrlParams();
    renderSettlementSections();
});
</script>
</body>
</html>
