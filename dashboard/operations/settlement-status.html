<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정산 현황 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .settlement-page{font-family:var(--font)}
        .settlement-kpis{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:16px}
        .settlement-kpi{display:flex;align-items:center;gap:13px;min-width:0;padding:16px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.03)}
        .settlement-kpi-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;flex:0 0 auto}
        .settlement-kpi-icon.need{background:#eff6ff;color:#2563eb}
        .settlement-kpi-icon.unpaid{background:#fff1f2;color:#dc2626}
        .settlement-kpi-icon.deposit{background:#ecfdf5;color:#059669}
        .settlement-kpi-icon.group{background:#f5f3ff;color:#7c3aed}
        .settlement-kpi-value{font-size:1.35rem;font-weight:950;color:var(--txt);line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-kpi-label{font-size:.75rem;font-weight:850;color:var(--txt3);margin-top:3px}
        .settlement-toolbar{display:flex;flex-direction:column;gap:12px;margin-bottom:16px;padding:12px 14px;background:#fff;border:1px solid var(--border);border-radius:14px}
        .settlement-toolbar-top,.settlement-toolbar-bottom{display:flex;align-items:center;justify-content:space-between;gap:12px;min-width:0}
        .settlement-toolbar-left,.settlement-toolbar-right{display:flex;align-items:center;gap:8px;min-width:0}
        .settlement-toolbar-left{flex:1;flex-wrap:wrap;overflow:visible;padding-bottom:1px}
        .settlement-toolbar-search-row{flex:1 1 auto}
        .settlement-filter-chips{flex:1 1 auto;display:flex;align-items:center;gap:8px;flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px}
        .settlement-toolbar-right{flex:0 0 auto;justify-content:flex-end;flex-wrap:wrap}
        .settlement-search{box-sizing:border-box;display:flex;align-items:center;gap:8px;width:auto;max-width:320px;min-width:220px;flex:1 1 280px;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
        .settlement-search:focus-within{border-color:var(--primary)}
        .settlement-search input{border:0;outline:0;background:transparent;font-family:var(--font);font-size:.8rem;font-weight:750;width:100%;min-width:0;color:var(--txt)}
        .settlement-toolbar-left .pms-search-button{flex:0 0 auto}
        .settlement-chip{height:34px;box-sizing:border-box;flex:0 0 auto;display:inline-flex;align-items:center;gap:6px;padding:0 10px 0 12px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.74rem;font-weight:900;line-height:1;white-space:nowrap;cursor:pointer}
        .settlement-chip i{width:14px;height:14px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;font-size:.78rem;line-height:1}
        .settlement-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .settlement-chip-count{box-sizing:border-box;min-width:20px;height:20px;flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;padding:0 6px;border-radius:999px;background:#f1f5f9;color:#475569;font-size:.66rem;font-weight:950;line-height:20px;font-variant-numeric:tabular-nums}
        .settlement-chip.active .settlement-chip-count{background:rgba(255,255,255,.2);color:#fff}
        .settlement-sort-inline{display:inline-flex;align-items:center;flex:0 0 auto}
        .settlement-sort{height:34px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.74rem;font-weight:900;padding:0 30px 0 12px}
        .settlement-toolbar-actions{display:flex;align-items:center;justify-content:flex-end;gap:8px;flex:0 0 auto;flex-wrap:wrap}
        .settlement-toolbar-action{height:38px;min-width:104px;display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:0 14px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.78rem;font-weight:850;text-decoration:none;white-space:nowrap;box-shadow:0 1px 2px rgba(15,23,42,.04)}
        .settlement-toolbar-action i{font-size:.86rem;color:#475569}
        .settlement-section{margin-bottom:22px}
        .settlement-section-head{display:flex;align-items:center;gap:9px;margin:0 0 10px;color:var(--txt);font-size:1rem;font-weight:900}
        .settlement-section-head span{font-size:.78rem;font-weight:750;color:var(--txt3)}
        .settlement-floor-list{display:grid;gap:18px}
        .settlement-floor-group{display:grid;gap:10px}
        .settlement-floor-head{display:flex;align-items:center;justify-content:space-between;gap:12px;min-height:32px;padding:0 2px;color:var(--txt)}
        .settlement-floor-head strong{display:inline-flex;align-items:center;gap:7px;font-size:.9rem;font-weight:950}
        .settlement-floor-head strong i{color:var(--primary);font-size:.82rem}
        .settlement-floor-head span{font-size:.74rem;font-weight:850;color:var(--txt3);white-space:nowrap}
        .settlement-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
        .settlement-card{display:flex;flex-direction:column;gap:10px;min-width:0;min-height:246px;padding:15px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.unpaid{border-color:#fecdd3;box-shadow:inset 4px 0 0 #ef4444,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.ready{border-color:#bfdbfe;box-shadow:inset 4px 0 0 #3b82f6,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.paid{border-color:#bbf7d0;box-shadow:inset 4px 0 0 #10b981,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card.refund{border-color:#fed7aa;box-shadow:inset 4px 0 0 #f97316,0 2px 10px rgba(15,23,42,.04)}
        .settlement-card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
        .settlement-room{min-width:0}
        .settlement-room strong{display:block;color:var(--txt);font-size:1.15rem;font-weight:950;line-height:1.15;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-room span{display:block;color:var(--txt3);font-size:.7rem;font-weight:850;margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-status{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:.67rem;font-weight:950;white-space:nowrap}
        .settlement-status.unpaid{background:#fff1f2;color:#be123c}
        .settlement-status.ready{background:#eff6ff;color:#1d4ed8}
        .settlement-status.paid{background:#dcfce7;color:#047857}
        .settlement-status.refund{background:#fff7ed;color:#c2410c}
        .settlement-guest{display:grid;gap:5px;min-width:0}
        .settlement-guest b{display:flex;align-items:center;gap:6px;min-width:0;font-size:.88rem;color:var(--txt);font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-guest span{display:flex;align-items:center;gap:6px;min-width:0;font-size:.72rem;color:var(--txt3);font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-amounts{display:grid;gap:6px;margin-top:2px}
        .settlement-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:7px 9px;border:1px solid var(--border2);border-radius:9px;background:#f8fafc;font-size:.74rem;font-weight:850;color:var(--txt2)}
        .settlement-row strong{font-size:.8rem;color:var(--txt);white-space:nowrap}
        .settlement-row.balance strong{color:#be123c}
        .settlement-row.deposit strong{color:#047857}
        .settlement-tags{display:flex;flex-wrap:nowrap;align-items:center;gap:3px;min-width:0;margin-top:1px;overflow:hidden}
        .settlement-tag{display:inline-flex;align-items:center;gap:3px;flex:0 1 auto;min-width:0;padding:2px 5px;border:1px solid var(--border2);border-radius:999px;background:#fff;font-size:.58rem;font-weight:900;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-tag i{font-size:.54rem;flex:0 0 auto}
        .settlement-actions{display:flex;gap:7px;margin-top:auto}
        .settlement-actions button{height:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0;border:1px solid transparent;border-radius:8px;font-family:var(--font);font-size:.73rem;font-weight:850;text-decoration:none;white-space:nowrap;cursor:pointer;transition:filter .15s,background .15s,border-color .15s}
        .settlement-actions button:hover{filter:brightness(.97)}
        .settlement-actions .payment{background:var(--primary);border-color:var(--primary);color:#fff}
        .settlement-actions .complete{background:#059669;border-color:#059669;color:#fff}
        .settlement-actions .refund{background:#fff7ed;border-color:#fed7aa;color:#c2410c}
        .settlement-actions .done{background:#ecfdf5;border-color:#bbf7d0;color:#047857}
        .settlement-actions .detail,.settlement-actions .outline{border-color:var(--border);background:#fff;color:var(--txt2)}
        .settlement-actions .done:hover{filter:none;background:#d1fae5}
        .settlement-actions .detail:hover{filter:none;background:#f8fafc}
        .settlement-legend{display:flex;align-items:center;gap:10px;flex:1 1 auto;min-width:360px;flex-wrap:nowrap;margin:0 0 0 4px;padding:0;border:0;background:transparent;color:var(--txt2);font-size:.72rem;font-weight:850;overflow-x:auto;scrollbar-width:none}
        .settlement-legend::-webkit-scrollbar{display:none}
        .legend-item{display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
        .legend-dot{width:9px;height:9px;border-radius:999px;display:inline-block}
        .legend-dot.today{background:#3b82f6}
        .legend-dot.due{background:#f97316}
        .legend-dot.unpaid{background:#ef4444}
        .legend-dot.done{background:#10b981}
        .legend-dot.refund{background:#8b5cf6}
        .settlement-modal-card{max-width:860px;width:95vw}
        .settlement-modal-body{padding:20px;display:grid;gap:16px;background:#fff}
        .settlement-detail-summary{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
        .settlement-detail-card{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px;min-width:0}
        .settlement-detail-card span{display:flex;align-items:center;gap:6px;color:var(--txt3);font-size:.72rem;font-weight:900;margin-bottom:6px;white-space:nowrap}
        .settlement-detail-card strong{display:block;color:var(--txt);font-size:1rem;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .settlement-detail-card.danger strong{color:var(--danger)}
        .settlement-detail-card.warning strong{color:#b45309}
        .settlement-detail-section{border:1px solid var(--border2);border-radius:12px;background:#fff;overflow:visible}
        .settlement-detail-section-head{padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--border2);font-size:.86rem;font-weight:950;color:var(--txt);display:flex;align-items:center;gap:8px}
        .settlement-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;overflow:visible}
        .settlement-detail-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:10px;align-items:center;min-height:42px;padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.78rem;line-height:1.45;box-sizing:border-box}
        .settlement-detail-row span{color:var(--txt3);font-weight:900}
        .settlement-detail-row strong{color:var(--txt);font-weight:850;overflow-wrap:anywhere}
        .settlement-line-list,.settlement-history-list{display:grid;gap:8px;padding:12px}
        .settlement-line-item{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px}
        .settlement-line-main{display:flex;align-items:center;gap:8px;min-width:0;color:var(--txt2);font-size:.78rem;font-weight:900}
        .settlement-line-main i{color:var(--primary);width:16px;text-align:center}
        .settlement-line-amount{font-size:.82rem;font-weight:950;color:var(--txt);white-space:nowrap}
        .settlement-history-list{max-height:220px;overflow:auto}
        .settlement-history-item{display:grid;grid-template-columns:112px minmax(0,1fr) auto;gap:10px;align-items:start;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px;font-size:.76rem}
        .settlement-history-time{color:var(--txt3);font-weight:900;line-height:1.35}
        .settlement-history-main{min-width:0;color:var(--txt);font-weight:850;line-height:1.45}
        .settlement-history-main span{display:block;color:var(--txt3);font-size:.7rem;font-weight:800;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .settlement-history-amount{text-align:right;color:var(--primary);font-weight:950;white-space:nowrap}
        .settlement-history-empty{padding:18px;text-align:center;color:var(--txt3);font-size:.78rem;font-weight:850;border:1px dashed var(--border);border-radius:9px;background:#fbfdff}
        .settlement-detail-footer{padding:16px 20px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
        .settlement-detail-footer-left,.settlement-detail-footer-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .btn-settlement-complete{border:1px solid #059669;background:#059669;color:#fff;border-radius:6px;font-family:var(--font);font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;height:34px;padding:0 12px;transition:all .15s}
        .btn-settlement-complete:hover{filter:brightness(.96)}
        .btn-settlement-complete:disabled{opacity:.5;cursor:not-allowed;filter:grayscale(.1)}
        .settlement-completed-status{height:34px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid #bbf7d0;border-radius:6px;background:#ecfdf5;color:#047857;font-family:var(--font);font-size:.78rem;font-weight:900;white-space:nowrap}
        .settlement-action-status{height:34px;display:inline-flex;align-items:center;justify-content:center;gap:6px;flex:1;min-width:0;border-radius:8px;font-size:.73rem;font-weight:900;white-space:nowrap}
        .settlement-action-status.done{border:1px solid #bbf7d0;background:#ecfdf5;color:#047857}
        .settlement-payment-grid{display:grid;grid-template-columns:1fr 150px;gap:12px}
        .settlement-payment-field{display:flex;flex-direction:column;gap:6px}
        .settlement-payment-field label{font-size:.76rem;font-weight:900;color:var(--txt2)}
        .settlement-payment-field input,.settlement-payment-field select{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-family:var(--font);font-size:.82rem;font-weight:750;color:var(--txt);background:#fff}
        .settlement-sort{min-width:170px}
        .payment-modal-card{max-width:640px!important;width:95vw;display:flex;flex-direction:column;max-height:90vh}
        .payment-modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;min-height:0;background:#fff}
        .payment-balance-summary{background:#fff7ed;color:#b45309;padding:11px 12px;border:1px solid #fed7aa;border-radius:9px;text-align:center;font-weight:900;font-size:.96rem}
        .payment-form-panel{border:1px solid var(--border2);border-radius:12px;background:#fff;padding:14px;display:flex;flex-direction:column;gap:14px}
        .payment-method-grid{display:grid;grid-template-columns:minmax(0,1fr) 132px;gap:10px;align-items:end}
        .payment-deposit-toggle{height:38px;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt2);font-size:.78rem;font-weight:900;cursor:pointer;user-select:none}
        .payment-deposit-toggle input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
        .payment-deposit-toggle:has(input:checked){background:var(--primary-lt);border-color:rgba(59,130,246,.32);color:var(--primary)}
        .payment-section-field{display:flex;flex-direction:column;gap:6px}
        .payment-section-field label{font-size:.78rem;font-weight:850;color:var(--txt2)}
        .payment-section-field input,.payment-section-field select{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-family:var(--font);width:100%;box-sizing:border-box;background:#fff}
        .payment-currency-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
        .payment-currency-field{display:flex;flex-direction:column;gap:5px}
        .payment-currency-field label{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:900;color:var(--txt2)}
        .payment-currency-field input{height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);width:100%;box-sizing:border-box}
        .payment-history{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px;display:flex;flex-direction:column;gap:10px;max-height:320px;overflow-y:auto}
        .payment-history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.82rem;font-weight:900;color:var(--txt)}
        .payment-history-total{font-size:.74rem;font-weight:900;color:var(--primary);white-space:nowrap}
        .payment-history-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
        .payment-history-summary>div,.payment-history-chip{border:1px solid var(--border);background:#fff;border-radius:8px;padding:8px 9px;min-width:0}
        .payment-history-summary span,.payment-history-chip span{display:block;font-size:.66rem;font-weight:800;color:var(--txt3);line-height:1.25;margin-bottom:4px}
        .payment-history-summary strong,.payment-history-chip strong{display:block;font-size:.86rem;font-weight:900;color:var(--txt);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .payment-history-list{display:grid;gap:8px}
        .payment-history-row{display:grid;grid-template-columns:86px minmax(0,1fr);gap:8px 12px;align-items:start;border:1px solid var(--border);border-radius:10px;background:#fff;padding:10px}
        .payment-history-row-time{font-size:.68rem;font-weight:900;color:var(--txt3);line-height:1.45}
        .payment-history-row-main{min-width:0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;font-size:.78rem;font-weight:900;color:var(--txt);line-height:1.35}
        .payment-history-method{display:grid;gap:3px;min-width:0}
        .payment-history-method strong{font-size:.82rem;font-weight:900;color:var(--txt)}
        .payment-history-meta{display:block;color:var(--txt2);font-size:.7rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .payment-history-note{display:block;margin-top:2px;color:var(--txt2);font-size:.7rem;font-weight:800;line-height:1.35;white-space:normal;overflow-wrap:anywhere}
        .payment-history-note b{color:var(--txt3);font-weight:900;margin-right:4px}
        .payment-history-applied{flex:0 0 auto;text-align:right;color:var(--primary)}
        .payment-history-applied span{display:block;font-size:.62rem;font-weight:900;color:var(--txt3);margin-bottom:2px}
        .payment-history-applied strong{display:block;font-size:1.02rem;font-weight:950;line-height:1.15}
        .payment-history-currencies{grid-column:1 / -1;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
        .payment-history-currency{min-width:0;border:1px solid var(--border2);border-radius:9px;background:#f8fafc;padding:8px 9px}
        .payment-history-currency.active{background:#eff6ff;border-color:#bfdbfe}
        .payment-history-currency-label{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:.66rem;font-weight:900;color:var(--txt3);margin-bottom:3px}
        .payment-history-currency-label i{color:var(--primary)}
        .payment-history-currency-amount{display:block;font-size:.95rem;font-weight:950;color:var(--txt);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .payment-history-currency-method{display:block;margin-top:3px;font-size:.62rem;font-weight:900;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .payment-history-empty{border:1px dashed var(--border);border-radius:8px;background:#fff;padding:10px;font-size:.74rem;font-weight:800;color:var(--txt3);text-align:center}
        .payment-modal-footer{padding:16px 20px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
        .payment-modal-footer-left,.payment-modal-footer-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
        .settlement-empty{padding:32px;border:1px dashed var(--border);border-radius:14px;background:#fff;text-align:center;color:var(--txt3);font-weight:850}
        @media(max-width:900px){

<body>
<div class="main settlement-page">
    <header class="topbar"><h1>정산 현황</h1></header>
    <div class="content">
        <section class="settlement-kpis" aria-label="정산 현황 요약">
            <div class="settlement-kpi"><div class="settlement-kpi-icon need"><i class="fa-solid fa-right-from-bracket"></i></div><div><div class="settlement-kpi-value" id="kpiNeed">0</div><div class="settlement-kpi-label">금일 체크아웃</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon unpaid"><i class="fa-solid fa-circle-exclamation"></i></div><div><div class="settlement-kpi-value" id="kpiBalance">₱0</div><div class="settlement-kpi-label">미수금 합계</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon deposit"><i class="fa-solid fa-wallet"></i></div><div><div class="settlement-kpi-value" id="kpiDeposit">₱0</div><div class="settlement-kpi-label">예치금 보유</div></div></div>
            <div class="settlement-kpi"><div class="settlement-kpi-icon group"><i class="fa-solid fa-users-line"></i></div><div><div class="settlement-kpi-value" id="kpiGroup">0</div><div class="settlement-kpi-label">단체 정산</div></div></div>
        </section>

        <section class="settlement-toolbar" aria-label="정산 현황 필터">
            <div class="settlement-toolbar-top">
                <div class="settlement-toolbar-left settlement-toolbar-search-row">
                    <label class="settlement-search">
                        <i class="fa-solid fa-search"></i>
                        <input id="settlementSearch" type="search" placeholder="호실, 고객, 단체, 정산번호 검색">
                    </label>
                    <div class="settlement-legend" aria-label=""></div>
                </div>
                <div class="settlement-toolbar-actions" aria-label="정산 이동">
                    <a class="settlement-toolbar-action" href="folio.html"><i class="fa-solid fa-table-list"></i> 정산 목록</a>
                    <a class="settlement-toolbar-action" href="night-audit.html"><i class="fa-solid fa-moon"></i> 일일 마감</a>
                </div>
            </div>
            <div class="settlement-toolbar-bottom">
                <div class="settlement-toolbar-left settlement-filter-chips">
                    <button class="settlement-chip active" data-filter="today"><i class="fa-solid fa-right-from-bracket"></i> 금일 체크아웃 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="ready"><i class="fa-solid fa-clipboard-check"></i> 수납/정산 필요 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="unpaid"><i class="fa-solid fa-circle-exclamation"></i> 이전 미수금 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="completed"><i class="fa-solid fa-circle-check"></i> 완료됨 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="deposit"><i class="fa-solid fa-wallet"></i> 예치금 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="group"><i class="fa-solid fa-users"></i> 단체 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="refund"><i class="fa-solid fa-rotate-left"></i> 환불 <span class="settlement-chip-count">0</span></button>
                    <button class="settlement-chip" data-filter="all"><i class="fa-solid fa-list"></i> 전체 <span class="settlement-chip-count">0</span></button>
                    <label class="settlement-sort-inline">
                        <select class="settlement-sort" id="settlementSort" aria-label="정산 현황 정렬">
                            <option value="room" data-ko="호실순" data-en="Room No.">호실순</option>
                            <option value="checkout" data-ko="체크아웃 기준" data-en="By checkout">체크아웃 기준</option>
                            <option value="balance" data-ko="미수금 큰순" data-en="Highest balance">미수금 큰순</option>
                            <option value="status" data-ko="상태순" data-en="By status">상태순</option>
                        </select>
                    </label>
                </div>
            </div>
        </section>

        <div id="settlementSections"></div>
    </div>
</div>

<div class="modal-overlay" id="settlementStatusDetailModal" onclick="if(event.target===this) closeModal('settlementStatusDetailModal')">
    <div class="modal-card settlement-modal-card">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-list-check" style="color:var(--primary)"></i> 정산 상세</h3>
            <button class="modal-close" onclick="closeModal('settlementStatusDetailModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body settlement-modal-body" id="settlementStatusDetailContent"></div>
        <div class="modal-footer settlement-detail-footer" id="settlementStatusDetailFooter"></div>
    </div>
</div>

<div class="modal-overlay" id="settlementStatusPaymentModal" onclick="if(event.target===this) closeModal('settlementStatusPaymentModal')">
    <div class="modal-card payment-modal-card">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-credit-card" style="color:var(--primary)"></i> 정산 수납 처리</h3>
            <button class="modal-close" onclick="closeModal('settlementStatusPaymentModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body payment-modal-body">
            <div class="payment-balance-summary" id="settlementStatusPaymentBalAmount">
                미수금 기준: ₱0 / 예치금: ₱0
            </div>
            <div class="payment-form-panel">
                <div class="payment-method-grid">
                    <div class="payment-section-field">
                        <label for="settlementStatusPaymentMethod">결제 수단</label>
                        <select id="settlementStatusPaymentMethod">
                            <option value="cash" data-ko="현금" data-en="Cash">현금</option>
                            <option value="card" data-ko="신용카드" data-en="Credit Card">신용카드</option>
                            <option value="bank" data-ko="계좌이체" data-en="Bank Transfer">계좌이체</option>
                            <option value="other" data-ko="기타" data-en="Other">기타</option>
                        </select>
                    </div>
                    <label class="payment-deposit-toggle" title="예치금으로 보관할 수납이면 체크">
                        <input type="checkbox" id="settlementStatusPaymentDepositToggle">
                        예치금
                    </label>
                </div>
                <div class="payment-section-field">
                    <label>실제 받은 금액</label>
                    <div class="payment-currency-grid">
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-peso-sign"></i> 페소</label>
                            <input type="number" min="0" step="1" id="settlementStatusPaymentReceivedPhp" data-no-currency-normalize="true" placeholder="0">
                        </div>
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-dollar-sign"></i> 달러</label>
                            <input type="number" min="0" step="1" id="settlementStatusPaymentReceivedUsd" data-no-currency-normalize="true" placeholder="0">
                        </div>
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-won-sign"></i> 원화</label>
                            <input type="number" min="0" step="1" id="settlementStatusPaymentReceivedKrw" data-no-currency-normalize="true" placeholder="0">
                        </div>
                    </div>
                </div>
                <div class="payment-section-field">
                    <label for="settlementStatusPaymentNote">메모</label>
                    <input id="settlementStatusPaymentNote" type="text" placeholder="예: 달러와 원화를 함께 수납, 금액 확인 완료">
                </div>
            </div>
            <div id="settlementStatusPaymentHistoryPanel"></div>
        </div>
        <div class="modal-footer payment-modal-footer">
            <div class="payment-modal-footer-left">
                <button class="btn-outline" onclick="closeModal('settlementStatusPaymentModal')">취소</button>
            </div>
            <div class="payment-modal-footer-right">
                <button class="btn-primary-sm" onclick="processSettlementStatusPayment()"><i class="fa-solid fa-credit-card"></i> 수납 등록</button>
                <button class="btn-settlement-complete" onclick="completeSettlementStatusFromPayment()"><i class="fa-solid fa-door-open"></i> 정산 완료</button>
            </div>
        </div>
    </div>
</div>

    return Object.entries(vars).reduce((result, [name, value]) => result.replaceAll(`{${name}}`, String(value)), text);
}

    const label = [room, target].filter(Boolean).join(' · ');

function settlementCurrencyLabel(currency) {
    if (currency === 'USD') return settlementText('dollar');
    if (currency === 'KRW') return settlementText('won');

}

function settlementEscape(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function settlementAmount(value) {
    if (window.PmsMockApi?.amountValue) return Number(window.PmsMockApi.amountValue(value) || 0);
    if (value && typeof value === 'object') return Number(value.amount || 0);
    return Number(value || 0);
}

function settlementMoney(value) {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 0 }).format(Number(value || 0));
}

function settlementParsePaymentAmount(value) {
    const normalized = String(value ?? '').replace(/[^\d.-]/g, '');
    const amount = Number(normalized);
    return Number.isFinite(amount) ? Math.max(0, amount) : 0;
}

function settlementReadPaymentAmount(id) {
    return settlementParsePaymentAmount(document.getElementById(id)?.value);
}

function settlementNormalizePaymentBreakdown(values = {}) {
    return SETTLEMENT_PAYMENT_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = settlementParsePaymentAmount(values[currency]);
        return acc;
    }, {});
}

function settlementPaymentBreakdownFromInputs() {
    return settlementNormalizePaymentBreakdown({
        PHP: settlementReadPaymentAmount('settlementStatusPaymentReceivedPhp'),
        USD: settlementReadPaymentAmount('settlementStatusPaymentReceivedUsd'),
        KRW: settlementReadPaymentAmount('settlementStatusPaymentReceivedKrw')
    });
}

function settlementPaymentBreakdownForRecord(record = {}) {
    if (record.receivedBreakdown && typeof record.receivedBreakdown === 'object') {
        return settlementNormalizePaymentBreakdown(record.receivedBreakdown);
    }
    const currency = SETTLEMENT_PAYMENT_CURRENCIES.includes(record.receivedCurrency) ? record.receivedCurrency : 'PHP';
    return settlementNormalizePaymentBreakdown({ [currency]: record.receivedAmount || 0 });
}

function settlementPaymentBreakdownTotal(values = {}) {
    const breakdown = settlementNormalizePaymentBreakdown(values);
    return SETTLEMENT_PAYMENT_CURRENCIES.reduce((sum, currency) => sum + Number(breakdown[currency] || 0), 0);
}

function settlementPaymentBreakdownPrimary(values = {}) {
    const breakdown = settlementNormalizePaymentBreakdown(values);
    const active = SETTLEMENT_PAYMENT_CURRENCIES.filter(currency => Number(breakdown[currency] || 0) > 0);
    if (active.length === 1) return { currency: active[0], amount: breakdown[active[0]] };
    return { currency: active.length > 1 ? 'MIXED' : 'PHP', amount: 0 };
}

function settlementFormatPaymentBreakdown(values = {}) {
    const breakdown = settlementNormalizePaymentBreakdown(values);
    const parts = SETTLEMENT_PAYMENT_CURRENCIES
        .filter(currency => Number(breakdown[currency] || 0) > 0)
        .map(currency => `${settlementCurrencyLabel(currency)} ${Number(breakdown[currency]).toLocaleString()}`);
    return parts.length ? parts.join(' · ') : settlementText('unpaidInput');
}

function settlementFormatPaymentCurrencyAmount(currency, amount) {
    const value = Number(amount || 0);

function settlementIso(value) {
    const text = String(value || '').trim();
    if (!text) return '';
    if (/^\d{4}-\d{2}-\d{2}/.test(text)) return text.slice(0, 10);
    const monthDay = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (monthDay) {
        const year = settlementTodayIso().slice(0, 4);
        return `${year}-${String(monthDay[1]).padStart(2, '0')}-${String(monthDay[2]).padStart(2, '0')}`;
    }
    return '';
}

function settlementTodayIso() {
    if (window.PmsDate?.todayIso) return window.PmsDate.todayIso();
    const now = new Date();
    return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
}

function settlementRoomNo(value) {
    if (!value) return '';
    return window.PmsMockApi?.roomNoFromId ? window.PmsMockApi.roomNoFromId(value) : String(value).split('-').pop();
}

function settlementDateValue(isoDate) {
    const iso = settlementIso(isoDate);
    if (!iso) return NaN;
    const [year, month, day] = iso.split('-').map(Number);
    return Date.UTC(year, month - 1, day);
}

function settlementDateShort(isoDate) {
    const iso = settlementIso(isoDate);
    if (!iso) return '';
    const [, month, day] = iso.split('-');
    return `${Number(month)}/${Number(day)}`;
}

function settlementAddDays(isoDate, days) {
    const iso = settlementIso(isoDate);
    if (!iso) return '';
    const [year, month, day] = iso.split('-').map(Number);
    const date = new Date(Date.UTC(year, month - 1, day + Number(days || 0)));
    return `${date.getUTCFullYear()}-${String(date.getUTCMonth() + 1).padStart(2, '0')}-${String(date.getUTCDate()).padStart(2, '0')}`;
}

function settlementMinDate(values) {
    return values.map(settlementIso).filter(Boolean).sort()[0] || '';
}

function settlementMaxDate(values) {
    return values.map(settlementIso).filter(Boolean).sort().slice(-1)[0] || '';
}

function settlementStaySummary(startDate, endDate, fallbackNights = 0, estimateEndDate = '') {
    let start = settlementIso(startDate);
    let end = settlementIso(endDate);
    const estimatedEnd = settlementIso(estimateEndDate);
    let nights = Number(fallbackNights || 0);
    if (!end && estimatedEnd && nights) end = estimatedEnd;
    if (!start && end && nights) start = settlementAddDays(end, -nights);
    if (start && !end && nights) end = settlementAddDays(start, nights);
    if (start && end) {
        const diff = Math.round((settlementDateValue(end) - settlementDateValue(start)) / 86400000);
        nights = Math.max(1, diff);
    }
    if (!nights && estimatedEnd) {
        start = settlementAddDays(estimatedEnd, -1);
        end = estimatedEnd;
        nights = 1;
        const days = nights + 1;
        const period = `${settlementDateShort(start)}~${settlementDateShort(end)}`;
        return {
            period,
            text: settlementText('stayEstimated', { period, nights, days }),
            nights,
            days,
            estimated: true
        };
    }
    if (!nights) return { period: '', text: settlementText('stayUnknown'), nights: 0, days: 0 };
    const days = nights + 1;
    const period = start && end ? `${settlementDateShort(start)}~${settlementDateShort(end)}` : '';
    return {
        period,
        text: period
            ? settlementText('stayText', { period, nights, days })
            : (settlementLang() === 'en' ? `${nights}N ${days}D` : `${nights}박 ${days}일`),
        nights,
        days,
        estimated: false
    };
}

function settlementRoomSortValue(room) {
    const text = String(room || '');
    if (text.toLowerCase() === 'group' || text.includes('단체')) return 900000;
    if (/ph/i.test(text)) return 200000 + Number((text.match(/\d+/) || [0])[0]);
    const digits = (text.match(/\d+/g) || ['0']).join('');
    return Number(digits || 0);
}

function settlementRoomLookupKey(value) {
    return String(value || '').toLowerCase().replace(/[^a-z0-9가-힣]/g, '');
}

function settlementRoomRecordFor(value) {
    const text = String(value || '').split(',')[0].trim();
    if (!text) return null;
    const keys = new Set([
        text,
        settlementRoomNo(text),
        text.replace(/\s+/g, '')
    ].map(settlementRoomLookupKey).filter(Boolean));
    return settlementState.rooms.find(room => [
        room.roomNo,
        room.roomId,
        room.id,
        room.displayName,
        settlementRoomNo(room.roomId || room.id)
    ].some(candidate => keys.has(settlementRoomLookupKey(candidate)))) || null;
}

function settlementInferFloor(value) {
    const text = String(value || '').trim();
    const room = settlementRoomRecordFor(text);
    if (room && Number(room.floor) > 0) return Number(room.floor);
    if (/^ph/i.test(text)) return 20;
    if (/^v[-\s]?\d+/i.test(text)) return 1;
    const digits = (text.match(/\d+/g) || []).join('');
    if (digits.length >= 4) return Number(digits.slice(0, -2).replace(/^0+(?=\d)/, '')) || 0;
    if (digits.length === 3) return Number(digits.slice(0, 1)) || 0;
    return 0;
}

function settlementFloorGroupForFolio(folio) {
    const floor = settlementInferFloor(folio.roomText || folio.room || folio.raw?.roomNo || folio.raw?.roomId);
    return {
        key: floor > 0 ? `floor-${floor}` : 'floor-unknown',
        label: floor > 0 ? settlementText('floor', { floor }) : settlementText('floorUnknown'),
        sort: floor > 0 ? floor : -1
    };
}

function settlementFloorGroups(rows) {
    const map = new Map();
    rows.forEach(folio => {
        const group = settlementFloorGroupForFolio(folio);
        if (!map.has(group.key)) map.set(group.key, { ...group, rows: [] });
        map.get(group.key).rows.push(folio);
    });
    return [...map.values()].sort((a, b) => b.sort - a.sort || a.label.localeCompare(b.label, 'ko', { numeric: true }));
}

function settlementChargeTypeKey(type) {
    const normalized = String(type || '').toLowerCase().replace(/[-_\s]/g, '');
    if (['car', 'rentacar', 'rentalcar', 'vehicle'].includes(normalized)) return 'rentacar';
    if (['restaurant', 'dining', 'foodbeverage', 'fnb'].includes(normalized)) return 'restaurant';
    if (['pos', 'minibar', 'retail', 'roomservice'].includes(normalized)) return 'pos';
    if (normalized === 'golf') return 'golf';
    if (normalized === 'room') return 'room';
    return normalized || 'other';
}

function settlementChargeTypeMeta(type) {
    const key = settlementChargeTypeKey(type);
    const meta = {
        room: { label: settlementText('room'), icon: 'fa-bed', order: 1 },
        pos: { label: settlementLang() === 'en' ? 'Integrated POS' : '통합 POS', icon: 'fa-cash-register', order: 2 },
        restaurant: { label: settlementLang() === 'en' ? 'Restaurant' : '음식점', icon: 'fa-utensils', order: 3 },
        golf: { label: settlementLang() === 'en' ? 'Golf Course' : '골프장', icon: 'fa-golf-ball-tee', order: 4 },
        rentacar: { label: settlementLang() === 'en' ? 'Rent-a-car' : '렌터카', icon: 'fa-car', order: 5 },
        other: { label: settlementLang() === 'en' ? 'Other' : '기타', icon: 'fa-tag', order: 99 }
    };
    return { key, ...(meta[key] || meta.other) };
}

function settlementChargeGroups(charges) {
    const groups = new Map();
    (charges || []).forEach(charge => {
        const meta = settlementChargeTypeMeta(charge.type);
        if (!groups.has(meta.key)) {
            groups.set(meta.key, { ...meta, amount: 0, count: 0, descriptions: [] });
        }
        const group = groups.get(meta.key);
        group.amount += settlementAmount(charge.amount);
        group.count += 1;
        if (charge.desc) group.descriptions.push(String(charge.desc));
    });
    return [...groups.values()].sort((a, b) => a.order - b.order || a.label.localeCompare(b.label));

        .filter(item => String(item.folioId || '') === String(folio.folioId || folio.id || ''))

function settlementNormalizeRoom(value) {
    const text = String(value || '').trim().toLowerCase();
    const compact = text.replace(/[^a-z0-9]/g, '');
    const tail = text.includes('-') ? text.split('-').pop() : text;
    const compactTail = tail.replace(/[^a-z0-9]/g, '');
    const digits = (text.match(/\d+/g) || []).join('');
    return {
        text,
        compact,
        tail,
        compactTail,
        digits,
        strippedDigits: digits.replace(/^0+(?=\d)/, ''),
        hasLetters: /[a-z]/.test(compact)
    };
}

function settlementSameRoom(left, right) {
    const a = settlementNormalizeRoom(left);
    const b = settlementNormalizeRoom(right);
    if (!a.text || !b.text) return false;
    const aKeys = [a.text, a.compact, a.tail, a.compactTail].filter(Boolean);
    const bKeys = new Set([b.text, b.compact, b.tail, b.compactTail].filter(Boolean));
    if (aKeys.some(key => bKeys.has(key))) return true;
    const sameDigits = a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits);
    return !!sameDigits && (!a.hasLetters || !b.hasLetters);
}

function settlementNormalizeName(value) {
    return String(value || '').trim().toLowerCase().replace(/\s+/g, ' ');
}

function fallbackReservationsForFolio(item, checkoutDate) {
    const roomCandidates = [item.roomNo, item.roomId, item.room].filter(Boolean);
    const guestCandidates = [item.ownerName, item.guestName].map(settlementNormalizeName).filter(Boolean);
    if (!roomCandidates.length && !guestCandidates.length) return [];
    const checkoutValue = settlementDateValue(checkoutDate || item.settlementDate || item.closedAt || item.issuedAt);
    const matches = settlementState.reservations
        .filter(res => {
            const roomMatch = !roomCandidates.length || roomCandidates.some(room =>
                settlementSameRoom(room, res.roomNo || res.room || res.fullRoom || res.roomId)
            );
            const guestValue = settlementNormalizeName(res.guestName || res.guest || res.roomingGuestName);
            const guestMatch = !guestCandidates.length || guestCandidates.includes(guestValue);
            return roomMatch && guestMatch;
        })
        .map(res => {
            const resCheckout = settlementDateValue(res.checkOutDate || res.checkout || res.cout);
            const distance = Number.isFinite(checkoutValue) && Number.isFinite(resCheckout)
                ? Math.abs(checkoutValue - resCheckout) / 86400000
                : 9999;
            return { res, distance };
        })
        .filter(item => item.distance <= 45 || !Number.isFinite(checkoutValue))
        .sort((a, b) => a.distance - b.distance);
    return matches.length ? [matches[0].res] : [];
}

function settlementReservationsForFolio(folio) {
    const ids = [
        folio?.reservationId,
        folio?.raw?.reservationId,
        ...(Array.isArray(folio?.raw?.reservationIds) ? folio.raw.reservationIds : [])
    ].filter(Boolean);
    let rows = reservationsByIds(ids);
    if (!rows.length) {
        rows = fallbackReservationsForFolio({
            ...(folio?.raw || {}),
            roomNo: folio?.raw?.roomNo || folio?.room,
            roomId: folio?.raw?.roomId || folio?.room,
            room: folio?.raw?.room || folio?.room,
            ownerName: folio?.raw?.ownerName || folio?.guest,
            guestName: folio?.raw?.guestName || folio?.guest
        }, folio?.checkoutDate);
    }
    return rows;
}

function settlementRoomKeysForFolio(folio) {
    const values = [
        folio?.room,
        folio?.roomText,
        folio?.raw?.room,
        folio?.raw?.roomNo,
        folio?.raw?.roomId,
        ...(Array.isArray(folio?.raw?.roomIds) ? folio.raw.roomIds : [])
    ];
    const keys = [];
    values.forEach(value => {
        String(value || '').split(',').forEach(part => {
            const text = part.trim();
            if (!text || text === '단체' || text.toLowerCase() === 'group') return;
            if (!keys.some(key => settlementSameRoom(key, text))) keys.push(text);
        });
    });
    return keys;
}

function settlementRoomsForFolio(folio) {
    const keys = settlementRoomKeysForFolio(folio);
    if (!keys.length) return [];
    return settlementState.rooms.filter(room => {
        const candidates = [room.roomNo, room.roomId, room.id, room.fullRoom, room.displayName, settlementRoomNo(room.roomId || room.id)];
        return keys.some(key => candidates.some(candidate => settlementSameRoom(key, candidate)));
    });
}

function settlementRoomApiId(room) {
    return room?.roomId || room?.id || room?.fullRoom || room?.roomNo || room?.number || '';
}

async function applySettlementCheckoutCompletion(folio, completedAt) {
    const reservations = settlementReservationsForFolio(folio);
    const rooms = settlementRoomsForFolio(folio);
    const completedBy = settlementCurrentOperator();
    reservations.forEach(res => {
        if (!res || ['cancelled', 'canceled', 'noshow'].includes(String(res.status || '').toLowerCase())) return;
        res.status = 'completed';
        res.checkoutCompleted = true;
        res.settlementCompleted = true;
        res.checkedOutAt = completedAt;
        res.settlementCompletedAt = completedAt;
        res.settlementCompletedBy = completedBy;
    });
    rooms.forEach(room => {
        room.status = 'vacant-dirty';
        room.frontStatus = 'vacant-dirty';
        room.occupancyStatus = 'vacant';
        room.housekeepingStatus = 'dirty';
        room.cleaningStatus = 'dirty';
        room.guestFlag = 'none';
        room.currentGuest = '';
        room.guest = '';
        room.reservationId = '';
    });
    if (reservations.length) localStorage.setItem('pms_reservations', JSON.stringify(settlementState.reservations));
    if (rooms.length) localStorage.setItem('pms_rooms', JSON.stringify(settlementState.rooms));
    try {
        if (window.PmsAPI?.saveRooms && rooms.length) await window.PmsAPI.saveRooms(settlementState.rooms);
        if (window.PmsMockApi) {
            await Promise.all([
                ...reservations.filter(res => res?.id).map(res =>
                    window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res })
                ),
                ...rooms.map(room => {
                    const id = settlementRoomApiId(room);
                    return id ? window.PmsMockApi.request('PATCH', `/rooms/${encodeURIComponent(id)}`, { body: room }) : Promise.resolve(null);
                })
            ]);
        }
    } catch(e) {
        console.warn('Settlement checkout completion sync failed', e);
    }
}

function mapSettlementFolio(item) {
    const charges = Array.isArray(item.charges) ? item.charges : [];
    const payments = Array.isArray(item.payments) ? item.payments : [];
    const folioId = item.folioId || item.id;
    const total = charges.reduce((sum, charge) => sum + settlementAmount(charge.amount), 0);
    let paid = payments.reduce((sum, payment) => sum + settlementAmount(payment.amount), 0);
    const depositPayments = payments.filter(payment => String(payment.method || payment.type || '').toLowerCase().includes('deposit'));
    let deposit = Number(item.depositAmount || 0) + depositPayments.reduce((sum, payment) => sum + settlementAmount(payment.amount), 0);
    let balance = settlementAmount(item.balance);
    if (!Number.isFinite(balance) || (!balance && String(item.status || '').toLowerCase() === 'open' && total > paid)) {
        balance = Math.max(total - paid, 0);
    }
    const localPayment = settlementLocalPaymentTotals(folioId);
    paid += localPayment.settlement;
    deposit += localPayment.deposit;
    balance = Math.max(balance - localPayment.settlement, 0);
    const reservationIds = [
        item.reservationId,
        ...(Array.isArray(item.reservationIds) ? item.reservationIds : [])
    ].filter(Boolean);
    const hasDirectReservationLink = reservationIds.length > 0;
    const initialCheckoutDate = settlementIso(item.checkOutDate || item.checkoutDate || item.checkout || item.settlementDate || item.closedAt || item.issuedAt);
    let linkedReservations = reservationsByIds(reservationIds);
    if (!linkedReservations.length && !reservationIds.length) linkedReservations = fallbackReservationsForFolio(item, initialCheckoutDate);
    const reservation = linkedReservations[0] || reservationById(item.reservationId || item.reservationIds?.[0]);
    const rawStatus = String(item.status || '').replace(/[-_\s]/g, '').toLowerCase();
    const rawCompleted = item.settlementCompleted || ['closed', 'paid', 'settled', 'completed', 'checkedout'].includes(rawStatus);
    const rawReopened = settlementReopenForFolio({ id: item.id || item.folioId, folioId, total, paid, balance, deposit });
    const status = balance > 0 ? 'unpaid' : (paid > total && total > 0 ? 'refund' : (rawCompleted && !rawReopened ? 'paid' : 'ready'));
    const roomList = Array.isArray(item.roomIds) ? item.roomIds.map(settlementRoomNo).filter(Boolean) : [];
    const isGroupFolio = item.folioType === 'group' || Boolean(item.groupId);
    const room = isGroupFolio
        ? '단체'
        : (item.roomNo || settlementRoomNo(item.roomId || item.room));
    const group = item.groupId ? settlementState.groups.find(g => g.id === item.groupId || g.eventId === item.groupId) : null;
    const stayStart = settlementMinDate([
        ...linkedReservations.map(res => res.checkInDate || res.checkin || res.cin),
        group?.checkInDate || group?.checkin
    ]);
    const stayEnd = settlementMaxDate([
        ...linkedReservations.map(res => res.checkOutDate || res.checkout || res.cout),
        group?.checkOutDate || group?.checkout
    ]);
    const itemCheckoutDate = settlementIso(item.checkOutDate || item.checkoutDate || item.checkout || item.settlementDate || item.closedAt || item.issuedAt);
    const checkoutDate = settlementIso(
        itemCheckoutDate ||
        (hasDirectReservationLink ? (reservation?.checkOutDate || reservation?.checkout) : '') ||
        stayEnd
    );
    const fallbackNights = linkedReservations
        .map(res => Number(res.nights || res.len || 0))
        .filter(value => Number.isFinite(value) && value > 0)
        .reduce((max, value) => Math.max(max, value), 0);
    const stay = settlementStaySummary(stayStart, stayEnd, fallbackNights, checkoutDate || initialCheckoutDate);
    const mapped = {
        id: item.id || item.folioId,
        folioId,
        reservationId: item.reservationId || item.reservationIds?.[0] || '',
        groupId: item.groupId || '',
        groupName: isGroupFolio ? (group?.name || item.companyName || item.ownerName || '') : (item.companyName || ''),
        folioType: item.folioType || (isGroupFolio ? 'group' : 'individual'),
        room,
        roomText: roomList.length ? roomList.join(', ') : room,
        guest: item.ownerName || item.guestName || reservation?.guestName || reservation?.guest || '-',
        checkoutDate,
        checkoutTime: settlementReservationCheckoutTime(reservation),
        stayStart,
        stayEnd,
        stayText: stay.text,
        stayNights: stay.nights,
        stayDays: stay.days,
        issuedDate: settlementIso(item.issuedAt),
        total,
        paid,
        balance,
        deposit,
        status,
        charges,
        tags: settlementServiceTags(charges),
        raw: item
    };
    const completion = settlementCompletionForFolio(mapped);
    return completion ? {
        ...mapped,
        status: 'paid',
        settlementCompleted: true,
        settlementCompletedAt: completion.completedAt || '',
        settlementCompletedBy: completion.completedBy || ''
    } : mapped;
}

function settlementIsTodayCheckout(folio) {
    return folio.checkoutDate === settlementTodayIso();
}

function settlementNeedsAction(folio) {
    return ['unpaid', 'ready'].includes(folio.status) && !folio.settlementCompleted;
}

function settlementIsActionable(folio) {
    return settlementIsTodayCheckout(folio) && settlementNeedsAction(folio);
}

function settlementIsOverdueUnpaid(folio) {
    return folio.status === 'unpaid' && folio.checkoutDate && folio.checkoutDate < settlementTodayIso();
}

function filterSettlementFolios() {
    const query = settlementState.query.trim().toLowerCase();
    let rows = settlementState.folios.filter(settlementIsTodayCheckout);
    if (settlementState.filter === 'all') rows = settlementState.folios.slice();
    if (settlementState.filter === 'unpaid') rows = settlementState.folios.filter(settlementIsOverdueUnpaid);
    if (settlementState.filter === 'ready') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && settlementNeedsAction(folio));
    if (settlementState.filter === 'completed') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && (folio.settlementCompleted || folio.status === 'paid'));
    if (settlementState.filter === 'deposit') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && folio.deposit > 0);
    if (settlementState.filter === 'group') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && (folio.folioType === 'group' || folio.groupId));
    if (settlementState.filter === 'refund') rows = settlementState.folios.filter(folio => settlementIsTodayCheckout(folio) && folio.status === 'refund');
    if (query) {
        rows = rows.filter(folio => [
            folio.id, folio.folioId, folio.room, folio.roomText, folio.guest, folio.groupName,
            folio.reservationId, folio.groupId, folio.status, settlementStatusInfo(folio).label,
            folio.stayText, folio.tags.join(' ')
        ].join(' ').toLowerCase().includes(query));
    }
    return rows.sort((a, b) => {
        if (settlementState.sort === 'balance') return b.balance - a.balance;
        if (settlementState.sort === 'checkout') return String(a.checkoutDate || '').localeCompare(String(b.checkoutDate || '')) || String(a.checkoutTime || '').localeCompare(String(b.checkoutTime || ''));
        if (settlementState.sort === 'status') return ['unpaid', 'ready', 'refund', 'paid'].indexOf(a.status) - ['unpaid', 'ready', 'refund', 'paid'].indexOf(b.status);
        return settlementRoomSortValue(a.roomText || a.room) - settlementRoomSortValue(b.roomText || b.room)
            || String(a.guest).localeCompare(String(b.guest));
    });
}

function renderSettlementKpis() {
    const todayCheckout = settlementState.folios.filter(settlementIsTodayCheckout);
    const unpaid = settlementState.folios.filter(settlementIsOverdueUnpaid);
    const need = todayCheckout.length;
    const balance = unpaid.reduce((sum, folio) => sum + Math.max(0, folio.balance), 0);
    const deposit = todayCheckout.reduce((sum, folio) => sum + Math.max(0, folio.deposit), 0);
    const group = todayCheckout.filter(folio => folio.folioType === 'group' || folio.groupId).length;
    document.getElementById('kpiNeed').textContent = need;
    document.getElementById('kpiBalance').textContent = settlementMoney(balance);
    document.getElementById('kpiDeposit').textContent = settlementMoney(deposit);
    document.getElementById('kpiGroup').textContent = group;
}

function settlementFilterCounts() {
    const todayCheckout = settlementState.folios.filter(settlementIsTodayCheckout);
    return {
        today: todayCheckout.length,
        unpaid: settlementState.folios.filter(settlementIsOverdueUnpaid).length,
        ready: todayCheckout.filter(settlementNeedsAction).length,
        completed: todayCheckout.filter(folio => folio.settlementCompleted || folio.status === 'paid').length,
        deposit: todayCheckout.filter(folio => folio.deposit > 0).length,

        refund: todayCheckout.filter(folio => folio.status === 'refund').length,

}

function settlementNormalizePaymentMethod(method, fallback = '') {
    const raw = String(method || fallback || '').trim().toLowerCase().replace(/[\s-]/g, '_');
    if (['cash', '현금'].includes(raw)) return 'cash';
    if (['card', 'credit_card', 'creditcard', '신용카드', '카드'].includes(raw)) return 'card';
    if (['bank', 'transfer', 'bank_transfer', 'banktransfer', 'account_transfer', 'wire', '계좌이체', '이체'].includes(raw)) return 'bank';
    if (['other', 'etc', '기타'].includes(raw)) return 'other';
    return raw ? 'other' : 'cash';
}

function settlementMethodLabel(method, fallback = '') {
    const normalized = settlementNormalizePaymentMethod(method, fallback);
    const methodKeys = { cash: 'methodCash', card: 'methodCard', bank: 'methodTransfer', other: 'methodOther' };
    return settlementText(methodKeys[normalized] || 'methodOther');
}

                    </div>

        <div class="payment-history">
            <div class="payment-history-head">
                <strong><i class="fa-solid fa-clock-rotate-left"></i>${settlementText('previousPaymentHistory')}</strong>
                <span>${settlementText('paymentHistoryCount', { count: records.length })}</span>

function settlementDetailRows(folio) {

        [settlementText('roomOrGroup'), folio.roomText || folio.room || '-'],
        [settlementText('stayPeriod'), folio.stayText || '-'],
        [settlementText('status'), settlementDetailStatus(folio).label],

function settlementDetailLinesHtml(folio) {

function settlementDetailHistoryHtml(folio) {
    const payments = settlementPaymentRecordsForFolio(folio.folioId || folio.id).map(item => {
        const method = settlementMethodLabel(item.method, item.methodLabel);
        return {
            at: item.createdAt,
            title: item.kind === 'deposit' ? settlementText('depositPayment') : settlementText('settlementPayment'),
            sub: [method, item.operator].filter(Boolean).join(' / '),
            note: item.note || '',
            amount: settlementFormatPaymentBreakdown(settlementPaymentBreakdownForRecord(item))
        };
    });
    const completion = settlementCompletionForFolio(folio);
    const rows = [
        ...payments,
        ...(completion ? [{
            at: completion.completedAt,
            title: settlementText('settlementCheckoutCompleted'),
            sub: completion.completedBy || '-',
            amount: settlementMoney(folio.paid)
        }] : [])
    ].sort((a, b) => String(b.at || '').localeCompare(String(a.at || '')));
    if (!rows.length) return `<div class="settlement-history-empty">${settlementText('noHistory')}</div>`;
    return rows.map(item => `
        <div class="settlement-history-item">
            <div class="settlement-history-time">${settlementEscape(settlementFormatDateTime(item.at))}</div>
            <div class="settlement-history-main">
                ${settlementEscape(item.title)}
                <span>${settlementEscape(item.sub || '-')}</span>
                ${item.note ? `<span class="payment-history-note"><b>${settlementText('memo')}</b>${settlementEscape(item.note)}</span>` : ''}
            </div>
            <div class="settlement-history-amount">${settlementEscape(item.amount)}</div>
        </div>
    `).join('');
}

function settlementStatementTitle(folio, groups) {
    if (folio.folioType === 'group' || folio.groupId) return settlementText('groupStatementTitle');
    if ((groups || []).length > 1) return settlementText('roomIntegratedStatementTitle');
    const type = groups?.[0]?.label || settlementText('room');
    return settlementText('statementTypeTitle', { type }) || settlementText('receiptTitle');
}

function settlementStatementScopeLabel(groups) {
    if ((groups || []).length > 1) return settlementText('statementIntegrated');
    const type = groups?.[0]?.label || settlementText('room');
    return settlementText('statementScoped', { type });
}

        charge.desc || meta.label

    return `${parts.join(' · ')}${source ? ` (${source})` : ''}`;

function openSettlementStatusPayment(folioId) {
    const folio = settlementFolioById(folioId);
    if (!folio) return;
    if (folio.settlementCompleted) {
        showToast(settlementText('completionAlready'), 'error');
        return;
    }
    settlementState.currentFolioId = folio.folioId || folio.id;
    applySettlementStaticI18n();
    const summary = document.getElementById('settlementStatusPaymentBalAmount');
    const method = document.getElementById('settlementStatusPaymentMethod');
    const note = document.getElementById('settlementStatusPaymentNote');
    const due = settlementParsePaymentAmount(folio.balance || 0);
    if (summary) summary.textContent = settlementText('paymentSummary', { due: settlementMoney(due), deposit: settlementMoney(folio.deposit) });
    if (method) method.value = 'cash';
    const depositToggle = document.getElementById('settlementStatusPaymentDepositToggle');
    if (depositToggle) depositToggle.checked = !due;
    SETTLEMENT_PAYMENT_CURRENCIES.forEach(currency => {
        const id = `settlementStatusPaymentReceived${currency === 'PHP' ? 'Php' : currency === 'USD' ? 'Usd' : 'Krw'}`;
        const input = document.getElementById(id);
        if (input) input.value = '';
    });
    const phpInput = document.getElementById('settlementStatusPaymentReceivedPhp');
    if (phpInput && due) phpInput.value = String(Math.round(due));
    if (note) note.value = '';
    const historyPanel = document.getElementById('settlementStatusPaymentHistoryPanel');
    if (historyPanel) historyPanel.innerHTML = settlementPaymentHistoryHtml(folio);
    closeModal('settlementStatusDetailModal');
    openModal('settlementStatusPaymentModal');
}

async function processSettlementStatusPayment(options = {}) {
    const folio = settlementFolioById(settlementState.currentFolioId);
    if (!folio) {
        showToast(settlementText('targetMissing'), 'error');
        return;
    }
    const receivedBreakdown = settlementPaymentBreakdownFromInputs();
    const receivedTotal = settlementPaymentBreakdownTotal(receivedBreakdown);
    const primaryReceived = settlementPaymentBreakdownPrimary(receivedBreakdown);
    const receivedPhp = Number(receivedBreakdown.PHP || 0);
    const isDeposit = !!document.getElementById('settlementStatusPaymentDepositToggle')?.checked;
    let amount = receivedPhp;
    if (!amount && receivedTotal > 0) amount = isDeposit ? receivedTotal : Number(folio.balance || 0);
    if (!amount) {
        showToast(settlementText('amountRequired'), 'error');
        return;
    }
    if (!receivedTotal) {
        showToast(settlementText('receivedRequired'), 'error');
        return;
    }
    const methodSelect = document.getElementById('settlementStatusPaymentMethod');
    const method = settlementNormalizePaymentMethod(methodSelect?.value || 'cash', methodSelect?.selectedOptions?.[0]?.textContent || '');
    const note = document.getElementById('settlementStatusPaymentNote')?.value?.trim() || '';
    if (method === 'other' && !note) {
        showToast(settlementText('otherMemoRequired'), 'error');
        return;
    }
    const methodLabel = settlementMethodLabel(method);
    const appliedPhpAmount = isDeposit ? amount : Math.min(amount, Number(folio.balance || 0));
    const records = settlementPaymentRecords();
    records.push({
        id: `PAY-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.folioId || folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        kind: isDeposit ? 'deposit' : 'settlement',
        method,
        methodLabel,
        baseCurrency: 'PHP',
        appliedPhpAmount,
        receivedCurrency: primaryReceived.currency,
        receivedAmount: primaryReceived.amount,
        receivedBreakdown,
        receivedSummary: settlementFormatPaymentBreakdown(receivedBreakdown),
        businessDate: settlementTodayIso(),
        createdAt: settlementNowIso(),
        operator: settlementCurrentOperator(),
        note
    });
    settlementSetStorageJson(SETTLEMENT_PAYMENTS_KEY, records);
    window.dispatchEvent(new CustomEvent('pms:settlement-payments-updated'));
    closeModal('settlementStatusPaymentModal');
    showToast(isDeposit ? settlementText('depositSaved') : settlementText('paymentSaved'), 'success');
    await loadSettlementData();
    renderSettlementSections();
    const folioKey = folio.folioId || folio.id;
    if (options.completeAfter) {
        const updated = settlementFolioById(folioKey);
        if (updated && Number(updated.balance || 0) <= 0) {
            await completeSettlementStatusFolio(folioKey, {
                skipConfirm: !!options.skipCompletionConfirm
            });
            return;
        }
        showToast(settlementText('completeAfterPaymentBlocked'), 'error');
    }
    openSettlementStatusDetail(folioKey);
}

async function completeSettlementStatusFromPayment() {
    const folio = settlementFolioById(settlementState.currentFolioId);
    if (!folio) {
        showToast(settlementText('targetMissing'), 'error');
        return;
    }
    const receivedTotal = settlementPaymentBreakdownTotal(settlementPaymentBreakdownFromInputs());
    if (Number(folio.balance || 0) > 0) {
        if (receivedTotal > 0) {
            const confirmed = await confirmSettlementCompletion(folio);
            if (!confirmed) return;
            await processSettlementStatusPayment({
                completeAfter: true,
                skipCompletionConfirm: true
            });
            return;
        }
        showToast(settlementText('completeBalanceFirst'), 'error');
        return;
    }
    const confirmed = await confirmSettlementCompletion(folio);
    if (!confirmed) return;
    closeModal('settlementStatusPaymentModal');
    await completeSettlementStatusFolio(folio.folioId || folio.id, { skipConfirm: true });
}

async function completeSettlementStatusFolio(folioId, options = {}) {
    const folio = settlementFolioById(folioId);
    if (!folio) {
        showToast(settlementText('targetMissing'), 'error');
        return false;
    }
    if (folio.settlementCompleted) {
        showToast(settlementText('completionAlready'), 'success');
        return false;
    }
    if (Number(folio.balance || 0) > 0) {
        showToast(settlementText('completeBlocked'), 'error');
        return false;
    }
    if (!options.skipConfirm) {
        const confirmed = await confirmSettlementCompletion(folio);
        if (!confirmed) return false;
    }
    const completedAt = settlementNowIso();
    const records = settlementCompletionRecords();
    records.push({
        id: `DONE-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.folioId || folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        total: Number(folio.total || 0),
        paid: Number(folio.paid || 0),
        bal: Number(folio.balance || 0),
        checkoutCompleted: true,
        roomNextStatus: 'dirty',
        signature: settlementFolioSignature(folio),
        businessDate: settlementTodayIso(),
        completedAt,
        completedBy: settlementCurrentOperator()
    });
    settlementSetStorageJson(SETTLEMENT_COMPLETIONS_KEY, records);
    await applySettlementCheckoutCompletion(folio, completedAt);
    window.dispatchEvent(new CustomEvent('pms:settlement-completions-updated'));
    showToast(settlementText('completionToast'), 'success');
    await refreshSettlementStatusAfterMutation(folio.folioId || folio.id);
    return true;
}

async function reopenSettlementStatusFolio(folioId) {
    const folio = settlementFolioById(folioId);
    if (!folio) {
        showToast(settlementText('targetMissing'), 'error');
        return false;
    }
    const confirmed = await window.showConfirm(settlementText('reopenConfirmMessage', {
        target: settlementCompletionTargetLabel(folio)
    }), {
        title: settlementText('reopenConfirmTitle'),
        okText: settlementText('reopenConfirmOk'),
        cancelText: settlementText('completeConfirmCancel')
    });
    if (!confirmed) return false;
    const folioKey = folio.folioId || folio.id;
    const signature = settlementFolioSignature(folio);
    const completions = settlementCompletionRecords().filter(item => String(item.folioId || '') !== String(folioKey));
    settlementSetStorageJson(SETTLEMENT_COMPLETIONS_KEY, completions);
    const reopens = settlementReopenRecords();
    reopens.push({
        id: `REOPEN-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folioKey,
        reservationId: folio.reservationId || '',
        groupId: folio.groupId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        signature,
        businessDate: settlementTodayIso(),
        reopenedAt: settlementNowIso(),
        reopenedBy: settlementCurrentOperator()
    });
    settlementSetStorageJson(SETTLEMENT_REOPENS_KEY, reopens);
    try {
        if (window.PmsMockApi && folio.raw?.id) {
            await window.PmsMockApi.request('PATCH', `/folios/${encodeURIComponent(folio.raw.id)}`, {
                body: { settlementCompleted: false, status: 'open' }
            });
        }
    } catch(e) {
        console.warn('Settlement reopen sync failed', e);
    }
    window.dispatchEvent(new CustomEvent('pms:settlement-completions-updated'));
    showToast(settlementText('reopenDone'), 'success');
    await refreshSettlementStatusAfterMutation(folioKey);
    return true;
}

async function refreshSettlementStatusAfterMutation(folioId) {
    await loadSettlementData();
    renderSettlementSections();
    const updated = settlementFolioById(folioId);
    if (updated) {
        settlementState.currentFolioId = updated.folioId || updated.id;
        closeModal('settlementStatusPaymentModal');
        renderSettlementStatusDetail(settlementState.currentFolioId);
        openModal('settlementStatusDetailModal');
    }
}

function renderSettlementSections() {
    applySettlementStaticI18n();
    renderSettlementKpis();
    renderSettlementChipCounts();
    const container = document.getElementById('settlementSections');
    const rows = filterSettlementFolios();
    if (!container) return;
    if (!rows.length) {
        container.innerHTML = `<div class="settlement-empty">${settlementText('noRows')}</div>`;
        return;
    }
    const groupRows = rows.filter(folio => folio.folioType === 'group' || folio.groupId);
    const individualRows = rows.filter(folio => !(folio.folioType === 'group' || folio.groupId));
    const sections = [];
    if (individualRows.length) {
        const floorHtml = settlementFloorGroups(individualRows).map(group => `
            <div class="settlement-floor-group" data-floor="${settlementEscape(group.key)}">
                <div class="settlement-floor-head">
                    <strong><i class="fa-solid fa-layer-group"></i>${settlementEscape(group.label)}</strong>
                    <span>${settlementText('items', { count: group.rows.length })}</span>
                </div>
                <div class="settlement-grid">${group.rows.map(settlementCard).join('')}</div>
            </div>
        `).join('');
        sections.push(`<section class="settlement-section">
            <h3 class="settlement-section-head"><i class="fa-solid fa-door-open"></i> ${settlementText('roomSettlement')} <span>${settlementText('items', { count: individualRows.length })}</span></h3>
            <div class="settlement-floor-list">${floorHtml}</div>
        </section>`);
    }
    if (groupRows.length) {
        sections.push(`<section class="settlement-section">
            <h3 class="settlement-section-head"><i class="fa-solid fa-users-line"></i> ${settlementText('groupSettlement')} <span>${settlementText('items', { count: groupRows.length })}</span></h3>
            <div class="settlement-grid">${groupRows.map(settlementCard).join('')}</div>
        </section>`);
    }
    container.innerHTML = sections.join('');
}

async function loadSettlementData() {
    const [foliosEnv, reservations, rooms, groups] = await Promise.all([
        window.PmsMockApi ? window.PmsMockApi.request('GET', '/folios') : Promise.resolve({ data: { items: [] } }),
        window.PmsAPI?.getReservations ? window.PmsAPI.getReservations().catch(() => []) : [],
        window.PmsAPI?.getAllRooms ? window.PmsAPI.getAllRooms().catch(() => []) : [],
        window.PmsAPI?.getGroups ? window.PmsAPI.getGroups().catch(() => []) : []
    ]);
    settlementState.reservations = reservations || [];
    settlementState.rooms = rooms || [];
    settlementState.groups = groups || [];
    settlementState.folios = (window.PmsMockApi?.items(foliosEnv) || []).map(mapSettlementFolio);
}

function applySettlementUrlParams() {
    const params = new URLSearchParams(location.search);
    const query = params.get('query') || params.get('room') || '';
    const status = params.get('status') || params.get('filter') || '';
    if (query) {
        settlementState.query = query;
        const input = document.getElementById('settlementSearch');
        if (input) input.value = query;
    }
    if (status && ['today', 'actionable', 'unpaid', 'ready', 'completed', 'deposit', 'group', 'refund', 'all'].includes(status)) {
        const normalizedStatus = status === 'actionable' ? 'today' : status;
        settlementState.filter = normalizedStatus;
        document.querySelectorAll('.settlement-chip').forEach(chip => chip.classList.toggle('active', chip.dataset.filter === normalizedStatus));
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    applySettlementStaticI18n();
    document.querySelectorAll('.settlement-chip').forEach(chip => {
        chip.addEventListener('click', () => {
            settlementState.filter = chip.dataset.filter || 'actionable';
            document.querySelectorAll('.settlement-chip').forEach(item => item.classList.toggle('active', item === chip));
            renderSettlementSections();
        });
    });
    const search = document.getElementById('settlementSearch');
    if (search) search.addEventListener('input', () => {
        settlementState.query = search.value || '';
        renderSettlementSections();
    });
    const sort = document.getElementById('settlementSort');
    if (sort) sort.addEventListener('change', () => {
        settlementState.sort = sort.value || 'room';
        renderSettlementSections();
    });
    await loadSettlementData();
    applySettlementUrlParams();
    renderSettlementSections();
});

window.addEventListener('languagechange', async () => {
    await loadSettlementData();
    renderSettlementSections();
    const detailModalOpen = document.getElementById('settlementStatusDetailModal')?.classList.contains('active');
    const paymentModalOpen = document.getElementById('settlementStatusPaymentModal')?.classList.contains('active');
    if (detailModalOpen) renderSettlementStatusDetail(settlementState.currentFolioId);
    if (paymentModalOpen) {
        applySettlementStaticI18n();
        const folio = settlementFolioById(settlementState.currentFolioId);
        const historyPanel = document.getElementById('settlementStatusPaymentHistoryPanel');
        if (historyPanel && folio) historyPanel.innerHTML = settlementPaymentHistoryHtml(folio);
        const summary = document.getElementById('settlementStatusPaymentBalAmount');
        if (summary && folio) {
            const due = settlementParsePaymentAmount(folio.balance || 0);
            summary.textContent = settlementText('paymentSummary', { due: settlementMoney(due), deposit: settlementMoney(folio.deposit) });
        }
    }
});
</script>
<script>
(function(){
    const originalReopenSettlementStatusFolio = window.reopenSettlementStatusFolio;
    if (typeof originalReopenSettlementStatusFolio !== 'function') return;
    window.reopenSettlementStatusFolio = async function(folioId) {
        if (!canReopenSettlementStatus()) {
            showToast(settlementLang() === 'en' ? 'Settlement reopen permission is required.' : '정산취소 권한이 필요합니다.', 'error');
            return;
        }
        return originalReopenSettlementStatusFolio(folioId);
    };
})();
</script>
