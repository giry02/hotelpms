<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F&B / POS - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/sidebar.js"></script>
</head>
<body>
<div class="main">
    <header class="topbar">
        <h1 data-i18n-key="POS"><i class="fa-solid fa-cash-register"></i> F&B / POS</h1>
    </header>
    <div class="content">
        
<div class="card" style="margin-bottom: 20px;">
    <div class="card-header">
        <h3 class="card-title">POS / F&B (식음료 및 리테일)</h3>
    </div>
    <div class="card-body">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
            <div style="border:1px solid var(--border);border-radius:4px;padding:16px">
                <h4 style="margin-bottom:12px;color:var(--primary)">상품/메뉴 등록</h4>
                <div style="display:flex;flex-direction:column;gap:10px">
                    <div style="display:flex; gap:8px;">
                        <button class="btn-outline" style="justify-content:space-between;flex-grow:1;" onclick="showToast('상품 추가됨')"><span>아메리카노 (Cafe)</span> <span>₩ 6,000</span></button>
                        <input type="number" class="form-input" style="width:70px;" value="1" min="1" title="수량">
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-outline" style="justify-content:space-between;flex-grow:1;" onclick="showToast('상품 추가됨')"><span>조식 뷔페 (Buffet)</span> <span>₩ 35,000</span></button>
                        <input type="number" class="form-input" style="width:70px;" value="1" min="1" title="수량">
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-outline" style="justify-content:space-between;flex-grow:1;" onclick="showToast('상품 추가됨')"><span>미니바 스낵 (Minibar)</span> <span>₩ 8,000</span></button>
                        <input type="number" class="form-input" style="width:70px;" value="1" min="1" title="수량">
                    </div>
                </div>
            </div>
            <div style="border:1px solid var(--border);border-radius:4px;padding:16px;background:#f8fafc">
                <h4 style="margin-bottom:12px;color:var(--primary)">결제 및 청구 (Payment/Charge)</h4>
                <div style="margin-bottom:12px">
                    <label style="font-size:0.8rem;font-weight:600;color:var(--txt2)">결제 수단</label>
                    <select class="form-select" style="margin-top:6px"><option>Room Charge (객실로 달아두기)</option><option>Credit Card (카드 결제)</option><option>Cash (현금)</option></select>
                </div>
                <div style="margin-bottom:12px">
                    <label style="font-size:0.8rem;font-weight:600;color:var(--txt2)">Room 번호 (Room Charge 시 필수)</label>
                    <div style="display:flex;gap:8px;margin-top:6px;">
                        <input type="text" class="form-input" placeholder="예: 1401" id="roomNumberInput" style="flex-grow:1;">
                        <button class="btn-outline-sm" onclick="validateGuest()"><i class="fa-solid fa-check"></i> 투숙객 확인</button>
                    </div>
                    <div id="guestValidationResult" style="font-size:0.85rem;margin-top:8px;color:var(--success);display:none;"><i class="fa-solid fa-circle-check"></i> 투숙객 확인 완료 (John Doe)</div>
                </div>
                <button class="btn-primary-sm" style="width:100%" onclick="showToast('객실 원장(Folio)에 반영되었습니다.')"><i class="fa-solid fa-receipt"></i> 결제/청구 완료</button>
            </div>
        </div>
    </div>
</div>

    </div>
</div>
<script>
function validateGuest() {
    const roomInput = document.getElementById('roomNumberInput').value;
    const resultDiv = document.getElementById('guestValidationResult');
    if (!roomInput) {
        showToast('Room 번호를 입력해주세요.', 'error');
        resultDiv.style.display = 'none';
        return;
    }
    // Mock validation
    resultDiv.style.display = 'block';
    resultDiv.innerHTML = '<i class="fa-solid fa-circle-check"></i> 투숙객 확인 완료 (Room ' + roomInput + ' - John Doe)';
}

document.addEventListener('DOMContentLoaded', () => {
    if(typeof setupI18n === 'function') setupI18n();
    if(typeof changeLang === 'function' && typeof currentLang !== 'undefined') changeLang(currentLang);
});
</script>
</body>
</html>
