function folioActionsHtml(folio, index, mode = 'table') {
    const isMobile = mode === 'mobile';
    const due = Number(folio.bal || 0);
    const receiveClass = isMobile ? 'act-btn' : 'btn-primary-sm';
    const completeClass = isMobile ? 'act-btn' : 'btn-complete-sm';
    const detailClass = isMobile ? 'act-btn' : 'btn-outline-sm btn-detail-sm';
    const receiveStyle = isMobile ? ' style="background:var(--primary);color:#fff"' : '';
    const completeStyle = isMobile ? ' style="background:var(--success);color:#fff"' : '';
    const receiveIcon = isMobile ? '<i class="fa-solid fa-credit-card"></i> ' : '';
    const completeIcon = isMobile ? '<i class="fa-solid fa-door-open"></i> ' : '<i class="fa-solid fa-door-open"></i> ';
    const detailIcon = isMobile ? '<i class="fa-solid fa-eye"></i> ' : '<i class="fa-solid fa-eye"></i> ';
    const folioIdArg = JSON.stringify(String(folio.id || '')).replace(/</g, '\\u003c');
    const buttons = [
        `<button class="${detailClass}" onclick="event.stopPropagation(); openSettlementDetailModal(${index})">${detailIcon}상세</button>`
    ];
    if (folio.settlementCompleted) {
        buttons.push('<span class="folio-action-status done"><i class="fa-solid fa-circle-check"></i> 완료됨</span>');
    } else if (due > 0) {
        buttons.push(`<button class="${receiveClass}"${receiveStyle} onclick='event.stopPropagation(); openPaymentModal(${folioIdArg}, ${due})'>${receiveIcon}수납</button>`);
    } else {
        buttons.push(`<button class="${completeClass}"${completeStyle} onclick='event.stopPropagation(); completeSettlementFolio(${folioIdArg}, { openDetail: false })'>${completeIcon}정산 완료</button>`);
    }
    return buttons.join('');
}

function folioStatusRank(status) {
    return {
        unpaid: 1,
        ready: 2,
        refund: 3,
        paid: 4,
        group: 5
    }[status] || 9;
}

function folioSortDateValue(folio) {
    return String(folio?.out || folio?.settlementDate || folio?.closedAt || '');
}

function sortFoliosForView(rows) {
    const sorted = [...rows];
    if (currentFolioSortMode === 'status') {
        return sorted.sort((a, b) =>
            folioStatusRank(a.status) - folioStatusRank(b.status)
            || String(a.id || '').localeCompare(String(b.id || ''))
        );
    }
    if (currentFolioSortMode === 'statusDesc') {
        return sorted.sort((a, b) =>
            folioStatusRank(b.status) - folioStatusRank(a.status)
            || String(a.id || '').localeCompare(String(b.id || ''))
        );
    }
    if (currentFolioSortMode === 'balanceDesc') {
        return sorted.sort((a, b) =>
            Number(b.bal || 0) - Number(a.bal || 0)
            || String(b.id || '').localeCompare(String(a.id || ''))
        );
    }
    return sorted.sort((a, b) =>
        folioSortDateValue(b).localeCompare(folioSortDateValue(a))
        || String(b.id || '').localeCompare(String(a.id || ''))
    );
}

function filteredFoliosForCurrentView() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const folios = periodFolios();
    const filtered = folios.filter(f => {
        const showUnpaidOnly = document.getElementById('chkUnpaid') ? document.getElementById('chkUnpaid').checked : false;
        if (currentDept === 'individual' && isGroupFolio(f)) return false;
        if (currentDept === 'group' && !isGroupFolio(f)) return false;
        if (showUnpaidOnly && f.bal <= 0) return false;
        if (currentStatusFilter !== 'all' && f.status !== currentStatusFilter) return false;
        const changeText = String(f.roomChangeText || roomChangeText(f.settlementRoomChanges || []) || '').toLowerCase();
        const haystack = [
            f.id,
            f.room,
            f.guest,
            f.groupName,
            f.companyName,
            f.group?.agency,
            f.group?.routing,
            f.groupRoomsText,
            folioServiceSummary(f),
            ...(f.sourceFolioIds || []),
            changeText
        ].join(' ').toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return true;
    });
    return sortFoliosForView(filtered);
}

function renderFolioPagination(totalCount) {
    const totalPages = Math.max(1, Math.ceil(totalCount / folioPageSize));
    folioCurrentPage = Math.min(Math.max(1, folioCurrentPage), totalPages);
    const startNo = totalCount ? ((folioCurrentPage - 1) * folioPageSize) + 1 : 0;
    const endNo = Math.min(totalCount, folioCurrentPage * folioPageSize);
    const info = document.getElementById('folioPageInfo');
    if (info) {
        info.textContent = folioUiLang() === 'en'
            ? `Total ${totalCount.toLocaleString()} items · Showing ${startNo.toLocaleString()}-${endNo.toLocaleString()}`
            : `총 ${totalCount.toLocaleString()}건 · ${startNo.toLocaleString()}-${endNo.toLocaleString()} 표시`;
    }
    const prev = document.getElementById('folioPrevPage');
    const next = document.getElementById('folioNextPage');
    if (prev) prev.disabled = folioCurrentPage <= 1;
    if (next) next.disabled = folioCurrentPage >= totalPages;

    const buttons = document.getElementById('folioPageButtons');
    if (!buttons) return;
    const pages = [];
    const windowSize = 5;
    let start = Math.max(1, folioCurrentPage - Math.floor(windowSize / 2));
    const end = Math.min(totalPages, start + windowSize - 1);
    start = Math.max(1, end - windowSize + 1);
    for (let page = start; page <= end; page += 1) pages.push(page);
    buttons.innerHTML = pages.map(page => `
        <button class="folio-page-btn${page === folioCurrentPage ? ' active' : ''}" onclick="goFolioPage(${page})">${page}</button>
    `).join('');
}

function applyFolioUrlFiltersFromParams() {
    const params = new URLSearchParams(window.location.search);
    const dept = params.get('dept');
    if (dept) {
        const btn = document.querySelector(`.filter-chips .dept-chip[onclick*="'${dept}'"]`);
        if (btn) {
            currentDept = dept;
            document.querySelectorAll('.filter-chips .dept-chip').forEach(c => c.classList.remove('active'));
            btn.classList.add('active');
        }
    }
    const status = (params.get('status') || '').toLowerCase();
    const receiveId = params.get('receive') || params.get('openPayment') || params.get('paymentFolio') || '';
    if (receiveId) {
        currentPeriod = params.get('period') || 'custom';
        if (currentPeriod === 'custom') {
            const startInput = document.getElementById('folioStartDate');
            const endInput = document.getElementById('folioEndDate');
            if (startInput) startInput.value = '2026-01-01';
            if (endInput) endInput.value = formatDateObject(CURRENT_FOLIO_DATE);
        }
        document.querySelectorAll('.filter-bar-mt .filter-chips .chip[onclick*="setKpiPeriod"]').forEach(button => {
            button.classList.toggle('active', button.getAttribute('onclick')?.includes(`'${currentPeriod}'`));
        });
        updateFolioPeriodControls();
    }
    if (['unpaid', 'ready', 'paid', 'refund'].includes(status)) {
        currentStatusFilter = status;
    }
    if (receiveId) {
        currentStatusFilter = 'unpaid';
    }
    setUnpaidFilter(currentStatusFilter === 'unpaid');
    syncFolioStatusFilterControl();
    const query = receiveId || params.get('query') || '';
    const searchInput = document.getElementById('searchInput');
    if (query && searchInput && searchInput.value !== query) {
        searchInput.value = query;
    }
    folioCurrentPage = 1;
}

function tryOpenPaymentFromUrl() {
    if (folioUrlPaymentOpened) return;
    const params = new URLSearchParams(window.location.search);
    const receiveId = params.get('receive') || params.get('openPayment') || params.get('paymentFolio') || '';
    if (!receiveId) return;
    applyFolioUrlFiltersFromParams();
    renderFolios();
    const target = visibleFolios.find(folio => folio.id === receiveId || (folio.sourceFolioIds || []).includes(receiveId));
    if (!target) return;
    folioUrlPaymentOpened = true;
    setTimeout(() => openPaymentModal(target.id, Number(target.bal || 0)), 80);
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function syncPaymentKindLabels() {
    const isDeposit = !!document.getElementById('paymentDepositToggle')?.checked;
    const submit = document.getElementById('paymentSubmitLabel');
    if (submit) submit.textContent = isDeposit ? '예치금 등록' : '수납 등록';
}

function parsePaymentAmount(value) {
    const normalized = String(value ?? '').replace(/[^\d.-]/g, '');
    const amount = Number(normalized);
    return Number.isFinite(amount) ? Math.max(0, amount) : 0;
}

function readPaymentAmount(id) {
    return parsePaymentAmount(document.getElementById(id)?.value);
}

function normalizePaymentBreakdown(values = {}) {
    return PAYMENT_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = parsePaymentAmount(values[currency]);
        return acc;
    }, {});
}

function paymentBreakdownFromInputs() {
    return normalizePaymentBreakdown({
        PHP: readPaymentAmount('paymentReceivedPhp'),
        USD: readPaymentAmount('paymentReceivedUsd'),
        KRW: readPaymentAmount('paymentReceivedKrw')
    });
}

function paymentBreakdownForRecord(record = {}) {
    if (record.receivedBreakdown && typeof record.receivedBreakdown === 'object') {
        return normalizePaymentBreakdown(record.receivedBreakdown);
    }
    const currency = PAYMENT_CURRENCIES.includes(record.receivedCurrency) ? record.receivedCurrency : 'PHP';
    return normalizePaymentBreakdown({ [currency]: record.receivedAmount || 0 });
}

function paymentBreakdownTotal(values = {}) {
    const breakdown = normalizePaymentBreakdown(values);
    return PAYMENT_CURRENCIES.reduce((sum, currency) => sum + Number(breakdown[currency] || 0), 0);
}

function paymentBreakdownPrimary(values = {}) {
    const breakdown = normalizePaymentBreakdown(values);
    const active = PAYMENT_CURRENCIES.filter(currency => Number(breakdown[currency] || 0) > 0);
    if (active.length === 1) return { currency: active[0], amount: breakdown[active[0]] };
    return { currency: active.length > 1 ? 'MIXED' : 'PHP', amount: 0 };
}

function formatPaymentBreakdown(values = {}) {
    const breakdown = normalizePaymentBreakdown(values);
    const parts = PAYMENT_CURRENCIES
        .filter(currency => Number(breakdown[currency] || 0) > 0)
        .map(currency => `${PAYMENT_CURRENCY_LABELS[currency] || currency} ${Number(breakdown[currency]).toLocaleString()}`);
    return parts.length ? parts.join(' · ') : '미입력';
}

function formatPaymentCurrencyAmount(currency, amount) {
    const value = Number(amount || 0);
    if (!value) return '-';
    const symbol = currency === 'USD' ? '$' : currency === 'KRW' ? '₩' : '₱';
    return `${symbol}${value.toLocaleString()}`;
}

function paymentCurrencyIcon(currency) {
    if (currency === 'USD') return 'fa-dollar-sign';
    if (currency === 'KRW') return 'fa-won-sign';
    return 'fa-peso-sign';
}

function normalizePaymentMethod(method, fallback = '') {
    const raw = String(method || fallback || '').trim().toLowerCase().replace(/[\s-]/g, '_');
    if (['cash', '현금'].includes(raw)) return 'cash';
    if (['card', 'credit_card', 'creditcard', '신용카드', '카드'].includes(raw)) return 'card';
    if (['bank', 'transfer', 'bank_transfer', 'banktransfer', 'account_transfer', 'wire', '계좌이체', '이체'].includes(raw)) return 'bank';
    if (['other', 'etc', '기타'].includes(raw)) return 'other';
    return raw ? 'other' : 'cash';
}

function paymentMethodLabel(methodOrRecord, fallback = '') {
    const rawMethod = typeof methodOrRecord === 'object' ? methodOrRecord.method : methodOrRecord;
    const rawFallback = typeof methodOrRecord === 'object' ? methodOrRecord.methodLabel : fallback;
    const normalized = normalizePaymentMethod(rawMethod, rawFallback);
    const isEnglish = (localStorage.getItem('pms_language') || localStorage.getItem('pms_lang') || 'ko').startsWith('en');
    const labels = isEnglish
        ? { cash: 'Cash', card: 'Credit Card', bank: 'Bank Transfer', other: 'Other' }
        : { cash: '현금', card: '신용카드', bank: '계좌이체', other: '기타' };
    return labels[normalized] || labels.other;
}

function paymentCurrencyCardsHtml(record) {
    const breakdown = paymentBreakdownForRecord(record);
    const method = paymentMethodLabel(record);
    return PAYMENT_CURRENCIES.map(currency => {
        const amount = Number(breakdown[currency] || 0);
        const active = amount > 0;
        return `
            <div class="payment-history-currency${active ? ' active' : ''}">
                <div class="payment-history-currency-label">
                    <span><i class="fa-solid ${paymentCurrencyIcon(currency)}"></i> ${PAYMENT_CURRENCY_LABELS[currency] || currency}</span>
                    <span>${active ? '수납' : '미입력'}</span>
                </div>
                <strong class="payment-history-currency-amount">${escapeHtml(formatPaymentCurrencyAmount(currency, amount))}</strong>
                <span class="payment-history-currency-method">${active ? escapeHtml(method) : '-'}</span>
            </div>
        `;
    }).join('');
}

function paymentHistoryHtml(folio) {
    const records = (Array.isArray(folio?.settlementPaymentRecords) ? folio.settlementPaymentRecords : [])
        .sort((a, b) => String(b.createdAt || '').localeCompare(String(a.createdAt || '')));
    const paidByRecords = records
        .filter(item => item.kind !== 'deposit')
        .reduce((sum, item) => sum + Number(item.appliedPhpAmount || 0), 0);
    const remaining = Number(folio?.bal || 0);
    const rows = records.length ? records.map(item => {
        const method = paymentMethodLabel(item);
        const meta = [method, item.operator].filter(Boolean).join(' / ') || '-';
        const note = item.note
            ? `<span class="payment-history-note"><b>메모</b>${escapeHtml(item.note)}</span>`
            : '';
        return `
        <div class="payment-history-row">
            <div class="payment-history-row-time">${escapeHtml(formatDateTime(item.createdAt))}</div>
            <div class="payment-history-row-main">
                <div class="payment-history-method">
                    <strong>${escapeHtml(item.kind === 'deposit' ? '예치금' : '정산 수납')} · ${escapeHtml(method)}</strong>
                    <span class="payment-history-meta">${escapeHtml(meta)}</span>
                    ${note}
                </div>
                <div class="payment-history-applied">
                    <span>${item.kind === 'deposit' ? '예치금' : '정산 반영'}</span>
                    <strong>${fmtInvoiceMoney(item.appliedPhpAmount)}</strong>
                </div>
            </div>
            <div class="payment-history-currencies" data-no-currency-normalize="true">${paymentCurrencyCardsHtml(item)}</div>
        </div>
    `;
    }).join('') : '<div class="payment-history-empty">아직 등록된 수납/예치 내역이 없습니다.</div>';
    return `
        <div class="payment-history">
            <div class="payment-history-head">
                <span><i class="fa-solid fa-clock-rotate-left"></i> 이전 수납/예치 내역</span>
                <span class="payment-history-total">${records.length}건</span>
            </div>
            <div class="payment-history-summary">
                <div class="payment-history-chip"><span>기록 수납</span><strong>${fmtInvoiceMoney(paidByRecords)}</strong></div>
                <div class="payment-history-chip"><span>현재 미수금</span><strong>${fmtInvoiceMoney(remaining)}</strong></div>
                <div class="payment-history-chip"><span>예치금</span><strong>${fmtInvoiceMoney(folioDepositValue(folio || {}))}</strong></div>
            </div>
            <div class="payment-history-list">${rows}</div>
        </div>
    `;
}

function settlementDetailStatus(folio) {
    const total = Number(folio?.total || 0);
    const paid = Number(folio?.paid || 0);
    const bal = Number(folio?.bal || 0);
    const deposit = folioDepositValue(folio);
    if (folio?.settlementCompleted) return { label: '완료됨', badge: 'success', icon: 'fa-circle-check' };
    if (bal > 0) return { label: '미수금 존재', badge: 'warning', icon: 'fa-triangle-exclamation' };
    if (paid > total) return { label: '환불 확인 필요', badge: 'danger', icon: 'fa-rotate-left' };
    if (deposit > 0) return { label: '예치금 확인 필요', badge: 'warning', icon: 'fa-vault' };
    return { label: '완료 대기', badge: 'ready', icon: 'fa-hourglass-half' };
}

function settlementRefundValue(folio) {
    return Math.max(Number(folio?.paid || 0) - Number(folio?.total || 0), 0);
}

function settlementDetailMetaRows(folio) {
    const group = isGroupFolio(folio) ? (folio.group || groupById(folio.groupId) || {}) : {};
    const rows = [
        ['정산 번호', folio.id || '-'],
        ['체크아웃일', formatDate(folio.out)],
        ['정산 대상', isGroupFolio(folio) ? (group.name || folio.guest || '-') : (folio.guest || '-')],
        ['객실/단체', isGroupFolio(folio) ? (folio.groupRoomsText || '단체') : (folio.room || '-')],
        ['포함 항목', folioServiceSummary(folio)],
        ['상태', settlementDetailStatus(folio).label]
    ];
    if (isGroupFolio(folio)) {
        rows.push(['업체', group.agency || group.companyName || folio.companyName || '-']);
        rows.push(['정산 방식', sanitizeSettlementRouting(group.routing || folio.routing)]);
    }
    if ((folio.sourceFolioIds || []).length) rows.push(['원천 Folio', (folio.sourceFolioIds || []).join(', ')]);
    if (folio.settlementCompletedAt) rows.push(['완료 일시', formatDateTime(folio.settlementCompletedAt)]);
    if (folio.settlementCompletedBy) rows.push(['완료 담당자', folio.settlementCompletedBy]);
    return rows;
}

function settlementDetailMetaHtml(folio) {
    return settlementDetailMetaRows(folio).map(([label, value]) => `
        <div class="settlement-detail-row">
            <span>${escapeHtml(label)}</span>
            <strong>${escapeHtml(value)}</strong>
        </div>
    `).join('');
}

function settlementDetailLinesHtml(folio) {
    const totals = folioDeptTotals(folio);
    const types = (folio.serviceTypes?.length ? folio.serviceTypes : folioServiceTypes(folio))
        .filter(type => Number(totals[type] || 0) !== 0)
        .sort((a, b) => deptSort(a) - deptSort(b));
    if (!types.length) {
        return '<div class="settlement-history-empty">청구 항목이 없습니다.</div>';
    }
    return types.map(type => `
        <div class="settlement-line-item">
            <div class="settlement-line-main">
                <i class="fa-solid ${deptIcon(type)}"></i>
                <span>${escapeHtml(deptLabel(type))}</span>
            </div>
            <div class="settlement-line-amount">${fmtMoney(totals[type], folio.currency)}</div>
        </div>
    `).join('');
}

function settlementDetailHistoryHtml(folio) {
    const records = Array.isArray(folio?.settlementPaymentRecords) ? [...folio.settlementPaymentRecords] : [];
    const completion = settlementCompletionForFolio(folio);
    const rows = [
        ...records.map(item => ({
            at: item.createdAt,
            title: item.kind === 'deposit' ? '예치금 수납' : '정산 수납',
            sub: [paymentMethodLabel(item), item.operator].filter(Boolean).join(' / '),
            note: item.note || '',
            amount: fmtInvoiceMoney(item.appliedPhpAmount),
            tone: item.kind === 'deposit' ? 'warning' : 'primary'
        })),
        ...(completion ? [{
            at: completion.completedAt,
            title: '정산 완료',
            sub: completion.completedBy || '-',
            amount: fmtInvoiceMoney(folio.paid),
            tone: 'success'
        }] : [])
    ].sort((a, b) => String(b.at || '').localeCompare(String(a.at || '')));
    if (!rows.length) return '<div class="settlement-history-empty">등록된 수납/예치/완료 이력이 없습니다.</div>';
    return rows.map(item => `
        <div class="settlement-history-item">
            <div class="settlement-history-time">${escapeHtml(formatDateTime(item.at))}</div>
            <div class="settlement-history-main">
                ${escapeHtml(item.title)}
                <span>${escapeHtml(item.sub || '-')}</span>
                ${item.note ? `<span class="payment-history-note"><b>메모</b>${escapeHtml(item.note)}</span>` : ''}
            </div>
            <div class="settlement-history-amount">${escapeHtml(item.amount)}</div>
        </div>
    `).join('');
}

function renderSettlementDetailModal() {
    const folio = visibleFolios[currentSettlementIndex];
    if (!folio) return;
    const status = settlementDetailStatus(folio);
    const deposit = folioDepositValue(folio);
    const refund = settlementRefundValue(folio);
    const body = document.getElementById('settlementDetailContent');
    const footer = document.getElementById('settlementDetailFooter');
    if (body) {
        body.innerHTML = `
            <div class="settlement-detail-summary">
                <div class="settlement-detail-card">
                    <span><i class="fa-solid fa-file-invoice-dollar"></i> 총 청구액</span>
                    <strong>${fmtMoney(folio.total, folio.currency)}</strong>
                </div>
                <div class="settlement-detail-card">
                    <span><i class="fa-solid fa-credit-card"></i> 수납액</span>
                    <strong>${fmtMoney(folio.paid, folio.currency)}</strong>
                </div>
                <div class="settlement-detail-card warning">
                    <span><i class="fa-solid fa-vault"></i> 예치금</span>
                    <strong>${fmtMoney(deposit, folio.currency)}</strong>
                </div>
                <div class="settlement-detail-card danger">
                    <span><i class="fa-solid fa-triangle-exclamation"></i> 미수금</span>
                    <strong>${fmtMoney(folio.bal, folio.currency)}</strong>
                </div>
                <div class="settlement-detail-card ${refund > 0 ? 'danger' : ''}">
                    <span><i class="fa-solid fa-rotate-left"></i> 환불금</span>
                    <strong>${fmtMoney(refund, folio.currency)}</strong>
                </div>
            </div>

            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid ${status.icon}" style="color:var(--primary)"></i> 정산 기본 정보</div>
                <div class="settlement-detail-grid">${settlementDetailMetaHtml(folio)}</div>
            </div>

            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid fa-layer-group" style="color:var(--primary)"></i> 청구 항목 요약</div>
                <div class="settlement-line-list">${settlementDetailLinesHtml(folio)}</div>
            </div>

            <div class="settlement-detail-section">
                <div class="settlement-detail-section-head"><i class="fa-solid fa-clock-rotate-left" style="color:var(--primary)"></i> 처리 이력</div>
                <div class="settlement-history-list">${settlementDetailHistoryHtml(folio)}</div>
            </div>
        `;

    if (footer) {
        const due = Number(folio.bal || 0);
        const paymentButton = !folio.settlementCompleted && due > 0
            ? '<button class="btn-primary-sm" onclick="openSettlementPaymentFromDetail()"><i class="fa-solid fa-credit-card"></i> 수납 등록</button>'
            : '';
        const completeButton = folio.settlementCompleted
            ? `<span class="settlement-completed-status"><i class="fa-solid fa-circle-check"></i> 완료됨</span>${canReopenSettlementDetail() ? '<button class="btn-outline" onclick="reopenSettlementFromDetail()"><i class="fa-solid fa-rotate-left"></i> 정산 미완료로 변경</button>' : ''}`
            : '<button class="btn-settlement-complete" onclick="completeSettlementFromDetail()"><i class="fa-solid fa-door-open"></i> 정산 완료</button>';
        footer.innerHTML = `
            <div class="settlement-detail-footer-left">
                <button class="btn-outline" onclick="closeModal('settlementDetailModal')">닫기</button>
                <button class="btn-outline" onclick="openInvoiceFromSettlementDetail()"><i class="fa-solid fa-file-invoice"></i> 고객용 명세서</button>
            </div>
            <div class="settlement-detail-footer-right">
                ${paymentButton}
                ${completeButton}
            </div>
        `;
    }
}

function openSettlementDetailModal(index) {
    currentSettlementIndex = index;
    renderSettlementDetailModal();
    openModal('settlementDetailModal');
}

function openInvoiceFromSettlementDetail() {
    const index = currentSettlementIndex;
    closeModal('settlementDetailModal');
    openInvoiceModal(index, 'all');
}

function openSettlementPaymentFromDetail() {
    const folio = visibleFolios[currentSettlementIndex];
    if (!folio) return;
    closeModal('settlementDetailModal');
    openPaymentModal(folio.id, Number(folio.bal || 0));
}

function completeSettlementFromDetail() {
    const folio = visibleFolios[currentSettlementIndex];
    if (!folio) return;
    completeSettlementFolio(folio.id, { openDetail: true });
}

async function reopenSettlementFromDetail() {
    const folio = visibleFolios[currentSettlementIndex];
    if (!folio) return;
    if (!await showConfirm(`[${folio.guest || folio.id}] 정산 완료 상태를 미완료로 변경할까요?`)) return;
    const beforeStatus = folio.settlementCompleted ? '완료됨' : (folio.status || '완료 대기');
    const records = settlementCompletionRecords().filter(item => item.folioId !== folio.id);
    saveSettlementCompletionRecords(records);
    const reopens = settlementReopenRecords();
    const reopenRecord = {
        id: `REOPEN-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.id,
        reservationId: folio.reservationId || '',
        groupId: folio.groupId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        signature: folioSettlementSignature(folio),
        businessDate: currentBusinessDate(),
        reopenedAt: window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString(),
        reopenedBy: currentOperatorName()
    };
    reopens.push(reopenRecord);
    setStorageJson(SETTLEMENT_REOPENS_KEY, reopens);
    logSettlementReopenAudit(folio, beforeStatus);
    window.dispatchEvent(new CustomEvent('pms:settlement-completions-updated'));
    showToast('정산 상태를 미완료로 되돌렸습니다.', 'success');
    renderFolios();
    reopenSettlementDetailForFolio(folio.id);
}

function reopenSettlementDetailForFolio(folioId) {
    const nextIndex = visibleFolios.findIndex(item => item.id === folioId);
    if (nextIndex < 0) return;
    currentSettlementIndex = nextIndex;
    renderSettlementDetailModal();
    openModal('settlementDetailModal');
}

function openPaymentModal(folioId, bal) {
    const folio = visibleFolios.find(item => item.id === folioId);
    if (folio?.settlementCompleted) {
        showToast('정산 완료 상태에서는 추가 수납할 수 없습니다. 금액 변경이 필요한 경우 정산 수정 후 다시 완료 처리해주세요.', 'error');
        return;
    }
    currentPaymentFolioId = folioId;
    const due = parsePaymentAmount(folio?.bal ?? bal ?? 0);
    document.getElementById('paymentBalAmount').innerText = `미수금 기준: ${fmtInvoiceMoney(due)} / 예치금: ${fmtInvoiceMoney(folioDepositValue(folio || {}))}`;
    document.getElementById('paymentHistoryPanel').innerHTML = paymentHistoryHtml(folio);
    PAYMENT_CURRENCIES.forEach(currency => {
        const id = `paymentReceived${currency === 'PHP' ? 'Php' : currency === 'USD' ? 'Usd' : 'Krw'}`;
        const input = document.getElementById(id);
        if (input) input.value = '';
    });
    const phpInput = document.getElementById('paymentReceivedPhp');
    if (phpInput && due) phpInput.value = String(Math.round(due));
    document.getElementById('paymentMethod').value = 'cash';
    const depositToggle = document.getElementById('paymentDepositToggle');
    if (depositToggle) depositToggle.checked = !due;
    document.getElementById('paymentNote').value = '';
    syncPaymentKindLabels();
    openModal('paymentModal');
}

function processPayment(options = {}) {
    const folio = visibleFolios.find(item => item.id === currentPaymentFolioId);
    if (!folio) {
        showToast('정산 대상을 찾지 못했습니다.', 'error');
        return;
    }
    if (folio.settlementCompleted) {
        showToast('이미 정산 완료된 Folio는 추가 수납할 수 없습니다.', 'error');
        closeModal('paymentModal');
        renderFolios();
        return;
    }
    const isDeposit = !!document.getElementById('paymentDepositToggle')?.checked;
    const kind = isDeposit ? 'deposit' : 'settlement';
    const balance = parsePaymentAmount(folio.bal);
    if (!isDeposit && !balance) {
        showToast('미수금이 없습니다. 정산 완료 버튼으로 마감 처리해주세요.', 'error');
        return;
    }
    const receivedBreakdown = paymentBreakdownFromInputs();
    const receivedTotal = paymentBreakdownTotal(receivedBreakdown);
    const primaryReceived = paymentBreakdownPrimary(receivedBreakdown);
    const receivedPhp = Number(receivedBreakdown.PHP || 0);
    let enteredPhp = receivedPhp;
    if (!enteredPhp && receivedTotal > 0) enteredPhp = isDeposit ? receivedTotal : balance;
    const appliedPhpAmount = isDeposit ? enteredPhp : Math.min(enteredPhp, balance);
    const methodSelect = document.getElementById('paymentMethod');
    const method = normalizePaymentMethod(methodSelect?.value || 'cash', methodSelect?.selectedOptions?.[0]?.textContent || '');
    const methodLabel = paymentMethodLabel(method);
    const note = document.getElementById('paymentNote')?.value?.trim() || '';
    if (!enteredPhp) {
        showToast(isDeposit ? '예치금으로 기록할 금액을 입력해주세요.' : '수납 금액을 입력해주세요.', 'error');
        return;
    }
    if (!receivedTotal) {
        showToast('실제 받은 금액을 페소/달러/원화 중 하나 이상 입력해주세요.', 'error');
        return;
    }
    if (method === 'other' && !note) {
        showToast('기타 결제수단은 메모를 입력해야 합니다.', 'error');
        return;
    }
    const records = settlementPaymentRecords();
    records.push({
        id: `PAY-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        kind,
        method,
        methodLabel,
        baseCurrency: 'PHP',
        appliedPhpAmount,
        receivedCurrency: primaryReceived.currency,
        receivedAmount: primaryReceived.amount,
        receivedBreakdown,
        receivedSummary: formatPaymentBreakdown(receivedBreakdown),
        completeSettlement: false,
        businessDate: currentBusinessDate(),
        createdAt: window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString(),
        operator: currentOperatorName(),
        note
    });
    saveSettlementPaymentRecords(records);
    closeModal('paymentModal');
    showToast(isDeposit ? '예치금 수납 내역이 저장되었습니다.' : '정산 수납 내역이 저장되었습니다.', 'success');
    renderFolios();
    if (options.completeAfter) {
        const updated = visibleFolios.find(item => item.id === folio.id);
        if (updated && Number(updated.bal || 0) <= 0) {
            completeSettlementFolio(updated.id, { openDetail: true });
            return;
        }
        showToast('미수금이 남아 있어 정산 완료 처리할 수 없습니다.', 'error');
        reopenSettlementDetailForFolio(folio.id);
        return;
    }
    reopenSettlementDetailForFolio(folio.id);
}

function completePaymentModalSettlement() {
    const folio = visibleFolios.find(item => item.id === currentPaymentFolioId);
    if (!folio) {
        showToast('정산 대상을 찾지 못했습니다.', 'error');
        return;
    }
    const receivedTotal = paymentBreakdownTotal(paymentBreakdownFromInputs());
    if (Number(folio.bal || 0) > 0) {
        if (receivedTotal > 0) {
            processPayment({ completeAfter: true });
            return;
        }
        showToast('미수금이 남아 있어 정산 완료 처리할 수 없습니다. 먼저 수납 금액을 입력해주세요.', 'error');
        return;
    }
    closeModal('paymentModal');
    completeSettlementFolio(folio.id, { openDetail: true });
}

function completeSettlementFolio(folioId, options = {}) {
    const folio = visibleFolios.find(item => item.id === folioId);
    if (!folio) {
        showToast('정산 대상을 찾지 못했습니다.', 'error');
        return;
    }
    if (folio.settlementCompleted) {
        showToast('이미 정산 완료된 Folio입니다.', 'success');
        return;
    }
    if (Number(folio.bal || 0) > 0) {
        showToast('미수금이 남아 있어 정산 완료 처리할 수 없습니다. 먼저 수납을 등록해주세요.', 'error');
        return;
    }
    const records = settlementCompletionRecords();
    const completion = {
        id: `DONE-${Date.now()}-${Math.random().toString(36).slice(2, 7)}`,
        folioId: folio.id,
        reservationId: folio.reservationId || '',
        room: folio.room || '',
        guest: folio.guest || '',
        total: Number(folio.total || 0),
        paid: Number(folio.paid || 0),
        bal: Number(folio.bal || 0),
        checkoutCompleted: true,
        roomNextStatus: 'dirty',
        signature: folioSettlementSignature(folio),
        businessDate: currentBusinessDate(),
        completedAt: window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString(),
        completedBy: currentOperatorName()
    };
    records.push(completion);
    saveSettlementCompletionRecords(records);
    folio.settlementCompleted = true;
    folio.settlementCompletedAt = completion.completedAt;
    folio.settlementCompletedBy = completion.completedBy;
    folio.status = 'paid';
    if (window.PmsPrivacyAudit?.log) {
        window.PmsPrivacyAudit.log('folio.settlement.complete', {
            folioId: folio.id,
            room: folio.room || '',
            guest: folio.guest || '',
            paid: completion.paid,
            businessDate: completion.businessDate
        });
    }
    showToast('정산/체크아웃 완료 처리되었습니다. 객실은 청소 필요 상태로 전환됩니다.', 'success');
    renderFolios();
    if (options.openDetail !== false) reopenSettlementDetailForFolio(folio.id);
}

document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});
</script>

        </div>
        <div class="modal-body payment-modal-body">
            <div class="payment-balance-summary" id="paymentBalAmount">
                미수금 기준: ₱0

            <div class="payment-form-panel">
                <div class="payment-method-grid">
                    <div class="payment-section-field">
                        <label>결제 수단</label>
                        <select id="paymentMethod">
                            <option value="cash" data-ko="현금" data-en="Cash">현금</option>
                            <option value="card" data-ko="신용카드" data-en="Credit Card">신용카드</option>
                            <option value="bank" data-ko="계좌이체" data-en="Bank Transfer">계좌이체</option>
                            <option value="other" data-ko="기타" data-en="Other">기타</option>
                        </select>
                    </div>
                    <label class="payment-deposit-toggle" title="예치금으로 보관할 수납이면 체크">
                        <input type="checkbox" id="paymentDepositToggle" onchange="syncPaymentKindLabels()">
                        예치금
                    </label>
                </div>
                <div class="payment-section-field">
                    <label>실제 받은 금액</label>
                    <div class="payment-currency-grid">
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-peso-sign"></i> 페소</label>
                            <input type="number" min="0" step="1" id="paymentReceivedPhp" data-no-currency-normalize="true" placeholder="0">
                        </div>
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-dollar-sign"></i> 달러</label>
                            <input type="number" min="0" step="1" id="paymentReceivedUsd" data-no-currency-normalize="true" placeholder="0">
                        </div>
                        <div class="payment-currency-field">
                            <label><i class="fa-solid fa-won-sign"></i> 원화</label>
                            <input type="number" min="0" step="1" id="paymentReceivedKrw" data-no-currency-normalize="true" placeholder="0">
                        </div>
                    </div>
                </div>
                <div class="payment-section-field">
                    <label>메모</label>
                    <input type="text" id="paymentNote" placeholder="예: 달러와 원화를 함께 수납, 금액 확인 완료" data-ko="예: 달러와 원화를 함께 수납, 금액 확인 완료" data-en="E.g. received USD and KRW together, amount confirmed">
                </div>
            </div>
            <div id="paymentHistoryPanel"></div>
        </div>
        <div class="modal-footer payment-modal-footer">
            <div class="payment-modal-footer-left">
                <button class="btn-outline" onclick="closeModal('paymentModal')">취소</button>
            </div>
            <div class="payment-modal-footer-right">
                <button class="btn-primary-sm" onclick="processPayment()"><i class="fa-solid fa-credit-card"></i> <span id="paymentSubmitLabel">수납 등록</span></button>
                <button class="btn-settlement-complete" onclick="completePaymentModalSettlement()"><i class="fa-solid fa-door-open"></i> 정산 완료</button>
            </div>
        </div>
    </div>
</div>

    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';

<script>
(function(){
    const originalReopenSettlementFromDetail = window.reopenSettlementFromDetail || (typeof reopenSettlementFromDetail === 'function' ? reopenSettlementFromDetail : null);
    if (!originalReopenSettlementFromDetail) return;
    window.reopenSettlementFromDetail = async function() {
        if (!canReopenSettlementDetail()) {
            showToast('정산취소 권한이 필요합니다.', 'error');
            return;
        }
        return originalReopenSettlementFromDetail();
    };
})();
</script>
