<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.folio-period-tools{display:flex;align-items:center;gap:10px;flex-wrap:wrap;min-width:0}
.folio-date-range{display:none;align-items:center;gap:8px;flex-wrap:wrap}
.folio-date-range.active{display:flex}
.folio-date-input{height:36px;border:1px solid var(--border);border-radius:8px;padding:0 10px;background:#fff;font-family:var(--font);font-size:.78rem;color:var(--txt);font-weight:700}
.folio-period-note{display:inline-flex;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:#f8fafc;border:1px solid var(--border2);color:var(--txt2);font-size:.74rem;font-weight:800;white-space:nowrap}
.folio-period-note i{color:var(--primary)}
#btnUnpaidToggle { margin-left: 0; border: 1px solid var(--danger); color: var(--danger); background: transparent; display: flex; align-items: center; gap: 6px; }
#btnUnpaidToggle.active { background: var(--danger) !important; color: #fff !important; }
.folio-table { table-layout: fixed; min-width: 1380px; }
.folio-table th, .folio-table td { overflow: hidden; text-overflow: ellipsis; vertical-align: top; }
.folio-table th:last-child,.folio-table td.folio-action-cell{width:230px}
.folio-table tbody tr.folio-group-row td { padding-top: 14px; padding-bottom: 14px; background: #fff; }
.folio-id-cell .folio-id-text { display: block; color: var(--txt2); font-family: 'Courier New', monospace; font-size: .76rem; white-space: nowrap; }
.folio-table .folio-room-cell{overflow:hidden;white-space:normal}
.folio-room-title{font-weight:900;line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folio-customer-cell{white-space:normal}
.folio-customer-line{display:flex;align-items:center;gap:6px;min-width:0}
.folio-tier-badge{width:20px;height:20px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 20px;font-size:.64rem;border:1px solid transparent}
.folio-tier-badge.diamond{background:#eff6ff;color:#2563eb;border-color:#bfdbfe}
.folio-tier-badge.platinum{background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe}
.folio-tier-badge.gold{background:#fffbeb;color:#d97706;border-color:#fde68a}
.folio-tier-badge.standard{background:#f8fafc;color:#64748b;border-color:#e2e8f0}
.folio-customer-name{display:block;font-weight:800;line-height:1.32;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folio-customer-line .folio-customer-name{min-width:0}
.folio-group-row .folio-customer-name{white-space:normal;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical}
.folio-date-cell,.folio-money-cell,.folio-status-cell{white-space:nowrap}
.folio-money-cell{font-weight:800;color:var(--txt)}
.folio-balance-cell{font-weight:800;white-space:nowrap}
.folio-table .folio-actions { --folio-action-height:32px; display: flex; flex-wrap: nowrap; gap: 6px; justify-content: flex-start; align-items: center; min-width: 210px; max-width: 220px; }
.folio-table .folio-actions .btn-outline-sm,
.folio-table .folio-actions .btn-primary-sm,
.folio-table .folio-actions .btn-complete-sm,
.folio-table .folio-actions .folio-action-status {
    box-sizing:border-box;
    height:var(--folio-action-height);
    min-height:var(--folio-action-height);
    max-height:var(--folio-action-height);
    padding:0 6px;
    align-items:center;
    justify-content:center;
    line-height:1;
    font-size:.7rem;
}
.folio-table .folio-actions .btn-outline-sm,
.folio-table .folio-actions .btn-primary-sm,
.folio-table .folio-actions .folio-action-status { width: 58px; }
.folio-table .folio-actions .btn-complete-sm{width:76px}
.folio-table .folio-actions .btn-detail-sm{width:58px}
.folio-group-row .folio-actions{min-width:210px;max-width:220px;gap:6px}
.folio-group-row .folio-actions .btn-outline-sm,
.folio-group-row .folio-actions .btn-primary-sm,
.folio-group-row .folio-actions .btn-complete-sm,
.folio-group-row .folio-actions .folio-action-status{padding:0 6px;font-size:.7rem}
.folio-status-tools{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.folio-status-select{height:38px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.78rem;font-weight:800;padding:0 32px 0 11px;min-width:136px}
.folio-status-select:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.btn-complete-sm{border:1px solid var(--success);background:var(--success);color:#fff;border-radius:6px;font-family:var(--font);font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:all .15s}
.btn-complete-sm:hover{filter:brightness(.96)}
.btn-complete-sm:disabled,.btn-primary-sm:disabled{cursor:not-allowed;opacity:.48;filter:grayscale(.1)}
.folio-action-status{display:inline-flex;align-items:center;gap:5px;border-radius:6px;font-family:var(--font);font-weight:900;white-space:nowrap}
.folio-action-status.done{border:1px solid rgba(5,150,105,.24);background:var(--success-lt);color:var(--success)}
.status-badge.success{background:var(--success-lt);color:var(--success)}
.status-badge.warning{background:var(--warning-lt);color:#92400e}
.status-badge.danger{background:var(--danger-lt);color:var(--danger)}
.status-badge.ready{background:var(--primary-lt);color:var(--primary-dk)}
.folio-status-cell .status-badge{display:inline-flex;max-width:100%;overflow:hidden;text-overflow:ellipsis}
.folio-action-placeholder { visibility: hidden; pointer-events: none; }
.folio-mobile-actions { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 6px; margin-top: 10px; min-height: 36px; }
.folio-mobile-actions .act-btn,
.folio-mobile-actions .folio-action-status{font-size:0;gap:0;overflow:hidden}
.folio-mobile-actions .act-btn i,
.folio-mobile-actions .folio-action-status i{font-size:.8rem}
#folioMobile .m-res-top > div:first-child { min-width: 0; }
#folioMobile .m-res-name { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 210px; }
.folio-room-change-badge{display:inline-flex;align-items:center;gap:4px;margin-top:4px;padding:3px 7px;border-radius:999px;background:#fff7ed;color:#b45309;border:1px solid #fde68a;font-size:.66rem;font-weight:900;white-space:nowrap;max-width:100%;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis}
.folio-room-change-badge i{font-size:.62rem}
.folio-service-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.folio-service-tag{display:inline-flex;align-items:center;gap:4px;padding:2px 6px;border-radius:999px;background:#f8fafc;border:1px solid var(--border);font-size:.64rem;font-weight:900;color:var(--txt2);white-space:nowrap}
.folio-service-tag i{font-size:.58rem;color:var(--primary)}
.folio-source-count{display:inline-flex;align-items:center;margin-top:4px;font-size:.66rem;font-weight:800;color:var(--txt3)}
.folio-table td.folio-total-cell{overflow:visible}
.folio-total-cell .folio-breakdown{margin-top:0}
.folio-group-chip{display:inline-flex;align-items:center;gap:5px;margin-top:5px;padding:3px 8px;border-radius:999px;background:#eef2ff;color:#4338ca;border:1px solid #c7d2fe;font-size:.66rem;font-weight:900;white-space:nowrap;max-width:100%;box-sizing:border-box;overflow:hidden;text-overflow:ellipsis}
.folio-group-meta{display:grid;gap:5px;margin-top:6px;color:var(--txt3);font-size:.7rem;font-weight:800;line-height:1.35}
.folio-group-meta span{display:inline-flex;align-items:center;gap:5px;min-width:0;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.folio-group-meta i{width:12px;text-align:center;color:var(--primary)}
.folio-group-manage-link{display:inline-flex;align-items:center;gap:5px;width:max-content;max-width:100%;margin-top:2px;color:var(--primary);font-size:.7rem;font-weight:900;text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.folio-group-manage-link:hover{text-decoration:underline}
.folio-breakdown{display:grid;gap:5px;margin-top:8px;min-width:190px}
.folio-group-row .folio-breakdown{min-width:220px;max-width:250px;gap:6px}
.folio-breakdown-row{display:grid;grid-template-columns:minmax(78px,1fr) auto;align-items:center;gap:8px;padding:5px 8px;border:1px solid var(--border2);border-radius:7px;background:#f8fafc;font-size:.68rem}
.folio-group-row .folio-breakdown-row{padding:6px 10px;font-size:.72rem}
.folio-breakdown-row.total{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8;font-weight:900}
.folio-breakdown-label{display:inline-flex;align-items:center;gap:5px;min-width:0;font-weight:900;color:var(--txt2);white-space:nowrap}
.folio-breakdown-row.total .folio-breakdown-label{color:#1d4ed8}
.folio-breakdown-label i{width:12px;text-align:center;color:var(--primary)}
.folio-breakdown-amount{font-weight:900;color:var(--txt);white-space:nowrap}
.folio-breakdown-row.total .folio-breakdown-amount{color:#1d4ed8}
.invoice-scope-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
.invoice-scope-tab{height:30px;padding:0 10px;border:1px solid var(--border);border-radius:999px;background:#fff;color:var(--txt2);font-size:.72rem;font-weight:900;font-family:var(--font);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
.invoice-scope-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.invoice-hotel-info{font-family:var(--font);text-align:center;border-bottom:1px solid var(--border2);padding-bottom:14px;margin-bottom:18px;color:var(--txt2);font-size:.76rem;line-height:1.55}
.invoice-hotel-name{font-size:1.08rem;font-weight:900;color:var(--txt);margin-bottom:4px}
.invoice-subtitle{font-family:var(--font);font-size:.78rem;color:var(--txt2);text-align:center;margin-top:-10px;margin-bottom:14px;font-weight:800}
.invoice-payment-section{font-family:var(--font);margin-top:12px}
.invoice-payment-title{display:flex;align-items:center;gap:7px;font-size:.9rem;font-weight:900;margin-bottom:7px;color:var(--txt)}
.invoice-payment-note{font-size:.72rem;color:var(--txt3);font-weight:700;margin-bottom:8px;line-height:1.45}
.invoice-payment-table{width:100%;border-collapse:collapse;border:1px solid var(--border2);border-radius:8px;overflow:hidden;font-size:.72rem;table-layout:fixed}
.invoice-payment-table th,.invoice-payment-table td{padding:7px 8px;border-bottom:1px solid var(--border2);text-align:left;vertical-align:top;line-height:1.35;overflow-wrap:anywhere}
.invoice-payment-table th{background:#f8fafc;color:var(--txt2);font-weight:900;white-space:normal}
.invoice-payment-table tr:last-child td{border-bottom:0}
.invoice-payment-php{text-align:right;white-space:nowrap;font-weight:900}
.invoice-payment-actual{font-weight:800;color:var(--primary)}
.invoice-payment-empty{border:1px dashed var(--border2);border-radius:8px;padding:10px;color:var(--txt3);font-size:.76rem;font-weight:800;background:#f8fafc}
.payment-currency-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.payment-currency-field{display:flex;flex-direction:column;gap:5px}
.payment-currency-field label{display:inline-flex;align-items:center;gap:5px;font-size:.76rem;font-weight:900;color:var(--txt2)}
.payment-currency-field input{height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);width:100%;box-sizing:border-box}
.payment-help{font-size:.7rem;color:var(--txt3);font-weight:700;line-height:1.45}
.payment-method-grid{display:grid;grid-template-columns:minmax(0,1fr) 132px;gap:10px;align-items:end}
.payment-deposit-toggle{height:38px;display:flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt2);font-size:.78rem;font-weight:900;cursor:pointer;user-select:none}
.payment-deposit-toggle input{width:16px;height:16px;accent-color:var(--primary);cursor:pointer}
.payment-deposit-toggle:has(input:checked){background:var(--primary-lt);border-color:rgba(59,130,246,.32);color:var(--primary)}
.payment-history{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px;display:flex;flex-direction:column;gap:10px}
.payment-history-head{display:flex;align-items:center;justify-content:space-between;gap:10px;font-size:.82rem;font-weight:900;color:var(--txt)}
.payment-history-total{font-size:.74rem;font-weight:900;color:var(--primary);white-space:nowrap}
.payment-history-summary{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
.payment-history-chip{border:1px solid var(--border);background:#fff;border-radius:8px;padding:7px 8px;min-width:0}
.payment-history-chip span{display:block;font-size:.66rem;font-weight:800;color:var(--txt3);margin-bottom:3px}
.payment-history-chip strong{display:block;font-size:.78rem;font-weight:900;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.payment-history-list{display:grid;gap:8px;max-height:220px;overflow:auto;padding-right:2px}
.payment-history-row{display:grid;grid-template-columns:86px minmax(0,1fr);gap:8px 12px;align-items:start;border:1px solid var(--border);border-radius:10px;background:#fff;padding:10px}
.payment-history-row-time{font-size:.68rem;font-weight:900;color:var(--txt3);line-height:1.45}
.payment-history-row-main{min-width:0;display:flex;align-items:flex-start;justify-content:space-between;gap:12px;font-size:.78rem;font-weight:900;color:var(--txt);line-height:1.35}
.payment-history-method{display:grid;gap:3px;min-width:0}
.payment-history-method strong{font-size:.82rem;font-weight:900;color:var(--txt)}
.payment-history-method span{display:block;color:var(--txt2);font-size:.7rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.payment-history-applied{flex:0 0 auto;text-align:right;color:var(--primary)}
.payment-history-applied span{display:block;font-size:.62rem;font-weight:900;color:var(--txt3);margin-bottom:2px}
.payment-history-applied strong{display:block;font-size:1.02rem;font-weight:950;line-height:1.15}
.payment-history-currencies{grid-column:1 / -1;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px}
.payment-history-currency{min-width:0;border:1px solid var(--border2);border-radius:9px;background:#f8fafc;padding:8px 9px}
.payment-history-currency.active{background:#eff6ff;border-color:#bfdbfe}
.payment-history-currency-label{display:flex;align-items:center;justify-content:space-between;gap:6px;font-size:.66rem;font-weight:900;color:var(--txt3);margin-bottom:3px}
.payment-history-currency-label i{color:var(--primary)}
.payment-history-currency-amount{display:block;font-size:.95rem;font-weight:950;color:var(--txt);line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.payment-history-currency-method{display:block;margin-top:3px;font-size:.62rem;font-weight:900;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.payment-history-empty{border:1px dashed var(--border);border-radius:8px;background:#fff;padding:10px;font-size:.74rem;font-weight:800;color:var(--txt3);text-align:center}
.payment-modal-card{max-width:640px!important;width:95vw;display:flex;flex-direction:column;max-height:90vh}
.payment-modal-body{padding:18px 20px;display:flex;flex-direction:column;gap:14px;overflow-y:auto;min-height:0;background:#fff}
.payment-balance-summary{background:#fff7ed;color:#b45309;padding:11px 12px;border:1px solid #fed7aa;border-radius:9px;text-align:center;font-weight:900;font-size:.96rem}
.payment-form-panel{border:1px solid var(--border2);border-radius:12px;background:#fff;padding:14px;display:flex;flex-direction:column;gap:14px}
.payment-section-field{display:flex;flex-direction:column;gap:6px}
.payment-section-field label{font-size:.78rem;font-weight:850;color:var(--txt2)}
.payment-section-field input,.payment-section-field select{height:38px;border:1px solid var(--border);border-radius:8px;padding:0 10px;font-family:var(--font);width:100%;box-sizing:border-box;background:#fff}
.payment-modal-footer{padding:16px 20px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.payment-modal-footer-left,.payment-modal-footer-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.payment-modal-footer button,
.settlement-detail-footer button,
#invoiceModal .modal-footer button,
.settlement-detail-footer .settlement-completed-status{
    box-sizing:border-box;
    height:36px;
    min-height:36px;
    max-height:36px;
    padding:0 14px;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    line-height:1;
    font-size:.78rem;
}
.payment-history{max-height:320px;overflow-y:auto}
.payment-history-list{max-height:none;overflow:visible;padding-right:0}
.payment-history-meta{display:block;color:var(--txt2);font-size:.7rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.payment-history-note{display:block;margin-top:2px;color:var(--txt2);font-size:.7rem;font-weight:800;line-height:1.35;white-space:normal;overflow-wrap:anywhere}
.payment-history-note b{color:var(--txt3);font-weight:900;margin-right:4px}
.settlement-detail-modal{max-width:860px;width:95vw}
.settlement-detail-body{padding:20px;display:grid;gap:16px;background:#fff}
.settlement-detail-summary{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:10px}
.settlement-detail-card{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px;min-width:0}
.settlement-detail-card span{display:flex;align-items:center;gap:6px;color:var(--txt3);font-size:.72rem;font-weight:900;margin-bottom:6px;white-space:nowrap}
.settlement-detail-card strong{display:block;color:var(--txt);font-size:1rem;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.settlement-detail-card.danger strong{color:var(--danger)}
.settlement-detail-card.warning strong{color:#b45309}
.settlement-detail-section{border:1px solid var(--border2);border-radius:12px;background:#fff;overflow:visible}
.settlement-detail-section-head{padding:12px 14px;background:#f8fafc;border-bottom:1px solid var(--border2);font-size:.86rem;font-weight:950;color:var(--txt);display:flex;align-items:center;gap:8px}
.settlement-detail-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:0;overflow:visible}
.settlement-detail-row{display:grid;grid-template-columns:120px minmax(0,1fr);gap:10px;align-items:center;min-height:42px;padding:10px 14px;border-bottom:1px solid var(--border2);font-size:.78rem;line-height:1.45;box-sizing:border-box}
.settlement-detail-row:nth-last-child(-n+2){border-bottom:0}
.settlement-detail-row span{color:var(--txt3);font-weight:900}
.settlement-detail-row strong{color:var(--txt);font-weight:850;overflow-wrap:anywhere}
.settlement-line-list{display:grid;gap:8px;padding:12px}
.settlement-line-item{display:grid;grid-template-columns:minmax(0,1fr) auto;align-items:center;gap:12px;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px}
.settlement-line-main{display:flex;align-items:center;gap:8px;min-width:0;color:var(--txt2);font-size:.78rem;font-weight:900}
.settlement-line-main i{color:var(--primary);width:16px;text-align:center}
.settlement-line-amount{font-size:.82rem;font-weight:950;color:var(--txt);white-space:nowrap}
.settlement-history-list{display:grid;gap:8px;padding:12px;max-height:220px;overflow:auto}
.settlement-history-item{display:grid;grid-template-columns:112px minmax(0,1fr) auto;gap:10px;align-items:start;border:1px solid var(--border2);border-radius:9px;background:#fff;padding:10px 12px;font-size:.76rem}
.settlement-history-time{color:var(--txt3);font-weight:900;line-height:1.35}
.settlement-history-main{min-width:0;color:var(--txt);font-weight:850;line-height:1.45}
.settlement-history-main span{display:block;color:var(--txt3);font-size:.7rem;font-weight:800;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.settlement-history-amount{text-align:right;color:var(--primary);font-weight:950;white-space:nowrap}
.settlement-history-empty{padding:18px;text-align:center;color:var(--txt3);font-size:.78rem;font-weight:850;border:1px dashed var(--border);border-radius:9px;background:#fbfdff}
.settlement-detail-footer{padding:16px 20px;border-top:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:12px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)}
.settlement-detail-footer-left,.settlement-detail-footer-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.btn-settlement-complete{border:1px solid #059669;background:#059669;color:#fff;border-radius:6px;font-family:var(--font);font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px;height:36px;padding:0 14px;transition:all .15s}
.btn-settlement-complete:hover{filter:brightness(.96)}
.btn-settlement-complete:disabled{opacity:.5;cursor:not-allowed;filter:grayscale(.1)}
.settlement-completed-status{height:36px;display:inline-flex;align-items:center;gap:6px;padding:0 14px;border:1px solid #bbf7d0;border-radius:6px;background:#ecfdf5;color:#047857;font-family:var(--font);font-size:.78rem;font-weight:900;white-space:nowrap}
.folio-pagination{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-top:14px;padding:12px 14px;border:1px solid var(--border);border-radius:12px;background:#fff}
.folio-page-info{font-size:.78rem;font-weight:800;color:var(--txt2)}
.folio-page-controls{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
.folio-page-buttons{display:flex;align-items:center;gap:5px}
.folio-page-btn{min-width:34px;height:34px;padding:0 9px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.78rem;font-weight:900;cursor:pointer}
.folio-page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.folio-page-btn:disabled{opacity:.45;cursor:not-allowed}
.folio-page-size{height:34px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.76rem;font-weight:800;padding:0 8px}
@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-direction: column; align-items: stretch; overflow: visible; gap: 10px; }
    .filter-left > div { width: 100%; min-width: 0; }
    .filter-left > div[style*="display:flex"]:not(.filter-chips) { display: flex !important; gap: 8px; }
    .filter-left > div[style*="display:flex"]:not(.filter-chips) .btn-primary-sm { flex: 0 0 82px; justify-content: center; padding-inline: 10px !important; }
    .filter-chips { display: grid !important; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px !important; margin-right: 0 !important; }
    .filter-chips .chip { justify-content: center; min-width: 0; padding-inline: 8px; }
    .folio-status-tools{width:100%;display:grid;grid-template-columns:1fr 1fr}
    .folio-status-select{width:100%;min-width:0}
    .folio-period-tools,.folio-date-range{width:100%}
    .folio-date-input{flex:1;min-width:0}
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .folio-breakdown{min-width:0}
    .payment-currency-grid{grid-template-columns:1fr}
    .folio-mobile-actions .folio-action-status{width:auto;justify-content:center}
    .payment-method-grid{grid-template-columns:1fr}
    .payment-history-summary{grid-template-columns:1fr}
    .payment-history-row{grid-template-columns:1fr;gap:7px}
    .payment-history-row-main{flex-direction:column}
    .payment-history-applied{text-align:left}
    .payment-history-currencies{grid-template-columns:1fr}
    .folio-pagination{flex-direction:column;align-items:stretch}
    .folio-page-controls{justify-content:space-between}
    .settlement-detail-summary,.settlement-detail-grid{grid-template-columns:1fr}
    .settlement-detail-row:nth-last-child(-n+2){border-bottom:1px solid var(--border2)}
    .settlement-history-item{grid-template-columns:1fr}
    .settlement-history-amount{text-align:left}
    .settlement-detail-footer{align-items:stretch;flex-direction:column}
    .settlement-detail-footer-left,.settlement-detail-footer-right{width:100%}
    .settlement-detail-footer-left button,.settlement-detail-footer-right button{flex:1;justify-content:center}
    .payment-modal-footer{align-items:stretch;flex-direction:column}
    .payment-modal-footer-left,.payment-modal-footer-right{width:100%}
    .payment-modal-footer-left button,.payment-modal-footer-right button{flex:1;justify-content:center}
}

function paymentRecordsForFolio(folioId) {
    return settlementPaymentRecords().filter(item => item.folioId === folioId);
}

function sumRecords(records, predicate, field) {
    return records
        .filter(predicate)
        .reduce((sum, item) => sum + Number(item[field] || 0), 0);
}

function folioSettlementSignature(folio) {
    const sourceIds = Array.isArray(folio.sourceFolioIds) ? folio.sourceFolioIds.join(',') : '';
    return [
        folio.id || '',
        Number(folio.total || 0).toFixed(2),
        Number(folio.paid || 0).toFixed(2),
        Number(folio.bal || 0).toFixed(2),
        Number(folioDepositValue(folio) || 0).toFixed(2),
        sourceIds
    ].join('|');
}

function legacySettlementCompletion(folio) {
    const records = Array.isArray(folio.settlementPaymentRecords) ? folio.settlementPaymentRecords : [];
    return Number(folio.bal || 0) <= 0 && records.some(item => item.completeSettlement);
}

function settlementReopenForFolio(folio) {
    if (!folio?.id) return null;
    const signature = folioSettlementSignature(folio);
    return settlementReopenRecords()
        .filter(item => item.folioId === folio.id)
        .sort((a, b) => String(b.reopenedAt || '').localeCompare(String(a.reopenedAt || '')))
        .find(item => !item.signature || item.signature === signature) || null;
}

function settlementCompletionForFolio(folio) {
    if (!folio || Number(folio.bal || 0) > 0) return null;
    if (settlementReopenForFolio(folio)) return null;
    if (folio.apiSettlementCompleted) {
        return {
            folioId: folio.id,
            completedAt: folio.settlementCompletedAt || folio.closedAt || folio.issuedAt || '',
            completedBy: folio.settlementCompletedBy || folio.completedBy || '시스템'
        };
    }
    const signature = folioSettlementSignature(folio);
    const completion = settlementCompletionRecords()
        .filter(item => item.folioId === folio.id)
        .sort((a, b) => String(b.completedAt || '').localeCompare(String(a.completedAt || '')))
        .find(item => item.signature === signature);
    if (completion) return completion;
    const latestCompletion = settlementCompletionRecords()
        .filter(item => item.folioId === folio.id)
        .sort((a, b) => String(b.completedAt || '').localeCompare(String(a.completedAt || '')))[0];
    if (latestCompletion) return latestCompletion;
    if (legacySettlementCompletion(folio)) {
        return { folioId: folio.id, completedAt: folio.settlementPaymentRecords?.find(item => item.completeSettlement)?.createdAt || '', completedBy: 'Legacy' };
    }
    return null;
}

function decorateFolioSettlementState(folio) {
    if (folio.status === 'refund') return folio;
    const completion = settlementCompletionForFolio(folio);
    const status = completion ? 'paid' : (Number(folio.bal || 0) > 0 ? 'unpaid' : 'ready');
    return {
        ...folio,
        status,
        settlementCompleted: !!completion,
        settlementCompletedAt: completion?.completedAt || '',
        settlementCompletedBy: completion?.completedBy || ''
    };
}

function applySettlementPaymentRecords(folio) {
    const existingRecords = Array.isArray(folio.settlementPaymentRecords) ? folio.settlementPaymentRecords : [];
    const existingRecordIds = new Set(existingRecords.map(item => item.id).filter(Boolean));
    const records = paymentRecordsForFolio(folio.id).filter(item => !existingRecordIds.has(item.id));
    if (!records.length) return decorateFolioSettlementState(folio);
    const settlementApplied = sumRecords(records, item => item.kind !== 'deposit', 'appliedPhpAmount');
    const depositApplied = sumRecords(records, item => item.kind === 'deposit', 'appliedPhpAmount');
    const paid = Number(folio.paid || 0) + settlementApplied;
    const bal = Math.max(Number(folio.bal || 0) - settlementApplied, 0);
    const depositAmount = folioDepositValue(folio) + depositApplied;
    return decorateFolioSettlementState({
        ...folio,
        paid,
        bal,
        depositAmount,
        deposit: { amount: depositAmount, currency: folio.currency || 'PHP' },
        settlementPaymentRecords: [...existingRecords, ...records]
    });
}

            acc[dept] = (acc[dept] || 0) + Number(amount || 0);
            return acc;
        }, {});
    }
    const charges = Array.isArray(folio?.charges) ? folio.charges : [];
    if (charges.length) {
        return charges.reduce((acc, charge) => {
            const dept = normalizeDept(charge.type || folio.dept);
            acc[dept] = (acc[dept] || 0) + Number(charge.amount || 0);
            return acc;
        }, {});
    }
    const dept = normalizeDept(folio?.dept);
    return { [dept]: Number(folio?.total || 0) };
}

    const text = String(value || '').trim().toLowerCase();
    if (!text) return '';
    if (['diamond', '다이아몬드'].includes(text)) return 'diamond';
    if (['platinum', '플래티넘', '우수 고객', '우수고객', 'vip'].includes(text)) return 'platinum';
    if (['gold', '골드'].includes(text)) return 'gold';
    if (['standard', 'general', 'regular', '일반'].includes(text)) return 'standard';
    return '';
}

function rebuildFolioGuestMaps() {
    folioGuestById = new Map();
    folioGuestByName = new Map();
    folioGuests.forEach(guest => {
        if (!guest) return;
        const id = String(guest.id || guest.guestId || '').trim();
        const name = guest.name || guest.guestName || [guest.firstName, guest.lastName].filter(Boolean).join(' ');
        if (id) folioGuestById.set(id, guest);
        const key = normalizeGuestName(name);
        if (key && !folioGuestByName.has(key)) folioGuestByName.set(key, guest);
    });
}

function folioGuestRecord(folio) {
    if (!folio || isGroupFolio(folio)) return null;
    const guestId = String(folio.guestId || folio.customerId || folio.crmGuestId || '').trim();
    return (guestId && folioGuestById.get(guestId)) || folioGuestByName.get(normalizeGuestName(folio.guest)) || null;
}

function folioTierBadgeHtml(folio) {
    if (!folio || isGroupFolio(folio)) return '';
    const guest = folioGuestRecord(folio);
    const tierKey = normalizeTierKey(folio.tier || folio.guestTier || folio.membershipTier || guest?.tier || guest?.grade || guest?.membershipTier) || 'standard';
    const meta = FOLIO_TIER_META[tierKey];
    if (!meta) return '';
    return `<span class="folio-tier-badge ${meta.cls}" title="${meta.label}" aria-label="${meta.label}"><i class="fa-solid ${meta.icon}"></i></span>`;
}

function folioGroupKey(folio) {
    if (folio.groupId) return `group:${folio.groupId}`;
    if (folio.folioType === 'group') return `group:${folio.id}`;
    if (folio.reservationId) return `reservation:${folio.reservationId}`;
    const room = String(folio.room || '').trim().toLowerCase();
    const guest = String(folio.guest || '').trim().toLowerCase();
    const date = String(folio.out || folio.settlementDate || '').slice(0, 10);
    return `room:${room}|guest:${guest}|date:${date || 'open'}`;
}

function sourceChargeItems(folio) {
    const charges = Array.isArray(folio.charges) && folio.charges.length
        ? folio.charges
        : generatedInvoiceItems(folio).map(item => ({ type: folio.dept, label: item.label, amount: item.amount }));
    return charges.map(charge => ({
        ...charge,
        id: charge.id || charge.chargeId || '',
        roomId: charge.roomId || charge.roomNo || charge.room || '',
        reservationId: charge.reservationId || '',
        groupId: charge.groupId || folio.groupId || '',
        ref: charge.ref || charge.source || charge.orderId || '',
        type: normalizeDept(charge.type || folio.dept),
        label: charge.label || folioDisplayText(charge.desc || charge.type || '정산 항목'),
        amount: Number(charge.amount || 0),
        sourceFolioId: charge.sourceFolioId || folio.id
    }));
}

function mergeUniqueRoomChanges(folios) {
    const seen = new Set();
    return folios.flatMap(folio => Array.isArray(folio.settlementRoomChanges) ? folio.settlementRoomChanges : [])
        .filter(item => {
            const key = item.id || `${item.changedAt || ''}-${item.fromRoom || ''}-${item.toRoom || ''}`;
            if (seen.has(key)) return false;
            seen.add(key);
            return true;
        });
}

function latestFolioDate(folios) {
    return folios
        .map(folio => folioPeriodDate(folio))
        .filter(Boolean)
        .sort((a, b) => String(b).localeCompare(String(a)))[0] || '';
}

function aggregateFolioId(folios, base) {
    if (base.folioId || base.id) return base.folioId || base.id;
    if (base.groupId) return `FOL-${safeFolioIdSegment(base.groupId)}`;
    if (base.reservationId) return `FOL-${safeFolioIdSegment(base.reservationId)}`;
    return `FOL-${safeFolioIdSegment(base.room)}-${safeFolioIdSegment(base.guest)}`;
}

function aggregateSettlementFolios(folios) {
    const grouped = new Map();
    folios.forEach(folio => {
        const key = folioGroupKey(folio);
        if (!grouped.has(key)) grouped.set(key, []);
        grouped.get(key).push(folio);
    });

    return [...grouped.values()].map(groupRows => {
        const sorted = [...groupRows].sort((a, b) => deptSort(a.dept) - deptSort(b.dept) || String(a.id).localeCompare(String(b.id)));
        if (sorted.length === 1) {
            const only = sorted[0];
            const serviceBreakdown = folioDeptTotals(only);
            const serviceTypes = folioServiceTypes({ ...only, serviceBreakdown });
            return {
                ...only,
                serviceBreakdown,
                serviceTypes,
                sourceFolios: only.sourceFolios || [only],
                sourceFolioIds: only.sourceFolioIds || [only.id],
                sourceFolioCount: only.sourceFolioCount || 1,
                roomRevenue: Number(only.roomRevenue ?? serviceBreakdown.room ?? 0),
                ancillaryRevenue: Number(only.ancillaryRevenue ?? (Number(only.total || 0) - Number(serviceBreakdown.room || 0)))
            };
        }

        const base = sorted.find(folio => normalizeDept(folio.dept) === 'room') || sorted[0];
        const serviceBreakdown = sorted.reduce((acc, folio) => {
            Object.entries(folioDeptTotals(folio)).forEach(([type, amount]) => {
                const dept = normalizeDept(type);
                acc[dept] = (acc[dept] || 0) + Number(amount || 0);
            });
            return acc;
        }, {});
        const total = sorted.reduce((sum, folio) => sum + Number(folio.total || 0), 0);
        const paid = sorted.reduce((sum, folio) => sum + Number(folio.paid || 0), 0);
        const bal = sorted.reduce((sum, folio) => sum + Number(folio.bal || 0), 0);
        const depositAmount = sorted.reduce((sum, folio) => sum + folioDepositValue(folio), 0);
        const serviceTypes = Object.keys(serviceBreakdown).sort((a, b) => deptSort(a) - deptSort(b));
        const sourceFolioIds = [...new Set(sorted.flatMap(folio => folio.sourceFolioIds || [folio.id]).filter(Boolean))];
        const settlementRoomChanges = mergeUniqueRoomChanges(sorted);
        const periodDate = latestFolioDate(sorted);
        return {
            ...base,
            id: aggregateFolioId(sorted, base),
            dept: serviceTypes.length === 1 ? serviceTypes[0] : 'mixed',
            folioType: base.folioType || 'room-grouped',
            total,
            paid,
            bal,
            depositAmount,
            deposit: { amount: depositAmount, currency: base.currency || 'PHP' },
            currency: base.currency || sorted.find(folio => folio.currency)?.currency || 'PHP',
            out: formatDate(periodDate || base.out),
            settlementDate: formatDate(periodDate || base.settlementDate || base.out),
            issuedAt: periodDate || base.issuedAt || base.closedAt || '',
            closedAt: periodDate || base.closedAt || '',
            charges: sorted.flatMap(sourceChargeItems),
            payments: sorted.flatMap(folio => (folio.payments || []).map(payment => ({ ...payment, sourceFolioId: folio.id }))),
            settlementPaymentRecords: sorted.flatMap(folio => folio.settlementPaymentRecords || []),
            serviceBreakdown,
            serviceTypes,
            sourceFolios: sorted,
            sourceFolioIds,
            sourceFolioCount: sourceFolioIds.length,
            roomRevenue: Number(serviceBreakdown.room || 0),
            ancillaryRevenue: Math.max(0, total - Number(serviceBreakdown.room || 0)),
            settlementRoomChanges,
            roomChangeText: roomChangeText(settlementRoomChanges),
            isGroupedSettlement: true,
            status: bal > 0 ? 'unpaid' : (sorted.some(folio => folio.status === 'refund') ? 'refund' : 'paid')
        };
    });
}

function formatDate(value) {
    const match = String(value || '').match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return '-';
    return `${match[1]}-${match[2]}-${match[3]}`;
}

function addDays(dateText, days) {
    const match = String(dateText || '').match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return dateText || '-';
    const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    date.setDate(date.getDate() + days);
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function formatDateTime(value) {
    const date = value ? new Date(value) : new Date();
    if (Number.isNaN(date.getTime())) return '-';
    return new Intl.DateTimeFormat('ko-KR', {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    }).format(date);
}

    }[dept] || '정산 명세서';
}

function invoiceTitleForFolio(folio) {
    if (isGroupFolio(folio) && (!folio.invoiceScope || folio.invoiceScope === 'all')) return '단체 통합 정산 명세서';
    return invoiceDeptTitle(folio.dept);
}

function invoiceScopeLabel(scope) {

function invoiceScopes(folio) {

function invoiceScopeTabsHtml(folio, activeScope) {

        </div>

function allocateScopedAmount(amount, ratio) {
    return Math.round(Number(amount || 0) * ratio * 100) / 100;
}

function scopedSourceFolios(folio, dept) {
    const sources = Array.isArray(folio.sourceFolios) && folio.sourceFolios.length ? folio.sourceFolios : [folio];
    return sources.map(source => {
        const totals = folioDeptTotals(source);
        const total = Number(totals[dept] || 0);
        if (!total) return null;
        const sourceTotal = Number(source.total || 0);
        const ratio = sourceTotal > 0 ? total / sourceTotal : 1;
        const charges = sourceChargeItems(source).filter(charge => normalizeDept(charge.type || source.dept) === dept);
        return {
            ...source,
            dept,
            total,
            paid: allocateScopedAmount(source.paid, ratio),
            bal: allocateScopedAmount(source.bal, ratio),
            depositAmount: allocateScopedAmount(folioDepositValue(source), ratio),
            charges,
            serviceBreakdown: { [dept]: total },
            serviceTypes: [dept],
            sourceFolioIds: source.sourceFolioIds || [source.id],
            sourceFolioCount: source.sourceFolioCount || 1
        };
    }).filter(Boolean);
}

function folioForInvoiceScope(folio, scope) {
    if (!scope || scope === 'all') {
        return { ...folio, invoiceScope: 'all', invoiceScopeLabel: '통합 명세서' };
    }
    const dept = normalizeDept(scope);
    const sources = scopedSourceFolios(folio, dept);
    if (!sources.length) return { ...folio, invoiceScope: 'all', invoiceScopeLabel: '통합 명세서' };
    const total = sources.reduce((sum, item) => sum + Number(item.total || 0), 0);
    const paid = sources.reduce((sum, item) => sum + Number(item.paid || 0), 0);
    const bal = sources.reduce((sum, item) => sum + Number(item.bal || 0), 0);
    const depositAmount = sources.reduce((sum, item) => sum + folioDepositValue(item), 0);
    const sourceFolioIds = [...new Set(sources.flatMap(item => item.sourceFolioIds || [item.id]).filter(Boolean))];
    return {
        ...folio,
        dept,
        total,
        paid,
        bal,
        depositAmount,
        deposit: { amount: depositAmount, currency: folio.currency || 'PHP' },
        charges: sources.flatMap(item => item.charges || []),
        payments: sources.flatMap(item => item.payments || []),
        serviceBreakdown: { [dept]: total },
        serviceTypes: [dept],
        sourceFolios: sources,
        sourceFolioIds,
        sourceFolioCount: sourceFolioIds.length,
        roomRevenue: dept === 'room' ? total : 0,
        ancillaryRevenue: dept === 'room' ? 0 : total,
        status: bal > 0 ? 'unpaid' : 'paid',
        invoiceScope: dept,
        invoiceScopeLabel: invoiceScopeLabel(dept)
    };
}

function splitInvoiceAmount(total, ratios) {
    const base = Number(total || 0);
    let used = 0;
    return ratios.map((ratio, index) => {
        if (index === ratios.length - 1) return Math.max(0, base - used);
        const amount = Math.round(base * ratio * 100) / 100;
        used += amount;
        return amount;
    });
}

function generatedInvoiceItems(folio) {
    const dept = normalizeDept(folio.dept);
    const total = Number(folio.total || 0);
    if (dept === 'room') {
        const [roomCharge, serviceCharge] = splitInvoiceAmount(total, [0.92, 0.08]);
        return [
            { label: '객실 이용 요금 (2박)', amount: roomCharge },
            { label: '객실 서비스 및 부대 이용료', amount: serviceCharge }
        ];
    }
    if (dept === 'pos') {
        const [fnb, retail, service] = splitInvoiceAmount(total, [0.68, 0.22, 0.10]);
        return [
            { label: '식음료 매출', amount: fnb },
            { label: '리테일 / 미니바', amount: retail },
            { label: '서비스 차지', amount: service }
        ];
    }
    if (dept === 'golf') {
        const [greenFee, cart, facility] = splitInvoiceAmount(total, [0.72, 0.18, 0.10]);
        return [
            { label: '그린피', amount: greenFee },
            { label: '카트 / 캐디피', amount: cart },
            { label: '골프장 부대 이용료', amount: facility }
        ];
    }
    if (dept === 'car') {
        const [rental, insurance, fuel] = splitInvoiceAmount(total, [0.78, 0.14, 0.08]);
        return [
            { label: '차량 대여료', amount: rental },
            { label: '보험 / 옵션', amount: insurance },
            { label: '연료 / 반납 정산', amount: fuel }
        ];
    }
    return [{ label: '정산 항목', amount: total }];
}

function invoiceItems(folio) {
    const sourceCharges = Array.isArray(folio.charges) ? folio.charges : [];
    const changeItems = Array.isArray(folio.settlementRoomChanges) && folio.settlementRoomChanges.length
        ? [{ label: `객실 변경 확인: ${roomChangeText(folio.settlementRoomChanges)}`, amount: 0 }]
        : [];
    if (sourceCharges.length) {
        const items = sourceCharges.map(charge => ({
            label: invoiceChargeLabel(charge, folio),
            amount: Number(charge.amount || 0)
        }));
        const hasChangeItem = items.some(item => String(item.label || '').includes('객실 변경'));
        return hasChangeItem ? items : [...items, ...changeItems];
    }
    return [...generatedInvoiceItems(folio), ...changeItems];
}

function invoiceChargeRoomLabel(charge) {
    const room = charge.roomId || charge.roomNo || charge.room || '';
    if (room) return room;
    if (charge.groupId) return '단체 공용';
    return '공용';
}

function invoiceChargeLabel(charge, folio) {
    const showDept = folio.sourceFolioCount > 1 || (folio.serviceTypes || []).length > 1 || isGroupFolio(folio);
    const dept = showDept ? `${deptLabel(charge.type || folio.dept)} · ` : '';
    const room = `${invoiceChargeRoomLabel(charge)} · `;
    const label = charge.label || folioDisplayText(charge.desc || charge.type || '정산 항목');
    const source = charge.id || charge.sourceFolioId || folio.id;
    return `${dept}${room}${label}${source ? ` (${source})` : ''}`;
}

function invoiceItemsHtml(folio, currency) {
    return invoiceItems(folio).map(item => `
        <div style="display:flex;justify-content:space-between;gap:16px">
            <span>${escapeHtml(item.label)}</span>
            <span>${fmtInvoiceMoney(item.amount, currency)}</span>
        </div>
    `).join('');
}

function invoiceMetaRows(folio) {
    const out = formatDate(folio.out);
    if (isGroupFolio(folio)) {
        const group = folio.group || groupById(folio.groupId) || {};
        const rooms = groupRooms(group);

        const rows = [

            ['객실 블록', `블록 ${block} · 픽업 ${pickup}${pax ? ` · PAX ${pax}` : ''}`],
            ['정산 방식', sanitizeSettlementRouting(group.routing || folio.routing)],

        ];
        if ((folio.sourceFolioIds || []).length) rows.push(['원천 Folio', (folio.sourceFolioIds || []).join(', ')]);
        return rows;
    }
    if (folio.sourceFolioCount > 1 || (folio.serviceTypes || []).length > 1 || folio.dept === 'mixed') {
        return [

            ['포함 항목', folioServiceSummary(folio)],

        return [
            ['연결 객실', folio.room],
            ['대여 기간', `${addDays(out, -1)} 09:00 ~ ${out} 18:00`]

}

function invoiceMetaRowsWithRoomChanges(folio) {
    const rows = invoiceMetaRows(folio);
    if (Array.isArray(folio.settlementRoomChanges) && folio.settlementRoomChanges.length) {
        rows.push(['객실 변경 이력', roomChangeText(folio.settlementRoomChanges)]);

    }
    return rows;
}

function apiAmount(value) {
    return window.PmsMockApi ? window.PmsMockApi.amountValue(value) : Number(value?.amount || value || 0);
}

function reservationAmountValue(res) {
    if (res?.totalAmount && typeof res.totalAmount === 'object') return Number(res.totalAmount.amount || 0);
    return Number(res?.amount || 0);
}

function reservationPrepaidValue(res) {
    if (res?.paymentPlan && typeof res.paymentPlan === 'object') return Number(res.paymentPlan.prepaidAmount || 0);
    return Number(res?.prepaidAmount || res?.prepaid || 0);
}

function reservationDepositValue(res) {
    const direct = Number(res?.depositAmount ?? res?.preauthAmount ?? (typeof res?.deposit === 'object' ? undefined : res?.deposit));
    if (Number.isFinite(direct) && direct > 0) return direct;
    if (res?.deposit && typeof res.deposit === 'object') {
        const fromObject = Number(res.deposit.amount || 0);
        if (Number.isFinite(fromObject) && fromObject > 0) return fromObject;
    }
    if (res?.paymentPlan && typeof res.paymentPlan === 'object') {
        const fromPlan = Number(res.paymentPlan.depositAmount || res.paymentPlan.deposit || 0);
        if (Number.isFinite(fromPlan) && fromPlan > 0) return fromPlan;
    }
    return Number.isFinite(direct) ? direct : 0;
}

function paymentIsDeposit(payment) {
    const label = String(payment?.method || payment?.type || payment?.label || payment?.desc || '').toLowerCase();
    return label.includes('deposit') || label.includes('preauth') || label.includes('pre-auth') || label.includes('예치') || label.includes('보증');
}

function folioDepositValue(folio) {
    const direct = Number(folio?.depositAmount ?? folio?.preauthAmount ?? (typeof folio?.deposit === 'object' ? undefined : folio?.deposit));
    if (Number.isFinite(direct) && direct > 0) return direct;
    if (folio?.deposit && typeof folio.deposit === 'object') {
        const fromObject = Number(folio.deposit.amount || 0);
        if (Number.isFinite(fromObject) && fromObject > 0) return fromObject;
    }
    if (folio?.paymentPlan && typeof folio.paymentPlan === 'object') {
        const fromPlan = Number(folio.paymentPlan.depositAmount || folio.paymentPlan.deposit || 0);
        if (Number.isFinite(fromPlan) && fromPlan > 0) return fromPlan;
    }
    return Number.isFinite(direct) ? direct : 0;
}

function reservationBalanceDue(res) {
    const explicit = Number(res?.balanceDue ?? res?.paymentPlan?.balanceDue);
    if (Number.isFinite(explicit) && explicit >= 0) return explicit;
    return Math.max(reservationAmountValue(res) - reservationPrepaidValue(res), 0);
}

function reservationCurrency(res) {
    return res?.currency || res?.totalAmount?.currency || res?.rate?.currency || localStorage.getItem('pms_default_currency') || 'PHP';
}

function reservationRoomChangeHistory(res) {
    const values = [
        ...(Array.isArray(res?.roomChangeHistory) ? res.roomChangeHistory : []),
        ...(Array.isArray(res?.roomMoveHistory) ? res.roomMoveHistory : [])
    ];
    const seen = new Set();
    return values.map(item => ({
        id: item.id || `${item.changedAt || item.createdAt || ''}-${item.fromRoom || item.fromFullRoom || ''}-${item.toRoom || item.toFullRoom || ''}`,
        reservationId: item.reservationId || res?.id || '',
        fromRoom: item.fromRoom || item.fromRoomNo || item.fromFullRoom || '',
        toRoom: item.toRoom || item.toRoomNo || item.toFullRoom || '',
        changedAt: item.changedAt || item.createdAt || '',
        changedBy: item.changedBy?.name || item.changedByName || item.changedBy || '-',
        affectsSettlement: item.affectsSettlement !== false,
        settlementStatus: item.settlementStatus || 'pending'
    })).filter(item => {
        if (!item.fromRoom && !item.toRoom) return false;
        const key = item.id || `${item.changedAt}-${item.fromRoom}-${item.toRoom}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).sort((a, b) => String(b.changedAt || '').localeCompare(String(a.changedAt || '')));
}

function roomChangeText(changes) {
    return (changes || []).map(item => `${item.fromRoom || '-'} -> ${item.toRoom || '-'}`).join(', ');
}

function reservationGuestName(res) {
    return res?.roomingGuestName || res?.guestName || res?.guest || '-';
}

function reservationRoomNo(res) {
    return res?.roomNo || res?.room || (res?.roomId && window.PmsMockApi?.roomNoFromId ? window.PmsMockApi.roomNoFromId(res.roomId) : '') || res?.roomId || '-';
}

function reservationToSettlementFolio(res) {
    const changes = reservationRoomChangeHistory(res);
    const total = reservationAmountValue(res);
    const paid = reservationPrepaidValue(res);
    const depositAmount = reservationDepositValue(res);
    const bal = reservationBalanceDue(res);
    const currency = reservationCurrency(res);
    const checkout = res?.checkOutDate || res?.checkout || res?.cout || '';
    return {
        id: `FOL-${res.id || Date.now()}`,
        reservationId: res.id || '',
        room: reservationRoomNo(res),
        dept: 'room',
        guest: reservationGuestName(res),
        out: formatDate(checkout),
        settlementDate: formatDate(checkout),
        total,
        paid,
        depositAmount,
        deposit: { amount: depositAmount, currency },
        bal,
        currency,
        issuedAt: res.updatedAt || changes[0]?.changedAt || '',
        closedAt: checkout,
        roomRevenue: total,
        ancillaryRevenue: 0,
        status: bal > 0 ? 'unpaid' : 'paid',
        charges: [
            { type: 'room', label: '객실 요금', amount: total },
            ...(changes.length ? [{ type: 'room', label: `객실 변경 확인: ${roomChangeText(changes)}`, amount: 0 }] : [])
        ],
        payments: paid ? [{ method: '예치금', amount: paid, paidAt: res.prepaidAt || null }] : [],
        paymentPlan: {
            ...(res.paymentPlan || {}),
            totalAmount: total,
            prepaidAmount: paid,
            depositAmount,
            balanceDue: bal,
            currency
        },
        settlementRoomChanges: changes,
        roomChangeText: roomChangeText(changes)
    };
}

function enrichFolioWithReservation(folio) {
    const match = folioReservations.find(res => {
        if (folio.reservationId && res.id === folio.reservationId) return true;
        const sameRoom = String(reservationRoomNo(res)) === String(folio.room);
        const sameGuest = reservationGuestName(res) === folio.guest;
        return sameRoom && sameGuest;
    });
    if (!match) return folio;
    const changes = reservationRoomChangeHistory(match);
    const depositAmount = folioDepositValue(folio) || reservationDepositValue(match);
    const currency = folio.currency || reservationCurrency(match);
    const enriched = {
        ...folio,
        reservationId: folio.reservationId || match.id,
        depositAmount,
        deposit: folio.deposit || { amount: depositAmount, currency },
        paymentPlan: {
            ...(match.paymentPlan || {}),
            ...(folio.paymentPlan || {}),
            depositAmount,
            currency
        }
    };
    if (!changes.length) return enriched;
    return {
        ...enriched,
        settlementRoomChanges: changes,
        roomChangeText: roomChangeText(changes)
    };
}

function enrichFolioWithGroup(folio) {
    if (!isGroupFolio(folio)) return folio;
    const group = groupById(folio.groupId);
    if (!group) return {
        ...folio,
        room: folio.room === 'Master' ? '단체' : folio.room,
        isGroupSettlement: true
    };
    const rooms = groupRooms(group);
    const checkin = group.checkin || group.checkInDate || '';
    const checkout = group.checkout || group.checkOutDate || '';
    const folioOut = folio.out && folio.out !== '-' ? folio.out : (checkout ? formatDate(checkout) : folio.out);
    const folioSettlementDate = folio.settlementDate && folio.settlementDate !== '-' ? folio.settlementDate : folioOut;
    return {
        ...folio,
        group,
        isGroupSettlement: true,
        companyName: group.agency || group.companyName || '',
        groupName: group.name || folio.guest || '',
        guest: group.name || folio.guest,
        room: '단체',
        out: folioOut,
        settlementDate: folioSettlementDate,
        groupPeriodText: `${formatDate(checkin)} ~ ${formatDate(checkout)}`,
        groupRoomsText: rooms.slice(0, 4).join(', ') + (rooms.length > 4 ? ` 외 ${rooms.length - 4}` : ''),
        routing: sanitizeSettlementRouting(group.routing || folio.routing),
        status: Number(folio.bal || 0) > 0 ? 'unpaid' : (folio.status || 'group')
    };
}

function groupEstimatedTotal(group) {
    const rooms = Array.isArray(group.roomAllocations) && group.roomAllocations.length
        ? group.roomAllocations
        : (Array.isArray(group.allocations) ? group.allocations : []);
    const nights = Math.max(1, Math.round(((dateOnly(group.checkout || group.checkOutDate) || dateOnly(group.checkin || group.checkInDate) || new Date()) - (dateOnly(group.checkin || group.checkInDate) || new Date())) / 86400000) || 1);
    return rooms.reduce((sum, room) => {
        const finalRate = apiAmount(room.finalRate ?? room.rate ?? room.baseRate ?? 0);
        return sum + (finalRate * nights);
    }, 0);
}

function groupToSettlementFolio(group) {
    const total = groupEstimatedTotal(group);
    const checkout = group.checkout || group.checkOutDate || '';
    return {
        id: `FOL-${group.id}`,
        folioId: `FOL-${group.id}`,
        groupId: group.id,
        folioType: 'group',
        isGroupSettlement: true,
        group,
        room: '단체',
        dept: 'mixed',
        guest: group.name || group.id,
        companyName: group.agency || group.companyName || '',
        out: formatDate(checkout),
        settlementDate: formatDate(checkout),
        total,
        paid: 0,
        depositAmount: 0,
        deposit: { amount: 0, currency: group.currency || localStorage.getItem('pms_default_currency') || 'PHP' },
        bal: total,
        currency: group.currency || localStorage.getItem('pms_default_currency') || 'PHP',
        issuedAt: group.updatedAt || group.createdAt || '',
        closedAt: checkout,
        charges: total ? [{ type: 'room', label: '단체 객실 예상 정산', amount: total }] : [],
        payments: [],
        roomRevenue: total,
        ancillaryRevenue: 0,
        sourceFolioIds: [],
        sourceFolioCount: 0,
        groupPeriodText: `${formatDate(group.checkin || group.checkInDate)} ~ ${formatDate(checkout)}`,
        groupRoomsText: groupRooms(group).join(', '),
        routing: sanitizeSettlementRouting(group.routing),
        status: total > 0 ? 'unpaid' : 'group'
    };
}

function groupSettlementFolios(existingFolios) {
    const linkedGroupIds = new Set(existingFolios.map(folio => folio.groupId).filter(Boolean));
    return folioGroups
        .filter(group => groupCheckoutCompleted(group))
        .filter(group => periodMatchesGroup(group))
        .filter(group => !linkedGroupIds.has(group.id))
        .map(groupToSettlementFolio);
}

function reservationSettlementFolios() {
    const linkedIds = new Set(apiFolios.map(folio => folio.reservationId).filter(Boolean));
    return folioReservations
        .filter(res => reservationCheckoutCompleted(res))
        .filter(res => reservationRoomChangeHistory(res).length && !linkedIds.has(res.id))
        .map(reservationToSettlementFolio)
        .filter(periodMatchesFolio);
}

function folioDisplayText(value) {
    return String(value || '-')
        .replace(/F&B/gi, '식음료')
        .replace(/Retail Batch/gi, '리테일 일괄')
        .replace(/Room Revenue/gi, '객실 매출')
        .replace(/Room Charge/gi, '객실 요금')
        .replace(/POS/gi, '포스');
}

function selectedNumber(id, fallback) {
    const el = document.getElementById(id);
    const match = String(el?.value || '').match(/\d+/);
    return match ? Number(match[0]) : fallback;
}

function currentFolioDate() {
    const today = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    today.setHours(0, 0, 0, 0);
    return today;
}

const CURRENT_FOLIO_DATE = currentFolioDate();
const CURRENT_FOLIO_PERIOD = {
    year: CURRENT_FOLIO_DATE.getFullYear(),
    month: CURRENT_FOLIO_DATE.getMonth() + 1,
    week: Math.floor((CURRENT_FOLIO_DATE.getDate() - 1) / 7) + 1,
    day: CURRENT_FOLIO_DATE.getDate()
};

function dateOnly(value) {
    const match = String(value || '').match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return null;
    return new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
}

function formatDateObject(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function formatShortDate(date) {
    if (!date) return '-';
    return `${String(date.getMonth() + 1).padStart(2, '0')}.${String(date.getDate()).padStart(2, '0')}`;
}

function addDays(date, days) {
    const next = new Date(date);
    next.setDate(next.getDate() + days);
    next.setHours(0, 0, 0, 0);
    return next;
}

function rangeLengthDays(range) {
    if (!range?.start || !range?.end) return 0;
    return Math.max(0, Math.round((range.end - range.start) / 86400000));
}

function inputDateValue(id) {
    const value = document.getElementById(id)?.value || '';
    return dateOnly(value);
}

function normalizedRange(start, end) {
    const safeStart = start || new Date(CURRENT_FOLIO_DATE);
    const safeEnd = end || safeStart;
    if (safeStart > safeEnd) return { start: safeEnd, end: safeStart };
    return { start: safeStart, end: safeEnd };
}

function selectedPeriodRange() {
    if (currentPeriod === 'month') {
        return { start: new Date(CURRENT_FOLIO_PERIOD.year, CURRENT_FOLIO_PERIOD.month - 1, 1), end: new Date(CURRENT_FOLIO_DATE) };
    }
    if (currentPeriod === 'week') {
        return { start: addDays(CURRENT_FOLIO_DATE, -6), end: new Date(CURRENT_FOLIO_DATE) };
    }
    if (currentPeriod === 'custom') {
        return normalizedRange(inputDateValue('folioStartDate'), inputDateValue('folioEndDate'));
    }
    const day = new Date(CURRENT_FOLIO_PERIOD.year, CURRENT_FOLIO_PERIOD.month - 1, CURRENT_FOLIO_PERIOD.day);
    return { start: day, end: day };
}

function periodLabelText() {
    const range = selectedPeriodRange();
    if (currentPeriod === 'day') return `금일 정산 · ${formatShortDate(range.start)}`;
    if (currentPeriod === 'week') return `최근 7일 · ${formatShortDate(range.start)} ~ ${formatShortDate(range.end)}`;
    if (currentPeriod === 'month') return `월간 누적 · ${formatShortDate(range.start)} ~ ${formatShortDate(range.end)}`;
    return `선택 기간 · ${formatShortDate(range.start)} ~ ${formatShortDate(range.end)}`;
}

function updateFolioPeriodControls() {
    const customRange = document.getElementById('folioCustomRange');
    if (customRange) customRange.classList.toggle('active', currentPeriod === 'custom');
    const label = document.getElementById('folioPeriodLabel');
    if (label) label.innerHTML = `<i class="fa-solid fa-calendar-day"></i> ${periodLabelText()}`;
}

function rangesOverlap(aStart, aEnd, bStart, bEnd) {
    if (!aStart || !bStart || !bEnd) return false;
    const safeAEnd = aEnd || aStart;
    return aStart <= bEnd && safeAEnd >= bStart;
}

function periodMatchesGroup(group) {
    if (!group) return false;
    const start = dateOnly(group.checkin || group.checkInDate);
    const end = dateOnly(group.checkout || group.checkOutDate) || start;
    const range = selectedPeriodRange();
    return rangesOverlap(start, end, range.start, range.end);
}

function setSelectByNumber(id, number) {
    const el = document.getElementById(id);
    if (!el) return;
    const option = Array.from(el.options).find(opt => Number(String(opt.value || opt.textContent || '').match(/\d+/)?.[0]) === number);
    if (option) el.value = option.value;
}

function resetToCurrentFolioPeriod(period) {
    if (period === 'custom') {
        const endInput = document.getElementById('folioEndDate');
        const startInput = document.getElementById('folioStartDate');
        if (startInput && !startInput.value) startInput.value = formatDateObject(addDays(CURRENT_FOLIO_DATE, -6));
        if (endInput && !endInput.value) endInput.value = formatDateObject(CURRENT_FOLIO_DATE);
    }
}

function initializeFolioPeriodControls() {
    const startInput = document.getElementById('folioStartDate');
    const endInput = document.getElementById('folioEndDate');
    if (startInput) startInput.value = formatDateObject(addDays(CURRENT_FOLIO_DATE, -6));
    if (endInput) endInput.value = formatDateObject(CURRENT_FOLIO_DATE);
    updateFolioPeriodControls();
}

function folioPeriodDate(folio) {
    return folio.settlementDate || folio.closedAt || folio.issuedAt || folio.out || '';
}

function folioDateParts(folio) {
    const match = String(folioPeriodDate(folio)).match(/(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return { year: 2026, month: 6, day: 1 };
    return { year: Number(match[1]), month: Number(match[2]), day: Number(match[3]) };
}

function folioWeekOfMonth(folio) {
    return Math.floor((folioDateParts(folio).day - 1) / 7) + 1;
}

function periodMatchesFolio(folio) {
    if (isGroupFolio(folio)) {
        const group = groupById(folio.groupId);
        if (group && periodMatchesGroup(group)) return true;
    }
    const date = dateOnly(folioPeriodDate(folio));
    const range = selectedPeriodRange();
    return !!date && date >= range.start && date <= range.end;
}

function isClosedApiFolioItem(item = {}) {
    const status = String(item.status || '').toLowerCase().replace(/[_\s]/g, '-');
    return !!(
        item.closedAt ||
        item.settlementCompleted ||
        status === 'closed' ||
        status === 'checked-out' ||
        status === 'settled'
    );
}

function reservationCheckoutCompleted(res = {}) {
    const status = String(res.status || '').toLowerCase().replace(/[_\s]/g, '-');
    return ['checked-out', 'departed', 'checkout-completed', 'settled'].includes(status);
}

function groupCheckoutCompleted(group = {}) {
    const status = String(group.status || '').toLowerCase().replace(/[_\s]/g, '-');
    return ['checked-out', 'departed', 'closed', 'settled'].includes(status);
}

function periodFolios() {
    const fallbackRows = Object.values(foliosData).flat();
    const source = apiFolios.length ? apiFolios : fallbackRows;
    const rows = source.filter(periodMatchesFolio);
    const enriched = rows.map(enrichFolioWithReservation).map(enrichFolioWithGroup);
    const synthetic = reservationSettlementFolios();
    const existingKeys = new Set(enriched.map(folio => folio.id));
    const existingReservationIds = new Set(enriched.map(folio => folio.reservationId).filter(Boolean));
    const prepared = [
        ...synthetic.filter(folio => !existingKeys.has(folio.id) && !existingReservationIds.has(folio.reservationId)),
        ...enriched
    ].map(applySettlementPaymentRecords);
    const groupSynthetic = groupSettlementFolios(prepared);
    return aggregateSettlementFolios([...groupSynthetic, ...prepared])
        .map(applySettlementPaymentRecords);
}

function comparePeriodFolios() {
    if (!apiFolios.length) return [];
    const range = selectedPeriodRange();
    const days = rangeLengthDays(range);
    const prevEnd = addDays(range.start, -1);
    const prevStart = addDays(prevEnd, -days);
    return apiFolios.filter(folio => {
        const date = dateOnly(folioPeriodDate(folio));
        return !!date && date >= prevStart && date <= prevEnd;
    });
}

function folioTotal(rows) {
    return rows.reduce((sum, folio) => sum + Number(folio.total || 0), 0);
}

function formatDiffPercent(current, previous) {
    if (!previous) return '-';
    const diff = ((current - previous) / previous) * 100;
    return `${diff >= 0 ? '+' : ''}${diff.toFixed(1)}%`;
}

function mapApiFolio(item) {
    const charges = Array.isArray(item.charges) ? item.charges : [];
    const payments = Array.isArray(item.payments) ? item.payments : [];
    const total = charges.reduce((sum, charge) => sum + apiAmount(charge.amount), 0);
    const settlementPayments = payments.filter(payment => !paymentIsDeposit(payment));
    const depositPayments = payments.filter(paymentIsDeposit);
    const paid = settlementPayments.reduce((sum, payment) => sum + apiAmount(payment.amount), 0);
    const depositAmount = apiAmount(item.depositAmount ?? item.deposit ?? item.preauthAmount)
        + depositPayments.reduce((sum, payment) => sum + apiAmount(payment.amount), 0);
    const bal = apiAmount(item.balance) || Math.max(0, total - paid);
    const mappedCharges = charges.map(charge => ({
        id: charge.id || charge.chargeId || '',
        type: normalizeDept(charge.type),
        desc: charge.desc,
        label: folioDisplayText(charge.desc || charge.type || '정산 항목'),
        amount: apiAmount(charge.amount),
        roomId: charge.roomId || charge.roomNo || charge.room || '',
        reservationId: charge.reservationId || '',
        groupId: charge.groupId || item.groupId || '',
        ref: charge.ref || charge.source || charge.orderId || ''
    }));
    const typeTotals = charges.reduce((acc, charge) => {
        const type = normalizeDept(charge.type);
        acc[type] = (acc[type] || 0) + apiAmount(charge.amount);
        return acc;
    }, {});
    const roomRevenue = typeTotals.room || 0;
    const ancillaryRevenue = total - roomRevenue;
    const dept = Object.entries(typeTotals).sort((a, b) => b[1] - a[1])[0]?.[0] || 'pos';
    const closedAt = item.closedAt || '';
    const issuedAt = item.issuedAt || item.closedAt || '';
    const settlementDate = (closedAt || issuedAt || '').slice(0, 10);
    return {
        id: item.id,
        folioId: item.folioId || item.id,
        reservationId: item.reservationId || item.bookingId || item.sourceReservationId || '',
        groupId: item.groupId || '',
        guestId: item.guestId || item.customerId || item.crmGuestId || '',
        customerId: item.customerId || '',
        crmGuestId: item.crmGuestId || '',
        tier: item.tier || item.guestTier || item.membershipTier || '',
        companyId: item.companyId || '',
        companyName: item.companyName || '',
        folioType: item.folioType || '',
        sourceReservationIds: Array.isArray(item.reservationIds) ? item.reservationIds : [],
        sourceRoomIds: Array.isArray(item.roomIds) ? item.roomIds : [],
        room: item.groupId ? '단체' : (item.roomNo || '-'),
        dept,
        guest: folioDisplayText(item.ownerName || item.guestName || '-'),
        out: closedAt ? closedAt.slice(0, 10) : '-',
        settlementDate,
        total,
        paid,
        depositAmount,
        deposit: { amount: depositAmount, currency: item.balance?.currency || localStorage.getItem('pms_default_currency') || 'PHP' },
        bal,
        currency: item.balance?.currency || localStorage.getItem('pms_default_currency') || 'PHP',
        issuedAt,
        closedAt,
        charges: mappedCharges,
        payments: settlementPayments.map(payment => ({
            method: normalizePaymentMethod(payment.method || payment.type || payment.methodLabel || ''),
            amount: apiAmount(payment.amount),
            paidAt: payment.paidAt || null
        })),
        settlementPaymentRecords: payments.map((payment, index) => {
            const deposit = paymentIsDeposit(payment);
            const method = normalizePaymentMethod(payment.method || payment.type || payment.methodLabel || '');
            const amount = apiAmount(payment.amount);
            return {
                id: payment.id || `${item.id}-PAY-${index + 1}`,
                folioId: item.id,
                kind: deposit ? 'deposit' : 'settlement',
                method,
                methodLabel: paymentMethodLabel(method, payment.methodLabel),
                appliedPhpAmount: amount,
                receivedCurrency: payment.receivedCurrency || payment.currency || item.balance?.currency || 'PHP',
                receivedAmount: Number(payment.receivedAmount ?? amount),
                receivedBreakdown: payment.receivedBreakdown,
                note: payment.note || '',
                operator: payment.operator || payment.createdBy || '',
                createdAt: payment.paidAt || payment.createdAt || item.closedAt || item.issuedAt || ''
            };
        }),
        apiSettlementCompleted: !!item.settlementCompleted,
        settlementCompletedAt: item.settlementCompletedAt || '',
        settlementCompletedBy: item.settlementCompletedBy || '',
        paymentPlan: {
            ...(item.paymentPlan || {}),
            depositAmount
        },
        settlementRoomChanges: Array.isArray(item.roomChangeHistory) ? item.roomChangeHistory : [],
        roomChangeText: '',
        roomRevenue,
        ancillaryRevenue,
        status: paid > total && bal <= 0 ? 'refund' : (bal > 0 ? 'unpaid' : (item.settlementCompleted ? 'paid' : 'ready'))
    };
}

function updateApiKpis() {
    const rows = periodFolios();
    const totals = rows.reduce((acc, folio) => {
        acc.total += folio.total;
        acc.room += folio.roomRevenue || 0;
        acc.anc += folio.ancillaryRevenue || 0;
        return acc;
    }, { total: 0, room: 0, anc: 0 });
    const currency = rows[0]?.currency || apiFolios[0]?.currency || localStorage.getItem('pms_default_currency') || 'PHP';
    document.getElementById('kpiTotal').textContent = fmtMoney(totals.total, currency);
    document.getElementById('kpiRoom').textContent = fmtMoney(totals.room, currency);
    document.getElementById('kpiAnc').textContent = fmtMoney(totals.anc, currency);
    document.getElementById('kpiDiff').textContent = formatDiffPercent(totals.total, folioTotal(comparePeriodFolios()));
    document.getElementById('kpiDiff').nextElementSibling.textContent = kpiData[currentPeriod]?.label || '전기 대비';
    return true;
}

async function loadFolioGuests() {
    const merged = new Map();
    try {
        JSON.parse(localStorage.getItem('pms_guests') || '[]').forEach(guest => {
            if (guest?.id) merged.set(guest.id, guest);
        });
    } catch(e) {}
    try {
        if (!window.PmsMockApi) return;
        const env = await window.PmsMockApi.request('GET', '/crm/guests');
        const items = window.PmsMockApi.items ? window.PmsMockApi.items(env) : env?.data?.items;
        if (Array.isArray(items)) {
            items.forEach(guest => {
                if (guest?.id) merged.set(guest.id, { ...merged.get(guest.id), ...guest });
            });
        }
    } catch(e) {
        console.warn('Guest tier fallback', e);
    } finally {
        folioGuests = [...merged.values()];
        rebuildFolioGuestMaps();
        renderFolios();
    }
}

async function loadApiFolios() {
    try {
        if (!window.PmsMockApi) return;
        localStorage.removeItem('mockapi:v1:TENANT-GRAND-SAIGON:folios');
        const env = await window.PmsMockApi.request('GET', '/folios');
        apiFolios = window.PmsMockApi.items(env)
            .filter(isClosedApiFolioItem)
            .map(mapApiFolio);
        updateApiKpis();
        renderFolios();
        tryOpenPaymentFromUrl();
    } catch(e) {
        console.warn('Mock folios fallback', e);
    }
}

async function loadReservationSettlementLinks() {
    const merged = new Map();
    try {
        JSON.parse(localStorage.getItem('pms_reservations') || '[]').forEach(res => {
            if (res?.id) merged.set(res.id, res);
        });
    } catch(e) {}
    try {
        if (window.PmsMockApi) {
            const env = await window.PmsMockApi.request('GET', '/reservations');
            const items = window.PmsMockApi.items ? window.PmsMockApi.items(env) : env?.data?.items;
            if (Array.isArray(items)) {
                items.forEach(item => {
                    const legacy = window.PmsMockApi.toLegacyReservation ? window.PmsMockApi.toLegacyReservation(item) : item;
                    if (legacy?.id) merged.set(legacy.id, { ...merged.get(legacy.id), ...legacy });
                });
            }
        }
    } catch(e) {
        console.warn('Reservation settlement link fallback', e);
    }
    folioReservations = [...merged.values()];
    updateApiKpis();
    renderFolios();
    tryOpenPaymentFromUrl();
}

async function loadGroupSettlementLinks() {
    const merged = new Map();
    try {
        JSON.parse(localStorage.getItem('pms_groups') || '[]').forEach(group => {
            if (group?.id) merged.set(group.id, normalizeGroup(group));
        });
    } catch(e) {}
    try {
        if (window.PmsMockApi) {
            const env = await window.PmsMockApi.request('GET', '/groups/events');
            const items = window.PmsMockApi.items ? window.PmsMockApi.items(env) : env?.data?.items;
            if (Array.isArray(items)) {
                items.forEach(item => {
                    const legacy = normalizeGroup(item);
                    if (legacy?.id) merged.set(legacy.id, { ...merged.get(legacy.id), ...legacy });
                });
            }
        }
    } catch(e) {
        console.warn('Group settlement link fallback', e);
    }
    folioGroups = [...merged.values()];
    updateApiKpis();
    renderFolios();
    tryOpenPaymentFromUrl();
}
