<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>골프 예약 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>

<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Golf">골프 예약</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-handshake"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value">3</div>
                    <div class="kpi-label">제휴 업체 수</div>
                    <div class="kpi-sub">계약된 골프장</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-calendar-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value">8</div>
                    <div class="kpi-label">금일 예약 건</div>
                    <div class="kpi-sub">진행 예정 대기건</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value">12</div>
                    <div class="kpi-label">금일 라운딩 완료</div>
                    <div class="kpi-sub">정산 완료 대상</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value">₩240,000</div>
                    <div class="kpi-label">예상 수수료 수익</div>
                    <div class="kpi-sub">예약 수수료 (별도 통계)</div>
                </div>
            </div>
        </div>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div style="display:flex;align-items:center;gap:8px">
                    <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="객실번호, 고객명 검색..." oninput="renderOrders()">
                    </div>
                </div>
                <div class="filter-divider"></div>
                    <button onclick="renderOrders()" class="btn-primary-sm" style="height:36px;padding:0 16px;border-radius:8px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fa-solid fa-magnifying-glass"></i> 검색
                    </button>
                </div>
                <div class="filter-chips">
                    <button class="chip active" onclick="setFilter(this,'all')" id="chip-all">All 예약</button>
                    <button class="chip" onclick="setFilter(this,'club_a')" id="chip-club_a"><i class="fa-solid fa-golf-ball-tee" style="color:var(--txt2)"></i> 썬밸리 CC</button>
                    <button class="chip" onclick="setFilter(this,'club_b')" id="chip-club_b"><i class="fa-solid fa-golf-ball-tee" style="color:var(--txt2)"></i> 스카이72</button>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('partnerModal')"><i class="fa-solid fa-building"></i> 업체 관리</button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> 신규 예약</button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="hk-task-list" id="orderList">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<script>
let orders = [];

const tMap = {
    'club_a': { label:'썬밸리 CC', icon:'fa-golf-ball-tee', color:'var(--orange)' },
    'club_b': { label:'스카이72', icon:'fa-golf-ball-tee', color:'var(--purple)' },
};

let currentFilter = 'all';

function renderOrders() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('orderList');
    
    const filtered = orders.filter(o => {
        if (currentFilter !== 'all' && o.type !== currentFilter) return false;
        if (search && !o.room.toLowerCase().includes(search)) return false;
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">해당하는 오더가 없습니다.</div>';
        return;
    }

    container.innerHTML = filtered.map(o => {
        const info = tMap[o.type];
        
        let sHtml, actBtn;
        if (o.status === 'new') {
            sHtml = `<span style="color:var(--danger);font-weight:700"><i class="fa-solid fa-circle-exclamation"></i> 예약 대기</span>`;
            actBtn = `<button class="btn-primary-sm"><i class="fa-solid fa-check"></i> 예약 Confirmed</button>`;
        } else if (o.status === 'prep') {
            sHtml = `<span style="color:var(--primary);font-weight:700"><i class="fa-solid fa-car"></i> 진행 예정</span>`;
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)"><i class="fa-solid fa-check-double"></i> 완료 처리</button>`;
        } else {
            sHtml = `<span style="color:var(--success)"><i class="fa-solid fa-check-circle"></i> 라운딩 완료</span>`;
            actBtn = `<button class="btn-outline-sm" disabled>정산됨</button>`;
        }

        const amtHtml = `<span style="font-weight:700;color:var(--txt)">₩${o.total.toLocaleString()}</span> (예상 수수료)`;

        return `
        <div class="hk-task ${o.status === 'new' ? 'dirty' : (o.status === 'done' ? 'clean' : 'inspect')}">
            <div class="hk-task-left">
                <div class="hk-task-room">${o.room}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <i class="fa-solid ${info.icon}" style="color:${info.color}"></i> ${info.label}
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${o.id}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        ${o.items}
                    </div>
                    <div class="hk-task-meta">
                        ${sHtml}
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> 접수: ${o.time}</span>
                        <span style="color:var(--border)">|</span>
                        <span>청구액: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function setFilter(btn, filter) {
    currentFilter = filter;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderOrders();
}

"Ancillary Svcs":"부가서비스","Dashboard":"대시보드","Reservations":"예약 타임라인","Booking List":"예약 목록","Check-in/out":"체크인/아웃","Guest CRM":"투숙객 관리","VIP Members":"우수 고객 멤버십","Room Mgmt":"객실 관리","Housekeeping":"하우스키핑","Folio & Billing":"통합 정산","Ancillary Svcs":"부가서비스","Hotel Settings":"호텔 설정","Staff Mgmt":"직원 관리","New Requests":"신규 요청","Preparing":"준비/진행 중","Completed":"처리 완료","Est. Revenue":"금일 예상 매출","All Services":"전체 서비스","Room Service":"룸서비스","Spa & Massage":"스파/마사지","Concierge":"컨시어지","Manual Order":"수기 오더 등록"},en: {

function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){currentLang=l;window.currentLang=l;localStorage.setItem('pms_lang', l);
    const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});
    document.getElementById('searchInput').placeholder=l==='en'?'Search room number...':'Room번호 검색...';
    if(tMap['club_a']) tMap['club_a'].label = l==='en'?'Sun Valley CC':'썬밸리 CC';
    if(tMap['club_b']) tMap['club_b'].label = l==='en'?'SKY72':'스카이72';
    /* renderOrders(); */
}

// 모달 및 오더 등록 로직
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }
function saveOrder() {
    showToast('새 Ancillary Svcs 오더가 시스템에 등록되었습니다.');
    closeModal('addOrderModal');
}

function handleItemSelect() {
    const sel = document.getElementById('itemSelect');
    const customInput = document.getElementById('customItemName');
    const priceInput = document.getElementById('orderPrice');
    
    if (sel.value === 'custom') {
        customInput.style.display = 'block';
        priceInput.readOnly = false;
        priceInput.value = '0.00';
    } else {
        customInput.style.display = 'none';
        if (sel.value !== '') {
            priceInput.readOnly = true;
            calculateTotal();
        }
    }
}

function calculateTotal() {
    const sel = document.getElementById('itemSelect');
    const qty = document.getElementById('itemQty').value;
    const priceInput = document.getElementById('orderPrice');
    
    if (sel.value && sel.value !== 'custom') {
        priceInput.value = (parseFloat(sel.value) * parseInt(qty)).toFixed(2);
    }
}

document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});
</script>

<!-- Add Order Modal -->
<div class="modal-overlay" id="addOrderModal" onclick="if(event.target===this) closeModal('addOrderModal')">

        <div class="modal-header">
            <h3 class="modal-title">골프장 신규 예약</h3>
            <button class="modal-close" onclick="closeModal('addOrderModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">호실 선택 <span style="color:var(--danger)">*</span></label>
                    <select id="golfRoom" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff" onchange="autoFillGuest('golf')">
                        <option value="">선택...</option>
                        <option value="1401">1401</option>
                        <option value="0807">0807</option>
                        <option value="1205">1205</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">고객명 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="golfGuest" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="자동 입력">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">국적 (국적)</label>
                    <input type="text" id="golfNation" readonly style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#f1f5f9" placeholder="자동 입력">

            </div>

        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('addOrderModal')">취소</button>
            <button class="btn-primary-sm" onclick="saveOrder()"><i class="fa-solid fa-check"></i> 예약 전송</button>

<div class="modal-overlay" id="partnerModal" onclick="if(event.target===this) closeModal('partnerModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">제휴 골프장 업체 Actions</h3>
            <button class="modal-close" onclick="closeModal('partnerModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">호실 선택 <span style="color:var(--danger)">*</span></label>
                    <select id="golfRoom" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff" onchange="autoFillGuest('golf')">
                        <option value="">선택...</option>
                        <option value="1401">1401</option>
                        <option value="0807">0807</option>
                        <option value="1205">1205</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">고객명 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="golfGuest" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="자동 입력">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">국적 (국적)</label>
                    <input type="text" id="golfNation" readonly style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#f1f5f9" placeholder="자동 입력">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">에이전시 (에이전시)</label>
                    <input type="text" id="golf에이전시" readonly style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#f1f5f9" placeholder="자동 입력">
                </div>
            </div>
            <hr style="border:none;border-top:1px solid var(--border2)">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">이용 일시 <span style="color:var(--danger)">*</span></label>
                    <input type="date" id="golfDate" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">티타임 (티 타임) <span style="color:var(--danger)">*</span></label>
                    <input type="time" id="golfTime" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">코스 (코스) <span style="color:var(--danger)">*</span></label>
                    <select id="golf코스" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>썬밸리 CC</option>
                        <option>스카이72 (SKY72)</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">인원 / 홀 (인원 / 홀수) <span style="color:var(--danger)">*</span></label>
                    <div style="display:flex;gap:8px">
                        <input type="number" id="golfPax" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);" placeholder="인원(명)">
                        <select id="golfHoles" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                            <option>9홀</option>
                            <option selected>18홀</option>
                            <option>27홀</option>
                        </select>
                    </div>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-primary-sm" onclick="closeModal('partnerModal')">확인</button>
        </div>
    </div>
</div>

<script>
// Mock guest registry for auto-fill based on room
const dummyGuests = {
    '1401': { name: 'Tran Linh', nation: 'Vietnam', agency: 'Agoda' },
    '0807': { name: 'John Smith', nation: 'USA', agency: 'Booking.com' },
    '1205': { name: 'Park Soo', nation: 'Korea', agency: 'Direct' }
};

function autoFillGuest(type) {
    const roomEl = document.getElementById(type + 'Room');
    const guestEl = document.getElementById(type + 'Guest');
    const nationEl = document.getElementById(type + 'Nation');
    const agencyEl = document.getElementById(type + '에이전시');
    const phoneEl = document.getElementById(type + 'Phone');
    
    if(roomEl && roomEl.value && dummyGuests[roomEl.value]) {
        const info = dummyGuests[roomEl.value];
        if(guestEl) guestEl.value = info.name;
        if(nationEl) nationEl.value = info.nation;
        if(agencyEl) agencyEl.value = info.agency;
        if(phoneEl && info.phone) phoneEl.value = info.phone;
    } else {
        if(guestEl) guestEl.value = '';
        if(nationEl) nationEl.value = '';
        if(agencyEl) agencyEl.value = '';
        if(phoneEl) phoneEl.value = '';
    }
}
</script>

<script>
function updateFilterCounts() {
    document.getElementById('chip-all').innerHTML = `All 예약 (${orders.length})`;
    document.getElementById('chip-club_a').innerHTML = `<i class="fa-solid fa-golf-ball-tee"></i> 썬밸리 CC (${orders.filter(o=>o.type==='club_a').length})`;
    document.getElementById('chip-club_b').innerHTML = `<i class="fa-solid fa-golf-ball-tee"></i> 스카이72 (${orders.filter(o=>o.type==='club_b').length})`;
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        orders = await PmsAPI.getGolfOrders();
        updateFilterCounts();
        renderOrders();
    } catch(e) { console.error(e); }
});
</script>
<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
</body>
</html>
