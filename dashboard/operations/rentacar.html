<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>렌터카 예약 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.filter-group { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.period-select, .provider-select { height: 36px; min-width: 150px; border: 1px solid var(--border); border-radius: 10px; background: #fff; color: var(--txt); font-family: var(--font); font-size: .78rem; font-weight: 700; padding: 0 34px 0 12px; outline: none; }
.provider-select { min-width: 190px; }
.period-select:focus, .provider-select:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(59,130,246,.08); }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-divider { display: none; }
    .filter-group { width: 100%; }
    .period-select, .provider-select { width: 100%; }
    .filter-right { justify-content: flex-start; }
}
</style>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Rent-a-car Booking">렌터카 예약</h1></header>

    <div class="content">
        <!-- KPI -->
        <div class="kpi-grid">
            <div class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-handshake"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiProviderCount">0</div>
                    <div class="kpi-label">이용 가능 업체</div>
                    <div class="kpi-sub">호텔 등록 + 플랫폼 추천</div>
                </div>
            </div>
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-calendar-check"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiOpenToday">0</div>
                    <div class="kpi-label">금일 예약 건</div>
                    <div class="kpi-sub">대여 예정 및 대기</div>
                </div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-car-on"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiDoneToday">0</div>
                    <div class="kpi-label">금일 대여 중/완료</div>
                    <div class="kpi-sub">정산 대상</div>
                </div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-sack-dollar"></i></div></div>
                <div class="kpi-body">
                    <div class="kpi-value" id="kpiCommission">$0</div>
                    <div class="kpi-label">예상 수수료 수익</div>
                    <div class="kpi-sub">예약 수수료 (별도 통계)</div>
                </div>
            </div>
        </div>

        <!-- MARKETPLACE -->
        <section class="marketplace-strip" id="marketplacePanel" aria-label="렌터카 플랫폼 입점 업체 추천">
            <div class="marketplace-loading">지역 렌터카 추천 업체를 불러오는 중입니다.</div>
        </section>

        <!-- FILTER -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" data-pms-no-search-button="true" placeholder="객실번호 검색..." oninput="renderOrders()" onkeydown="if(event.key==='Enter') renderOrders()">
                    </div>
                    <button onclick="renderOrders()" class="btn-primary-sm"
                        style="height:36px;padding:0 16px;border-radius:8px;font-size:.78rem;font-weight:600;display:flex;align-items:center;gap:5px;white-space:nowrap">
                        <i class="fa-solid fa-magnifying-glass"></i> 검색
                    </button>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <select id="periodFilterSelect" class="period-select" onchange="setPeriodFilter(this.value)">
                        <option value="week">최근 7일</option>
                        <option value="today">오늘</option>
                        <option value="month">이번 달</option>
                        <option value="all">전체 기간</option>
                    </select>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <div class="filter-chips" id="statusFilterChips">
                        <button class="chip active" onclick="setStatusFilter(this,'all')">전체 <span class="chip-count" id="statusAllCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'open')">미완료 <span class="chip-count" id="statusOpenCount">0</span></button>
                        <button class="chip" onclick="setStatusFilter(this,'done')">완료 <span class="chip-count" id="statusDoneCount">0</span></button>
                    </div>
                </div>
                <div class="filter-divider"></div>
                <div class="filter-group">
                    <select id="providerFilterSelect" class="provider-select" onchange="setProviderFilter(this.value)">
                        <option value="all">전체 업체</option>
                    </select>
                </div>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="openModal('partnerModal')"><i class="fa-solid fa-building"></i> 업체 관리</button>
                <button class="btn-primary-sm" onclick="openModal('addOrderModal')"><i class="fa-solid fa-plus"></i> 신규 예약</button>
            </div>
        </div>

        <!-- ORDER LIST -->
        <div class="hk-task-list" id="orderList">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<script>
let orders = [];
let rentacarReservations = [];
let rentacarGuests = [];

const tMap = {
    'lotte': { label:'롯데렌터카', icon:'fa-car', color:'var(--orange)' },
    'sk': { label:'SK렌터카', icon:'fa-car', color:'var(--purple)' },
};

let marketplace = {};
const DEFAULT_MARKETPLACE = {
    regionLabel: '',
    title: '지역 입점 렌터카 추천',
    description: '',
    banners: [],
    partners: []
};

const VEHICLE_CLASSES = [
    { value: 'compact', label: '\uCEF4\uD329\uD2B8', icon: 'fa-car-side' },
    { value: 'sedan', label: '\uC138\uB2E8', icon: 'fa-car' },
    { value: 'suv', label: 'SUV', icon: 'fa-truck-monster' },
    { value: 'van', label: '\uBC34/\uC2B9\uD569', icon: 'fa-van-shuttle' },
    { value: 'electric', label: '\uC804\uAE30\uCC28', icon: 'fa-bolt' },
    { value: 'hybrid', label: '\uD558\uC774\uBE0C\uB9AC\uB4DC', icon: 'fa-leaf' },
    { value: 'luxury', label: '\uB7ED\uC154\uB9AC', icon: 'fa-gem' },
    { value: 'chauffeur', label: '\uAE30\uC0AC \uD3EC\uD568', icon: 'fa-user-tie' }
];

let currentFilter = 'all';
let currentPeriodFilter = 'week';
let currentStatusFilter = 'all';

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function normalizeMarketplace(raw) {
    const source = raw && typeof raw === 'object' ? raw : {};
    const partners = Array.isArray(source.partners) ? source.partners : DEFAULT_MARKETPLACE.partners;
    const banners = Array.isArray(source.banners) ? source.banners : DEFAULT_MARKETPLACE.banners;
    return {
        ...DEFAULT_MARKETPLACE,
        ...source,
        partners,
        banners
    };
}

function marketplacePartners() {
    return Array.isArray(marketplace?.partners) ? marketplace.partners : [];
}

function marketplacePartnerByKey(key) {
    return marketplacePartners().find(partner => String(partner.key) === String(key));
}

function providerEntryFromPartner(partner) {
    return {
        key: String(partner.key || '').trim(),
        label: partner.name || partner.label || partner.partnerName || '추천 업체',
        count: 0,
        source: 'marketplace',
        badge: partner.badge || '추천',
        icon: partner.icon || 'fa-car',
        color: partner.color || 'var(--primary)'
    };
}

async function loadMarketplaceData() {
    try {
        if (window.PmsMockApi) {
            const env = await window.PmsMockApi.request('GET', '/ancillaries/rentacar-orders');
            if (env?.data?.marketplace) return env.data.marketplace;
        }
    } catch(e) {}
    try {
        const res = await fetch('../data/api/v1/ancillaries/rentacar-orders.json', { cache: 'no-store' });
        if (res.ok) {
            const env = await res.json();
            if (env?.data?.marketplace) return env.data.marketplace;
        }
    } catch(e) {}
    return DEFAULT_MARKETPLACE;
}

function renderMarketplace() {
    const panel = document.getElementById('marketplacePanel');
    if (!panel) return;
    const data = normalizeMarketplace(marketplace);
    const banner = data.banners?.[0] || {};
    const partners = marketplacePartners();
    if (!partners.length && !data.banners?.length) {
        panel.innerHTML = '<div class="marketplace-loading">입점 추천 업체 데이터가 없습니다.</div>';
        return;
    }
    panel.innerHTML = `
        <div class="marketplace-head">
            <div>
                <div class="marketplace-eyebrow"><i class="fa-solid fa-bullhorn"></i> 플랫폼 입점 추천</div>
                <div class="marketplace-title">${escapeHtml(data.title || '지역 입점 렌터카 추천')}</div>
                <div class="marketplace-desc">${escapeHtml(data.description || '')}</div>
            </div>
            <div class="marketplace-region"><i class="fa-solid fa-location-dot"></i> ${escapeHtml(data.regionLabel || '')}</div>
        </div>
        <div class="marketplace-grid">
            <div class="marketplace-banner">
                <div class="marketplace-banner-icon" style="background:${escapeHtml(banner.color || '#2563eb')}">
                    <i class="fa-solid ${escapeHtml(banner.icon || 'fa-car-side')}"></i>
                </div>
                <div class="marketplace-banner-body">
                    <span class="marketplace-badge"><i class="fa-solid fa-rectangle-ad"></i> ${escapeHtml(banner.badge || '광고')}</span>
                    <div class="marketplace-banner-title">${escapeHtml(banner.title || '추천 렌터카 상품')}</div>
                    <div class="marketplace-banner-copy">${escapeHtml(banner.copy || '')}</div>
                    <div class="marketplace-banner-meta">
                        ${banner.area ? `<span class="marketplace-meta-chip"><i class="fa-solid fa-map-location-dot"></i> ${escapeHtml(banner.area)}</span>` : ''}
                        ${banner.benefit ? `<span class="marketplace-meta-chip"><i class="fa-solid fa-percent"></i> ${escapeHtml(banner.benefit)}</span>` : ''}
                    </div>
                </div>
            </div>
            <div class="marketplace-partners">
                ${partners.map(partner => `
                    <div class="marketplace-partner">
                        <div class="marketplace-partner-icon" style="background:${escapeHtml(partner.color || '#2563eb')}">
                            <i class="fa-solid ${escapeHtml(partner.icon || 'fa-car')}"></i>
                        </div>
                        <div class="marketplace-partner-body">
                            <div class="marketplace-partner-name">${escapeHtml(partner.name || partner.label)}</div>
                            <div class="marketplace-partner-meta">${escapeHtml([partner.badge, partner.area, partner.benefit].filter(Boolean).join(' · '))}</div>
                        </div>
                        <button type="button" class="marketplace-action" onclick="useMarketplacePartner('${escapeHtml(partner.key)}')">예약 사용</button>
                    </div>
                `).join('')}
            </div>
        </div>
    `;
}

function useMarketplacePartner(key) {
    openModal('addOrderModal');
    const select = document.querySelector('#addOrderModal .provider-order-select');
    if (select) {
        select.value = key;
        select.dispatchEvent(new Event('change'));
    }
}

function providerKeyFor(order) {
    return String(order?.type || order?.providerType || order?.partnerId || order?.providerName || order?.partnerName || 'other').trim() || 'other';
}

function providerLabelFor(order, key = providerKeyFor(order)) {
    const marketplacePartner = marketplacePartnerByKey(key);
    return order?.providerLabel
        || order?.providerName
        || order?.partnerName
        || order?.companyName
        || order?.vendorName
        || marketplacePartner?.name
        || marketplacePartner?.label
        || tMap[key]?.label
        || String(key || '기타 업체').replace(/[-_]/g, ' ');
}

function providerMetaFor(order) {
    const key = providerKeyFor(order);
    const known = tMap[key] || marketplacePartnerByKey(key) || {};
    return {
        key,
        label: providerLabelFor(order, key),
        icon: known.icon || 'fa-car',
        color: known.color || 'var(--txt2)',
        source: known.source || (marketplacePartnerByKey(key) ? 'marketplace' : 'hotel'),
        badge: known.badge || ''
    };
}

function vehicleClassOf(order) {
    const raw = String(order?.vehicleClass || order?.carClass || order?.vehicleType || order?.carType || '').trim();
    if (raw) return raw;
    const itemText = String(order?.items || '').toLowerCase();
    if (/ev|electric|tesla|ioniq/.test(itemText)) return 'electric';
    if (/hybrid/.test(itemText)) return 'hybrid';
    if (/van|carnival|staria/.test(itemText)) return 'van';
    if (/suv|sorento|palisade/.test(itemText)) return 'suv';
    if (/g80|bmw|benz|mercedes|premium/.test(itemText)) return 'luxury';
    if (/chauffeur/.test(itemText)) return 'chauffeur';
    if (/k3|compact/.test(itemText)) return 'compact';
    return 'sedan';
}

function vehicleClassMeta(value) {
    const key = String(value || '').trim();
    return VEHICLE_CLASSES.find(item => item.value === key || item.label === key) || {
        value: key || 'sedan',
        label: key || '\uC138\uB2E8',
        icon: 'fa-car'
    };
}

function vehicleClassLabel(order) {
    return vehicleClassMeta(vehicleClassOf(order)).label;
}

function refreshVehicleClassOptions() {
    const select = document.getElementById('rentCarType');
    if (!select) return;
    select.innerHTML = [
        '<option value="">\uCC28\uC885 \uC120\uD0DD...</option>',
        ...VEHICLE_CLASSES.map(item => `<option value="${escapeHtml(item.value)}">${escapeHtml(item.label)}</option>`),
        '<option value="custom">\uC9C1\uC811 \uC785\uB825</option>'
    ].join('');
    toggleVehicleClassCustom();
}

function toggleVehicleClassCustom() {
    const select = document.getElementById('rentCarType');
    const custom = document.getElementById('rentCarTypeCustom');
    if (custom) custom.style.display = select?.value === 'custom' ? 'block' : 'none';
}

function providerEntries(options = {}) {
    const includeMarketplace = options.includeMarketplace !== false;
    const includeFallback = options.includeFallback !== false;
    const map = new Map();
    if (includeMarketplace) {
        marketplacePartners().forEach(partner => {
            const entry = providerEntryFromPartner(partner);
            if (entry.key) map.set(entry.key, entry);
        });
    }
    orders.forEach(order => {
        const meta = providerMetaFor(order);
        if (!map.has(meta.key)) {
            map.set(meta.key, { key: meta.key, label: meta.label, count: 0, source: meta.source, badge: meta.badge });
        }
        map.get(meta.key).count++;
    });
    if (!map.size && includeFallback) {
        Object.entries(tMap).forEach(([key, meta]) => map.set(key, { key, label: meta.label, count: 0 }));
    }
    return Array.from(map.values()).sort((a, b) => a.label.localeCompare(b.label, 'ko'));
}

function refreshProviderFilterOptions() {
    const select = document.getElementById('providerFilterSelect');
    const filterEntries = providerEntries({ includeMarketplace: false });
    const orderEntries = providerEntries({ includeMarketplace: true });
    if (currentFilter !== 'all' && !filterEntries.some(entry => entry.key === currentFilter)) currentFilter = 'all';
    if (select) {
        select.innerHTML = [
            `<option value="all">전체 업체 (${orders.length})</option>`,
            ...filterEntries.map(entry => `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)} (${entry.count})</option>`)
        ].join('');
        select.value = currentFilter;
    }
    document.querySelectorAll('.provider-order-select').forEach(orderSelect => {
        const selected = orderSelect.value;
        orderSelect.innerHTML = [
            `<option value="">업체 선택...</option>`,
            ...orderEntries.map(entry => {
                const suffix = entry.source === 'marketplace' ? ` · ${entry.badge || '플랫폼 추천'}` : '';
                return `<option value="${escapeHtml(entry.key)}">${escapeHtml(entry.label)}${escapeHtml(suffix)}</option>`;
            })
        ].join('');
        if (orderEntries.some(entry => entry.key === selected)) orderSelect.value = selected;
    });
}

function parseOrderDate(value) {
    if (!value) return null;
    const date = new Date(String(value));
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function periodRange(filter) {
    if (filter === 'all') return null;
    const today = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    today.setHours(0, 0, 0, 0);
    if (filter === 'today') return { start: today, end: today };
    if (filter === 'month') {
        return {
            start: new Date(today.getFullYear(), today.getMonth(), 1),
            end: new Date(today.getFullYear(), today.getMonth() + 1, 0)
        };
    }
    const start = new Date(today);
    start.setDate(today.getDate() - 6);
    return { start, end: today };
}

function orderDateValue(order) {
    return order.date || order.reservationDate || order.scheduledDate || order.pickupDate || order.rentDate;
}

function currentDataDate() {
    const dates = orders.map(orderDateValue).filter(Boolean).sort();
    return dates[dates.length - 1] || (window.PmsDate?.todayIso ? window.PmsDate.todayIso() : new Date().toISOString().slice(0, 10));
}

function orderMatchesPeriod(order) {
    const range = periodRange(currentPeriodFilter);
    if (!range) return true;
    const date = parseOrderDate(orderDateValue(order));
    if (!date) return true;
    return date >= range.start && date <= range.end;
}

function orderStatusKey(order) {
    const value = String(order?.status || 'new').replace(/[-_\s]/g, '').toLowerCase();
    if (['done', 'complete', 'completed', 'closed', 'paid'].includes(value)) return 'done';
    if (['prep', 'preparing', 'accepted', 'progress', 'processing'].includes(value)) return 'prep';
    return 'new';
}

function formatOrderTime(order) {
    const rawDate = orderDateValue(order);
    const date = rawDate ? String(rawDate).slice(5).replace('-', '.') : '';
    return [date, order.time].filter(Boolean).join(' ');
}

function defaultCurrency() {
    return localStorage.getItem('pms_default_currency') || 'USD';
}

function orderCurrency(order) {
    return order?.currency || order?.totalCurrency || order?.total?.currency || defaultCurrency();
}

function formatMoney(amount, currency = defaultCurrency()) {
    const code = String(currency || 'USD').toUpperCase();
    const value = Number(amount || 0);
    try {
        return new Intl.NumberFormat('en-US', {
            style: 'currency',
            currency: code,
            minimumFractionDigits: Number.isInteger(value) ? 0 : 2,
            maximumFractionDigits: code === 'USD' ? 2 : 0
        }).format(value);
    } catch(e) {
        const symbols = { USD: '$', KRW: '₩', VND: '₫', THB: '฿', JPY: '¥' };
        return `${symbols[code] || `${code} `}${value.toLocaleString()}`;
    }
}

function updateRevenueKpi() {
    const el = document.getElementById('kpiCommission');
    if (!el) return;
    const currency = orders.length ? orderCurrency(orders[0]) : defaultCurrency();
    const total = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
    el.textContent = formatMoney(total, currency);
}

function updateStatusCounts() {
    const all = orders.length;
    const done = orders.filter(order => orderStatusKey(order) === 'done').length;
    const open = all - done;
    const dataDate = currentDataDate();
    const openToday = orders.filter(order => orderDateValue(order) === dataDate && orderStatusKey(order) !== 'done').length;
    const doneToday = orders.filter(order => orderDateValue(order) === dataDate && orderStatusKey(order) === 'done').length;
    const providerCount = providerEntries({ includeMarketplace: true }).length;
    const allEl = document.getElementById('statusAllCount');
    const openEl = document.getElementById('statusOpenCount');
    const doneEl = document.getElementById('statusDoneCount');
    if (allEl) allEl.textContent = all;
    if (openEl) openEl.textContent = open;
    if (doneEl) doneEl.textContent = done;
    const providerEl = document.getElementById('kpiProviderCount');
    const openTodayEl = document.getElementById('kpiOpenToday');
    const doneTodayEl = document.getElementById('kpiDoneToday');
    if (providerEl) providerEl.textContent = providerCount;
    if (openTodayEl) openTodayEl.textContent = openToday;
    if (doneTodayEl) doneTodayEl.textContent = doneToday;
}

function renderOrders() {
    const search = document.getElementById('searchInput').value.toLowerCase();
    const container = document.getElementById('orderList');
    updateRevenueKpi();
    updateStatusCounts();
    
    const filtered = orders.filter(o => {
        if (currentFilter !== 'all' && providerKeyFor(o) !== currentFilter) return false;
        const status = orderStatusKey(o);
        if (currentStatusFilter === 'open' && status === 'done') return false;
        if (currentStatusFilter === 'done' && status !== 'done') return false;
        if (!orderMatchesPeriod(o)) return false;
        const haystack = [o.room, o.guest, o.id, o.items, providerLabelFor(o), vehicleClassLabel(o)].join(' ').toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3)">해당하는 오더가 없습니다.</div>';
        return;
    }

    container.innerHTML = filtered.map(o => {
        const info = providerMetaFor(o);
        const vehicle = vehicleClassMeta(vehicleClassOf(o));
        const status = orderStatusKey(o);
        
        let sHtml, actBtn;
        if (status === 'new') {
            sHtml = `<span style="color:var(--danger);font-weight:700"><i class="fa-solid fa-circle-exclamation"></i> 예약 대기</span>`;
            actBtn = `<button class="btn-primary-sm"><i class="fa-solid fa-check"></i> 예약 확정</button>`;
        } else if (status === 'prep') {
            sHtml = `<span style="color:var(--primary);font-weight:700"><i class="fa-solid fa-key"></i> 배차 진행중</span>`;
            actBtn = `<button class="btn-primary-sm" style="background:var(--success);border-color:var(--success)"><i class="fa-solid fa-check-double"></i> 대여 완료</button>`;
        } else {
            sHtml = `<span style="color:var(--success)"><i class="fa-solid fa-check-circle"></i> 반납 완료</span>`;
            actBtn = `<button class="btn-outline-sm" disabled>정산됨</button>`;
        }

        const amtHtml = `<span style="font-weight:700;color:var(--txt)">${formatMoney(o.total, orderCurrency(o))}</span> (예상 수수료)`;

        return `
        <div class="hk-task ${status === 'new' ? 'dirty' : (status === 'done' ? 'clean' : 'inspect')}">
            <div class="hk-task-left">
                <div class="hk-task-room">${escapeHtml(o.room)}</div>
                <div class="hk-task-info">
                    <div class="hk-task-title">
                        <i class="fa-solid ${escapeHtml(info.icon)}" style="color:${escapeHtml(info.color)}"></i> ${escapeHtml(info.label)}
                        <span style="font-size:0.75rem;color:var(--txt3);font-weight:400;margin-left:6px">${escapeHtml(o.id)}</span>
                    </div>
                    <div class="hk-task-meta" style="color:var(--txt);font-weight:500">
                        <span style="display:inline-flex;align-items:center;gap:5px;padding:2px 7px;border-radius:999px;background:rgba(59,130,246,.08);color:var(--primary);font-size:.72rem;font-weight:800;margin-right:6px">
                            <i class="fa-solid ${escapeHtml(vehicle.icon)}"></i> ${escapeHtml(vehicle.label)}
                        </span>
                        ${escapeHtml(o.items)}
                    </div>
                    <div class="hk-task-meta">
                        ${sHtml}
                        <span style="color:var(--border)">|</span>
                        <span><i class="fa-regular fa-clock"></i> 접수: ${formatOrderTime(o)}</span>
                        <span style="color:var(--border)">|</span>
                        <span>청구액: ${amtHtml}</span>
                    </div>
                </div>
            </div>
            <div class="hk-task-right">
                ${actBtn}
            </div>
        </div>
        `;
    }).join('');
}

function setProviderFilter(filter) {
    currentFilter = filter || 'all';
    refreshProviderFilterOptions();

<script>
function mockItems(env) {
    if (!env) return [];
    if (window.PmsMockApi?.items) return window.PmsMockApi.items(env);
    if (Array.isArray(env?.data?.items)) return env.data.items;
    if (Array.isArray(env?.items)) return env.items;
    return Array.isArray(env) ? env : [];
}

function normalizeRoomKeys(value) {
    const raw = String(value || '').trim().toUpperCase();
    if (!raw) return [];
    const tail = raw.includes('-') ? raw.split('-').pop() : raw;
    const digits = (tail.match(/\d+/g) || []).join('');
    const shortDigits = digits.replace(/^0+(?=\d)/, '');
    return [...new Set([raw, tail, digits, shortDigits].filter(Boolean))];
}

function sameRoomValue(left, right) {
    const leftKeys = normalizeRoomKeys(left);
    const rightKeys = new Set(normalizeRoomKeys(right));
    return leftKeys.some(key => rightKeys.has(key));
}

function roomDisplayNo(value) {
    const raw = String(value || '').trim();
    if (!raw) return '';
    return raw.replace(/^ROOM[-\s]*/i, '').trim();
}

function reservationRoomValues(reservation) {
    const values = [
        reservation?.room,
        reservation?.roomNo,
        reservation?.roomNumber,
        reservation?.roomLabel,
        reservation?.fullRoom,
        reservation?.roomId
    ];
    if (reservation?.roomId && window.PmsMockApi?.roomNoFromId) {
        values.push(window.PmsMockApi.roomNoFromId(reservation.roomId));
    }
    return values.filter(value => value !== undefined && value !== null && String(value).trim() !== '');
}

function reservationRoomNo(reservation) {
    const fromValues = reservationRoomValues(reservation);
    return roomDisplayNo(fromValues.find(Boolean));
}

function parseRentDate(value) {
    const text = String(value || '').trim();
    const match = text.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (!match) return null;
    const date = new Date(Number(match[1]), Number(match[2]) - 1, Number(match[3]));
    date.setHours(0, 0, 0, 0);
    return date;
}

function rentTodayDate() {
    const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    date.setHours(0, 0, 0, 0);
    return date;
}

function reservationStatusKey(value) {
    return String(value || '').toLowerCase().replace(/[\s_-]+/g, '');
}

function isInactiveReservation(reservation) {
    const status = reservationStatusKey(reservation?.status);
    return ['cancelled', 'canceled', 'noshow', 'checkedout', 'blocked'].includes(status);
}

function reservationMatchesRoom(reservation, room) {
    return reservationRoomValues(reservation).some(value => sameRoomValue(value, room));
}

function reservationCoversToday(reservation) {
    const today = rentTodayDate();
    const checkIn = parseRentDate(reservation?.checkInDate || reservation?.checkIn || reservation?.arrivalDate || reservation?.startDate);
    const checkOut = parseRentDate(reservation?.checkOutDate || reservation?.checkOut || reservation?.departureDate || reservation?.endDate);
    return Boolean(checkIn && checkOut && checkIn <= today && today <= checkOut);
}

function reservationCheckInTime(reservation) {
    const checkIn = parseRentDate(reservation?.checkInDate || reservation?.checkIn || reservation?.arrivalDate || reservation?.startDate);
    return checkIn ? checkIn.getTime() : 0;
}

function reservationRank(reservation) {
    const today = rentTodayDate().getTime();
    const checkIn = reservationCheckInTime(reservation);
    const status = reservationStatusKey(reservation?.status);
    const inHouseStatus = ['checkedin', 'inhouse', 'occupied'].includes(status);
    const coversToday = reservationCoversToday(reservation);
    if (inHouseStatus && (!checkIn || coversToday)) return 0;
    if (coversToday) return 1;
    if (inHouseStatus) return 2;
    if (checkIn >= today) return 3;
    return 4;
}

function sortReservationsForGuestLookup(a, b) {
    const rankDiff = reservationRank(a) - reservationRank(b);
    if (rankDiff) return rankDiff;
    const aTime = reservationCheckInTime(a);
    const bTime = reservationCheckInTime(b);
    if (reservationRank(a) <= 1) return bTime - aTime;
    return aTime - bTime;
}

function findGuestByReservation(reservation) {
    if (!reservation) return null;
    const guestId = reservation.guestId || reservation.customerId || reservation.crmGuestId;
    if (guestId) {
        const byId = rentacarGuests.find(guest => String(guest.id) === String(guestId));
        if (byId) return byId;
    }
    const name = String(reservation.guestName || reservation.guest || reservation.name || '').trim().toLowerCase();
    return name ? rentacarGuests.find(guest => String(guest.name || '').trim().toLowerCase() === name) : null;
}

function guestInfoFromReservation(reservation) {
    const guest = findGuestByReservation(reservation);
    return {
        name: reservation?.guestName || reservation?.guest || reservation?.name || guest?.name || '',
        phone: reservation?.phone || reservation?.guestPhone || reservation?.mobile || guest?.phone || guest?.mobile || ''
    };
}

function findRoomGuest(room) {
    if (!room) return null;
    const reservation = rentacarReservations
        .filter(item => !isInactiveReservation(item) && reservationMatchesRoom(item, room))
        .sort(sortReservationsForGuestLookup)[0];
    return reservation ? guestInfoFromReservation(reservation) : null;
}

function findRentacarOrderGuest(room) {
    const order = orders.find(item => sameRoomValue(item.room || item.roomNo || item.roomId, room));
    if (!order) return null;
    return {
        name: order.guest || order.guestName || order.name || '',
        phone: order.phone || order.guestPhone || ''
    };
}

function refreshRentRoomOptions() {
    const select = document.getElementById('rentRoom');
    if (!select) return;

    const selectedValue = select.value;
    const seen = new Set();
    const options = [];

    rentacarReservations
        .filter(item => !isInactiveReservation(item))
        .sort(sortReservationsForGuestLookup)
        .forEach(reservation => {
            const roomNo = reservationRoomNo(reservation);
            if (!roomNo) return;
            const key = normalizeRoomKeys(roomNo)[0];
            if (seen.has(key)) return;
            seen.add(key);
            const guest = guestInfoFromReservation(reservation).name;
            options.push({ value: roomNo, label: guest ? `${roomNo} - ${guest}` : roomNo });
        });

    orders.forEach(order => {
        const roomNo = roomDisplayNo(order.room || order.roomNo || order.roomId);
        if (!roomNo) return;
        const key = normalizeRoomKeys(roomNo)[0];
        if (seen.has(key)) return;
        seen.add(key);
        const guest = order.guest || order.guestName || order.name || '';
        options.push({ value: roomNo, label: guest ? `${roomNo} - ${guest}` : roomNo });
    });

    select.replaceChildren();
    const placeholder = document.createElement('option');
    placeholder.value = '';
    placeholder.textContent = '\uD638\uC2E4 \uC120\uD0DD...';
    select.appendChild(placeholder);

    options.forEach(option => {
        const node = document.createElement('option');
        node.value = option.value;
        node.textContent = option.label;
        select.appendChild(node);
    });

    if (selectedValue && options.some(option => sameRoomValue(option.value, selectedValue))) {
        select.value = options.find(option => sameRoomValue(option.value, selectedValue)).value;
    }
}

function autoFillGuest(type) {
    const roomEl = document.getElementById(type + 'Room');
    const guestEl = document.getElementById(type + 'Guest');
    const phoneEl = document.getElementById(type + 'Phone');
    const room = String(roomEl?.value || '').trim();
    const info = findRoomGuest(room) || findRentacarOrderGuest(room);
    
    if(room && info) {
        if(guestEl) guestEl.value = info.name || '';
        if(phoneEl) phoneEl.value = info.phone || '';
    } else {
        if(guestEl) guestEl.value = '';
        if(phoneEl) phoneEl.value = '';
    }
}
</script>

<script>
function updateFilterCounts() {
    refreshProviderFilterOptions();
    updateRevenueKpi();
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        refreshVehicleClassOptions();
        const [rentacarOrders, marketplaceData, reservationEnv, guestEnv] = await Promise.all([
            PmsAPI.getRentacarOrders(),
            loadMarketplaceData(),
            window.PmsMockApi ? window.PmsMockApi.request('GET', '/reservations').catch(() => null) : Promise.resolve(null),
            window.PmsMockApi ? window.PmsMockApi.request('GET', '/crm/guests').catch(() => null) : Promise.resolve(null)
        ]);
        orders = rentacarOrders;
        marketplace = normalizeMarketplace(marketplaceData);
        rentacarReservations = mockItems(reservationEnv);
        rentacarGuests = mockItems(guestEnv);
        refreshRentRoomOptions();
        renderMarketplace();
        updateFilterCounts();
        renderOrders();
    } catch(e) { console.error(e); }
});
</script>
