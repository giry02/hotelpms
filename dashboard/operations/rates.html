<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>요금 캘린더 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <style>
        .calendar-wrapper { width:100%; overflow-x:auto; overflow-y:auto; max-height: calc(100vh - 200px); background:#fff; border-radius:var(--radius-lg); border:1px solid var(--border); }
        .rate-table { width:100%; min-width:800px; border-collapse:collapse; text-align:center; font-family:var(--font); font-size:0.85rem; }
        .rate-table th { background:var(--bg); border:1px solid var(--border); padding:12px; font-weight:600; color:var(--txt2); position: sticky; top: 0; z-index: 10; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
        .rate-table td { border:1px solid var(--border); padding:8px; vertical-align:middle; transition:all 0.1s; }
        .rate-table tbody tr:hover td { background:var(--primary-lt); }
        
        .date-col { font-weight:700; background:var(--bg); width:120px; padding:10px 16px !important; position: sticky; left: 0; z-index: 5; }
        .rate-table th:first-child { z-index: 15; left: 0; }
        
        .rate-input { width:100%; border:1px solid transparent; background:transparent; text-align:center; font-family:var(--font); font-size:0.95rem; outline:none; font-weight:600; padding:6px; border-radius:4px; transition:all 0.2s; }
        .rate-input:hover { border-color:var(--border); background:#fff; }
        .rate-input:focus { color:var(--primary); border-color:var(--primary); background:#fff; box-shadow:0 0 0 2px var(--primary-lt); }
        
        .weekend { background:#FEF2F2 !important; color:var(--danger); }
        .weekend-text { color:var(--danger); }
        .saturday-text { color:var(--primary); }
    </style>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1 data-i18n-key="Rates Calendar">요금 캘린더</h1>
            <span class="date-badge"><i class="fa-regular fa-calendar"></i> <span id="currentMonthLabel">2026년 5월</span></span>
        </div>
        <div class="topbar-right">
            <div style="font-size:0.85rem;font-weight:700;color:var(--txt);margin-right:8px;display:flex;align-items:center;gap:4px"><i class="fa-solid fa-hotel" style="color:var(--primary)"></i> The Grand Saigon</div>
            <select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px">
                <option value="ko">🇰🇷 한국어</option><option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="content">
        <div class="filter-bar">
            <div class="filter-left">
                <select class="form-control" style="height:36px;border:1px solid var(--border);border-radius:4px;padding:0 10px" id="monthSelector" onchange="changeMonth()">
                    <option value="2026-05">2026년 5월</option>
                    <option value="2026-06">2026년 6월</option>
                    <option value="2026-07">2026년 7월</option>
                </select>
            </div>
            <div class="filter-right">
                <button class="btn-outline-sm" onclick="openModal('vipDiscountModal')"><i class="fa-solid fa-crown"></i> VIP Discounts</button>
                <button class="btn-outline-sm" onclick="resetToDefault()"><i class="fa-solid fa-rotate-left"></i> 기본 요금으로 초기화</button>
                <button class="btn-primary-sm" onclick="saveRates()"><i class="fa-solid fa-check"></i> <span data-i18n-key="Save Rates">요금 저장</span></button>
            </div>
        </div>

        <div class="calendar-wrapper" style="margin-top:16px">
            <table class="rate-table" id="ratesTable">
                <thead>
                    <tr id="ratesTableHeader">
                        <!-- Generated by JS -->
                    </tr>
                </thead>
                <tbody id="ratesTableBody">
                    <!-- Generated by JS -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- VIP Discount Modal -->
<div class="modal-overlay" id="vipDiscountModal" onclick="if(event.target===this) closeModal('vipDiscountModal')">
    <div class="modal-card" style="max-width:400px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">Auto VIP Discounts</h3>
            <button class="modal-close" onclick="closeModal('vipDiscountModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <p style="font-size:0.85rem;color:var(--txt2)">고객 등급에 따라 예약 시 자동으로 적용될 할인율(%)을 지정합니다.</p>
            <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-weight:600;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#E2E8F0"></span> Standard</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="number" style="height:34px;width:80px;border:1px solid var(--border);border-radius:4px;text-align:right;padding-right:10px" value="0"> 
                    <span style="font-weight:600;color:var(--txt2)">%</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-weight:600;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#94A3B8"></span> Silver</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="number" style="height:34px;width:80px;border:1px solid var(--border);border-radius:4px;text-align:right;padding-right:10px" value="5">
                    <span style="font-weight:600;color:var(--txt2)">%</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-weight:600;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#F59E0B"></span> Gold</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="number" style="height:34px;width:80px;border:1px solid var(--border);border-radius:4px;text-align:right;padding-right:10px" value="10">
                    <span style="font-weight:600;color:var(--txt2)">%</span>
                </div>
            </div>
            <div style="display:flex;align-items:center;justify-content:space-between">
                <span style="font-weight:600;display:flex;align-items:center;gap:8px"><span style="display:inline-block;width:12px;height:12px;border-radius:50%;background:#8B5CF6"></span> VIP</span>
                <div style="display:flex;align-items:center;gap:8px">
                    <input type="number" style="height:34px;width:80px;border:1px solid var(--border);border-radius:4px;text-align:right;padding-right:10px" value="20">
                    <span style="font-weight:600;color:var(--txt2)">%</span>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline-sm" onclick="closeModal('vipDiscountModal')">취소</button>
            <button class="btn-primary-sm" onclick="closeModal('vipDiscountModal')"><i class="fa-solid fa-check"></i> 저장</button>
        </div>
    </div>
</div>

<!-- Toast Container -->
<div id="toastContainer"></div>

<script>
// --- 객실 유형 및 기본 요금 설정 ---
const DEFAULT_ROOM_TYPES = [
    { id: 'Standard', name: 'Standard Double', basePrice: 120 },
    { id: 'Deluxe', name: 'Deluxe King', basePrice: 180 },
    { id: 'Premier', name: 'Premier Twin', basePrice: 220 },
    { id: 'Suite', name: 'Executive Suite', basePrice: 350 },
    { id: 'Penthouse', name: 'Penthouse', basePrice: 800 },
];

function getRoomTypes() {
    try {
        const saved = localStorage.getItem('pms_room_types_config');
        if (saved) return JSON.parse(saved);
        localStorage.setItem('pms_room_types_config', JSON.stringify(DEFAULT_ROOM_TYPES));
        return DEFAULT_ROOM_TYPES;
    } catch {
        return DEFAULT_ROOM_TYPES;
    }
}

// --- 요금 데이터 관리 ---
let roomTypes = getRoomTypes();
let dailyRates = {}; // { '2026-05-01': { 'Standard': 120, 'Deluxe': 180, ... } }
let currentYearMonth = '2026-05';

function loadRates() {
    try {
        const saved = localStorage.getItem('pms_daily_rates');
        if (saved) {
            dailyRates = JSON.parse(saved);
        }
    } catch (e) {
        console.error('Failed to load rates', e);
    }
}

function saveRates() {
    // 현재 화면의 인풋 값을 긁어서 dailyRates에 반영
    const inputs = document.querySelectorAll('.rate-input');
    inputs.forEach(input => {
        const date = input.getAttribute('data-date');
        const typeId = input.getAttribute('data-type');
        let val = parseFloat(input.value.replace(/[^0-9.]/g, ''));
        if (isNaN(val)) val = 0;
        
        if (!dailyRates[date]) dailyRates[date] = {};
        dailyRates[date][typeId] = val;
    });
    
    localStorage.setItem('pms_daily_rates', JSON.stringify(dailyRates));
    showToast('요금이 성공적으로 저장되었습니다.');
}

function resetToDefault() {
    if(!confirm('해당 월의 모든 요금을 객실유형의 기본 요금으로 초기화하시겠습니까?')) return;
    
    const [year, month] = currentYearMonth.split('-');
    const daysInMonth = new Date(year, month, 0).getDate();
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${month}-${day.toString().padStart(2, '0')}`;
        if (!dailyRates[dateStr]) dailyRates[dateStr] = {};
        
        roomTypes.forEach(rt => {
            dailyRates[dateStr][rt.id] = rt.basePrice;
        });
    }
    
    renderCalendar();
    showToast('기본 요금으로 초기화되었습니다. 변경사항을 저장하려면 요금 저장을 누르세요.', 'info');
}

// --- 달력 렌더링 ---
function changeMonth() {
    currentYearMonth = document.getElementById('monthSelector').value;
    const [year, month] = currentYearMonth.split('-');
    document.getElementById('currentMonthLabel').innerText = `${year}년 ${parseInt(month)}월`;
    renderCalendar();
}

function renderCalendar() {
    const header = document.getElementById('ratesTableHeader');
    const body = document.getElementById('ratesTableBody');
    
    // 1. 헤더 생성
    let thHtml = `<th class="date-col">일자 (Date)</th>`;
    roomTypes.forEach(rt => {
        thHtml += `<th>${rt.name}<br><span style="font-size:0.75rem;font-weight:400;color:var(--txt3)">기본: $${rt.basePrice}</span></th>`;
    });
    header.innerHTML = thHtml;
    
    // 2. 바디(일자별 행) 생성
    const [year, month] = currentYearMonth.split('-');
    const daysInMonth = new Date(year, month, 0).getDate();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    
    let trHtml = '';
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(year, parseInt(month)-1, day);
        const dayOfWeek = dateObj.getDay();
        const dateStr = `${year}-${month}-${day.toString().padStart(2, '0')}`;
        
        let rowClass = '';
        let textClass = '';
        
        if (dayOfWeek === 0) { // 일요일
            rowClass = 'weekend';
            textClass = 'weekend-text';
        } else if (dayOfWeek === 6) { // 토요일
            rowClass = 'weekend';
            textClass = 'saturday-text';
        }
        
        trHtml += `<tr class="${rowClass}">`;
        trHtml += `<td class="date-col ${textClass}">${parseInt(month)}/${day} (${dayNames[dayOfWeek]})</td>`;
        
        roomTypes.forEach(rt => {
            // 저장된 요금이 있으면 사용, 없으면 기본 요금 사용
            let price = rt.basePrice;
            if (dailyRates[dateStr] && dailyRates[dateStr][rt.id] !== undefined) {
                price = dailyRates[dateStr][rt.id];
            } else {
                // 초기 데이터가 없는 날짜는 기본 요금으로 설정해둠
                if (!dailyRates[dateStr]) dailyRates[dateStr] = {};
                dailyRates[dateStr][rt.id] = price;
            }
            
            trHtml += `<td>
                <div style="position:relative; display:flex; align-items:center; justify-content:center;">
                    <span style="position:absolute; left:20px; color:var(--txt3); font-weight:600;">$</span>
                    <input type="text" class="rate-input" data-date="${dateStr}" data-type="${rt.id}" value="${price}">
                </div>
            </td>`;
        });
        
        trHtml += `</tr>`;
    }
    
    body.innerHTML = trHtml;
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function showToast(msg, type = 'success') {
    const exist = document.getElementById('pms-toast');
    if (exist) exist.remove();
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const bg = type === 'success' ? '#D1FAE5' : (type === 'error' ? '#FEE2E2' : '#DBEAFE');
    const cl = type === 'success' ? '#065F46' : (type === 'error' ? '#991B1B' : '#1E3A8A');
    const ic = type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${cl};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease forwards`;
    t.innerHTML = `<i class="fa-solid ${ic}"></i>${msg}`;
    const style = document.createElement('style');
    style.innerHTML = `@keyframes toastIn { from {opacity:0;transform:translateY(15px)} to {opacity:1;transform:translateY(0)} }`;
    document.head.appendChild(style);
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(15px)'; t.style.transition='all .3s'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// i18n 처리 (기존 로직 유지)
let currentLang='ko';
const translations={ko: {"Save Rates":"요금 저장"}, en: {"Save Rates":"Save Rates"}};
function changeLang(l){
    currentLang=l;
    const d=translations[l]||translations.ko;
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{
        const k=e.getAttribute('data-i18n-key');
        if(d[k])e.textContent=d[k];
    });
}

document.addEventListener('DOMContentLoaded', () => {
    loadRates();
    renderCalendar();
});
</script>
</body>
</html>
