        /* Filter Bar Styling */
        .filter-bar-mt {
            display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
            padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
        }
        .filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
        
        @media(max-width:768px) {
            .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
            .filter-right { justify-content: flex-start; }

        .calendar-wrapper { width:100%; overflow-x:auto; overflow-y:auto; max-height: calc(100vh - 200px); background:#fff; border-radius:var(--radius-lg); border:1px solid var(--border); }
        .rate-table { width:100%; min-width:800px; border-collapse:collapse; text-align:center; font-family:var(--font); font-size:0.85rem; }

<script>
// --- 객실 유형 및 기본 요금 설정 ---
let DEFAULT_ROOM_TYPES = [];

function getRoomTypes() {
    try {
        const saved = localStorage.getItem('pms_room_types_config');
        if (saved) return JSON.parse(saved);
        return [];
    } catch {
        return [];
    }
}

// --- 요금 데이터 관리 ---
let roomTypes = getRoomTypes();
let dailyRates = {}; // { '2026-05-01': { 'STD': 120, 'DLX-CITY': 180, ... } }
let currentYearMonth = monthKey(new Date());

function monthKey(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    return `${year}-${month}`;
}

function addMonths(date, offset) {
    return new Date(date.getFullYear(), date.getMonth() + offset, 1);
}

function monthOptionLabel(value) {
    const [year, month] = value.split('-');
    return `${year}년 ${Number(month)}월`;
}

function populateMonthSelector() {
    const selector = document.getElementById('monthSelector');
    if (!selector) return;
    const previousValue = selector.value || currentYearMonth || monthKey(new Date());
    const anchor = new Date();
    anchor.setDate(1);
    const values = [];
    for (let offset = -1; offset <= 24; offset++) {
        values.push(monthKey(addMonths(anchor, offset)));
    }
    if (!values.includes(previousValue)) values.push(previousValue);
    selector.innerHTML = values
        .sort()
        .map(value => `<option value="${value}">${monthOptionLabel(value)}</option>`)
        .join('');
    selector.value = values.includes(previousValue) ? previousValue : monthKey(anchor);
    currentYearMonth = selector.value;
}

function getCurrencyCode() {
    return localStorage.getItem('pms_default_currency') || 'PHP';
}

function formatRate(value) {
    return Number(value || 0).toLocaleString('ko-KR');
}

function roomTypeLabel(rt) {
    const name = String(rt?.name || rt?.id || '').trim();
    const view = String(rt?.view || '').trim();
    return view ? `${name} · ${view}` : name || '-';
}

const roomTypeCollator = new Intl.Collator(['ko', 'en'], { numeric: true, sensitivity: 'base' });
const knownViewLabels = [
    'City View', 'Ocean View', 'Sea View', 'Partial Ocean View', 'Mountain View',
    'Garden View', 'River View', 'Lake View', 'Harbor View', 'Harbour View',
    'Pool View', 'Poolside', 'Panoramic View',
    '시티뷰', '오션뷰', '씨뷰', '마운틴뷰', '가든뷰', '리버뷰', '레이크뷰', '하버뷰', '풀뷰', '파노라마뷰'
];

function sortKey(value) {
    return String(value || '')
        .trim()
        .toLowerCase()
        .normalize('NFKC')
        .replace(/[^\p{L}\p{N}]+/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

function escapeRegExp(value) {
    return String(value).replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
}

function stripViewFromName(name, view) {
    let result = String(name || '').trim();
    const viewText = String(view || '').trim();
    if (!result || !viewText) return result;
    const pattern = new RegExp(`(?:\\s*(?:·|•|/|-|–|—)\\s*)?${escapeRegExp(viewText)}\\s*$`, 'i');
    return result.replace(pattern, '').trim() || result;
}

function inferRoomTypeParts(rt) {
    let name = String(rt?.name || rt?.typeName || rt?.roomTypeName || rt?.id || '').trim();
    let view = String(rt?.view || rt?.viewType || rt?.category || '').trim();

    if (view) {
        name = stripViewFromName(name, view);
    } else {
        const delimited = name.split(/\s*(?:·|•|\||\/|–|—|\s-\s)\s*/).filter(Boolean);
        if (delimited.length > 1) {
            view = delimited.pop().trim();
            name = delimited.join(' ').trim();
        } else {
            const matchedView = knownViewLabels.find(label => new RegExp(`(?:^|\\s)${escapeRegExp(label)}\\s*$`, 'i').test(name));
            if (matchedView) {
                view = matchedView;
                name = stripViewFromName(name, matchedView);
            }
        }
    }

    return {
        group: sortKey(name),
        view: sortKey(view),
        id: sortKey(rt?.id || rt?.typeId || rt?.code || '')
    };
}

function roomTypeBaseAmount(rt) {
    const value = Number(rt?.basePrice ?? rt?.baseRate?.amount ?? rt?.baseRate ?? 0);
    return Number.isFinite(value) && value > 0 ? value : Number.POSITIVE_INFINITY;
}

function sortedRoomTypes(list = roomTypes) {
    const source = [...(list || [])];
    const groupRanks = source.reduce((map, rt) => {
        const group = inferRoomTypeParts(rt).group;
        const amount = roomTypeBaseAmount(rt);
        map.set(group, Math.min(map.get(group) ?? Number.POSITIVE_INFINITY, amount));
        return map;
    }, new Map());

    return source.sort((a, b) => {
        const left = inferRoomTypeParts(a);
        const right = inferRoomTypeParts(b);
        const rankCompare = (groupRanks.get(left.group) ?? Number.POSITIVE_INFINITY) - (groupRanks.get(right.group) ?? Number.POSITIVE_INFINITY);
        if (rankCompare !== 0) return rankCompare;
        const groupCompare = roomTypeCollator.compare(left.group, right.group);
        if (groupCompare !== 0) return groupCompare;
        const viewCompare = roomTypeCollator.compare(left.view, right.view);
        if (viewCompare !== 0) return viewCompare;
        return roomTypeCollator.compare(left.id, right.id);
    });
}

function normalizeRateRoomType(rt) {
    const id = rt.id || rt.typeId || rt.code || rt.name;
    const base = Number(rt.basePrice ?? rt.baseRate?.amount ?? rt.baseRate ?? 0);
    return {
        ...rt,
        id,
        typeId: id,
        name: rt.name || id,
        view: rt.view || rt.viewType || '',
        basePrice: base,
        baseRate: base,
        currency: rt.currency || rt.baseRate?.currency || getCurrencyCode()
    };
}

function populateBatchRoomTypes() {
    const select = document.getElementById('batchRoomType');
    if (!select) return;
    const current = select.value || 'all';
    const sortedTypes = sortedRoomTypes();
    select.innerHTML = `<option value="all">전체 객실 유형</option>` + sortedTypes.map(rt => (
        `<option value="${rt.id}">${roomTypeLabel(rt)}</option>`
    )).join('');
    select.value = current === 'all' || roomTypes.some(rt => rt.id === current) ? current : 'all';
}

function loadRates() {
    try {
        const saved = localStorage.getItem('pms_daily_rates');
        if (saved) {
            dailyRates = JSON.parse(saved);
        }
    } catch (e) {
        console.error('Failed to load rates', e);
    }
}

async function loadMockRates() {
    try {
        if (!window.PmsMockApi) return;
        const env = await window.PmsMockApi.request('GET', '/rates/calendar');
        const rows = window.PmsMockApi.items(env);
        if (!rows.length) return;
        rows.forEach(row => {
            const date = row.date;
            const sourceType = row.roomTypeName || row.roomTypeId;
            const matchedType = roomTypes.find(rt => rt.id === sourceType || rt.typeId === sourceType || rt.code === sourceType || rt.name === sourceType);
            const typeId = matchedType?.id || sourceType;
            if (!date || !typeId) return;
            if (!dailyRates[date]) dailyRates[date] = {};
            if (dailyRates[date][typeId] !== undefined) return;
            dailyRates[date][typeId] = window.PmsMockApi.amountValue(row.publicRate || row.baseRate);
        });
    } catch(e) {
        console.warn('Mock rates load failed', e);
    }
}

function ratesToApiRows() {
    const currency = getCurrencyCode();
    const rows = [];
    Object.keys(dailyRates).sort().forEach(date => {
        const byType = dailyRates[date] || {};
        sortedRoomTypes().forEach(rt => {
            if (byType[rt.id] === undefined) return;
            const amount = Number(byType[rt.id] || 0);
            rows.push({
                id: `RATE-${date}-${rt.id}`,
                date,
                roomTypeId: rt.id,
                roomTypeName: rt.name || rt.id,
                baseRate: { amount: Number(rt.basePrice || 0), currency },
                publicRate: { amount, currency },
                closed: false
            });
        });
    });
    return rows;
}

async function saveRates() {
    // 현재 화면의 인풋 값을 긁어서 dailyRates에 반영
    const inputs = document.querySelectorAll('.rate-input');
    inputs.forEach(input => {
        const date = input.getAttribute('data-date');
        const typeId = input.getAttribute('data-type');
        let val = parseFloat(input.value.replace(/[^0-9.]/g, ''));
        if (isNaN(val)) val = 0;
        
        if (!dailyRates[date]) dailyRates[date] = {};
        dailyRates[date][typeId] = val;
    });
    
    localStorage.setItem('pms_daily_rates', JSON.stringify(dailyRates));
    try {
        if (window.PmsMockApi) {
            await window.PmsMockApi.request('PUT', '/rates/calendar', { body: ratesToApiRows() });
        }
    } catch (e) {
        console.warn('Mock rates save failed', e);
    }
    showToast('요금이 성공적으로 저장되었습니다.');
}

async function resetToDefault() {
    const confirmMessage = typeof window.t === 'function'
        ? window.t('rates.reset.confirm')
        : '해당 월의 모든 요금을 객실유형의 기본 요금으로 초기화하시겠습니까?';
    if(!await showConfirm(confirmMessage)) return;
    
    const [year, month] = currentYearMonth.split('-');
    const daysInMonth = new Date(year, month, 0).getDate();
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${month}-${day.toString().padStart(2, '0')}`;
        if (!dailyRates[dateStr]) dailyRates[dateStr] = {};
        
        roomTypes.forEach(rt => {
            dailyRates[dateStr][rt.id] = rt.basePrice;
        });
    }
    
    renderCalendar();
    showToast('기본 요금으로 초기화되었습니다. 변경사항을 저장하려면 요금 저장을 누르세요.', 'info');
}

function applyBatchRates() {
    const start = document.getElementById('batchStartDate').value;
    const end = document.getElementById('batchEndDate').value;
    const type = document.getElementById('batchRoomType').value;
    const price = parseFloat(document.getElementById('batchPrice').value);
    
    if (!start || !end || isNaN(price)) {
        showToast('필수 항목을 모두 입력해주세요.', 'error');
        return;
    }
    
    const days = Array.from(document.querySelectorAll('input[name="batchDays"]:checked')).map(cb => parseInt(cb.value));
    
    let current = new Date(start);
    const endDate = new Date(end);
    
    while (current <= endDate) {
        if (days.includes(current.getDay())) {
            const dateStr = current.toISOString().split('T')[0];
            if (!dailyRates[dateStr]) dailyRates[dateStr] = {};
            
            if (type === 'all') {
                roomTypes.forEach(rt => dailyRates[dateStr][rt.id] = price);
            } else {
                dailyRates[dateStr][type] = price;
            }
        }
        current.setDate(current.getDate() + 1);
    }
    
    renderCalendar();
    closeModal('batchEditModal');
    showToast('요금이 일괄 적용되었습니다. 변경사항을 저장하려면 요금 저장을 누르세요.');
}

// --- 달력 렌더링 ---
function changeMonth() {
    currentYearMonth = document.getElementById('monthSelector').value;
    renderCalendar();
}

function renderCalendar() {
    const header = document.getElementById('ratesTableHeader');
    const body = document.getElementById('ratesTableBody');
    
    // 1. 헤더 생성
    let thHtml = `<th class="date-col">일자</th>`;
    const currencyCode = getCurrencyCode();
    const displayRoomTypes = sortedRoomTypes();
    displayRoomTypes.forEach(rt => {
        thHtml += `<th>${roomTypeLabel(rt)}<br><span style="font-size:0.75rem;font-weight:400;color:var(--txt3)">기준: ${currencyCode} ${formatRate(rt.basePrice)}</span></th>`;
    });
    header.innerHTML = thHtml;
    
    // 2. 바디(일자별 행) 생성
    const [year, month] = currentYearMonth.split('-');
    const daysInMonth = new Date(year, month, 0).getDate();
    const dayNames = ['일', '월', '화', '수', '목', '금', '토'];
    
    let trHtml = '';
    
    for (let day = 1; day <= daysInMonth; day++) {
        const dateObj = new Date(year, parseInt(month)-1, day);
        const dayOfWeek = dateObj.getDay();
        const dateStr = `${year}-${month}-${day.toString().padStart(2, '0')}`;
        
        let rowClass = '';
        let textClass = '';
        
        if (dayOfWeek === 0) { // 일요일
            rowClass = 'weekend';
            textClass = 'weekend-text';
        } else if (dayOfWeek === 6) { // 토요일
            rowClass = 'weekend';
            textClass = 'saturday-text';
        }
        
        trHtml += `<tr class="${rowClass}">`;
        trHtml += `<td class="date-col ${textClass}">${parseInt(month)}/${day} (${dayNames[dayOfWeek]})</td>`;
        
        displayRoomTypes.forEach(rt => {
            // 저장된 요금이 있으면 사용, 없으면 기본 요금 사용
            let price = rt.basePrice;
            if (dailyRates[dateStr] && dailyRates[dateStr][rt.id] !== undefined) {
                price = dailyRates[dateStr][rt.id];
            } else {
                // 초기 데이터가 없는 날짜는 기본 요금으로 설정해둠
                if (!dailyRates[dateStr]) dailyRates[dateStr] = {};
                dailyRates[dateStr][rt.id] = price;
            }
            
            trHtml += `<td>
                <div style="position:relative; display:flex; align-items:center; justify-content:center;">
                    <span style="position:absolute; left:12px; color:var(--txt3); font-weight:600;font-size:.72rem;">${currencyCode}</span>
                    <input type="text" class="rate-input" data-date="${dateStr}" data-type="${rt.id}" value="${price}">
                </div>
            </td>`;
        });
        
        trHtml += `</tr>`;
    }
    
    body.innerHTML = trHtml;
}

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function showToast(msg, type = 'success') {
    const exist = document.getElementById('pms-toast');
    if (exist) exist.remove();
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const bg = type === 'success' ? '#D1FAE5' : (type === 'error' ? '#FEE2E2' : '#DBEAFE');
    const cl = type === 'success' ? '#065F46' : (type === 'error' ? '#991B1B' : '#1E3A8A');
    const ic = type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${cl};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease forwards`;
    t.innerHTML = `<i class="fa-solid ${ic}"></i>${msg}`;
    const style = document.createElement('style');
    style.innerHTML = `@keyframes toastIn { from {opacity:0;transform:translateY(15px)} to {opacity:1;transform:translateY(0)} }`;
    document.head.appendChild(style);
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(15px)'; t.style.transition='all .3s'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// i18n 처리 (기존 로직 유지)
let currentLang=window.currentLang || localStorage.getItem('pms_lang') || 'ko';
const translations={ko: {"Save Rates":"요금 저장"}, en: {"Save Rates":"Save Rates"}};
function changeLang(l){currentLang=l;window.currentLang=l;localStorage.setItem('pms_lang', l);
    const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{
        const k=e.getAttribute('data-i18n-key');
        if(d[k])e.textContent=d[k];
    });
}

    populateMonthSelector();
    loadRates();
    renderCalendar();
});
</script>
