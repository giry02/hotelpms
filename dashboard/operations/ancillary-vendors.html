<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>업체/항목 관리 — Hotel PMS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../common/css/dashboard.css">
  <link rel="stylesheet" href="../common/css/operations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <script src="../common/js/api/api-core.js"></script>
  <script src="../common/js/partner-vendors.js"></script>
  <script src="../common/js/i18n-catalog.js"></script>
  <script src="../common/js/i18n.js"></script>
  <script src="../common/js/sidebar.js"></script>
  <script src="../common/js/ui-components.js"></script>
  <script src="../common/js/topbar.js"></script>
  <style>
    .vendor-page{padding-bottom:56px}
    .vendor-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;padding:12px 18px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm)}
    .vendor-tabs{display:flex;gap:8px;flex-wrap:wrap}
    .vendor-tab{border:1px solid var(--border);background:#fff;border-radius:999px;height:36px;padding:0 14px;font-weight:900;color:var(--txt2);cursor:pointer;display:inline-flex;align-items:center;gap:6px}
    .vendor-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
    .vendor-tab[data-type="pos"].active{background:#7c3aed;border-color:#7c3aed}
    .vendor-tab[data-type="golf"].active{background:#0f9f6e;border-color:#0f9f6e}
    .vendor-tab[data-type="rentacar"].active{background:#f59e0b;border-color:#f59e0b}
    .vendor-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    .vendor-page .btn-outline,.vendor-page .btn-primary-sm,
    #vendorModal .btn-outline,#vendorModal .btn-primary-sm,
    #itemModal .btn-outline,#itemModal .btn-primary-sm{height:38px;padding:0 14px;border-radius:9px;font-family:var(--font);font-size:.8rem;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap;cursor:pointer;transition:background .15s,border-color .15s,color .15s,box-shadow .15s}
    .vendor-page .btn-outline,#vendorModal .btn-outline,#itemModal .btn-outline{background:#fff;color:var(--txt2);border:1px solid var(--border)}
    .vendor-page .btn-outline:hover,#vendorModal .btn-outline:hover,#itemModal .btn-outline:hover{border-color:var(--primary);color:var(--primary);box-shadow:0 2px 8px rgba(59,130,246,.12)}
    .vendor-page .btn-primary-sm,#vendorModal .btn-primary-sm,#itemModal .btn-primary-sm{background:var(--primary);color:#fff;border:1px solid var(--primary)}
    .vendor-page .btn-primary-sm:hover,#vendorModal .btn-primary-sm:hover,#itemModal .btn-primary-sm:hover{background:var(--primary-dk);border-color:var(--primary-dk);box-shadow:0 3px 10px rgba(59,130,246,.22)}
    .vendor-grid{display:grid;grid-template-columns:minmax(300px,390px) 1fr;gap:16px;align-items:start}
    .vendor-panel{background:#fff;border:1px solid var(--border2);border-radius:14px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .vendor-panel-head{padding:16px 18px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between;gap:10px;background:#fff}
    .vendor-panel-title{font-size:1rem;font-weight:950;display:flex;align-items:center;gap:8px;color:var(--txt)}
    .vendor-list{display:flex;flex-direction:column}
    .vendor-card{border:0;border-bottom:1px solid var(--border2);background:#fff;padding:14px 16px;text-align:left;cursor:pointer;transition:.15s}
    .vendor-card:hover{background:#f8fafc}
    .vendor-card.active{background:#eff6ff;box-shadow:inset 4px 0 0 var(--primary)}
    .vendor-name{font-size:.96rem;font-weight:950;color:var(--txt)}
    .vendor-meta{margin-top:5px;font-size:.72rem;font-weight:850;color:var(--txt3);display:flex;flex-wrap:wrap;gap:6px 10px}
    .detail-body{padding:16px;display:flex;flex-direction:column;gap:16px}
    .detail-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}
    .summary-box{border:1px solid var(--border2);border-radius:10px;padding:12px;background:#f8fafc}
    .summary-box span{display:block;font-size:.68rem;font-weight:900;color:var(--txt3)}
    .summary-box strong{display:block;margin-top:4px;font-size:.92rem;font-weight:950;color:var(--txt)}
    .summary-box.address{grid-column:1/-1}
    .section-head{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .section-title{display:flex;align-items:center;gap:7px;font-size:.92rem;font-weight:950;color:var(--txt)}
    .item-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
    .item-card{border:1px solid var(--border2);border-radius:10px;padding:13px;background:#fff;display:flex;flex-direction:column;gap:7px}
    .item-card-title{font-size:.88rem;font-weight:950;color:var(--txt);display:flex;align-items:center;gap:7px}
    .item-card-desc{font-size:.73rem;font-weight:800;color:var(--txt2)}
    .item-card-price{font-size:.9rem;font-weight:950;color:var(--primary)}
    .item-meta-grid{display:flex;flex-wrap:wrap;gap:6px}
    .item-meta-chip{display:inline-flex;align-items:center;gap:5px;max-width:100%;border:1px solid #dbeafe;border-radius:999px;background:#eff6ff;color:#1d4ed8;padding:4px 8px;font-size:.68rem;font-weight:900;line-height:1.2}
    .item-type-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:10px;border:1px solid var(--border2);border-radius:12px;background:#f8fafc;padding:12px}
    .item-type-fields .field-full{grid-column:1/-1}
    .item-type-help{grid-column:1/-1;font-size:.72rem;font-weight:800;color:var(--txt3);line-height:1.45}
    .voucher-field-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
    .voucher-field{border:1px solid var(--border);border-radius:9px;background:#fff;padding:9px 10px;display:flex;align-items:center;gap:7px;font-size:.76rem;font-weight:900;color:var(--txt2)}
    .voucher-field input{accent-color:var(--primary)}
    .voucher-layout{display:grid;grid-template-columns:minmax(0,1fr) minmax(320px,420px);gap:14px;align-items:start}
    .voucher-config{display:flex;flex-direction:column;gap:12px}
    .voucher-field-section{border:1px solid var(--border2);border-radius:12px;background:#f8fafc;padding:12px}
    .voucher-field-section-title{font-size:.78rem;font-weight:950;color:var(--txt);display:flex;align-items:center;gap:7px;margin-bottom:9px}
    .logo-config{display:flex;align-items:center;justify-content:space-between;gap:12px;border:1px solid var(--border2);border-radius:12px;background:#fff;padding:12px}
    .logo-current{display:flex;align-items:center;gap:10px;min-width:0}
    .logo-box{width:56px;height:40px;border-radius:9px;border:1px dashed #cbd5e1;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden;color:var(--txt3);font-weight:950;font-size:.72rem;flex:0 0 auto}
    .logo-box img{width:100%;height:100%;object-fit:contain}
    .logo-copy{min-width:0}
    .logo-copy strong{display:block;font-size:.82rem;font-weight:950;color:var(--txt)}
    .logo-copy span{display:block;margin-top:3px;font-size:.7rem;font-weight:800;color:var(--txt3)}
    .voucher-preview-wrap{border:1px solid var(--border2);border-radius:12px;background:#fff;overflow:hidden}
    .voucher-preview-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border2);background:#f8fafc}
    .voucher-preview-head strong{font-size:.86rem;font-weight:950;color:var(--txt)}
    .voucher-preview-card{margin:14px;border:1px solid #d1d5db;border-radius:12px;background:#fff;color:#111827;font-family:Arial,'Noto Sans KR',sans-serif;overflow:hidden}
    .voucher-preview-brand{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px;border-bottom:1px solid #e5e7eb}
    .voucher-preview-logo{min-width:72px;min-height:42px;border:1px solid #e5e7eb;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.72rem;font-weight:900;color:#6b7280;background:#f9fafb;overflow:hidden}
    .voucher-preview-logo img{max-width:90px;max-height:42px;object-fit:contain}
    .voucher-preview-title{font-size:1rem;font-weight:950;text-align:right}
    .voucher-preview-sub{margin-top:4px;font-size:.72rem;font-weight:800;color:#6b7280;text-align:right}
    .voucher-preview-body{padding:12px 14px}
    .voucher-preview-row{display:flex;justify-content:space-between;gap:12px;border-top:1px solid #eef2f7;padding:8px 0;font-size:.78rem}
    .voucher-preview-row:first-child{border-top:0}
    .voucher-preview-row span{font-weight:800;color:#6b7280}
    .voucher-preview-row strong{text-align:right;font-weight:900;color:#111827}
    .voucher-stub{border-top:1px dashed #9ca3af;padding:11px 14px;background:#f9fafb}
    .voucher-stub-title{font-size:.74rem;font-weight:950;color:#111827;margin-bottom:7px}
    .voucher-stub-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:.7rem;color:#374151}
    .voucher-help{font-size:.72rem;line-height:1.5;color:var(--txt3);font-weight:800}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .empty-note{padding:22px;color:var(--txt3);font-weight:850;text-align:center}
    @media(max-width:1180px){.voucher-layout{grid-template-columns:1fr}}
    @media(max-width:1000px){.vendor-grid{grid-template-columns:1fr}.detail-summary{grid-template-columns:1fr 1fr}}
    @media(max-width:700px){.vendor-toolbar{flex-direction:column;align-items:stretch}.vendor-actions{width:100%}.vendor-actions .btn-outline,.vendor-actions .btn-primary-sm{flex:1 1 auto}.form-row,.detail-summary,.item-type-fields{grid-template-columns:1fr}.voucher-stub-grid{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <div class="main">
    <header class="topbar"><h1>업체/항목 관리</h1></header>
    <div class="content vendor-page">
      <div class="vendor-toolbar">
        <div class="vendor-tabs">
          <button class="vendor-tab active" data-type="pos" onclick="selectVendorType('pos')"><i class="fa-solid fa-cash-register"></i> 통합 POS</button>
          <button class="vendor-tab" data-type="golf" onclick="selectVendorType('golf')"><i class="fa-solid fa-golf-ball-tee"></i> 골프장</button>
          <button class="vendor-tab" data-type="rentacar" onclick="selectVendorType('rentacar')"><i class="fa-solid fa-car"></i> 렌터카</button>
        </div>
        <div class="vendor-actions">
          <button class="btn-outline" onclick="location.href='ancillary.html'"><i class="fa-solid fa-table-cells-large"></i> 부가서비스 화면</button>
          <button class="btn-primary-sm" onclick="openVendorModal()"><i class="fa-solid fa-plus"></i> 업체 등록</button>
        </div>
      </div>
      <div class="vendor-grid">
        <section class="vendor-panel">
          <div class="vendor-panel-head">
            <div class="vendor-panel-title"><i class="fa-solid fa-building"></i> 업체 목록</div>
            <span id="vendorCount" class="badge-soft">0개</span>
          </div>
          <div id="vendorList" class="vendor-list"></div>
        </section>
        <section class="vendor-panel">
          <div class="vendor-panel-head">
            <div>
              <div class="vendor-panel-title"><i class="fa-solid fa-list-check"></i> 업체별 항목 / 바우처 양식</div>
              <div id="selectedVendorMeta" style="margin-top:4px;font-size:.74rem;font-weight:850;color:var(--txt3)">업체를 선택하세요.</div>
            </div>
            <button class="btn-outline" onclick="openItemModal()"><i class="fa-solid fa-plus"></i> 항목 추가</button>
          </div>
          <div id="vendorDetail" class="detail-body"></div>
        </section>
      </div>
    </div>
  </div>

  <div class="modal-overlay" id="vendorModal" onclick="if(event.target===this)closeModal('vendorModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
      <div class="modal-header"><h3 class="modal-title"><i class="fa-solid fa-building" style="color:var(--primary)"></i> 업체 등록</h3><button class="modal-close" onclick="closeModal('vendorModal')"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:14px">
        <div class="form-row">
          <div><label class="form-label">서비스 구분</label><select id="vendorType" class="form-input"><option value="pos">통합 POS</option><option value="golf">골프장</option><option value="rentacar">렌터카</option></select></div>
          <div><label class="form-label">업체명</label><input id="vendorName" class="form-input" placeholder="예: 썬밸리 CC"></div>
        </div>
        <div class="form-row">
          <div><label class="form-label">담당자/연락처</label><input id="vendorContact" class="form-input" placeholder="예: 박지훈 / +82 10..."></div>
          <div><label class="form-label">수수료율(%)</label><input id="vendorCommission" type="number" class="form-input" min="0" max="100" placeholder="예: 15"></div>
        </div>
        <div><label class="form-label">업체 주소</label><input id="vendorAddress" class="form-input" placeholder="예: Clark Freeport Zone, Pampanga"></div>
      </div>
      <div class="modal-footer"><button class="btn-outline" onclick="closeModal('vendorModal')">취소</button><button class="btn-primary-sm" onclick="saveVendor()">저장</button></div>
    </div>
  </div>

  <div class="modal-overlay" id="itemModal" onclick="if(event.target===this)closeModal('itemModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
      <div class="modal-header"><h3 class="modal-title"><i class="fa-solid fa-tag" style="color:var(--primary)"></i> 이용 항목 등록</h3><button class="modal-close" onclick="closeModal('itemModal')"><i class="fa-solid fa-xmark"></i></button></div>
      <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:14px">
        <div class="form-row">
          <div><label class="form-label">항목명</label><input id="itemName" class="form-input" placeholder="예: 18홀 그린피"></div>
          <div><label class="form-label">기준 금액</label><input id="itemPrice" type="number" class="form-input" min="0" placeholder="예: 450"></div>
        </div>
        <div id="itemTypeFields"></div>
        <div><label class="form-label">설명</label><input id="itemDesc" class="form-input" placeholder="예: 주중 18홀, 카트 별도"></div>
      </div>
      <div class="modal-footer"><button class="btn-outline" onclick="closeModal('itemModal')">취소</button><button class="btn-primary-sm" onclick="saveItem()">저장</button></div>
    </div>
  </div>

  <script>
    const STORAGE_KEY = 'pms_ancillary_vendors';
    let currentType = 'pos';
    let vendors = [];
    let selectedVendorId = '';
    const voucherFieldLabels = {
      guest:'투숙객명', room:'객실번호', date:'이용일시', people:'인원', teeTime:'티오프', course:'코스/업체명',
      pickup:'픽업 위치', vehicle:'차량/차종', item:'이용 항목', amount:'금액', partnerContact:'업체 연락처', address:'업체 주소', memo:'메모'
    };
    const voucherFieldGroups = {
      pos: [
        { title:'전표 기본 정보', icon:'fa-receipt', fields:['guest','room','date','item','amount','memo'] }
      ],
      golf: [
        { title:'공통 정보', icon:'fa-circle-info', fields:['guest','room','date','item','amount','partnerContact','address','memo'] },
        { title:'골프장 이용권', icon:'fa-golf-ball-tee', fields:['people','teeTime','course'] }
      ],
      rentacar: [
        { title:'공통 정보', icon:'fa-circle-info', fields:['guest','room','date','item','amount','partnerContact','address','memo'] },
        { title:'렌터카 인수 정보', icon:'fa-car', fields:['pickup','vehicle'] }
      ]
    };
    const seedVendors = [
      { id:'POS-HOTEL', type:'pos', name:'호텔 통합 POS', contact:'F&B / Front Desk', address:'The Grand Saigon 내부 POS', commission:0, voucherFields:['guest','room','date','item','amount','memo'], logoDataUrl:'', items:[{ name:'룸서비스 세트', price:8500, desc:'객실 주문' }, { name:'미니바 추가', price:1200, desc:'객실 미니바' }, { name:'영상 서비스', price:1800, desc:'영상/스트리밍' }, { name:'세탁 서비스', price:950, desc:'객실 세탁 접수' }] },
      { id:'POS-RIVERSIDE', type:'pos', name:'리버사이드 비스트로', contact:'Minh Nguyen / +84 90 118 2233', address:'12 Nguyen Hue St, District 1, Ho Chi Minh City', commission:8, voucherFields:['guest','room','date','item','amount','partnerContact','address','memo'], logoDataUrl:'', items:[{ name:'디너 세트 2인', price:260, desc:'투숙객 전용 메뉴' }, { name:'웰컴 디저트', price:70, desc:'체크인 쿠폰' }, { name:'패밀리 세트', price:420, desc:'4인 기준' }] },
      { id:'GOLF-SUNVALLEY', type:'golf', name:'썬밸리 CC', contact:'Kim Manager', address:'Clark Freeport Zone, Pampanga', commission:15, voucherFields:['guest','room','date','people','teeTime','course','item','amount','partnerContact','address'], items:[{ name:'18홀 그린피', price:450, desc:'주중 18홀', category:'golf', courseName:'Sun Course', holes:'18홀', basePeople:4, teeTime:'07:30' }, { name:'카트 이용권', price:70, desc:'팀 단위 카트', category:'golf', courseName:'Sun Course', holes:'18홀', basePeople:4 }, { name:'클럽 대여', price:60, desc:'1인 기준', category:'golf', courseName:'Sun Course', holes:'18홀', basePeople:1 }] },
      { id:'GOLF-SKY72', type:'golf', name:'스카이72', contact:'Lee Manager', address:'Andrews Ave, Pasay, Metro Manila', commission:12, voucherFields:['guest','room','date','people','teeTime','course','item','amount','partnerContact','address'], items:[{ name:'9홀 라운딩', price:180, desc:'오전 9홀', category:'golf', courseName:'East Course', holes:'9홀', basePeople:2, teeTime:'08:10' }, { name:'18홀 패키지', price:520, desc:'그린피+카트', category:'golf', courseName:'West Course', holes:'18홀', basePeople:4, teeTime:'12:30' }] },
      { id:'RENT-LOTTE', type:'rentacar', name:'롯데렌터카', contact:'Park Manager', address:'NAIA Terminal 3 Arrival Hall, Pasay', commission:13, voucherFields:['guest','room','date','pickup','vehicle','item','amount','partnerContact','address'], items:[{ name:'세단 8시간', price:160, desc:'기사 미포함', category:'rentacar', vehicleClass:'세단', duration:'8시간', pickupBase:'호텔 로비' }, { name:'공항 픽업', price:90, desc:'편도 픽업', category:'rentacar', vehicleClass:'세단', duration:'공항 픽업', pickupBase:'NAIA Terminal 3' }, { name:'전기차 24시간', price:230, desc:'완충 인도', category:'rentacar', vehicleClass:'전기차', duration:'24시간', pickupBase:'호텔 로비' }] },
      { id:'RENT-SK', type:'rentacar', name:'SK렌터카', contact:'Choi Manager', address:'BGC Transport Hub, Taguig', commission:14, voucherFields:['guest','room','date','pickup','vehicle','item','amount','partnerContact','address'], items:[{ name:'SUV 24시간', price:260, desc:'보험 포함', category:'rentacar', vehicleClass:'SUV', duration:'24시간', pickupBase:'BGC Transport Hub' }, { name:'기사 포함 밴', price:320, desc:'8시간 기준', category:'rentacar', vehicleClass:'기사 포함 밴', duration:'8시간', pickupBase:'호텔 로비' }] }
    ];
    function escapeHtml(v) { return String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function money(v) { return `₱${Number(v || 0).toLocaleString('en')}`; }
    function serviceLabel(type) {
      return { pos:'통합 POS', golf:'골프장', rentacar:'렌터카' }[type] || '부가서비스';
    }
    function serviceIcon(type) {
      return { pos:'fa-cash-register', golf:'fa-golf-ball-tee', rentacar:'fa-car' }[type] || 'fa-bell-concierge';
    }
    function itemExamples(type) {
      return {
        pos: {
          name: '예: 룸서비스 세트',
          price: '예: 8500',
          desc: '예: 조식 2인, 객실 세탁, 미니바 추가'
        },
        golf: {
          name: '예: 18홀 그린피',
          price: '예: 450',
          desc: '예: 주중 18홀, 카트 별도'
        },
        rentacar: {
          name: '예: 공항 픽업',
          price: '예: 90',
          desc: '예: 편도 픽업, 세단 8시간, 기사 포함 밴'
        }
      }[type] || {
        name: '예: 이용 항목',
        price: '예: 0',
        desc: '예: 제공 조건 또는 이용 기준'
      };
    }
    function applyItemModalExamples(type) {
      const examples = itemExamples(type);
      const name = document.getElementById('itemName');
      const price = document.getElementById('itemPrice');
      const desc = document.getElementById('itemDesc');
      if (name) name.placeholder = examples.name;
      if (price) price.placeholder = examples.price;
      if (desc) desc.placeholder = examples.desc;
    }
    function renderItemTypeFields(type) {
      const target = document.getElementById('itemTypeFields');
      if (!target) return;
      if (type === 'rentacar') {
        target.innerHTML = `
          <div class="item-type-fields">
            <div>
              <label class="form-label">차량 등급</label>
              <select id="itemVehicleClass" class="form-input" onchange="toggleItemCustomField('itemVehicleClass','itemVehicleCustom')">
                <option value="">차량 선택</option>
                <option>세단</option>
                <option>프리미엄 세단</option>
                <option>SUV</option>
                <option>밴</option>
                <option>기사 포함 밴</option>
                <option value="custom">직접 입력</option>
              </select>
            </div>
            <div>
              <label class="form-label">대여 시간/기간</label>
              <select id="itemDuration" class="form-input" onchange="toggleItemCustomField('itemDuration','itemDurationCustom')">
                <option value="">시간 선택</option>
                <option>공항 픽업</option>
                <option>4시간</option>
                <option>8시간</option>
                <option>12시간</option>
                <option>24시간</option>
                <option value="custom">직접 입력</option>
              </select>
            </div>
            <div><label class="form-label">차량 직접 입력</label><input id="itemVehicleCustom" class="form-input" style="display:none" placeholder="예: 리무진, 전기 SUV"></div>
            <div><label class="form-label">시간 직접 입력</label><input id="itemDurationCustom" class="form-input" style="display:none" placeholder="예: 2박 3일, 편도 샌딩"></div>
            <div class="field-full"><label class="form-label">기본 픽업/반납 위치</label><input id="itemPickupBase" class="form-input" placeholder="예: 호텔 로비 픽업, 공항 샌딩"></div>
            <div class="item-type-help">렌터카 항목은 차량과 시간을 따로 저장합니다. 실제 등록 화면에서는 이 기준을 불러와 차량/시간을 다시 선택할 수 있습니다.</div>
          </div>
        `;
        return;
      }
      if (type === 'golf') {
        target.innerHTML = `
          <div class="item-type-fields">
            <div><label class="form-label">코스</label><input id="itemCourseName" class="form-input" placeholder="예: Sun Course, Lake Course"></div>
            <div>
              <label class="form-label">홀</label>
              <select id="itemHoles" class="form-input">
                <option>9홀</option>
                <option selected>18홀</option>
                <option>27홀</option>
              </select>
            </div>
            <div><label class="form-label">기준 인원</label><input id="itemBasePeople" class="form-input" type="number" min="1" placeholder="예: 4"></div>
            <div><label class="form-label">기준 티오프</label><input id="itemTeeTime" class="form-input" type="time"></div>
            <div class="item-type-help">골프 항목은 코스, 홀, 인원을 분리해 저장합니다. 바우처 출력 시 코스와 티오프 정보가 따로 표시됩니다.</div>
          </div>
        `;
        return;
      }
      target.innerHTML = '';
    }
    function toggleItemCustomField(selectId, inputId) {
      const select = document.getElementById(selectId);
      const input = document.getElementById(inputId);
      if (!select || !input) return;
      input.style.display = select.value === 'custom' ? 'block' : 'none';
      if (select.value !== 'custom') input.value = '';
    }
    function itemSelectValue(selectId, customId) {
      const select = document.getElementById(selectId);
      const custom = document.getElementById(customId);
      if (!select) return '';
      if (select.value === 'custom') return (custom?.value || '').trim();
      return select.value.trim();
    }
    function readItemExtraFields(type) {
      if (type === 'rentacar') {
        const vehicleClass = itemSelectValue('itemVehicleClass', 'itemVehicleCustom');
        const duration = itemSelectValue('itemDuration', 'itemDurationCustom');
        if (!vehicleClass) return { error:'차량 등급을 선택해 주세요.' };
        if (!duration) return { error:'대여 시간/기간을 선택해 주세요.' };
        return {
          vehicleClass,
          duration,
          pickupBase: document.getElementById('itemPickupBase')?.value.trim() || ''
        };
      }
      if (type === 'golf') {
        const holes = document.getElementById('itemHoles')?.value || '';
        const basePeople = Number(document.getElementById('itemBasePeople')?.value || 0);
        if (!holes) return { error:'홀 수를 선택해 주세요.' };
        if (!basePeople) return { error:'기준 인원을 입력해 주세요.' };
        return {
          courseName: document.getElementById('itemCourseName')?.value.trim() || '',
          holes,
          basePeople,
          teeTime: document.getElementById('itemTeeTime')?.value || ''
        };
      }
      return {};
    }
    function inferItemExtras(type, item = {}) {
      if (type === 'rentacar') {
        const text = `${item.name || ''} ${item.desc || ''}`;
        return {
          vehicleClass: item.vehicleClass || item.vehicle || (text.match(/기사 포함 밴|프리미엄 세단|세단|SUV|밴|전기차/) || [])[0] || '',
          duration: item.duration || (text.match(/공항 픽업|공항 샌딩|4시간|8시간|12시간|24시간|편도 픽업/) || [])[0] || '',
          pickupBase: item.pickupBase || item.pickup || ''
        };
      }
      if (type === 'golf') {
        const text = `${item.name || ''} ${item.desc || ''}`;
        return {
          courseName: item.courseName || item.course || '',
          holes: item.holes || (text.match(/9홀|18홀|27홀/) || [])[0] || '',
          basePeople: item.basePeople || item.people || '',
          teeTime: item.teeTime || ''
        };
      }
      return {};
    }
    function renderItemMeta(type, item) {
      const extra = inferItemExtras(type, item);
      const chips = [];
      if (type === 'rentacar') {
        if (extra.vehicleClass) chips.push(['차량', extra.vehicleClass]);
        if (extra.duration) chips.push(['시간', extra.duration]);
        if (extra.pickupBase) chips.push(['픽업', extra.pickupBase]);
      } else if (type === 'golf') {
        if (extra.courseName) chips.push(['코스', extra.courseName]);
        if (extra.holes) chips.push(['홀', extra.holes]);
        if (extra.basePeople) chips.push(['인원', `${extra.basePeople}명`]);
        if (extra.teeTime) chips.push(['티오프', extra.teeTime]);
      }
      if (!chips.length) return '';
      return `<div class="item-meta-grid">${chips.map(([label, value]) => `<span class="item-meta-chip">${escapeHtml(label)} · ${escapeHtml(value)}</span>`).join('')}</div>`;
    }
    function renderVendorItemCard(vendor, item) {
      return `<div class="item-card">
        <div class="item-card-title"><i class="fa-solid ${serviceIcon(vendor.type)}" style="color:var(--primary)"></i>${escapeHtml(item.name)}</div>
        ${renderItemMeta(vendor.type, item)}
        <div class="item-card-desc">${escapeHtml(item.desc || '-')}</div>
        <div class="item-card-price">${money(item.price)}</div>
      </div>`;
    }
    function defaultVoucherFields(type) {
      return (voucherFieldGroups[type] || voucherFieldGroups.pos).flatMap(group => group.fields);
    }
    function sampleVoucherData(vendor) {
      const item = (vendor?.items || [])[0] || { name: serviceLabel(vendor?.type), price: 0 };
      const extra = inferItemExtras(vendor?.type, item);
      return {
        guest:'Lee Hannah',
        room:'0801',
        date:'2026-07-02 14:30',
        people: extra.basePeople ? `${extra.basePeople}명` : '2명',
        teeTime: extra.teeTime || '07:30',
        course: extra.courseName || vendor?.name || '썬밸리 CC',
        pickup: extra.pickupBase || '호텔 로비',
        vehicle: extra.vehicleClass || item.name || '공항 픽업',
        item: item.name || serviceLabel(vendor?.type),
        amount: money(item.price || 0),
        partnerContact: vendor?.contact || '-',
        address: vendor?.address || '주소 미등록',
        memo:'프런트 확인 후 제공'
      };
    }
    function loadVendors() {
      try { vendors = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch(e) { vendors = []; }
      if (!Array.isArray(vendors) || !vendors.length) vendors = seedVendors.map(v => ({ ...v, items:[...(v.items || [])], voucherFields:[...(v.voucherFields || [])] }));
      seedVendors.forEach(seed => {
        if (!vendors.some(vendor => vendor.id === seed.id || (vendor.type === seed.type && vendor.name === seed.name))) {
          vendors.push({ ...seed, items:[...(seed.items || [])], voucherFields:[...(seed.voucherFields || [])] });
        }
      });
      vendors = vendors.map(vendor => {
        const seed = seedVendors.find(item => item.id === vendor.id || (item.type === vendor.type && item.name === vendor.name));
        const type = vendor.type || seed?.type || 'pos';
        const fields = Array.isArray(vendor.voucherFields) && vendor.voucherFields.length ? [...vendor.voucherFields] : defaultVoucherFields(type);
        if (['golf', 'rentacar'].includes(type) && !fields.includes('address')) fields.push('address');
        if (['golf', 'rentacar'].includes(type) && !fields.includes('partnerContact')) fields.push('partnerContact');
        return {
          ...vendor,
          type,
          items: Array.isArray(vendor.items) ? vendor.items : [],
          address: vendor.address || seed?.address || '',
          logoDataUrl: vendor.logoDataUrl || '',
          voucherFields: fields
        };
      });
      selectedVendorId = vendors.find(v => v.type === currentType)?.id || '';
      persistVendors();
    }
    function persistVendors() { localStorage.setItem(STORAGE_KEY, JSON.stringify(vendors)); }
    function selectedVendor() { return vendors.find(v => v.id === selectedVendorId); }
    function selectVendorType(type) {
      currentType = type;
      document.querySelectorAll('.vendor-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.type === type));
      selectedVendorId = vendors.find(v => v.type === type)?.id || '';
      render();
    }
    function selectVendor(id) { selectedVendorId = id; render(); }
    function render() {
      const list = vendors.filter(v => v.type === currentType);
      document.getElementById('vendorCount').textContent = `${list.length}개`;
      document.getElementById('vendorList').innerHTML = list.map(v => `<button class="vendor-card ${v.id === selectedVendorId ? 'active' : ''}" onclick="selectVendor('${escapeHtml(v.id)}')"><div class="vendor-name">${escapeHtml(v.name)}</div><div class="vendor-meta"><span>담당 ${escapeHtml(v.contact || '-')}</span><span>수수료 ${Number(v.commission || 0)}%</span><span>항목 ${(v.items || []).length}개</span>${v.address ? `<span>${escapeHtml(v.address)}</span>` : ''}</div></button>`).join('') || '<div class="empty-note">등록된 업체가 없습니다.</div>';
      const selected = selectedVendor();
      document.getElementById('selectedVendorMeta').textContent = selected ? `${selected.name} · 항목 ${(selected.items || []).length}개 · 출력 ${(selected.voucherFields || []).length}개 필드` : '업체를 선택하세요.';
      renderDetail(selected);
    }
    function renderDetail(vendor) {
      if (!vendor) {
        document.getElementById('vendorDetail').innerHTML = '<div class="empty-note">업체를 선택하면 항목과 바우처 양식을 관리할 수 있습니다.</div>';
        return;
      }
      document.getElementById('vendorDetail').innerHTML = `
        <div class="detail-summary">
          <div class="summary-box"><span>업체명</span><strong>${escapeHtml(vendor.name)}</strong></div>
          <div class="summary-box"><span>담당/연락처</span><strong>${escapeHtml(vendor.contact || '-')}</strong></div>
          <div class="summary-box"><span>수수료율</span><strong>${Number(vendor.commission || 0)}%</strong></div>
          <div class="summary-box"><span>항목 수</span><strong>${(vendor.items || []).length}개</strong></div>
          <div class="summary-box address"><span>업체 주소</span><strong>${escapeHtml(vendor.address || '주소 미등록')}</strong></div>
        </div>
        <div>
          <div class="section-head"><div class="section-title"><i class="fa-solid fa-tags"></i> 이용 항목</div></div>
          <div class="item-grid" style="margin-top:10px">${(vendor.items || []).map(item => renderVendorItemCard(vendor, item)).join('') || '<div class="empty-note">등록된 항목이 없습니다.</div>'}</div>
        </div>
        <div>
          <div class="section-head">
            <div>
              <div class="section-title"><i class="fa-solid fa-ticket"></i> ${vendor.type === 'pos' ? '전표 출력 양식' : '바우처 출력 양식'}</div>
              <div class="voucher-help">체크한 항목은 부가서비스 상세 화면의 출력 버튼과 오른쪽 미리보기에 그대로 반영됩니다.</div>
            </div>
            <button class="btn-primary-sm" onclick="saveVoucherFields()"><i class="fa-solid fa-check"></i> 양식 저장</button>
          </div>
          <div class="voucher-layout" style="margin-top:10px">
            <div class="voucher-config">
              <div class="logo-config">
                <div class="logo-current">
                  <div class="logo-box">${vendor.logoDataUrl ? `<img src="${escapeHtml(vendor.logoDataUrl)}" alt="">` : 'LOGO'}</div>
                  <div class="logo-copy"><strong>출력 로고</strong><span>바우처 상단에 표시됩니다.</span></div>
                </div>
                <div class="vendor-actions">
                  <input id="vendorLogoInput" type="file" accept="image/*" style="display:none" onchange="onVendorLogoChange(this)">
                  <button class="btn-outline" onclick="triggerLogoUpload()"><i class="fa-solid fa-image"></i> 로고 등록</button>
                  ${vendor.logoDataUrl ? '<button class="btn-outline" onclick="removeVendorLogo()"><i class="fa-solid fa-trash"></i> 삭제</button>' : ''}
                </div>
              </div>
              ${renderVoucherFieldGroups(vendor)}
            </div>
            <div class="voucher-preview-wrap">
              <div class="voucher-preview-head"><strong>출력 미리보기</strong><span class="badge-soft">${escapeHtml(serviceLabel(vendor.type))}</span></div>
              <div id="voucherPreview"></div>
            </div>
          </div>
      </div>`;
      renderVoucherPreview();
    }
    function renderVoucherFieldGroups(vendor) {
      const groups = voucherFieldGroups[vendor.type] || voucherFieldGroups.pos;
      return groups.map(group => `
        <div class="voucher-field-section">
          <div class="voucher-field-section-title"><i class="fa-solid ${group.icon}"></i>${escapeHtml(group.title)}</div>
          <div class="voucher-field-grid">
            ${group.fields.map(key => `<label class="voucher-field"><input type="checkbox" value="${key}" ${vendor.voucherFields?.includes(key) ? 'checked' : ''} onchange="renderVoucherPreview()"> ${escapeHtml(voucherFieldLabels[key] || key)}</label>`).join('')}
          </div>
        </div>
      `).join('');
    }
    function selectedVoucherFieldsFromDom(vendor) {
      const checked = Array.from(document.querySelectorAll('.voucher-field input:checked')).map(input => input.value);
      return checked.length ? checked : (vendor?.voucherFields || []);
    }
    function renderVoucherPreview() {
      const vendor = selectedVendor();
      const target = document.getElementById('voucherPreview');
      if (!vendor || !target) return;
      const fields = selectedVoucherFieldsFromDom(vendor);
      const sample = sampleVoucherData(vendor);
      const title = vendor.type === 'pos' ? '객실 전표' : `${serviceLabel(vendor.type)} 바우처`;
      const stubTitle = vendor.type === 'golf' ? '절취용 이용 확인' : vendor.type === 'rentacar' ? '차량 인수 확인' : '프런트 확인';
      const stubRows = vendor.type === 'golf'
        ? [['티오프', sample.teeTime], ['코스', sample.course], ['투숙객', sample.guest], ['서명', '']]
        : vendor.type === 'rentacar'
          ? [['픽업', sample.pickup], ['차량', sample.vehicle], ['투숙객', sample.guest], ['서명', '']]
          : [['객실', sample.room], ['담당', sample.partnerContact]];
      target.innerHTML = `
        <div class="voucher-preview-card">
          <div class="voucher-preview-brand">
            <div class="voucher-preview-logo">${vendor.logoDataUrl ? `<img src="${escapeHtml(vendor.logoDataUrl)}" alt="">` : 'HOTEL PMS'}</div>
            <div>
              <div class="voucher-preview-title">${escapeHtml(title)}</div>
              <div class="voucher-preview-sub">${escapeHtml(vendor.name)} · ${escapeHtml(vendor.contact || '-')}</div>
            </div>
          </div>
          <div class="voucher-preview-body">
            ${fields.length ? fields.map(field => `<div class="voucher-preview-row"><span>${escapeHtml(voucherFieldLabels[field] || field)}</span><strong>${escapeHtml(sample[field] || '-')}</strong></div>`).join('') : '<div class="empty-note">출력할 필드를 선택해 주세요.</div>'}
          </div>
          ${vendor.type !== 'pos' ? `<div class="voucher-stub"><div class="voucher-stub-title">${escapeHtml(stubTitle)}</div><div class="voucher-stub-grid">${stubRows.map(([label, value]) => `<div><strong>${escapeHtml(label)}</strong> ${escapeHtml(value || '____________')}</div>`).join('')}</div></div>` : ''}
        </div>
      `;
    }
    function triggerLogoUpload() {
      document.getElementById('vendorLogoInput')?.click();
    }
    function onVendorLogoChange(input) {
      const vendor = selectedVendor();
      const file = input?.files?.[0];
      if (!vendor || !file) return;
      const reader = new FileReader();
      reader.onload = () => {
        vendor.logoDataUrl = String(reader.result || '');
        persistVendors();
        render();
      };
      reader.readAsDataURL(file);
    }
    function removeVendorLogo() {
      const vendor = selectedVendor();
      if (!vendor) return;
      vendor.logoDataUrl = '';
      persistVendors();
      render();
    }
    function openModal(id){ document.getElementById(id)?.classList.add('active'); }
    function closeModal(id){ document.getElementById(id)?.classList.remove('active'); }
    function openVendorModal(){
      document.getElementById('vendorType').value = currentType;
      ['vendorName','vendorContact','vendorCommission','vendorAddress'].forEach(id => document.getElementById(id).value = '');
      openModal('vendorModal');
    }
    function saveVendor() {
      const type = document.getElementById('vendorType').value;
      const name = document.getElementById('vendorName').value.trim();
      if (!name) return window.showAlert('업체명을 입력해 주세요.', { type: 'error' });
      const id = `${type.toUpperCase()}-${Date.now()}`;
      vendors.unshift({ id, type, name, contact: document.getElementById('vendorContact').value.trim(), address: document.getElementById('vendorAddress').value.trim(), commission: Number(document.getElementById('vendorCommission').value || 0), voucherFields: defaultVoucherFields(type), logoDataUrl:'', items: [] });
      currentType = type;
      selectedVendorId = id;
      persistVendors();
      closeModal('vendorModal');
      selectVendorType(type);
    }
    function openItemModal(){
      if (!selectedVendorId) return window.showAlert('업체를 먼저 선택해 주세요.', { type: 'error' });
      const type = selectedVendor()?.type || currentType;
      renderItemTypeFields(type);
      ['itemName','itemPrice','itemDesc'].forEach(id => document.getElementById(id).value = '');
      applyItemModalExamples(type);
      openModal('itemModal');
    }
    function saveItem() {
      const vendor = selectedVendor();
      if (!vendor) return;
      const name = document.getElementById('itemName').value.trim();
      if (!name) return window.showAlert('항목명을 입력해 주세요.', { type: 'error' });
      const extra = readItemExtraFields(vendor.type);
      if (extra.error) return window.showAlert(extra.error, { type: 'error' });
      vendor.items = vendor.items || [];
      vendor.items.push({
        name,
        price: Number(document.getElementById('itemPrice').value || 0),
        desc: document.getElementById('itemDesc').value.trim(),
        category: vendor.type,
        ...extra
      });
      persistVendors();
      closeModal('itemModal');
      render();
    }
    function saveVoucherFields() {
      const vendor = selectedVendor();
      if (!vendor) return;
      vendor.voucherFields = Array.from(document.querySelectorAll('.voucher-field input:checked')).map(input => input.value);
      persistVendors();
      render();
      if (window.showToast) window.showToast('바우처 출력 필드가 저장되었습니다.', 'success');
    }
    function initFromQuery() {
      const params = new URLSearchParams(location.search);
      const type = params.get('type');
      if (['pos', 'golf', 'rentacar'].includes(type)) currentType = type;
      loadVendors();
      const vendorId = params.get('vendorId');
      const target = vendorId ? vendors.find(v => v.id === vendorId) : null;
      if (target) {
        currentType = target.type || currentType;
        selectedVendorId = target.id;
      }
      document.querySelectorAll('.vendor-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.type === currentType));
      render();
      if (location.hash === '#voucher') {
        setTimeout(() => document.getElementById('voucherPreview')?.scrollIntoView({ block: 'center', behavior: 'smooth' }), 80);
      }
    }
    document.addEventListener('DOMContentLoaded', initFromQuery);
  </script>
</body>
</html>
