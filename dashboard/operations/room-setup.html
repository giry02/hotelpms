<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객실 유형 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
<style>
/* Building Selection Styles */
.mobile-bldg-btn { display: none; }
.mobile-bldg-item { padding: 14px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; color: var(--txt); background: var(--card); border: 1px solid var(--border); cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
.mobile-bldg-item:hover { background: var(--border2); }
.mobile-bldg-item.active { border-color: var(--primary); background: var(--primary-lt); color: var(--primary); }

/* Room Grid (Cards) */
.room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.room-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; }
.room-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary-lt); }
.room-card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border2); padding-bottom: 12px; }
.room-card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 6px; }
.room-card-type { font-size: 0.75rem; font-weight: 600; background: var(--bg); padding: 4px 8px; border-radius: 4px; color: var(--txt2); }
.room-card-info { display: flex; flex-direction: column; gap: 8px; }
.room-info-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--txt); }
.room-info-row i { color: var(--txt3); width: 16px; text-align: center; }
.room-card-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
.td-actions {
    display: flex;
    gap: 8px;
}
.btn-icon {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 4px;
    color: var(--txt2);
    cursor: pointer;
    transition: all 0.2s;
}
.btn-icon:hover {
    color: var(--primary);
    border-color: var(--primary);
}
.btn-icon.delete:hover {
    color: var(--danger);
    border-color: var(--danger);
}

/* Search Bar */
.search-bar {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    height: 38px;
    width: 260px;
}
.search-bar input {
    border: none;
    outline: none;
    width: 100%;
    font-family: var(--font);
    font-size: 0.85rem;
    margin-left: 8px;
}

.top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}
.top-actions-right {
    display: flex;
    gap: 10px;
}

/* Toggle switch */
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .3s}
.toggle-slider::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .3s}
.toggle-switch input:checked+.toggle-slider{background:var(--primary)}
.toggle-switch input:checked+.toggle-slider::after{transform:translateX(20px)}

/* Add room modal building row */
.add-room-bldg-row{display:none}
.add-room-bldg-row.show{display:flex}
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .top-actions { flex-direction: column; align-items: stretch; gap: 10px; }
    .top-actions-right { width: 100%; display: flex; gap: 8px; flex-wrap: wrap; }
    .top-actions-right button { flex: 1; justify-content: center; padding: 8px 4px; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 100px; }
    
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap !important; gap: 10px !important; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto !important; }
    
    .mobile-bldg-btn { display: inline-flex !important; align-items: center; justify-content: center; flex: 0 0 auto !important; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 0 12px; height: 38px; font-size: 0.85rem; font-weight: 500; color: var(--txt); gap: 6px; white-space: nowrap; }
    
    .room-grid { grid-template-columns: 1fr; }
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar"><h1 data-i18n-key="Room Types">객실 유형</h1></header>

    <div class="content">
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="roomSearchInput" placeholder="객실 번호, 타입 검색..." oninput="renderTable()">
                    </div>
                    <button onclick="renderTable()" class="btn-search"><i class="fa-solid fa-search"></i> 검색</button>
                    <button class="btn-outline mobile-bldg-btn" onclick="openModal('mobileBuildingModal')" id="mobileBuildingBtn" style="display: none;">
                        <i class="fa-solid fa-filter" style="color:var(--txt3)"></i> All <i class="fa-solid fa-chevron-down" style="font-size: 0.65rem; margin-left: 2px;"></i>
                    </button>
                </div>
                <div class="filter-divider desktop-only"></div>
                <div class="desktop-only filter-chips" id="buildingChips">
                    <button class="chip active" onclick="setTab('all')">All</button>
                    <!-- Generated by JS -->
                </div>
            </div>
            <div class="filter-right top-actions-right">
                <button class="btn-outline" onclick="openModal('buildingModal')"><i class="fa-solid fa-building"></i> 건물/구역 Actions</button>
                <button class="btn-outline" onclick="openModal('roomTypeModal')"><i class="fa-solid fa-layer-group"></i> Room Types</button>
                <button class="btn-primary-sm" onclick="openModal('addRoomModal')"><i class="fa-solid fa-plus"></i> Add Room</button>
            </div>
        </div>

        <div class="room-grid" id="roomGrid">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<!-- Mobile Building Modal -->
<div class="modal-overlay" id="mobileBuildingModal" onclick="if(event.target===this) closeModal('mobileBuildingModal')">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">건물/구역 선택</h3>
            <button class="modal-close" onclick="closeModal('mobileBuildingModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:16px;display:flex;flex-direction:column;gap:8px" id="mobileBuildingList">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<!-- Building Management Modal -->
<div class="modal-overlay" id="buildingModal" onclick="if(event.target===this) closeModal('buildingModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">건물/구역 Actions</h3>
            <button class="modal-close" onclick="closeModal('buildingModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">호텔의 건물(동) 또는 구역을 Actions합니다.</p>
            <div id="buildingManageList">
                <!-- Generated by JS -->
            </div>
            <button class="btn-outline" style="width:100%;justify-content:center;margin-top:10px" onclick="addBuilding()"><i class="fa-solid fa-plus"></i> 새 건물/구역 추가</button>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('buildingModal')">Close</button>
        </div>
    </div>
</div>

<!-- Room Type Management Modal -->
<div class="modal-overlay" id="roomTypeModal" onclick="if(event.target===this) closeModal('roomTypeModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">Room Types</h3>
            <button class="modal-close" onclick="closeModal('roomTypeModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">호텔 내 서비스 가능한 Room Type(Room Type)을 Actions하고 편의시설을 설정합니다.</p>
            
            <div id="roomTypeListContainer">
                <!-- Generated by JS -->
            </div>
            
            <button class="btn-outline" style="width:100%;justify-content:center;margin-top:10px" onclick="addRoomType()"><i class="fa-solid fa-plus"></i> 새 Room Type 추가</button>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('roomTypeModal')">Close</button>
        </div>
    </div>
</div>

<!-- Add/Edit Room Modal -->
<div class="modal-overlay" id="addRoomModal" onclick="if(event.target===this) closeModal('addRoomModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title" id="roomModalTitle">Add Room</h3>
            <button class="modal-close" onclick="closeModal('addRoomModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <!-- Building selection -->
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">건물 / 구역</label>
                <select id="addRoomBuilding" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="modal-form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Room 번호 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="addRoomId" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 1208">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">해당 층</label>
                    <input type="number" id="addRoomFloor" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 12">
                </div>
            </div>
            <div class="modal-form-grid" style="display:grid;grid-template-columns:1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Room Type <span style="color:var(--danger)">*</span></label>
                    <select id="addRoomType" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option>Standard</option>
                        <option>Deluxe</option>
                        <option>Premier</option>
                        <option>Penthouse</option>
                        <option>Pool Villa</option>
                        <option>Garden Villa</option>
                    </select>
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">특이사항 / 메모</label>
                <textarea style="min-height:60px;border:1px solid var(--border);border-radius:4px;padding:10px;font-family:var(--font);width:100%;resize:vertical" placeholder="전망, 인접 객실 특징 등..."></textarea>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('addRoomModal')">Cancel</button>
            <button class="btn-primary-sm" onclick="saveRoom()"><i class="fa-solid fa-check"></i> <span id="saveBtnText">Add Room</span></button>
        </div>
    </div>
</div>

<script>
let allBuildings = [];
let allRooms = [];

const statusConfig = {
    'occupied': { label: 'Occupied' },
    'vacant-clean': { label: 'Vacant Clean' },
    'vacant-dirty': { label: 'Vacant Dirty' },
    'oos': { label: 'Out of Order' }
};

let currentTab = 'all';

function openModal(id) { 
    if(id === 'roomTypeModal') renderRoomTypes();
    document.getElementById(id).classList.add('active'); 
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

let mockRoomTypes = [
    { id: 1, name: 'Standard Double', desc: '최대 2인 · 킹베드 1개 · 25m²' },
    { id: 2, name: 'Deluxe King', desc: '최대 2인 · 킹베드 1개 · 35m² · 시티뷰' },
    { id: 3, name: 'Executive Suite', desc: '최대 4인 · 킹베드 1개, 소파베드 1개 · 60m² · 오션뷰' }
];

function renderRoomTypes() {
    const container = document.getElementById('roomTypeListContainer');
    if (!container) return;
    let html = '';
    mockRoomTypes.forEach((rt, index) => {
        html += `
            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-weight:700">${rt.name}</div>
                    <div style="font-size:0.8rem;color:var(--txt2)">${rt.desc}</div>
                </div>
                <div><button class="btn-outline-sm" onclick="editRoomType(${index})">수정</button></div>
            </div>
        `;
    });
    container.innerHTML = html;
}

function addRoomType() {
    const name = prompt('새 객실 유형 이름을 입력하세요:');
    if (!name) return;
    const desc = prompt('객실 유형 설명을 입력하세요:');
    if (desc !== null) {
        mockRoomTypes.push({ id: Date.now(), name, desc });
        renderRoomTypes();
        showToast('객실 유형이 추가되었습니다.', 'success');
    }
}

function editRoomType(index) {
    const rt = mockRoomTypes[index];
    const name = prompt('객실 유형 이름을 입력하세요:', rt.name);
    if (!name) return;
    const desc = prompt('객실 유형 설명을 입력하세요:', rt.desc);
    if (desc !== null) {
        rt.name = name;
        rt.desc = desc;
        renderRoomTypes();
        showToast('객실 유형이 수정되었습니다.', 'success');
    }
}

function renderTabs() {
    try {
        const buildings = allBuildings.slice().sort();
        
        // Desktop Chips
        const chipContainer = document.getElementById('buildingChips');
        let chipHtml = `<button class="chip ${currentTab === 'all' ? 'active' : ''}" onclick="setTab('all')">All <span class="chip-count">${allRooms.length}</span></button>`;
    
    // Mobile List
    const mobileContainer = document.getElementById('mobileBuildingList');
    let mobileHtml = `<button class="mobile-bldg-item ${currentTab === 'all' ? 'active' : ''}" onclick="setTab('all')">All <span>${currentTab === 'all' ? '<i class="fa-solid fa-check"></i>' : ''}</span></button>`;
    
    // Building Management Select & List
    const bldgSelect = document.getElementById('addRoomBuilding');
    const manageList = document.getElementById('buildingManageList');
    let selectHtml = '<option value="">건물 미지정 (단일 건물)</option>';
    let manageHtml = '';

    buildings.forEach(b => {
        const count = allRooms.filter(r => r && r.building === b).length;
        chipHtml += `<button class="chip ${currentTab === b ? 'active' : ''}" onclick="setTab('${b}')">${b} <span class="chip-count">${count}</span></button>`;
        mobileHtml += `<button class="mobile-bldg-item ${currentTab === b ? 'active' : ''}" onclick="setTab('${b}')">${b} <span>${currentTab === b ? '<i class="fa-solid fa-check"></i>' : ''}</span></button>`;
        
        selectHtml += `<option value="${b}">${b}</option>`;
        manageHtml += `
            <div style="border:1px solid var(--border);border-radius:4px;padding:12px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center">
                <div style="font-weight:700">${b}</div>
                <div style="display:flex;gap:6px">
                    <button class="btn-outline-sm" onclick="editBuilding('${b}')">수정</button>
                    <button class="btn-outline-sm" style="color:var(--danger);border-color:var(--danger)" onclick="deleteBuilding('${b}')">삭제</button>
                </div>
            </div>`;
    });
    
    if (chipContainer) chipContainer.innerHTML = chipHtml;
    if (mobileContainer) mobileContainer.innerHTML = mobileHtml;
    if (bldgSelect) bldgSelect.innerHTML = selectHtml;
    if (manageList) manageList.innerHTML = manageHtml;
    
        // Update Mobile Button Text
        const btn = document.getElementById('mobileBuildingBtn');
        if (btn) btn.innerHTML = `<i class="fa-solid fa-filter" style="color:var(--txt3)"></i> ${currentTab === 'all' ? 'All' : currentTab} <i class="fa-solid fa-chevron-down" style="font-size: 0.65rem; margin-left:2px; color:var(--txt3)"></i>`;
    } catch (e) {
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Error in renderTabs: ${e.message}</div>`;
        console.error(e);
    }
}

function setTab(tab) {
    currentTab = tab;
    renderTabs();
    renderTable();
    closeModal('mobileBuildingModal');
}

function addBuilding() {
    const name = prompt('새 건물/구역의 이름을 입력하세요:');
    if (name && name.trim()) {
        const trimmed = name.trim();
        if (allBuildings.includes(trimmed)) {
            showToast('이미 존재하는 건물/구역명입니다.', 'error');
        } else {
            allBuildings.push(trimmed);
            if (window.PmsAPI) window.PmsAPI.saveBuildings(allBuildings);
            renderTabs();
        }
    }
}

function editBuilding(oldName) {
    const newName = prompt('건물/구역의 새 이름을 입력하세요:', oldName);
    if (newName && newName.trim() && newName.trim() !== oldName) {
        const trimmed = newName.trim();
        if (allBuildings.includes(trimmed)) {
            showToast('이미 존재하는 건물/구역명입니다.', 'error');
        } else {
            const idx = allBuildings.indexOf(oldName);
            if (idx > -1) allBuildings[idx] = trimmed;
            
            allRooms.forEach(r => {
                if (r.building === oldName) r.building = trimmed;
            });
            if (window.PmsAPI) {
                window.PmsAPI.saveBuildings(allBuildings);
                window.PmsAPI.saveRooms(allRooms);
            }
            
            if (currentTab === oldName) currentTab = trimmed;
            renderTabs();
            renderTable();
        }
    }
}

async function deleteBuilding(name) {
    const roomsInBuilding = allRooms.filter(r => r.building === name).length;
    let msg = `'${name}'을(를) 삭제하시겠습니까?`;
    if (roomsInBuilding > 0) {
        msg = `'${name}'에 속한 Room이 ${roomsInBuilding}개 있습니다.\\n정말 삭제하시겠습니까? (Room의 건물 정보가 '건물 미지정'으로 변경됩니다)`;
    }
    if (await showConfirm(msg)) {
        allBuildings = allBuildings.filter(b => b !== name);
        allRooms.forEach(r => {
            if (r.building === name) r.building = null;
        });
        if (window.PmsAPI) {
            window.PmsAPI.saveBuildings(allBuildings);
            window.PmsAPI.saveRooms(allRooms);
        }
        if (currentTab === name) currentTab = 'all';
        renderTabs();
        renderTable();
    }
}

function renderTable() {
    try {
        const search = document.getElementById('roomSearchInput').value.toLowerCase();
        const container = document.getElementById('roomGrid');
        container.innerHTML = '';
    
    const filtered = allRooms.filter(r => {
        if (!r) return false;
        if (currentTab !== 'all' && r.building !== currentTab) return false;
        if (search) {
            const rId = r.id ? r.id.toString().toLowerCase() : '';
            const rType = r.type ? r.type.toString().toLowerCase() : '';
            if (!rId.includes(search) && !rType.includes(search)) return false;
        }
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; padding:40px; color:var(--txt3); background:var(--card); border-radius:var(--radius); border:1px solid var(--border)">등록된 Room이 없습니다.</div>';
        return;
    }

    filtered.forEach((r, idx) => {
        const bldgStr = r.building || '건물 미지정';
        const floorStr = r.floor ? `${r.floor}층` : '-';
        container.innerHTML += `
            <div class="room-card">
                <div class="room-card-header">
                    <div class="room-card-title"><i class="fa-solid fa-door-closed"></i> ${r.id}</div>
                    <div class="room-card-type">${r.type}</div>
                </div>
                <div class="room-card-info">
                    <div class="room-info-row"><i class="fa-solid fa-building"></i> ${bldgStr}</div>
                    <div class="room-info-row"><i class="fa-solid fa-layer-group"></i> ${floorStr}</div>
                </div>
                <div class="room-card-actions">
                    <button class="btn-icon" onclick="editRoom(${idx})" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon delete" onclick="deleteRoom(${idx})" title="삭제"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        `;
        });
    } catch (e) {
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Error in renderTable: ${e.message}</div>`;
        console.error(e);
    }
}

let editingIdx = -1;

function editRoom(idx) {
    editingIdx = idx;
    const r = allRooms[idx];
    document.getElementById('roomModalTitle').innerText = 'Room 정보 수정';
    document.getElementById('saveBtnText').innerText = '수정 Completed';
    
    document.getElementById('addRoomId').value = r.id;
    document.getElementById('addRoomFloor').value = r.floor || '';
    document.getElementById('addRoomType').value = r.type;
    document.getElementById('addRoomBuilding').value = r.building || '';
    
    openModal('addRoomModal');
}

// Override openModal for Add Room to clear fields
const originalOpenModal = openModal;
openModal = function(id) {
    if (id === 'addRoomModal' && event && event.currentTarget && event.currentTarget.innerText.includes('Add Room')) {
        editingIdx = -1;
        document.getElementById('roomModalTitle').innerText = 'Add Room';
        document.getElementById('saveBtnText').innerText = 'Add Room';
        document.getElementById('addRoomId').value = '';
        document.getElementById('addRoomFloor').value = '';
        document.getElementById('addRoomType').value = 'Standard';
        document.getElementById('addRoomBuilding').value = '';
    }
    originalOpenModal(id);
}

function saveRoom() {
    const id = document.getElementById('addRoomId').value;
    const floor = document.getElementById('addRoomFloor').value;
    const type = document.getElementById('addRoomType').value;
    const building = document.getElementById('addRoomBuilding').value || null;

    if (!id) {
        showToast('Room 번호를 입력해주세요.', 'error');
        return;
    }

    if (editingIdx >= 0) {
        allRooms[editingIdx] = { ...allRooms[editingIdx], id, floor: parseInt(floor)||0, type, building };
    } else {
        allRooms.push({ id, floor: parseInt(floor)||0, type, status: 'vacant-clean', building });
    }
    
    if (window.PmsAPI) window.PmsAPI.saveRooms(allRooms);
    
    closeModal('addRoomModal');
    renderTabs();
    renderTable();
}

async function deleteRoom(idx) {
    if (await showConfirm('이 Room을 삭제하시겠습니까?')) {
        allRooms.splice(idx, 1);
        if (window.PmsAPI) window.PmsAPI.saveRooms(allRooms);
        renderTabs();
        renderTable();
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        if (window.PmsAPI) {
            allBuildings = await window.PmsAPI.getBuildings();
            allRooms = await window.PmsAPI.getAllRooms();
        }
        
        if (!Array.isArray(allBuildings)) allBuildings = [];
        if (!Array.isArray(allRooms)) allRooms = [];
        
        renderTabs();
        renderTable();
    } catch(e) { 
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Fatal Init Error: ${e.message}</div>`;
        console.error(e); 
    }
});
</script>

<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
