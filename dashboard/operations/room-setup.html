<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>객실 유형 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
<style>
/* Building Selection Styles */
.mobile-bldg-btn { display: none; }
.mobile-bldg-item { padding: 14px 16px; border-radius: 8px; font-size: 0.9rem; font-weight: 600; color: var(--txt); background: var(--card); border: 1px solid var(--border); cursor: pointer; text-align: left; display: flex; align-items: center; justify-content: space-between; }
.mobile-bldg-item:hover { background: var(--border2); }
.mobile-bldg-item.active { border-color: var(--primary); background: var(--primary-lt); color: var(--primary); }

/* Room Grid (Cards) */
.room-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.room-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; display: flex; flex-direction: column; gap: 12px; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; }
.room-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); border-color: var(--primary-lt); }
.room-card-header { display: flex; justify-content: space-between; align-items: flex-start; border-bottom: 1px solid var(--border2); padding-bottom: 12px; }
.room-card-title { font-size: 1.1rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 6px; }
.room-card-type { font-size: 0.75rem; font-weight: 600; background: var(--bg); padding: 4px 8px; border-radius: 4px; color: var(--txt2); }
.room-card-info { display: flex; flex-direction: column; gap: 8px; }
.room-info-row { display: flex; align-items: center; gap: 8px; font-size: 0.85rem; color: var(--txt); }
.room-info-row i { color: var(--txt3); width: 16px; text-align: center; }
.room-card-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 4px; }
.td-actions {
    display: flex;
    gap: 8px;
}
.btn-icon {
    width: 28px;
    height: 28px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border: 1px solid var(--border);
    background: #fff;
    border-radius: 4px;
    color: var(--txt2);
    cursor: pointer;
    transition: all 0.2s;
}
.btn-icon:hover {
    color: var(--primary);
    border-color: var(--primary);
}
.btn-icon.delete:hover {
    color: var(--danger);
    border-color: var(--danger);
}

.inline-manage-list{display:flex;flex-direction:column;gap:8px;overflow-x:hidden}
.inline-manage-row{display:grid;grid-template-columns:minmax(150px,1fr) auto;gap:8px;align-items:end;border:1px solid var(--border);border-radius:8px;padding:10px;background:#fff}
.inline-manage-row.new-row{background:#f8fafc;border-style:dashed}
.inline-field{display:flex;flex-direction:column;gap:5px;min-width:0}
.inline-field label{font-size:.72rem;font-weight:700;color:var(--txt3);text-transform:uppercase}
.inline-input{height:36px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.85rem;background:#fff;min-width:0;width:100%}
.inline-actions{display:flex;gap:6px;justify-content:flex-end}
.roomtype-row{grid-template-columns:repeat(2,minmax(0,1fr));gap:10px 8px}
.roomtype-row .inline-actions{grid-column:1/-1;align-self:end}
.roomtype-row .roomtype-desc{grid-column:1/-1}
.inline-subtext{font-size:.72rem;color:var(--txt3);margin-top:4px}
@media(max-width:900px){
    .roomtype-row{grid-template-columns:1fr 1fr}
    .roomtype-row .inline-actions{grid-column:1/-1}
}
@media(max-width:560px){
    .inline-manage-row,.roomtype-row{grid-template-columns:1fr}
    .inline-actions{justify-content:flex-start}
}

/* Search Bar */
.search-bar {
    display: flex;
    align-items: center;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0 12px;
    height: 38px;
    width: 260px;
}
.search-bar input {
    border: none;
    outline: none;
    width: 100%;
    font-family: var(--font);
    font-size: 0.85rem;
    margin-left: 8px;
}

.top-actions {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
}
.top-actions-right {
    display: flex;
    gap: 10px;
}

/* Toggle switch */
.toggle-switch{position:relative;width:44px;height:24px;cursor:pointer}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;inset:0;background:var(--border);border-radius:12px;transition:background .3s}
.toggle-slider::after{content:'';position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;box-shadow:0 1px 3px rgba(0,0,0,.2);transition:transform .3s}
.toggle-switch input:checked+.toggle-slider{background:var(--primary)}
.toggle-switch input:checked+.toggle-slider::after{transform:translateX(20px)}

/* Add room modal building row */
.add-room-bldg-row{display:none}
.add-room-bldg-row.show{display:flex}
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .top-actions { flex-direction: column; align-items: stretch; gap: 10px; }
    .top-actions-right { width: 100%; display: flex; gap: 8px; flex-wrap: wrap; }
    .top-actions-right button { flex: 1; justify-content: center; padding: 8px 4px; font-size: 0.75rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 100px; }
    
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap !important; gap: 10px !important; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto !important; }
    
    .mobile-bldg-btn { display: inline-flex !important; align-items: center; justify-content: center; flex: 0 0 auto !important; background: #fff; border: 1px solid var(--border); border-radius: 4px; padding: 0 12px; height: 38px; font-size: 0.85rem; font-weight: 500; color: var(--txt); gap: 6px; white-space: nowrap; }
    
    .room-grid { grid-template-columns: 1fr; }
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar"><h1 data-i18n-key="Room Types">객실 유형</h1></header>

    <div class="content">
        <div class="filter-bar-mt">
            <div class="filter-left">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="roomSearchInput" placeholder="객실 번호, 타입 검색..." oninput="renderTable()">
                    </div>
                    <button onclick="renderTable()" class="btn-search"><i class="fa-solid fa-search"></i> 검색</button>
                    <button class="btn-outline mobile-bldg-btn" onclick="openModal('mobileBuildingModal')" id="mobileBuildingBtn" style="display: none;">
                        <i class="fa-solid fa-filter" style="color:var(--txt3)"></i> <span data-i18n-key="All">All</span> <i class="fa-solid fa-chevron-down" style="font-size: 0.65rem; margin-left: 2px;"></i>
                    </button>
                </div>
                <div class="filter-divider desktop-only"></div>
                <div class="desktop-only filter-chips" id="buildingChips">
                    <button class="chip active" onclick="setTab('all')" data-i18n-key="All">All</button>
                    <!-- Generated by JS -->
                </div>
            </div>
            <div class="filter-right top-actions-right">
                <button class="btn-outline" onclick="openModal('buildingModal')"><i class="fa-solid fa-building"></i> 건물/구역 관리</button>
                <button class="btn-outline" onclick="openModal('roomTypeModal')"><i class="fa-solid fa-layer-group"></i> 객실 유형</button>
                <button class="btn-primary-sm" onclick="openModal('addRoomModal')"><i class="fa-solid fa-plus"></i> 객실 등록</button>
            </div>
        </div>

        <div class="room-grid" id="roomGrid">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<!-- Mobile Building Modal -->
<div class="modal-overlay" id="mobileBuildingModal" onclick="if(event.target===this) closeModal('mobileBuildingModal')">
    <div class="modal-card">
        <div class="modal-header">
            <h3 class="modal-title">건물/구역 선택</h3>
            <button class="modal-close" onclick="closeModal('mobileBuildingModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:16px;display:flex;flex-direction:column;gap:8px" id="mobileBuildingList">
            <!-- Generated by JS -->
        </div>
    </div>
</div>

<!-- Building Management Modal -->
<div class="modal-overlay" id="buildingModal" onclick="if(event.target===this) closeModal('buildingModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">건물/구역 관리</h3>
            <button class="modal-close" onclick="closeModal('buildingModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">건물/구역명을 이 화면에서 바로 수정하고, 아래 신규 행에 입력해 추가합니다.</p>
            <div id="buildingManageList">
                <!-- Generated by JS -->
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('buildingModal')">Close</button>
        </div>
    </div>
</div>

<!-- Room Type Management Modal -->
<div class="modal-overlay" id="roomTypeModal" onclick="if(event.target===this) closeModal('roomTypeModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">객실 유형 관리</h3>
            <button class="modal-close" onclick="closeModal('roomTypeModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            <p style="font-size:0.85rem;color:var(--txt2)">같은 객실명이라도 뷰/구분과 기준요금이 다르면 별도 유형으로 관리합니다. 저장 즉시 요금 캘린더 항목에도 반영됩니다.</p>
            
            <div id="roomTypeListContainer">
                <!-- Generated by JS -->
            </div>
            
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('roomTypeModal')">Close</button>
        </div>
    </div>
</div>

<!-- Add/Edit Room Modal -->
<div class="modal-overlay" id="addRoomModal" onclick="if(event.target===this) closeModal('addRoomModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title" id="roomModalTitle">객실 등록</h3>
            <button class="modal-close" onclick="closeModal('addRoomModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px">
            <!-- Building selection -->
            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">건물 / 구역</label>
                <select id="addRoomBuilding" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                    <!-- Populated by JS -->
                </select>
            </div>
            <div class="modal-form-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">객실 번호 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="addRoomId" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 1208">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">해당 층</label>
                    <input type="number" id="addRoomFloor" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%" placeholder="예: 12">
                </div>
            </div>
            <div class="modal-form-grid" style="display:grid;grid-template-columns:1fr;gap:16px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">객실 유형 <span style="color:var(--danger)">*</span></label>
                    <select id="addRoomType" style="height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);width:100%;background:#fff">
                        <option value="">객실 유형 선택</option>
                    </select>
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">특이사항 / 메모</label>
                <textarea style="min-height:60px;border:1px solid var(--border);border-radius:4px;padding:10px;font-family:var(--font);width:100%;resize:vertical" placeholder="전망, 인접 객실 특징 등..."></textarea>
            </div>
        </div>
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('addRoomModal')">취소</button>
            <button class="btn-primary-sm" onclick="saveRoom()"><i class="fa-solid fa-check"></i> <span id="saveBtnText">객실 등록</span></button>
        </div>
    </div>
</div>

<script>
let allBuildings = [];
let allRooms = [];
let allRoomTypes = [];

const statusConfig = {
    'occupied': { label: '투숙 중' },
    'vacant-clean': { label: '청결 공실' },
    'vacant-dirty': { label: '오염 공실' },
    'oos': { label: '점검 중' }
};

let currentTab = 'all';

function openModal(id) { 
    if(id === 'roomTypeModal') renderRoomTypes();
    document.getElementById(id).classList.add('active'); 
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function escapeAttr(value) {
    return escapeHtml(value).replace(/`/g, '&#96;');
}

function jsArg(value) {
    return JSON.stringify(value ?? '');
}

function jsAttrArg(value) {
    return escapeAttr(jsArg(value));
}

function i18nText(key, fallback) {
    const translated = typeof window.t === 'function' ? window.t(key) : key;
    if (translated && translated !== key) return translated;
    return fallback;
}

function slugRoomType(name, view) {
    return String([name, view].filter(Boolean).join('-') || 'ROOM-TYPE')
        .toUpperCase()
        .replace(/[^A-Z0-9]+/g, '-')
        .replace(/^-|-$/g, '')
        .slice(0, 32) || `RT-${Date.now()}`;
}

function roomTypeLabel(value) {
    const found = allRoomTypes.find(rt => rt.id === value || rt.typeId === value || rt.name === value);
    if (!found) return String(value || '').trim() || '-';
    const name = String(found.name || found.id || '').trim();
    const view = String(found.view || '').trim();
    return view ? `${name} · ${view}` : name;
}

function roomTypeSearchKey(value) {
    return String(value || '')
        .trim()
        .toLowerCase()
        .normalize('NFKC')
        .replace(/[^\p{L}\p{N}]+/gu, ' ')
        .replace(/\s+/g, ' ')
        .trim();
}

const roomTypeCollator = new Intl.Collator(['ko', 'en'], { numeric: true, sensitivity: 'base' });

function compareRoomTypes(a, b) {
    const aName = roomTypeSearchKey(a?.name || a?.id || '');
    const bName = roomTypeSearchKey(b?.name || b?.id || '');
    const byName = roomTypeCollator.compare(aName, bName);
    if (byName) return byName;

    const aView = roomTypeSearchKey(a?.view || '');
    const bView = roomTypeSearchKey(b?.view || '');
    const byView = roomTypeCollator.compare(aView, bView);
    if (byView) return byView;

    return roomTypeCollator.compare(String(a?.id || ''), String(b?.id || ''));
}

function sortRoomTypes() {
    allRoomTypes.sort(compareRoomTypes);
}

function findRoomTypeByInput(value) {
    const text = String(value || '').trim();
    const exactText = text.toLowerCase();
    const comparableText = roomTypeSearchKey(text);
    if (!text) return null;
    return allRoomTypes.find(rt => {
        const candidates = [rt.id, rt.typeId, rt.code, rt.name, roomTypeLabel(rt.id)].filter(Boolean);
        const exactCandidates = candidates.map(candidate => String(candidate).trim().toLowerCase());
        const comparableCandidates = candidates.map(roomTypeSearchKey);
        return exactCandidates.includes(exactText) || comparableCandidates.includes(comparableText);
    }) || null;
}

function normalizeRoomType(raw) {
    const name = raw?.name || raw?.id || '객실 유형';
    const view = raw?.view || raw?.viewType || '';
    const id = raw?.id || raw?.typeId || raw?.code || slugRoomType(name, view);
    const base = Number(raw?.basePrice ?? raw?.baseRate?.amount ?? raw?.baseRate ?? 0);
    return {
        ...raw,
        id,
        typeId: id,
        code: raw?.code || id,
        name,
        view,
        desc: raw?.desc || raw?.description || '',
        basePrice: base,
        baseRate: base,
        currency: raw?.currency || raw?.baseRate?.currency || localStorage.getItem('pms_default_currency') || 'PHP',
        capacity: Number(raw?.capacity || 2),
        active: raw?.active !== false
    };
}

function persistRoomTypes() {
    sortRoomTypes();
    if (window.PmsAPI?.saveRoomTypes) return window.PmsAPI.saveRoomTypes(allRoomTypes);
    localStorage.setItem('pms_room_types', JSON.stringify(allRoomTypes));
    localStorage.setItem('pms_room_types_config', JSON.stringify(allRoomTypes));
    return Promise.resolve(true);
}

function renderRoomTypes() {
    const container = document.getElementById('roomTypeListContainer');
    if (!container) return;
    const rows = allRoomTypes.map((rt, index) => `
        <div class="inline-manage-row roomtype-row" data-type-id="${escapeAttr(rt.id)}">
            <div class="inline-field">
                <label>객실명</label>
                <input class="inline-input" id="rtName${index}" value="${escapeAttr(rt.name)}" placeholder="예: Deluxe">
            </div>
            <div class="inline-field">
                <label>뷰 / 구분</label>
                <input class="inline-input" id="rtView${index}" value="${escapeAttr(rt.view)}" placeholder="예: Ocean View">
            </div>
            <div class="inline-field roomtype-desc">
                <label>설명</label>
                <input class="inline-input" id="rtDesc${index}" value="${escapeAttr(rt.desc)}" placeholder="예: 최대 2인, 킹베드 1개">
            </div>
            <div class="inline-actions">
                <button class="btn-outline-sm" onclick="saveRoomTypeRow(${index})"><i class="fa-solid fa-check"></i> 저장</button>
                <button class="btn-outline-sm" style="color:var(--danger);border-color:var(--danger)" onclick="deleteRoomType(${index})"><i class="fa-solid fa-trash"></i> 삭제</button>
            </div>
        </div>
    `).join('');

    container.innerHTML = `
        <div class="inline-manage-list">
            ${rows || '<div style="padding:14px;color:var(--txt3);border:1px solid var(--border);border-radius:8px">등록된 객실 유형이 없습니다.</div>'}
            <div class="inline-manage-row roomtype-row new-row">
                <div class="inline-field"><label>객실명</label><input class="inline-input" id="newRtName" placeholder="예: Deluxe"></div>
                <div class="inline-field"><label>뷰 / 구분</label><input class="inline-input" id="newRtView" placeholder="예: City View"></div>
                <div class="inline-field roomtype-desc"><label>설명</label><input class="inline-input" id="newRtDesc" placeholder="예: 최대 2인, 킹베드 1개"></div>
                <div class="inline-actions"><button class="btn-primary-sm" onclick="addRoomType()"><i class="fa-solid fa-plus"></i> 추가</button></div>
            </div>
        </div>
    `;
}

async function saveRoomTypeRow(index) {
    const current = allRoomTypes[index];
    if (!current) return;
    const name = document.getElementById(`rtName${index}`).value.trim();
    const view = document.getElementById(`rtView${index}`).value.trim();
    const id = current.id;
    if (!name) return showToast('객실명을 입력해 주세요.', 'error');
    if (allRoomTypes.some((rt, i) => i !== index && roomTypeSearchKey(roomTypeLabel(rt.id)) === roomTypeSearchKey([name, view].filter(Boolean).join(' ')))) {
        return showToast('이미 등록된 객실 유형입니다.', 'error');
    }
    const updated = normalizeRoomType({
        ...current,
        id,
        typeId: id,
        code: current.code || id,
        name,
        view,
        desc: document.getElementById(`rtDesc${index}`).value.trim()
    });
    allRoomTypes[index] = updated;
    await persistRoomTypes();
    renderRoomTypeOptions();
    renderRoomTypes();
    renderTable();
    showToast('객실 유형이 저장되었습니다.', 'success');
}

async function addRoomType() {
    const name = document.getElementById('newRtName').value.trim();
    const view = document.getElementById('newRtView').value.trim();
    if (!name) return showToast('객실명을 입력해 주세요.', 'error');
    if (allRoomTypes.some(rt => roomTypeSearchKey(roomTypeLabel(rt.id)) === roomTypeSearchKey([name, view].filter(Boolean).join(' ')))) {
        return showToast('이미 등록된 객실 유형입니다.', 'error');
    }
    const baseId = slugRoomType(name, view);
    let id = baseId;
    let suffix = 2;
    while (allRoomTypes.some(rt => rt.id === id)) {
        id = `${baseId}-${suffix}`;
        suffix += 1;
    }
    allRoomTypes.push(normalizeRoomType({
        id,
        typeId: id,
        code: id,
        name,
        view,
        desc: document.getElementById('newRtDesc').value.trim()
    }));
    await persistRoomTypes();
    renderRoomTypeOptions();
    renderRoomTypes();
    showToast('객실 유형이 추가되었습니다.', 'success');
}

async function deleteRoomType(index) {
    const rt = allRoomTypes[index];
    if (!rt) return;
    const used = allRooms.filter(room => {
        const match = findRoomTypeByInput(room.type);
        return room.type === rt.id || room.type === rt.name || match?.id === rt.id;
    }).length;
    if (used > 0) return showToast('사용 중인 객실 유형은 삭제할 수 없습니다. 먼저 객실의 유형을 변경해 주세요.', 'error');
    if (!await showConfirm(`'${roomTypeLabel(rt.id)}' 객실 유형을 삭제하시겠습니까?`)) return;
    allRoomTypes.splice(index, 1);
    removeRateType(rt.id);
    await persistRoomTypes();
    renderRoomTypeOptions();
    renderRoomTypes();
    showToast('객실 유형이 삭제되었습니다.', 'success');
}

function migrateRoomTypeId(oldId, newId) {
    allRooms.forEach(room => {
        const current = findRoomTypeByInput(room.type);
        if (room.type === oldId || current?.id === oldId) room.type = newId;
    });
    if (window.PmsAPI?.saveRooms) window.PmsAPI.saveRooms(allRooms);
    try {
        const rates = JSON.parse(localStorage.getItem('pms_daily_rates') || '{}');
        Object.values(rates).forEach(row => {
            if (row && Object.prototype.hasOwnProperty.call(row, oldId)) {
                row[newId] = row[oldId];
                delete row[oldId];
            }
        });
        localStorage.setItem('pms_daily_rates', JSON.stringify(rates));
    } catch(e) {}
}

function removeRateType(typeId) {
    try {
        const rates = JSON.parse(localStorage.getItem('pms_daily_rates') || '{}');
        Object.values(rates).forEach(row => {
            if (row) delete row[typeId];
        });
        localStorage.setItem('pms_daily_rates', JSON.stringify(rates));
    } catch(e) {}
}

function renderRoomTypeOptions() {
    const select = document.getElementById('addRoomType');
    if (!select) return;
    const current = select.value;
    const options = allRoomTypes
        .filter(rt => rt && rt.active !== false)
        .map(rt => `<option value="${escapeAttr(rt.id)}">${escapeHtml(roomTypeLabel(rt.id))}</option>`)
        .join('');
    select.innerHTML = `<option value="">객실 유형 선택</option>${options}`;
    setRoomTypeSelectValue(current);
}

function setRoomTypeSelectValue(value) {
    const input = document.getElementById('addRoomType');
    if (!input) return;
    const match = findRoomTypeByInput(value);
    if (match) {
        input.value = match.id;
        return;
    }
    input.value = '';
}

function renderTabs() {
    try {
        const buildings = allBuildings.slice().sort();
        const allLabel = i18nText('common.all', (window.currentLang || localStorage.getItem('pms_lang')) === 'en' ? 'All' : '\uC804\uCCB4');
        
        // Desktop Chips
        const chipContainer = document.getElementById('buildingChips');
        let chipHtml = `<button class="chip ${currentTab === 'all' ? 'active' : ''}" onclick='setTab(${jsAttrArg('all')})'>${escapeHtml(allLabel)} <span class="chip-count">${allRooms.length}</span></button>`;
    
    // Mobile List
    const mobileContainer = document.getElementById('mobileBuildingList');
    let mobileHtml = `<button class="mobile-bldg-item ${currentTab === 'all' ? 'active' : ''}" onclick='setTab(${jsAttrArg('all')})'>${escapeHtml(allLabel)} <span>${currentTab === 'all' ? '<i class="fa-solid fa-check"></i>' : ''}</span></button>`;
    
    // Building Management Select & List
    const bldgSelect = document.getElementById('addRoomBuilding');
    const manageList = document.getElementById('buildingManageList');
    let selectHtml = '<option value="">건물 미지정 (단일 건물)</option>';
    let manageHtml = '<div class="inline-manage-list">';

    buildings.forEach((b, index) => {
        const count = allRooms.filter(r => r && r.building === b).length;
        chipHtml += `<button class="chip ${currentTab === b ? 'active' : ''}" onclick='setTab(${jsAttrArg(b)})'>${escapeHtml(b)} <span class="chip-count">${count}</span></button>`;
        mobileHtml += `<button class="mobile-bldg-item ${currentTab === b ? 'active' : ''}" onclick='setTab(${jsAttrArg(b)})'>${escapeHtml(b)} <span>${currentTab === b ? '<i class="fa-solid fa-check"></i>' : ''}</span></button>`;
        
        selectHtml += `<option value="${escapeAttr(b)}">${escapeHtml(b)}</option>`;
        manageHtml += `
            <div class="inline-manage-row">
                <div class="inline-field">
                    <label>건물/구역명</label>
                    <input class="inline-input" id="buildingInput${index}" value="${escapeAttr(b)}">
                    <div class="inline-subtext">배정 객실 ${count}개</div>
                </div>
                <div class="inline-actions">
                    <button class="btn-outline-sm" onclick='saveBuildingRow(${index}, ${jsAttrArg(b)})'><i class="fa-solid fa-check"></i> 저장</button>
                    <button class="btn-outline-sm" style="color:var(--danger);border-color:var(--danger)" onclick='deleteBuilding(${jsAttrArg(b)})'>삭제</button>
                </div>
            </div>`;
    });
    manageHtml += `
        <div class="inline-manage-row new-row">
            <div class="inline-field">
                <label>새 건물/구역</label>
                <input class="inline-input" id="newBuildingName" placeholder="예: Ocean View Wing">
            </div>
            <div class="inline-actions">
                <button class="btn-primary-sm" onclick="addBuilding()"><i class="fa-solid fa-plus"></i> 추가</button>
            </div>
        </div>
    </div>`;
    
    if (chipContainer) chipContainer.innerHTML = chipHtml;
    if (mobileContainer) mobileContainer.innerHTML = mobileHtml;
    if (bldgSelect) bldgSelect.innerHTML = selectHtml;
    if (manageList) manageList.innerHTML = manageHtml;
    
        // Update Mobile Button Text
        const btn = document.getElementById('mobileBuildingBtn');
        if (btn) btn.innerHTML = `<i class="fa-solid fa-filter" style="color:var(--txt3)"></i> ${currentTab === 'all' ? escapeHtml(allLabel) : escapeHtml(currentTab)} <i class="fa-solid fa-chevron-down" style="font-size: 0.65rem; margin-left:2px; color:var(--txt3)"></i>`;
    } catch (e) {
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Error in renderTabs: ${e.message}</div>`;
        console.error(e);
    }
}

function setTab(tab) {
    currentTab = tab;
    renderTabs();
    renderTable();
    closeModal('mobileBuildingModal');
}

window.addEventListener('languagechange', () => {
    if (Array.isArray(allRooms) && allRooms.length) renderTabs();
});

function addBuilding() {
    const input = document.getElementById('newBuildingName');
    const trimmed = input?.value.trim();
    if (!trimmed) return showToast('건물/구역명을 입력해 주세요.', 'error');
    if (allBuildings.includes(trimmed)) return showToast('이미 존재하는 건물/구역명입니다.', 'error');
    allBuildings.push(trimmed);
    if (window.PmsAPI) window.PmsAPI.saveBuildings(allBuildings);
    renderTabs();
    showToast('건물/구역이 추가되었습니다.', 'success');
}

function saveBuildingRow(index, oldName) {
    const input = document.getElementById(`buildingInput${index}`);
    const trimmed = input?.value.trim();
    if (!trimmed) return showToast('건물/구역명을 입력해 주세요.', 'error');
    if (trimmed !== oldName && allBuildings.includes(trimmed)) return showToast('이미 존재하는 건물/구역명입니다.', 'error');

    const idx = allBuildings.indexOf(oldName);
    if (idx > -1) allBuildings[idx] = trimmed;
    allRooms.forEach(r => {
        if (r.building === oldName) r.building = trimmed;
    });
    if (window.PmsAPI) {
        window.PmsAPI.saveBuildings(allBuildings);
        window.PmsAPI.saveRooms(allRooms);
    }
    if (currentTab === oldName) currentTab = trimmed;
    renderTabs();
    renderTable();
    showToast('건물/구역이 저장되었습니다.', 'success');
}

async function deleteBuilding(name) {
    const roomsInBuilding = allRooms.filter(r => r.building === name).length;
    let msg = typeof window.t === 'function'
        ? window.t('roomSetup.building.delete.confirm', { name })
        : `'${name}'을(를) 삭제하시겠습니까?`;
    if (roomsInBuilding > 0) {
        msg = typeof window.t === 'function'
            ? window.t('roomSetup.building.deleteWithRooms.confirm', { name, count: roomsInBuilding })
            : `'${name}'에 속한 Room이 ${roomsInBuilding}개 있습니다.\\n정말 삭제하시겠습니까? (Room의 건물 정보가 '건물 미지정'으로 변경됩니다)`;
    }
    if (await showConfirm(msg)) {
        allBuildings = allBuildings.filter(b => b !== name);
        allRooms.forEach(r => {
            if (r.building === name) r.building = null;
        });
        if (window.PmsAPI) {
            window.PmsAPI.saveBuildings(allBuildings);
            window.PmsAPI.saveRooms(allRooms);
        }
        if (currentTab === name) currentTab = 'all';
        renderTabs();
        renderTable();
    }
}

function renderTable() {
    try {
        const search = document.getElementById('roomSearchInput').value.toLowerCase();
        const container = document.getElementById('roomGrid');
        container.innerHTML = '';
    
    const filtered = allRooms.filter(r => {
        if (!r) return false;
        if (currentTab !== 'all' && r.building !== currentTab) return false;
        if (search) {
            const rId = r.id ? r.id.toString().toLowerCase() : '';
            const rType = r.type ? r.type.toString().toLowerCase() : '';
            const rTypeLabel = roomTypeLabel(r.type).toLowerCase();
            if (!rId.includes(search) && !rType.includes(search) && !rTypeLabel.includes(search)) return false;
        }
        return true;
    });

    if (filtered.length === 0) {
        container.innerHTML = '<div style="grid-column: 1 / -1; text-align:center; padding:40px; color:var(--txt3); background:var(--card); border-radius:var(--radius); border:1px solid var(--border)">등록된 Room이 없습니다.</div>';
        return;
    }

    filtered.forEach((r) => {
        const sourceIdx = allRooms.indexOf(r);
        const bldgStr = r.building || '건물 미지정';
        const floorStr = r.floor ? `${r.floor}층` : '-';
        container.innerHTML += `
            <div class="room-card">
                <div class="room-card-header">
                    <div class="room-card-title"><i class="fa-solid fa-door-closed"></i> ${escapeHtml(r.id)}</div>
                    <div class="room-card-type">${escapeHtml(roomTypeLabel(r.type))}</div>
                </div>
                <div class="room-card-info">
                    <div class="room-info-row"><i class="fa-solid fa-building"></i> ${escapeHtml(bldgStr)}</div>
                    <div class="room-info-row"><i class="fa-solid fa-layer-group"></i> ${floorStr}</div>
                </div>
                <div class="room-card-actions">
                    <button class="btn-icon" onclick="editRoom(${sourceIdx})" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-icon delete" onclick="deleteRoom(${sourceIdx})" title="삭제"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        `;
        });
    } catch (e) {
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Error in renderTable: ${e.message}</div>`;
        console.error(e);
    }
}

let editingIdx = -1;

function editRoom(idx) {
    editingIdx = idx;
    const r = allRooms[idx];
    document.getElementById('roomModalTitle').innerText = 'Room 정보 수정';
    document.getElementById('saveBtnText').innerText = '수정 완료';
    
    document.getElementById('addRoomId').value = r.id;
    document.getElementById('addRoomFloor').value = r.floor || '';
    setRoomTypeSelectValue(r.type);
    document.getElementById('addRoomBuilding').value = r.building || '';
    
    openModal('addRoomModal');
}

// Override openModal for Add Room to clear fields
const originalOpenModal = openModal;
openModal = function(id) {
    const trigger = typeof event !== 'undefined' ? event?.currentTarget : null;
    if (id === 'addRoomModal' && trigger && (trigger.innerText.includes('Add Room') || trigger.innerText.includes('객실 등록'))) {
        editingIdx = -1;
        document.getElementById('roomModalTitle').innerText = '객실 등록';
        document.getElementById('saveBtnText').innerText = '객실 등록';
        document.getElementById('addRoomId').value = '';
        document.getElementById('addRoomFloor').value = '';
        setRoomTypeSelectValue('');
        document.getElementById('addRoomBuilding').value = '';
    }
    originalOpenModal(id);
}

async function saveRoom() {
    const id = document.getElementById('addRoomId').value.trim();
    const floor = document.getElementById('addRoomFloor').value;
    const type = document.getElementById('addRoomType').value;
    const building = document.getElementById('addRoomBuilding').value || null;

    if (!id) {
        showToast('객실 번호를 입력해주세요.', 'error');
        return;
    }
    if (!type) {
        showToast('객실 유형을 입력해주세요.', 'error');
        return;
    }

    if (editingIdx >= 0) {
        allRooms[editingIdx] = { ...allRooms[editingIdx], id, floor: parseInt(floor)||0, type, building };
    } else {
        allRooms.push({ id, floor: parseInt(floor)||0, type, status: 'vacant-clean', building });
    }
    
    if (window.PmsAPI) window.PmsAPI.saveRooms(allRooms);
    
    closeModal('addRoomModal');
    renderTabs();
    renderTable();
}

async function deleteRoom(idx) {
    const msg = typeof window.t === 'function' ? window.t('roomSetup.room.delete.confirm') : '이 Room을 삭제하시겠습니까?';
    if (await showConfirm(msg)) {
        allRooms.splice(idx, 1);
        if (window.PmsAPI) window.PmsAPI.saveRooms(allRooms);
        renderTabs();
        renderTable();
    }
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        if (window.PmsAPI) {
            allBuildings = await window.PmsAPI.getBuildings();
            allRooms = await window.PmsAPI.getAllRooms();
            if (window.PmsAPI.getAllRoomTypes) allRoomTypes = await window.PmsAPI.getAllRoomTypes();
        }
        
        if (!Array.isArray(allBuildings)) allBuildings = [];
        if (!Array.isArray(allRooms)) allRooms = [];
        if (!Array.isArray(allRoomTypes)) allRoomTypes = [];
        allRoomTypes = allRoomTypes.map(normalizeRoomType);
        sortRoomTypes();
        
        renderRoomTypeOptions();
        renderTabs();
        renderTable();
    } catch(e) { 
        document.getElementById('roomGrid').innerHTML = `<div style="color:red;padding:20px;grid-column:1/-1;">Fatal Init Error: ${e.message}</div>`;
        console.error(e); 
    }
});
</script>

<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
