<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>마감로그 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <style>
        .close-log-section { background:#fff; border:1px solid var(--border); border-radius:12px; margin-bottom:20px; overflow:hidden; }
        .close-log-header { padding:16px 20px; border-bottom:1px solid var(--border2); background:#fdfdfd; display:flex; align-items:center; justify-content:space-between; gap:12px; }
        .close-log-title { display:flex; align-items:center; gap:9px; font-size:1.02rem; font-weight:900; color:var(--txt); }
        .close-log-body { padding:20px; }
        .log-toolbar { display:flex; align-items:center; justify-content:space-between; gap:12px; flex-wrap:wrap; padding:12px; border:1px solid var(--border2); border-radius:12px; background:#f8fafc; margin-bottom:16px; }
        .log-date-controls { display:flex; align-items:center; gap:8px; min-width:0; }
        .log-date-controls input { height:36px; border:1px solid var(--border); border-radius:8px; padding:0 10px; font-family:var(--font); font-size:.82rem; background:#fff; }
        .log-summary-grid { display:grid; grid-template-columns:repeat(5,minmax(0,1fr)); gap:10px; margin-bottom:16px; }
        .log-summary-card { border:1px solid var(--border2); border-radius:10px; background:#fff; padding:13px; min-width:0; text-align:center; display:flex; flex-direction:column; align-items:center; }
        .log-summary-label { font-size:.72rem; color:var(--txt3); font-weight:900; margin-bottom:5px; }
        .log-summary-value { font-size:1rem; color:var(--txt); font-weight:900; }
        .cash-balance-formula { margin:-2px 0 16px; border:1px solid var(--border2); border-radius:12px; background:#fff; padding:12px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
        .cash-balance-title { display:inline-flex; align-items:center; gap:7px; color:var(--txt); font-size:.82rem; font-weight:900; margin-right:2px; }
        .cash-formula-token { display:inline-flex; align-items:center; min-height:26px; padding:0 10px; border:1px solid var(--border2); border-radius:999px; background:#f8fafc; color:var(--txt2); font-size:.72rem; font-weight:900; white-space:nowrap; }
        .cash-formula-symbol { width:24px; height:24px; border-radius:999px; display:inline-flex; align-items:center; justify-content:center; border:1px solid #bfdbfe; background:#eff6ff; color:var(--primary); font-size:.78rem; font-weight:950; }
        .cash-balance-chips { display:inline-flex; align-items:center; gap:8px; flex-wrap:wrap; padding-left:4px; }
        .cash-balance-chips .currency-chip-group { width:auto; align-items:flex-start; }
        .cash-balance-chips .currency-chip-list { justify-content:flex-start; }
        .currency-chip-list { display:flex; flex-wrap:wrap; justify-content:center; gap:6px; margin-top:9px; width:100%; }
        .currency-chip-group { display:flex; flex-direction:column; align-items:center; gap:6px; width:100%; }
        .currency-chip-group-label { font-size:.68rem; color:var(--txt3); font-weight:900; }
        .currency-chip-group .currency-chip-list { margin-top:0; }
        .currency-chip { display:inline-flex; align-items:center; gap:8px; border:1px solid #a7f3d0; border-radius:999px; background:#ecfdf5; color:#047857; padding:5px 11px; font-size:.78rem; font-weight:900; white-space:nowrap; line-height:1.1; }
        .currency-chip strong { color:var(--txt); font-size:.92rem; font-weight:950; }
        .currency-chip.success { border-color:#a7f3d0; background:#ecfdf5; color:#047857; }
        .currency-chip.warning { border-color:#fed7aa; background:#fff7ed; color:#b45309; }
        .currency-chip.neutral { border-color:#bfdbfe; background:#eff6ff; color:#1d4ed8; }
        .log-ledger { border:1px solid var(--border2); border-radius:12px; overflow:hidden; background:#fff; }
        .log-ledger-head { display:flex; align-items:center; justify-content:space-between; gap:10px; padding:12px 14px; background:#f8fafc; border-bottom:1px solid var(--border2); font-weight:900; }
        .log-ledger-body { overflow-x:visible; }
        .log-ledger table { width:100%; border-collapse:collapse; table-layout:fixed; }
        .log-ledger th,
        .log-ledger td { padding:11px 12px; border-bottom:1px solid var(--border2); text-align:left; font-size:.78rem; line-height:1.45; vertical-align:middle; white-space:normal; word-break:break-word; overflow-wrap:anywhere; }
        .log-ledger th { color:var(--txt2); background:#fbfdff; font-weight:900; white-space:nowrap; }
        .log-ledger th:nth-child(1), .log-ledger td:nth-child(1) { width:9%; white-space:nowrap; }
        .log-ledger th:nth-child(2), .log-ledger td:nth-child(2) { width:11%; }
        .log-ledger th:nth-child(3), .log-ledger td:nth-child(3) { width:24%; }
        .log-ledger th:nth-child(4), .log-ledger td:nth-child(4) { width:10%; text-align:right; white-space:nowrap; }
        .log-ledger th:nth-child(5), .log-ledger td:nth-child(5) { width:25%; }
        .log-ledger th:nth-child(6), .log-ledger td:nth-child(6) { width:10%; }
        .log-ledger th:nth-child(7), .log-ledger td:nth-child(7) { width:11%; }
        .log-pill { display:inline-flex; align-items:center; gap:5px; padding:3px 8px; border-radius:999px; font-size:.7rem; font-weight:900; background:#eef2ff; color:#4338ca; white-space:nowrap; }
        .log-pill.deposit { background:#ecfdf5; color:#047857; }
        .log-pill.withdraw { background:#fff7ed; color:#b45309; }
        .log-empty { padding:24px 16px; text-align:center; color:var(--txt3); font-weight:800; }

        @media (max-width: 980px) {
            .log-summary-grid { grid-template-columns:1fr 1fr; }
            .log-ledger table { min-width:760px; }
            .log-ledger-body { overflow-x:auto; }
        }
        @media (max-width: 640px) {
            .log-summary-grid { grid-template-columns:1fr; }
            .log-toolbar, .close-log-header { align-items:stretch; flex-direction:column; }
            .log-date-controls { width:100%; }
            .log-date-controls input { flex:1; min-width:0; }
        }
    </style>
</head>
<body>
<div class="main">
    <header class="topbar"><h1 data-i18n-key="Close Log">마감로그</h1></header>
    <div class="content">
        <div class="close-log-section">
            <div class="close-log-header">
                <div>
                    <div class="close-log-title"><i class="fa-solid fa-calendar-days" style="color:var(--primary)"></i> 금일 정산 현황</div>
                    <div style="margin-top:4px;color:var(--txt2);font-size:.8rem;font-weight:700">일일 마감에서 등록한 시재와 정산 수납 기록을 날짜별로 확인합니다.</div>
                </div>
                <a class="btn-primary-sm" href="night-audit.html?tab=cash"><i class="fa-solid fa-handshake"></i> 시재 인수인계로 이동</a>
            </div>
            <div class="close-log-body">
                <div class="log-toolbar">
                    <div class="log-date-controls">
                        <button type="button" class="btn-outline-sm" onclick="shiftLogDate(-1)" aria-label="전일"><i class="fa-solid fa-chevron-left"></i></button>
                        <input id="logDateInput" type="date" onchange="renderCloseLog()">
                        <button type="button" class="btn-outline-sm" onclick="shiftLogDate(1)" aria-label="다음일"><i class="fa-solid fa-chevron-right"></i></button>
                        <button type="button" class="btn-primary-sm" onclick="setLogDate(todayIso())">오늘</button>
                    </div>
                    <span id="logSelectedDate" class="log-pill">-</span>
                </div>

                <div class="log-summary-grid">
                    <div class="log-summary-card">
                        <div class="log-summary-label">시작 시재</div>
                        <div class="log-summary-value" id="logOpeningPhp">₱0</div>
                        <div class="currency-chip-list" id="logOpeningDetail" data-no-currency-normalize="true"></div>
                    </div>
                    <div class="log-summary-card">
                        <div class="log-summary-label">정산금액</div>
                        <div class="log-summary-value" id="logPaymentPhp">₱0</div>
                        <div class="currency-chip-list" id="logPaymentDetail" data-no-currency-normalize="true"></div>
                    </div>
                    <div class="log-summary-card">
                        <div class="log-summary-label">예치금</div>
                        <div class="log-summary-value" id="logDepositPhp">₱0</div>
                        <div class="currency-chip-list" id="logDepositDetail" data-no-currency-normalize="true"></div>
                    </div>
                    <div class="log-summary-card">
                        <div class="log-summary-label">중간 출금</div>
                        <div class="log-summary-value" id="logWithdrawPhp">₱0</div>
                        <div class="currency-chip-list" id="logWithdrawDetail" data-no-currency-normalize="true"></div>
                    </div>
                    <div class="log-summary-card">
                        <div class="log-summary-label">실제 보유 통화</div>
                        <div class="log-summary-value" id="logClosingPhp">₱0</div>
                        <div class="currency-chip-list" id="logClosingDetail" data-no-currency-normalize="true"></div>
                    </div>
                </div>
                <div class="cash-balance-formula" id="logBalanceFormula" data-no-currency-normalize="true"></div>

                <div class="log-ledger">
                    <div class="log-ledger-head">
                        <span><i class="fa-solid fa-book-open" style="color:var(--primary)"></i> 선택 일자 장부 내역</span>
                        <span id="logLedgerCount" style="font-size:.75rem;color:var(--txt3)">0건</span>
                    </div>
                    <div class="log-ledger-body">
                        <table>
                            <thead>
                                <tr><th>시간</th><th>구분</th><th>대상</th><th>정산 반영액</th><th>실제 통화/구성</th><th>담당자</th><th>메모</th></tr>
                            </thead>
                            <tbody id="logLedgerBody"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
const CASH_SESSION_KEY = 'pms_night_audit_cash_sessions';
const SETTLEMENT_PAYMENTS_KEY = 'pms_settlement_payments';
const CASH_CURRENCIES = ['PHP', 'USD', 'KRW'];
const CASH_CURRENCY_LABELS = { PHP: '페소', USD: '달러', KRW: '원화' };

function todayIso() {
    return window.PmsDate?.todayIso ? window.PmsDate.todayIso() : new Date().toISOString().slice(0, 10);
}

function storageJson(key, fallback) {
    try {
        const parsed = JSON.parse(localStorage.getItem(key) || '');
        return parsed ?? fallback;
    } catch(e) {
        return fallback;
    }
}

function cashSessions() {
    const sessions = storageJson(CASH_SESSION_KEY, []);
    return Array.isArray(sessions) ? sessions : [];
}

function settlementPayments() {
    const payments = storageJson(SETTLEMENT_PAYMENTS_KEY, []);
    return Array.isArray(payments) ? payments : [];
}

function setStorageJson(key, value) {
    localStorage.setItem(key, JSON.stringify(value));
}

function sampleAuditDateTime(date, time) {
    return `${date}T${time}:00+09:00`;
}

function subtractCurrencyValues(total = {}, part = {}) {
    const totals = currencyValues(total);
    const parts = currencyValues(part);
    return CASH_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = Math.max(0, totals[currency] - parts[currency]);
        return acc;
    }, {});
}

function addCurrencyValues(...items) {
    return CASH_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = items.reduce((sum, item) => sum + Number(item?.[currency] || 0), 0);
        return acc;
    }, {});
}

function expectedCurrencyValues(opening = {}, received = {}, withdrawal = {}) {
    return CASH_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = Math.max(0, Number(opening?.[currency] || 0) + Number(received?.[currency] || 0) - Number(withdrawal?.[currency] || 0));
        return acc;
    }, {});
}

function diffCurrencyValues(actual = {}, expected = {}) {
    return CASH_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = Number(actual?.[currency] || 0) - Number(expected?.[currency] || 0);
        return acc;
    }, {});
}

function sampleCloseLogSession(date) {
    const closing = { PHP: 84200, USD: 260, KRW: 650000 };
    const carryover = { PHP: 35000, USD: 200, KRW: 300000 };
    return {
        id: `SAMPLE-CASH-${date}`,
        businessDate: date,
        opening: { PHP: 30000, USD: 200, KRW: 500000 },
        openingPhpEquivalent: 41200,
        openingNote: 'Start of current business day. Float prepared for front desk.',
        openedAt: sampleAuditDateTime(date, '08:00'),
        openedBy: 'Nguyen Kim',
        withdrawals: [{
            id: `SAMPLE-WD-${date}-1`,
            currency: 'PHP',
            amount: 7000,
            phpEquivalent: 7000,
            receiver: 'GM / emergency guest refund',
            createdAt: sampleAuditDateTime(date, '17:45'),
            operator: 'Nguyen Kim'
        }],
        closing,
        carryover,
        takeaway: subtractCurrencyValues(closing, carryover),
        closingPhpEquivalent: 102700,
        closingNote: 'Sample close: cash receipts reconciled against folio payments.',
        closedAt: sampleAuditDateTime(date, '23:45'),
        closedBy: 'Nguyen Kim',
        sampleData: true
    };
}

function sampleCloseLogPayments(date) {
    const ymd = date.replaceAll('-', '').slice(2);
    return [
        [`FOL-${ymd}-0801`, 'Yamamoto K.', 'payment', 37100, 'PHP', 37100, 'cash', '체크아웃 객실 정산', '09:20', 'Nguyen Kim'],
        [`FOL-${ymd}-ANC`, 'Samsung Tech Conference 2026', 'payment', 19700, 'USD', 350, 'cash', '렌터카 및 골프 패키지 수납', '14:25', 'Tran Linh'],
        [`DEP-${ymd}-1203`, 'Wong Li', 'deposit', 11700, 'KRW', 292000, 'cash', '추가 숙박 예치금 수납', '18:40', 'Nguyen Kim']
    ].map((row, index) => ({
        id: `SAMPLE-PAY-${date}-${index + 1}`,
        folioId: row[0],
        guest: row[1],
        kind: row[2],
        appliedPhpAmount: row[3],
        receivedCurrency: row[4],
        receivedAmount: row[5],
        method: row[6],
        methodLabel: row[6] === 'cash' ? 'Cash' : row[6],
        note: row[7],
        createdAt: sampleAuditDateTime(date, row[8]),
        operator: row[9],
        businessDate: date,
        sampleData: true
    }));
}

function ensureCloseLogSampleData() {
    const date = todayIso();
    const sessions = cashSessions();
    if (!sessions.some(item => item.businessDate === date)) {
        sessions.push(sampleCloseLogSession(date));
        setStorageJson(CASH_SESSION_KEY, sessions);
    }
    const payments = settlementPayments();
    if (!payments.some(item => item.businessDate === date)) {
        payments.push(...sampleCloseLogPayments(date));
        setStorageJson(SETTLEMENT_PAYMENTS_KEY, payments);
    }
}

function logDateValue() {
    const input = document.getElementById('logDateInput');
    if (input && !input.value) input.value = todayIso();
    return input?.value || todayIso();
}

function addDaysToIsoDate(dateText, days) {
    const [year, month, day] = String(dateText || todayIso()).split('-').map(Number);
    const date = new Date(year, month - 1, day);
    date.setDate(date.getDate() + days);
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function setLogDate(dateText) {
    const input = document.getElementById('logDateInput');
    if (input) input.value = dateText || todayIso();
    renderCloseLog();
}

function shiftLogDate(days) {
    setLogDate(addDaysToIsoDate(logDateValue(), days));
}

function cashCurrencyLabel(currency) {
    return (window.currentLang || localStorage.getItem('pms_lang')) === 'en' ? currency : (CASH_CURRENCY_LABELS[currency] || currency);
}

function moneyPhp(value) {
    return typeof window.pmsFormatCurrency === 'function'
        ? window.pmsFormatCurrency(value)
        : '₱' + Number(value || 0).toLocaleString();
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, char => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[char]));
}

function formatAuditTime(value) {
    const date = value ? new Date(value) : null;
    if (!date || Number.isNaN(date.getTime())) return '-';
    return new Intl.DateTimeFormat('ko-KR', { month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).format(date);
}

function currencyValues(values = {}) {
    return CASH_CURRENCIES.reduce((acc, currency) => {
        acc[currency] = Math.max(0, Number(values?.[currency] || 0));
        return acc;
    }, {});
}

function formatCurrencyBreakdown(values = {}) {
    return CASH_CURRENCIES
        .map(currency => `${cashCurrencyLabel(currency)} ${Number(values?.[currency] || 0).toLocaleString()}`)
        .join(' · ');
}

function withdrawalBreakdownForRecord(item = {}) {
    if (item.currencyBreakdown && typeof item.currencyBreakdown === 'object') {
        return currencyValues(item.currencyBreakdown);
    }
    const currency = CASH_CURRENCIES.includes(item.currency) ? item.currency : 'PHP';
    return CASH_CURRENCIES.reduce((acc, key) => {
        acc[key] = key === currency ? Number(item.amount || 0) : 0;
        return acc;
    }, { PHP: 0, USD: 0, KRW: 0 });
}

function currencyTotals(records, fieldCurrency = 'receivedCurrency', fieldAmount = 'receivedAmount') {
    return records.reduce((acc, item) => {
        if (fieldCurrency === 'receivedCurrency' && item.receivedBreakdown && typeof item.receivedBreakdown === 'object') {
            CASH_CURRENCIES.forEach(currency => {
                acc[currency] = (acc[currency] || 0) + Number(item.receivedBreakdown[currency] || 0);
            });
            return acc;
        }
        const currency = CASH_CURRENCIES.includes(item[fieldCurrency]) ? item[fieldCurrency] : 'PHP';
        acc[currency] = (acc[currency] || 0) + Number(item[fieldAmount] || 0);
        return acc;
    }, { PHP: 0, USD: 0, KRW: 0 });
}

function renderCurrencyChips(values = {}, tone = '') {
    const cls = tone ? ` ${tone}` : '';
    return CASH_CURRENCIES.map(currency => `
        <span class="currency-chip${cls}">
            <span>${escapeHtml(cashCurrencyLabel(currency))}</span>
            <strong>${Number(values[currency] || 0).toLocaleString()}</strong>
        </span>
    `).join('');
}

function renderCurrencyChipGroup(label, values = {}, tone = '') {
    return `
        <span class="currency-chip-group">
            <span class="currency-chip-group-label">${escapeHtml(label)}</span>
            <span class="currency-chip-list">${renderCurrencyChips(values, tone)}</span>
        </span>
    `;
}

function cashUiText(ko, en) {
    return (window.currentLang || localStorage.getItem('pms_lang')) === 'en' ? en : ko;
}

function currencyStatusLabel(values = {}, emptyLabel = cashUiText('미등록', 'Not registered')) {
    const count = CASH_CURRENCIES.filter(currency => Number(values?.[currency] || 0) > 0).length;
    return count ? cashUiText(`${count}종 통화`, `${count} currenc${count > 1 ? 'ies' : 'y'}`) : emptyLabel;
}

function renderCashBalanceFormula({ opening = {}, settlement = {}, deposit = {}, withdrawal = {}, closing = null } = {}) {
    const expected = expectedCurrencyValues(opening, addCurrencyValues(settlement, deposit), withdrawal);
    const hasClosing = !!closing && CASH_CURRENCIES.some(currency => Number(closing?.[currency] || 0) > 0);
    const closingValues = currencyValues(closing || {});
    const diff = diffCurrencyValues(closingValues, expected);
    const hasDiff = CASH_CURRENCIES.some(currency => Number(diff[currency] || 0) !== 0);
    return `
        <span class="cash-balance-title"><i class="fa-solid fa-scale-balanced" style="color:var(--primary)"></i>${cashUiText('통화별 현금 대조', 'Cash by currency')}</span>
        <span class="cash-formula-token">${cashUiText('시작 시재', 'Opening')}</span>
        <span class="cash-formula-symbol">+</span>
        <span class="cash-formula-token">${cashUiText('정산금액', 'Settlements')}</span>
        <span class="cash-formula-symbol">+</span>
        <span class="cash-formula-token">${cashUiText('예치금', 'Deposits')}</span>
        <span class="cash-formula-symbol">-</span>
        <span class="cash-formula-token">${cashUiText('중간 출금', 'Withdrawals')}</span>
        <span class="cash-formula-symbol">=</span>
        <span class="cash-balance-chips">
            ${renderCurrencyChipGroup(cashUiText('예상 보유 통화', 'Expected on hand'), expected)}
            ${hasClosing ? renderCurrencyChipGroup(cashUiText('실제 보유 통화', 'Counted on hand'), closingValues, 'success') : ''}
            ${hasClosing ? renderCurrencyChipGroup(cashUiText(hasDiff ? '차이 확인' : '차이 없음', hasDiff ? 'Variance' : 'Matched'), diff, hasDiff ? 'warning' : 'success') : ''}
        </span>
    `;
}

function receivedBreakdownForPayment(item = {}) {
    if (item.receivedBreakdown && typeof item.receivedBreakdown === 'object') {
        return currencyValues(item.receivedBreakdown);
    }
    const currency = CASH_CURRENCIES.includes(item.receivedCurrency) ? item.receivedCurrency : 'PHP';
    return CASH_CURRENCIES.reduce((acc, key) => {
        acc[key] = key === currency ? Number(item.receivedAmount || 0) : 0;
        return acc;
    }, {});
}

function formatReceivedBreakdown(item = {}) {
    const breakdown = receivedBreakdownForPayment(item);
    const parts = CASH_CURRENCIES
        .filter(currency => Number(breakdown[currency] || 0) > 0)
        .map(currency => `${cashCurrencyLabel(currency)} ${Number(breakdown[currency]).toLocaleString()}`);
    return parts.length ? parts.join(' · ') : '-';
}

function paymentsForDate(date) {
    return settlementPayments().filter(item => item.businessDate === date);
}

function cashSessionForDate(date) {
    return cashSessions().find(item => item.businessDate === date) || null;
}

function dailyLogRows(date) {
    const session = cashSessionForDate(date);
    const payments = paymentsForDate(date);
    const rows = [];
    if (session?.openedAt || CASH_CURRENCIES.some(currency => Number(session?.opening?.[currency] || 0) > 0)) {
        rows.push({
            at: session.openedAt || `${date}T00:00:00+09:00`,
            type: '시재 인수',
            pill: 'deposit',
            target: '시작 시재',
            php: null,
            actual: CASH_CURRENCIES.map(currency => `${cashCurrencyLabel(currency)} ${Number(session.opening?.[currency] || 0).toLocaleString()}`).join(' · '),
            operator: session.openedBy || '-',
            note: session.openingNote || '-'
        });
    }
    payments.forEach(item => rows.push({
        at: item.createdAt || `${date}T12:00:00+09:00`,
        type: item.kind === 'deposit' ? '예치금' : '정산 결제',
        pill: item.kind === 'deposit' ? 'deposit' : 'payment',
        target: `${item.folioId || '-'} / ${item.guest || '-'}`,
        php: item.appliedPhpAmount || 0,
        actual: `${formatReceivedBreakdown(item)} · ${item.methodLabel || item.method || '-'}`,
        operator: item.operator || '-',
        note: item.note || '-'
    }));
    (session?.withdrawals || []).forEach(item => rows.push({
        at: item.createdAt || `${date}T13:00:00+09:00`,
        type: '중간 출금',
        pill: 'withdraw',
        target: item.receiver || '-',
        php: null,
        actual: formatCurrencyBreakdown(withdrawalBreakdownForRecord(item)),
        operator: item.operator || '-',
        note: item.receiver || '-'
    }));
    if (session?.closedAt || session?.closing) {
        rows.push({
            at: session.closedAt || `${date}T23:59:00+09:00`,
            type: '실제 정산 확인',
            pill: 'payment',
            target: '마감 시 보유 통화',
            php: null,
            actual: CASH_CURRENCIES.map(currency => `${cashCurrencyLabel(currency)} ${Number(session.closing?.[currency] || 0).toLocaleString()}`).join(' · '),
            operator: session.closedBy || '-',
            note: session.closingNote || '-'
        });
    }
    return rows.sort((a, b) => String(a.at || '').localeCompare(String(b.at || '')));
}

function renderCloseLog() {
    const date = logDateValue();
    const session = cashSessionForDate(date);
    const payments = paymentsForDate(date);
    const cashPayments = payments.filter(item => (item.method || 'cash') === 'cash');
    const settlementRecords = cashPayments.filter(item => item.kind !== 'deposit');
    const depositRecords = cashPayments.filter(item => item.kind === 'deposit');
    const withdrawals = session?.withdrawals || [];
    const rows = dailyLogRows(date);

    const settlementPhp = settlementRecords.reduce((sum, item) => sum + Number(item.appliedPhpAmount || 0), 0);
    const depositPhp = depositRecords.reduce((sum, item) => sum + Number(item.appliedPhpAmount || 0), 0);
    const withdrawCurrencies = withdrawals.reduce((acc, item) => {
        const breakdown = withdrawalBreakdownForRecord(item);
        CASH_CURRENCIES.forEach(currency => {
            acc[currency] = (acc[currency] || 0) + Number(breakdown[currency] || 0);
        });
        return acc;
    }, { PHP: 0, USD: 0, KRW: 0 });

    const set = (id, value) => { const el = document.getElementById(id); if (el) el.textContent = value; };
    const setHtml = (id, value) => { const el = document.getElementById(id); if (el) el.innerHTML = value; };
    set('logSelectedDate', date);
    set('logOpeningPhp', currencyStatusLabel(session?.opening));
    setHtml('logOpeningDetail', renderCurrencyChipGroup('보유 통화', currencyValues(session?.opening)));
    set('logPaymentPhp', moneyPhp(settlementPhp));
    setHtml('logPaymentDetail', renderCurrencyChipGroup('실제 수납 통화', currencyTotals(settlementRecords), 'success'));
    set('logDepositPhp', moneyPhp(depositPhp));
    setHtml('logDepositDetail', renderCurrencyChipGroup('예치금 통화', currencyTotals(depositRecords), 'success'));
    set('logWithdrawPhp', currencyStatusLabel(withdrawCurrencies, '출금 기록 없음'));
    setHtml('logWithdrawDetail', renderCurrencyChipGroup('출금 통화', withdrawCurrencies, 'warning'));
    set('logClosingPhp', currencyStatusLabel(session?.closing));
    setHtml('logClosingDetail', renderCurrencyChipGroup('실사 통화', currencyValues(session?.closing), 'success'));
    setHtml('logBalanceFormula', renderCashBalanceFormula({
        opening: currencyValues(session?.opening),
        settlement: currencyTotals(settlementRecords),
        deposit: currencyTotals(depositRecords),
        withdrawal: withdrawCurrencies,
        closing: session?.closing || null
    }));
    set('logLedgerCount', `${rows.length}건`);

    const body = document.getElementById('logLedgerBody');
    if (body) {
        body.innerHTML = rows.length ? rows.map(item => `
            <tr>
                <td>${escapeHtml(formatAuditTime(item.at))}</td>
                <td><span class="log-pill ${item.pill === 'deposit' ? 'deposit' : item.pill === 'withdraw' ? 'withdraw' : ''}">${escapeHtml(item.type)}</span></td>
                <td>${escapeHtml(item.target)}</td>
                <td>${item.php === null || item.php === undefined ? '-' : moneyPhp(item.php)}</td>
                <td data-no-currency-normalize="true">${escapeHtml(item.actual)}</td>
                <td>${escapeHtml(item.operator)}</td>
                <td>${escapeHtml(item.note || '-')}</td>
            </tr>
        `).join('') : `<tr><td colspan="7" class="log-empty">선택한 날짜의 시재 또는 정산 기록이 없습니다.</td></tr>`;
    }
}

document.addEventListener('DOMContentLoaded', () => {
    ensureCloseLogSampleData();
    setLogDate(todayIso());
});
</script>
