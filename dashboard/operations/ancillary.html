<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부가서비스 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/sidebar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <h1 data-i18n-key="Ancillary Svcs">부가서비스</h1>
    </header>

    <div class="content">
        <div class="kpi-grid kpi-grid-4">
            <a href="room-service.html" class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-utensils"></i></div></div>
                <div class="kpi-body"><div class="kpi-value">12</div><div class="kpi-label">룸서비스 오더</div></div></a>
            <a href="unified-pos.html" class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-cash-register"></i></div></div>
                <div class="kpi-body"><div class="kpi-value">8</div><div class="kpi-label">통합 POS 주문</div></div></a>
            <a href="golf.html" class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-golf-ball-tee"></i></div></div>
                <div class="kpi-body"><div class="kpi-value">5</div><div class="kpi-label">골프 예약</div></div></a>
            <a href="rentacar.html" class="kpi-card orange">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-car"></i></div></div>
                <div class="kpi-body"><div class="kpi-value">2</div><div class="kpi-label">렌터카 예약</div></div></a>
        </div>
        
        <div class="card">
            <div class="card-header">
                <div class="card-title"><i class="fa-solid fa-bell-concierge"></i> 부가서비스 통합 대시보드</div>
            </div>
            <div class="card-body">
                <p style="color:var(--txt2); font-size:0.9rem;">각 부가서비스 위젯을 클릭하여 상세 페이지로 이동하세요.</p>
            </div>
        </div>
    </div>
</div>

</body>
</html>
