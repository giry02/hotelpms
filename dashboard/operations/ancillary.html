<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>부가서비스 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/partner-vendors.js"></script>
    <style>
        .ancillary-page .content{padding-bottom:56px}
        .ancillary-kpis{grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:18px}
        .ancillary-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;padding:12px 18px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm);flex-wrap:wrap}
        .ancillary-search-group{display:flex;align-items:center;gap:8px;flex:0 1 430px;min-width:320px}
        .ancillary-search{display:flex;align-items:center;gap:8px;flex:1 1 auto;min-width:0;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
        .ancillary-search:focus-within{border-color:var(--primary)}
        .ancillary-search i{color:var(--txt3)}
        .ancillary-search input{border:0;outline:0;width:100%;font:inherit;font-size:.84rem;background:transparent}
        .ancillary-search-button{flex:0 0 auto;min-width:82px}
        .ancillary-toolbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-left:0}
        .service-filter-chip{height:38px;border:1px solid var(--border);background:#fff;border-radius:999px;padding:0 16px;font-size:.82rem;font-weight:850;color:var(--txt2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
        .service-filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .service-building{margin:20px 0 28px}
        .service-building-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-weight:950;font-size:1.08rem}
        .service-floor-head{display:flex;align-items:center;gap:8px;margin:12px 0 10px;font-weight:900}
        .service-room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
        .service-room-card{min-height:188px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);border:1px solid #dbe5f3;border-left:4px solid var(--primary);border-radius:12px;padding:12px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
        .service-room-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:#93c5fd}
        .service-room-card.inhouse{border-left-color:var(--success);background:linear-gradient(180deg,#fff 0%,#f0fdf4 100%)}
        .service-room-card.arrival{border-left-color:#f59e0b;background:linear-gradient(180deg,#fff 0%,#fff7ed 100%)}
        .service-room-card.empty{border-left-color:#94a3b8;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
        .service-room-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
        .service-room-no{font-size:1.22rem;font-weight:950;color:var(--txt)}
        .service-room-type{font-size:.72rem;color:var(--txt3);font-weight:850}
        .service-status{display:inline-flex;align-items:center;gap:4px;height:22px;border-radius:999px;padding:0 8px;font-size:.68rem;font-weight:950;white-space:nowrap}
        .service-status.inhouse{background:#dcfce7;color:#047857}
        .service-status.arrival{background:#fef3c7;color:#b45309}
        .service-status.empty{background:#f1f5f9;color:#64748b}
        .service-guest{margin-top:12px;font-weight:950;font-size:.86rem;line-height:1.25;min-height:34px}
        .service-guest small{display:block;color:var(--txt3);font-size:.7rem;font-weight:850;margin-top:2px}
        .service-group-pill{display:inline-flex;align-items:center;gap:4px;margin-top:6px;max-width:100%;padding:4px 7px;border-radius:999px;background:#eff6ff;color:#2563eb;font-size:.68rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .service-order-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
        .service-order-pill{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 7px;border-radius:8px;background:#fff;border:1px solid #e5edf7;font-size:.68rem;font-weight:900;color:var(--txt2)}
        .service-order-pill i.pos{color:#8b5cf6}.service-order-pill i.golf{color:#10b981}.service-order-pill i.rentacar{color:#f59e0b}
        .service-summary-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
        .service-summary-row{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:5px 7px;border-radius:8px;background:#fff;border:1px solid #e5edf7;font-size:.68rem;font-weight:900;color:var(--txt2)}
        .service-summary-row.total{background:#eff6ff;border-color:#bfdbfe;color:#1d4ed8}
        .service-summary-row i.pos{color:#8b5cf6}.service-summary-row i.golf{color:#10b981}.service-summary-row i.rentacar{color:#f59e0b}.service-summary-row i.total{color:#2563eb}
        .service-empty{margin-top:12px;padding:9px;border:1px dashed #cbd5e1;border-radius:8px;color:var(--txt3);font-size:.72rem;font-weight:850;text-align:center}
        .service-empty-state{min-height:230px;display:flex;align-items:center;justify-content:center;padding:34px;border:1px dashed #cbd5e1;border-radius:14px;background:#fff;color:var(--txt2);text-align:center}
        .service-empty-state-icon{width:48px;height:48px;margin:0 auto 14px;border-radius:14px;display:flex;align-items:center;justify-content:center;background:#eff6ff;color:var(--primary);font-size:1.2rem}
        .service-empty-state-title{font-size:.96rem;font-weight:950;color:var(--txt);margin-bottom:6px}
        .service-empty-state-desc{font-size:.8rem;font-weight:750;line-height:1.55;color:var(--txt3)}
        .service-card-total{margin-top:10px;font-weight:950;font-size:.82rem;color:var(--txt)}
        .service-modal{width:min(980px,calc(100vw - 24px));max-height:88vh;overflow:auto}
        .service-modal-grid{display:block}
        .service-detail-modal{width:min(1120px,calc(100vw - 24px));max-height:calc(100vh - 48px);overflow:hidden;display:flex;flex-direction:column}
        #serviceDetailModal .modal-header{flex:0 0 auto}
        #serviceDetailModal .modal-body{flex:1 1 auto;min-height:0;overflow-y:auto;padding-bottom:18px}
        #serviceDetailModal .modal-footer{position:static;flex:0 0 auto}
        .detail-summary-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0 14px;align-items:stretch}
        .service-detail-list{display:flex;flex-direction:column;gap:10px}
        .service-detail-row{display:grid;grid-template-columns:1.25fr .9fr .7fr auto;gap:12px;align-items:center;padding:12px;border:1px solid var(--border);border-radius:12px;background:#fff}
        .service-detail-main{display:flex;align-items:flex-start;gap:10px;min-width:0}
        .service-detail-icon{width:34px;height:34px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:#eff6ff;color:var(--primary);flex:0 0 auto}
        .service-detail-icon.pos,.register-existing-icon.pos{background:#f5f3ff;color:#8b5cf6}
        .service-detail-icon.golf,.register-existing-icon.golf{background:#dcfce7;color:#10b981}
        .service-detail-icon.rentacar,.register-existing-icon.rentacar{background:#fff7ed;color:#f59e0b}
        .service-detail-title{font-size:.88rem;font-weight:950;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .service-detail-meta{margin-top:3px;font-size:.72rem;font-weight:800;color:var(--txt3);line-height:1.45}
        .service-detail-money{font-size:.9rem;font-weight:950;color:var(--txt);text-align:right}
        .service-detail-actions{display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-wrap:wrap}
        .service-action-btn{height:32px;min-height:32px;padding:0 10px;border-radius:8px;border:1px solid var(--border);background:#fff;color:var(--txt2);font-family:var(--font);font-size:.72rem;font-weight:900;line-height:1;display:inline-flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;cursor:pointer;transition:background .15s,border-color .15s,color .15s,box-shadow .15s}
        .service-action-btn i{width:14px;font-size:.78rem;line-height:1;display:inline-flex;align-items:center;justify-content:center}
        .service-action-btn.voucher{border-color:#dbe4ef;background:#fff;color:var(--txt2)}
        .service-action-btn.voucher:hover{border-color:#bfdbfe;background:#eff6ff;color:var(--primary);box-shadow:0 2px 8px rgba(59,130,246,.12)}
        .service-action-btn.accept{background:var(--primary);border-color:var(--primary);color:#fff}
        .service-action-btn.accept:hover{background:var(--primary-dk);border-color:var(--primary-dk);box-shadow:0 3px 10px rgba(59,130,246,.18)}
        .service-action-btn.complete{background:var(--success);border-color:var(--success);color:#fff}
        .service-action-btn.complete:hover{filter:brightness(.96);box-shadow:0 3px 10px rgba(16,185,129,.18)}
        .service-status-pill{display:inline-flex;align-items:center;gap:5px;height:24px;padding:0 9px;border-radius:999px;font-size:.7rem;font-weight:950;white-space:nowrap}
        .service-status-pill.new{background:#fef3c7;color:#b45309}
        .service-status-pill.accepted{background:#dbeafe;color:#2563eb}
        .service-status-pill.completed{background:#dcfce7;color:#047857}
        .service-status-pill.cancelled{background:#fee2e2;color:#dc2626}
        .detail-empty{padding:28px;text-align:center;color:var(--txt3);font-size:.82rem;font-weight:850;background:#f8fafc;border:1px dashed #cbd5e1;border-radius:12px}
        .modal-section{border:1px solid var(--border);border-radius:12px;background:#fff;overflow:hidden}
        .modal-section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);background:#f8fafc;font-weight:950}
        .modal-section-body{padding:14px}
        .service-register-section{margin-top:14px;scroll-margin-top:14px}
        .service-register-section.is-hidden{display:none}
        .modal-room-box{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:2px}
        .info-tile{min-width:0;min-height:62px;padding:10px;border:1px solid var(--border);border-radius:10px;background:#f8fafc;display:flex;flex-direction:column;justify-content:center}
        .detail-summary-grid .info-tile{background:#fff;min-height:66px;padding:10px 12px}
        .detail-summary-grid .info-tile.total-summary{background:#eff6ff;border-color:#93c5fd;box-shadow:inset 3px 0 0 var(--primary)}
        .detail-summary-grid .info-tile span{display:flex;align-items:center;gap:8px;color:var(--txt2);font-size:.74rem;font-weight:900;margin-bottom:5px}
        .detail-summary-grid .info-tile span i{width:26px;height:26px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;flex:0 0 26px;font-size:.76rem;background:#eff6ff;color:var(--primary)}
        .detail-summary-grid .info-tile strong{display:block;padding-left:34px;font-size:1rem;font-weight:950;line-height:1.1;color:var(--txt)}
        .detail-summary-grid .info-tile.total-summary span{color:var(--primary)}
        .detail-summary-grid .info-tile.total-summary strong{font-size:1.05rem;color:var(--primary)}
        .detail-summary-grid .info-tile span i.pos,.register-preview-title i.pos{background:#f5f3ff;color:#8b5cf6}
        .detail-summary-grid .info-tile span i.golf,.register-preview-title i.golf{background:#dcfce7;color:#10b981}
        .detail-summary-grid .info-tile span i.rentacar,.register-preview-title i.rentacar{background:#fff7ed;color:#f59e0b}
        .detail-summary-grid .info-tile span i.total{background:#dbeafe;color:#2563eb}
        .info-tile span{display:block;font-size:.68rem;font-weight:900;color:var(--txt3);margin-bottom:4px}
        .info-tile strong{font-size:.9rem;line-height:1.25;word-break:keep-all}
        .service-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .service-tab{height:40px;border:1px solid var(--border);border-radius:10px;background:#fff;font-weight:950;color:var(--txt2);cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:7px;line-height:1}
        .service-tab i{width:15px;font-size:.82rem;line-height:1;display:inline-flex;align-items:center;justify-content:center}
        .service-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .service-tab.is-hidden{display:none}
        .modal-field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .modal-field-grid .is-hidden{display:none}
        .form-label{display:block;font-size:.75rem;font-weight:900;color:var(--txt2);margin-bottom:6px}
        .form-input{height:38px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 10px;font:inherit;width:100%}
        textarea.form-input{height:74px;padding:10px;resize:vertical}
        .service-variable-fields{display:none;margin-top:10px;border:1px solid #dbeafe;border-radius:12px;background:#f8fbff;padding:12px}
        .service-variable-fields.active{display:block}
        .service-variable-title{display:flex;align-items:center;gap:7px;font-size:.78rem;font-weight:950;color:var(--txt);margin-bottom:10px}
        .service-variable-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
        .service-price-panel{margin-top:10px;border:1px solid var(--border);border-radius:12px;background:#fff;padding:12px}
        .service-price-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;align-items:end}
        .service-total-preview{height:38px;border-radius:8px;background:#eff6ff;color:var(--primary);font-weight:950;display:flex;align-items:center;padding:0 10px}
        .service-price-note{margin-top:7px;font-size:.7rem;font-weight:800;color:var(--txt3);line-height:1.45}
        .service-register-action{margin-top:12px;display:flex;justify-content:flex-end}
        .service-register-action .btn-primary-sm{height:42px;min-width:150px;font-size:.86rem}
        .group-bulk-box{margin-top:12px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:12px;padding:11px 12px}
        .group-bulk-box.is-hidden{display:none}
        .group-bulk-title{display:flex;align-items:center;gap:8px;font-weight:950;cursor:pointer}
        .group-bulk-title input{width:16px;height:16px;margin:0;accent-color:var(--primary)}
        .group-bulk-desc{font-size:.72rem;color:var(--txt2);font-weight:850;margin-top:5px;line-height:1.45}
        .group-bulk-body{margin-top:10px}
        .group-bulk-body.is-hidden{display:none}
        .group-bulk-summary{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:10px;padding:9px 10px;border:1px solid #dbeafe;border-radius:10px;background:#fff;font-size:.76rem;font-weight:900;color:var(--txt2)}
        .group-bulk-summary strong{color:var(--primary);font-size:.82rem}
        .group-room-checks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:7px;margin-top:10px;max-height:170px;overflow:auto}
        .group-room-option{display:flex;align-items:flex-start;gap:8px;padding:8px 9px;border-radius:10px;background:#fff;border:1px solid #dbeafe;font-size:.76rem;font-weight:850;cursor:pointer}
        .group-room-option:has(input:checked){border-color:#60a5fa;background:#f8fbff;box-shadow:inset 3px 0 0 var(--primary)}
        .group-room-option input{margin-top:2px}
        .group-room-option strong{display:block;color:var(--txt);font-size:.8rem;line-height:1.25}
        .group-room-option small{display:block;color:var(--txt3);font-size:.68rem;font-weight:850;margin-top:2px;line-height:1.25}
        .group-room-option .current-room-badge{display:inline-flex;margin-left:4px;padding:1px 5px;border-radius:999px;background:#dbeafe;color:#2563eb;font-size:.62rem;font-weight:950;vertical-align:middle}
        .register-side-body{display:flex;flex-direction:column;gap:12px}
        .register-preview-card{border:1px solid var(--border);border-radius:12px;background:#f8fafc;padding:12px}
        .register-preview-card.primary{background:#eff6ff;border-color:#bfdbfe}
        .register-preview-title{display:flex;align-items:center;justify-content:space-between;gap:10px;font-weight:950;color:var(--txt);margin-bottom:8px}
        .register-preview-title i{color:var(--primary)}
        .register-preview-row{display:flex;justify-content:space-between;gap:12px;padding:6px 0;border-top:1px dashed #dbe4ef;font-size:.82rem;font-weight:850;color:var(--txt2)}
        .register-preview-row:first-of-type{border-top:0}
        .register-preview-row strong{color:var(--txt);white-space:nowrap}
        .register-existing-list{display:flex;flex-direction:column;gap:8px;max-height:330px;overflow:auto;padding-right:2px}
        .register-existing-row{display:grid;grid-template-columns:auto 1fr auto;gap:9px;align-items:center;padding:10px;border:1px solid var(--border);border-radius:10px;background:#fff}
        .register-existing-icon{width:30px;height:30px;border-radius:9px;background:#eef5ff;color:var(--primary);display:flex;align-items:center;justify-content:center}
        .register-existing-title{font-size:.82rem;font-weight:950;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .register-existing-meta{font-size:.68rem;font-weight:850;color:var(--txt3);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .register-existing-money{font-size:.86rem;font-weight:950;color:var(--txt)}
        .service-voucher-preview{background:#f8fafc;border:1px solid var(--border);border-radius:12px;padding:14px}
        .voucher-sheet{max-width:560px;margin:0 auto;background:#fff;border:1px solid #d1d5db;border-radius:14px;overflow:hidden}
        .voucher-brand{display:flex;justify-content:space-between;gap:14px;align-items:center;padding:16px 18px;border-bottom:1px solid #e5e7eb}
        .voucher-logo{min-width:82px;min-height:44px;border:1px solid #e5e7eb;border-radius:10px;background:#f9fafb;display:flex;align-items:center;justify-content:center;overflow:hidden}
        .voucher-logo img{max-width:96px;max-height:44px;object-fit:contain}
        .voucher-logo-mark{width:34px;height:34px;border-radius:10px;background:#2563eb;color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:16px}
        .voucher-heading{margin:0;font-size:1.05rem;text-align:right;color:#111827;line-height:1.25}
        .voucher-sub{margin-top:5px;font-size:.75rem;color:#6b7280;text-align:right;font-weight:800}
        .voucher-body{padding:12px 18px}
        .voucher-row{display:flex;justify-content:space-between;gap:14px;border-top:1px solid #eef2f7;padding:8px 0;font-size:.82rem}
        .voucher-row:first-child{border-top:0}
        .voucher-row strong{display:block;color:#6b7280;white-space:nowrap}
        .voucher-row span{display:block;text-align:right;font-weight:850;color:#111827;line-height:1.4;word-break:keep-all;overflow-wrap:anywhere}
        .voucher-stub{border-top:1px dashed #9ca3af;background:#f9fafb;padding:12px 18px}
        .voucher-stub-title{font-size:.82rem;font-weight:900;margin-bottom:8px;color:#111827}
        .voucher-stub-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;font-size:.78rem;color:#374151}
        .voucher-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
        .voucher-fields label{display:flex;align-items:center;gap:7px;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:.75rem;font-weight:850}
        .voucher-preview{margin-top:10px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:.75rem;line-height:1.7;color:var(--txt2)}
        .service-voucher-modal{width:min(720px,calc(100vw - 32px));max-height:min(760px,calc(100vh - 72px));overflow:hidden}
        #serviceVoucherModal{z-index:900;align-items:center;justify-content:center;padding:24px}
        #serviceVoucherModal .modal-body{overflow-y:auto;background:#f8fafc;display:block;padding:14px;max-height:calc(100vh - 210px)}
        #serviceVoucherModal,
        #serviceVoucherModal *{font-family:var(--font)}
        .voucher-print-wrap{width:100%;background:transparent;border:0;border-radius:0;display:flex;flex-direction:column;gap:12px}
        .voucher-batch-note{border:1px solid #bfdbfe;background:#eff6ff;color:#1d4ed8;border-radius:10px;padding:10px 12px;font-size:.78rem;font-weight:850;line-height:1.45}
        .voucher-batch-list{display:flex;flex-direction:column;gap:10px}
        .voucher-list-group{border:1px solid var(--border);border-radius:12px;background:#fff;overflow:hidden}
        .voucher-list-head{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:10px 12px;background:#f8fafc;border-bottom:1px solid var(--border);font-size:.78rem;font-weight:950;color:var(--txt)}
        .voucher-list-head span{display:inline-flex;align-items:center;gap:7px;min-width:0}

                by: 'Nguyen Kim',
                from: baseUnitPrice,
                to: unitPrice,
                reason: commonMemo || '현장 적용 단가 조정'
            }] : [],
            voucherFields: Array.isArray(vendor?.voucherFields) ? [...vendor.voucherFields] : [],
            status: 'new'
        };
    });
    serviceOrders = [...created, ...serviceOrders];
    persistOrders();
    renderAncillaryBoard();
    if (window.showToast) window.showToast(`${meta.label} ${created.length}건이 등록되었습니다.`, 'success');
    if (created.length) openServiceDetailModal(roomsToSave[0].id || roomsToSave[0].roomId || roomNo(roomsToSave[0]), { showRegistration: true, serviceType: selectedService });
}
function openOrderVoucherModal(orderId) {
    const order = serviceOrders.find(item => item.id === orderId);
    if (!order || order.service === 'pos') return;
    const fields = voucherFieldsForOrder(order);
    if (!fields.length) return window.showAlert?.('업체/항목 관리에서 바우처 출력 항목을 먼저 설정해 주세요.', { type: 'warning' });
    const orders = voucherBatchOrdersFor(order);
    selectedVoucherOrderId = orderId;
    selectedVoucherOrderIds = orders.map(item => item.id);
    const body = document.getElementById('serviceVoucherPrintBody');
    if (body) body.innerHTML = renderVoucherBatch(orders);
    const printLabel = document.getElementById('serviceVoucherPrintLabel');
    if (printLabel) printLabel.textContent = orders.length > 1 ? `전체 ${orders.length}건 출력` : '인쇄하기';
    const modal = document.getElementById('serviceVoucherModal');
    modal.style.display = 'flex';
    modal.classList.add('active');
    document.body.classList.add('service-voucher-preview-open');
}
function closeOrderVoucherModal() {
    selectedVoucherOrderId = '';
    selectedVoucherOrderIds = [];
    const modal = document.getElementById('serviceVoucherModal');
    modal.classList.remove('active');
    modal.style.display = 'none';
    document.body.classList.remove('service-voucher-preview-open');
}
function cleanupServiceVoucherPrint() {
    if (serviceVoucherPrintCleanupTimer) {
        clearTimeout(serviceVoucherPrintCleanupTimer);
        serviceVoucherPrintCleanupTimer = null;
    }
    window.removeEventListener('afterprint', cleanupServiceVoucherPrint);
    document.body.classList.remove('printing-service-voucher');
    document.body.classList.remove('service-voucher-preview-open');
}
function buildServiceVoucherPrintDocument(orders) {
    const sheets = orders.map(renderVoucherSheet).join('');
    const isSinglePrint = orders.length === 1;
    const singleClass = isSinglePrint ? ' is-single-print' : '';
    const pageRule = isSinglePrint ? '@page{size:90mm 140mm;margin:0}' : '@page{size:A4 portrait;margin:10mm}';
    const printPageBase = isSinglePrint
        ? '.service-voucher-print-page{width:90mm;margin:0 auto;padding:4mm}'
        : '.service-voucher-print-page{width:190mm;margin:0 auto;padding:0}';
    const screenPageBase = isSinglePrint
        ? 'body{background:#e5e7eb;padding:16px}.service-voucher-print-page{background:#fff;width:90mm;padding:4mm;box-shadow:0 8px 24px rgba(15,23,42,.18)}'
        : 'body{background:#e5e7eb;padding:16px}.service-voucher-print-page{background:#fff;min-height:277mm;padding:10mm;box-shadow:0 8px 24px rgba(15,23,42,.18)}';
    const printPageMedia = isSinglePrint
        ? 'html,body{width:90mm;min-height:140mm;background:#fff}.service-voucher-print-page{width:90mm;padding:4mm;box-shadow:none}'
        : 'html,body{width:210mm;min-height:297mm;background:#fff}.service-voucher-print-page{width:190mm;padding:0;box-shadow:none}';
    return `<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>바우처 출력</title>
<style>
    ${pageRule}
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#fff;color:#111827;font-family:Arial,'Noto Sans KR','Malgun Gothic',sans-serif}
    body{print-color-adjust:exact;-webkit-print-color-adjust:exact}
    ${printPageBase}
    .voucher-print-sheets{display:grid;grid-template-columns:repeat(2,82mm);gap:5mm 6mm;align-items:start;justify-content:center}
    .voucher-print-sheets.is-single-print{grid-template-columns:82mm;justify-content:center}
    .voucher-sheet{width:82mm;max-width:82mm;margin:0;background:#fff;border:1px solid #cbd5e1;border-radius:3mm;overflow:hidden;break-inside:avoid;page-break-inside:avoid}
    .voucher-brand{display:grid;grid-template-columns:18mm minmax(0,1fr);gap:3mm;align-items:center;padding:4mm;border-bottom:1px solid #e5e7eb}
    .voucher-logo{width:18mm;height:11mm;border:1px solid #dbe3ef;border-radius:2mm;background:#f8fafc;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .voucher-logo img{max-width:17mm;max-height:10mm;object-fit:contain}
    .voucher-logo-mark{width:100%;height:100%;display:flex;align-items:center;justify-content:center;color:#64748b;font-size:7px;font-weight:900}
    .voucher-logo-mark i{display:none}
    .voucher-logo-mark::after{content:"HOTEL PMS"}
    .voucher-heading{margin:0;color:#111827;font-size:12px;line-height:1.18;font-weight:900;text-align:right;word-break:keep-all}
    .voucher-sub{margin-top:1mm;color:#64748b;font-size:7.5px;line-height:1.25;font-weight:800;text-align:right;word-break:keep-all;overflow-wrap:anywhere}
    .voucher-body{padding:3mm 4mm}
    .voucher-row{display:grid;grid-template-columns:25mm minmax(0,1fr);gap:2mm;align-items:start;border-top:1px solid #e5e7eb;padding:1.6mm 0;font-size:8px;line-height:1.3}
    .voucher-row:first-child{border-top:0}
    .voucher-row strong{color:#64748b;font-weight:800;white-space:nowrap}
    .voucher-row span{color:#111827;font-weight:900;text-align:right;word-break:keep-all;overflow-wrap:anywhere}
    .voucher-stub{border-top:1px dashed #94a3b8;background:#f8fafc;padding:3mm 4mm}
    .voucher-stub-title{margin:0 0 2mm;color:#111827;font-size:8px;font-weight:900}
    .voucher-stub-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.5mm 3mm;color:#374151;font-size:7.5px;line-height:1.35}
    .voucher-stub-grid strong{font-weight:900;color:#111827}
    @media screen{
        ${screenPageBase}
    }
    @media print{
        ${printPageMedia}
    }
</style>
</head>
<body>
    <main class="service-voucher-print-page">
        <div class="voucher-print-sheets${singleClass}">${sheets}</div>
    </main>
<script>
    window.addEventListener('load', function () {
        setTimeout(function () {
            window.focus();
            window.print();
        }, 120);
    });
<\/script>
</body>
</html>`;
}
function printServiceVoucher(orderId = '') {
    const ids = orderId ? [orderId] : (selectedVoucherOrderIds.length ? selectedVoucherOrderIds : [selectedVoucherOrderId]);
    const orders = ids.map(id => serviceOrders.find(item => item.id === id)).filter(order => order && order.service !== 'pos');
    if (!orders.length) return;
    const printWindow = window.open('', '_blank', 'width=900,height=700');
    if (!printWindow) {
        if (typeof showToast === 'function') showToast('브라우저 팝업 차단을 해제한 뒤 다시 출력해주세요.', 'error');
        return;
    }
    printWindow.document.open();
    printWindow.document.write(buildServiceVoucherPrintDocument(orders));
    printWindow.document.close();
}
function printOrderVoucher(orderId) {
    openOrderVoucherModal(orderId);
}

    ]);

</body>
