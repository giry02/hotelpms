<html lang="ko">
<head>

    <title>부가서비스 - Hotel PMS</title>

    <style>
        .ancillary-page .content{padding-bottom:56px}
        .ancillary-kpis{grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:18px}
        .ancillary-toolbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:18px;padding:12px 18px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow-sm)}
        .ancillary-search{display:flex;align-items:center;gap:8px;width:320px;height:38px;padding:0 12px;border:1.5px solid var(--border);border-radius:9px;background:#fff}
        .ancillary-search:focus-within{border-color:var(--primary)}
        .ancillary-search i{color:var(--txt3)}
        .ancillary-search input{border:0;outline:0;width:100%;font:inherit;font-size:.84rem;background:transparent}
        .ancillary-toolbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .service-filter-chip{height:38px;border:1px solid var(--border);background:#fff;border-radius:999px;padding:0 16px;font-size:.82rem;font-weight:850;color:var(--txt2);cursor:pointer}
        .service-filter-chip.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .service-building{margin:20px 0 28px}
        .service-building-head{display:flex;align-items:center;gap:10px;margin-bottom:8px;font-weight:950;font-size:1.08rem}
        .service-floor-head{display:flex;align-items:center;gap:8px;margin:12px 0 10px;font-weight:900}
        .service-room-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px}
        .service-room-card{min-height:188px;background:linear-gradient(180deg,#fff 0%,#f8fbff 100%);border:1px solid #dbe5f3;border-left:4px solid var(--primary);border-radius:12px;padding:12px;box-shadow:var(--shadow-sm);cursor:pointer;transition:transform .12s ease,box-shadow .12s ease,border-color .12s ease}
        .service-room-card:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);border-color:#93c5fd}
        .service-room-card.inhouse{border-left-color:var(--success);background:linear-gradient(180deg,#fff 0%,#f0fdf4 100%)}
        .service-room-card.arrival{border-left-color:#f59e0b;background:linear-gradient(180deg,#fff 0%,#fff7ed 100%)}
        .service-room-card.empty{border-left-color:#94a3b8;background:linear-gradient(180deg,#fff 0%,#f8fafc 100%)}
        .service-room-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
        .service-room-no{font-size:1.22rem;font-weight:950;color:var(--txt)}
        .service-room-type{font-size:.72rem;color:var(--txt3);font-weight:850}
        .service-status{display:inline-flex;align-items:center;gap:4px;height:22px;border-radius:999px;padding:0 8px;font-size:.68rem;font-weight:950;white-space:nowrap}
        .service-status.inhouse{background:#dcfce7;color:#047857}
        .service-status.arrival{background:#fef3c7;color:#b45309}
        .service-status.empty{background:#f1f5f9;color:#64748b}
        .service-guest{margin-top:12px;font-weight:950;font-size:.86rem;line-height:1.25;min-height:34px}
        .service-guest small{display:block;color:var(--txt3);font-size:.7rem;font-weight:850;margin-top:2px}
        .service-group-pill{display:inline-flex;align-items:center;gap:4px;margin-top:6px;max-width:100%;padding:4px 7px;border-radius:999px;background:#eff6ff;color:#2563eb;font-size:.68rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .service-order-list{display:flex;flex-direction:column;gap:5px;margin-top:10px}
        .service-order-pill{display:flex;align-items:center;justify-content:space-between;gap:6px;padding:5px 7px;border-radius:8px;background:#fff;border:1px solid #e5edf7;font-size:.68rem;font-weight:900;color:var(--txt2)}
        .service-order-pill i.pos{color:#8b5cf6}.service-order-pill i.golf{color:#10b981}.service-order-pill i.rentacar{color:#f59e0b}
        .service-empty{margin-top:12px;padding:9px;border:1px dashed #cbd5e1;border-radius:8px;color:var(--txt3);font-size:.72rem;font-weight:850;text-align:center}
        .service-card-total{margin-top:10px;font-weight:950;font-size:.82rem;color:var(--txt)}
        .service-modal{width:min(980px,calc(100vw - 24px));max-height:88vh;overflow:auto}
        .service-modal-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:16px}
        .modal-section{border:1px solid var(--border);border-radius:12px;background:#fff;overflow:hidden}
        .modal-section-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 14px;border-bottom:1px solid var(--border);background:#f8fafc;font-weight:950}
        .modal-section-body{padding:14px}
        .modal-room-box{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
        .info-tile{padding:10px;border:1px solid var(--border);border-radius:10px;background:#f8fafc}
        .info-tile span{display:block;font-size:.68rem;font-weight:900;color:var(--txt3);margin-bottom:4px}
        .info-tile strong{font-size:.9rem}
        .service-tabs{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
        .service-tab{height:40px;border:1px solid var(--border);border-radius:10px;background:#fff;font-weight:950;color:var(--txt2);cursor:pointer}
        .service-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .modal-field-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .form-label{display:block;font-size:.75rem;font-weight:900;color:var(--txt2);margin-bottom:6px}
        .form-input{height:38px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 10px;font:inherit;width:100%}
        textarea.form-input{height:74px;padding:10px;resize:vertical}
        .group-bulk-box{margin-top:12px;border:1px solid #bfdbfe;background:#eff6ff;border-radius:12px;padding:12px}
        .group-bulk-title{display:flex;align-items:center;gap:8px;font-weight:950}
        .group-room-checks{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:6px;margin-top:10px;max-height:120px;overflow:auto}
        .group-room-checks label{display:flex;align-items:center;gap:7px;padding:7px 8px;border-radius:8px;background:#fff;border:1px solid #dbeafe;font-size:.76rem;font-weight:850}
        .voucher-fields{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
        .voucher-fields label{display:flex;align-items:center;gap:7px;padding:7px 8px;border:1px solid var(--border);border-radius:8px;font-size:.75rem;font-weight:850}
        .voucher-preview{margin-top:10px;background:#f8fafc;border:1px solid var(--border);border-radius:10px;padding:10px;font-size:.75rem;line-height:1.7;color:var(--txt2)}
        .modal-footer{position:sticky;bottom:0;display:flex;justify-content:flex-end;gap:8px;padding:14px;background:#f8fafc;border-top:1px solid var(--border)}
        @media(max-width:1100px){.ancillary-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.service-modal-grid{grid-template-columns:1fr}}
        @media(max-width:768px){.ancillary-toolbar{flex-direction:column;align-items:stretch}.ancillary-search{width:auto}.modal-room-box,.modal-field-grid{grid-template-columns:1fr}.voucher-fields,.group-room-checks{grid-template-columns:1fr}}

</head>
<body>
<div class="main ancillary-page">
    <header class="topbar"><h1>부가서비스</h1></header>
    <main class="content">
        <div class="kpi-grid ancillary-kpis">
            <div class="kpi-card blue"><div class="kpi-icon"><i class="fa-solid fa-bed"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiInhouse">0</div><div class="kpi-label">투숙 객실</div></div></div>
            <div class="kpi-card purple"><div class="kpi-icon"><i class="fa-solid fa-cash-register"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiPos">0</div><div class="kpi-label">통합 POS</div></div></div>
            <div class="kpi-card green"><div class="kpi-icon"><i class="fa-solid fa-golf-ball-tee"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiGolf">0</div><div class="kpi-label">골프장</div></div></div>
            <div class="kpi-card orange"><div class="kpi-icon"><i class="fa-solid fa-car"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiRent">0</div><div class="kpi-label">렌터카</div></div></div>
            <div class="kpi-card teal"><div class="kpi-icon"><i class="fa-solid fa-coins"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiRevenue">₱0</div><div class="kpi-label">누적 이용금액</div></div></div>
        </div>

        <div class="ancillary-toolbar">
            <div class="ancillary-search">
                <i class="fa-solid fa-search"></i>
                <input id="ancillarySearch" type="text" placeholder="객실번호, 고객명, 단체명 검색..." oninput="renderAncillaryBoard()">
            </div>
            <div class="ancillary-toolbar-actions">
                <button class="service-filter-chip active" data-service="all" onclick="setServiceFilter('all')">전체</button>
                <button class="service-filter-chip" data-service="pos" onclick="setServiceFilter('pos')"><i class="fa-solid fa-cash-register"></i> 통합 POS</button>
                <button class="service-filter-chip" data-service="golf" onclick="setServiceFilter('golf')"><i class="fa-solid fa-golf-ball-tee"></i> 골프장</button>
                <button class="service-filter-chip" data-service="rentacar" onclick="setServiceFilter('rentacar')"><i class="fa-solid fa-car"></i> 렌터카</button>
                <button class="btn-outline" onclick="location.href='ancillary-vendors.html'"><i class="fa-solid fa-building"></i> 업체/항목 관리</button>
            </div>
        </div>

        <div id="ancillaryBoardContainer"></div>
    </main>
</div>

<div id="serviceModal" class="modal-overlay" style="display:none">
    <div class="modal-card service-modal">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-bell-concierge" style="color:var(--primary)"></i> 부가서비스 등록</h3>
            <button class="modal-close" onclick="closeServiceModal()">&times;</button>
        </div>
        <div class="modal-body">
            <div class="modal-room-box" id="modalRoomSummary"></div>
            <div class="service-modal-grid" style="margin-top:14px">
                <section class="modal-section">
                    <div class="modal-section-head"><span>서비스 선택</span><span id="modalSelectedRoom"></span></div>
                    <div class="modal-section-body">
                        <div class="service-tabs">
                            <button class="service-tab active" data-service="pos" onclick="selectServiceType('pos')"><i class="fa-solid fa-cash-register"></i> 통합 POS</button>
                            <button class="service-tab" data-service="golf" onclick="selectServiceType('golf')"><i class="fa-solid fa-golf-ball-tee"></i> 골프장</button>
                            <button class="service-tab" data-service="rentacar" onclick="selectServiceType('rentacar')"><i class="fa-solid fa-car"></i> 렌터카</button>
                        </div>
                        <div class="modal-field-grid">
                            <div><label class="form-label" id="vendorLabel">처리 부서/업체</label><select id="serviceVendor" class="form-input" onchange="renderServiceItems()"></select></div>
                            <div><label class="form-label">이용 항목</label><select id="serviceItem" class="form-input" onchange="renderVoucherPreview()"></select></div>
                            <div><label class="form-label">이용 일시</label><input id="serviceDateTime" class="form-input" type="datetime-local" onchange="renderVoucherPreview()"></div>
                            <div><label class="form-label">수량/인원</label><input id="serviceQty" class="form-input" type="number" min="1" value="1" onchange="renderVoucherPreview()"></div>
                        </div>
                        <div style="margin-top:10px"><label class="form-label">메모</label><textarea id="serviceMemo" class="form-input" placeholder="요청사항, 픽업 위치, 티타임 특이사항 등"></textarea></div>

                        <div class="group-bulk-box">
                            <label class="group-bulk-title"><input id="groupBulkToggle" type="checkbox" onchange="toggleGroupBulk()"> 단체 객실 일괄 등록</label>
                            <div style="font-size:.72rem;color:var(--txt2);font-weight:850;margin-top:5px">골프장/렌터카는 단체 선택 시 전체 객실이 기본 선택되며 필요한 객실만 해제할 수 있습니다.</div>
                            <div style="margin-top:10px"><label class="form-label">단체/행사</label><select id="groupSelect" class="form-input" onchange="onGroupSelectChange()"></select></div>
                            <div id="groupRoomCount" style="font-size:.72rem;color:var(--txt3);font-weight:900;margin-top:8px">0실</div>
                            <div id="groupRoomChecks" class="group-room-checks"></div>
                        </div>
                    </div>
                </section>

                <section class="modal-section">
                    <div class="modal-section-head">
                        <span>바우처 양식</span>
                        <button class="btn-outline" style="height:30px;padding:0 10px" onclick="printVoucher()"><i class="fa-solid fa-print"></i> 출력</button>
                    </div>
                    <div class="modal-section-body">
                        <div style="font-size:.75rem;color:var(--txt2);font-weight:850;margin-bottom:10px">업체별로 필요한 출력 항목을 업체/항목 관리에서 설정하고, 여기서 선택한 항목으로 티켓형 바우처를 출력합니다.</div>
                        <div id="voucherFields" class="voucher-fields"></div>
                        <div id="voucherPreview" class="voucher-preview"></div>
                    </div>
                </section>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeServiceModal()">닫기</button>
            <button class="btn-primary-sm" onclick="saveServiceOrder()"><i class="fa-solid fa-check"></i> 등록</button>
        </div>
    </div>
</div>

<script>
let rooms = [];
let reservations = [];
let groups = [];
let vendors = [];
let serviceOrders = [];
let selectedRoomId = '';
let selectedService = 'pos';
let serviceFilter = 'all';

const VENDOR_STORAGE = 'pms_ancillary_vendors';
const ORDER_STORAGE = 'pms_ancillary_room_orders';
const seedVendors = [
    { id:'POS-HOTEL', type:'pos', name:'호텔 통합 POS', contact:'F&B', commission:0, voucherFields:[], items:[{ name:'룸서비스 세트', price:8500, desc:'객실 주문' }, { name:'미니바 추가', price:1200, desc:'객실 미니바' }, { name:'영상 서비스', price:1800, desc:'영상/스트리밍' }] },
    { id:'GOLF-SUNVALLEY', type:'golf', name:'썬밸리 CC', contact:'Kim Manager', commission:15, voucherFields:['guest','room','date','people','teeTime','course','item','amount'], items:[{ name:'18홀 그린피', price:450, desc:'주중 18홀' }, { name:'카트 이용권', price:70, desc:'팀 단위 카트' }, { name:'클럽 대여', price:60, desc:'1인 기준' }] },
    { id:'GOLF-SKY72', type:'golf', name:'스카이72', contact:'Lee Manager', commission:12, voucherFields:['guest','room','date','people','teeTime','course','item','amount'], items:[{ name:'9홀 라운딩', price:180, desc:'오전 9홀' }, { name:'18홀 패키지', price:520, desc:'그린피+카트' }] },
    { id:'RENT-LOTTE', type:'rentacar', name:'롯데렌터카', contact:'Park Manager', commission:13, voucherFields:['guest','room','date','pickup','vehicle','item','amount'], items:[{ name:'세단 8시간', price:160, desc:'기사 미포함' }, { name:'공항 픽업', price:90, desc:'편도 픽업' }, { name:'전기차 24시간', price:230, desc:'완충 인도' }] },
    { id:'RENT-SK', type:'rentacar', name:'SK렌터카', contact:'Choi Manager', commission:14, voucherFields:['guest','room','date','pickup','vehicle','item','amount'], items:[{ name:'SUV 24시간', price:260, desc:'보험 포함' }, { name:'기사 포함 밴', price:320, desc:'8시간 기준' }] }
];
const voucherFieldLabels = {
    guest:'투숙객명', room:'객실번호', date:'이용일시', people:'인원', teeTime:'티오프', course:'골프장/업체명',
    pickup:'픽업 위치', vehicle:'차량/차종', item:'이용 항목', amount:'금액', memo:'메모'
};

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[ch]));
}
function amountValue(value) {
    if (value && typeof value === 'object') return Number(value.amount || value.value || 0);
    return Number(value || 0);
}
function money(value) {
    return `₱${Number(value || 0).toLocaleString('en')}`;
}
function todayDate() {
    const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    date.setHours(0, 0, 0, 0);
    return date;
}
function parseDate(value) {
    if (!value) return null;
    const date = new Date(String(value));
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}
function normalizeStatus(value) {
    return String(value || '').replace(/[-_\s]/g, '').toLowerCase();
}
function sameRoomValue(left, right) {
    const normalize = value => {
        const text = String(value || '').trim().toUpperCase();
        const tail = text.includes('-') ? text.split('-').pop() : text;
        const digits = (text.match(/\d+/g) || []).join('').replace(/^0+(?=\d)/, '');
        return new Set([text, tail, digits].filter(Boolean));
    };
    const a = normalize(left);
    const b = normalize(right);
    return [...a].some(key => b.has(key));
}
function roomNo(room) {
    return room?.roomNo || room?.number || String(room?.id || '').split('-').pop() || room?.id || '-';
}
function roomType(room) {
    return room?.roomTypeName || room?.typeName || room?.type || room?.roomTypeId || '';
}
function floorValue(room) {
    const explicit = Number(room?.floor);
    if (Number.isFinite(explicit)) return explicit;
    const match = String(roomNo(room)).match(/\d+/);
    return match ? Number(String(match[0]).slice(0, -2) || 1) : 1;
}
function roomMatchesReservation(room, res) {
    const roomValues = [room?.id, room?.fullRoom, room?.roomId, room?.number, room?.roomNo, roomNo(room)];
    const resValues = [res?.room, res?.fullRoom, res?.roomId, res?.roomNo, res?.roomNumber, res?.roomLabel];
    return roomValues.some(rv => resValues.some(v => sameRoomValue(rv, v)));
}
function activeReservationForRoom(room) {
    const today = todayDate();
    return reservations.filter(res => {
        const status = normalizeStatus(res.status);
        if (['cancelled', 'canceled', 'completed', 'checkedout'].includes(status)) return false;
        const start = parseDate(res.checkInDate || res.checkin || res.cin);
        const end = parseDate(res.checkOutDate || res.checkout || res.cout);
        return roomMatchesReservation(room, res) && start && end && start <= today && today < end;
    }).sort((a, b) => (parseDate(a.checkOutDate || a.checkout || a.cout)?.getTime() || 0) - (parseDate(b.checkOutDate || b.checkout || b.cout)?.getTime() || 0))[0] || null;
}
function nextReservationForRoom(room) {
    const today = todayDate();
    return reservations.filter(res => {
        const status = normalizeStatus(res.status);
        if (['cancelled', 'canceled', 'completed', 'checkedout'].includes(status)) return false;
        const start = parseDate(res.checkInDate || res.checkin || res.cin);
        return roomMatchesReservation(room, res) && start && start >= today;
    }).sort((a, b) => (parseDate(a.checkInDate || a.checkin || a.cin)?.getTime() || 0) - (parseDate(b.checkInDate || b.checkin || b.cin)?.getTime() || 0))[0] || null;
}
function reservationGuest(res) {
    return res?.guestName || res?.guest || res?.roomingGuestName || res?.customerName || '';
}
function displayDate(value) {
    const date = parseDate(value);
    if (!date) return '-';
    return `${date.getMonth() + 1}.${String(date.getDate()).padStart(2, '0')}`;
}
function serviceMeta(service) {
    return {
        pos: { label:'통합 POS', icon:'fa-cash-register', cls:'pos' },
        golf: { label:'골프장', icon:'fa-golf-ball-tee', cls:'golf' },
        rentacar: { label:'렌터카', icon:'fa-car', cls:'rentacar' }
    }[service] || { label:'부가서비스', icon:'fa-bell-concierge', cls:'pos' };
}
function findRoomById(roomId) {
    return rooms.find(room => [room.id, room.roomId, room.fullRoom, room.roomNo, roomNo(room)].some(value => sameRoomValue(value, roomId)));
}
function groupForReservation(res) {
    if (!res) return null;
    const groupId = res.groupId || res.groupEventId || res.eventId;
    const byId = groupId ? groups.find(group => group.id === groupId || group.groupId === groupId) : null;
    if (byId) return byId;
    return groups.find(group => (group.roomAllocations || group.allocations || []).some(allocation => sameRoomValue(allocation.roomNo || allocation.roomId, res.room || res.roomNo || res.roomId)));
}
function groupRooms(group) {
    const allocations = group?.roomAllocations || group?.allocations || [];
    const byAllocation = allocations.map(allocation => findRoomById(allocation.roomNo || allocation.roomId || allocation.fullRoom)).filter(Boolean);
    const byReservations = reservations.filter(res => groupForReservation(res)?.id === group?.id).map(res => rooms.find(room => roomMatchesReservation(room, res))).filter(Boolean);
    const map = new Map([...byAllocation, ...byReservations].map(room => [roomNo(room), room]));
    return [...map.values()].sort((a, b) => String(roomNo(a)).localeCompare(String(roomNo(b)), undefined, { numeric: true }));
}
function roomOrders(room) {
    const key = roomNo(room);
    return serviceOrders.filter(order => sameRoomValue(order.room, key) || sameRoomValue(order.roomId, room?.id));
}
function normalizeExternalOrder(order, service) {
    const meta = serviceMeta(service);
    const item = Array.isArray(order.items) ? order.items.map(entry => entry.name || entry.item || entry).join(', ') : (order.items || order.item || order.itemName || order.productName || meta.label);
    return {
        id: order.id || `${service}-${Date.now()}-${Math.random()}`,
        service,
        serviceLabel: meta.label,
        room: order.room || order.roomNo || String(order.roomId || '').split('-').pop(),
        roomId: order.roomId || '',
        guest: order.guest || order.guestName || '',
        item,
        vendor: order.providerName || order.partnerName || order.vendorName || order.courseName || meta.label,
        total: amountValue(order.total || order.amount),
        dateTime: order.dateTime || order.serviceAt || order.createdAt || '',
        status: order.status || 'new'
    };
}
function loadVendors() {
    try { vendors = JSON.parse(localStorage.getItem(VENDOR_STORAGE) || '[]'); } catch(e) { vendors = []; }
    if (!Array.isArray(vendors) || !vendors.length) vendors = seedVendors.map(v => ({ ...v, items:[...(v.items || [])], voucherFields:[...(v.voucherFields || [])] }));
    ['pos', 'golf', 'rentacar'].forEach(type => {
        if (!vendors.some(v => v.type === type)) vendors.push(...seedVendors.filter(v => v.type === type));
    });
}
function loadStoredOrders() {
    try { serviceOrders = JSON.parse(localStorage.getItem(ORDER_STORAGE) || '[]'); } catch(e) { serviceOrders = []; }
    if (!Array.isArray(serviceOrders)) serviceOrders = [];
}
function persistOrders() {
    localStorage.setItem(ORDER_STORAGE, JSON.stringify(serviceOrders.slice(0, 500)));
}
function setServiceFilter(service) {
    serviceFilter = service;
    document.querySelectorAll('.service-filter-chip').forEach(btn => btn.classList.toggle('active', btn.dataset.service === service));
    renderAncillaryBoard();
}
function updateKpis() {
    const inhouse = rooms.filter(room => activeReservationForRoom(room)).length;
    const total = serviceOrders.reduce((sum, order) => sum + Number(order.total || 0), 0);
    document.getElementById('kpiInhouse').textContent = inhouse;
    document.getElementById('kpiPos').textContent = serviceOrders.filter(o => o.service === 'pos').length;
    document.getElementById('kpiGolf').textContent = serviceOrders.filter(o => o.service === 'golf').length;
    document.getElementById('kpiRent').textContent = serviceOrders.filter(o => o.service === 'rentacar').length;
    document.getElementById('kpiRevenue').textContent = money(total);
}
function renderAncillaryBoard() {
    updateKpis();
    const container = document.getElementById('ancillaryBoardContainer');
    const query = document.getElementById('ancillarySearch')?.value.trim().toLowerCase() || '';
    const sortedRooms = [...rooms].sort((a, b) => {
        const tower = String(a.building || a.tower || '').localeCompare(String(b.building || b.tower || ''), undefined, { numeric: true });
        if (tower) return tower;
        return String(roomNo(a)).localeCompare(String(roomNo(b)), undefined, { numeric: true });
    });
    const filtered = sortedRooms.filter(room => {
        const res = activeReservationForRoom(room) || nextReservationForRoom(room);
        const group = groupForReservation(res);
        const orders = roomOrders(room);
        if (serviceFilter !== 'all' && !orders.some(order => order.service === serviceFilter)) return false;
        const haystack = [roomNo(room), roomType(room), reservationGuest(res), group?.name, group?.groupName, ...orders.map(order => `${order.vendor} ${order.item}`)].join(' ').toLowerCase();
        return !query || haystack.includes(query);
    });
    const byBuilding = new Map();
    filtered.forEach(room => {
        const building = room.building || room.tower || '객실';
        if (!byBuilding.has(building)) byBuilding.set(building, new Map());
        const floor = `${floorValue(room)}층`;
        if (!byBuilding.get(building).has(floor)) byBuilding.get(building).set(floor, []);
        byBuilding.get(building).get(floor).push(room);
    });
    container.innerHTML = [...byBuilding.entries()].map(([building, floors]) => `
        <section class="service-building">
            <div class="service-building-head"><i class="fa-solid fa-building" style="color:var(--primary)"></i>${escapeHtml(building)} <span style="color:var(--txt3);font-size:.8rem">(${[...floors.values()].flat().length}개 객실)</span></div>
            ${[...floors.entries()].sort((a,b) => Number(b[0].replace(/\D/g,'')) - Number(a[0].replace(/\D/g,''))).map(([floor, floorRooms]) => `
                <div class="service-floor">
                    <div class="service-floor-head"><i class="fa-solid fa-layer-group" style="color:var(--txt3)"></i>${escapeHtml(floor)}</div>
                    <div class="service-room-grid">${floorRooms.map(renderRoomCard).join('')}</div>
                </div>
            `).join('')}
        </section>
    `).join('') || '<div class="empty-note">표시할 객실이 없습니다.</div>';
}
function renderRoomCard(room) {
    const active = activeReservationForRoom(room);
    const next = nextReservationForRoom(room);
    const res = active || next;
    const group = groupForReservation(res);
    const orders = roomOrders(room);
    const status = active ? 'inhouse' : next ? 'arrival' : 'empty';
    const statusLabel = active ? '투숙 중' : next ? '체크인 예정' : '공실';
    const total = orders.reduce((sum, order) => sum + Number(order.total || 0), 0);
    const guest = reservationGuest(res) || '투숙객 없음';
    return `
        <article class="service-room-card ${status}" onclick="openServiceModal('${escapeHtml(room.id || roomNo(room))}')">
            <div class="service-room-top">
                <div><div class="service-room-no">${escapeHtml(roomNo(room))}</div><div class="service-room-type">${escapeHtml(roomType(room))}</div></div>
                <span class="service-status ${status}"><i class="fa-solid ${active ? 'fa-bed' : next ? 'fa-calendar-check' : 'fa-door-open'}"></i>${statusLabel}</span>
            </div>
            <div class="service-guest">
                ${escapeHtml(guest)}
                <small>${res ? `${displayDate(res.checkInDate || res.checkin || res.cin)} ~ ${displayDate(res.checkOutDate || res.checkout || res.cout)}` : '배정된 예약 없음'}</small>
            </div>
            ${group ? `<span class="service-group-pill"><i class="fa-solid fa-users"></i>${escapeHtml(group.name || group.groupName || '단체 고객')}</span>` : ''}
            <div class="service-order-list">
                ${orders.length ? orders.slice(0, 3).map(order => {
                    const meta = serviceMeta(order.service);
                    return `<div class="service-order-pill"><span><i class="fa-solid ${meta.icon} ${meta.cls}"></i> ${escapeHtml(order.item || meta.label)}</span><strong>${money(order.total)}</strong></div>`;
                }).join('') : '<div class="service-empty"><i class="fa-solid fa-plus"></i> 부가서비스 등록 가능</div>'}
            </div>
            <div class="service-card-total">${orders.length ? `누적 ${money(total)}` : '&nbsp;'}</div>
        </article>
    `;
}
function openServiceModal(roomId) {
    selectedRoomId = roomId;
    const room = findRoomById(roomId);
    const active = activeReservationForRoom(room || {});
    const next = nextReservationForRoom(room || {});
    const res = active || next;
    const group = groupForReservation(res);
    document.getElementById('modalSelectedRoom').textContent = `${roomNo(room)}호`;
    document.getElementById('modalRoomSummary').innerHTML = `
        <div class="info-tile"><span>객실</span><strong>${escapeHtml(roomNo(room))} · ${escapeHtml(roomType(room))}</strong></div>
        <div class="info-tile"><span>투숙객</span><strong>${escapeHtml(reservationGuest(res) || '투숙객 없음')}</strong></div>
        <div class="info-tile"><span>상태</span><strong>${active ? '투숙 중' : next ? '체크인 예정' : '공실'}</strong></div>
        <div class="info-tile"><span>이용 기간</span><strong>${res ? `${displayDate(res.checkInDate || res.checkin || res.cin)} ~ ${displayDate(res.checkOutDate || res.checkout || res.cout)}` : '-'}</strong></div>
        <div class="info-tile"><span>단체/행사</span><strong>${escapeHtml(group?.name || group?.groupName || '-')}</strong></div>
        <div class="info-tile"><span>누적 이용</span><strong>${money(roomOrders(room || {}).reduce((sum, order) => sum + Number(order.total || 0), 0))}</strong></div>
    `;
    const dt = new Date();
    dt.setMinutes(dt.getMinutes() - dt.getTimezoneOffset());
    document.getElementById('serviceDateTime').value = dt.toISOString().slice(0, 16);
    document.getElementById('serviceQty').value = 1;
    document.getElementById('serviceMemo').value = '';
    renderGroupSelect(group?.id || group?.groupId || '');
    selectServiceType('pos');
    const modal = document.getElementById('serviceModal');
    modal.style.display = 'flex';
    modal.classList.add('active');
}
function closeServiceModal() {
    const modal = document.getElementById('serviceModal');
    modal.classList.remove('active');
    modal.style.display = 'none';
}
function selectServiceType(type) {
    selectedService = type;
    document.querySelectorAll('.service-tab').forEach(btn => btn.classList.toggle('active', btn.dataset.service === type));
    document.getElementById('vendorLabel').textContent = type === 'pos' ? '처리 부서/업체' : '업체';
    const bulkToggle = document.getElementById('groupBulkToggle');
    const groupSelect = document.getElementById('groupSelect');
    bulkToggle.disabled = type === 'pos';
    if (type === 'pos') bulkToggle.checked = false;
    else if (groupSelect.value) bulkToggle.checked = true;
    renderGroupRoomChecks();
    renderServiceVendors();
}
function renderServiceVendors() {
    const list = vendors.filter(vendor => vendor.type === selectedService);
    document.getElementById('serviceVendor').innerHTML = list.map(vendor => `<option value="${escapeHtml(vendor.id)}">${escapeHtml(vendor.name)}</option>`).join('');
    renderServiceItems();
}
function renderServiceItems() {
    const vendor = selectedVendor();
    const items = vendor?.items || [];
    document.getElementById('serviceItem').innerHTML = items.map((item, index) => `<option value="${index}" data-price="${Number(item.price || 0)}">${escapeHtml(item.name)} · ${money(item.price)}</option>`).join('') || '<option value="0" data-price="0">기본 항목 · ₱0</option>';
    renderVoucherFields();
}
function selectedVendor() {
    return vendors.find(item => item.id === document.getElementById('serviceVendor')?.value);
}
function selectedItem() {
    const vendor = selectedVendor();
    const index = Number(document.getElementById('serviceItem')?.value || 0);
    return (vendor?.items || [])[index] || { name:'기본 항목', price:0 };
}
function renderGroupSelect(selectedId = '') {
    const select = document.getElementById('groupSelect');
    select.innerHTML = '<option value="">단체/행사 선택</option>' + groups.map(group => `<option value="${escapeHtml(group.id || group.groupId)}">${escapeHtml(group.name || group.groupName || group.id)}</option>`).join('');
    select.value = selectedId;
    document.getElementById('groupBulkToggle').checked = !!selectedId && selectedService !== 'pos';
    renderGroupRoomChecks();
}
function onGroupSelectChange() {
    const toggle = document.getElementById('groupBulkToggle');
    if (selectedService !== 'pos' && document.getElementById('groupSelect').value) toggle.checked = true;
    renderGroupRoomChecks();
}
function toggleGroupBulk() {
    renderGroupRoomChecks();
}
function renderGroupRoomChecks() {
    const enabled = document.getElementById('groupBulkToggle').checked;
    const groupId = document.getElementById('groupSelect').value;
    const group = groups.find(item => item.id === groupId || item.groupId === groupId);
    const groupRoomsList = enabled && group ? groupRooms(group) : [];
    document.getElementById('groupRoomCount').textContent = `${groupRoomsList.length}실`;
    document.getElementById('groupRoomChecks').innerHTML = groupRoomsList.map(room => {
        const res = activeReservationForRoom(room) || nextReservationForRoom(room);
        return `<label><input type="checkbox" class="group-room-check" value="${escapeHtml(room.id || roomNo(room))}" checked> ${escapeHtml(roomNo(room))} <span style="color:var(--txt3)"> ${escapeHtml(reservationGuest(res) || '')}</span></label>`;
    }).join('') || '<div style="font-size:.72rem;color:var(--txt3);font-weight:850">단체 일괄 등록 대상 객실이 표시됩니다.</div>';
}
function renderVoucherFields() {
    const vendor = selectedVendor();
    const fields = vendor?.voucherFields || [];
    document.getElementById('voucherFields').innerHTML = fields.length ? fields.map(field => `<label><input type="checkbox" class="voucher-field-check" value="${field}" checked onchange="renderVoucherPreview()"> ${voucherFieldLabels[field] || field}</label>`).join('') : '<div style="grid-column:1/-1;color:var(--txt3);font-size:.72rem;font-weight:850">이 서비스는 바우처 출력 항목이 없습니다.</div>';
    renderVoucherPreview();
}
function voucherData(room = findRoomById(selectedRoomId)) {
    const res = activeReservationForRoom(room || {}) || nextReservationForRoom(room || {});
    const vendor = selectedVendor();
    const item = selectedItem();
    const qty = Math.max(1, Number(document.getElementById('serviceQty')?.value || 1));
    const dateTime = document.getElementById('serviceDateTime')?.value || '';
    return {
        guest: reservationGuest(res) || '-',
        room: room ? roomNo(room) : '-',
        date: dateTime ? dateTime.replace('T', ' ') : '-',
        people: `${qty}명`,
        teeTime: dateTime ? dateTime.slice(11, 16) : '-',
        course: vendor?.name || '-',
        pickup: '호텔 로비',
        vehicle: item.name || '-',
        item: item.name || '-',
        amount: money(Number(item.price || 0) * qty),
        memo: document.getElementById('serviceMemo')?.value || '-'
    };
}
function selectedVoucherFields() {
    return Array.from(document.querySelectorAll('.voucher-field-check:checked')).map(input => input.value);
}
function renderVoucherPreview() {
    const fields = selectedVoucherFields();
    const data = voucherData();
    document.getElementById('voucherPreview').innerHTML = fields.length
        ? fields.map(field => `<div><b>${voucherFieldLabels[field] || field}</b>: ${escapeHtml(data[field] || '-')}</div>`).join('')
        : '<span>선택한 바우처 항목이 없습니다.</span>';
}
function targetRoomsForSave() {
    const bulk = document.getElementById('groupBulkToggle').checked && selectedService !== 'pos';
    if (!bulk) return [findRoomById(selectedRoomId)].filter(Boolean);
    return Array.from(document.querySelectorAll('.group-room-check:checked')).map(input => findRoomById(input.value)).filter(Boolean);
}
function saveServiceOrder() {
    const roomsToSave = targetRoomsForSave();
    if (!roomsToSave.length) return alert('등록할 객실을 선택해 주세요.');
    const vendor = selectedVendor();
    const item = selectedItem();
    const qty = Math.max(1, Number(document.getElementById('serviceQty')?.value || 1));
    const unitPrice = Number(item.price || 0);
    const meta = serviceMeta(selectedService);
    const selectedGroup = groups.find(item => item.id === document.getElementById('groupSelect')?.value || item.groupId === document.getElementById('groupSelect')?.value);
    const created = roomsToSave.map(room => {
        const res = activeReservationForRoom(room) || nextReservationForRoom(room);
        const ownGroup = selectedGroup || groupForReservation(res);
        return {
            id: `SVC-${Date.now()}-${roomNo(room)}-${Math.random().toString(16).slice(2, 6)}`,
            service: selectedService,
            serviceLabel: meta.label,
            room: roomNo(room),
            roomId: room.id || room.roomId || '',
            guest: reservationGuest(res),
            reservationId: res?.id || '',
            groupId: ownGroup?.id || ownGroup?.groupId || '',
            groupName: ownGroup?.name || ownGroup?.groupName || '',
            vendor: vendor?.name || meta.label,
            vendorId: vendor?.id || '',
            item: item.name || meta.label,
            qty,
            unitPrice,
            total: unitPrice * qty,
            dateTime: document.getElementById('serviceDateTime')?.value || '',
            memo: document.getElementById('serviceMemo')?.value || '',
            voucherFields: selectedVoucherFields(),
            status: 'new'
        };
    });
    serviceOrders = [...created, ...serviceOrders];
    persistOrders();
    closeServiceModal();
    renderAncillaryBoard();
    if (window.showToast) window.showToast(`${meta.label} ${created.length}건이 등록되었습니다.`, 'success');
}
function printVoucher() {
    const roomsToPrint = targetRoomsForSave();
    const fields = selectedVoucherFields();
    if (!fields.length) return alert('출력할 바우처 항목을 선택해 주세요.');
    const vendor = selectedVendor();
    const item = selectedItem();
    const html = roomsToPrint.map(room => {
        const data = voucherData(room);
        return `<section style="border:1px solid #d1d5db;border-radius:12px;padding:18px;margin:0 0 14px;font-family:Arial,sans-serif">
            <h2 style="margin:0 0 8px;font-size:18px">${escapeHtml(vendor?.name || '바우처')}</h2>
            <div style="font-size:13px;color:#6b7280;margin-bottom:12px">${escapeHtml(item.name || '')}</div>
            ${fields.map(field => `<div style="display:flex;justify-content:space-between;border-top:1px solid #eef2f7;padding:8px 0"><strong>${escapeHtml(voucherFieldLabels[field] || field)}</strong><span>${escapeHtml(data[field] || '-')}</span></div>`).join('')}
        </section>`;
    }).join('');
    const win = window.open('', '_blank', 'width=720,height=900');
    win.document.write(`<!doctype html><html><head><title>부가서비스 바우처</title></head><body>${html}<script>window.print()<\/script></body></html>`);
    win.document.close();
}
document.addEventListener('DOMContentLoaded', async () => {
    loadVendors();
    loadStoredOrders();
    const [roomData, reservationData, groupData, posOrders, golfOrders, rentOrders] = await Promise.all([
        window.PmsAPI?.getAllRooms ? window.PmsAPI.getAllRooms().catch(() => []) : [],
        window.PmsAPI?.getReservations ? window.PmsAPI.getReservations().catch(() => []) : [],
        window.PmsAPI?.getGroups ? window.PmsAPI.getGroups().catch(() => []) : [],
        window.PmsAPI?.getOrders ? window.PmsAPI.getOrders().catch(() => []) : [],
        window.PmsAPI?.getGolfOrders ? window.PmsAPI.getGolfOrders().catch(() => []) : [],
        window.PmsAPI?.getRentacarOrders ? window.PmsAPI.getRentacarOrders().catch(() => []) : []
    ]);
    rooms = roomData || [];
    reservations = reservationData || [];
    groups = groupData || [];
    const externalOrders = [
        ...(posOrders || []).map(order => normalizeExternalOrder(order, 'pos')),
        ...(golfOrders || []).map(order => normalizeExternalOrder(order, 'golf')),
        ...(rentOrders || []).map(order => normalizeExternalOrder(order, 'rentacar'))
    ];
    const storedIds = new Set(serviceOrders.map(order => order.id));
    serviceOrders = [...serviceOrders, ...externalOrders.filter(order => !storedIds.has(order.id))];
    renderAncillaryBoard();
});
</script>
</body>
</html>
