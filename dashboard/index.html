<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel PMS</title>
    <style>
        body {
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: #0f172a;
            font-family: 'Inter', sans-serif;
        }
        .splash {
            text-align: center;
            color: #fff;
        }
        .splash-logo {
            width: 64px;
            height: 64px;
            border-radius: 18px;
            background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            margin: 0 auto 16px;
            box-shadow: 0 8px 32px rgba(59,130,246,.4);
        }
        .splash-brand-logo {
            display: block;
            width: 244px;
            height: auto;
            margin: 0 auto 18px;
            border-radius: 6px;
        }
        .splash h1 {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin: 0 0 8px;
        }
        .splash p {
            font-size: 0.85rem;
            color: #94a3b8;
            margin: 0 0 24px;
        }
        .spinner {
            width: 28px;
            height: 28px;
            border: 3px solid rgba(255,255,255,.15);
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin .8s linear infinite;
            margin: 0 auto;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="common/js/ui-components.js"></script>
    <script src="common/js/topbar.js"></script>
</head>
<body>
    <div class="splash">
        <img class="splash-brand-logo" src="common/assets/hpms-logo.png" alt="HPMS - Hotel Property Management System">
        <p>Loading...</p>
        <div class="spinner"></div>
    </div>

    <script>
        // 로그인 Status 확인 후 분기
        // sessionStorage에 'pms_logged_in' = 'true' 가 있으면 Dashboard로, 아니면 로그인으로
        (function() {
            const isLoggedIn = sessionStorage.getItem('pms_logged_in') === 'true';
            if (isLoggedIn) {
                window.location.replace('dashboard.html');
            } else {
                window.location.replace('login.html');
            }
        })();
    </script>
</body>
</html>
