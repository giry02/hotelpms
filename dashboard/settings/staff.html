<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 관리 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/settings.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-settings.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/privacy-audit.js"></script>
    <script>
        let ALL_MENUS = [];
    </script>
    <style>
        .role-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }

        /* 역할 선택 카드 */
        .role-pick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .role-pick-card {
            border: 2px solid var(--border); border-radius: var(--radius);
            padding: 14px 10px; text-align: center; cursor: pointer;
            transition: all .2s;
        }
        .role-pick-card:hover { border-color: var(--primary); background: var(--primary-lt); }
        .role-pick-card.selected { border-color: var(--primary); background: var(--primary-lt); }
        .role-pick-card .rpc-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .role-pick-card .rpc-name { font-size: .82rem; font-weight: 700; color: var(--txt); }
        .role-pick-card .rpc-desc { font-size: .7rem; color: var(--txt3); margin-top: 2px; }

        /* 권한 미리보기 */
        .perm-preview-wrap { background: var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; }
        .perm-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: .72rem; font-weight: 600; background: #fff; border: 1px solid var(--border); color: var(--txt2); margin: 3px; }
        .staff-filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .staff-filter-row .search-box { flex: 0 0 280px; width: 280px; min-width: 220px; }
        .staff-filter-row .hotel-select { flex: 0 0 auto; max-width: none; height: 38px; }
        .password-change-box { display: flex; flex-direction: column; gap: 8px; padding-top: 10px; border-top: 1px solid var(--border2); }
        .password-change-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        .password-action-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
        .password-helper { font-size: .74rem; color: var(--txt3); line-height: 1.45; flex: 1 1 220px; }
        .settings-managed-link { display: inline-flex; align-items: center; gap: 6px; text-decoration: none; white-space: nowrap; }
        .staff-table { min-width: 980px; table-layout: fixed; }
        .staff-table th:nth-child(1), .staff-table td:nth-child(1) { width: 34%; }
        .staff-table th:nth-child(2), .staff-table td:nth-child(2) { width: 15%; }
        .staff-table th:nth-child(3), .staff-table td:nth-child(3) { width: 14%; }
        .staff-table th:nth-child(4), .staff-table td:nth-child(4) { width: 12%; }
        .staff-table th:nth-child(5), .staff-table td:nth-child(5) { width: 12%; }
        .staff-table th:nth-child(6), .staff-table td:nth-child(6) { width: 13%; position: relative; z-index: 1; }
        .staff-table [data-staff-edit],
        .staff-table .settings-managed-link { position: relative; z-index: 2; pointer-events: auto; }
        .staff-edit-action {
            background: var(--card) !important;
            border-color: var(--border) !important;
            color: var(--txt2) !important;
            transform: none !important;
            transition: none !important;
        }
        .staff-edit-action:hover,
        .staff-edit-action:focus-visible {
            background: var(--primary-lt) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            box-shadow: inset 0 0 0 1px rgba(59, 130, 246, .18) !important;
            transform: none !important;
        }
        .staff-edit-action:active {
            background: var(--primary-lt) !important;
            border-color: var(--primary) !important;
            color: var(--primary) !important;
            transform: none !important;
        }
        .staff-edit-action i { color: currentColor; }
        @media (max-width: 1024px) {
            .staff-table { min-width: 0; width: 100%; white-space: normal; border-collapse: separate; border-spacing: 0 10px; }
            .staff-table thead { display: none; }
            .staff-table tbody,
            .staff-table tr,
            .staff-table td { display: block; width: 100% !important; }
            .staff-table tr {
                border: 1px solid var(--border);
                border-radius: 12px;
                background: #fff;
                padding: 12px;
                box-shadow: 0 1px 2px rgba(15, 23, 42, .04);
                cursor: pointer;
            }
            .staff-table tr + tr { margin-top: 10px; }
            .staff-table td {
                border-bottom: 0;
                padding: 6px 0;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 12px;
            }
            .staff-table td::before {
                content: attr(data-label);
                flex: 0 0 92px;
                color: var(--txt3);
                font-size: .74rem;
                font-weight: 800;
            }
            .staff-table td:first-child {
                display: block;
                padding-bottom: 10px;
                border-bottom: 1px solid var(--border2);
                margin-bottom: 4px;
            }
            .staff-table td:first-child::before,
            .staff-table td:last-child::before { display: none; }
            .staff-table td:last-child {
                justify-content: flex-end;
                padding-top: 10px;
                border-top: 1px solid var(--border2);
                margin-top: 4px;
            }
            .staff-table [data-staff-edit],
            .staff-table .settings-managed-link { width: auto; min-width: 96px; }
        }
        @media (max-width: 768px) {
            .staff-filter-row .search-box,
            .staff-filter-row .hotel-select { width: 100%; flex: 1 1 100%; max-width: none; }
            .password-change-grid { grid-template-columns: 1fr; }
        }
    </style>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Staff Mgmt">직원 관리</h1></header>

    <div class="content">

        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap">
            <div>
                <div style="font-size:1.1rem;font-weight:700;color:var(--txt)" data-i18n-key="staff.list.title">직원 목록</div>
                <div style="font-size:.82rem;color:var(--txt3);margin-top:3px" data-i18n-key="staff.list.description">직원 계정과 역할, 상태를 확인하거나 등록 및 수정하세요.</div>
            </div>
            <div style="display:flex;gap:8px;align-items:center">
                <a href="roles.html" class="btn-outline" style="font-size:.8rem;padding:6px 12px;text-decoration:none">
                    <i class="fa-solid fa-shield-halved"></i> <span data-i18n-key="staff.action.permissions">권한 설정</span>
                </a>
                <button class="btn-primary-sm" onclick="openModal('addStaffModal')">
                    <i class="fa-solid fa-user-plus"></i> <span data-i18n-key="staff.action.add">직원 등록</span>
                </button>
            </div>
        </div>

        <!-- 직원 목록 카드 -->
        <div class="card">
            <div class="card-body" style="padding:20px 20px 0">
                <!-- 필터 -->
                <div class="staff-filter-row">
                    <div class="search-box">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="이름, 이메일 검색..." oninput="renderStaff()">
                    </div>
                    <select class="hotel-select" id="roleFilter" onchange="renderStaff()" style="min-width:140px">
                        <option value="all">전체 역할</option>
                    </select>
                    <select class="hotel-select" id="statusFilter" onchange="renderStaff()" style="min-width:120px">
                        <option value="all">전체 상태</option>
                        <option value="active">근무 중</option>
                        <option value="leave">휴직</option>
                        <option value="retired">퇴직</option>
                    </select>
                </div>
            </div>
            <!-- 테이블 -->
            <div style="padding:0 20px 20px">
                <div class="table-wrap">
                    <table class="staff-table">
                        <thead>
                            <tr>
                                <th>직원</th>
                                <th>역할</th>
                                <th>접근 권한 수</th>
                                <th>상태</th>
                                <th>최근 접속</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="staffBody"></tbody>
                    </table>
                </div>
                <div id="emptyState" style="display:none;text-align:center;padding:40px;color:var(--txt3)">
                    <i class="fa-solid fa-users" style="font-size:2rem;margin-bottom:8px;display:block"></i>
                    검색 결과가 없습니다.
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ── 직원 등록 모달 ── -->
<div class="modal-overlay" id="addStaffModal" onclick="if(event.target===this) closeModal('addStaffModal')">
    <div class="modal-card" style="max-width:580px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-user-plus" style="color:var(--primary);margin-right:8px"></i><span data-ko="신규 직원 등록" data-en="Add Staff">신규 직원 등록</span></h3>
            <button class="modal-close" onclick="closeModal('addStaffModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label"><span data-ko="이름" data-en="Name">이름</span> <span style="color:var(--danger)">*</span></label>
                    <input type="text" class="form-control" id="newName" placeholder="예: 홍길동" data-ko="예: 홍길동" data-en="E.g. Hong Gil-dong">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="사번 / ID" data-en="Employee ID">사번 / ID</label>
                    <input type="text" class="form-control" id="newEmpId" placeholder="EMP-001">
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label"><span data-ko="이메일 (로그인 ID)" data-en="Email (Login ID)">이메일 (로그인 ID)</span> <span style="color:var(--danger)">*</span></label>
                <input type="email" class="form-control" id="newEmail" placeholder="user@hotel.com">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="전화번호" data-en="Phone">전화번호</label>
                    <input type="tel" class="form-control" id="newPhone" placeholder="예: +84 90 123 4567" data-ko="예: +84 90 123 4567" data-en="E.g. +84 90 123 4567">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="주소" data-en="Address">주소</label>
                    <input type="text" class="form-control" id="newAddress" placeholder="예: Ho Chi Minh City" data-ko="예: Ho Chi Minh City" data-en="E.g. Ho Chi Minh City">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="입사일" data-en="Hire Date">입사일</label>
                    <input type="date" class="form-control" id="newHireDate">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="퇴사일" data-en="Termination Date">퇴사일</label>
                    <input type="date" class="form-control" id="newTerminationDate">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">
                        <span data-ko="역할" data-en="Role">역할</span>
                        <span style="color:var(--danger)">*</span>
                        <a href="roles.html" style="font-size:.72rem;color:var(--primary);margin-left:8px">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i>
                            <span data-ko="권한 설정" data-en="Permission Settings">권한 설정</span>
                        </a>
                    </label>
                    <select class="form-control" id="newRole" onchange="renderNewPermPreview()"></select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="상태" data-en="Status">상태</label>
                    <select class="form-control" id="newStatus"></select>
                </div>
            </div>

            <div class="perm-preview-wrap" id="newPermPreview" style="display:none">
                <div style="font-size:.78rem;font-weight:700;color:var(--txt);margin-bottom:8px">
                    <i class="fa-solid fa-key" style="color:var(--primary);margin-right:4px"></i>
                    <span data-ko="선택 역할 권한" data-en="Selected role permissions">선택 역할 권한</span>
                </div>
                <div id="newPermPreviewTags"></div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label"><span data-ko="비밀번호" data-en="Password">비밀번호</span> <span style="color:var(--danger)">*</span></label>
                <div class="password-change-grid">
                    <input type="password" class="form-control" id="newPw" placeholder="비밀번호" data-ko="비밀번호" data-en="Password">
                    <input type="password" class="form-control" id="newPwConfirm" placeholder="비밀번호 확인" data-ko="비밀번호 확인" data-en="Confirm password">
                </div>
                <div class="password-helper" data-ko="직원은 좌측 하단의 내 정보 수정에서 이메일과 비밀번호를 직접 변경할 수 있습니다." data-en="Staff can update their email and password from My Profile at the bottom of the sidebar.">직원은 좌측 하단의 내 정보 수정에서 이메일과 비밀번호를 직접 변경할 수 있습니다.</div>
            </div>

        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('addStaffModal')" data-ko="취소" data-en="Cancel">취소</button>
            <button class="btn-primary-sm" onclick="saveStaff()"><i class="fa-solid fa-check"></i> <span data-ko="계정 생성" data-en="Create Account">계정 생성</span></button>
        </div>
    </div>
</div>

<!-- ── 편집 모달 ── -->
<div class="modal-overlay" id="editStaffModal" onclick="if(event.target===this) closeModal('editStaffModal')">
    <div class="modal-card" style="max-width:580px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-pen" style="color:var(--primary);margin-right:8px"></i><span data-ko="직원 정보 편집" data-en="Edit Staff">직원 정보 편집</span></h3>
            <button class="modal-close" onclick="closeModal('editStaffModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="이름" data-en="Name">이름</label>
                    <input type="text" class="form-control" id="editName">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="사번" data-en="Employee ID">사번</label>
                    <input type="text" class="form-control" id="editEmpId">
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label" data-ko="ID (이메일)" data-en="ID (Email)">ID (이메일)</label>
                <input type="email" class="form-control" id="editEmail">
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="전화번호" data-en="Phone">전화번호</label>
                    <input type="tel" class="form-control" id="editPhone" placeholder="예: +84 90 123 4567" data-ko="예: +84 90 123 4567" data-en="E.g. +84 90 123 4567">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="주소" data-en="Address">주소</label>
                    <input type="text" class="form-control" id="editAddress" placeholder="예: Ho Chi Minh City" data-ko="예: Ho Chi Minh City" data-en="E.g. Ho Chi Minh City">
                </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="입사일" data-en="Hire Date">입사일</label>
                    <input type="date" class="form-control" id="editHireDate">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="퇴사일" data-en="Termination Date">퇴사일</label>
                    <input type="date" class="form-control" id="editTerminationDate">
                </div>
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="역할 변경" data-en="Role">역할 변경</label>
                    <select class="form-control" id="editRole" onchange="renderEditPermPreview()"></select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label" data-ko="상태" data-en="Status">상태</label>
                    <select class="form-control" id="editStatus"></select>
                </div>
            </div>

            <div class="perm-preview-wrap" id="editPermPreview" style="display:none">
                <div style="font-size:.78rem;font-weight:700;color:var(--txt);margin-bottom:8px">
                    <i class="fa-solid fa-key" style="color:var(--primary);margin-right:4px"></i>
                    <span data-ko="선택 역할 권한" data-en="Selected role permissions">선택 역할 권한</span>
                </div>
                <div id="editPermPreviewTags"></div>
            </div>

            <div class="password-change-box">
                <label class="form-label" data-ko="비밀번호 변경" data-en="Change Password">비밀번호 변경</label>
                <div class="password-change-grid">
                    <input type="password" class="form-control" id="editNewPw" placeholder="새 비밀번호" data-ko="새 비밀번호" data-en="New password">
                    <input type="password" class="form-control" id="editNewPwConfirm" placeholder="새 비밀번호 확인" data-ko="새 비밀번호 확인" data-en="Confirm new password">
                </div>
                <div class="password-action-row">
                    <div class="password-helper" data-ko="비밀번호를 변경하려면 새 비밀번호와 확인값을 모두 입력하고 저장하세요." data-en="To change the password, enter both the new password and confirmation before saving.">비밀번호를 변경하려면 새 비밀번호와 확인값을 모두 입력하고 저장하세요.</div>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="display:flex; justify-content:space-between;">
            <button class="btn-outline danger" onclick="deleteStaff()" style="color:#DC2626;border-color:#FECACA">
                <i class="fa-solid fa-trash"></i> <span data-ko="삭제" data-en="Delete">삭제</span>
            </button>
            <div style="display:flex; gap:8px;">
                <button class="btn-outline" onclick="closeModal('editStaffModal')" data-ko="취소" data-en="Cancel">취소</button>
                <button class="btn-primary-sm" onclick="saveEdit()"><i class="fa-solid fa-floppy-disk"></i> <span data-ko="저장" data-en="Save">저장</span></button>
            </div>
        </div>
    </div>
</div>

<script>
// ─── 시스템 기본 역할 ─────────────────────
let SYSTEM_ROLES = [];

let DEFAULT_CUSTOM_ROLES = [];

const MENU_LABEL = {
    dashboard:{ ko:'대시보드', en:'Dashboard' }, reservation:{ ko:'예약 관리', en:'Reservation Mgmt' }, checkin:{ ko:'체크인/아웃', en:'Check-in/out' },
    crm:{ ko:'고객 관리', en:'Customer Management' }, groups:{ ko:'단체 관리', en:'Groups' }, rooms:{ ko:'객실 관리', en:'Room Mgmt' }, rates:{ ko:'요금 캘린더', en:'Rates Calendar' },
    housekeeping:{ ko:'하우스키핑', en:'Housekeeping' }, maintenance:{ ko:'시설 보수', en:'Maintenance' }, folio:{ ko:'정산/청구', en:'Settlement/Billing' }, ancillary:{ ko:'부가서비스', en:'Ancillary Svcs' },
    settings:{ ko:'호텔 설정', en:'Hotel Settings' }, staff:{ ko:'직원 관리', en:'Staff Mgmt' }, billing:{ ko:'요금 및 결제', en:'Rates & Billing' },
};

function menuLabel(key) {
    const label = MENU_LABEL[key];
    return label?.[staffLang()] || key;
}

function loadCustomRoles() {
    try { 
        const saved = localStorage.getItem('pms_custom_roles');
        if (saved) return JSON.parse(saved);
        return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES));
    } catch { return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES)); }
}

function getAllRoles() {
    return [...SYSTEM_ROLES, ...loadCustomRoles()];
}

function getAssignableRoles() {
    return getAllRoles().filter(role => role.id !== 'sys_admin');
}

function getRoleById(id) {
    return getAllRoles().find(r => r.id === id);
}

function isSettingsManagedAdmin(staff) {
    return staff?.roleId === 'sys_admin';
}

function adminFallbackRoleId() {
    const roles = getAssignableRoles();
    if (roles.some(role => role.id === 'sys_gm')) return 'sys_gm';
    return roles[0]?.id || 'sys_gm';
}

function normalizeStaffStatus(status) {
    const value = String(status || '').toLowerCase();
    if (value === 'leave' || value === 'on_leave' || value === 'on-leave' || value === 'suspended') return 'leave';
    if (value === 'retired' || value === 'terminated' || value === 'resigned') return 'retired';
    return 'active';
}

function normalizeSingleAdminStaff(data) {
    const fallbackRoleId = adminFallbackRoleId();
    let adminSeen = false;
    let changed = false;
    const items = (Array.isArray(data) ? data : []).map(staff => {
        const normalizedStaff = {
            ...staff,
            status: normalizeStaffStatus(staff?.status)
        };
        if (normalizedStaff.status !== staff?.status) changed = true;
        if (normalizedStaff?.roleId !== 'sys_admin') return normalizedStaff;
        if (!adminSeen) {
            adminSeen = true;
            return normalizedStaff;
        }
        changed = true;
        const fallbackRole = getRoleById(fallbackRoleId);
        return {
            ...normalizedStaff,
            roleId: fallbackRoleId,
            color: fallbackRole?.color || normalizedStaff.color,
            adminConflictResolvedAt: new Date().toISOString()
        };
    });
    return { items, changed };
}

// ─── 직원 데이터 (localStorage) ────────────────────────────────
let DEFAULT_STAFF = [];

function loadStaff() {
    try {
        const data = JSON.parse(localStorage.getItem('pms_staff') || 'null') || DEFAULT_STAFF;
        return normalizeSingleAdminStaff(data).items;
    } catch { return normalizeSingleAdminStaff(DEFAULT_STAFF).items; }
}
function saveStaffData(data, options = {}) {
    const normalized = normalizeSingleAdminStaff(data);
    localStorage.setItem('pms_staff', JSON.stringify(normalized.items));
    if (window.PmsMockApi) {
        window.PmsMockApi.request('PUT', '/settings/staff', { body: normalized.items })
            .catch(e => console.warn('Mock staff save failed', e));
    }
    if (normalized.changed && !options.silent && typeof showToast === 'function') {
        showToast('관리자 권한은 한 명만 유지됩니다. 중복 관리자는 총괄 매니저로 조정했습니다.', 'info');
    }
    return normalized.items;
}

let staffData = loadStaff();
let editingId = null;

function staffLang() {
    return localStorage.getItem('pms_lang') || window.currentLang || 'ko';
}

function staffText(ko, en) {
    return staffLang() === 'en' ? en : ko;
}

function staffAttr(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    })[ch]);
}

const STAFF_ROLE_LABELS = {
    sys_admin: { ko: '관리자', en: 'Admin' },
    sys_gm: { ko: '총괄 매니저', en: 'General Manager' },
    sys_front: { ko: '프론트 데스크', en: 'Front Desk' },
    sys_housekeeping: { ko: '하우스키핑', en: 'Housekeeping' },
    sys_maintenance: { ko: '시설 보수', en: 'Maintenance' }
};

function roleDisplayName(role) {
    if (!role) return staffText('역할 없음', 'No Role');
    const labels = STAFF_ROLE_LABELS[role.id];
    return labels ? labels[staffLang()] : role.name;
}

function roleDescription(role) {
    if (!role) return '';
    return role.desc || staffText(`${role.perms.length}개 권한`, `${role.perms.length} permissions`);
}

// ─── 역할 필터 드롭다운 ────────────────────────────────────────
function staffStatusMeta(status) {
    const value = normalizeStaffStatus(status);
    const meta = {
        active: { label: staffText('근무 중', 'Active'), color: 'var(--success)' },
        leave: { label: staffText('휴직', 'On Leave'), color: 'var(--warning)' },
        retired: { label: staffText('퇴직', 'Retired'), color: 'var(--txt3)' }
    };
    return meta[value] || meta.active;
}

function buildRoleFilter() {
    const sel = document.getElementById('roleFilter');
    const current = sel.value || 'all';
    sel.innerHTML = `<option value="all">${staffText('전체 역할', 'All Roles')}</option>` +
        getAllRoles().map(r => `<option value="${r.id}">${roleDisplayName(r)}</option>`).join('');
    if (Array.from(sel.options).some(option => option.value === current)) sel.value = current;
}

function populateEditRoleOptions(selectedRoleId = '') {
    const editSel = document.getElementById('editRole');
    if (!editSel) return;
    const roles = getAssignableRoles();
    editSel.innerHTML = roles.length
        ? roles.map(r => `<option value="${r.id}">${roleDisplayName(r)}</option>`).join('')
        : `<option value="">${staffText('등록된 역할 없음', 'No roles registered')}</option>`;
    editSel.disabled = roles.length === 0;
    if (selectedRoleId && roles.some(r => r.id === selectedRoleId)) editSel.value = selectedRoleId;
    else if (roles.length) editSel.value = roles[0].id;
}

function logStaffAudit(action, staff, details = {}) {
    if (!window.PmsPrivacyAudit || !staff) return;
    window.PmsPrivacyAudit.log(action, {
        screen: 'staff',
        staffId: staff.id || '',
        staffName: staff.name || '',
        roleId: staff.roleId || '',
        status: normalizeStaffStatus(staff.status),
        fields: ['staffId', 'staffName', ...(details.fields || [])],
        ...details
    });
}

function populateNewRoleOptions(selectedRoleId = '') {
    const newSel = document.getElementById('newRole');
    if (!newSel) return;
    const roles = getAssignableRoles();
    newSel.innerHTML = roles.length
        ? roles.map(r => `<option value="${r.id}">${roleDisplayName(r)}</option>`).join('')
        : `<option value="">${staffText('등록된 역할 없음', 'No roles registered')}</option>`;
    newSel.disabled = roles.length === 0;
    if (selectedRoleId && roles.some(r => r.id === selectedRoleId)) newSel.value = selectedRoleId;
    else if (roles.length) newSel.value = roles[0].id;
}


function refreshStaffStatusOptions() {
    const statusLabels = {
        all: staffText('전체 상태', 'All Statuses'),
        active: staffText('근무 중', 'Active'),
        leave: staffText('휴직', 'On Leave'),
        retired: staffText('퇴직', 'Retired')
    };
    const statusFilter = document.getElementById('statusFilter');
    if (statusFilter) {
        const current = statusFilter.value || 'all';
        statusFilter.innerHTML = Object.entries(statusLabels).map(([value, label]) => `<option value="${value}">${label}</option>`).join('');
        statusFilter.value = statusLabels[current] ? current : 'all';
    }
    const editStatus = document.getElementById('editStatus');
    if (editStatus) {
        const current = normalizeStaffStatus(editStatus.value || 'active');
        editStatus.innerHTML = ['active', 'leave', 'retired'].map(value => `<option value="${value}">${statusLabels[value]}</option>`).join('');
        editStatus.value = current;
    }
    const newStatus = document.getElementById('newStatus');
    if (newStatus) {
        const current = normalizeStaffStatus(newStatus.value || 'active');
        newStatus.innerHTML = ['active', 'leave', 'retired'].map(value => `<option value="${value}">${statusLabels[value]}</option>`).join('');
        newStatus.value = current;
    }
    const searchInput = document.getElementById('searchInput');
    if (searchInput) searchInput.placeholder = staffText('이름, 이메일 검색...', 'Search name or email...');
}

function applyStaffLanguage() {
    refreshStaffStatusOptions();
    buildRoleFilter();
    populateNewRoleOptions(document.getElementById('newRole')?.value || '');
    renderNewPermPreview();
    populateEditRoleOptions(document.getElementById('editRole')?.value || '');
    renderEditPermPreview();
    renderStaff();
}

// ─── 직원 목록 렌더링 ──────────────────────────────────────────
let lastStaffTableHtml = '';

function renderStaff() {
    const search     = document.getElementById('searchInput').value.toLowerCase();
    const roleFilter = document.getElementById('roleFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    const filtered = staffData.filter(s => {
        if (roleFilter !== 'all' && s.roleId !== roleFilter) return false;
        if (statusFilter !== 'all' && s.status !== statusFilter) return false;
        if (search && !s.name.toLowerCase().includes(search) && !s.email.toLowerCase().includes(search)) return false;
        return true;
    });

    const tbody = document.getElementById('staffBody');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
        tbody.innerHTML = '';
        lastStaffTableHtml = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    const nextStaffTableHtml = filtered.map(s => {
        const role = getRoleById(s.roleId);
        const roleName  = roleDisplayName(role);
        const roleColor = role ? role.color : '#9CA3AF';
        const permCount = role ? role.perms.length : 0;
        const managedAdmin = isSettingsManagedAdmin(s);
        const manageAction = managedAdmin
            ? `<div>
                    <a class="btn-outline-sm settings-managed-link" href="settings.html">
                        <i class="fa-solid fa-gear"></i> ${staffText('설정에서 관리', 'Manage in Settings')}
                    </a>
               </div>`
            : `<button type="button" class="btn-outline-sm staff-edit-action" data-staff-edit="${staffAttr(s.id)}">
                    <i class="fa-solid fa-pen"></i> ${staffText('편집', 'Edit')}
               </button>`;
        const status = staffStatusMeta(s.status);
        const dot = `<span class="status-dot" style="background:${status.color}"></span> ${status.label}`;
        return `<tr${managedAdmin ? '' : ` data-staff-edit-row="${staffAttr(s.id)}"`}>
            <td data-label="${staffAttr(staffText('직원', 'Staff'))}">
                <div class="guest-cell">
                    <div>
                        <strong>${s.name}</strong><br>
                        <span style="font-size:.72rem;color:var(--txt3)">${s.email}${s.phone && s.phone !== '-' ? ` · ${s.phone}` : ''}</span>
                    </div>
                </div>
            </td>
            <td data-label="${staffAttr(staffText('역할', 'Role'))}">
                <span class="role-pill" style="background:${roleColor}22;color:${roleColor}">
                    ${roleName}
                </span>
            </td>
            <td data-label="${staffAttr(staffText('접근 권한 수', 'Permissions'))}">
                <span style="font-size:.82rem;font-weight:600;color:var(--txt)">${permCount}</span>
                <span style="font-size:.72rem;color:var(--txt3)"> ${staffText('개', '')}</span>
            </td>
            <td data-label="${staffAttr(staffText('상태', 'Status'))}">${dot}</td>
            <td data-label="${staffAttr(staffText('최근 접속', 'Last Access'))}" style="font-size:.82rem;color:var(--txt2)">${s.last}</td>
            <td data-label="${staffAttr(staffText('관리', 'Actions'))}">${manageAction}</td>
        </tr>`;
    }).join('');

    if (lastStaffTableHtml !== nextStaffTableHtml) {
        tbody.innerHTML = nextStaffTableHtml;
        lastStaffTableHtml = nextStaffTableHtml;
    }
}

function renderEditPermPreview() {
    const wrap = document.getElementById('editPermPreview');
    const tags = document.getElementById('editPermPreviewTags');
    const role = getRoleById(document.getElementById('editRole')?.value);
    if (!wrap || !tags || !role) {
        if (wrap) wrap.style.display = 'none';
        return;
    }
    wrap.style.display = 'block';
    tags.innerHTML = role.perms.map(k => `<span class="perm-tag">${menuLabel(k)}</span>`).join('');
}

function renderNewPermPreview() {
    const wrap = document.getElementById('newPermPreview');
    const tags = document.getElementById('newPermPreviewTags');
    const role = getRoleById(document.getElementById('newRole')?.value);
    if (!wrap || !tags || !role) {
        if (wrap) wrap.style.display = 'none';
        return;
    }
    wrap.style.display = 'block';
    tags.innerHTML = role.perms.map(k => `<span class="perm-tag">${menuLabel(k)}</span>`).join('');
}

// ─── 직원 등록 ────────────────────────────────────────────────
function saveStaff() {
    const name  = document.getElementById('newName').value.trim();
    const email = document.getElementById('newEmail').value.trim();
    const pw    = document.getElementById('newPw').value.trim();
    const pwConfirm = document.getElementById('newPwConfirm').value.trim();
    const roleId = document.getElementById('newRole')?.value || '';
    const status = normalizeStaffStatus(document.getElementById('newStatus')?.value || 'active');

    if (!name)           { showToast('이름을 입력해 주세요.', 'error'); return; }
    if (!email)          { showToast('이메일을 입력해 주세요.', 'error'); return; }
    if (staffData.some(s => String(s.email || '').toLowerCase() === email.toLowerCase())) { showToast('이미 등록된 이메일입니다.', 'error'); return; }
    if (!roleId) { showToast('역할을 선택해 주세요.', 'error'); return; }
    if (roleId === 'sys_admin') { showToast('관리자 계정은 호텔 설정의 관리자 정보에서 관리합니다.', 'error'); return; }
    if (!pw || !pwConfirm) { showToast('비밀번호와 확인값을 모두 입력해 주세요.', 'error'); return; }
    if (pw !== pwConfirm) { showToast('비밀번호가 서로 일치하지 않습니다.', 'error'); return; }
    if (pw.length < 8) { showToast('비밀번호는 8자 이상으로 입력해 주세요.', 'error'); return; }
    const hireDate = document.getElementById('newHireDate').value;
    const terminationDate = document.getElementById('newTerminationDate').value;
    if (hireDate && terminationDate && terminationDate < hireDate) {
        showToast(staffText('퇴사일은 입사일보다 빠를 수 없습니다.', 'Termination date cannot be earlier than the hire date.'), 'error');
        document.getElementById('newTerminationDate').focus();
        return;
    }
    const selectedRole = getRoleById(roleId);

    const newStaff = {
        id: 'staff_' + Date.now(),
        name,
        email,
        empId: document.getElementById('newEmpId').value.trim(),
        phone: document.getElementById('newPhone').value.trim(),
        address: document.getElementById('newAddress').value.trim(),
        hireDate,
        terminationDate,
        roleId,
        color: selectedRole?.color || '#64748B',
        status,
        password: pw,
        last: '방금 등록',
        passwordUpdatedAt: new Date().toISOString(),
        passwordChangeRequired: false
    };
    staffData.push(newStaff);

    staffData = saveStaffData(staffData);
    logStaffAudit('staff.create', newStaff, {
        fields: ['employeeId', 'role', 'status', 'hireDate'],
        employeeId: newStaff.empId,
        afterRole: newStaff.roleId,
        afterStatus: newStaff.status,
        hireDate: newStaff.hireDate
    });
    renderStaff();
    closeModal('addStaffModal');
    resetAddForm();
    showToast(`${name} 직원이 등록되었습니다.`, 'success');
}

function resetAddForm() {
    document.getElementById('newName').value  = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newEmpId').value = '';
    document.getElementById('newPw').value    = '';
    document.getElementById('newPwConfirm').value = '';
    ['newPhone','newAddress','newHireDate','newTerminationDate'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
    });
    populateNewRoleOptions();
    const status = document.getElementById('newStatus');
    if (status) status.value = 'active';
    renderNewPermPreview();
}

// ─── 편집 ─────────────────────────────────────────────────────
function openEdit(id) {
    const s = staffData.find(x => x.id === id);
    if (!s) return;
    if (isSettingsManagedAdmin(s)) {
        showToast('관리자 계정은 호텔 설정의 관리자 정보에서 관리합니다.', 'info');
        return;
    }
    editingId = id;
    populateEditRoleOptions(s.roleId);
    document.getElementById('editName').value   = s.name;
    document.getElementById('editEmpId').value  = s.empId || '';
    document.getElementById('editEmail').value  = s.email;
    document.getElementById('editPhone').value = s.phone || '';
    document.getElementById('editAddress').value = s.address || '';
    document.getElementById('editHireDate').value = s.hireDate || '';
    document.getElementById('editTerminationDate').value = s.terminationDate || '';
    document.getElementById('editStatus').value = normalizeStaffStatus(s.status);
    renderEditPermPreview();
    document.getElementById('editNewPw').value = '';
    document.getElementById('editNewPwConfirm').value = '';
    openModal('editStaffModal');
}

let lastStaffEditActivation = 0;

function handleStaffEditActivation(event) {
    const button = event.target.closest('[data-staff-edit]');
    const row = event.target.closest('tr[data-staff-edit-row]');
    if (!button && !row) return;
    if (!button && !window.matchMedia('(max-width: 1024px)').matches) return;
    if (!button && event.target.closest('a, button, input, select, textarea')) return;
    const now = Date.now();
    if (now - lastStaffEditActivation < 350) return;
    lastStaffEditActivation = now;
    event.preventDefault();
    event.stopPropagation();
    openEdit(button?.dataset.staffEdit || row?.dataset.staffEditRow);
}

const staffBodyEl = document.getElementById('staffBody');
staffBodyEl?.addEventListener('click', handleStaffEditActivation);
staffBodyEl?.addEventListener('pointerup', handleStaffEditActivation);
staffBodyEl?.addEventListener('touchend', handleStaffEditActivation, { passive: false });

function saveEdit() {
    const s = staffData.find(x => x.id === editingId);
    if (!s) return;
    if (isSettingsManagedAdmin(s)) {
        showToast('관리자 계정은 호텔 설정의 관리자 정보에서 관리합니다.', 'error');
        return;
    }
    const before = {
        name: s.name || '',
        empId: s.empId || '',
        roleId: s.roleId || '',
        status: normalizeStaffStatus(s.status),
        hireDate: s.hireDate || '',
        terminationDate: s.terminationDate || ''
    };
    s.name   = document.getElementById('editName').value.trim();
    s.empId  = document.getElementById('editEmpId').value.trim();
    const nextEmail = document.getElementById('editEmail').value.trim();
    if (!nextEmail) { showToast('이메일을 입력해 주세요.', 'error'); return; }
    if (staffData.some(item => item.id !== s.id && String(item.email || '').toLowerCase() === nextEmail.toLowerCase())) {
        showToast('이미 등록된 이메일입니다.', 'error');
        return;
    }
    s.email = nextEmail;
    const hireDate = document.getElementById('editHireDate').value;
    const terminationDate = document.getElementById('editTerminationDate').value;
    if (hireDate && terminationDate && terminationDate < hireDate) {
        showToast(staffText('퇴사일은 입사일보다 빠를 수 없습니다.', 'Termination date cannot be earlier than the hire date.'), 'error');
        document.getElementById('editTerminationDate').focus();
        return;
    }
    s.phone = document.getElementById('editPhone').value.trim();
    s.address = document.getElementById('editAddress').value.trim();
    s.hireDate = hireDate;
    s.terminationDate = terminationDate;
    const nextRoleId = document.getElementById('editRole').value;
    if (!nextRoleId) { showToast('역할을 선택해 주세요.', 'error'); return; }
    if (nextRoleId === 'sys_admin') { showToast('관리자 역할은 직원 관리에서 부여할 수 없습니다.', 'error'); return; }
    s.roleId = nextRoleId;
    s.status = normalizeStaffStatus(document.getElementById('editStatus').value);
    
    const newPw = document.getElementById('editNewPw').value.trim();
    const newPwConfirm = document.getElementById('editNewPwConfirm').value.trim();
    if (newPw || newPwConfirm) {
        if (!newPw || !newPwConfirm) { showToast('새 비밀번호와 확인값을 모두 입력해 주세요.', 'error'); return; }
        if (newPw !== newPwConfirm) { showToast('새 비밀번호가 서로 일치하지 않습니다.', 'error'); return; }
        if (newPw.length < 8) { showToast('비밀번호는 8자 이상으로 입력해 주세요.', 'error'); return; }
        s.passwordUpdatedAt = new Date().toISOString();
        s.passwordChangeRequired = false;
        s.passwordMethod = 'manual';
        s.password = newPw;
    }

    const role = getRoleById(s.roleId);
    if (role) s.color = role.color;
    staffData = saveStaffData(staffData);
    logStaffAudit('staff.update', s, {
        fields: ['staffName', 'employeeId', 'role', 'status', 'hireDate', 'terminationDate'],
        beforeName: before.name,
        afterName: s.name,
        beforeEmployeeId: before.empId,
        afterEmployeeId: s.empId,
        beforeRole: before.roleId,
        afterRole: s.roleId,
        beforeStatus: before.status,
        afterStatus: s.status,
        beforeHireDate: before.hireDate,
        afterHireDate: s.hireDate,
        beforeTerminationDate: before.terminationDate,
        afterTerminationDate: s.terminationDate
    });
    renderStaff();
    closeModal('editStaffModal');
    showToast(newPw ? '직원 정보와 비밀번호가 수정되었습니다.' : '직원 정보가 수정되었습니다.', 'success');
}

async function deleteStaff() {
    const s = staffData.find(x => x.id === editingId);
    if (isSettingsManagedAdmin(s)) {
        showToast('관리자 계정은 직원 관리에서 삭제할 수 없습니다.', 'error');
        return;
    }
    const confirmMessage = typeof window.t === 'function'
        ? window.t('staff.delete.confirm')
        : '이 직원을 삭제하시겠습니까?';
    if (!await showConfirm(confirmMessage)) return;
    logStaffAudit('staff.delete', s, {
        fields: ['staffId', 'staffName', 'employeeId', 'role', 'status'],
        employeeId: s.empId || '',
        beforeRole: s.roleId || '',
        beforeStatus: normalizeStaffStatus(s.status)
    });
    staffData = staffData.filter(x => x.id !== editingId);
    staffData = saveStaffData(staffData);
    renderStaff();
    closeModal('editStaffModal');
    showToast('직원이 삭제되었습니다.', 'info');
}

// ─── 모달 ─────────────────────────────────────────────────────
function openModal(id) {
    if (id === 'addStaffModal') {
        refreshStaffStatusOptions();
        populateNewRoleOptions(document.getElementById('newRole')?.value || '');
        renderNewPermPreview();
    }
    if (id === 'editStaffModal') {
        populateEditRoleOptions(document.getElementById('editRole')?.value);
        renderEditPermPreview();
    }
    document.getElementById(id).classList.add('active');
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ─── 토스트 ───────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const old = document.getElementById('pms-toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const styles = { success:'#065F46,#D1FAE5,fa-circle-check', error:'#991B1B,#FEE2E2,fa-circle-xmark', info:'#1E3A8A,#DBEAFE,fa-circle-info' };
    const [tc,bg,ico] = (styles[type] || styles.success).split(',');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${tc};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;display:flex;align-items:center;gap:8px;transition:opacity .3s,transform .3s`;
    t.innerHTML = `<i class="fa-solid ${ico}"></i>${msg}`;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(12px)'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// ─── 초기 실행 ────────────────────────────────────────────────
buildRoleFilter();
renderStaff();
</script>


<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        ALL_MENUS = await PmsAPI.getALL_MENUS();
        SYSTEM_ROLES = await PmsAPI.getSYSTEM_ROLES();
        DEFAULT_CUSTOM_ROLES = await PmsAPI.getDEFAULT_CUSTOM_ROLES();
        DEFAULT_STAFF = await PmsAPI.getDEFAULT_STAFF();
        
        const savedStaff = localStorage.getItem('pms_staff');
        const loadedStaff = savedStaff ? JSON.parse(savedStaff) : DEFAULT_STAFF;
        const normalizedStaff = normalizeSingleAdminStaff(loadedStaff);
        staffData = normalizedStaff.items;
        if (normalizedStaff.changed) {
            staffData = saveStaffData(staffData, { silent: true });
            showToast('관리자 권한은 한 명만 유지됩니다. 중복 관리자는 총괄 매니저로 조정했습니다.', 'info');
        }

        buildRoleFilter();
        refreshStaffStatusOptions();
        populateNewRoleOptions();
        renderNewPermPreview();
        populateEditRoleOptions();
        renderStaff();
    } catch(e) { console.error(e); }
});
window.applyLocalI18n = function applyStaffLocalI18n() {
    applyStaffLanguage();
};
window.addEventListener('languagechange', () => {
    applyStaffLanguage();
});
</script>

})();
