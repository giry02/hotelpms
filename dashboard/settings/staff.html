<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>직원 관리 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/settings.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-settings.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script>
        let ALL_MENUS = [];
    </script>
    <style>
        .staff-avatar { width: 38px; height: 38px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: .78rem; font-weight: 700; color: #fff; flex-shrink: 0; }
        .role-pill { display: inline-flex; align-items: center; gap: 5px; padding: 4px 10px; border-radius: 20px; font-size: .72rem; font-weight: 700; }

        /* 역할 선택 카드 */
        .role-pick-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .role-pick-card {
            border: 2px solid var(--border); border-radius: var(--radius);
            padding: 14px 10px; text-align: center; cursor: pointer;
            transition: all .2s;
        }
        .role-pick-card:hover { border-color: var(--primary); background: var(--primary-lt); }
        .role-pick-card.selected { border-color: var(--primary); background: var(--primary-lt); }
        .role-pick-card .rpc-icon { font-size: 1.4rem; margin-bottom: 6px; }
        .role-pick-card .rpc-name { font-size: .82rem; font-weight: 700; color: var(--txt); }
        .role-pick-card .rpc-desc { font-size: .7rem; color: var(--txt3); margin-top: 2px; }

        /* 권한 미리보기 */
        .perm-preview-wrap { background: var(--border2); border-radius: var(--radius-sm); padding: 12px 14px; }
        .perm-tag { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 12px; font-size: .72rem; font-weight: 600; background: #fff; border: 1px solid var(--border); color: var(--txt2); margin: 3px; }
    </style>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
</head>
<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Staff Mgmt">직원 관리</h1></header>

    <div class="content">

        <!-- KPI -->
        <div class="kpi-grid" style="grid-template-columns:repeat(4,1fr)">
            <div class="kpi-card blue">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-users-gear"></i></div></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-label">전체 직원</div></div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-circle-dot"></i></div></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiOnline">0</div><div class="kpi-label">근무 중</div></div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-shield-halved"></i></div></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiRoles">0</div><div class="kpi-label">정의된 역할 수</div></div>
            </div>
            <div class="kpi-card orange" style="background:linear-gradient(135deg,#FEF3C7,#fff)">
                <div class="kpi-top"><div class="kpi-icon" style="background:#FDE68A;color:#B45309"><i class="fa-solid fa-user-slash"></i></div></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiOffline">0</div><div class="kpi-label">오프라인</div></div>
            </div>
        </div>

        <!-- 직원 목록 카드 -->
        <div class="card">
            <div class="card-body" style="padding:20px 20px 0">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
                    <div style="font-size:1rem;font-weight:700;color:var(--txt);display:flex;align-items:center;gap:8px">
                        <i class="fa-solid fa-users" style="color:var(--primary)"></i> 직원 목록
                    </div>
                    <div style="display:flex;gap:8px;align-items:center">
                        <a href="roles.html" class="btn-outline" style="font-size:.8rem;padding:6px 12px;text-decoration:none">
                            <i class="fa-solid fa-shield-halved"></i> 권한 설정
                        </a>
                        <button class="btn-primary-sm" onclick="openModal('addStaffModal')">
                            <i class="fa-solid fa-user-plus"></i> 직원 등록
                        </button>
                    </div>
                </div>
                <!-- 필터 -->
                <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
                    <div class="search-box" style="flex:1;min-width:200px">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" id="searchInput" placeholder="이름, 이메일 검색..." oninput="renderStaff()">
                    </div>
                    <select class="hotel-select" id="roleFilter" onchange="renderStaff()" style="min-width:140px">
                        <option value="all">전체 역할</option>
                    </select>
                    <select class="hotel-select" id="statusFilter" onchange="renderStaff()" style="min-width:120px">
                        <option value="all">전체 상태</option>
                        <option value="online">근무 중</option>
                        <option value="offline">오프라인</option>
                    </select>
                </div>
            </div>
            <!-- 테이블 -->
            <div style="padding:0 20px 20px">
                <div class="table-wrap">
                    <table>
                        <thead>
                            <tr>
                                <th>직원</th>
                                <th>역할</th>
                                <th>접근 권한 수</th>
                                <th>상태</th>
                                <th>최근 접속</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="staffBody"></tbody>
                    </table>
                </div>
                <div id="emptyState" style="display:none;text-align:center;padding:40px;color:var(--txt3)">
                    <i class="fa-solid fa-users" style="font-size:2rem;margin-bottom:8px;display:block"></i>
                    검색 결과가 없습니다.
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ── 직원 등록 모달 ── -->
<div class="modal-overlay" id="addStaffModal" onclick="if(event.target===this) closeModal('addStaffModal')">
    <div class="modal-card" style="max-width:580px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-user-plus" style="color:var(--primary);margin-right:8px"></i>신규 직원 등록</h3>
            <button class="modal-close" onclick="closeModal('addStaffModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">이름 <span style="color:var(--danger)">*</span></label>
                    <input type="text" class="form-control" id="newName" placeholder="예: 홍길동">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">사번 / ID</label>
                    <input type="text" class="form-control" id="newEmpId" placeholder="EMP-001">
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label">이메일 (로그인 ID) <span style="color:var(--danger)">*</span></label>
                <input type="email" class="form-control" id="newEmail" placeholder="user@hotel.com">
            </div>

            <!-- 역할 선택 -->
            <div style="display:flex;flex-direction:column;gap:8px">
                <label class="form-label">
                    역할 선택 <span style="color:var(--danger)">*</span>
                    <a href="roles.html" style="font-size:.72rem;color:var(--primary);margin-left:8px">
                        <i class="fa-solid fa-arrow-up-right-from-square"></i> 역할 관리
                    </a>
                </label>
                <div class="role-pick-grid" id="rolePickGrid"></div>
            </div>

            <!-- 선택된 역할의 권한 미리보기 -->
            <div id="permPreview" style="display:none">
                <div class="perm-preview-wrap">
                    <div style="font-size:.78rem;font-weight:700;color:var(--txt);margin-bottom:8px">
                        <i class="fa-solid fa-eye" style="color:var(--primary);margin-right:4px"></i>
                        이 역할로 접근 가능한 메뉴
                    </div>
                    <div id="permPreviewTags"></div>
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label">임시 비밀번호 <span style="color:var(--danger)">*</span></label>
                <input type="password" class="form-control" id="newPw" placeholder="초기 비밀번호를 입력하세요">
            </div>

        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('addStaffModal')">취소</button>
            <button class="btn-primary-sm" onclick="saveStaff()"><i class="fa-solid fa-check"></i> 계정 생성</button>
        </div>
    </div>
</div>

<!-- ── 편집 모달 ── -->
<div class="modal-overlay" id="editStaffModal" onclick="if(event.target===this) closeModal('editStaffModal')">
    <div class="modal-card" style="max-width:480px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-pen" style="color:var(--primary);margin-right:8px"></i>직원 정보 편집</h3>
            <button class="modal-close" onclick="closeModal('editStaffModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">이름</label>
                    <input type="text" class="form-control" id="editName">
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">사번</label>
                    <input type="text" class="form-control" id="editEmpId">
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label">ID (이메일)</label>
                <input type="email" class="form-control" id="editEmail" readonly style="background:#f1f5f9">
            </div>
            
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">역할 변경</label>
                    <select class="form-control" id="editRole"></select>
                </div>
                <div style="display:flex;flex-direction:column;gap:6px">
                    <label class="form-label">상태</label>
                    <select class="form-control" id="editStatus">
                        <option value="online">근무 중</option>
                        <option value="offline">오프라인</option>
                    </select>
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px;padding-top:10px;border-top:1px solid var(--border2)">
                <label class="form-label">비밀번호 초기화</label>
                <div style="display:flex; gap:8px;">
                    <input type="text" class="form-control" id="editResetPw" placeholder="새 비밀번호 입력 (또는 발송 클릭)" style="flex:1;">
                    <button class="btn-outline" style="white-space:nowrap;" onclick="sendTempPw()"><i class="fa-solid fa-envelope"></i> 임시 비밀번호 이메일 발송</button>
                </div>
            </div>
        </div>
        <div class="modal-footer" style="display:flex; justify-content:space-between;">
            <button class="btn-outline danger" onclick="deleteStaff()" style="color:#DC2626;border-color:#FECACA">
                <i class="fa-solid fa-trash"></i> 삭제
            </button>
            <div style="display:flex; gap:8px;">
                <button class="btn-outline" onclick="closeModal('editStaffModal')">취소</button>
                <button class="btn-primary-sm" onclick="saveEdit()"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
            </div>
        </div>
    </div>
</div>

<script>
// ─── 시스템 기본 역할 ─────────────────────
let SYSTEM_ROLES = [];

let DEFAULT_CUSTOM_ROLES = [];

const MENU_LABEL = {
    dashboard:'대시보드', reservation:'예약 관리', checkin:'체크인/아웃',
    crm:'고객 CRM', rooms:'객실 관리', rates:'요금 캘린더',
    housekeeping:'하우스키핑', folio:'정산/청구', ancillary:'부가서비스',
    settings:'호텔 설정', staff:'직원 관리', billing:'요금 및 결제',
};

function loadCustomRoles() {
    try { 
        const saved = localStorage.getItem('pms_custom_roles');
        if (saved) return JSON.parse(saved);
        return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES));
    } catch { return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES)); }
}

function getAllRoles() {
    return [...SYSTEM_ROLES, ...loadCustomRoles()];
}

function getRoleById(id) {
    return getAllRoles().find(r => r.id === id);
}

// ─── 직원 데이터 (localStorage) ────────────────────────────────
let DEFAULT_STAFF = [];

function loadStaff() {
    try { return JSON.parse(localStorage.getItem('pms_staff') || 'null') || DEFAULT_STAFF; } catch { return DEFAULT_STAFF; }
}
function saveStaffData(data) { localStorage.setItem('pms_staff', JSON.stringify(data)); }

let staffData = loadStaff();
let editingId = null;
let selectedRoleId = null;

// ─── KPI 업데이트 ──────────────────────────────────────────────
function updateKPI() {
    document.getElementById('kpiTotal').textContent   = staffData.length;
    document.getElementById('kpiOnline').textContent  = staffData.filter(s => s.status === 'online').length;
    document.getElementById('kpiOffline').textContent = staffData.filter(s => s.status === 'offline').length;
    document.getElementById('kpiRoles').textContent   = getAllRoles().length;
}

// ─── 역할 필터 드롭다운 ────────────────────────────────────────
function buildRoleFilter() {
    const sel = document.getElementById('roleFilter');
    sel.innerHTML = '<option value="all">전체 역할</option>' +
        getAllRoles().map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

// ─── 직원 목록 렌더링 ──────────────────────────────────────────
function renderStaff() {
    const search     = document.getElementById('searchInput').value.toLowerCase();
    const roleFilter = document.getElementById('roleFilter').value;
    const statusFilter = document.getElementById('statusFilter').value;

    const filtered = staffData.filter(s => {
        if (roleFilter !== 'all' && s.roleId !== roleFilter) return false;
        if (statusFilter !== 'all' && s.status !== statusFilter) return false;
        if (search && !s.name.toLowerCase().includes(search) && !s.email.toLowerCase().includes(search)) return false;
        return true;
    });

    const tbody = document.getElementById('staffBody');
    const empty = document.getElementById('emptyState');

    if (filtered.length === 0) {
        tbody.innerHTML = '';
        empty.style.display = 'block';
        return;
    }
    empty.style.display = 'none';

    tbody.innerHTML = filtered.map(s => {
        const role = getRoleById(s.roleId);
        const roleName  = role ? role.name  : '역할 없음';
        const roleColor = role ? role.color : '#9CA3AF';
        const permCount = role ? role.perms.length : 0;
        const dot = s.status === 'online'
            ? `<span class="status-dot" style="background:var(--success)"></span> 근무 중`
            : `<span class="status-dot" style="background:var(--txt3)"></span> 오프라인`;
        return `<tr>
            <td>
                <div class="guest-cell">
                    <div class="staff-avatar" style="background:${s.color || roleColor}">${s.init}</div>
                    <div>
                        <strong>${s.name}</strong><br>
                        <span style="font-size:.72rem;color:var(--txt3)">${s.email}</span>
                    </div>
                </div>
            </td>
            <td>
                <span class="role-pill" style="background:${roleColor}22;color:${roleColor}">
                    ${roleName}
                </span>
            </td>
            <td>
                <span style="font-size:.82rem;font-weight:600;color:var(--txt)">${permCount}</span>
                <span style="font-size:.72rem;color:var(--txt3)"> 개</span>
            </td>
            <td>${dot}</td>
            <td style="font-size:.82rem;color:var(--txt2)">${s.last}</td>
            <td>
                <button class="btn-outline-sm" onclick="openEdit('${s.id}')">
                    <i class="fa-solid fa-pen"></i> 편집
                </button>
            </td>
        </tr>`;
    }).join('');
}

// ─── 역할 선택 카드 렌더링 ────────────────────────────────────
function renderRolePickGrid() {
    const grid = document.getElementById('rolePickGrid');
    const roles = getAllRoles();
    grid.innerHTML = roles.map(r => `
        <div class="role-pick-card${selectedRoleId === r.id ? ' selected' : ''}"
             onclick="selectRole('${r.id}', this)"
             style="${selectedRoleId === r.id ? `border-color:${r.color};background:${r.color}11` : ''}">
            <div class="rpc-icon" style="color:${r.color}"><i class="fa-solid fa-user-shield"></i></div>
            <div class="rpc-name">${r.name}</div>
            <div class="rpc-desc">${r.desc || r.perms.length + '개 권한'}</div>
        </div>
    `).join('');

    // edit modal role options
    const editSel = document.getElementById('editRole');
    editSel.innerHTML = roles.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
}

function selectRole(id, el) {
    selectedRoleId = id;
    document.querySelectorAll('.role-pick-card').forEach(c => {
        c.classList.remove('selected');
        c.style.borderColor = '';
        c.style.background  = '';
    });
    const role = getRoleById(id);
    if (role) {
        el.classList.add('selected');
        el.style.borderColor = role.color;
        el.style.background  = role.color + '11';
        showPermPreview(role);
    }
}

function showPermPreview(role) {
    document.getElementById('permPreview').style.display = 'block';
    document.getElementById('permPreviewTags').innerHTML = role.perms.map(k => `
        <span class="perm-tag">${MENU_LABEL[k] || k}</span>
    `).join('');
}

// ─── 직원 등록 ────────────────────────────────────────────────
function saveStaff() {
    const name  = document.getElementById('newName').value.trim();
    const email = document.getElementById('newEmail').value.trim();
    const pw    = document.getElementById('newPw').value.trim();

    if (!name)           { showToast('이름을 입력해 주세요.', 'error'); return; }
    if (!email)          { showToast('이메일을 입력해 주세요.', 'error'); return; }
    if (!selectedRoleId) { showToast('역할을 선택해 주세요.', 'error'); return; }
    if (!pw)             { showToast('임시 비밀번호를 입력해 주세요.', 'error'); return; }

    const role     = getRoleById(selectedRoleId);
    const initials = name.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);

    staffData.push({
        id: 'staff_' + Date.now(),
        name, init: initials, email, phone: '-',
        roleId: selectedRoleId, status: 'offline', last: '방금 등록',
        color: role ? role.color : '#6B7280'
    });

    saveStaffData(staffData);
    renderStaff();
    updateKPI();
    closeModal('addStaffModal');
    resetAddForm();
    showToast(`${name} 직원이 등록되었습니다.`, 'success');
}

function resetAddForm() {
    document.getElementById('newName').value  = '';
    document.getElementById('newEmail').value = '';
    document.getElementById('newEmpId').value = '';
    document.getElementById('newPw').value    = '';
    selectedRoleId = null;
    document.getElementById('permPreview').style.display = 'none';
    renderRolePickGrid();
}

// ─── 편집 ─────────────────────────────────────────────────────
function openEdit(id) {
    const s = staffData.find(x => x.id === id);
    if (!s) return;
    editingId = id;
    document.getElementById('editName').value   = s.name;
    document.getElementById('editEmpId').value  = s.empId || '';
    document.getElementById('editEmail').value  = s.email;
    document.getElementById('editRole').value   = s.roleId;
    document.getElementById('editStatus').value = s.status;
    document.getElementById('editResetPw').value = '';
    openModal('editStaffModal');
}

function saveEdit() {
    const s = staffData.find(x => x.id === editingId);
    if (!s) return;
    s.name   = document.getElementById('editName').value.trim();
    s.empId  = document.getElementById('editEmpId').value.trim();
    s.roleId = document.getElementById('editRole').value;
    s.status = document.getElementById('editStatus').value;
    
    const newPw = document.getElementById('editResetPw').value.trim();
    if (newPw) {
        showToast('비밀번호가 성공적으로 초기화되었습니다.', 'success');
    }

    const role = getRoleById(s.roleId);
    if (role) s.color = role.color;
    saveStaffData(staffData);
    renderStaff();
    closeModal('editStaffModal');
    showToast('직원 정보가 수정되었습니다.', 'success');
}

function sendTempPw() {
    const pw = Math.random().toString(36).slice(-8);
    document.getElementById('editResetPw').value = pw;
    showToast('등록된 이메일로 임시 비밀번호가 발송되었습니다.', 'success');
}

async function deleteStaff() {
    if (!await showConfirm('이 직원을 삭제하시겠습니까?')) return;
    staffData = staffData.filter(x => x.id !== editingId);
    saveStaffData(staffData);
    renderStaff();
    updateKPI();
    closeModal('editStaffModal');
    showToast('직원이 삭제되었습니다.', 'info');
}

// ─── 모달 ─────────────────────────────────────────────────────
function openModal(id) {
    if (id === 'addStaffModal') renderRolePickGrid();
    document.getElementById(id).classList.add('active');
}
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ─── 토스트 ───────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const old = document.getElementById('pms-toast');
    if (old) old.remove();
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const styles = { success:'#065F46,#D1FAE5,fa-circle-check', error:'#991B1B,#FEE2E2,fa-circle-xmark', info:'#1E3A8A,#DBEAFE,fa-circle-info' };
    const [tc,bg,ico] = (styles[type] || styles.success).split(',');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${tc};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;display:flex;align-items:center;gap:8px;transition:opacity .3s,transform .3s`;
    t.innerHTML = `<i class="fa-solid ${ico}"></i>${msg}`;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(12px)'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// ─── 초기 실행 ────────────────────────────────────────────────
buildRoleFilter();
renderStaff();
updateKPI();
</script>


<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        ALL_MENUS = await PmsAPI.getALL_MENUS();
        SYSTEM_ROLES = await PmsAPI.getSYSTEM_ROLES();
        DEFAULT_CUSTOM_ROLES = await PmsAPI.getDEFAULT_CUSTOM_ROLES();
        DEFAULT_STAFF = await PmsAPI.getDEFAULT_STAFF();
        
        // Force replace if localStorage arrays are empty (Fix for empty screen)
        const savedRoles = localStorage.getItem('pms_custom_roles');
        if (!savedRoles || JSON.parse(savedRoles).length === 0) {
            localStorage.setItem('pms_custom_roles', JSON.stringify(DEFAULT_CUSTOM_ROLES));
        }
        const savedStaff = localStorage.getItem('pms_staff');
        if (!savedStaff || JSON.parse(savedStaff).length === 0) {
            localStorage.setItem('pms_staff', JSON.stringify(DEFAULT_STAFF));
            staffData = DEFAULT_STAFF;
        } else {
            staffData = JSON.parse(savedStaff);
        }

        buildRoleFilter();
        renderStaff();
        updateKPI();
    } catch(e) { console.error(e); }
});
</script>
<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
