<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hotel Settings — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/settings.css">
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
</head>
<body>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>Hotel Settings</h1>
            <span class="date-badge"><i class="fa-regular fa-calendar"></i> 2026년 5월 12일 (월)</span>
        </div>
        <div class="topbar-right">
            <div style="font-size:0.85rem;font-weight:700;color:var(--txt);margin-right:8px;display:flex;align-items:center;gap:4px"><i class="fa-solid fa-hotel" style="color:var(--primary)"></i> The Grand Saigon</div>
            <select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px">
                <option value="ko">🇰🇷 한국어</option><option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="content">
        <div class="settings-grid">
            <!-- Left Column: Basic Info -->
            <div style="display: flex; flex-direction: column; height: 100%;">
                <div class="form-section" id="sec-basic" style="height: 100%; display: flex; flex-direction: column; margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">Basic Info</div>
                        <div class="form-desc">호텔의 프로필 및 Contact 정보를 설정합니다. OTA Channel과 웹사이트에 노출됩니다.</div>
                    </div>
                    <div class="form-body" style="flex: 1; display: flex; flex-direction: column;">
                        <div class="form-row" style="flex: 1; grid-template-rows: auto auto auto 1fr;">
                            <div class="form-group full">
                                <label class="form-label">Hotel Name <span>*</span></label>
                                <input type="text" class="form-control" value="The Grand Saigon">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Main Phone</label>
                                <input type="text" class="form-control" value="+84 28 3915 5555">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Main Email</label>
                                <input type="email" class="form-control" value="info@grandsaigon.com">
                            </div>
                            <div class="form-group full">
                                <label class="form-label">Hotel Address</label>
                                <input type="text" class="form-control" value="8 Dong Khoi Street, District 1, Ho Chi Minh City">
                            </div>
                            <div class="form-group full" style="display: flex; flex-direction: column; height: 100%;">
                                <label class="form-label">Hotel Description (Multi)</label>
                                <textarea class="form-control" style="flex: 1; resize: none; min-height: 80px;">사이공 강의 아름다운 전망을 자랑하는 5성급 럭셔리 호텔입니다.</textarea>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Policy & Billing -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <div class="form-section" id="sec-policy" style="margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">Operational Policies</div>
                        <div class="form-desc">Check-in/out 시간 및 Cancel 정책을 설정합니다.</div>
                    </div>
                    <div class="form-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">Default Check-in</label>
                                <input type="time" class="form-control" value="15:00">
                            </div>
                            <div class="form-group">
                                <label class="form-label">Default Check-out</label>
                                <input type="time" class="form-control" value="11:00">
                            </div>
                            <div class="form-group full">
                                <label class="form-label">Cancellation Policy</label>
                                <select class="form-control">
                                    <option>Check-in 24시간 전까지 무료 Cancel (이후 1박 요금 부과)</option>
                                    <option selected>Check-in 48시간 전까지 무료 Cancel (이후 1박 요금 부과)</option>
                                    <option>환불 불가 (Non-refundable)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section" id="sec-billing" style="margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">Billing & Tax</div>
                        <div class="form-desc">기본 통화 및 부가세(VAT) 요율을 설정합니다.</div>
                    </div>
                    <div class="form-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">기본 결제 통화</label>
                                <select class="form-control"><option>USD ($)</option><option selected>KRW (₩)</option><option>VND (₫)</option></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">기본 세금(VAT) 비율</label>
                                <input type="number" class="form-control" value="10">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
            <button class="btn-primary-sm" style="padding: 10px 24px; font-size: 0.95rem;"><i class="fa-solid fa-check"></i> 변경사항 All Save</button>
        </div>
    </div>
</div>

<script>
// i18n
let currentLang='ko';
const translations={ko: {
        "Main": "메인",
        "Front Desk": "프론트 데스크",
        "Guest & CRM": "투숙객 및 CRM",
        "Operations": "운영 관리",
        "Settings": "설정",

        "Ancillary Svcs": "부가서비스",
        "Room Service": "룸서비스",
        "Golf": "골프",
        "Rent-a-car": "렌터카",
        "Hotel Settings": "호텔 설정",
        "Staff Mgmt": "직원 관리",
        "Billing & Payment": "요금 및 결제",
        "Notices": "공지사항",
        "Support": "고객지원",
"Hotel Settings":"호텔 설정","Dashboard":"대시보드","Reservations":"예약 타임라인","Booking List":"예약 목록","Check-in/out":"체크인/아웃","Guest CRM":"투숙객 관리","VIP Members":"VIP 멤버십","Room Mgmt":"객실 관리","Housekeeping":"하우스키핑","Folio & Billing":"통합 정산","Ancillary Svcs":"부가서비스","Staff Mgmt":"직원 관리","Basic Info":"기본 정보","Policies":"정책 및 규정","Billing & Tax":"결제 및 세금","Hotel Name":"호텔 이름","Main Phone":"대표 전화번호","Main Email":"대표 이메일","Hotel Address":"호텔 주소","Hotel Description (Multi)":"호텔 소개 (다국어 지원)","Cancel":"취소","Save":"저장","Operational Policies":"운영 정책","Default Check-in":"기본 체크인 시간","Default Check-out":"기본 체크아웃 시간","Cancellation Policy":"기본 취소 정책","Allow Overbooking":"오버부킹 (Overbooking) 허용","Require Deposit (Pre-auth)":"디파짓(보증금) 필수 청구"},en: {
        "Main": "Main",
        "Front Desk": "Front Desk",
        "Guest & CRM": "Guest & CRM",
        "Operations": "Operations",
        "Settings": "Settings",
        "Dashboard": "Dashboard",
        "Reservations": "Reservations",

        "Notices": "Notices",
        "Support": "Support",
"Hotel Settings":"Hotel Settings","Dashboard":"Dashboard","Reservations":"Reservations","Booking List":"Booking List","Check-in/out":"Check-in/out","Guest CRM":"Guest CRM","VIP Members":"VIP Members","Room Mgmt":"Room Mgmt","Housekeeping":"Housekeeping","Folio & Billing":"Folio & Billing","Ancillary Svcs":"Ancillary Svcs","Staff Mgmt":"Staff Mgmt","Basic Info":"Basic Info","Policies":"Policies","Billing & Tax":"Billing & Tax","Hotel Name":"Hotel Name","Main Phone":"Main Phone","Main Email":"Main Email","Hotel Address":"Hotel Address","Hotel Description (Multi)":"Hotel Description (Multi)","Cancel":"Cancel","Save":"Save","Operational Policies":"Operational Policies","Default Check-in":"Default Check-in","Default Check-out":"Default Check-out","Cancellation Policy":"Cancellation Policy","Allow Overbooking":"Allow Overbooking","Require Deposit (Pre-auth)":"Require Deposit (Pre-auth)"}};
function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){
    currentLang=l;
    const d=translations[l]||translations.ko;
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});
}
document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});
</script>
</body>
</html>
