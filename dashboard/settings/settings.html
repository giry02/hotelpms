<html lang="ko">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="../common/css/dashboard.css">

<body>

<div class="main">
        <header class="topbar"><h1 data-i18n-key="Hotel Settings">호텔 설정</h1></header>

    <div class="content">
        <div class="settings-grid">
            <!-- Left Column: 기본 정보 -->
            <div style="display: flex; flex-direction: column; height: 100%;">
                <div class="form-section" id="sec-basic" style="height: 100%; display: flex; flex-direction: column; margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">기본 정보</div>
                        <div class="form-desc">호텔의 프로필 및 Contact 정보를 설정합니다. OTA Channel과 웹사이트에 노출됩니다.</div>
                    </div>
                    <div class="form-body" style="flex: 1; display: flex; flex-direction: column;">
                        <div class="form-row" style="flex: 1; grid-template-rows: auto auto auto 1fr;">
                            <div class="form-group full">
                                <label class="form-label">호텔명 <span>*</span></label>
                                <input type="text" class="form-control" value="The Grand Saigon">
                            </div>
                            <div class="form-group">
                                <label class="form-label">대표 전화번호</label>
                                <input type="text" class="form-control" value="+84 28 3915 5555">
                            </div>
                            <div class="form-group">
                                <label class="form-label">대표 이메일</label>
                                <input type="email" class="form-control" value="info@grandsaigon.com">
                            </div>
                            <div class="form-group full">
                                <label class="form-label">호텔 주소</label>
                                <input type="text" class="form-control" value="8 Dong Khoi Street, District 1, Ho Chi Minh City">
                            </div>
                            <style>
.lang-btn { padding: 8px 16px; border: 1px solid var(--border); border-radius: 6px; background: #fff; color: var(--txt2); font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.lang-btn.active { background: var(--primary-lt); color: var(--primary); border-color: var(--primary); }
</style>
                            <div class="form-group full">
                                <label class="form-label" data-i18n-key="Default Multilingual Settings">기본다국어 설정</label>
                                <div style="display:flex; gap:10px; margin-top:8px; flex-wrap:wrap;">
                                    <button type="button" class="lang-btn active" onclick="this.classList.toggle('active')">한국어 (KO)</button>
                                    <button type="button" class="lang-btn active" onclick="this.classList.toggle('active')">English (EN)</button>
                                    <button type="button" class="lang-btn" onclick="this.classList.toggle('active')">日本語 (JA)</button>
                                    <button type="button" class="lang-btn" onclick="this.classList.toggle('active')">简体中文 (ZH)</button>
                                    <button type="button" class="lang-btn" onclick="this.classList.toggle('active')">Tiếng Việt (VI)</button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column: Policy & Billing -->
            <div style="display: flex; flex-direction: column; gap: 24px;">
                <div class="form-section" id="sec-policy" style="margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">운영 정책</div>
                        <div class="form-desc">체크인/체크아웃 시간 및 취소 정책을 설정합니다.</div>
                    </div>
                    <div class="form-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">기본 체크인 시간</label>
                                <input type="time" class="form-control" value="15:00">
                            </div>
                            <div class="form-group">
                                <label class="form-label">기본 체크아웃 시간</label>
                                <input type="time" class="form-control" value="11:00">
                            </div>
                            <div class="form-group full">
                                <label class="form-label">취소 정책</label>
                                <select class="form-control">
                                    <option>Check-in 24시간 전까지 무료 Cancel (이후 1박 요금 부과)</option>
                                    <option selected>Check-in 48시간 전까지 무료 Cancel (이후 1박 요금 부과)</option>
                                    <option>환불 불가 (Non-refundable)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-section" id="sec-billing" style="margin-bottom: 0;">
                    <div class="form-header">
                        <div class="form-title">결제 및 세금</div>
                        <div class="form-desc">기본 통화 및 부가세(VAT) 요율을 설정합니다.</div>
                    </div>
                    <div class="form-body">
                        <div class="form-row">
                            <div class="form-group">
                                <label class="form-label">기본 결제 통화</label>
                                <select class="form-control"><option>USD ($)</option><option selected>KRW (₩)</option><option>VND (₫)</option></select>
                            </div>
                            <div class="form-group">
                                <label class="form-label">기본 세금(VAT) 비율</label>
                                <input type="number" class="form-control" value="10">
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div style="display: flex; justify-content: flex-end; margin-top: 24px;">
            <button class="btn-primary-sm" style="padding: 10px 24px; font-size: 0.95rem;"><i class="fa-solid fa-check"></i> 변경사항 All Save</button>
        </div>
    </div>
</div>

function setupI18n(){const w=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);let n;const t=[];while(n=w.nextNode()){const o=n.nodeValue,x=o.trim();if(x&&translations.ko[x]&&!n.parentNode.hasAttribute('data-i18n-key')){const s=document.createElement('span');s.setAttribute('data-i18n-key',x);s.textContent=x;t.push({node:n,span:s,originalText:o})}}t.forEach(({node:n,span:s,originalText:o})=>{const f=document.createDocumentFragment();const l=o.match(/^\s+/),r=o.match(/\s+$/);if(l)f.appendChild(document.createTextNode(l[0]));f.appendChild(s);if(r)f.appendChild(document.createTextNode(r[0]));n.parentNode.replaceChild(f,n)})}
function changeLang(l){currentLang=l;window.currentLang=l;localStorage.setItem('pms_lang', l);
    const d = Object.assign({}, window.translations ? window.translations[l] : {}, translations[l] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(e=>{const k=e.getAttribute('data-i18n-key');if(d[k])e.textContent=d[k]});
}
function switchTab(targetId, el) {
    document.querySelectorAll('.desc-tab-content').forEach(e => e.style.display = 'none');
    document.getElementById(targetId).style.display = 'block';
    const tabs = el.parentElement.children;
    for(let i=0; i<tabs.length; i++) {
        tabs[i].style.borderBottom = '2px solid transparent';
        tabs[i].style.color = 'var(--txt2)';
        tabs[i].style.fontWeight = '400';
    }
    el.style.borderBottom = '2px solid var(--primary)';
    el.style.color = 'var(--primary)';
    el.style.fontWeight = '600';
}
document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang)});

<script>
(function(){
    function findCurrencySelect() {
        const selects = Array.from(document.querySelectorAll('select.form-control'));
        return selects.find(sel => Array.from(sel.options).some(o => /USD|KRW|VND/.test(o.textContent)));
    }
    function normalizeCurrencyText(text) {
        if (/USD/.test(text)) return 'USD';
        if (/VND/.test(text)) return 'VND';
        return 'KRW';
    }
    document.addEventListener('DOMContentLoaded', () => {
        const sel = findCurrencySelect();
        if (!sel) return;
        sel.id = 'defaultCurrencySelect';
        const saved = localStorage.getItem('pms_default_currency') || 'KRW';
        Array.from(sel.options).forEach((opt, idx) => {
            if (normalizeCurrencyText(opt.textContent) === saved) sel.selectedIndex = idx;
        });
        sel.addEventListener('change', () => {
            localStorage.setItem('pms_default_currency', normalizeCurrencyText(sel.options[sel.selectedIndex].textContent));
        });
        const saveBtn = Array.from(document.querySelectorAll('button')).find(btn => btn.textContent.includes('Save') || btn.textContent.includes('저장'));
        if (saveBtn) {
            saveBtn.addEventListener('click', () => {
                localStorage.setItem('pms_default_currency', normalizeCurrencyText(sel.options[sel.selectedIndex].textContent));
                if (window.showToast) showToast('기본 통화 설정이 저장되었습니다.');
            });
        }
    });
})();
</script>
<script>
// Sync language selector to stored preference

    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
