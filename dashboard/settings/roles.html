<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권한 설정 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/settings.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-settings.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .split-layout {
            display: flex; gap: 24px;
            align-items: flex-start;
            height: calc(100vh - 180px); /* 뷰포트에 맞춤 */
        }
        
        /* ── 좌측: 역할 목록 ── */
        .roles-sidebar {
            flex: 0 0 320px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            display: flex; flex-direction: column;
            height: 100%;
            overflow: hidden;
        }
        .roles-sidebar-header {
            padding: 16px 20px;
            border-bottom: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: space-between;
        }
        .roles-sidebar-header h2 { font-size: 1rem; margin: 0; color: var(--txt); }
        .roles-list {
            flex: 1; overflow-y: auto;
            padding: 12px;
            display: flex; flex-direction: column; gap: 6px;
        }
        .role-list-item {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px;
            border-radius: var(--radius-sm);
            border: 1px solid transparent;
            cursor: pointer;
            transition: all .2s;
        }
        .role-list-item:hover { background: var(--bg-body); border-color: var(--border2); }
        .role-list-item.active { background: var(--primary-lt); border-color: var(--primary); }
        
        .role-list-icon {
            width: 38px; height: 38px; border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.1rem; flex-shrink: 0;
        }
        .role-list-info { flex: 1; min-width: 0; }
        .role-list-name { font-size: .9rem; font-weight: 700; color: var(--txt); margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
        .role-list-count { font-size: .75rem; color: var(--txt3); }
        
        .sys-badge {
            font-size: .6rem; padding: 2px 6px; border-radius: 12px;
            background: var(--txt3); color: #fff; font-weight: 700;
        }

        /* ── 우측: 편집 에리어 ── */
        .role-editor {
            flex: 1;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            height: 100%;
            display: flex; flex-direction: column;
            position: relative;
        }
        .editor-header {
            padding: 20px 24px;
            border-bottom: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: space-between;
        }
        .editor-title { font-size: 1.1rem; font-weight: 700; color: var(--txt); }
        .editor-body {
            padding: 24px; flex: 1; overflow-y: auto;
            display: flex; flex-direction: column; gap: 24px;
        }
        
        /* 폼 요소 */
        .form-row { display: flex; gap: 20px; }
        .form-col { flex: 1; display: flex; flex-direction: column; gap: 8px; }
        
        /* 색상 선택 */
        .color-picker { display: flex; gap: 10px; flex-wrap: wrap; }
        .color-dot {
            width: 32px; height: 32px; border-radius: 50%;
            cursor: pointer; border: 3px solid transparent;
            position: relative;
            transition: transform .15s, border-color .15s;
        }
        .color-dot:hover { transform: scale(1.1); }
        .color-dot.selected { border-color: var(--txt); }
        .color-dot.unavailable { cursor: not-allowed; opacity: .38; }
        .color-dot.unavailable:hover { transform: none; }
        .color-dot.unavailable::after {
            content: "";
            position: absolute;
            left: 5px; right: 5px; top: 50%;
            border-top: 2px solid rgba(255,255,255,.9);
            transform: rotate(-35deg);
            box-shadow: 0 0 0 1px rgba(0,0,0,.18);
        }
        
        /* 권한 체크박스 그리드 */
        .perm-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 12px;
        }
        .perm-check-item {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer; transition: all .15s; user-select: none;
            background: #fff;
        }
        .perm-check-item:hover:not(.disabled) { border-color: var(--primary); }
        .perm-check-item.checked { border-color: var(--primary); background: var(--primary-lt); }
        .perm-check-item.disabled { opacity: 0.6; cursor: not-allowed; background: var(--bg-body); }
        
        .perm-check-item .check-box {
            width: 20px; height: 20px; border: 2px solid var(--border); border-radius: 4px;
            display: flex; align-items: center; justify-content: center;
            font-size: .7rem; color: #fff; flex-shrink: 0;
            transition: all .15s;
        }
        .perm-check-item.checked .check-box { background: var(--primary); border-color: var(--primary); }
        .perm-check-item .check-label { font-size: .85rem; font-weight: 600; color: var(--txt2); }
        .perm-check-item.checked .check-label { color: var(--primary); }
        .perm-check-item .check-icon { color: var(--txt3); width: 16px; text-align: center; }
        .perm-check-item.checked .check-icon { color: var(--primary); }

        .editor-footer {
            padding: 16px 24px;
            border-top: 1px solid var(--border2);
            background: #f8fafc; border-radius: 0 0 var(--radius) var(--radius);
            display: flex; justify-content: space-between; align-items: center;
        }
        
        .empty-state {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100%; color: var(--txt3); gap: 12px;
        }
    </style>
</head>
<body>

<div class="main">
    <header class="topbar"><h1 data-i18n-key="Role & Perms">권한 설정</h1></header>

    <div class="content" style="padding-bottom: 20px;">
        <div style="margin-bottom:20px">
            <div style="font-size:1.1rem;font-weight:700;color:var(--txt)">역할 및 접근 권한 관리</div>
            <div style="font-size:.82rem;color:var(--txt3);margin-top:3px">왼쪽에서 역할을 선택하여 우측에서 권한을 확인하거나 수정하세요.</div>
        </div>

        <div class="split-layout">
            <!-- 좌측: 역할 목록 -->
            <div class="roles-sidebar">
                <div class="roles-sidebar-header">
                    <h2>역할 목록</h2>
                    <button class="btn-primary-sm" style="padding:6px 12px;font-size:.75rem" onclick="initCreateMode()">
                        <i class="fa-solid fa-plus"></i> 추가
                    </button>
                </div>
                <div class="roles-list" id="rolesList">
                    <!-- 목록 렌더링 -->
                </div>
            </div>

            <!-- 우측: 편집 에리어 -->
            <div class="role-editor" id="roleEditor">
                <div class="empty-state">
                    <i class="fa-solid fa-hand-pointer" style="font-size:3rem"></i>
                    <p style="font-size:.95rem">왼쪽에서 역할을 선택하거나 <strong>+ 추가</strong> 버튼을 누르세요.</p>
                </div>
            </div>
        </div>

    </div>
</div>

<script>
// ─── 데이터 정의 ──────────────────────────────────────────────
let ALL_MENUS = [];
let SYSTEM_ROLES = [];
let DEFAULT_CUSTOM_ROLES = [];

const COLORS = [
    '#6D28D9','#111827','#2563EB','#059669',
    '#D97706','#0EA5E9','#7C3AED','#1D4ED8',
    '#0891B2','#065F46','#B45309','#DC2626',
    '#9D174D','#374151','#9333EA','#4F46E5',
    '#0284C7','#0D9488','#16A34A','#65A30D',
    '#CA8A04','#EA580C','#BE123C','#475569'
];

function normalizeColor(color) {
    return String(color || '').trim().toUpperCase();
}

function allRoles() {
    return [...SYSTEM_ROLES, ...customRoles];
}

function usedRoleColors(excludeRoleId = null) {
    return new Set(
        allRoles()
            .filter(role => role.id !== excludeRoleId)
            .map(role => normalizeColor(role.color))
            .filter(Boolean)
    );
}

function colorUsedByAnotherRole(color, excludeRoleId = null) {
    return usedRoleColors(excludeRoleId).has(normalizeColor(color));
}

function firstAvailableColor(excludeRoleId = null) {
    const used = usedRoleColors(excludeRoleId);
    return COLORS.find(color => !used.has(normalizeColor(color))) || '';
}

function colorOptions(selectedColor) {
    const seen = new Set();
    return [
        selectedColor,
        ...allRoles().map(role => role.color),
        ...COLORS
    ].filter(color => {
        const key = normalizeColor(color);
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function loadRoles() {
    try { 
        const saved = localStorage.getItem('pms_custom_roles');
        if (saved) {
            const parsed = JSON.parse(saved);
            // If old data is found (e.g. sys_housekeeping has more than 1 permission), force reset
            const hkRole = parsed.find(r => r.id === 'sys_housekeeping');
            if (parsed.length === 0 || !parsed.find(r => r.id === 'sys_gm') || (hkRole && hkRole.perms.length > 1)) {
                return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES));
            }
            return parsed;
        }
        return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES));
    } 
    catch { return JSON.parse(JSON.stringify(DEFAULT_CUSTOM_ROLES)); }
}
function saveRoles(roles) { localStorage.setItem('pms_custom_roles', JSON.stringify(roles)); }

let customRoles = [];
let currentRoleId = null;
let isCreating = false;

// ─── 렌더링 로직 ──────────────────────────────────────────────

function renderRolesList() {
    const list = document.getElementById('rolesList');
    const roleList = allRoles();
    
    list.innerHTML = roleList.map(r => {
        const activeCls = (currentRoleId === r.id) ? ' active' : '';
        return `
            <div class="role-list-item${activeCls}" onclick="selectRole('${r.id}')">
                <div class="role-list-icon" style="background:${r.color}22;color:${r.color}">
                    <i class="fa-solid fa-user-shield"></i>
                </div>
                <div class="role-list-info">
                    <div class="role-list-name">
                        ${r.name}
                        ${r.isSystem ? '<span class="sys-badge">SYS</span>' : ''}
                    </div>
                    <div class="role-list-count">${r.perms.length}개 권한</div>
                </div>
            </div>
        `;
    }).join('');
}

function selectRole(id) {
    currentRoleId = id;
    isCreating = false;
    renderRolesList();
    renderEditor();
}

function initCreateMode() {
    currentRoleId = null;
    isCreating = true;
    renderRolesList();
    renderEditor();
}

function renderEditor() {
    const editor = document.getElementById('roleEditor');
    
    if (isCreating) {
        editor.innerHTML = buildEditorHtml(null);
        renderColorPicker(firstAvailableColor());
        renderPermChecks([]);
        return;
    }
    
    if (!currentRoleId) {
        editor.innerHTML = `
            <div class="empty-state">
                <i class="fa-solid fa-hand-pointer" style="font-size:3rem"></i>
                <p style="font-size:.95rem">왼쪽에서 역할을 선택하거나 <strong>+ 추가</strong> 버튼을 누르세요.</p>
            </div>`;
        return;
    }
    
    const role = allRoles().find(r => r.id === currentRoleId);
    if (!role) return;
    
    editor.innerHTML = buildEditorHtml(role);
    renderColorPicker(role.color, role.isSystem);
    renderPermChecks(role.perms, role.isSystem);
}

function buildEditorHtml(role) {
    const isSys = role && role.isSystem;
    const title = isCreating ? '새 역할 만들기' : (isSys ? '시스템 역할 (읽기 전용)' : '역할 수정');
    const icon  = isCreating ? 'fa-plus' : (isSys ? 'fa-lock' : 'fa-pen');
    
    const nameVal = role ? role.name : '';
    const descVal = role ? role.desc : '';
    
    let footer = '';
    if (isSys) {
        footer = `<div style="color:var(--txt3);font-size:.85rem"><i class="fa-solid fa-circle-info"></i> 시스템 기본 역할은 수정하거나 삭제할 수 없습니다.</div>`;
    } else {
        const delBtn = !isCreating 
            ? `<button class="btn-outline danger" style="color:#DC2626;border-color:#FECACA" onclick="deleteRole()"><i class="fa-solid fa-trash"></i> 삭제</button>` 
            : `<div></div>`;
        footer = `
            ${delBtn}
            <button class="btn-primary-sm" onclick="saveRole()"><i class="fa-solid fa-floppy-disk"></i> 저장</button>
        `;
    }

    return `
        <div class="editor-header">
            <div class="editor-title"><i class="fa-solid ${icon}" style="color:var(--primary);margin-right:8px"></i>${title}</div>
        </div>
        <div class="editor-body">
            <div class="form-row">
                <div class="form-col">
                    <label class="form-label">역할 이름 <span style="color:var(--danger)">*</span></label>
                    <input type="text" class="form-control" id="editName" value="${nameVal}" ${isSys ? 'disabled' : ''} placeholder="예: 프론트 데스크 관리자">
                </div>
                <div class="form-col">
                    <label class="form-label">역할 설명</label>
                    <input type="text" class="form-control" id="editDesc" value="${descVal}" ${isSys ? 'disabled' : ''} placeholder="역할에 대한 간단한 설명">
                </div>
            </div>
            
            <div class="form-col">
                <label class="form-label">역할 색상 지정</label>
                <div class="color-picker" id="colorPicker"></div>
            </div>
            
            <div class="form-col">
                <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
                    <label class="form-label" style="margin:0">메뉴 접근 권한</label>
                    ${!isSys ? `
                    <div style="display:flex;gap:6px">
                        <button class="btn-outline" style="font-size:.7rem;padding:2px 8px" onclick="selectAll(true)">전체 선택</button>
                        <button class="btn-outline" style="font-size:.7rem;padding:2px 8px" onclick="selectAll(false)">전체 해제</button>
                    </div>` : ''}
                </div>
                <div class="perm-grid" id="permGrid"></div>
            </div>
        </div>
        <div class="editor-footer">${footer}</div>
    `;
}

// ─── 편집기 부속 요소 렌더링 ──────────────────────────────────
function renderColorPicker(selectedColor, disabled=false) {
    const picker = document.getElementById('colorPicker');
    const selected = normalizeColor(selectedColor) || normalizeColor(firstAvailableColor());
    const excludeRoleId = isCreating ? null : currentRoleId;
    picker.innerHTML = colorOptions(selected || COLORS[0]).map(c => {
        const colorKey = normalizeColor(c);
        const isSelected = colorKey === selected;
        const isUsed = colorUsedByAnotherRole(c, excludeRoleId);
        const isUnavailable = disabled || isUsed;
        const title = disabled
            ? '\uC2DC\uC2A4\uD15C \uAE30\uBCF8 \uC5ED\uD560\uC740 \uC0C9\uC0C1\uC744 \uC218\uC815\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.'
            : (isUsed ? '\uC774\uBBF8 \uB2E4\uB978 \uC5ED\uD560\uC5D0\uC11C \uC0AC\uC6A9 \uC911\uC778 \uC0C9\uC0C1\uC785\uB2C8\uB2E4.' : '\uC0C9\uC0C1 \uC120\uD0DD');
        return `
        <div class="color-dot${isSelected ? ' selected' : ''}${isUnavailable ? ' unavailable' : ''}"
             style="background:${c}"
             data-color="${c}"
             title="${title}"
             aria-label="${title}"
             onclick="${isUnavailable ? '' : 'selectColor(this)'}"></div>`;
    }).join('');
    if (!picker.querySelector('.color-dot.selected')) {
        const firstAvailable = [...picker.querySelectorAll('.color-dot:not(.unavailable)')][0];
        if (firstAvailable) firstAvailable.classList.add('selected');
    }
}

function selectColor(el) {
    if (!el || el.classList.contains('unavailable')) return;
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
}

function getSelectedColor() {
    const dot = document.querySelector('.color-dot.selected');
    return dot ? dot.getAttribute('data-color') : firstAvailableColor(isCreating ? null : currentRoleId);
}

function renderPermChecks(selectedPerms, disabled=false) {
    const grid = document.getElementById('permGrid');
    grid.innerHTML = ALL_MENUS.map(m => {
        const checked = selectedPerms.includes(m.key);
        return `
        <div class="perm-check-item${checked ? ' checked' : ''}${disabled ? ' disabled' : ''}" 
             data-key="${m.key}" 
             onclick="${disabled ? '' : 'togglePerm(this)'}">
            <div class="check-box">${checked ? '<i class="fa-solid fa-check"></i>' : ''}</div>
            <i class="fa-solid ${m.icon} check-icon"></i>
            <span class="check-label">${m.label}</span>
        </div>`;
    }).join('');
}

function togglePerm(el) {
    const isChecked = el.classList.contains('checked');
    el.classList.toggle('checked');
    el.querySelector('.check-box').innerHTML = !isChecked ? '<i class="fa-solid fa-check"></i>' : '';
}

function selectAll(state) {
    document.querySelectorAll('.perm-check-item').forEach(el => {
        el.classList.toggle('checked', state);
        el.querySelector('.check-box').innerHTML = state ? '<i class="fa-solid fa-check"></i>' : '';
    });
}

function getSelectedPerms() {
    return [...document.querySelectorAll('.perm-check-item.checked')].map(el => el.getAttribute('data-key'));
}

// ─── 저장 & 삭제 로직 ─────────────────────────────────────────
function saveRole() {
    const name = document.getElementById('editName').value.trim();
    const desc = document.getElementById('editDesc').value.trim();
    const color = getSelectedColor();
    const perms = getSelectedPerms();
    
    if (!name) { showToast('역할 이름을 입력하세요.', 'error'); return; }
    if (perms.length === 0) { showToast('최소 1개 이상의 권한을 선택하세요.', 'error'); return; }
    if (!color) { showToast('사용 가능한 역할 색상이 없습니다.', 'error'); return; }
    if (colorUsedByAnotherRole(color, isCreating ? null : currentRoleId)) {
        showToast('이미 다른 역할에서 사용 중인 색상입니다.', 'error');
        return;
    }
    
    if (isCreating) {
        const newId = 'role_' + Date.now();
        customRoles.push({ id: newId, name, desc, color, perms, isSystem: false });
        saveRoles(customRoles);
        showToast('새 역할이 생성되었습니다.');
        selectRole(newId);
    } else {
        const idx = customRoles.findIndex(r => r.id === currentRoleId);
        if (idx !== -1) {
            customRoles[idx] = { ...customRoles[idx], name, desc, color, perms };
            saveRoles(customRoles);
            showToast('역할이 수정되었습니다.');
            renderRolesList();
        }
    }
}

function deleteRole() {
    const confirmMessage = typeof window.t === 'function'
        ? window.t('role.delete.confirm')
        : '정말 이 역할을 삭제하시겠습니까?\n해당 역할이 지정된 직원들은 권한을 잃게 됩니다.';
    if (!confirm(confirmMessage)) return;
    
    customRoles = customRoles.filter(r => r.id !== currentRoleId);
    saveRoles(customRoles);
    showToast('역할이 삭제되었습니다.', 'info');
    
    currentRoleId = null;
    isCreating = false;
    renderRolesList();
    renderEditor();
}

// ─── 알림 ──────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const exist = document.getElementById('pms-toast');
    if (exist) exist.remove();
    
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const bg = type === 'success' ? '#D1FAE5' : (type === 'error' ? '#FEE2E2' : '#DBEAFE');
    const cl = type === 'success' ? '#065F46' : (type === 'error' ? '#991B1B' : '#1E3A8A');
    const ic = type === 'success' ? 'fa-circle-check' : (type === 'error' ? 'fa-circle-xmark' : 'fa-circle-info');
    
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${cl};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;display:flex;align-items:center;gap:8px;animation:toastIn .3s ease forwards`;
    t.innerHTML = `<i class="fa-solid ${ic}"></i>${msg}`;
    
    const style = document.createElement('style');
    style.innerHTML = `@keyframes toastIn { from {opacity:0;transform:translateY(15px)} to {opacity:1;transform:translateY(0)} }`;
    document.head.appendChild(style);
    document.body.appendChild(t);
    
    setTimeout(() => { t.style.opacity='0'; t.style.transform='translateY(15px)'; t.style.transition='all .3s'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// 초기화
document.addEventListener('DOMContentLoaded', async () => {
    try {
        ALL_MENUS = await PmsAPI.getALL_MENUS();
        SYSTEM_ROLES = await PmsAPI.getSYSTEM_ROLES();
        DEFAULT_CUSTOM_ROLES = await PmsAPI.getDEFAULT_CUSTOM_ROLES();
        
        customRoles = loadRoles();

        renderRolesList();
        renderEditor();
    } catch(e) { console.error(e); }
});
</script>

<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
