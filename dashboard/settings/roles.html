<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>권한 설정 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/settings.css">
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <style>
        /* ── 역할 카드 그리드 ── */
        .roles-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        .role-card {
            background: var(--card);
            border: 2px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            transition: border-color .2s, box-shadow .2s;
            position: relative;
        }
        .role-card:hover { border-color: var(--primary); box-shadow: 0 4px 20px rgba(59,130,246,.1); }
        .role-card.system-role { border-style: dashed; }
        .role-card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 14px;
        }
        .role-icon-wrap {
            width: 44px; height: 44px;
            border-radius: 12px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.2rem;
        }
        .role-name { font-size: 1rem; font-weight: 700; color: var(--txt); }
        .role-desc { font-size: .78rem; color: var(--txt3); margin-top: 2px; }
        .role-staff-count {
            font-size: .72rem; font-weight: 700;
            background: var(--border2); color: var(--txt3);
            padding: 2px 8px; border-radius: 20px;
        }

        /* ── 권한 체크 리스트 ── */
        .perm-list { display: flex; flex-direction: column; gap: 4px; margin: 14px 0; }
        .perm-item {
            display: flex; align-items: center; gap: 8px;
            font-size: .8rem; color: var(--txt2);
        }
        .perm-item i { width: 16px; text-align: center; color: var(--txt3); }
        .perm-item.has-access { color: var(--txt); }
        .perm-item.has-access i.fa-check { color: var(--success); }
        .perm-item.no-access { opacity: .45; text-decoration: line-through; }

        /* ── 카드 액션 버튼 ── */
        .role-actions { display: flex; gap: 8px; padding-top: 14px; border-top: 1px solid var(--border2); }
        .btn-icon {
            flex: 1; padding: 7px; border-radius: var(--radius-sm);
            border: 1px solid var(--border); background: #fff;
            font-size: .78rem; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 5px;
            transition: all .2s; color: var(--txt2);
        }
        .btn-icon:hover { background: var(--border2); color: var(--txt); }
        .btn-icon.danger:hover { background: #FEE2E2; color: #DC2626; border-color: #FECACA; }

        /* ── 모달 체크박스 그리드 ── */
        .perm-check-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .perm-check-item {
            display: flex; align-items: center; gap: 10px;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all .15s;
            user-select: none;
        }
        .perm-check-item:hover { border-color: var(--primary); background: var(--primary-lt); }
        .perm-check-item input[type="checkbox"] { display: none; }
        .perm-check-item .check-box {
            width: 18px; height: 18px;
            border: 2px solid var(--border);
            border-radius: 4px;
            flex-shrink: 0;
            display: flex; align-items: center; justify-content: center;
            font-size: .65rem; color: #fff;
            transition: all .15s;
        }
        .perm-check-item.checked { border-color: var(--primary); background: var(--primary-lt); }
        .perm-check-item.checked .check-box { background: var(--primary); border-color: var(--primary); }
        .perm-check-item .check-label { font-size: .82rem; font-weight: 500; color: var(--txt2); }
        .perm-check-item .check-icon { font-size: .85rem; color: var(--txt3); width: 16px; text-align: center; }
        .perm-check-item.checked .check-label { color: var(--primary); font-weight: 600; }
        .perm-check-item.checked .check-icon { color: var(--primary); }

        /* ── 색상 선택 ── */
        .color-picker { display: flex; gap: 8px; flex-wrap: wrap; }
        .color-dot {
            width: 28px; height: 28px; border-radius: 50%;
            cursor: pointer; border: 3px solid transparent;
            transition: border-color .15s, transform .15s;
        }
        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { border-color: var(--txt); }

        /* ── 시스템 배지 ── */
        .system-badge {
            position: absolute; top: -10px; right: 16px;
            background: var(--txt3); color: #fff;
            font-size: .65rem; font-weight: 700;
            padding: 2px 8px; border-radius: 20px;
            letter-spacing: .3px;
        }

        /* ── 빈 상태 ── */
        .empty-state {
            text-align: center; padding: 60px 20px;
            color: var(--txt3);
        }
        .empty-state i { font-size: 3rem; margin-bottom: 12px; display: block; }
        .empty-state p { font-size: .9rem; }

        /* ── 모달 오버레이 (dashboard.css에 없으므로 직접 정의) ── */
        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.5);
            z-index: 500;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { display: flex; }
        .modal-card {
            background: var(--card);
            border-radius: var(--radius);
            width: 95vw;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            animation: modalIn .2s ease;
        }
        @keyframes modalIn {
            from { opacity: 0; transform: scale(.96) translateY(10px); }
            to   { opacity: 1; transform: scale(1) translateY(0); }
        }
        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--border2);
            display: flex; align-items: center; justify-content: space-between;
            flex-shrink: 0;
        }
        .modal-title { font-size: 1rem; font-weight: 700; color: var(--txt); margin: 0; display: flex; align-items: center; }
        .modal-close {
            width: 32px; height: 32px; border: none; background: none;
            color: var(--txt3); cursor: pointer; font-size: 1rem;
            display: flex; align-items: center; justify-content: center;
            border-radius: 6px; transition: all .15s;
        }
        .modal-close:hover { background: var(--border2); color: var(--txt); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer {
            padding: 14px 20px;
            border-top: 1px solid var(--border2);
            display: flex; justify-content: flex-end; gap: 8px;
            flex-shrink: 0;
            background: #f8fafc;
            border-radius: 0 0 var(--radius) var(--radius);
        }
    </style>
</head>
<body>

<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>권한 설정</h1>
        </div>
        <div class="topbar-right">
            <div style="font-size:0.85rem;font-weight:700;color:var(--txt);margin-right:8px;display:flex;align-items:center;gap:4px">
                <i class="fa-solid fa-hotel" style="color:var(--primary)"></i> The Grand Saigon
            </div>
            <select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="content">

        <!-- 상단 헤더 + 새 역할 만들기 버튼 -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">
            <div>
                <div style="font-size:1.1rem;font-weight:700;color:var(--txt)">역할 및 접근 권한 관리</div>
                <div style="font-size:.82rem;color:var(--txt3);margin-top:3px">역할을 만들고 메뉴별 접근 권한을 설정하세요. 직원 등록 시 역할을 선택해 권한이 자동 적용됩니다.</div>
            </div>
            <button class="btn-primary-sm" onclick="openCreateModal()">
                <i class="fa-solid fa-plus"></i> 새 역할 만들기
            </button>
        </div>

        <!-- 역할 카드 그리드 -->
        <div class="roles-grid" id="rolesGrid"></div>

    </div>
</div>

<!-- ═══════════════════════════════════════════════
     역할 생성 / 수정 모달
══════════════════════════════════════════════════ -->
<div class="modal-overlay" id="roleModal" onclick="if(event.target===this)closeModal('roleModal')">
    <div class="modal-card" style="max-width:600px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title" id="modalTitle">
                <i class="fa-solid fa-shield-halved" style="color:var(--primary);margin-right:8px"></i>
                새 역할 만들기
            </h3>
            <button class="modal-close" onclick="closeModal('roleModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:18px">

            <!-- 역할 이름 -->
            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label">역할 이름 <span style="color:var(--danger)">*</span></label>
                <input type="text" class="form-control" id="roleName" placeholder="예: 프론트 매니저, 야간 감독관">
            </div>

            <!-- 설명 -->
            <div style="display:flex;flex-direction:column;gap:6px">
                <label class="form-label">역할 설명</label>
                <input type="text" class="form-control" id="roleDesc" placeholder="이 역할의 담당 업무를 간략히 설명하세요">
            </div>

            <!-- 색상 선택 -->
            <div style="display:flex;flex-direction:column;gap:8px">
                <label class="form-label">역할 색상</label>
                <div class="color-picker" id="colorPicker"></div>
            </div>

            <!-- 메뉴 접근 권한 체크박스 -->
            <div style="display:flex;flex-direction:column;gap:10px">
                <label class="form-label">
                    접근 가능 메뉴
                    <span style="font-size:.72rem;font-weight:400;color:var(--txt3);margin-left:6px">체크된 메뉴만 이 역할로 접근할 수 있습니다</span>
                </label>
                <div style="display:flex;gap:8px;margin-bottom:4px">
                    <button type="button" class="btn-outline" style="font-size:.75rem;padding:4px 10px" onclick="selectAllPerms(true)">전체 선택</button>
                    <button type="button" class="btn-outline" style="font-size:.75rem;padding:4px 10px" onclick="selectAllPerms(false)">전체 해제</button>
                </div>
                <div class="perm-check-grid" id="permCheckGrid"></div>
            </div>

        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('roleModal')">취소</button>
            <button class="btn-primary-sm" id="saveRoleBtn" onclick="saveRole()">
                <i class="fa-solid fa-floppy-disk"></i> 저장
            </button>
        </div>
    </div>
</div>

<!-- 삭제 확인 모달 -->
<div class="modal-overlay" id="deleteModal" onclick="if(event.target===this)closeModal('deleteModal')">
    <div class="modal-card" style="max-width:380px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title" style="color:#DC2626">
                <i class="fa-solid fa-triangle-exclamation" style="margin-right:8px"></i>역할 삭제
            </h3>
            <button class="modal-close" onclick="closeModal('deleteModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body">
            <p style="font-size:.9rem;color:var(--txt2);line-height:1.6">
                <strong id="deleteRoleName" style="color:var(--txt)"></strong> 역할을 삭제합니다.<br>
                이 역할이 할당된 직원들은 <span style="color:#DC2626;font-weight:600">역할 없음</span> 상태로 변경됩니다.
            </p>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('deleteModal')">취소</button>
            <button class="btn-primary-sm" style="background:#DC2626;border-color:#DC2626" onclick="confirmDelete()">
                <i class="fa-solid fa-trash"></i> 삭제
            </button>
        </div>
    </div>
</div>

<script>
// ─── 메뉴 항목 정의 ───────────────────────────────────────────
const ALL_MENUS = [
    { key:'dashboard',    icon:'fa-gauge-high',          label:'대시보드' },
    { key:'reservation',  icon:'fa-calendar-days',       label:'예약 관리' },
    { key:'checkin',      icon:'fa-right-to-bracket',    label:'체크인/아웃' },
    { key:'crm',          icon:'fa-users',               label:'고객 CRM' },
    { key:'rooms',        icon:'fa-bed',                 label:'객실 관리' },
    { key:'rates',        icon:'fa-tags',                label:'요금 캘린더' },
    { key:'housekeeping', icon:'fa-broom',               label:'하우스키핑' },
    { key:'folio',        icon:'fa-file-invoice-dollar', label:'정산/청구' },
    { key:'ancillary',    icon:'fa-concierge-bell',      label:'부가서비스' },
    { key:'settings',     icon:'fa-gear',                label:'호텔 설정' },
    { key:'staff',        icon:'fa-users-gear',          label:'직원 관리' },
    { key:'billing',      icon:'fa-credit-card',         label:'요금 및 결제' },
];

const COLORS = [
    '#6D28D9','#1D4ED8','#0891B2','#065F46',
    '#B45309','#DC2626','#9D174D','#374151',
    '#7C3AED','#2563EB','#0E7490','#047857',
];

// ─── 기본 시스템 역할 ─────────────────────────────────────────
const SYSTEM_ROLES = [
    {
        id: 'sys_admin', name: 'Admin', desc: '모든 메뉴에 접근 가능한 최고 관리자',
        color: '#6D28D9', isSystem: true,
        perms: ALL_MENUS.map(m => m.key),
    },
    {
        id: 'sys_manager', name: 'Manager', desc: '설정·직원관리를 제외한 대부분 접근 가능',
        color: '#1D4ED8', isSystem: true,
        perms: ['dashboard','reservation','checkin','crm','rooms','rates','housekeeping','folio','ancillary'],
    },
    {
        id: 'sys_housekeeper', name: 'Housekeeper', desc: '하우스키핑 전용 접근',
        color: '#065F46', isSystem: true,
        perms: ['dashboard','housekeeping','rooms'],
    },
];

// ─── 역할 데이터 (localStorage) ───────────────────────────────
function loadRoles() {
    try {
        const saved = localStorage.getItem('pms_custom_roles');
        return saved ? JSON.parse(saved) : [];
    } catch { return []; }
}
function saveRoles(roles) {
    localStorage.setItem('pms_custom_roles', JSON.stringify(roles));
}

let customRoles = loadRoles();
let editingRoleId = null;
let deletingRoleId = null;

// ─── 역할 카드 렌더링 ─────────────────────────────────────────
function renderRoles() {
    const grid = document.getElementById('rolesGrid');
    const allRoles = [...SYSTEM_ROLES, ...customRoles];

    if (allRoles.length === 0) {
        grid.innerHTML = `<div class="empty-state" style="grid-column:1/-1">
            <i class="fa-solid fa-shield-halved"></i>
            <p>역할이 없습니다. <strong>새 역할 만들기</strong> 버튼으로 첫 번째 역할을 만들어보세요.</p>
        </div>`;
        return;
    }

    grid.innerHTML = allRoles.map(role => {
        const iconBg = role.color + '22';
        const accessMenus = ALL_MENUS.filter(m => role.perms.includes(m.key));
        const blockedMenus = ALL_MENUS.filter(m => !role.perms.includes(m.key));

        // 상위 5개만 표시, 나머지는 +N개 표시
        const showMenus = accessMenus.slice(0, 5);
        const moreCount = accessMenus.length - showMenus.length;

        const permHtml = [
            ...showMenus.map(m => `
                <div class="perm-item has-access">
                    <i class="fa-solid fa-check" style="color:${role.color}"></i>
                    <i class="fa-solid ${m.icon}"></i> ${m.label}
                </div>`),
            moreCount > 0 ? `<div class="perm-item" style="color:var(--txt3);font-style:italic">외 ${moreCount}개 메뉴 접근 가능</div>` : '',
            blockedMenus.length > 0 && accessMenus.length < 3 ? blockedMenus.slice(0,2).map(m => `
                <div class="perm-item no-access">
                    <i class="fa-solid fa-xmark" style="color:#DC2626"></i>
                    <i class="fa-solid ${m.icon}"></i> ${m.label}
                </div>`).join('') : ''
        ].join('');

        const actionBtns = role.isSystem
            ? `<div class="btn-icon" style="cursor:default;opacity:.5;flex:1" title="시스템 기본 역할은 수정할 수 없습니다">
                <i class="fa-solid fa-lock"></i> 시스템 역할
               </div>`
            : `<button class="btn-icon" onclick="openEditModal('${role.id}')">
                <i class="fa-solid fa-pen"></i> 수정
               </button>
               <button class="btn-icon danger" onclick="openDeleteModal('${role.id}')">
                <i class="fa-solid fa-trash"></i> 삭제
               </button>`;

        return `<div class="role-card${role.isSystem ? ' system-role' : ''}">
            ${role.isSystem ? '<span class="system-badge">SYSTEM</span>' : ''}
            <div class="role-card-header">
                <div style="display:flex;align-items:center;gap:12px">
                    <div class="role-icon-wrap" style="background:${iconBg};color:${role.color}">
                        <i class="fa-solid fa-user-shield"></i>
                    </div>
                    <div>
                        <div class="role-name">${role.name}</div>
                        <div class="role-desc">${role.desc || ''}</div>
                    </div>
                </div>
                <span class="role-staff-count">${role.perms.length}개 권한</span>
            </div>
            <div class="perm-list">${permHtml}</div>
            <div class="role-actions">${actionBtns}</div>
        </div>`;
    }).join('');
}

// ─── 체크박스 그리드 렌더링 ───────────────────────────────────
function renderPermChecks(selectedPerms = []) {
    const grid = document.getElementById('permCheckGrid');
    grid.innerHTML = ALL_MENUS.map(m => {
        const checked = selectedPerms.includes(m.key);
        return `<div class="perm-check-item${checked ? ' checked' : ''}" data-key="${m.key}" onclick="togglePerm(this)">
            <div class="check-box">${checked ? '<i class="fa-solid fa-check"></i>' : ''}</div>
            <i class="fa-solid ${m.icon} check-icon"></i>
            <span class="check-label">${m.label}</span>
        </div>`;
    }).join('');
}

function togglePerm(el) {
    const wasChecked = el.classList.contains('checked');
    el.classList.toggle('checked');
    const box = el.querySelector('.check-box');
    box.innerHTML = !wasChecked ? '<i class="fa-solid fa-check"></i>' : '';
}

function selectAllPerms(state) {
    document.querySelectorAll('.perm-check-item').forEach(el => {
        el.classList.toggle('checked', state);
        const box = el.querySelector('.check-box');
        box.innerHTML = state ? '<i class="fa-solid fa-check"></i>' : '';
    });
}

function getSelectedPerms() {
    return [...document.querySelectorAll('.perm-check-item.checked')]
        .map(el => el.getAttribute('data-key'));
}

// ─── 색상 선택기 렌더링 ───────────────────────────────────────
function renderColorPicker(selectedColor) {
    const picker = document.getElementById('colorPicker');
    picker.innerHTML = COLORS.map(c => `
        <div class="color-dot${c === selectedColor ? ' selected' : ''}"
             style="background:${c}"
             data-color="${c}"
             onclick="selectColor(this)"
             title="${c}"></div>
    `).join('');
}

function selectColor(el) {
    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
    el.classList.add('selected');
}

function getSelectedColor() {
    const dot = document.querySelector('.color-dot.selected');
    return dot ? dot.getAttribute('data-color') : COLORS[0];
}

// ─── 모달 열기/닫기 ──────────────────────────────────────────
function openCreateModal() {
    editingRoleId = null;
    document.getElementById('modalTitle').innerHTML = `<i class="fa-solid fa-shield-halved" style="color:var(--primary);margin-right:8px"></i>새 역할 만들기`;
    document.getElementById('roleName').value = '';
    document.getElementById('roleDesc').value = '';
    renderColorPicker(COLORS[0]);
    renderPermChecks([]);
    openModal('roleModal');
}

function openEditModal(id) {
    const role = customRoles.find(r => r.id === id);
    if (!role) return;
    editingRoleId = id;
    document.getElementById('modalTitle').innerHTML = `<i class="fa-solid fa-pen" style="color:var(--primary);margin-right:8px"></i>역할 수정`;
    document.getElementById('roleName').value = role.name;
    document.getElementById('roleDesc').value = role.desc || '';
    renderColorPicker(role.color);
    renderPermChecks(role.perms);
    openModal('roleModal');
}

function openDeleteModal(id) {
    const role = customRoles.find(r => r.id === id);
    if (!role) return;
    deletingRoleId = id;
    document.getElementById('deleteRoleName').textContent = role.name;
    openModal('deleteModal');
}

function openModal(id)  { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

// ─── 역할 저장 ───────────────────────────────────────────────
function saveRole() {
    const name  = document.getElementById('roleName').value.trim();
    const desc  = document.getElementById('roleDesc').value.trim();
    const color = getSelectedColor();
    const perms = getSelectedPerms();

    if (!name) { showToast('역할 이름을 입력해 주세요.', 'error'); return; }
    if (perms.length === 0) { showToast('최소 1개 이상의 메뉴 접근 권한을 선택해 주세요.', 'error'); return; }

    if (editingRoleId) {
        // 수정
        const idx = customRoles.findIndex(r => r.id === editingRoleId);
        if (idx !== -1) {
            customRoles[idx] = { ...customRoles[idx], name, desc, color, perms };
            showToast(`"${name}" 역할이 수정되었습니다.`, 'success');
        }
    } else {
        // 새로 만들기
        customRoles.push({
            id: 'role_' + Date.now(),
            name, desc, color, perms,
            isSystem: false
        });
        showToast(`"${name}" 역할이 만들어졌습니다.`, 'success');
    }

    saveRoles(customRoles);
    renderRoles();
    closeModal('roleModal');
}

// ─── 역할 삭제 ───────────────────────────────────────────────
function confirmDelete() {
    const idx = customRoles.findIndex(r => r.id === deletingRoleId);
    if (idx !== -1) {
        const name = customRoles[idx].name;
        customRoles.splice(idx, 1);
        saveRoles(customRoles);
        renderRoles();
        closeModal('deleteModal');
        showToast(`"${name}" 역할이 삭제되었습니다.`, 'info');
    }
}

// ─── 토스트 ──────────────────────────────────────────────────
function showToast(msg, type = 'success') {
    const existing = document.getElementById('pms-toast');
    if (existing) existing.remove();
    const t = document.createElement('div');
    t.id = 'pms-toast';
    const styles = {
        success: '#065F46,#D1FAE5,fa-circle-check',
        error:   '#991B1B,#FEE2E2,fa-circle-xmark',
        info:    '#1E3A8A,#DBEAFE,fa-circle-info',
    };
    const [tc, bg, ico] = (styles[type] || styles.success).split(',');
    t.style.cssText = `position:fixed;bottom:24px;right:24px;background:${bg};color:${tc};padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:600;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;transition:opacity .3s,transform .3s;display:flex;align-items:center;gap:8px`;
    t.innerHTML = `<i class="fa-solid ${ico}"></i>${msg}`;
    document.body.appendChild(t);
    setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateY(12px)'; }, 2800);
    setTimeout(() => t.remove(), 3200);
}

// ─── 초기 실행 ───────────────────────────────────────────────
renderRoles();
</script>
