<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>감사 로그 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/privacy-audit.js"></script>
    <script src="../common/js/topbar.js"></script>
    <style>
        .audit-title-row{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px;flex-wrap:wrap}
        .audit-title{font-size:1.1rem;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:8px}
        .audit-desc{font-size:.82rem;color:var(--txt3);margin-top:4px;line-height:1.5}
        .audit-filter-bar{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding:12px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;flex-wrap:wrap}
        .audit-search-group{display:flex;align-items:center;gap:8px;flex:1 1 460px;max-width:560px;min-width:320px}
        .audit-search{display:flex;align-items:center;gap:8px;flex:1;min-width:0;height:38px;padding:0 12px;background:#fff;border:1.5px solid var(--border);border-radius:8px;transition:border-color .15s,box-shadow .15s}
        .audit-search:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
        .audit-search i{color:var(--txt3);font-size:.82rem}
        .audit-search input{border:none;outline:none;background:transparent;font-family:var(--font);font-size:.82rem;width:100%;min-width:0;color:var(--txt)}
        .audit-search-btn{height:38px;min-width:78px;padding:0 14px;border:none;border-radius:8px;background:var(--primary);color:#fff;font-family:var(--font);font-size:.78rem;font-weight:850;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;white-space:nowrap;transition:background .15s,transform .15s}
        .audit-search-btn:hover{background:#1D4ED8;transform:translateY(-1px)}
        .audit-filter{height:38px;flex:0 0 150px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 12px;font-family:var(--font);font-size:.8rem;font-weight:750;color:var(--txt);min-width:0;outline:none}
        .audit-period-filter{flex-basis:150px}
        .audit-date-range{display:flex;align-items:center;gap:8px;flex:0 0 auto}
        .audit-date-range[hidden]{display:none!important}
        .audit-date-range input{height:38px;width:138px;border:1px solid var(--border);border-radius:8px;background:#fff;padding:0 10px;font-family:var(--font);font-size:.78rem;font-weight:750;color:var(--txt);outline:none}
        .audit-date-range input:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
        .audit-date-separator{color:var(--txt3);font-size:.78rem;font-weight:850}
        .audit-search-group + .audit-filter{margin-left:auto}
        .audit-filter:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
        .audit-table{table-layout:fixed;min-width:1040px}
        .audit-table th,.audit-table td{white-space:normal;line-height:1.45}
        .audit-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;font-size:.72rem;font-weight:800}
        .audit-chip.privacy{background:var(--primary-lt);color:var(--primary-dk)}
        .audit-chip.reservation{background:var(--success-lt);color:var(--success)}
        .audit-chip.export{background:var(--warning-lt);color:#92400E}
        .audit-chip.search{background:var(--purple-lt);color:#6D28D9}
        .audit-chip.other{background:#f1f5f9;color:#475569}
        .field-list{display:flex;gap:5px;flex-wrap:wrap}
        .field-pill{display:inline-flex;align-items:center;padding:2px 7px;border-radius:999px;background:#f8fafc;border:1px solid var(--border);font-size:.68rem;color:var(--txt2);font-weight:700}
        .audit-pagination{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 0 0;margin-top:14px;border-top:1px solid var(--border2);flex-wrap:wrap}
        .audit-page-summary{color:var(--txt2);font-size:.78rem;font-weight:850}
        .audit-page-controls{display:flex;align-items:center;gap:6px;margin-left:auto}
        .audit-page-btn{height:34px;min-width:34px;padding:0 11px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.78rem;font-weight:900;display:inline-flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;transition:background .15s,border-color .15s,color .15s}
        .audit-page-btn:hover:not(:disabled){border-color:var(--primary);color:var(--primary);background:var(--primary-lt)}
        .audit-page-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
        .audit-page-btn:disabled{opacity:.42;cursor:not-allowed}
        .access-denied{display:none;align-items:center;justify-content:center;min-height:calc(100vh - 130px)}
        .access-card{width:min(520px,100%);background:#fff;border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:34px 28px;text-align:center}
        .access-card i{font-size:2rem;color:var(--danger);margin-bottom:12px}
        .access-card h2{font-size:1.1rem;margin-bottom:8px}
        .access-card p{font-size:.84rem;color:var(--txt2);line-height:1.55}
        @media(max-width:768px){
            .audit-filter-bar{align-items:stretch;flex-direction:column;padding:12px;gap:10px}
            .audit-search-group{width:100%;max-width:none;min-width:0;flex:0 0 auto}
            .audit-search,.audit-filter{width:100%}
            .audit-filter{flex:0 0 auto}
            .audit-date-range{width:100%;flex:0 0 auto;flex-wrap:wrap}
            .audit-date-range input{flex:1 1 140px;width:auto}
            .audit-search-group + .audit-filter{margin-left:0}
            .audit-page-controls{margin-left:0;width:100%;justify-content:flex-end}
        }
        @media(max-width:480px){
            .audit-search-group{align-items:stretch;flex-direction:column}
            .audit-search{flex:0 0 auto}
            .audit-search-btn{width:100%}
        }
    </style>
</head>
<body>
<div class="main">
    <header class="topbar"><h1 data-i18n-key="Audit Logs">감사 로그</h1></header>
    <div class="content">
        <div id="auditDenied" class="access-denied">
            <div class="access-card">
                <i class="fa-solid fa-lock"></i>
                <h2>어드민 전용 메뉴입니다.</h2>
                <p>운영 감사 로그는 호텔 관리자 권한에서만 확인할 수 있습니다.</p>
            </div>
        </div>

        <div id="auditContent">
            <div class="audit-title-row">
                <div>
                    <div class="audit-title"><i class="fa-solid fa-shield-halved" style="color:var(--primary)"></i> 운영 감사 로그</div>
                    <div class="audit-desc">예약 등록·수정·취소, 객실 이동, 요금/예치금 정정, 개인정보 열람과 엑셀 반출 이력을 함께 확인합니다. 민감한 연락처 값은 저장하지 않고 대상과 변경 항목만 기록합니다.</div>
                </div>
                <button class="btn-outline" onclick="renderAuditLogs()"><i class="fa-solid fa-rotate-right"></i> 새로고침</button>
            </div>

            <div class="kpi-grid kpi-grid-4">
                <div class="kpi-card blue">
                    <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-list"></i></div></div>
                    <div class="kpi-body"><div class="kpi-value" id="kpiTotal">0</div><div class="kpi-label">전체 로그</div></div>
                </div>
                <div class="kpi-card green">
                    <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-pen-to-square"></i></div></div>
                    <div class="kpi-body"><div class="kpi-value" id="kpiReservations">0</div><div class="kpi-label">예약 변경</div></div>
                </div>
                <div class="kpi-card orange">
                    <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-eye"></i></div></div>
                    <div class="kpi-body"><div class="kpi-value" id="kpiPrivacy">0</div><div class="kpi-label">개인정보 열람</div></div>
                </div>
                <div class="kpi-card purple">
                    <div class="kpi-top"><div class="kpi-icon"><i class="fa-solid fa-download"></i></div></div>
                    <div class="kpi-body"><div class="kpi-value" id="kpiExports">0</div><div class="kpi-label">다운로드</div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="card-title"><i class="fa-solid fa-clipboard-list"></i> 로그 목록</div>
                </div>
                <div class="card-body">
                    <div class="audit-filter-bar">
                        <div class="audit-search-group">
                            <div class="audit-search">
                                <i class="fa-solid fa-magnifying-glass"></i>
                                <input id="auditSearch" type="text" placeholder="예약번호, 고객명, 직원, 객실, 변경내용 검색..." data-i18n-placeholder="audit.search.placeholder">
                            </div>
                            <button type="button" class="audit-search-btn" onclick="resetAuditPageAndRender()"><i class="fa-solid fa-search"></i> 검색</button>
                        </div>
                        <select id="auditActionFilter" class="audit-filter">
                            <option value="all" data-ko="전체 유형" data-en="All Types">전체 유형</option>
                            <option value="reservation" data-ko="예약 변경" data-en="Reservation Changes">예약 변경</option>
                            <option value="privacy" data-ko="개인정보 열람" data-en="Privacy Access">개인정보 열람</option>
                            <option value="export" data-ko="다운로드" data-en="Download">다운로드</option>
                            <option value="search" data-ko="검색/선택" data-en="Search / Selection">검색/선택</option>
                            <option value="other" data-ko="기타" data-en="Other">기타</option>
                        </select>
                        <select id="auditPeriodFilter" class="audit-filter audit-period-filter">
                            <option value="today" data-ko="금일" data-en="Today">금일</option>
                            <option value="week" data-ko="주간" data-en="Week">주간</option>
                            <option value="month" data-ko="월간" data-en="Month">월간</option>
                            <option value="custom" data-ko="기간 선택" data-en="Custom Period">기간 선택</option>
                            <option value="all" data-ko="전체 기간" data-en="All Periods">전체 기간</option>
                        </select>
                        <div id="auditDateRange" class="audit-date-range" hidden>
                            <input id="auditStartDate" type="date" aria-label="시작일">
                            <span class="audit-date-separator">~</span>
                            <input id="auditEndDate" type="date" aria-label="종료일">
                        </div>
                    </div>
                    <div class="table-wrap">
                        <table class="audit-table">
                            <colgroup>
                                <col style="width:15%">
                                <col style="width:13%">
                                <col style="width:13%">
                                <col style="width:14%">
                                <col style="width:17%">
                                <col style="width:14%">
                                <col style="width:14%">
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>일시</th>
                                    <th>직원</th>
                                    <th>화면</th>
                                    <th>동작</th>
                                    <th>대상</th>
                                    <th>관련 항목</th>
                                    <th>세부 정보</th>
                                </tr>
                            </thead>
                            <tbody id="auditBody"></tbody>
                        </table>
                    </div>
                    <div id="auditPagination" class="audit-pagination" hidden>
                        <div id="auditPageSummary" class="audit-page-summary"></div>
                        <div id="auditPageControls" class="audit-page-controls"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

function auditDemoCreatedAt(index) {
    const base = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    base.setHours(15, 45, 0, 0);
    base.setMinutes(base.getMinutes() - index * 9);
    return base.toISOString();
}

function escapeAudit(value) {

        '"': '&quot;',
        "'": '&#39;'

}

function readAuditLogs() {
    return window.PmsPrivacyAudit ? window.PmsPrivacyAudit.list() : [];

function ensureAuditDemoLogs() {
    if (!window.PmsPrivacyAudit) return;
    const storageKey = window.PmsPrivacyAudit.storageKey || 'pms_privacy_audit_logs';
    const logs = readAuditLogs();
    const today = auditTodayIso();
    const demoEntries = auditDemoEntries();
    const demoIds = new Set(demoEntries.map(entry => entry.id));
    const seededDate = localStorage.getItem(AUDIT_DEMO_STORAGE_KEY);
    const hasFreshDemoEntries = demoEntries.every(demo => {
        const existing = logs.find(entry => entry.id === demo.id);
        return existing && entryAuditDate(existing) === today;
    });
    if (seededDate === today && hasFreshDemoEntries) {
        return;
    }
    const retainedLogs = logs.filter(entry => !demoIds.has(entry.id) && !String(entry.id || '').startsWith('AUD-DEMO-'));
    localStorage.setItem(storageKey, JSON.stringify([...retainedLogs, ...demoEntries].slice(-500)));
    localStorage.setItem(AUDIT_DEMO_STORAGE_KEY, today);
}

function ensureSettlementReopenAuditLogs() {
    if (!window.PmsPrivacyAudit) return;
    const storageKey = window.PmsPrivacyAudit.storageKey || 'pms_privacy_audit_logs';

function screenLabel(screen) {
    const raw = String(screen || '').trim();
    if (!raw) return '-';
    const value = raw
        .replace(/\\/g, '/')
        .replace(/^https?:\/\/[^/]+/i, '')
        .replace(/^\/+/, '')
        .split(/[?#]/)[0];
    const file = value.split('/').filter(Boolean).pop();
    if (file && AUDIT_SCREEN_LABEL_BY_FILE[file]) return AUDIT_SCREEN_LABEL_BY_FILE[file];
    const key = value.split('/').filter(Boolean).pop() || value;
    if (AUDIT_SCREEN_LABEL_BY_KEY[key]) return AUDIT_SCREEN_LABEL_BY_KEY[key];
    const dashedKey = key.replace(/\.html$/i, '');
    if (AUDIT_SCREEN_LABEL_BY_KEY[dashedKey]) return AUDIT_SCREEN_LABEL_BY_KEY[dashedKey];
    return raw || '-';
}

function formatDateTime(value) {
    const date = new Date(value);
    if (Number.isNaN(date.getTime())) return value || '-';
    return date.toLocaleString('ko-KR', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: false
    });
}

function fieldPills(fields) {
    const list = Array.isArray(fields) ? fields : [];
    if (!list.length) return '<span class="field-pill">-</span>';
    return `<div class="field-list">${list.map(field => `<span class="field-pill">${escapeAudit(FIELD_LABELS[field] || field)}</span>`).join('')}</div>`;
}

function formatAuditMoney(amount, currency = 'PHP') {
    const value = Number(amount || 0);
    if (!Number.isFinite(value)) return String(amount ?? '-');
    return `${currency} ${value.toLocaleString()}`;
}

function targetText(entry) {
    const d = entry.details || {};
    const guest = d.guestName || d.afterGuest || d.beforeGuest || '';
    const reservationId = d.reservationId || '';
    if (guest && reservationId) return `${guest} · ${reservationId}`;
    return guest || reservationId || d.folioId || d.orderId || d.guestId || d.exportType || d.room || '-';
}

function detailText(entry) {
    const d = entry.details || {};
    const parts = [];
    if (d.reservationId) parts.push(`예약 ${d.reservationId}`);
    if (d.folioId) parts.push(`Folio ${d.folioId}`);
    if (d.orderId) parts.push(`주문 ${d.orderId}`);
    if (d.guestId) parts.push(`고객 ID ${d.guestId}`);
    if (d.service) parts.push(`서비스 ${d.service}`);
    if (d.item) parts.push(`항목 ${d.item}`);
    if (d.exportType) parts.push(String(d.exportType).toUpperCase());
    if (d.resultCount !== undefined) parts.push(`결과 ${d.resultCount}건`);
    if (d.status) parts.push(`상태 ${d.status}`);
    if (d.beforeStatus || d.afterStatus) parts.push(`상태 ${d.beforeStatus || '-'} → ${d.afterStatus || '-'}`);
    if (d.cancelReason) parts.push(`취소 사유 ${d.cancelReason}`);
    if (d.checkin || d.checkout) parts.push(`투숙 ${d.checkin || '-'} ~ ${d.checkout || '-'}`);
    if (d.beforeAmount !== undefined || d.afterAmount !== undefined) parts.push(`금액 ${formatAuditMoney(d.beforeAmount, d.currency)} → ${formatAuditMoney(d.afterAmount, d.currency)}`);
    if (d.amount !== undefined) parts.push(`금액 ${formatAuditMoney(d.amount, d.currency)}`);
    if (d.beforePrepaid !== undefined || d.afterPrepaid !== undefined) parts.push(`예치금 ${formatAuditMoney(d.beforePrepaid, d.currency)} → ${formatAuditMoney(d.afterPrepaid, d.currency)}`);
    if (d.prepaidAmount !== undefined) parts.push(`예치금 ${formatAuditMoney(d.prepaidAmount, d.currency)}`);
    if (d.fromRoom || d.toRoom) parts.push(`객실 ${d.fromRoom || '-'} → ${d.toRoom || '-'}`);
    if (d.room && !d.fromRoom && !d.toRoom) parts.push(`객실 ${d.room}`);
    if (d.beforeGuest || d.afterGuest) parts.push(`대표 ${d.beforeGuest || '-'} → ${d.afterGuest || '-'}`);
    if (Array.isArray(d.afterCompanions)) parts.push(`동반 ${d.afterCompanions.length}명`);
    if (Array.isArray(d.changes) && d.changes.length) {
        d.changes.slice(0, 4).forEach(change => parts.push(`${change.label || FIELD_LABELS[change.field] || change.field}: ${change.before ?? '-'} → ${change.after ?? '-'}`));
        if (d.changes.length > 4) parts.push(`외 ${d.changes.length - 4}건`);
    }
    if (d.balanceDue !== undefined) parts.push(`잔액 ${formatAuditMoney(d.balanceDue, d.currency)}`);
    if (d.filters && d.filters.queryApplied) parts.push('검색 조건 적용');
    return parts.join(' · ') || '-';
}

function auditTodayIso() {
    return window.PmsDate?.todayIso ? window.PmsDate.todayIso() : auditLocalIsoDate(new Date());
}

function auditLocalIsoDate(value) {
    const date = value instanceof Date ? value : new Date(value);
    if (Number.isNaN(date.getTime())) return '';
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
}

function auditAddDays(dateText, days) {
    const [year, month, day] = String(dateText || auditTodayIso()).split('-').map(Number);
    const date = new Date(year, month - 1, day);
    date.setDate(date.getDate() + days);
    return auditLocalIsoDate(date);
}

function auditPeriodRange() {
    const period = document.getElementById('auditPeriodFilter')?.value || 'today';
    const today = auditTodayIso();
    if (period === 'all') return null;
    if (period === 'week') return { start: auditAddDays(today, -6), end: today };
    if (period === 'month') return { start: `${today.slice(0, 7)}-01`, end: today };
    if (period === 'custom') {
        const startInput = document.getElementById('auditStartDate');
        const endInput = document.getElementById('auditEndDate');
        if (!startInput.value) startInput.value = auditAddDays(today, -6);
        if (!endInput.value) endInput.value = today;
        const start = startInput.value <= endInput.value ? startInput.value : endInput.value;
        const end = startInput.value <= endInput.value ? endInput.value : startInput.value;
        return { start, end };
    }
    return { start: today, end: today };
}

function entryAuditDate(entry) {
    return auditLocalIsoDate(entry.createdAt);
}

function updateAuditPeriodUi() {
    const period = document.getElementById('auditPeriodFilter')?.value || 'today';
    const rangeWrap = document.getElementById('auditDateRange');
    if (!rangeWrap) return;
    rangeWrap.hidden = period !== 'custom';
    if (period === 'custom') auditPeriodRange();
}

function scheduleAuditRender({ resetPage = false, defer = 0 } = {}) {
    if (resetPage) auditCurrentPage = 1;
    clearTimeout(auditRenderTimer);
    auditRenderTimer = setTimeout(() => {
        auditRenderTimer = null;
        renderAuditLogs();
    }, defer);
}

function resetAuditPageAndRender(options = {}) {
    scheduleAuditRender({ resetPage: true, defer: options.defer || 0 });
}

function setAuditPage(page) {
    auditCurrentPage = Math.max(1, Number(page) || 1);
    scheduleAuditRender();
}

function filteredLogs(logs) {
    const query = (document.getElementById('auditSearch')?.value || '').trim().toLowerCase();
    const type = document.getElementById('auditActionFilter')?.value || 'all';
    const range = auditPeriodRange();
    return logs.filter(entry => {
        const meta = actionMeta(entry.action);
        if (type !== 'all' && meta.type !== type) return false;
        if (range) {
            const entryDate = entryAuditDate(entry);
            if (!entryDate || entryDate < range.start || entryDate > range.end) return false;
        }
        if (!query) return true;
        const haystack = [
            entry.actor?.name,
            entry.actor?.roleLabel,
            meta.label,
            screenLabel(entry.details?.screen || entry.page),
            targetText(entry),
            detailText(entry),
            (entry.details?.fields || []).join(' ')
        ].join(' ').toLowerCase();
        return haystack.includes(query);
    });
}

function sortAuditLogs(logs) {
    const dateValue = entry => new Date(entry.createdAt || 0).getTime() || 0;
    const isDemoLog = entry => String(entry?.id || '').startsWith('AUD-DEMO-');
    return [...logs].sort((a, b) => {
        const demoWeight = Number(isDemoLog(a)) - Number(isDemoLog(b));
        if (demoWeight) return demoWeight;
        return dateValue(b) - dateValue(a);
    });
}

function auditPageNumbers(current, totalPages) {
    const numbers = new Set([1, totalPages]);
    for (let page = current - 2; page <= current + 2; page += 1) {
        if (page >= 1 && page <= totalPages) numbers.add(page);
    }
    return [...numbers].sort((a, b) => a - b);
}

function renderAuditPagination(total, pageSize) {
    const wrap = document.getElementById('auditPagination');
    const summary = document.getElementById('auditPageSummary');
    const controls = document.getElementById('auditPageControls');
    if (!wrap || !summary || !controls) return;
    if (!total) {
        wrap.hidden = true;
        summary.textContent = '';
        controls.innerHTML = '';
        return;
    }
    const totalPages = Math.max(1, Math.ceil(total / pageSize));
    auditCurrentPage = Math.min(Math.max(1, auditCurrentPage), totalPages);
    const start = (auditCurrentPage - 1) * pageSize + 1;
    const end = Math.min(total, auditCurrentPage * pageSize);
    wrap.hidden = false;
    summary.textContent = `총 ${total.toLocaleString()}건 중 ${start.toLocaleString()}-${end.toLocaleString()} 표시`;
    const pages = auditPageNumbers(auditCurrentPage, totalPages);
    let previous = 0;
    const pageButtons = pages.map(page => {
        const gap = previous && page - previous > 1 ? '<span class="audit-page-btn" aria-hidden="true">...</span>' : '';
        previous = page;
        return `${gap}<button type="button" class="audit-page-btn ${page === auditCurrentPage ? 'active' : ''}" onclick="setAuditPage(${page})" ${page === auditCurrentPage ? 'aria-current="page"' : ''}>${page}</button>`;
    }).join('');
    controls.innerHTML = `
        <button type="button" class="audit-page-btn" onclick="setAuditPage(${auditCurrentPage - 1})" ${auditCurrentPage <= 1 ? 'disabled' : ''} aria-label="이전 페이지"><i class="fa-solid fa-chevron-left"></i></button>
        ${pageButtons}
        <button type="button" class="audit-page-btn" onclick="setAuditPage(${auditCurrentPage + 1})" ${auditCurrentPage >= totalPages ? 'disabled' : ''} aria-label="다음 페이지"><i class="fa-solid fa-chevron-right"></i></button>
    `;
}

function renderAuditLogs() {
    if (!ensureAdminAccess()) return;
    updateAuditPeriodUi();
    ensureSettlementReopenAuditLogs();
    ensureAuditDemoLogs();
    const logs = readAuditLogs();
    const rows = sortAuditLogs(filteredLogs(logs));
    const body = document.getElementById('auditBody');
    const reservationCount = rows.filter(entry => actionMeta(entry.action).type === 'reservation').length;
    const privacyCount = rows.filter(entry => actionMeta(entry.action).type === 'privacy').length;
    const exportCount = rows.filter(entry => actionMeta(entry.action).type === 'export').length;
    document.getElementById('kpiTotal').textContent = rows.length.toLocaleString();
    document.getElementById('kpiReservations').textContent = reservationCount.toLocaleString();
    document.getElementById('kpiPrivacy').textContent = privacyCount.toLocaleString();
    document.getElementById('kpiExports').textContent = exportCount.toLocaleString();

    if (!rows.length) {
        renderAuditPagination(0, AUDIT_PAGE_SIZE);
        body.innerHTML = `<tr><td colspan="7">
            <div class="pms-empty-state">
                <div class="pms-empty-icon"><i class="fa-solid fa-shield-halved"></i></div>
                <div class="pms-empty-title">표시할 감사 로그가 없습니다.</div>
                <div class="pms-empty-desc">예약 등록/변경, 객실 이동, 요금 정정, 개인정보 열람이나 엑셀 다운로드를 실행하면 이곳에 기록됩니다.</div>
            </div>
        </td></tr>`;
        return;
    }

    renderAuditPagination(rows.length, AUDIT_PAGE_SIZE);
    const pageRows = rows.slice((auditCurrentPage - 1) * AUDIT_PAGE_SIZE, auditCurrentPage * AUDIT_PAGE_SIZE);

    body.innerHTML = pageRows.map(entry => {
        const meta = actionMeta(entry.action);
        const screen = screenLabel(entry.details?.screen || entry.page);
        return `<tr>
            <td><strong>${escapeAudit(formatDateTime(entry.createdAt))}</strong></td>
            <td>${escapeAudit(entry.actor?.name || '-')}<div style="font-size:.7rem;color:var(--txt3)">${escapeAudit(entry.actor?.roleLabel || entry.actor?.role || '')}</div></td>
            <td>${escapeAudit(screen)}</td>
            <td><span class="audit-chip ${meta.type}"><i class="fa-solid ${meta.icon}"></i>${escapeAudit(meta.label)}</span></td>
            <td><strong>${escapeAudit(targetText(entry))}</strong></td>
            <td>${fieldPills(entry.details?.fields)}</td>
            <td>${escapeAudit(detailText(entry))}</td>
        </tr>`;
    }).join('');
}

window.addEventListener('pms:privacy-audit', renderAuditLogs);
document.addEventListener('DOMContentLoaded', renderAuditLogs);
document.addEventListener('DOMContentLoaded', () => {
    updateAuditPeriodUi();
    document.getElementById('auditSearch')?.addEventListener('input', resetAuditPageAndRender);
    document.getElementById('auditSearch')?.addEventListener('keydown', event => {
        if (event.key === 'Enter') resetAuditPageAndRender();
    });
    document.getElementById('auditActionFilter')?.addEventListener('change', event => {
        event.target.blur();
        resetAuditPageAndRender({ defer: AUDIT_SELECT_RENDER_DELAY });
    });
    document.getElementById('auditPeriodFilter')?.addEventListener('change', event => {
        event.target.blur();
        setTimeout(() => {
            updateAuditPeriodUi();
            resetAuditPageAndRender();
        }, AUDIT_SELECT_RENDER_DELAY);
    });
    document.getElementById('auditStartDate')?.addEventListener('change', resetAuditPageAndRender);
    document.getElementById('auditEndDate')?.addEventListener('change', resetAuditPageAndRender);
});
</script>
</body>
</html>
