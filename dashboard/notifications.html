<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>알림 및 실시간 활동 — Hotel PMS</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="common/css/dashboard.css" rel="stylesheet"/>
<link href="common/css/frontdesk.css" rel="stylesheet"/>
<script src="common/js/sidebar.js"></script>
<script src="common/js/api/api-core.js"></script>
<script src="common/js/topbar.js"></script>
<script src="common/js/i18n-catalog.js"></script>
<script src="common/js/i18n.js"></script>
<style>
        .notif-page-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 20px; }
        .notif-tabs { display: flex; gap: 8px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 4px; }
        .notif-tab { padding: 8px 16px; border-radius: 20px; font-size: 0.85rem; font-weight: 600; color: var(--txt2); cursor: pointer; transition: all 0.2s; white-space: nowrap; background: var(--bg); border: 1px solid var(--border); }
        .notif-tab.active { background: var(--primary); color: #fff; border-color: var(--primary); }
        @media(max-width: 768px) {
            .notif-tabs { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); overflow: visible; padding-bottom: 0; }
            .notif-tab { text-align: center; padding-inline: 10px; }
        }
        
        .activity-timeline { display: flex; flex-direction: column; gap: 16px; position: relative; padding-left: 24px; }
        .activity-timeline::before { content: ''; position: absolute; top: 0; bottom: 0; left: 11px; width: 2px; background: var(--border2); }
        
        .timeline-item { position: relative; }
        .timeline-icon { position: absolute; left: -24px; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #fff; z-index: 2; box-shadow: 0 0 0 4px var(--card); }
        .timeline-icon.frontdesk { background: #3B82F6; }
        .timeline-icon.housekeeping { background: #10B981; }
        .timeline-icon.system { background: #F59E0B; }
        .timeline-icon.billing { background: #8B5CF6; }
        
        .timeline-content { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px 16px; margin-left: 12px; }
        .timeline-header { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .timeline-title { font-weight: 700; font-size: 0.9rem; color: var(--txt); }
        .timeline-time { font-size: 0.75rem; color: var(--txt3); }
        .timeline-desc { font-size: 0.85rem; color: var(--txt2); line-height: 1.4; }
        .timeline-room { display: inline-block; background: var(--primary-lt); color: var(--primary-dk); font-weight: 700; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; margin-right: 6px; }
    </style>
    <script src="common/js/ui-components.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
    <h1>알림 및 실시간 활동</h1>
</header>
<div class="content">
<div class="notif-page-card">
<div class="notif-tabs" id="filterTabs">
<div class="notif-tab active" data-filter="all" data-i18n-key="All">All</div>
<div class="notif-tab" data-filter="frontdesk" data-i18n-key="Front Desk">Front Desk</div>
<div class="notif-tab" data-filter="housekeeping" data-i18n-key="Housekeeping">Housekeeping</div>
<div class="notif-tab" data-filter="billing" data-i18n-key="Billing">Billing</div>
<div class="notif-tab" data-filter="system" data-i18n-key="System / Booking">System / Booking</div>
</div>
<div class="activity-timeline" id="timelineContainer">
<!-- Data will be injected here via JS -->
</div>
</div>
</div>
</div>
<script>
let activities = [];

function getNotificationLang() {
    return window.currentLang || localStorage.getItem('pms_lang') || 'ko';
}

function localized(value) {
    if (value && typeof value === 'object') return value[getNotificationLang()] || value.en || value.ko || '';
    return value || '';
}

function normalizeNotificationType(item) {
    const raw = String(item.category || item.type || '').toLowerCase();
    if (raw.includes('housekeeping')) return 'housekeeping';
    if (raw.includes('reservation') || raw.includes('frontdesk') || raw.includes('group')) return 'frontdesk';
    if (raw.includes('billing') || raw.includes('folio') || raw.includes('audit')) return 'billing';
    return 'system';
}

function normalizeNotification(item) {
    const type = normalizeNotificationType(item);
    const fallbackIcon = {
        frontdesk: 'fa-book-bookmark',
        housekeeping: 'fa-broom',
        billing: 'fa-credit-card',
        system: 'fa-bell'
    }[type];
    return {
        ...item,
        type,
        icon: item.icon || fallbackIcon,
        title: item.title || item.label || item.type,
        desc: item.desc || item.label || ''
    };
}

async function loadNotificationActivities() {
    if (Array.isArray(window.PMS_Notifications) && window.PMS_Notifications.length) {
        activities = window.PMS_Notifications.map(normalizeNotification);
        return;
    }
    try {
        if (window.PmsMockApi) {
            const env = await window.PmsMockApi.request('GET', '/dashboard/today-activities');
            activities = window.PmsMockApi.items(env).map(normalizeNotification);
            return;
        }
    } catch (error) {
        console.warn('Notification activity load failed', error);
    }
    activities = [];
}

function renderActivities(filter) {
    const container = document.getElementById('timelineContainer');
    container.innerHTML = '';
    
    const filtered = filter === 'all' ? activities : activities.filter(a => a.type === filter);
    
    if (filtered.length === 0) {
        const emptyText = getNotificationLang() === 'en' ? 'No activity to display.' : '표시할 활동 내역이 없습니다.';
        container.innerHTML = `<div style="text-align:center;padding:40px;color:var(--txt3)">${emptyText}</div>`;
        return;
    }
    
    filtered.forEach(act => {
        const title = localized(act.title);
        const time = localized(act.time);
        const desc = localized(act.desc);
        container.innerHTML += `
            <div class="timeline-item">
                <div class="timeline-icon ${act.type}"><i class="fa-solid ${act.icon}"></i></div>
                <div class="timeline-content">
                    <div class="timeline-header">
                        <div class="timeline-title">${title}</div>
                        <div class="timeline-time">${time}</div>
                    </div>
                    <div class="timeline-desc">${desc}</div>
                </div>
            </div>
        `;
    });
}

// Init — wait for sidebar/DataReady
window.addEventListener('DataReady', async () => {
    await loadNotificationActivities();
    document.querySelectorAll('#filterTabs .notif-tab').forEach(tab => {
        tab.addEventListener('click', (e) => {
            document.querySelectorAll('#filterTabs .notif-tab').forEach(t => t.classList.remove('active'));
            e.target.classList.add('active');
            renderActivities(e.target.dataset.filter);
        });
    });
    renderActivities('all');
});

window.addEventListener('languagechange', () => {
    const active = document.querySelector('#filterTabs .notif-tab.active');
    renderActivities(active?.dataset.filter || 'all');
});

function toggleMenu() {
    const sidebar = document.querySelector('.sidebar');
    const overlay = document.querySelector('.sidebar-overlay');
    if(sidebar) sidebar.classList.toggle('active');
    if(overlay) overlay.classList.toggle('active');
}


</script>
</body>
</html>
