<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체업체 관리 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
<style>
.kpi-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
@media(max-width: 768px) { .kpi-grid-4 { grid-template-columns: repeat(2, 1fr); } }

.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-primary-sm {
    padding: 8px 16px;
    background: var(--primary);
    color: #fff;
    border: none;
    border-radius: var(--radius-sm);
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    display: flex;
    align-items: center;
    gap: 6px;
    transition: all .2s;
    white-space: nowrap;
}
.btn-primary-sm:hover {
    background: var(--primary-dk);
    transform: translateY(-1px);
    box-shadow: 0 2px 8px rgba(59,130,246,.3);
}
.btn-outline {
    padding: 8px 16px;
    background: #fff;
    color: var(--txt2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: .78rem;
    font-weight: 600;
    cursor: pointer;
    font-family: var(--font);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: all .2s;
    white-space: nowrap;
}
.btn-outline:hover {
    border-color: var(--primary);
    color: var(--primary);
    background: #EFF6FF;
}
.modal-footer .btn-outline,
.modal-footer .btn-primary-sm {
    min-width: 72px;
    height: 38px;
}
.filter-chips .chip { gap: 6px; }
.filter-chips .chip-count { min-width: 20px; height: 20px; padding: 0 6px; border-radius: 10px; display: inline-flex; align-items: center; justify-content: center; background: var(--border2); color: inherit; font-size: .68rem; font-weight: 700; }
.filter-chips .chip.active .chip-count { background: rgba(255,255,255,.24); }
@media(max-width: 768px) {
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-direction: column; align-items: stretch; overflow: visible; gap: 10px; }
    .filter-left > div { width: 100%; }
    .filter-chips { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 8px; }
    .filter-chips .chip { justify-content: center; min-width: 0; }
    .filter-right { width: 100%; }
    .filter-right .btn-primary-sm { width: 100%; justify-content: center; padding-inline: 10px !important; }
    .search-box-mt { width: auto; }
}

.company-card {
    background: #fff; border: 1px solid var(--border); border-radius: 12px;
    padding: 20px; display: flex; flex-direction: column; gap: 12px;
    transition: none;
    transform: none !important;
    will-change: auto;
    cursor: default;
}
.company-card:hover { border-color: var(--border); background: #fff; box-shadow: none; transform: none !important; }
.company-card *,
.company-card *:hover,
.company-card *:active,
.company-card *:focus {
    transform: none !important;
}
.company-header { display: flex; justify-content: space-between; align-items: flex-start; }
.company-name { font-size: 1.15rem; font-weight: 700; color: var(--txt); margin-bottom: 4px; }
.company-type { font-size: 0.8rem; color: var(--txt2); font-weight: 500; }
.company-meta {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px; font-size: 0.82rem; color: var(--txt2);
    background: var(--bg); padding: 12px; border-radius: 8px;
}
.company-meta div { display: flex; align-items: center; gap: 6px; }
.company-meta i { color: var(--primary); width: 14px; text-align:center; }
.card-footer-btns { display: flex; gap: 8px; margin-top: 4px; justify-content: space-between; align-items: center; }

.status-badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
.pill-active { background: #ECFDF5; color: #059669; }
.pill-inactive { background: #F3F4F6; color: #4B5563; }

/* ===== CARD BUTTONS ===== */
.btn-room-assign {
    display: inline-flex; align-items: center; gap: 6px;
    flex: 1; justify-content: center;
    padding: 8px 14px; border-radius: 8px; border: none;
    background: var(--primary, #2563EB); color: #fff;
    font-size: .82rem; font-weight: 600; font-family: var(--font);
    cursor: pointer; transition: none;
    box-shadow: none;
    box-sizing: border-box;
}
.btn-room-assign:hover,
.btn-room-assign:focus {
    background: var(--primary, #2563EB);
    color: #fff;
    box-shadow: none;
    outline: none;
}
.btn-room-assign:active { transform: none; }

.btn-card-edit {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    border: 1.5px solid var(--border, #E5E7EB);
    background: #fff; color: var(--txt2, #6B7280);
    font-size: .85rem; cursor: pointer;
    transition: none;
    box-sizing: border-box;
}
.btn-card-edit:hover,
.btn-card-edit:focus {
    border-color: var(--border, #E5E7EB);
    color: var(--txt2, #6B7280);
    background: #fff;
    outline: none;
}
.btn-card-edit:active { transform: none; }

.btn-card-delete {
    display: inline-flex; align-items: center; justify-content: center;
    width: 36px; height: 36px; border-radius: 8px;
    border: 1.5px solid #FECACA;
    background: #FFF1F2; color: var(--danger, #DC2626);
    font-size: .85rem; cursor: pointer;
    transition: none;
    box-sizing: border-box;
}
.btn-card-delete:hover,
.btn-card-delete:focus {
    background: #FFF1F2;
    border-color: #FECACA;
    color: var(--danger, #DC2626);
    outline: none;
}
.btn-card-delete:active { transform: none; }
.btn-card-delete:disabled {
    background: #F3F4F6;
    border-color: #E5E7EB;
    color: #9CA3AF;
    cursor: not-allowed;
    opacity: .8;
}
.btn-card-delete:disabled:hover {
    background: #F3F4F6;
    border-color: #E5E7EB;
}
.btn-card-delete:disabled:active { transform: none; }
</style>
</head>
<body>
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="PMS_Sidebar.toggleMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 data-i18n-key="Group Companies">단체업체 관리</h1>
            </div>
            <div class="topbar-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="예약번호, 고객명 검색..." id="global-search-input">
                </div>
                <button class="btn-icon" title="알림"><i class="fa-regular fa-bell"></i><span class="badge">3</span></button>
                <button class="btn-icon" title="설정"><i class="fa-solid fa-gear"></i></button>
                <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                    <option value="ko">한국어</option>
                    <option value="en">English</option>
                </select>
            </div>
        </header>
        <div class="content">
            <!-- KPI Cards -->
            <div class="kpi-grid-4">
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#EFF6FF;color:#2563EB"><i class="fa-solid fa-building"></i></div>
                    <div class="kpi-info"><div class="kpi-label">등록 업체 수</div><div class="kpi-value" id="kpiTotal">0</div></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#ECFDF5;color:#059669"><i class="fa-solid fa-handshake"></i></div>
                    <div class="kpi-info"><div class="kpi-label">계약 활성</div><div class="kpi-value" id="kpiActive">0</div></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#F5F3FF;color:#7C3AED"><i class="fa-solid fa-calendar-check"></i></div>
                    <div class="kpi-info"><div class="kpi-label">진행/예정 행사</div><div class="kpi-value" id="kpiEvents">0</div></div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#FFF7ED;color:#EA580C"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <div class="kpi-info"><div class="kpi-label">미정산 단체</div><div class="kpi-value" id="kpiUnpaid">0</div></div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar-mt">
                <div class="filter-left">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="업체명 검색..." oninput="searchCompanies(this.value)">
                    </div>
                    <div class="filter-chips">
                        <button class="chip active" data-filter="all" data-label="전체" onclick="filterCompanies('all', this)">전체</button>
                        <button class="chip" data-filter="Corporate" onclick="filterCompanies('Corporate', this)">일반 기업</button>
                        <button class="chip" data-filter="Travel Agency" onclick="filterCompanies('Travel Agency', this)">여행사</button>
                        <button class="chip" data-filter="Other" onclick="filterCompanies('Other', this)">기타</button>
                    </div>
                </div>
                <div class="filter-right">
                    <button class="btn-primary-sm" onclick="openNewCompanyModal()">
                        <i class="fa-solid fa-plus"></i> 신규 업체 등록
                    </button>
                </div>
            </div>

            <div id="companyGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(400px,1fr));gap:16px"></div>
            
            <div id="emptyState" style="display:none;text-align:center;padding:60px 20px;color:var(--txt3)">
                <i class="fa-solid fa-building-circle-xmark" style="font-size:2.5rem;margin-bottom:12px;display:block"></i>
                등록된 업체가 없습니다.
            </div>

        </div>
    </div>

<!-- 신규/수정 업체 등록 모달 -->
<div class="modal-overlay" id="companyModal" onclick="if(event.target===this)closeModal('companyModal')">
    <div class="modal-card" style="max-width:500px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title" id="compModalTitle">업체 등록</h3>
            <input type="hidden" id="compId">
            <button class="modal-close" onclick="closeModal('companyModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
            <div>
                <label class="form-label">업체명 (Company/Agency Name) <span style="color:var(--danger)">*</span></label>
                <input type="text" id="compName" class="form-input" style="width:100%" placeholder="예: 삼성전자">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label class="form-label">업체 유형</label>
                    <select id="compType" class="form-input" style="width:100%">
                        <option value="Corporate">일반 기업</option>
                        <option value="Travel Agency">여행사</option>
                        <option value="Government">정부/공공기관</option>
                        <option value="Other">기타 단체</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">상태</label>
                    <select id="compStatus" class="form-input" style="width:100%">
                        <option value="active">계약 활성</option>
                        <option value="inactive">계약 만료/비활성</option>
                    </select>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label class="form-label">담당자 이름</label>
                    <input type="text" id="compContactName" class="form-input" style="width:100%" placeholder="예: 김대리">
                </div>
                <div>
                    <label class="form-label">연락처</label>
                    <input type="text" id="compPhone" class="form-input" style="width:100%" placeholder="예: 010-1234-5678">
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label class="form-label">계약 조건 (Discount/Comm)</label>
                    <input type="text" id="compRate" class="form-input" style="width:100%" placeholder="예: 객실 15% 할인">
                </div>
                <div>
                    <label class="form-label">정산 방식</label>
                    <select id="compBilling" class="form-input" style="width:100%">
                        <option>Master Folio (후불 월정산)</option>
                        <option>Individual (현장 개별결제)</option>
                        <option>가상계좌 선입금</option>
                    </select>
                </div>
            </div>
            <div>
                <label class="form-label">메모</label>
                <textarea id="compNote" class="form-input" style="width:100%;min-height:60px;resize:vertical" placeholder="추가 계약사항 등"></textarea>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('companyModal')">취소</button>
            <button class="btn-primary-sm" onclick="saveCompany()"><i class="fa-solid fa-check"></i> 저장</button>
        </div>
    </div>
</div>


<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

let companies = [];
let groupEvents = [];
let currentFilter = 'all';

const COMPANY_TYPE_LABELS = {
    ko: {
        all: '전체',
        Corporate: '일반 기업',
        'Travel Agency': '여행사',
        Government: '정부/공공기관',
        Other: '기타'
    },
    en: {
        all: 'All',
        Corporate: 'Corporate',
        'Travel Agency': 'Travel Agency',
        Government: 'Government',
        Other: 'Other'
    }
};

const COMPANY_TYPE_OPTION_LABELS = {
    ko: {
        Corporate: '일반 기업',
        'Travel Agency': '여행사',
        Government: '정부/공공기관',
        Other: '기타 단체'
    },
    en: COMPANY_TYPE_LABELS.en
};

function companyLang() {
    return window.currentLang || localStorage.getItem('pms_lang') || 'ko';
}

function companyTypeKey(value) {
    const type = String(value || '').trim().toLowerCase();
    if (['corporate', 'corporation', 'company', 'enterprise', '기업', '일반 기업'].includes(type)) return 'Corporate';
    if (['agency', 'travel agency', 'travel_agency', 'ota', '여행사'].includes(type)) return 'Travel Agency';
    if (['government', 'gov', 'public', 'government/public', '정부', '공공기관', '정부/공공기관'].includes(type)) return 'Government';
    if (['other', '기타', '기타 단체'].includes(type)) return 'Other';
    return '';
}

function companyTypeLabel(key, option = false) {
    const lang = companyLang();
    const labels = option ? COMPANY_TYPE_OPTION_LABELS : COMPANY_TYPE_LABELS;
    return (labels[lang] && labels[lang][key]) || labels.en[key] || key;
}

function companyText(key, params = {}) {
    const catalogKey = `company.${key}`;
    if (typeof window.t === 'function') {
        const translated = window.t(catalogKey, params);
        if (translated && translated !== catalogKey) return translated;
    }
    const fallback = {
        nameRequired: '업체명을 입력하세요.',
        updated: '업체 정보가 수정되었습니다.',
        created: '신규 업체가 등록되었습니다.',
        'delete.confirm': '[{name}] 업체를 삭제하시겠습니까?',
        'delete.done': '업체가 삭제되었습니다.',
        'delete.blocked': '진행/예정 또는 미정산 행사가 있는 업체는 삭제할 수 없습니다. 연결된 행사를 취소하거나 정산 완료 후 삭제해 주세요.',
        'delete.disabledTitle': '진행/예정 또는 미정산 행사가 있어 삭제할 수 없습니다.',
        active: '진행',
        upcoming: '예정',
        unsettled: '미정산',
        pastEvents: '지난 행사'
    };
    let text = fallback[key] || key;
    Object.keys(params).forEach(name => {
        text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
    });
    return text;
}

function companyFilterKey(company) {
    const key = companyTypeKey(company?.type);
    return key && key !== 'Government' ? key : 'Other';
}

function companyTypeDisplay(company) {
    const raw = String(company?.type || '').trim();
    const key = companyTypeKey(raw);
    if (key) return companyTypeLabel(key);
    return raw || companyTypeLabel('Other');
}

function companyMatchesFilter(company) {
    return currentFilter === 'all' || companyFilterKey(company) === currentFilter;
}

function updateCompanyFilterCounts() {
    const counts = companies.reduce((acc, company) => {
        const key = companyFilterKey(company);
        acc.all += 1;
        acc[key] = (acc[key] || 0) + 1;
        return acc;
    }, { all: 0, Corporate: 0, 'Travel Agency': 0, Other: 0 });
    document.querySelectorAll('.filter-chips .chip[data-filter]').forEach(chip => {
        const filter = chip.dataset.filter;
        const label = companyTypeLabel(filter);
        chip.innerHTML = `${label} <span class="chip-count">${counts[filter] || 0}</span>`;
    });
}

function localizeCompanyTypeControls() {
    document.querySelectorAll('.filter-chips .chip[data-filter]').forEach(chip => {
        const filter = chip.dataset.filter;
        chip.dataset.label = companyTypeLabel(filter);
        if (!chip.querySelector('.chip-count')) chip.textContent = companyTypeLabel(filter);
    });
    document.querySelectorAll('#compType option').forEach(option => {
        option.textContent = companyTypeLabel(option.value, true);
    });
}

document.addEventListener('DOMContentLoaded', async () => {
    try {
        if (window.PmsAPI?.getCompanies) {
            companies = await window.PmsAPI.getCompanies();
        } else {
            companies = JSON.parse(localStorage.getItem('pms_companies') || '[]');
        }
    } catch(e) {
        console.warn('companies load fallback', e);
        companies = JSON.parse(localStorage.getItem('pms_companies') || '[]');
    }
    try {
        if (window.PmsAPI?.getGroups) {
            groupEvents = await window.PmsAPI.getGroups();
        } else {
            groupEvents = JSON.parse(localStorage.getItem('pms_groups') || '[]');
        }
    } catch(e) {
        console.warn('groups load fallback', e);
        try { groupEvents = JSON.parse(localStorage.getItem('pms_groups') || '[]'); } catch(_) { groupEvents = []; }
    }
    localizeCompanyTypeControls();
    renderCompanies();
});

window.applyLocalI18n = function() {
    localizeCompanyTypeControls();
    renderCompanies(document.querySelector('.search-box-mt input')?.value || '');
};

window.addEventListener('languagechange', () => {
    localizeCompanyTypeControls();
    renderCompanies(document.querySelector('.search-box-mt input')?.value || '');
});

function filterCompanies(type, btn) {
    currentFilter = type;
    btn.closest('.filter-chips').querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    if(btn) btn.classList.add('active');
    renderCompanies();
}
function searchCompanies(val) { renderCompanies(val); }

function renderCompanies(search = '') {
    const grid = document.getElementById('companyGrid');
    const empty = document.getElementById('emptyState');
    
    document.getElementById('kpiTotal').textContent = companies.length;
    document.getElementById('kpiActive').textContent = companies.filter(c => c.status==='active').length;
    
    // Calculate events and unpaid from groups
    const gStored = localStorage.getItem('pms_groups');
    let eventsCount = 0;
    if(gStored) {
        const groups = JSON.parse(gStored);
        eventsCount = groups.filter(g => g.status === 'confirmed' || g.status === 'inhouse').length;
    }
    document.getElementById('kpiEvents').textContent = eventsCount;
    // Mock unpaid as 1 for now if there are events, 0 otherwise
    document.getElementById('kpiUnpaid').textContent = eventsCount > 0 ? 1 : 0;
    updateCompanyFilterCounts();

    const filtered = companies.filter(c => {
        const typeMatch = companyMatchesFilter(c);
        const searchMatch = !search || c.name.toLowerCase().includes(search.toLowerCase());
        return typeMatch && searchMatch;
    });

    if (filtered.length === 0) {
        grid.style.display = 'none'; empty.style.display = 'block'; return;
    }
    grid.style.display = 'grid'; empty.style.display = 'none';

    grid.innerHTML = filtered.map(c => {
        const typeName = companyTypeDisplay(c);
        const badgeCls = c.status==='active'?'pill-active':'pill-inactive';
        const badgeTxt = c.status==='active'?'계약 활성':'계약 비활성';
        return `
        <div class="company-card">
            <div class="company-header">
                <div>
                    <div class="company-name">${c.name}</div>
                    <div class="company-type">${typeName} · ${c.id}</div>
                </div>
                <span class="status-badge ${badgeCls}">${badgeTxt}</span>
            </div>
            <div class="company-meta">
                <div><i class="fa-solid fa-user"></i> 담당: ${c.contactName || '-'}</div>
                <div><i class="fa-solid fa-phone"></i> ${c.phone || '-'}</div>
                <div><i class="fa-solid fa-percent"></i> ${c.rate || '-'}</div>
                <div><i class="fa-solid fa-credit-card"></i> ${c.billing || '-'}</div>
            </div>
            <div class="card-footer-btns">
                <button class="btn-room-assign" onclick="event.stopPropagation(); openBlockModal('${c.id}')">
                    <i class="fa-solid fa-bed"></i> 객실 배정
                </button>
                <div style="display:flex;gap:6px;">
                    <button class="btn-card-edit" onclick="event.stopPropagation(); editCompany('${c.id}')" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-card-delete" onclick="event.stopPropagation(); deleteCompany('${c.id}')" title="삭제"><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>
        </div>`;
    }).join('');
}

function openNewCompanyModal() {
    document.getElementById('compModalTitle').textContent = '신규 업체 등록';
    document.getElementById('compId').value = '';
    document.getElementById('compName').value = '';
    document.getElementById('compContactName').value = '';
    document.getElementById('compPhone').value = '';
    document.getElementById('compRate').value = '';
    document.getElementById('compNote').value = '';
    openModal('companyModal');
}

function editCompany(id) {
    const c = companies.find(x => x.id === id);
    if(!c) return;
    document.getElementById('compModalTitle').textContent = '업체 정보 수정';
    document.getElementById('compId').value = c.id;
    document.getElementById('compName').value = c.name;
    document.getElementById('compType').value = c.type;
    document.getElementById('compStatus').value = c.status;
    document.getElementById('compContactName').value = c.contactName;
    document.getElementById('compPhone').value = c.phone;
    document.getElementById('compRate').value = c.rate;
    document.getElementById('compNote').value = c.note || '';
    
    const bSel = document.getElementById('compBilling');
    const bMatch = Array.from(bSel.options).find(o => o.value.includes(c.billing) || (c.billing && c.billing.includes(o.value)));
    if(bMatch) bSel.value = bMatch.value;

    openModal('companyModal');
}

async function persistCompanies() {
    if (window.PmsAPI?.saveCompanies) await window.PmsAPI.saveCompanies(companies);
    else localStorage.setItem('pms_companies', JSON.stringify(companies));
}

async function saveCompany() {
    const id = document.getElementById('compId').value;
    const name = document.getElementById('compName').value;
    if(!name) { showToast(companyText('nameRequired'), 'error'); return; }
    
    const data = {
        name: name,
        type: document.getElementById('compType').value,
        status: document.getElementById('compStatus').value,
        contactName: document.getElementById('compContactName').value,
        phone: document.getElementById('compPhone').value,
        rate: document.getElementById('compRate').value,
        billing: document.getElementById('compBilling').value,
        note: document.getElementById('compNote').value
    };

    if(id) {
        const c = companies.find(x => x.id === id);
        Object.assign(c, data);
        showToast(companyText('updated'));
    } else {
        data.id = 'COMP-' + Math.floor(Math.random()*10000);
        companies.unshift(data);
        showToast(companyText('created'));
    }
    await persistCompanies();
    closeModal('companyModal');
    renderCompanies();
}

async function deleteCompany(id) {
    const c = companies.find(x => x.id === id);
    const guard = typeof window.companyDeleteGuard === 'function' ? window.companyDeleteGuard(c) : { locked: false };
    if (guard.locked) {
        showToast(companyText('delete.blocked'), 'error');
        return;
    }
    if(await showConfirm(companyText('delete.confirm', { name: c.name }))) {
        companies = companies.filter(x => x.id !== id);
        await persistCompanies();
        showToast(companyText('delete.done'));
        renderCompanies();
    }
}

function openBlockModal(compId) {
    window.location.href = `groups_block_detail.html?mode=new&companyId=${encodeURIComponent(compId)}`;
}
</script>
<script>
(function(){
    function allGroupEvents() {
        const merged = new Map();
        if (Array.isArray(groupEvents)) {
            groupEvents.forEach(group => {
                if (group?.id) merged.set(group.id, group);
            });
        }
        try {
            JSON.parse(localStorage.getItem('pms_groups') || '[]').forEach(group => {
                if (group?.id && !merged.has(group.id)) merged.set(group.id, group);
            });
        } catch(e) {}
        return [...merged.values()];
    }

    function normalizeText(value) {
        return String(value || '').toLowerCase().replace(/\s+/g, '').replace(/[()]/g, '');
    }

    function companyGroups(company) {
        const groups = allGroupEvents();
        const companyId = String(company?.id || '');
        const companyName = normalizeText(company?.name);
        return groups.filter(g => {
            const groupCompanyIds = [g.companyId, g.agencyId, g.company?.id].filter(Boolean).map(String);
            if (companyId && groupCompanyIds.includes(companyId)) return true;
            const groupCompanyNames = [g.companyName, g.agency, g.company?.name].map(normalizeText).filter(Boolean);
            return companyName && groupCompanyNames.some(name => name === companyName || name.includes(companyName) || companyName.includes(name));
        });
    }

    function parseDate(value) {
        if (!value) return null;
        const dateText = String(value);
        const d = dateText.includes('-') ? new Date(dateText) : new Date(`2026/${dateText}`);
        if (Number.isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
    }

    function stageOf(g) {
        const now = new Date();
        now.setHours(0,0,0,0);
        const status = String(g.status || '').toLowerCase();
        const settlementStatus = String(g.settlementStatus || g.settlement || '').toLowerCase();
        const cin = parseDate(g.checkin || g.checkInDate || g.cin);
        const cout = parseDate(g.checkout || g.checkOutDate || g.cout);
        const cancelled = ['cancelled', 'canceled', 'void'].includes(status);
        const departedOrPast = ['departed', 'completed', 'checked-out', 'checkout'].includes(status) || (cout && cout <= now);
        const unsettled = ['pending', 'unpaid', 'settlement', 'open'].includes(settlementStatus) || (departedOrPast && settlementStatus !== 'paid');
        if (cancelled) return 'past';
        if (unsettled && departedOrPast) return 'settlement';
        if (cin && cin.getTime() === now.getTime()) return 'today';
        if (cin && cout && cin <= now && cout > now) return 'active';
        if (cin && cin > now) return 'upcoming';
        if (cout && cout <= now) return 'past';
        if (['inhouse', 'in-house', 'checkedin', 'checked-in'].includes(status)) return 'active';
        if (['confirmed', 'pending', 'reserved'].includes(status)) return 'upcoming';
        if (['departed', 'completed'].includes(status)) return 'past';
        return 'upcoming';
    }

    function stageCounts(events) {
        return events.reduce((acc, g) => {
            const stage = stageOf(g);
            if (stage === 'active') acc.active++;
            else if (stage === 'upcoming' || stage === 'today') acc.upcoming++;
            else if (stage === 'settlement') acc.settlement++;
            else if (stage === 'past') acc.past++;
            return acc;
        }, {active:0, upcoming:0, settlement:0, past:0});
    }

    window.companyDeleteGuard = function(company) {
        if (!company) return { locked: false, events: [], counts: { active: 0, upcoming: 0, settlement: 0, past: 0 } };
        const events = companyGroups(company);
        const counts = stageCounts(events);
        const locked = counts.active + counts.upcoming + counts.settlement > 0;
        return { locked, events, counts };
    };

    window.renderCompanies = function(search = '') {
        const grid = document.getElementById('companyGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;
        document.getElementById('kpiTotal').textContent = companies.length;
        document.getElementById('kpiActive').textContent = companies.filter(c => c.status === 'active').length;
        const eventCounts = stageCounts(allGroupEvents());
        document.getElementById('kpiEvents').textContent = eventCounts.active + eventCounts.upcoming;
        document.getElementById('kpiUnpaid').textContent = eventCounts.settlement;
        updateCompanyFilterCounts();

        const q = String(search || '').toLowerCase();
        const filtered = companies.filter(c => {
            const typeMatch = companyMatchesFilter(c);
            const text = [c.name, c.contactName, c.phone, c.rate, c.billing].filter(Boolean).join(' ').toLowerCase();
            return typeMatch && (!q || text.includes(q));
        });
        if (!filtered.length) {
            grid.style.display = 'none';
            if (empty) empty.style.display = 'block';
            return;
        }
        grid.style.display = 'grid';
        if (empty) empty.style.display = 'none';
        const companyCardHtml = filtered.map(c => {
            const events = companyGroups(c);
            const cnt = stageCounts(events);
            const deleteGuard = window.companyDeleteGuard(c);
            const deleteDisabled = deleteGuard.locked ? 'disabled aria-disabled="true"' : '';
            const deleteTitle = deleteGuard.locked ? companyText('delete.disabledTitle') : '삭제';
            const typeName = companyTypeDisplay(c);
            const badgeCls = c.status === 'active' ? 'pill-active' : 'pill-inactive';
            const badgeTxt = c.status === 'active' ? '계약 활성' : '비활성';
            return `
            <div class="company-card">
                <div class="company-header">
                    <div>
                        <div class="company-name">${c.name}</div>
                        <div class="company-type">${typeName} · ${c.id}</div>
                    </div>
                    <span class="status-badge ${badgeCls}">${badgeTxt}</span>
                </div>
                <div class="company-meta">
                    <div><i class="fa-solid fa-user"></i> 담당: ${c.contactName || '-'}</div>
                    <div><i class="fa-solid fa-phone"></i> ${c.phone || '-'}</div>
                    <div><i class="fa-solid fa-percent"></i> ${c.rate || (c.groupDiscount ? `객실 ${c.groupDiscount}% 할인` : '-')}</div>
                    <div><i class="fa-solid fa-credit-card"></i> ${c.billing || '-'}</div>
                    <div><i class="fa-solid fa-calendar-check"></i> ${companyText('active')} ${cnt.active} · ${companyText('upcoming')} ${cnt.upcoming}</div>
                    <div><i class="fa-solid fa-file-invoice-dollar"></i> ${companyText('unsettled')} ${cnt.settlement}</div>
                    <div><i class="fa-solid fa-box-archive"></i> ${companyText('pastEvents')} ${cnt.past}</div>
                </div>
                <div class="card-footer-btns">
                    <button class="btn-room-assign" onclick="event.stopPropagation(); openBlockModal('${c.id}')"><i class="fa-solid fa-calendar-plus"></i> 행사 생성</button>
                    <button class="btn-card-edit" onclick="event.stopPropagation(); location.href='groups_blocks.html?companyId=${encodeURIComponent(c.id)}'" title="행사 보기"><i class="fa-solid fa-list"></i></button>
                    <button class="btn-card-edit" onclick="event.stopPropagation(); editCompany('${c.id}')" title="업체 수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="btn-card-delete" onclick="event.stopPropagation(); deleteCompany('${c.id}')" title="${deleteTitle}" ${deleteDisabled}><i class="fa-solid fa-trash"></i></button>
                </div>
            </div>`;
        }).join('');
        if (grid.innerHTML !== companyCardHtml) grid.innerHTML = companyCardHtml;
    };
    try { renderCompanies = window.renderCompanies; } catch(e) {}
})();
</script>
<script>
(function(){
    function parseDiscount(rate) {
        const m = String(rate || '').match(/(\d+(?:\.\d+)?)\s*%/);
        return m ? Number(m[1]) : 0;
    }
    function ensureCompanyDiscountField() {
        if (document.getElementById('compGroupDiscount')) return;
        const rateInput = document.getElementById('compRate');
        if (!rateInput) return;
        const wrap = rateInput.closest('div');
        const field = document.createElement('div');
        field.innerHTML = `
            <label class="form-label">단체 객실 할인율 (%)</label>
            <input type="number" id="compGroupDiscount" class="form-input" style="width:100%" min="0" max="100" step="1" placeholder="예: 15">
        `;
        wrap.parentElement.insertBefore(field, wrap.nextSibling);
        rateInput.placeholder = '할인율을 입력하면 자동 생성됩니다';
    }
    function normalizeCompanies() {
        try {
            const saved = JSON.parse(localStorage.getItem('pms_companies') || '[]');
            let touched = false;
            saved.forEach(c => {
                if (c.groupDiscount === undefined) {
                    c.groupDiscount = parseDiscount(c.rate);
                    touched = true;
                }
                if (!c.rate && c.groupDiscount) {
                    c.rate = `객실 ${c.groupDiscount}% 할인`;
                    touched = true;
                }
            });
            if (touched) {
                localStorage.setItem('pms_companies', JSON.stringify(saved));
                companies = saved;
            }
        } catch(e) {}
    }
    const oldOpen = window.openNewCompanyModal;
    window.openNewCompanyModal = function() {
        ensureCompanyDiscountField();
        oldOpen();
        document.getElementById('compGroupDiscount').value = '';
    };
    const oldEdit = window.editCompany;
    window.editCompany = function(id) {
        ensureCompanyDiscountField();
        oldEdit(id);
        const c = companies.find(x => x.id === id);
        document.getElementById('compGroupDiscount').value = c?.groupDiscount ?? parseDiscount(c?.rate);
    };
    const oldSave = window.saveCompany;
    window.saveCompany = function() {
        ensureCompanyDiscountField();
        const discount = Number(document.getElementById('compGroupDiscount').value || 0);
        const rate = document.getElementById('compRate');
        if (rate) rate.value = `객실 ${discount}% 할인`;
        oldSave();
        try {
            const saved = JSON.parse(localStorage.getItem('pms_companies') || '[]');
            const name = document.getElementById('compName').value;
            const id = document.getElementById('compId').value;
            const c = saved.find(x => (id && x.id === id) || x.name === name);
            if (c) {
                c.groupDiscount = discount;
                c.rate = `객실 ${discount}% 할인`;
                localStorage.setItem('pms_companies', JSON.stringify(saved));
                companies = saved;
                renderCompanies();
            }
        } catch(e) {}
    };
    document.addEventListener('DOMContentLoaded', () => {
        ensureCompanyDiscountField();
        normalizeCompanies();
    });
})();
</script>
