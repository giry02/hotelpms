<body>
<div class="main reservation-board-page">
    <header class="topbar"><h1>예약 현황</h1></header>
    <div class="content">
        <div class="kpi-grid kpi-grid-5 reservation-board-kpis">
            <div class="kpi-card blue"><div class="kpi-icon"><i class="fa-solid fa-calendar-check"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiArrival">0</div><div class="kpi-label">오늘 체크인</div></div></div>
            <div class="kpi-card green"><div class="kpi-icon"><i class="fa-solid fa-bed"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiInhouse">0</div><div class="kpi-label">투숙 중</div></div></div>
            <div class="kpi-card orange"><div class="kpi-icon"><i class="fa-solid fa-right-from-bracket"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiCheckout">0</div><div class="kpi-label">체크아웃</div></div></div>
            <div class="kpi-card purple"><div class="kpi-icon"><i class="fa-solid fa-calendar-days"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiReserved">0</div><div class="kpi-label">예약 예정</div></div></div>
            <div class="kpi-card"><div class="kpi-icon"><i class="fa-solid fa-door-open"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiVacant">0</div><div class="kpi-label">예약 없음</div></div></div>
        </div>

        <div class="filter-bar-mt reservation-board-toolbar">
            <div class="reservation-board-topline">
                <div class="search-container">
                    <div class="search-box-mt">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input id="boardSearch" type="text" placeholder="객실번호, 이름 검색..." oninput="renderReservationBoard()">
                    </div>
                    <button class="btn-search" onclick="renderReservationBoard()"><i class="fa-solid fa-search"></i> 검색</button>
                </div>
                <button class="btn-primary-sm" onclick="openUnifiedResModal()"><i class="fa-solid fa-plus"></i> 신규 예약</button>
            </div>
            <div class="filter-chips reservation-board-filters" id="boardChips">
                <button class="chip active" data-filter="all" onclick="setBoardFilter('all')"><i class="fa-solid fa-list"></i> 전체 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="checkin" onclick="setBoardFilter('checkin')"><i class="fa-solid fa-right-to-bracket"></i> 오늘 체크인 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="inhouse" onclick="setBoardFilter('inhouse')"><i class="fa-solid fa-bed"></i> 투숙 중 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="checkout" onclick="setBoardFilter('checkout')"><i class="fa-solid fa-right-from-bracket"></i> 체크아웃 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="late" onclick="setBoardFilter('late')"><i class="fa-solid fa-clock"></i> 레이트 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="roommove" onclick="setBoardFilter('roommove')"><i class="fa-solid fa-right-left"></i> 객실 변경 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="completed" onclick="setBoardFilter('completed')"><i class="fa-solid fa-check-double"></i> 완료 <span class="chip-count">0</span></button>
                <button class="chip" data-filter="cancelled" onclick="setBoardFilter('cancelled')"><i class="fa-solid fa-ban"></i> 취소/노쇼 <span class="chip-count">0</span></button>
            </div>
        </div>

        <div id="reservationBoardContainer"></div>
    </div>
</div>

<script>
let rooms = [];
let reservations = [];
let groups = [];
let boardFilter = 'all';
let boardPeriod = 'today';

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function todayDate() {
    const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    date.setHours(0, 0, 0, 0);
    return date;
}

function addDays(date, days) {
    const next = new Date(date);
    next.setDate(next.getDate() + days);
    next.setHours(0, 0, 0, 0);
    return next;
}

function boardDateKey(date = todayDate()) {
    const value = new Date(date);
    if (Number.isNaN(value.getTime())) return '';
    return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, '0')}-${String(value.getDate()).padStart(2, '0')}`;
}

function sameDate(left, right) {
    return !!(left && right && left.getTime() === right.getTime());
}

function dateInRange(date, range) {
    return !!(date && range && date >= range.start && date <= range.end);
}

function boardRange() {
    const today = todayDate();
    if (boardPeriod === 'tomorrow') {
        const tomorrow = addDays(today, 1);
        return { start: tomorrow, end: tomorrow, mode: 'day' };
    }
    if (boardPeriod === 'week') return { start: today, end: addDays(today, 6), mode: 'week' };
    return { start: today, end: today, mode: 'day' };
}

function parseDate(value) {
    if (!value) return null;
    const text = String(value).trim();
    const md = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (md) {
        const base = todayDate();
        return new Date(base.getFullYear(), Number(md[1]) - 1, Number(md[2]));
    }
    const date = new Date(text);
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function reservationStart(res) {
    return parseDate(res?.checkInDate || res?.checkin || res?.cin);
}

function reservationEnd(res) {
    return parseDate(res?.checkOutDate || res?.checkout || res?.cout);
}

function reservationOverlapsRange(res, range = boardRange()) {
    const start = reservationStart(res);
    const end = reservationEnd(res);
    if (start && end) return start <= range.end && end >= range.start;
    return dateInRange(start || end, range);
}

function reservationActiveOn(res, date) {
    const start = reservationStart(res);
    const end = reservationEnd(res);
    return !!(start && end && start <= date && date < end);
}

function normalizeStatus(value) {
    const key = String(value || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'inhouse';
    if (['checkedout', 'completed', 'departed'].includes(key)) return 'completed';
    if (['blocked'].includes(key)) return 'blocked';
    if (['oos', 'outofservice', 'maintenance'].includes(key)) return 'oos';
    return key || 'confirmed';
}

function normalizeReservationStatus(value) {
    const key = String(value || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'checkedin';
    if (key === 'checkout') return 'checkout';
    if (['checkedout', 'completed', 'departed'].includes(key)) return 'completed';
    if (['cancelled', 'canceled', 'noshow'].includes(key)) return 'cancelled';
    if (key === 'blocked') return 'blocked';
    if (key === 'pending') return 'pending';
    return key || 'confirmed';
}

function normalizeRoomValue(value) {
    const text = String(value || '').trim().toLowerCase();
    const digits = (text.match(/\d+/g) || []).join('');
    return { text, digits, strippedDigits: digits.replace(/^0+(?=\d)/, '') };
}

function sameRoomValue(left, right) {
    const a = normalizeRoomValue(left);
    const b = normalizeRoomValue(right);
    if (!a.text || !b.text) return false;
    if (a.text === b.text) return true;
    return !!(a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits));
}

function roomMatchesReservation(room, res) {
    const roomValues = [room?.id, room?.fullRoom, room?.roomId, room?.number, room?.roomNo, room?.display, room?.roomLabel];
    const resValues = [res?.room, res?.fullRoom, res?.roomId, res?.roomNo, res?.roomNumber, res?.roomLabel];
    return roomValues.some(roomValue => resValues.some(resValue => sameRoomValue(roomValue, resValue)));
}

function roomForReservation(res) {
    return rooms.find(room => roomMatchesReservation(room, res));
}

function isReservationRoomInHouse(res) {
    const room = roomForReservation(res);
    return normalizeStatus(room?.frontStatus || room?.status || room?.housekeepingStatus) === 'inhouse';
}

function checkoutDateIsDue(res, refDate = todayDate()) {
    const end = reservationEnd(res);
    return !!end && end <= refDate;
}

function checkinDateIsDue(res, refDate = todayDate()) {
    const start = reservationStart(res);
    return !!start && start <= refDate;
}

function isCurrentStayWindow(res, refDate = todayDate()) {
    return reservationActiveOn(res, refDate);
}

function effectiveReservationStatus(res, refDate = todayDate()) {
    let status = normalizeReservationStatus(res?.status);
    if (['confirmed', 'pending'].includes(status) && isReservationRoomInHouse(res) && isCurrentStayWindow(res, refDate)) status = 'checkedin';
    if (status === 'checkedin' && checkoutDateIsDue(res, refDate)) return 'checkout';
    return status;
}

function reservationBucket(res) {
    const range = boardRange();
    if (!reservationOverlapsRange(res, range)) return null;
    const start = reservationStart(res);
    const end = reservationEnd(res);
    const refDate = range.mode === 'day' ? range.start : todayDate();
    const status = effectiveReservationStatus(res, refDate);
    if (status === 'cancelled') return 'cancelled';
    if (status === 'completed') return 'completed';
    if (status === 'checkout') return 'checkout';
    if (range.mode === 'day') {
        if (status === 'checkedin' && end && sameDate(end, range.start)) return 'checkout';
        if (status === 'checkedin' && reservationActiveOn(res, range.start)) return 'inhouse';
        if (start && sameDate(start, range.start)) return 'checkin';
        if (end && sameDate(end, range.start)) return 'checkout';
        if (reservationActiveOn(res, range.start)) return status === 'checkedin' ? 'inhouse' : 'reserved';
        return 'reserved';
    }
    if (status === 'checkedin' && reservationActiveOn(res, todayDate())) return 'inhouse';
    if (start && dateInRange(start, range)) return 'checkin';
    if (end && dateInRange(end, range) && ['checkedin', 'checkout'].includes(status)) return 'checkout';
    if (reservationActiveOn(res, todayDate())) return 'inhouse';
    return 'reserved';
}

function boardReservationCounts() {
    const counts = { all: 0, checkin: 0, inhouse: 0, checkout: 0, late: 0, roommove: 0, reserved: 0, completed: 0, cancelled: 0 };
    reservations.forEach(res => {
        const bucket = reservationBucket(res);
        if (!bucket) return;
        counts.all++;
        if (counts[bucket] !== undefined) counts[bucket]++;
        if (reservationLateCheckoutEnabled(res)) counts.late++;
        if (reservationHasRoomChange(res)) counts.roommove++;
    });
    return counts;
}

function boardCheckinLabel() {
    if (boardPeriod === 'tomorrow') return '내일 체크인';
    if (boardPeriod === 'week') return '1주일 체크인';
    return '오늘 체크인';
}

function updateBoardPeriodLabels() {
    const label = boardCheckinLabel();
    const arrivalLabel = document.getElementById('kpiArrival')?.parentElement?.querySelector('.kpi-label');
    if (arrivalLabel) arrivalLabel.textContent = label;
    const chip = document.querySelector('#boardChips .chip[data-filter="checkin"]');
    if (chip) {
        const count = chip.querySelector('.chip-count')?.textContent || '0';
        chip.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> ${label} <span class="chip-count">${escapeHtml(count)}</span>`;
    }
}

function primaryGuest(res) {
    return res?.roomingGuestName || res?.guestName || res?.guest || '';
}

function storedBoardGroups() {
    const merged = new Map();
    (Array.isArray(groups) ? groups : []).forEach(group => {
        if (group?.id) merged.set(group.id, group);
    });
    try {
        const stored = JSON.parse(localStorage.getItem('pms_groups') || '[]');
        if (Array.isArray(stored)) {
            stored.forEach(group => {
                if (group?.id) merged.set(group.id, { ...(merged.get(group.id) || {}), ...group });
            });
        }
    } catch(e) {}
    return [...merged.values()];
}

function boardGroupForReservation(res) {
    if (!res?.groupId) return null;
    return storedBoardGroups().find(group => group && group.id === res.groupId) || null;
}

function boardGroupLabel(res) {
    if (!res) return '';
    const group = boardGroupForReservation(res);
    return String(
        res.groupName
        || group?.name
        || group?.displayName
        || res.companyName
        || res.company
        || res.agency
        || ''
    ).trim();
}

function boardDisplayName(res) {
    if (!res) return '';
    const guest = primaryGuest(res);
    const groupName = boardGroupLabel(res);
    if (res.groupId && groupName && guest) return `${groupName} · ${guest}`;
    if (res.groupId && groupName) return groupName;
    if (res.groupId && guest) return guest;
    return guest || groupName || (res.isGroupPlaceholder || normalizeReservationStatus(res) === 'blocked' ? '단체 블록' : '');
}

function boardPrimaryIcon(res) {
    return res?.groupId || res?.isGroupPlaceholder || normalizeReservationStatus(res) === 'blocked'
        ? 'fa-users'
        : 'fa-user';
}

function companionGuests(res) {
    const primary = primaryGuest(res);
    const values = [
        ...(Array.isArray(res?.roomingGuestNames) ? res.roomingGuestNames.slice(1) : []),
        ...(Array.isArray(res?.companionGuestNames) ? res.companionGuestNames : []),
        ...(Array.isArray(res?.companions) ? res.companions.map(item => typeof item === 'string' ? item : item?.name) : []),
        ...(Array.isArray(res?.roomingGuests) ? res.roomingGuests.slice(1).map(item => typeof item === 'string' ? item : item?.name) : [])
    ];
    const seen = new Set();
    return values.map(name => String(name || '').trim()).filter(name => name && name !== primary && !seen.has(name) && seen.add(name));
}

function reservationRoomChangeHistory(res) {
    const sources = [
        ...(Array.isArray(res?.roomChangeHistory) ? res.roomChangeHistory : []),
        ...(Array.isArray(res?.roomMoveHistory) ? res.roomMoveHistory : []),
        ...(Array.isArray(res?.settlementRoomChanges) ? res.settlementRoomChanges : [])
    ];
    const seen = new Set();
    return sources.filter(item => {
        const fromRoom = item?.fromRoom || item?.beforeRoom || item?.from || '';
        const toRoom = item?.toRoom || item?.afterRoom || item?.to || '';
        const key = `${fromRoom}->${toRoom}-${item?.changedAt || item?.createdAt || ''}`;
        if (!fromRoom && !toRoom) return false;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function reservationHasRoomChange(res) {
    return reservationRoomChangeHistory(res).length > 0;
}

function reservationRoomChangeText(res) {
    const last = reservationRoomChangeHistory(res).slice(-1)[0];
    if (!last) return '';
    const fromRoom = last.fromRoom || last.beforeRoom || last.from || '-';
    const toRoom = last.toRoom || last.afterRoom || last.to || res?.room || res?.roomNo || '-';
    return `${fromRoom} → ${toRoom}`;
}

function amountValue(res) {
    if (res?.totalAmount && typeof res.totalAmount === 'object') return Number(res.totalAmount.amount || 0);
    return Number(res?.amount || 0);
}

function formatMoney(amount) {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 2 }).format(Number(amount || 0));
}

function boardStatusFor(room) {
    const range = boardRange();
    const focusDate = range.mode === 'day' ? range.start : todayDate();
    const roomStatus = normalizeStatus(room.status || room.frontStatus || room.housekeepingStatus);
    if (roomStatus === 'oos') return { status: 'oos', label: '점검 중', res: null };
    const related = reservations
        .filter(res => roomMatchesReservation(room, res))
        .map(res => ({
            res,
            status: normalizeStatus(res.status),
            start: reservationStart(res),
            end: reservationEnd(res)
        }))
        .filter(item => item.start && item.end && item.status !== 'cancelled' && item.status !== 'completed' && reservationOverlapsRange(item.res, range))
        .sort((a, b) => a.start - b.start);

    const active = related.find(item => item.start <= focusDate && focusDate < item.end);
    if (active) {
        if (active.status === 'blocked' || active.res.isGroupPlaceholder) return { status: 'blocked', label: '단체 블록', res: active.res };
        if (reservationLateCheckoutEnabled(active.res)) return { status: 'late', label: '레이트', res: active.res };
        if (sameDate(active.end, focusDate)) return { status: 'checkout', label: '체크아웃', res: active.res };
        if (['inhouse', 'checkout'].includes(active.status) || roomStatus === 'inhouse') return { status: 'inhouse', label: '투숙 중', res: active.res };
        if (sameDate(active.start, focusDate)) return { status: 'arrival', label: '체크인', res: active.res };
        return { status: 'reserved', label: '예약 중', res: active.res };
    }

    const arrival = range.mode === 'day'
        ? related.find(item => sameDate(item.start, focusDate))
        : related.find(item => dateInRange(item.start, range));
    if (arrival) return { status: 'arrival', label: '체크인', res: arrival.res };
    const next = related.find(item => item.start > focusDate && item.start <= range.end);
    if (next) return { status: 'reserved', label: '예약 예정', res: next.res };
    return { status: 'vacant', label: '예약 없음', res: null };
}

function roomType(room) {
    return String(room?.type || room?.roomTypeName || room?.roomTypeId || 'Standard');
}

function floorValue(room) {
    if (room.floor !== undefined && room.floor !== null && room.floor !== '') return Number(room.floor);
    const digits = String(room.id || room.roomNo || '').match(/\d+/)?.[0] || '';
    return digits.length >= 3 ? Number(digits.slice(0, -2)) : 0;
}

function reservationDates(res) {
    if (!res) return '';
    return `${res.cin || (res.checkInDate || '').slice(5)} → ${res.cout || (res.checkOutDate || '').slice(5)}`;
}

function normalizeReservationTime(value, fallback = '') {
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const match = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
    if (!match) return fallback;
    const hour = Number(match[1]);
    const minute = Number(match[2] || 0);
    if (!Number.isFinite(hour) || !Number.isFinite(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) return fallback;
    return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
}

function reservationCheckInTime(res) {
    return normalizeReservationTime(res?.checkInTime || res?.arrivalTime || res?.stayTimes?.checkInTime || res?.times?.checkIn, '14:00');
}

function reservationCheckOutTime(res) {
    return normalizeReservationTime(res?.checkOutTime || res?.departureTime || res?.stayTimes?.checkOutTime || res?.times?.checkOut, '12:00');
}

function reservationLateCheckoutEnabled(res) {
    return !!(res?.lateCheckout || res?.isLateCheckout || res?.stayTimes?.lateCheckout || res?.lateCheckoutTime || res?.extendedCheckOutTime);
}

function reservationLateCheckoutTime(res) {
    return normalizeReservationTime(res?.lateCheckoutTime || res?.extendedCheckOutTime || res?.stayTimes?.lateCheckoutTime, reservationCheckOutTime(res));
}

function reservationStayTimeHtml(res) {
    if (!res) return '';
    const late = reservationLateCheckoutEnabled(res);
    return `<div class="board-time-list">
        <div class="board-time-line"><i class="fa-regular fa-clock"></i>입실 ${escapeHtml(reservationCheckInTime(res))}</div>
        <div class="board-time-line"><i class="fa-regular fa-clock"></i>퇴실 ${escapeHtml(reservationCheckOutTime(res))}</div>
    </div>${late ? `<div class="board-late-pill"><i class="fa-solid fa-clock"></i>레이트 ${escapeHtml(reservationLateCheckoutTime(res))}</div>` : ''}`;
}

function normalizedRoomOpsValue(value) {
    return String(value || '').replace(/[-_\s]/g, '').toLowerCase();
}

function boardStayState(room, res) {
    const flag = room?.guestFlag || res?.guestFlag || 'none';
    const cleaningState = normalizedRoomOpsValue(room?.housekeepingStatus || room?.hkStatus || room?.cleaningStatus);
    const isCleanRequested = flag === 'mur' || ['dirty', 'vacantdirty', 'pendingclean', 'needscleaning', 'inspect', 'needsinspection'].includes(cleaningState);
    const isCleanComplete = ['clean', 'vacantclean', 'completed', 'complete', 'done', 'ready'].includes(cleaningState);
    if (boardStayEditable(res) && !boardOccupiedCleaningIsFresh(room, res)) return 'mur';
    if (flag === 'dnd' || flag === 'away') return flag;
    if (isCleanRequested) return 'mur';
    if (isCleanComplete) return 'clean';
    return 'none';
}

function boardCleaningSummary(room, res) {
    const roomStatus = normalizeStatus(room?.status || room?.frontStatus || '');
    const cleaningState = normalizedRoomOpsValue(room?.housekeepingStatus || room?.hkStatus || room?.cleaningStatus);
    const stayState = boardStayState(room, res);
    if (['oos', 'outofservice', 'out-of-service', 'maintenance'].includes(roomStatus)) {
        return { key: 'oos', label: '점검 중', icon: 'fa-screwdriver-wrench' };
    }
    if (['mur', 'dirty'].includes(stayState) || ['dirty', 'vacantdirty', 'pendingclean', 'needscleaning', 'inspect', 'needsinspection'].includes(cleaningState)) {
        return { key: 'dirty', label: '청소 필요', icon: 'fa-broom' };
    }
    if (stayState === 'clean' || ['clean', 'vacantclean', 'completed', 'complete', 'done', 'ready'].includes(cleaningState)) {
        return { key: 'clean', label: '청소 완료', icon: 'fa-check' };
    }
    if (res) return { key: 'occupied', label: '재실 중', icon: 'fa-bed' };
    return { key: 'clean', label: '청소 완료', icon: 'fa-check' };
}

function boardStayEditable(res) {
    const status = effectiveReservationStatus(res);
    return ['checkedin', 'checkout'].includes(status);
}

function boardOccupiedCleaningDate(room, res) {
    return room?.occupiedCleaningDate || room?.cleaningStateDate || room?.cleaningDate ||
        res?.occupiedCleaningDate || res?.cleaningStateDate || res?.cleaningDate || '';
}

function boardOccupiedCleaningIsFresh(room, res) {
    return boardOccupiedCleaningDate(room, res) === boardDateKey();
}

function markBoardOccupiedCleaningDate(room, res) {
    const key = boardDateKey();
    if (room) {
        room.occupiedCleaningDate = key;
        room.cleaningStateDate = key;
    }
    if (res) {
        res.occupiedCleaningDate = key;
        res.cleaningStateDate = key;
    }
}

function resetBoardDailyStayCleaning(room, res) {
    if (!room || !res || !boardStayEditable(res) || boardOccupiedCleaningIsFresh(room, res)) return false;
    room.housekeepingStatus = 'dirty';
    room.cleaningStatus = 'dirty';
    room.guestFlag = 'none';
    res.guestFlag = 'none';
    markBoardOccupiedCleaningDate(room, res);
    return true;
}

async function refreshBoardDailyStayCleaning() {
    const changedReservations = [];
    reservations.forEach(res => {
        const room = roomForReservation(res);
        if (resetBoardDailyStayCleaning(room, res)) changedReservations.push(res);
    });
    if (!changedReservations.length) return;
    localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    try {
        if (window.PmsAPI?.saveRooms) await window.PmsAPI.saveRooms(rooms);
        if (window.PmsMockApi) {
            await Promise.all(changedReservations.map(res =>
                window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res })
            ));
        }
    } catch(e) {
        console.warn('Daily stay cleaning refresh failed', e);
    }
}

function boardStayActions(room, res) {
    if (!room) return '';
    const roomKey = room.roomId || room.fullRoom || room.id || res?.room || '';
    const cleanState = boardCleaningSummary(room, res).key;
    if (!res) {
        return `<div class="board-clean-actions" aria-label="빈방 청소 상태 변경">
            <button type="button" class="board-clean-action dirty${cleanState === 'dirty' ? ' active' : ''}" data-room-key="${escapeHtml(roomKey)}" data-state="dirty" title="청소 필요" onclick="setBoardCleanState(event,this)"><i class="fa-solid fa-broom"></i></button>
            <button type="button" class="board-clean-action clean${cleanState === 'clean' ? ' active' : ''}" data-room-key="${escapeHtml(roomKey)}" data-state="clean" title="청소 완료" onclick="setBoardCleanState(event,this)"><i class="fa-solid fa-check"></i></button>
        </div>`;
    }
    if (!boardStayEditable(res)) return '';
    const active = boardStayState(room, res);
    const options = [
        { key: 'dnd', label: '방해금지', icon: 'fa-ban' },
        { key: 'clean', label: '청소완료', icon: 'fa-check' },
        { key: 'mur', label: '청소필요', icon: 'fa-broom' }
    ];
    return `<div class="board-stay-actions" aria-label="청소 상태 변경">
        ${options.map(opt => `<button type="button" class="board-stay-btn ${opt.key}${active === opt.key ? ' active' : ''}" data-res-id="${escapeHtml(res.id)}" data-room-key="${escapeHtml(roomKey)}" data-state="${opt.key}" title="${escapeHtml(opt.label)}" aria-label="${escapeHtml(opt.label)}" onclick="setBoardStayState(event,this)"><i class="fa-solid ${opt.icon}" aria-hidden="true"></i></button>`).join('')}
    </div>`;
}

function reservationStateForFilter(res) {
    const bucket = reservationBucket(res);
    const statusByBucket = {
        checkin: 'arrival',
        inhouse: 'inhouse',
        checkout: 'checkout',
        completed: 'completed',
        cancelled: 'cancelled'
    };
    const labelByBucket = {
        checkin: '오늘 체크인',
        inhouse: '투숙 중',
        checkout: '체크아웃',
        completed: '완료',
        cancelled: '취소/노쇼'
    };
    return {
        status: statusByBucket[bucket] || 'reserved',
        label: labelByBucket[bucket] || '예약 예정',
        res
    };
}

function reservationMatchesBoardFilter(res, filter) {
    if (filter === 'all') return reservationOverlapsRange(res);
    if (!reservationOverlapsRange(res)) return false;
    if (filter === 'late') return reservationLateCheckoutEnabled(res);
    if (filter === 'roommove') return reservationHasRoomChange(res);
    return reservationBucket(res) === filter;
}

function reservationForRoomFilter(room) {
    if (boardFilter === 'all') return null;
    return reservations
        .filter(res => roomMatchesReservation(room, res) && reservationMatchesBoardFilter(res, boardFilter))
        .sort((a, b) => {
            const left = parseDate(a.checkInDate || a.checkin || a.cin)?.getTime() || 0;
            const right = parseDate(b.checkInDate || b.checkin || b.cin)?.getTime() || 0;
            return left - right;
        })[0] || null;
}

function boardStatusIcon(status) {
    return ({
        vacant: 'fa-door-open',
        arrival: 'fa-right-to-bracket',
        inhouse: 'fa-bed',
        checkout: 'fa-right-from-bracket',
        late: 'fa-clock',
        reserved: 'fa-calendar-check',
        completed: 'fa-check-double',
        cancelled: 'fa-ban',
        blocked: 'fa-users',
        oos: 'fa-screwdriver-wrench'
    })[status] || 'fa-calendar-check';
}

function boardDateInputValue(date) {
    const target = date || todayDate();
    return `${target.getFullYear()}-${String(target.getMonth() + 1).padStart(2, '0')}-${String(target.getDate()).padStart(2, '0')}`;
}

function openBoardRoomBooking(encodedRoomId) {
    const roomId = decodeURIComponent(encodedRoomId || '');
    const room = rooms.find(item => sameRoomValue(item?.id, roomId)
        || sameRoomValue(item?.fullRoom, roomId)
        || sameRoomValue(item?.roomNo, roomId)
        || sameRoomValue(item?.number, roomId)
        || sameRoomValue(item?.display, roomId)
        || sameRoomValue(item?.roomLabel, roomId));
    const range = boardRange();
    const checkin = range.start || todayDate();
    const checkout = addDays(checkin, 1);
    const roomValue = room?.id || room?.fullRoom || room?.roomNo || room?.number || roomId;
    if (typeof window.openUnifiedResModal === 'function') {
        window.openUnifiedResModal({
            room: roomValue,
            fullRoom: roomValue,
            roomId: roomValue,
            roomNo: roomValue,
            roomLabel: roomValue,
            type: roomType(room),
            checkin: boardDateInputValue(checkin),
            checkout: boardDateInputValue(checkout),
            checkInDate: boardDateInputValue(checkin),
            checkOutDate: boardDateInputValue(checkout)
        });
    }
}

function boardCard(room) {
    let state = boardStatusFor(room);
    if (boardFilter !== 'all') {
        const filteredRes = reservationForRoomFilter(room);
        if (!filteredRes) return '';
        state = boardFilter === 'late'
            ? { status: 'late', label: '레이트', res: filteredRes }
            : reservationStateForFilter(filteredRes);
    }
    const res = state.res;
    const primary = res ? primaryGuest(res) : '';
    const displayName = res ? boardDisplayName(res) : '';
    const groupName = res ? boardGroupLabel(res) : '';
    const companions = res ? companionGuests(res) : [];
    const hasRoomChange = !!(res && reservationHasRoomChange(res));
    const roomChangeText = hasRoomChange ? reservationRoomChangeText(res) : '';
    const stayState = res ? boardStayState(room, res) : '';
    const stayStateLabels = { none: '재실', dnd: '방해금지', away: '외출', mur: '청소필요', clean: '청소완료' };
    const searchText = [
        room.id,
        room.fullRoom,
        roomType(room),
        state.label,
        stayStateLabels[stayState] || '',
        primary,
        displayName,
        groupName,
        companions.join(' '),
        hasRoomChange ? `객실 이동 ${roomChangeText}` : '',
        res ? reservationCheckInTime(res) : '',
        res ? reservationCheckOutTime(res) : '',
        res && reservationLateCheckoutEnabled(res) ? `레이트 ${reservationLateCheckoutTime(res)}` : ''
    ].join(' ').toLowerCase();
    const query = document.getElementById('boardSearch')?.value.trim().toLowerCase() || '';
    if (query && !searchText.includes(query)) return '';
    const roomId = room.id || room.fullRoom || room.roomNo || room.number || room.display || '';
    const canCreateBooking = !res && state.status === 'vacant' && !!roomId;
    const cleanInfo = boardCleaningSummary(room, res);
    const cleanSummary = `<div class="board-clean-summary">
        <span class="board-clean-badge ${cleanInfo.key}"><i class="fa-solid ${cleanInfo.icon}"></i>${cleanInfo.label}</span>
        ${boardStayActions(room, res)}
    </div>`;
    const click = res
        ? `onclick="openUnifiedResModal('${escapeHtml(res.id)}')"`
        : (canCreateBooking ? `onclick="openBoardRoomBooking('${encodeURIComponent(roomId)}')"` : '');
    const flags = res ? [
        hasRoomChange ? `<span class="board-flag move"><i class="fa-solid fa-right-left"></i>이동 ${escapeHtml(roomChangeText)}</span>` : ''
    ].filter(Boolean).join('') : '';
    return `<div class="room-box reservation-board-box ${state.status} clean-${cleanInfo.key}${hasRoomChange ? ' room-moved' : ''}${canCreateBooking ? ' is-bookable' : ''}" ${click} style="${res ? 'cursor:pointer' : ''}">
        <div class="room-box-num"><span>${escapeHtml(room.id || room.roomNo || '-')}</span><span class="board-status ${state.status}"><i class="fa-solid ${boardStatusIcon(state.status)}"></i>${state.label}</span></div>
        <div class="room-box-type">${escapeHtml(roomType(room))}</div>
        ${res ? `<div class="board-guest">
            <div class="board-primary"><i class="fa-solid ${boardPrimaryIcon(res)}"></i><span>${escapeHtml(displayName || '단체 블록')}</span></div>
            ${companions.length ? `<div class="board-companions" title="${escapeHtml(companions.join(', '))}">${companions.map(name => `<div class="board-companion">${escapeHtml(name)}</div>`).join('')}</div>` : ''}
        </div>
        <div class="board-date">${escapeHtml(reservationDates(res))}</div>
        ${flags ? `<div class="board-flags">${flags}</div>` : ''}
        ${reservationStayTimeHtml(res)}
        ${cleanSummary}
        <div class="board-money">${formatMoney(amountValue(res))}${res.balanceDue ? ` · 잔액 ${formatMoney(res.balanceDue)}` : ''}</div>` : `<div class="board-empty">배정된 예약 없음</div>${cleanSummary}`}
    </div>`;
}

function updateBoardKpis() {
    const reservationCounts = boardReservationCounts();
    let vacant = 0;
    const range = boardRange();
    rooms.forEach(room => {
        const roomStatus = normalizeStatus(room.status || room.frontStatus || room.housekeepingStatus);
        if (roomStatus === 'oos') return;
        const hasReservation = reservations.some(res => {
            const status = normalizeReservationStatus(res?.status);
            if (['cancelled', 'completed'].includes(status)) return false;
            return roomMatchesReservation(room, res) && reservationOverlapsRange(res, range);
        });
        if (!hasReservation) vacant++;
    });
    document.getElementById('kpiArrival').textContent = reservationCounts.checkin;
    document.getElementById('kpiInhouse').textContent = reservationCounts.inhouse;
    document.getElementById('kpiCheckout').textContent = reservationCounts.checkout;
    document.getElementById('kpiReserved').textContent = reservationCounts.reserved;
    document.getElementById('kpiVacant').textContent = vacant;
    updateBoardPeriodLabels();
    document.querySelectorAll('#boardChips .chip').forEach(chip => {
        const filter = chip.dataset.filter;
        const count = reservationCounts[filter] || 0;
        const countEl = chip.querySelector('.chip-count');
        if (countEl) countEl.textContent = count;
    });
}

function toggleBuilding(el) {
    el.classList.toggle('collapsed');
    el.nextElementSibling.classList.toggle('collapsed');
}

function renderReservationBoard() {
    updateBoardKpis();
    const container = document.getElementById('reservationBoardContainer');
    container.innerHTML = '';
    const hasBuildings = rooms.some(room => room.building);
    let rendered = 0;
    if (hasBuildings) {
        [...new Set(rooms.map(room => room.building || '미지정'))].sort().forEach(building => {
            const buildingRooms = rooms.filter(room => (room.building || '미지정') === building);
            const floors = [...new Set(buildingRooms.map(floorValue))].sort((a, b) => b - a);
            let html = `<div class="building-section"><div class="building-header" onclick="toggleBuilding(this)"><i class="fa-solid fa-building bldg-icon"></i><span class="bldg-name">${escapeHtml(building)}</span><span class="bldg-count">(${buildingRooms.length}개 객실)</span><i class="fa-solid fa-chevron-down bldg-chevron"></i></div><div class="building-body">`;
            floors.forEach(floor => {
                const cards = buildingRooms.filter(room => floorValue(room) === floor).sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true })).map(boardCard).filter(Boolean);
                rendered += cards.length;
                if (!cards.length) return;
                html += `<div class="floor-section"><div class="floor-title"><i class="fa-solid fa-layer-group"></i> ${floor}층 <span class="floor-count">(${cards.length}개 객실)</span></div><div class="room-grid">${cards.join('')}</div></div>`;
            });
            html += '</div></div>';
            container.innerHTML += html;
        });
    } else {
        const floors = [...new Set(rooms.map(floorValue))].sort((a, b) => b - a);
        floors.forEach(floor => {
            const cards = rooms.filter(room => floorValue(room) === floor).sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true })).map(boardCard).filter(Boolean);
            rendered += cards.length;
            if (!cards.length) return;
            container.innerHTML += `<div class="floor-section"><div class="floor-title"><i class="fa-solid fa-layer-group"></i> ${floor}층 <span class="floor-count">(${cards.length}개 객실)</span></div><div class="room-grid">${cards.join('')}</div></div>`;
        });
    }
    if (!rendered) container.innerHTML = '<div style="padding:40px;text-align:center;color:var(--txt3);font-weight:800">조건에 맞는 예약 현황이 없습니다.</div>';
}

function boardRoomKeys(room, fallback = '') {
    const values = [room?.id, room?.roomId, room?.fullRoom, room?.roomNo, room?.number, room?.display, fallback];
    const keys = new Set();
    values.forEach(value => {
        const text = String(value || '').trim();
        if (!text) return;
        const upper = text.toUpperCase();
        const tail = upper.includes('-') ? upper.split('-').pop() : upper;
        const digits = (upper.match(/\d+/g) || []).join('').replace(/^0+(?=\d)/, '');
        [upper, tail, digits].filter(Boolean).forEach(key => keys.add(key));
    });
    return keys;
}

function boardTaskMatchesRoom(task, room, roomId = '') {
    const roomKeys = boardRoomKeys(room, roomId);
    const taskKeys = boardRoomKeys({ id: task?.room, roomId: task?.roomId, roomNo: task?.roomNo, fullRoom: task?.fullRoom });
    return [...taskKeys].some(key => roomKeys.has(key));
}

async function closeBoardStayoverTasks(room, res, note) {
    if (!window.PmsAPI?.getTasks || !window.PmsAPI?.saveTasks) return;
    let tasks = [];
    try {
        tasks = await window.PmsAPI.getTasks();
    } catch(e) {
        console.warn('Board tasks load failed', e);
        return;
    }
    let changed = false;
    const now = new Date().toISOString();
    tasks.forEach(task => {
        if (task?.type === 'stayover' && task.status !== 'clean' && boardTaskMatchesRoom(task, room, res?.room)) {
            task.status = 'clean';
            task.completedAt = task.completedAt || now;
            task.inspectedBy = task.inspectedBy || 'Front Desk';
            task.note = task.note || note;
            changed = true;
        }
    });
    if (changed) await window.PmsAPI.saveTasks(tasks);
}

async function syncBoardStayStateToHousekeeping(room, res, state) {
    const roomId = room?.roomId || room?.fullRoom || room?.id || res?.room;
    if (!roomId) return;
    if (state === 'mur') {
        if (window.PmsAPI?.syncRoomStatusToTask) {
            await window.PmsAPI.syncRoomStatusToTask(roomId, 'stayover-dirty', {
                reservationId: res?.id,
                guestName: primaryGuest(res),
                type: 'stayover',
                source: 'reservation-board'
            });
        }
        return;
    }
    if (state === 'clean') {
        if (window.PmsAPI?.syncRoomStatusToTask) {
            await window.PmsAPI.syncRoomStatusToTask(roomId, 'clean', {
                reservationId: res?.id,
                guestName: primaryGuest(res),
                source: 'reservation-board'
            });
        }
        return;
    }
    await closeBoardStayoverTasks(room, res, '프런트 상태 변경으로 재실 청소 요청 해제');
}

async function persistBoardStayState(room, res) {
    localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    const roomId = room?.roomId || room?.fullRoom || room?.id || res?.room;
    try {
        if (window.PmsAPI?.saveRooms) await window.PmsAPI.saveRooms(rooms);
        if (window.PmsAPI?.setGuestFlag && roomId) await window.PmsAPI.setGuestFlag(roomId, room.guestFlag || 'none');
        if (window.PmsMockApi && res?.id) await window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res });
    } catch(e) {
        console.warn('Board stay state save failed', e);
    }
}

window.setBoardStayState = async function(event, button) {
    event?.preventDefault();
    event?.stopPropagation();
    const state = button?.dataset?.state || 'none';
    const resId = button?.dataset?.resId || '';
    const roomKey = button?.dataset?.roomKey || '';
    const res = reservations.find(item => item.id === resId);
    const room = roomForReservation(res) || rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey) || sameRoomValue(item.roomNo, roomKey));
    if (!room || !res) {
        if (window.showToast) window.showToast('객실 또는 예약 정보를 찾을 수 없습니다.', 'error');
        return;
    }
    const buttons = button.closest('.board-stay-actions')?.querySelectorAll('button') || [];
    buttons.forEach(item => { item.disabled = true; });
    try {
        markBoardOccupiedCleaningDate(room, res);
        if (state === 'mur') {
            room.housekeepingStatus = 'dirty';
            room.cleaningStatus = 'dirty';
            room.guestFlag = 'none';
            res.guestFlag = 'none';
        } else if (state === 'clean') {
            room.housekeepingStatus = 'clean';
            room.cleaningStatus = 'clean';
            room.guestFlag = 'none';
            res.guestFlag = 'none';
        } else {
            room.housekeepingStatus = 'occupied';
            room.cleaningStatus = 'occupied';
            room.guestFlag = state;
            res.guestFlag = state;
        }
        await persistBoardStayState(room, res);
        await syncBoardStayStateToHousekeeping(room, res, state);
        renderReservationBoard();
        if (window.showToast) {
            const labels = { none: '재실', dnd: '방해금지', away: '외출', mur: '청소필요', clean: '청소완료' };
            window.showToast(`${room.id || room.roomNo || roomKey} 상태: ${labels[state] || state}`, 'success');
        }
    } finally {
        buttons.forEach(item => { item.disabled = false; });
    }
};

window.setBoardCleanState = async function(event, button) {
    event?.preventDefault();
    event?.stopPropagation();
    const state = button?.dataset?.state || 'clean';
    const roomKey = button?.dataset?.roomKey || '';
    const room = rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey) || sameRoomValue(item.roomNo, roomKey));
    if (!room) {
        if (window.showToast) window.showToast('객실 정보를 찾을 수 없습니다.', 'error');
        return;
    }
    const buttons = button.closest('.board-clean-actions')?.querySelectorAll('button') || [];
    buttons.forEach(item => { item.disabled = true; });
    const roomId = room.roomId || room.fullRoom || room.id || room.roomNo;
    try {
        if (state === 'dirty') {
            room.status = 'vacant-dirty';
            room.frontStatus = 'vacant-dirty';
            room.housekeepingStatus = 'dirty';
            room.cleaningStatus = 'dirty';
            if (window.PmsAPI?.syncRoomStatusToTask) {
                await window.PmsAPI.syncRoomStatusToTask(roomId, 'vacant-dirty', {
                    type: 'checkout',
                    source: 'reservation-board',
                    note: '예약현황에서 빈방 청소 필요 처리'
                });
            }
        } else {
            room.status = 'vacant-clean';
            room.frontStatus = 'vacant-clean';
            room.housekeepingStatus = 'clean';
            room.cleaningStatus = 'clean';
            if (window.PmsAPI?.syncRoomStatusToTask) {
                await window.PmsAPI.syncRoomStatusToTask(roomId, 'clean', {
                    source: 'reservation-board',
                    note: '예약현황에서 빈방 청소 완료 처리'
                });
            }
        }
        await persistBoardStayState(room, null);
        renderReservationBoard();
        if (window.showToast) window.showToast(`${room.id || room.roomNo || roomKey} 청소 상태가 변경되었습니다.`, 'success');
    } finally {
        buttons.forEach(item => { item.disabled = false; });
    }
};

function setBoardPeriod(period) {
    boardPeriod = ['today', 'tomorrow', 'week'].includes(period) ? period : 'today';
    const select = document.getElementById('boardPeriodSelect');
    if (select && select.value !== boardPeriod) select.value = boardPeriod;
    renderReservationBoard();
}

function setBoardFilter(filter) {
    boardFilter = filter;
    document.querySelectorAll('#boardChips .chip').forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
    renderReservationBoard();
}

window.renderReservationBoard = renderReservationBoard;
window.renderTable = renderReservationBoard;
window.setBoardPeriod = setBoardPeriod;

document.addEventListener('DOMContentLoaded', async () => {
    const [roomData, resData, groupData] = await Promise.all([
        window.PmsAPI?.getAllRooms ? window.PmsAPI.getAllRooms().catch(() => []) : [],
        window.PmsAPI?.getReservations ? window.PmsAPI.getReservations().catch(() => []) : [],
        window.PmsAPI?.getGroups ? window.PmsAPI.getGroups().catch(() => []) : []
    ]);
    rooms = roomData || [];
    reservations = (resData || []).map(res => ({ ...res, status: normalizeStatus(res.status) === 'inhouse' ? 'checkedin' : res.status }));
    groups = groupData || [];
    window.rooms = rooms;
    window.reservations = reservations;
    window.groups = groups;
    await refreshBoardDailyStayCleaning();
    renderReservationBoard();
});
</script>
