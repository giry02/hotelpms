<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 현황 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <link rel="stylesheet" href="../common/css/operations.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/api/api-frontdesk.js?v=20260720-timeline-sync"></script>
    <script src="../common/js/i18n-catalog.js"></script>
    <script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/privacy-audit.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
    <style>
        .reservation-board-page{font-family:var(--font)}
        .reservation-board-kpis{grid-template-columns:repeat(5,minmax(0,1fr));gap:16px;margin-bottom:24px}
        .reservation-board-kpis .kpi-card{border-left:0;border:1px solid var(--border2);border-radius:16px;padding:16px 20px;box-shadow:0 2px 10px rgba(0,0,0,.02);gap:14px}
        .reservation-board-kpis .kpi-icon{width:46px;height:46px;border-radius:12px;font-size:1.1rem}
        .reservation-board-kpis .kpi-value{font-size:1.55rem;line-height:1;font-weight:800}
        .reservation-board-kpis .kpi-label{font-size:.82rem;font-weight:650}
        .filter-bar-mt{display:flex;flex-direction:column;align-items:stretch;gap:12px;margin-bottom:24px;padding:12px 20px;background:#fff;border:1px solid var(--border);border-radius:14px}
        .reservation-board-topline{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%}
        .reservation-board-lefttools{display:flex;align-items:center;gap:12px;min-width:0;flex:1}
        .reservation-board-filters{display:flex;align-items:center;gap:5px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;width:100%;max-width:100%;white-space:nowrap;padding-bottom:2px;-webkit-overflow-scrolling:touch;scrollbar-width:none;overscroll-behavior-x:contain}
        .reservation-board-filters::-webkit-scrollbar{display:none}
        .reservation-board-filters .chip{flex:0 0 auto;height:34px;padding:0 11px;font-size:.74rem;gap:5px;white-space:nowrap}
        .search-container{display:flex;align-items:center;gap:8px;flex-shrink:0}
        .search-box-mt{display:flex;align-items:center;gap:8px;padding:7px 14px;border:1.5px solid var(--border);border-radius:8px;background:#fff;transition:border-color .2s;width:220px}
        .search-box-mt:focus-within{border-color:var(--primary)}
        .search-box-mt i{color:var(--txt3);font-size:.85rem}
        .search-box-mt input{border:none;outline:none;font-family:var(--font);font-size:.82rem;color:var(--txt);width:100%;background:transparent;padding:0;margin:0}
        .btn-search{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;background:var(--primary);color:#fff;font-family:var(--font);font-size:.8rem;font-weight:700;transition:background .2s}
        .btn-search:hover{background:#1D4ED8}
        .board-status-legend{display:flex;align-items:center;gap:6px;min-width:0;overflow-x:auto;padding:2px 0;-webkit-overflow-scrolling:touch}
        .board-legend-item{display:inline-flex;align-items:center;gap:5px;min-height:28px;padding:0 9px;border:1px solid var(--border2);border-radius:999px;background:#fff;color:var(--txt2);font-size:.67rem;font-weight:900;white-space:nowrap;flex:0 0 auto}
        .board-legend-swatch{width:9px;height:9px;border-radius:999px;display:inline-block;box-shadow:0 0 0 2px rgba(255,255,255,.9)}
        .board-legend-swatch.vacant{background:#cbd5e1}
        .board-legend-swatch.arrival{background:var(--primary)}
        .board-legend-swatch.inhouse{background:var(--success)}
        .board-legend-swatch.checkout{background:#f59e0b}
        .board-legend-swatch.late{background:#ea580c}
        .board-legend-swatch.reserved{background:var(--purple)}
        .board-legend-swatch.blocked{background:#111827}
        .board-legend-swatch.oos{background:var(--danger)}
        .building-section{margin-bottom:8px}
        .building-section + .building-section{margin-top:24px}
        .building-header{display:flex;align-items:center;gap:10px;padding:0 0 8px;cursor:pointer;user-select:none}
        .building-header i.bldg-icon{font-size:1rem;color:var(--primary);width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--primary-lt);border-radius:6px}
        .building-header .bldg-name{font-size:1.05rem;font-weight:700;color:var(--txt);line-height:1.2}
        .building-header .bldg-count{font-size:.78rem;color:var(--txt3);font-weight:500;margin-left:4px;line-height:1.2}
        .building-header .bldg-chevron{margin-left:auto;color:var(--txt3);font-size:.8rem;transition:transform .2s}
        .building-header.collapsed .bldg-chevron{transform:rotate(-90deg)}
        .building-body.collapsed{display:none}
        .floor-section{margin-bottom:24px}
        .floor-title{display:flex;align-items:center;gap:7px;margin:0 0 10px;color:var(--txt);font-size:1rem;font-weight:800;line-height:1.25}
        .floor-title i{color:var(--txt3);font-size:.86rem}
        .floor-count{font-size:.8rem;color:var(--txt3);font-weight:500;margin-left:8px;line-height:1.2}
        .reservation-board-page .room-grid{grid-template-columns:repeat(6,minmax(0,1fr));gap:12px}
        .reservation-board-box{min-height:178px;align-items:flex-start;text-align:left;padding:12px 10px;gap:5px;display:flex;flex-direction:column;box-sizing:border-box;transition:border-color .18s,box-shadow .18s,background .18s}
        .reservation-board-box.is-bookable{cursor:pointer}
        .reservation-board-page .room-box.reservation-board-box:hover{transform:none}
        .reservation-board-box.is-bookable:hover{transform:none}
        .reservation-board-box.vacant{border-color:#cbd5e1;background:linear-gradient(0deg,rgba(248,250,252,.72),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 #cbd5e1,0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.arrival{border-color:#bfdbfe;background:linear-gradient(0deg,rgba(239,246,255,.72),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 var(--primary),0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.inhouse{border-color:#bbf7d0;background:linear-gradient(0deg,rgba(240,253,244,.72),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 var(--success),0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.checkout{border-color:#fde68a;background:linear-gradient(0deg,rgba(255,251,235,.76),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 #f59e0b,0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.reserved{border-color:#ddd6fe;background:linear-gradient(0deg,rgba(245,243,255,.72),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 var(--purple),0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.cancelled{border-color:#fecaca;background:linear-gradient(0deg,rgba(254,242,242,.76),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 var(--danger),0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.blocked{border-color:#cbd5e1;background:linear-gradient(0deg,rgba(248,250,252,.72),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 #111827,0 2px 10px rgba(15,23,42,.04)}
        .reservation-board-box.oos{border-color:#fecaca;background:linear-gradient(0deg,rgba(254,242,242,.76),rgba(255,255,255,.97));box-shadow:inset 4px 0 0 var(--danger),0 2px 10px rgba(15,23,42,.04);opacity:.82}
        .reservation-board-box.room-moved{outline:none}
        .reservation-board-box .room-box-num{width:100%;display:flex;align-items:center;justify-content:space-between;gap:8px}
        .board-status{display:inline-flex;align-items:center;gap:5px;padding:3px 7px;border-radius:999px;font-size:.63rem;font-weight:900;white-space:nowrap}
        .board-status.vacant{background:#f1f5f9;color:#475569}
        .board-status.arrival{background:var(--primary-lt);color:var(--primary-dk)}
        .board-status.inhouse{background:var(--success-lt);color:var(--success)}
        .board-status.checkout{background:#fef3c7;color:#92400e}
        .board-status.reserved{background:var(--purple-lt);color:#6d28d9}
        .board-status.cancelled{background:var(--danger-lt);color:var(--danger)}
        .board-status.blocked{background:#f1f5f9;color:#111827}
        .board-status.oos{background:var(--danger-lt);color:var(--danger)}
        .board-clean-summary{display:flex;align-items:center;justify-content:flex-end;gap:8px;width:100%}
        .board-clean-badge{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:3px 8px;font-size:.64rem;font-weight:900;white-space:nowrap}
        .board-clean-badge.clean{background:#dcfce7;color:#059669}
        .board-clean-badge.dirty{background:#fef3c7;color:#d97706}
        .board-clean-badge.dnd{background:#fff1f2;color:#be123c}
        .board-clean-badge.occupied{background:#dbeafe;color:#2563eb}
        .board-clean-badge.oos{background:#fee2e2;color:#dc2626}
        .board-clean-select{height:30px;width:clamp(112px,100%,128px);min-width:112px;max-width:128px;border:1px solid var(--border);border-radius:8px;background-color:#fff;background-image:linear-gradient(45deg,transparent 50%,currentColor 50%),linear-gradient(135deg,currentColor 50%,transparent 50%);background-position:calc(100% - 14px) 12px,calc(100% - 9px) 12px;background-size:5px 5px;background-repeat:no-repeat;color:var(--txt2);font-family:var(--font);font-size:.72rem;font-weight:900;line-height:1.2;padding:0 24px 0 8px;cursor:pointer;outline:none;transition:border-color .15s,background-color .15s,color .15s;appearance:none;-webkit-appearance:none}
        .board-clean-select option{font-family:var(--font);font-size:.78rem;font-weight:800;color:var(--txt)}
        .board-clean-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
        .board-clean-select.dirty,
        .board-clean-select.mur,
        .board-clean-select[data-clean-tone="dirty"],
        .board-clean-select[data-clean-tone="mur"]{color:#b45309!important;border-color:#fed7aa!important;background-color:#fff7ed!important}
        .board-clean-select.cleaning,
        .board-clean-select[data-clean-tone="cleaning"]{color:#1d4ed8!important;border-color:#bfdbfe!important;background-color:#eff6ff!important}
        .board-clean-select.clean,
        .board-clean-select[data-clean-tone="clean"]{color:#047857!important;border-color:#a7f3d0!important;background-color:#ecfdf5!important}
        .board-clean-select.dnd,
        .board-clean-select[data-clean-tone="dnd"]{color:#be123c!important;border-color:#fecdd3!important;background-color:#fff1f2!important}
        .board-guest{width:100%;min-width:0;margin-top:3px;min-height:38px}
        .board-group-title{display:flex;align-items:flex-start;gap:5px;width:100%;min-width:0;margin-bottom:3px}
        .board-group-badge{display:inline-flex;align-items:center;gap:3px;background:#111827;color:#fff;border-radius:4px;padding:2px 5px;font-size:.56rem;font-weight:950;line-height:1;flex:0 0 auto}
        .board-group-badge i{font-size:.54rem;color:#fff}
        .board-group-name{min-width:0;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;font-size:.68rem;font-weight:950;color:var(--txt);line-height:1.12;word-break:keep-all}
        .board-vip-row{display:flex;align-items:center;gap:4px;width:100%;margin-bottom:2px;color:#d97706;font-size:.64rem;font-weight:950;line-height:1.1;white-space:nowrap}
        .board-vip-row i{font-size:.62rem;color:#f59e0b}
        .board-vip-inline{display:inline-flex;align-items:center;gap:3px;background:#fef3c7;color:#92400e;border:1px solid #fde68a;border-radius:999px;padding:2px 6px;font-size:.56rem;font-weight:950;line-height:1;flex:0 0 auto}
        .board-vip-inline i{font-size:.54rem;color:#f59e0b}
        .board-primary{display:flex;align-items:center;gap:5px;font-size:.78rem;font-weight:900;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.18}
        .board-primary i{color:var(--primary);font-size:.68rem}
        .board-primary .board-name{min-width:0;overflow:hidden;text-overflow:ellipsis}
        .board-companions{display:flex;flex-direction:column;gap:2px;margin-top:3px;padding-left:17px;font-size:.68rem;color:var(--txt3);font-weight:750;min-width:0}
        .board-companion{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .board-date{font-size:.68rem;color:var(--txt2);font-weight:750;line-height:1.35;min-height:18px}
        .board-time-list{display:flex;flex-direction:column;gap:2px;width:100%;min-width:0}
        .board-time-line{display:flex;align-items:center;gap:4px;font-size:.66rem;color:var(--txt3);font-weight:850;line-height:1.25;white-space:nowrap}
        .board-time-line i{font-size:.6rem;color:var(--primary)}
        .board-late-pill{display:inline-flex;align-items:center;gap:4px;width:max-content;border-radius:999px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;padding:2px 7px;font-size:.63rem;font-weight:900;line-height:1.2}
        .board-flags{display:flex;flex-wrap:wrap;align-content:flex-start;gap:4px;width:100%;min-height:20px}
        .board-flags.is-empty{visibility:hidden}
        .board-flag{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 7px;font-size:.62rem;font-weight:900;line-height:1.2;max-width:100%;white-space:nowrap}
        .board-flag.move{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
        .board-flag.late{background:#fef3c7;color:#92400e;border:1px solid #fde68a}
        .board-stay-actions{display:flex;align-items:center;justify-content:space-between;gap:4px;width:100%;margin-top:2px}
        .board-stay-btn{width:30px;height:30px;border:1px solid var(--border);border-radius:9px;background:#fff;color:#94a3b8;display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s;box-shadow:0 1px 3px rgba(15,23,42,.03);flex:0 0 auto}
        .board-stay-btn.has-label{width:auto;min-width:30px;padding:0 8px;gap:4px}
        .board-stay-btn .btn-label{font-size:.62rem;font-weight:900;line-height:1;white-space:nowrap}
        .board-stay-btn i{font-size:.8rem}
        .board-stay-btn:hover{transform:translateY(-1px);border-color:var(--primary);color:var(--primary);box-shadow:0 4px 10px rgba(59,130,246,.12)}
        .board-stay-btn.active{font-weight:900}
        .board-stay-btn.dnd.active{background:#fff1f2;color:#be123c;border-color:#fecdd3}
        .board-stay-btn.mur.active{background:#fffbeb;color:#d97706;border-color:#fde68a}
        .board-stay-btn.clean.active{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
        .board-stay-btn:disabled{opacity:.55;cursor:wait;transform:none}
        .board-empty{font-size:.74rem;color:var(--txt3);font-weight:750;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .board-card-footer{display:flex;align-items:flex-end;justify-content:space-between;gap:6px;width:100%;margin-top:auto;padding-top:4px;flex-wrap:wrap}
        .board-money{font-size:.76rem;color:var(--txt2);font-weight:900;min-width:56px;max-width:calc(100% - 118px);white-space:normal;overflow:visible;text-overflow:clip;line-height:1.18;word-break:keep-all}
        .board-clean-summary{display:flex;justify-content:flex-end;width:auto;min-width:112px;max-width:128px;margin-left:auto;flex:0 1 128px}
        .board-readiness{display:inline-flex;align-items:center;gap:5px;width:max-content;max-width:100%;padding:3px 8px;border-radius:999px;font-size:.63rem;font-weight:950;white-space:nowrap}
        .board-readiness.ready{background:#dcfce7;color:#047857}
        .board-readiness.warn{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
        .board-readiness.block{background:#fee2e2;color:#dc2626}
        .board-settlement-summary{display:flex;flex-wrap:wrap;gap:5px;width:100%;margin-top:1px;text-decoration:none}
        .board-settle-badge{display:inline-flex;align-items:center;gap:4px;max-width:100%;padding:3px 7px;border-radius:999px;border:1px solid var(--border2);background:#fff;font-size:.62rem;font-weight:950;line-height:1.2;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .board-settle-badge.ready{background:#eff6ff;color:#1d4ed8;border-color:#bfdbfe}
        .board-settle-badge.unpaid{background:#fff1f2;color:#be123c;border-color:#fecdd3}
        .board-settle-badge.deposit{background:#ecfdf5;color:#047857;border-color:#bbf7d0}
        .board-settle-badge.paid{background:#f1f5f9;color:#475569;border-color:#cbd5e1}
        @media(max-width:768px){
            .reservation-board-kpis{grid-template-columns:1fr 1fr}
            .filter-bar-mt{padding:12px;gap:10px}
            .reservation-board-topline{align-items:stretch;flex-direction:column}
            .reservation-board-lefttools{align-items:stretch;flex-direction:column;gap:8px}
            .search-container{width:100%;display:flex;gap:8px;flex:1}
            .search-box-mt{flex:1;min-width:0;width:auto}
            .reservation-board-topline .btn-primary-sm{flex:0 0 auto;justify-content:center}
            .board-status-legend{width:100%;flex-wrap:wrap;overflow-x:visible}
            .board-legend-item{flex:1 1 calc(50% - 6px);justify-content:center;padding:0 6px;font-size:.63rem}
            #boardChips{width:100%;flex-wrap:wrap;overflow-x:visible}
            #boardChips .chip{flex:1 1 calc(50% - 6px);justify-content:center;min-width:0}
            .reservation-board-page .room-grid{grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:10px}
            .board-stay-btn{width:28px;height:28px;border-radius:8px}
            .board-stay-btn i{font-size:.76rem}
        }
    </style>
</head>
<body>
<div class="main reservation-board-page">
    <header class="topbar"><h1>예약 현황</h1></header>
    <div class="content">
        <div class="kpi-grid kpi-grid-5 reservation-board-kpis">
            <div class="kpi-card blue"><div class="kpi-icon"><i class="fa-solid fa-calendar-check"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiArrival">0</div><div class="kpi-label">오늘 체크인</div></div></div>
            <div class="kpi-card green"><div class="kpi-icon"><i class="fa-solid fa-bed"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiInhouse">0</div><div class="kpi-label">투숙 중</div></div></div>
            <div class="kpi-card orange"><div class="kpi-icon"><i class="fa-solid fa-right-from-bracket"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiCheckout">0</div><div class="kpi-label">체크아웃</div></div></div>
            <div class="kpi-card purple"><div class="kpi-icon"><i class="fa-solid fa-calendar-days"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiReserved">0</div><div class="kpi-label">예약 예정</div></div></div>
            <div class="kpi-card"><div class="kpi-icon"><i class="fa-solid fa-door-open"></i></div><div class="kpi-body"><div class="kpi-value" id="kpiVacant">0</div><div class="kpi-label">예약 없음</div></div></div>
        </div>

        <div class="filter-bar-mt reservation-board-toolbar">
            <div class="reservation-board-topline">
                <div class="reservation-board-lefttools">
                    <div class="search-container">
                        <div class="search-box-mt">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input id="boardSearch" type="text" placeholder="객실번호, 이름, 단체명 검색...">
                        </div>
                        <button class="btn-search" onclick="renderReservationBoard()"><i class="fa-solid fa-search"></i> 검색</button>
                    </div>
                    <div class="board-status-legend" aria-label="객실 상태 색상 안내">
                        <span class="board-legend-item"><span class="board-legend-swatch arrival"></span>체크인 예정</span>
                        <span class="board-legend-item"><span class="board-legend-swatch inhouse"></span>투숙 중</span>
                        <span class="board-legend-item"><span class="board-legend-swatch checkout"></span>체크아웃 예정</span>
                        <span class="board-legend-item"><span class="board-legend-swatch reserved"></span>예약 예정</span>
                        <span class="board-legend-item"><span class="board-legend-swatch vacant"></span>예약 없음</span>
                        <span class="board-legend-item"><span class="board-legend-swatch blocked"></span>단체 배정</span>
                        <span class="board-legend-item"><span class="board-legend-swatch oos"></span>점검 중</span>
                    </div>
                </div>
                <button class="btn-primary-sm" onclick="openUnifiedResModal()"><i class="fa-solid fa-plus"></i> 신규 예약</button>
            </div>
            <div class="filter-chips reservation-board-filters" id="boardChips">
                <button class="chip active" data-filter="all" onclick="setBoardFilter('all')"><i class="fa-solid fa-list"></i> 전체 <span class="chip-count">0</span></button>

    delete BOARD_TEXT[lang]['filter.completed'];
    delete BOARD_TEXT[lang]['status.completed'];

function boardLang() {
    return (localStorage.getItem('pms_lang') || window.currentLang || document.getElementById('langSelect')?.value || 'ko') === 'en' ? 'en' : 'ko';
}

function boardText(key) {
    return BOARD_TEXT[boardLang()]?.[key] || BOARD_TEXT.ko[key] || key;
}

function boardTextFormat(key, params = {}) {
    let text = boardText(key);
    Object.keys(params).forEach(name => {
        text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
    });
    return text;
}

function boardRoomCountLabel(count) {
    return boardTextFormat('label.roomCount', { count, rooms: count === 1 ? 'room' : 'rooms' });
}

function boardFloorLabel(floor) {
    return boardTextFormat('label.floor', { floor });
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[ch]));
}

function todayDate() {
    const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    date.setHours(0, 0, 0, 0);
    return date;
}

function addDays(date, days) {
    const next = new Date(date);
    next.setDate(next.getDate() + days);
    next.setHours(0, 0, 0, 0);
    return next;
}

function boardDateKey(date = todayDate()) {
    const value = new Date(date);
    if (Number.isNaN(value.getTime())) return '';
    return `${value.getFullYear()}-${String(value.getMonth() + 1).padStart(2, '0')}-${String(value.getDate()).padStart(2, '0')}`;
}

function sameDate(left, right) {
    return !!(left && right && left.getTime() === right.getTime());
}

function dateInRange(date, range) {
    return !!(date && range && date >= range.start && date <= range.end);
}

function boardRange() {
    const today = todayDate();
    if (boardPeriod === 'tomorrow') {
        const tomorrow = addDays(today, 1);
        return { start: tomorrow, end: tomorrow, mode: 'day' };
    }
    if (boardPeriod === 'week') return { start: today, end: addDays(today, 6), mode: 'week' };
    return { start: today, end: today, mode: 'day' };
}

function parseDate(value) {
    if (!value) return null;
    const text = String(value).trim();
    const md = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (md) {
        const base = todayDate();
        return new Date(base.getFullYear(), Number(md[1]) - 1, Number(md[2]));
    }
    const date = new Date(text);
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function reservationStart(res) {
    return parseDate(res?.checkInDate || res?.checkin || res?.cin);
}

function reservationEnd(res) {
    return parseDate(res?.checkOutDate || res?.checkout || res?.cout);
}

function reservationOverlapsRange(res, range = boardRange()) {
    const start = reservationStart(res);
    const end = reservationEnd(res);
    if (start && end) return start <= range.end && end >= range.start;
    return dateInRange(start || end, range);
}

function reservationActiveOn(res, date) {
    const start = reservationStart(res);
    const end = reservationEnd(res);
    return !!(start && end && start <= date && date < end);
}

function normalizeStatus(value) {
    const key = String(value || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'inhouse';
    if (['checkedout', 'completed', 'departed'].includes(key)) return 'completed';
    if (['blocked'].includes(key)) return 'blocked';
    if (['oos', 'outofservice', 'maintenance'].includes(key)) return 'oos';
    return key || 'confirmed';
}

function normalizeReservationStatus(value) {
    const key = String(value || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'checkedin';
    if (key === 'checkout') return 'checkout';
    if (['checkedout', 'completed', 'departed'].includes(key)) return 'completed';
    if (['cancelled', 'canceled', 'noshow'].includes(key)) return 'cancelled';
    if (key === 'blocked') return 'blocked';
    if (key === 'pending') return 'pending';
    return key || 'confirmed';
}

function normalizeRoomValue(value) {
    const text = String(value || '').trim().toLowerCase();
    const compact = text.replace(/[^a-z0-9]/g, '');
    const tail = text.includes('-') ? text.split('-').pop() : text;
    const compactTail = tail.replace(/[^a-z0-9]/g, '');
    const digits = (text.match(/\d+/g) || []).join('');
    return {
        text,
        compact,
        tail,
        compactTail,
        digits,
        strippedDigits: digits.replace(/^0+(?=\d)/, ''),
        hasLetters: /[a-z]/.test(compact)
    };
}

function sameRoomValue(left, right) {
    const a = normalizeRoomValue(left);
    const b = normalizeRoomValue(right);
    if (!a.text || !b.text) return false;
    const aKeys = [a.text, a.compact, a.tail, a.compactTail].filter(Boolean);
    const bKeys = new Set([b.text, b.compact, b.tail, b.compactTail].filter(Boolean));
    if (aKeys.some(key => bKeys.has(key))) return true;
    const sameDigits = a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits);
    return !!sameDigits && (!a.hasLetters || !b.hasLetters);
}

function roomMatchesReservation(room, res) {
    const roomValues = [room?.id, room?.fullRoom, room?.roomId, room?.number, room?.roomNo, room?.display, room?.roomLabel];
    const resValues = [res?.room, res?.fullRoom, res?.roomId, res?.roomNo, res?.roomNumber, res?.roomLabel];
    return roomValues.some(roomValue => resValues.some(resValue => sameRoomValue(roomValue, resValue)));
}

function roomForReservation(res) {
    return rooms.find(room => roomMatchesReservation(room, res));
}

function completedCheckoutForRoomOnFocusDate(room) {
    const range = boardRange();
    const focusDate = range.mode === 'day' ? range.start : todayDate();
    return reservations
        .filter(res => roomMatchesReservation(room, res))
        .map(res => ({
            res,
            status: normalizeStatus(res.status),
            end: reservationEnd(res)
        }))
        .find(item =>
            item.end &&
            item.status === 'completed' &&
            sameDate(item.end, focusDate) &&
            reservationOverlapsRange(item.res, range)
        )?.res || null;
}

function reservationShadowedByCompletedCheckout(res) {
    const room = roomForReservation(res);
    const completed = room ? completedCheckoutForRoomOnFocusDate(room) : null;
    if (!completed || completed.id === res.id) return false;
    const guest = String(res?.guestName || res?.guest || '').trim().toLowerCase();
    const completedGuest = String(completed?.guestName || completed?.guest || '').trim().toLowerCase();
    const start = reservationStart(res);
    const completedEnd = reservationEnd(completed);
    return !!(guest && guest === completedGuest && start && completedEnd && sameDate(start, completedEnd));
}

function isReservationRoomInHouse(res) {
    const room = roomForReservation(res);
    return [room?.frontStatus, room?.status, room?.housekeepingStatus, room?.occupancyStatus]
        .map(normalizeStatus)
        .some(status => status === 'inhouse');
}

function checkoutDateIsDue(res, refDate = todayDate()) {
    const end = reservationEnd(res);
    return !!end && end <= refDate;
}

function checkinDateIsDue(res, refDate = todayDate()) {
    const start = reservationStart(res);
    return !!start && start <= refDate;
}

function isCurrentStayWindow(res, refDate = todayDate()) {
    return reservationActiveOn(res, refDate);
}

function isOperationalStayWindow(res, refDate = todayDate()) {
    const start = reservationStart(res);
    const end = reservationEnd(res);
    return !!(start && end && start <= refDate && refDate <= end);
}

function effectiveReservationStatus(res, refDate = todayDate()) {
    let status = normalizeReservationStatus(res?.status);
    if (['confirmed', 'pending'].includes(status) && isReservationRoomInHouse(res) && isOperationalStayWindow(res, refDate)) status = 'checkedin';
    if (status === 'checkedin' && checkoutDateIsDue(res, refDate)) return 'checkout';
    return status;
}

function isBoardCheckoutTargetStatus(status) {
    return ['checkedin', 'inhouse', 'checkout'].includes(status);
}

function reservationBucket(res) {
    const range = boardRange();
    if (!reservationOverlapsRange(res, range)) return null;
    const start = reservationStart(res);
    const end = reservationEnd(res);
    const refDate = range.mode === 'day' ? range.start : todayDate();
    const status = effectiveReservationStatus(res, refDate);
    if (status === 'cancelled') return 'cancelled';
    if (status === 'completed') return null;
    if (status === 'checkout') return 'checkout';
    if (range.mode === 'day') {
        if (isBoardCheckoutTargetStatus(status) && end && sameDate(end, range.start)) return 'checkout';
        if (status === 'checkedin' && reservationActiveOn(res, range.start)) return 'inhouse';
        if (start && sameDate(start, range.start)) return 'checkin';
        if (reservationActiveOn(res, range.start)) return status === 'checkedin' ? 'inhouse' : 'reserved';
        return 'reserved';
    }
    if (status === 'checkedin' && reservationActiveOn(res, todayDate())) return 'inhouse';
    if (start && dateInRange(start, range)) return 'checkin';
    if (end && dateInRange(end, range) && ['checkedin', 'checkout'].includes(status)) return 'checkout';
    if (reservationActiveOn(res, todayDate())) return 'inhouse';
    return 'reserved';
}

function boardReservationCounts() {
    const signature = `${boardPeriod}|${boardDataSignature()}`;
    if (boardCountsCache.signature === signature && boardCountsCache.counts) {
        return { ...boardCountsCache.counts };
    }
    const counts = { all: 0, group: 0, vacant: 0, checkin: 0, checkinDirty: 0, dirty: 0, inhouse: 0, checkout: 0, late: 0, roommove: 0, reserved: 0, cancelled: 0 };
    counts.all = rooms.length;
    ['group', 'checkin', 'inhouse', 'checkout', 'reserved', 'late', 'roommove', 'cancelled'].forEach(filter => {
        counts[filter] = rooms.filter(room => reservationForRoomFilter(room, filter)).length;
    });
    rooms.forEach(room => {
        const state = boardStatusFor(room);
        if (state.status === 'vacant') counts.vacant++;
        if (boardCleaningSummary(room, state.res).key === 'dirty') counts.dirty++;
        if (boardCheckinDirtyReservationForRoom(room)) counts.checkinDirty++;
    });
    boardCountsCache = { signature, counts: { ...counts } };
    return counts;
}

function updateBoardChip(chip, filter, count) {
    if (!chip) return;
    let icon = chip.querySelector('i');
    let label = chip.querySelector('.chip-label');
    let countEl = chip.querySelector('.chip-count');
    if (!icon || !label || !countEl) {
        const auditId = chip.dataset.auditClickId;
        chip.textContent = '';
        icon = document.createElement('i');
        label = document.createElement('span');
        countEl = document.createElement('span');
        label.className = 'chip-label';
        countEl.className = 'chip-count';
        chip.append(icon, label, countEl);
        if (auditId) chip.dataset.auditClickId = auditId;
    }
    icon.className = `fa-solid ${boardFilterIcon(filter)}`;
    label.textContent = boardFilterLabel(filter);
    countEl.textContent = count;
}

function primaryGuest(res) {
    return res?.roomingGuestName || res?.guestName || res?.guest || '';
}

function storedBoardGroups() {
    const merged = new Map();
    (Array.isArray(groups) ? groups : []).forEach(group => {
        if (group?.id) merged.set(group.id, group);
    });
    try {
        const stored = JSON.parse(localStorage.getItem('pms_groups') || '[]');
        if (Array.isArray(stored)) {
            stored.forEach(group => {
                if (group?.id) merged.set(group.id, { ...(merged.get(group.id) || {}), ...group });
            });
        }
    } catch(e) {}
    return [...merged.values()];
}

function boardGroupForReservation(res) {
    if (!res?.groupId) return null;
    return storedBoardGroups().find(group => group && group.id === res.groupId) || null;
}

function boardGroupLabel(res) {
    if (!res) return '';
    const group = boardGroupForReservation(res);
    return String(
        res.groupName
        || group?.name
        || group?.displayName
        || res.companyName
        || res.company
        || res.agency
        || ''
    ).trim();
}

function boardGroupSearchText(res) {
    if (!res) return '';
    const group = boardGroupForReservation(res);
    return [
        res.groupId,
        res.groupName,
        group?.name,
        group?.displayName,
        group?.agency,
        group?.companyName,
        group?.company?.name,
        res.companyName,
        res.company,
        res.agency
    ].map(value => String(value || '').trim()).filter(Boolean).join(' ');
}

function boardIsGroupReservation(res) {
    if (!res) return false;
    return !!(
        res.groupId
        || res.isGroupPlaceholder
        || normalizeReservationStatus(res.status) === 'blocked'
        || boardGroupLabel(res)
    );
}

function boardDisplayName(res) {
    if (!res) return '';
    const guest = primaryGuest(res);
    const groupName = boardGroupLabel(res);
    if (res.groupId && groupName && guest) return `${groupName} · ${guest}`;
    if (res.groupId && groupName) return groupName;
    if (res.groupId && guest) return guest;
    return guest || groupName || (res.isGroupPlaceholder || normalizeReservationStatus(res) === 'blocked' ? '단체 블록' : '');
}

function boardPrimaryIcon(res) {
    return boardIsGroupReservation(res)
        ? 'fa-users'
        : 'fa-user';
}

function boardIsVipReservation(res) {
    if (!res) return false;
    if (res.isVip === true) return true;
    const value = String(res.vip || res.tier || res.membershipTier || '').trim().toLowerCase();
    return value.includes('vip');
}

function companionGuests(res) {
    const primary = primaryGuest(res);
    const values = [
        ...(Array.isArray(res?.roomingGuestNames) ? res.roomingGuestNames.slice(1) : []),
        ...(Array.isArray(res?.companionGuestNames) ? res.companionGuestNames : []),
        ...(Array.isArray(res?.companions) ? res.companions.map(item => typeof item === 'string' ? item : item?.name) : []),
        ...(Array.isArray(res?.roomingGuests) ? res.roomingGuests.slice(1).map(item => typeof item === 'string' ? item : item?.name) : [])
    ];
    const seen = new Set();
    return values.map(name => String(name || '').trim()).filter(name => name && name !== primary && !seen.has(name) && seen.add(name));
}

function reservationRoomChangeHistory(res) {
    const sources = [
        ...(Array.isArray(res?.roomChangeHistory) ? res.roomChangeHistory : []),
        ...(Array.isArray(res?.roomMoveHistory) ? res.roomMoveHistory : []),
        ...(Array.isArray(res?.settlementRoomChanges) ? res.settlementRoomChanges : [])
    ];
    const seen = new Set();
    return sources.filter(item => {
        const fromRoom = item?.fromRoom || item?.beforeRoom || item?.from || '';
        const toRoom = item?.toRoom || item?.afterRoom || item?.to || '';
        const key = `${fromRoom}->${toRoom}-${item?.changedAt || item?.createdAt || ''}`;
        if (!fromRoom && !toRoom) return false;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    });
}

function reservationHasRoomChange(res) {
    return reservationRoomChangeHistory(res).length > 0;
}

function reservationRoomChangeText(res) {
    const last = reservationRoomChangeHistory(res).slice(-1)[0];
    if (!last) return '';
    const fromRoom = last.fromRoom || last.beforeRoom || last.from || '-';
    const toRoom = last.toRoom || last.afterRoom || last.to || res?.room || res?.roomNo || '-';
    return `${fromRoom} → ${toRoom}`;
}

function amountValue(res) {
    if (res?.totalAmount && typeof res.totalAmount === 'object') return Number(res.totalAmount.amount || 0);
    return Number(res?.amount || 0);
}

function formatMoney(amount) {
    return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 2 }).format(Number(amount || 0));
}

function boardMoneyNumber(value) {
    if (value && typeof value === 'object') return Number(value.amount || 0);
    const number = Number(value || 0);
    return Number.isFinite(number) ? number : 0;
}

function boardReservationBalance(res) {
    return boardMoneyNumber(
        res?.balanceDue ??
        res?.outstandingBalance ??
        res?.paymentPlan?.balanceDue ??
        res?.settlement?.balanceDue ??
        0
    );
}

function boardReservationDeposit(res) {
    return boardMoneyNumber(
        res?.depositAmount ??
        res?.prepaidAmount ??
        res?.deposit ??
        res?.paymentPlan?.depositAmount ??
        res?.settlement?.depositAmount ??
        0
    );
}

function boardSettlementSummary(res, state) {
    if (!res) return { html: '', terms: '' };
    const balance = boardReservationBalance(res);
    const deposit = boardReservationDeposit(res);
    const status = normalizeStatus(res.status || '');
    const isCompleted = ['completed', 'checkedout', 'checked-out', 'settled', 'closed'].includes(status);
    const checkoutToday = (state?.status === 'checkout' || isBoardCheckoutTargetStatus(effectiveReservationStatus(res))) && sameDate(reservationEnd(res), todayDate());
    const badges = [];
    if (balance > 0) {
        badges.push({ key: 'unpaid', label: boardText('settlement.unpaid'), icon: 'fa-circle-exclamation' });
    } else if (checkoutToday && !isCompleted) {
        badges.push({ key: 'ready', label: boardText('settlement.ready'), icon: 'fa-file-invoice-dollar' });
    } else if (isCompleted) {
        badges.push({ key: 'paid', label: boardText('settlement.paid'), icon: 'fa-circle-check' });
    }
    if (deposit > 0) badges.push({ key: 'deposit', label: boardText('settlement.deposit'), icon: 'fa-wallet' });
    if (!badges.length) return { html: '', terms: '' };
    const target = `../operations/settlement-status.html?query=${encodeURIComponent(res.room || res.roomNo || res.id || '')}`;
    return {
        terms: badges.map(item => item.label).join(' '),
        html: `<a class="board-settlement-summary" href="${target}" onclick="event.stopPropagation()" title="${escapeHtml(boardText('settlement.title'))}">
            ${badges.map(item => `<span class="board-settle-badge ${item.key}"><i class="fa-solid ${item.icon}"></i>${item.label}</span>`).join('')}
        </a>`
    };
}

function boardCheckinReadiness(state, cleanInfo) {
    if (!state?.res || state.status !== 'arrival') return '';
    if (state.status === 'oos') return `<span class="board-readiness block"><i class="fa-solid fa-ban"></i>${escapeHtml(boardText('readiness.blocked'))}</span>`;
    if (cleanInfo?.key === 'clean') return `<span class="board-readiness ready"><i class="fa-solid fa-circle-check"></i>${escapeHtml(boardText('readiness.ready'))}</span>`;
    return '';
}
function computeBoardStatusFor(room) {
    const range = boardRange();
    const focusDate = range.mode === 'day' ? range.start : todayDate();
    const roomStatus = normalizeStatus(room.status || room.frontStatus || room.housekeepingStatus);
    if (roomStatus === 'oos') return { status: 'oos', label: boardText('status.oos'), res: null };
    const roomReservations = reservations
        .filter(res => roomMatchesReservation(room, res))
        .map(res => ({
            res,
            status: normalizeStatus(res.status),
            effectiveStatus: effectiveReservationStatus(res, focusDate),
            start: reservationStart(res),
            end: reservationEnd(res)
        }))
        .sort((a, b) => a.start - b.start);
    const related = roomReservations
        .filter(item => item.start && item.end && item.status !== 'cancelled' && item.status !== 'completed' && !reservationShadowedByCompletedCheckout(item.res) && reservationOverlapsRange(item.res, range));

    const checkoutDue = related.find(item => isBoardCheckoutTargetStatus(item.effectiveStatus) && sameDate(item.end, focusDate));
    if (checkoutDue) return { status: 'checkout', label: boardText('status.checkout'), res: checkoutDue.res };

    const active = related.find(item => item.start <= focusDate && focusDate < item.end);
    if (active) {
        if (active.status === 'blocked' || active.res.isGroupPlaceholder) return { status: 'blocked', label: boardText('status.blocked'), res: active.res };
        if (sameDate(active.end, focusDate) && isBoardCheckoutTargetStatus(active.effectiveStatus)) return { status: 'checkout', label: boardText('status.checkout'), res: active.res };
        if (isBoardCheckoutTargetStatus(active.effectiveStatus) || roomStatus === 'inhouse') return { status: 'inhouse', label: boardText('status.inhouse'), res: active.res };
        if (sameDate(active.start, focusDate)) return { status: 'arrival', label: boardText('status.arrival'), res: active.res };
        return { status: 'arrival', label: boardText('status.noArrival'), res: active.res };
    }

    const arrival = range.mode === 'day'
        ? related.find(item => sameDate(item.start, focusDate))
        : related.find(item => dateInRange(item.start, range));
    if (arrival) return { status: 'arrival', label: boardText('status.arrival'), res: arrival.res };
    const next = related.find(item => item.start > focusDate && item.start <= range.end);
    if (next) return { status: 'reserved', label: boardText('status.reserved'), res: next.res };
    return { status: 'vacant', label: boardText('status.vacant'), res: null };
}

function boardStatusFor(room) {
    const signature = `${boardLang()}|${boardPeriod}|${boardDataSignature()}`;
    if (boardStatusCache.signature !== signature) {
        boardStatusCache = { signature, states: new Map() };
    }
    const key = String(room?.id || room?.roomId || room?.fullRoom || room?.roomNo || room?.number || room?.display || '');
    if (key && boardStatusCache.states.has(key)) return boardStatusCache.states.get(key);
    const state = computeBoardStatusFor(room);
    if (key) boardStatusCache.states.set(key, state);
    return state;
}

function roomType(room) {
    return String(room?.type || room?.roomTypeName || room?.roomTypeId || 'Standard');
}

function floorValue(room) {
    if (room.floor !== undefined && room.floor !== null && room.floor !== '') return Number(room.floor);
    const digits = String(room.id || room.roomNo || '').match(/\d+/)?.[0] || '';
    return digits.length >= 3 ? Number(digits.slice(0, -2)) : 0;
}

function reservationDates(res) {
    if (!res) return '';
    return `${res.cin || (res.checkInDate || '').slice(5)} → ${res.cout || (res.checkOutDate || '').slice(5)}`;
}

function normalizeReservationTime(value, fallback = '') {
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const match = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
    if (!match) return fallback;
    const hour = Number(match[1]);
    const minute = Number(match[2] || 0);
    if (!Number.isFinite(hour) || !Number.isFinite(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) return fallback;
    return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
}

function reservationCheckInTime(res) {
    return normalizeReservationTime(res?.checkInTime || res?.arrivalTime || res?.stayTimes?.checkInTime || res?.times?.checkIn, '14:00');
}

function reservationCheckOutTime(res) {
    return normalizeReservationTime(res?.checkOutTime || res?.departureTime || res?.stayTimes?.checkOutTime || res?.times?.checkOut, '12:00');
}

function reservationLateCheckoutEnabled(res) {
    return !!(res?.lateCheckout || res?.isLateCheckout || res?.stayTimes?.lateCheckout || res?.lateCheckoutTime || res?.extendedCheckOutTime);
}

function reservationLateCheckoutTime(res) {
    return normalizeReservationTime(res?.lateCheckoutTime || res?.extendedCheckOutTime || res?.stayTimes?.lateCheckoutTime, reservationCheckOutTime(res));
}

function reservationStayTimeHtml(res) {
    if (!res) return '';
    const late = reservationLateCheckoutEnabled(res);
    return `<div class="board-time-list">
        <div class="board-time-line"><i class="fa-regular fa-clock"></i>${escapeHtml(boardText('label.checkInTime'))} ${escapeHtml(reservationCheckInTime(res))}</div>
        <div class="board-time-line"><i class="fa-regular fa-clock"></i>${escapeHtml(boardText('label.checkOutTime'))} ${escapeHtml(reservationCheckOutTime(res))}</div>
    </div>${late ? `<div class="board-late-pill"><i class="fa-solid fa-clock"></i>${escapeHtml(boardText('label.lateTime'))} ${escapeHtml(reservationLateCheckoutTime(res))}</div>` : ''}`;
}

function normalizedRoomOpsValue(value) {
    return String(value || '').replace(/[-_\s]/g, '').toLowerCase();
}

function boardStayState(room, res) {
    const flag = room?.guestFlag || res?.guestFlag || 'none';
    const cleaningState = normalizedRoomOpsValue(room?.housekeepingStatus || room?.hkStatus || room?.cleaningStatus);
    const isCleanRequested = flag === 'mur' || ['dirty', 'vacantdirty', 'pendingclean', 'needscleaning', 'inspect', 'needsinspection'].includes(cleaningState);
    const isCleaning = ['cleaning', 'inprogress', 'cleaninginprogress'].includes(cleaningState);
    const isCleanComplete = ['clean', 'vacantclean', 'completed', 'complete', 'done', 'ready'].includes(cleaningState);
    if (boardStayEditable(res) && !boardOccupiedCleaningIsFresh(room, res)) return 'mur';
    if (flag === 'dnd' || flag === 'away') return flag;
    if (isCleaning) return 'cleaning';
    if (isCleanRequested) return 'mur';
    if (isCleanComplete) return 'clean';
    return 'none';
}

function boardCleaningSummary(room, res) {
    const cleaningState = normalizedRoomOpsValue(room?.housekeepingStatus || room?.hkStatus || room?.cleaningStatus);
    const stayState = boardStayState(room, res);
    if (stayState === 'dnd') {
        return { key: 'dnd', label: '방해금지', icon: 'fa-ban' };
    }
    if (stayState === 'cleaning' || ['cleaning', 'inprogress', 'cleaninginprogress'].includes(cleaningState)) {
        return { key: 'cleaning', label: boardText('stay.cleaning'), icon: 'fa-spinner' };
    }
    if (stayState === 'clean' || ['clean', 'vacantclean', 'completed', 'complete', 'done', 'ready'].includes(cleaningState)) {
        return { key: 'clean', label: '청소 완료', icon: 'fa-check' };
    }
    if (res || ['mur', 'dirty', 'vacantdirty', 'pendingclean', 'needscleaning', 'inspect', 'needsinspection'].includes(cleaningState)) {
        return { key: 'dirty', label: '청소 필요', icon: 'fa-broom' };
    }
    return { key: 'clean', label: '청소 완료', icon: 'fa-check' };
}

function boardCheckinDirtyReservationForRoom(room) {
    return reservations
        .filter(res => roomMatchesReservation(room, res) && reservationBucket(res) === 'checkin')
        .sort((a, b) => {
            const left = reservationStart(a)?.getTime() || 0;
            const right = reservationStart(b)?.getTime() || 0;
            return left - right;
        })
        .find(res => boardCleaningSummary(room, res).key === 'dirty') || null;
}

function boardStayEditable(res) {
    const status = effectiveReservationStatus(res);
    return ['checkedin', 'checkout'].includes(status);
}

function boardOccupiedCleaningDate(room, res) {
    return room?.occupiedCleaningDate || room?.cleaningStateDate || room?.cleaningDate ||
        res?.occupiedCleaningDate || res?.cleaningStateDate || res?.cleaningDate || '';
}

function boardOccupiedCleaningIsFresh(room, res) {
    return boardOccupiedCleaningDate(room, res) === boardDateKey();
}

function markBoardOccupiedCleaningDate(room, res) {
    const key = boardDateKey();
    if (room) {
        room.occupiedCleaningDate = key;
        room.cleaningStateDate = key;
    }
    if (res) {
        res.occupiedCleaningDate = key;
        res.cleaningStateDate = key;
    }
}

function resetBoardDailyStayCleaning(room, res) {
    if (!room || !res || !boardStayEditable(res) || boardOccupiedCleaningIsFresh(room, res)) return false;
    room.housekeepingStatus = 'dirty';
    room.cleaningStatus = 'dirty';
    room.guestFlag = 'none';
    res.guestFlag = 'none';
    markBoardOccupiedCleaningDate(room, res);
    return true;
}

async function refreshBoardDailyStayCleaning() {
    const changedReservations = [];
    reservations.forEach(res => {
        const room = roomForReservation(res);
        if (resetBoardDailyStayCleaning(room, res)) changedReservations.push(res);
    });
    if (!changedReservations.length) return false;
    localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    try {
        await Promise.all([
            window.PmsAPI?.saveRooms ? window.PmsAPI.saveRooms(rooms) : Promise.resolve(),
            window.PmsAPI?.saveReservations ? window.PmsAPI.saveReservations(reservations) : Promise.resolve()
        ]);
    } catch(e) {
        console.warn('Daily stay cleaning refresh failed', e);
    }
    return true;
}

function boardStayActions(room, res) {
    if (!room) return '';
    const roomKey = room.roomId || room.fullRoom || room.id || res?.room || '';
    const cleanState = boardCleaningSummary(room, res).key;
    if (!res) {
        return `<select class="board-clean-select ${escapeHtml(cleanState)}" data-clean-tone="${escapeHtml(cleanState)}" data-room-key="${escapeHtml(roomKey)}" aria-label="${escapeHtml(boardText('stay.aria.empty'))}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation()" onchange="setBoardCleanState(event,this)">
            <option value="dirty"${cleanState === 'dirty' ? ' selected' : ''}>${escapeHtml(boardText('stay.mur'))}</option>
            <option value="cleaning"${cleanState === 'cleaning' ? ' selected' : ''}>${escapeHtml(boardText('stay.cleaning'))}</option>
            <option value="clean"${cleanState === 'clean' ? ' selected' : ''}>${escapeHtml(boardText('stay.clean'))}</option>
        </select>`;
    }
    const options = [
        { key: 'mur', label: boardText('stay.mur') },
        { key: 'cleaning', label: boardText('stay.cleaning') },
        { key: 'clean', label: boardText('stay.clean') },
        { key: 'dnd', label: boardText('stay.dnd') }
    ];
    const activeRaw = boardStayState(room, res);
    const active = options.some(opt => opt.key === activeRaw)
        ? activeRaw
        : (cleanState === 'dirty' ? 'mur' : cleanState);
    return `<select class="board-clean-select ${escapeHtml(active)}" data-clean-tone="${escapeHtml(active)}" data-res-id="${escapeHtml(res.id)}" data-room-key="${escapeHtml(roomKey)}" aria-label="${escapeHtml(boardText('stay.aria.occupied'))}" onpointerdown="event.stopPropagation()" onclick="event.stopPropagation()" onchange="setBoardStayState(event,this)">
        ${options.map(opt => `<option value="${opt.key}"${active === opt.key ? ' selected' : ''}>${escapeHtml(opt.label)}</option>`).join('')}
    </select>`;
}

function updateBoardCleanSelectTone(select, state = '') {
    if (!select) return;
    select.classList.remove('dirty', 'mur', 'cleaning', 'clean', 'dnd');
    const next = String(state || select.value || '').toLowerCase();
    select.querySelectorAll('option').forEach(option => {
        const selected = option.value === next;
        option.selected = selected;
        if (selected) option.setAttribute('selected', '');
        else option.removeAttribute('selected');
    });
    select.dataset.cleanTone = next;
    if (['dirty', 'mur', 'cleaning', 'clean', 'dnd'].includes(next)) select.classList.add(next);
    const toneStyles = {
        dirty: { bg: '#fff7ed', border: '#fed7aa', color: '#b45309' },
        mur: { bg: '#fff7ed', border: '#fed7aa', color: '#b45309' },
        cleaning: { bg: '#eff6ff', border: '#bfdbfe', color: '#1d4ed8' },
        clean: { bg: '#ecfdf5', border: '#a7f3d0', color: '#047857' },
        dnd: { bg: '#fff1f2', border: '#fecdd3', color: '#be123c' }
    };
    const style = toneStyles[next];
    if (style) {
        select.style.setProperty('background-color', style.bg, 'important');
        select.style.setProperty('border-color', style.border, 'important');
        select.style.setProperty('color', style.color, 'important');
    } else {
        select.style.removeProperty('background-color');
        select.style.removeProperty('border-color');
        select.style.removeProperty('color');
    }
}

function syncRenderedBoardControls(renderedCount = null) {
    document.querySelectorAll('#reservationBoardContainer .board-clean-select').forEach(select => {
        updateBoardCleanSelectTone(select);
    });
    const count = Number.isFinite(renderedCount)
        ? renderedCount
        : document.querySelectorAll('#reservationBoardContainer .reservation-board-box').length;
    document.querySelectorAll('#boardChips .chip.active').forEach(chip => {
        const filter = chip.dataset.filter || boardFilter;
        updateBoardChip(chip, filter, count);
        chip.classList.add('active');
    });
}

function reservationStateForFilter(res) {
    const bucket = reservationBucket(res);
    const statusByBucket = {
        checkin: 'arrival',
        inhouse: 'inhouse',
        checkout: 'checkout',
        cancelled: 'cancelled'
    };
    const labelByBucket = {
        checkin: boardText('status.arrival'),
        inhouse: boardText('status.inhouse'),
        checkout: boardText('status.checkout'),
        cancelled: boardText('status.cancelled')
    };
    return {
        status: statusByBucket[bucket] || 'reserved',
        label: labelByBucket[bucket] || boardText('status.reserved'),
        res
    };
}

function reservationMatchesBoardFilter(res, filter) {
    if (filter === 'completed') return false;
    if (filter === 'all') return reservationOverlapsRange(res);
    if (!reservationOverlapsRange(res)) return false;
    if (reservationShadowedByCompletedCheckout(res)) return false;
    if (filter === 'group') return boardIsGroupReservation(res);
    if (filter === 'late') return reservationLateCheckoutEnabled(res);
    if (filter === 'roommove') return reservationHasRoomChange(res);
    return reservationBucket(res) === filter;
}

function reservationForRoomFilter(room, filter = boardFilter) {
    if (filter === 'all' || filter === 'completed') return null;
    if (filter === 'checkinDirty') return boardCheckinDirtyReservationForRoom(room);
    const state = boardStatusFor(room);
    const currentReservation = state.res || null;
    if (filter === 'dirty') {
        return boardCleaningSummary(room, currentReservation).key === 'dirty'
            ? currentReservation
            : null;
    }
    if (filter === 'group') return currentReservation && boardIsGroupReservation(currentReservation) ? currentReservation : null;
    if (filter === 'late') return currentReservation && reservationLateCheckoutEnabled(currentReservation) ? currentReservation : null;
    if (filter === 'roommove') return currentReservation && reservationHasRoomChange(currentReservation) ? currentReservation : null;
    if (filter !== 'cancelled') {
        return currentReservation && reservationBucket(currentReservation) === filter
            ? currentReservation
            : null;
    }

    // Cancelled stays are historical. Only surface one when the room has no
    // current board reservation, otherwise the same room would display a
    // different guest and status when switching filters.
    if (currentReservation) return null;
    return reservations
        .filter(res => roomMatchesReservation(room, res) && reservationMatchesBoardFilter(res, filter))
        .sort((a, b) => {
            const left = parseDate(a.checkInDate || a.checkin || a.cin)?.getTime() || 0;
            const right = parseDate(b.checkInDate || b.checkin || b.cin)?.getTime() || 0;
            return left - right;
        })[0] || null;
}

function boardStatusIcon(status) {
    return ({
        vacant: 'fa-door-open',
        arrival: 'fa-right-to-bracket',
        inhouse: 'fa-bed',
        checkout: 'fa-right-from-bracket',
        late: 'fa-clock',
        reserved: 'fa-calendar-check',
        cancelled: 'fa-ban',
        blocked: 'fa-users',
        oos: 'fa-screwdriver-wrench'
    })[status] || 'fa-calendar-check';
}

function boardDateInputValue(date) {
    const target = date || todayDate();
    return `${target.getFullYear()}-${String(target.getMonth() + 1).padStart(2, '0')}-${String(target.getDate()).padStart(2, '0')}`;
}

function openBoardRoomBooking(encodedRoomId) {
    const roomId = decodeURIComponent(encodedRoomId || '');
    const room = rooms.find(item => sameRoomValue(item?.id, roomId)
        || sameRoomValue(item?.fullRoom, roomId)
        || sameRoomValue(item?.roomNo, roomId)
        || sameRoomValue(item?.number, roomId)
        || sameRoomValue(item?.display, roomId)
        || sameRoomValue(item?.roomLabel, roomId));
    const unavailable = room && (
        normalizeStatus(room.status || room.frontStatus || room.housekeepingStatus) === 'oos'
        || ['maintenance', 'outofservice', 'outoforder', 'oos'].includes(String(room.maintenanceStatus || '').replace(/[-_\s]/g, '').toLowerCase())
        || room.isOutOfService === true
        || room.outOfService === true
    );
    if (unavailable) {
        const message = boardLang() === 'en'
            ? 'Rooms under inspection or maintenance cannot be booked.'
            : '\uC810\uAC80/\uC218\uB9AC \uC911\uC778 \uAC1D\uC2E4\uC740 \uC608\uC57D\uD560 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.';
        if (window.showAlert) window.showAlert(message, { type: 'error' });
        else if (window.showToast) window.showToast(message, 'error');
        return;
    }
    const range = boardRange();
    const checkin = range.start || todayDate();
    const checkout = addDays(checkin, 1);
    const roomValue = room?.id || room?.fullRoom || room?.roomId || room?.roomNo || room?.number || roomId;
    const roomDisplayValue = room?.roomNo || room?.number || room?.display || room?.roomLabel || roomValue;
    if (typeof window.openUnifiedResModal === 'function') {
        window.openUnifiedResModal({
            room: roomValue,
            fullRoom: roomValue,
            roomId: roomValue,
            roomNo: roomDisplayValue,
            roomLabel: roomDisplayValue,
            type: roomType(room),
            checkin: boardDateInputValue(checkin),
            checkout: boardDateInputValue(checkout),
            checkInDate: boardDateInputValue(checkin),
            checkOutDate: boardDateInputValue(checkout)
        });
    }
}

function boardCard(room) {
    let state = boardStatusFor(room);
    if (boardFilter !== 'all') {
        if (boardFilter === 'dirty') {
            const filteredRes = reservationForRoomFilter(room);
            if (filteredRes) {
                state = reservationStateForFilter(filteredRes);
            }
            if (boardCleaningSummary(room, state.res).key !== 'dirty') return '';
        } else if (boardFilter === 'vacant') {
            if (state.status !== 'vacant') return '';
        } else {
            const filteredRes = reservationForRoomFilter(room);
            if (!filteredRes) return '';
            state = reservationStateForFilter(filteredRes);
        }
    }
    const res = state.res;
    const primary = res ? primaryGuest(res) : '';
    const displayName = res ? boardDisplayName(res) : '';
    const groupName = res ? boardGroupLabel(res) : '';
    const isGroup = res ? boardIsGroupReservation(res) : false;
    const isVip = res ? boardIsVipReservation(res) : false;
    const companions = res ? companionGuests(res) : [];
    const hasRoomChange = !!(res && reservationHasRoomChange(res));
    const roomChangeText = hasRoomChange ? reservationRoomChangeText(res) : '';
    const stayState = res ? boardStayState(room, res) : '';
    const stayStateLabels = { none: boardText('stay.none'), dnd: boardText('stay.dnd'), away: boardText('stay.away'), mur: boardText('stay.mur'), cleaning: boardText('stay.cleaning'), clean: boardText('stay.clean') };
    const settlementInfo = boardSettlementSummary(res, state);
    const searchText = [
        room.id,
        room.fullRoom,
        roomType(room),
        state.label,
        stayStateLabels[stayState] || '',
        settlementInfo.terms,
        primary,
        displayName,
        groupName,
        boardGroupSearchText(res),
        isVip ? boardText('label.vip') : '',
        res?.vip,
        res?.tier,
        companions.join(' '),
        hasRoomChange ? `${boardText('label.roomMove')} ${roomChangeText}` : '',
        res ? reservationCheckInTime(res) : '',
        res ? reservationCheckOutTime(res) : '',
        res && reservationLateCheckoutEnabled(res) ? `${boardText('label.lateTime')} ${reservationLateCheckoutTime(res)}` : ''
    ].join(' ').toLowerCase();
    const query = document.getElementById('boardSearch')?.value.trim().toLowerCase() || '';
    if (query && !searchText.includes(query)) return '';
    const roomId = room.id || room.fullRoom || room.roomNo || room.number || room.display || '';
    const canAttemptBooking = !res && !!roomId;
    const canCreateBooking = !res && state.status === 'vacant' && !!roomId;
    const cleanInfo = boardCleaningSummary(room, res);
    const cleanAction = boardStayActions(room, res);
    const readinessHtml = boardCheckinReadiness(state, cleanInfo);
    const click = res
        ? `onclick="openUnifiedResModal('${escapeHtml(res.id)}')"`
        : (canAttemptBooking ? `onclick="openBoardRoomBooking('${encodeURIComponent(roomId)}')"` : '');
    const flags = res ? [
        hasRoomChange ? `<span class="board-flag move"><i class="fa-solid fa-right-left"></i>${escapeHtml(boardText('label.move'))} ${escapeHtml(roomChangeText)}</span>` : ''
    ].filter(Boolean).join('') : '';
    const groupHeader = isGroup
        ? `<div class="board-group-title"><span class="board-group-badge"><i class="fa-solid fa-users"></i>${escapeHtml(boardText('label.group'))}</span><span class="board-group-name">${escapeHtml(groupName || boardText('label.groupBlock'))}</span></div>`
        : '';
    const vipRow = isVip && isGroup
        ? `<div class="board-vip-row"><i class="fa-solid fa-crown"></i><span>VIP</span></div>`
        : '';
    const vipInline = isVip && !isGroup
        ? `<span class="board-vip-inline"><i class="fa-solid fa-crown"></i>VIP</span>`
        : '';
    const guestName = isGroup ? (primary || boardText('label.unassignedGuest')) : (displayName || primary || '-');
    return `<div class="room-box reservation-board-box ${state.status}${hasRoomChange ? ' room-moved' : ''}${canCreateBooking ? ' is-bookable' : ''}" ${click} style="${(res || canAttemptBooking) ? 'cursor:pointer' : ''}">
        <div class="room-box-num"><span>${escapeHtml(room.id || room.roomNo || '-')}</span><span class="board-status ${state.status}"><i class="fa-solid ${boardStatusIcon(state.status)}"></i>${state.label}</span></div>
        <div class="room-box-type">${escapeHtml(roomType(room))}</div>
        ${res ? `<div class="board-guest">
            ${groupHeader}
            ${vipRow}
            <div class="board-primary">${vipInline}<i class="fa-solid ${isGroup ? 'fa-user' : boardPrimaryIcon(res)}"></i><span class="board-name">${escapeHtml(guestName)}</span></div>
            ${companions.length ? `<div class="board-companions" title="${escapeHtml(companions.join(', '))}">${companions.map(name => `<div class="board-companion">${escapeHtml(name)}</div>`).join('')}</div>` : ''}
        </div>
        <div class="board-date">${escapeHtml(reservationDates(res))}</div>
        <div class="board-flags${flags ? '' : ' is-empty'}">${flags || '&nbsp;'}</div>
        ${reservationStayTimeHtml(res)}

        ${settlementInfo.html}
        <div class="board-card-footer">
            <div class="board-money">${formatMoney(amountValue(res))}${boardReservationBalance(res) ? ` · ${boardText('label.balance')} ${formatMoney(boardReservationBalance(res))}` : ''}</div>

        room.housekeepingStatus || '',
        room.cleaningStatus || '',
        room.guestFlag || '',

    ].join(':')).join(',');

        res.guestName || res.guest || '',

function renderReservationBoard() {
    const container = document.getElementById('reservationBoardContainer');
    const signatureBase = `${boardLang()}|${boardPeriod}|${boardFilter}|${document.getElementById('boardSearch')?.value || ''}|${boardDataSignature()}`;
    if (container.dataset.renderSignature === signatureBase) {
        syncRenderedBoardControls();
        return;
    }
    updateBoardKpis();
    const hasBuildings = rooms.some(room => room.building);
    let rendered = 0;
    const htmlParts = [];
    if (hasBuildings) {
        [...new Set(rooms.map(room => room.building || boardText('label.unassigned')))].sort().forEach(building => {
            const buildingRooms = rooms.filter(room => (room.building || boardText('label.unassigned')) === building);
            const floors = [...new Set(buildingRooms.map(floorValue))].sort((a, b) => b - a);
            let html = `<div class="building-section"><div class="building-header" onclick="toggleBuilding(this)"><i class="fa-solid fa-building bldg-icon"></i><span class="bldg-name">${escapeHtml(building)}</span><span class="bldg-count">(${boardRoomCountLabel(buildingRooms.length)})</span><i class="fa-solid fa-chevron-down bldg-chevron"></i></div><div class="building-body">`;
            floors.forEach(floor => {
                const cards = buildingRooms.filter(room => floorValue(room) === floor).sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true })).map(boardCard).filter(Boolean);
                rendered += cards.length;
                if (!cards.length) return;
                html += `<div class="floor-section"><div class="floor-title"><i class="fa-solid fa-layer-group"></i> ${boardFloorLabel(floor)} <span class="floor-count">(${boardRoomCountLabel(cards.length)})</span></div><div class="room-grid">${cards.join('')}</div></div>`;
            });
            html += '</div></div>';
            htmlParts.push(html);
        });
    } else {
        const floors = [...new Set(rooms.map(floorValue))].sort((a, b) => b - a);
        floors.forEach(floor => {
            const cards = rooms.filter(room => floorValue(room) === floor).sort((a, b) => String(a.id).localeCompare(String(b.id), undefined, { numeric: true })).map(boardCard).filter(Boolean);
            rendered += cards.length;
            if (!cards.length) return;
            htmlParts.push(`<div class="floor-section"><div class="floor-title"><i class="fa-solid fa-layer-group"></i> ${boardFloorLabel(floor)} <span class="floor-count">(${boardRoomCountLabel(cards.length)})</span></div><div class="room-grid">${cards.join('')}</div></div>`);
        });
    }
    const html = rendered ? htmlParts.join('') : `<div style="padding:40px;text-align:center;color:var(--txt3);font-weight:800">${boardText('empty.noMatching')}</div>`;
    container.innerHTML = html;
    container.dataset.renderSignature = signatureBase;
    syncRenderedBoardControls(rendered);
}

function boardRoomKeys(room, fallback = '') {
    const values = [room?.id, room?.roomId, room?.fullRoom, room?.roomNo, room?.number, room?.display, fallback];
    const keys = new Set();
    values.forEach(value => {
        const text = String(value || '').trim();
        if (!text) return;
        const upper = text.toUpperCase();
        const tail = upper.includes('-') ? upper.split('-').pop() : upper;
        const digits = (upper.match(/\d+/g) || []).join('').replace(/^0+(?=\d)/, '');
        [upper, tail, digits].filter(Boolean).forEach(key => keys.add(key));
    });
    return keys;
}

function boardTaskMatchesRoom(task, room, roomId = '') {
    const roomKeys = boardRoomKeys(room, roomId);
    const taskKeys = boardRoomKeys({ id: task?.room, roomId: task?.roomId, roomNo: task?.roomNo, fullRoom: task?.fullRoom });
    return [...taskKeys].some(key => roomKeys.has(key));
}

async function closeBoardStayoverTasks(room, res, note) {
    if (!window.PmsAPI?.getTasks || !window.PmsAPI?.saveTasks) return;
    let tasks = [];
    try {
        tasks = await window.PmsAPI.getTasks();
    } catch(e) {
        console.warn('Board tasks load failed', e);
        return;
    }
    let changed = false;
    const now = new Date().toISOString();
    tasks.forEach(task => {
        if (task?.type === 'stayover' && task.status !== 'clean' && boardTaskMatchesRoom(task, room, res?.room)) {
            task.status = 'clean';
            task.completedAt = task.completedAt || now;
            task.inspectedBy = task.inspectedBy || 'Front Desk';
            task.note = task.note || note;
            changed = true;
        }
    });
    if (changed) await window.PmsAPI.saveTasks(tasks);
}

async function syncBoardStayStateToHousekeeping(room, res, state) {
    const roomId = room?.roomId || room?.fullRoom || room?.id || res?.room;
    if (!roomId) return;
    if (state === 'mur') {
        if (window.PmsAPI?.syncRoomStatusToTask) {
            await window.PmsAPI.syncRoomStatusToTask(roomId, 'stayover-dirty', {
                reservationId: res?.id,
                guestName: primaryGuest(res),
                type: 'stayover',
                source: 'reservation-board'
            });
        }
        return;
    }
    if (state === 'cleaning') {
        if (window.PmsAPI?.syncRoomStatusToTask) {
            await window.PmsAPI.syncRoomStatusToTask(roomId, 'cleaning', {
                reservationId: res?.id,
                guestName: primaryGuest(res),
                type: 'stayover',
                source: 'reservation-board'
            });
        }
        return;
    }
    if (state === 'clean') {
        if (window.PmsAPI?.syncRoomStatusToTask) {
            await window.PmsAPI.syncRoomStatusToTask(roomId, 'clean', {
                reservationId: res?.id,
                guestName: primaryGuest(res),
                source: 'reservation-board'
            });

    await closeBoardStayoverTasks(room, res, '프런트 상태 변경으로 재실 청소 요청 해제');
}

async function persistBoardStayState(room, res) {

        if (window.PmsAPI?.setGuestFlag && roomId) await window.PmsAPI.setGuestFlag(roomId, room.guestFlag || 'none');
        if (window.PmsMockApi && res?.id) await window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res });
    } catch(e) {
        console.warn('Board stay state save failed', e);
    }
}

function logBoardCleaningAudit(details) {
    if (typeof window.PmsPrivacyAudit?.log === 'function') {
        return window.PmsPrivacyAudit.log('room.cleaning.status', details);
    }

    try {
        const storageKey = 'pms_privacy_audit_logs';
        const parsed = JSON.parse(localStorage.getItem(storageKey) || '[]');
        const logs = Array.isArray(parsed) ? parsed : [];
        const role = localStorage.getItem('currentUserRole') || window.currentUserRole || 'sys_admin';
        const actorName = localStorage.getItem('currentUserName')
            || document.querySelector('.sidebar-user-name, .user-name')?.textContent?.trim()
            || 'System';
        const createdAt = window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString();
        const entry = {
            id: `AUD-${Date.now()}-${Math.random().toString(36).slice(2, 8)}`,
            action: 'room.cleaning.status',
            createdAt,
            actor: {
                id: localStorage.getItem('mock_user_id') || role,
                name: actorName,
                role,
                roleLabel: role
            },
            page: window.location.pathname,
            details: details || {}
        };
        logs.push(entry);
        localStorage.setItem(storageKey, JSON.stringify(logs.slice(-500)));
        window.dispatchEvent(new CustomEvent('pms:privacy-audit', { detail: entry }));
        return entry;
    } catch (error) {
        console.warn('Board cleaning audit save failed', error);
        return null;
    }
}

window.setBoardStayState = async function(event, button) {
    event?.preventDefault();
    event?.stopPropagation();
    const state = button?.value || button?.dataset?.state || 'mur';
    updateBoardCleanSelectTone(button, state);
    const resId = button?.dataset?.resId || '';
    const roomKey = button?.dataset?.roomKey || '';
    const res = reservations.find(item => item.id === resId);
    const room = roomForReservation(res) || rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey) || sameRoomValue(item.roomNo, roomKey));
    if (!room || !res) {
        if (window.showToast) window.showToast('객실 또는 예약 정보를 찾을 수 없습니다.', 'error');
        return;
    }
    const controls = button.closest('.board-clean-summary')?.querySelectorAll('select,button') || [];
    controls.forEach(item => { item.disabled = true; });
    try {
        markBoardOccupiedCleaningDate(room, res);
        room.cleaningStatusUpdatedAt = new Date().toISOString();
        if (state === 'mur') {
            room.housekeepingStatus = 'dirty';
            room.cleaningStatus = 'dirty';
            room.guestFlag = 'none';
            res.guestFlag = 'none';
        } else if (state === 'cleaning') {
            room.housekeepingStatus = 'cleaning';
            room.cleaningStatus = 'cleaning';
            room.guestFlag = 'none';
            res.guestFlag = 'none';
        } else if (state === 'clean') {
            room.housekeepingStatus = 'clean';
            room.cleaningStatus = 'clean';
            room.guestFlag = 'none';
            res.guestFlag = 'none';
        } else {
            room.housekeepingStatus = 'occupied';
            room.cleaningStatus = 'occupied';
            room.guestFlag = state;
            res.guestFlag = state;
        }
        await persistBoardStayState(room, res);
        logBoardCleaningAudit({
            screen: 'reservation-board', reservationId: res.id, guestName: primaryGuest(res),
            room: room.id || room.roomNo || roomKey, status: state,
            fields: ['room', 'cleaningStatus']
        });
        await syncBoardStayStateToHousekeeping(room, res, state);
        renderReservationBoard();
        if (window.showToast) {
            const labels = { none: boardText('stay.none'), dnd: boardText('stay.dnd'), away: boardText('stay.away'), mur: boardText('stay.mur'), cleaning: boardText('stay.cleaning'), clean: boardText('stay.clean') };
            window.showToast(boardTextFormat('stay.toast', { room: room.id || room.roomNo || roomKey, state: labels[state] || state }), 'success');
        }
    } finally {
        controls.forEach(item => { item.disabled = false; });
    }
};

window.setBoardCleanState = async function(event, button) {
    event?.preventDefault();
    event?.stopPropagation();
    const state = button?.value || button?.dataset?.state || 'clean';
    updateBoardCleanSelectTone(button, state);
    const roomKey = button?.dataset?.roomKey || '';
    const room = rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey) || sameRoomValue(item.roomNo, roomKey));
    if (!room) {
        if (window.showToast) window.showToast('객실 정보를 찾을 수 없습니다.', 'error');
        return;
    }
    const controls = button.closest('.board-clean-summary')?.querySelectorAll('select,button') || [];
    controls.forEach(item => { item.disabled = true; });
    const roomId = room.roomId || room.fullRoom || room.id || room.roomNo;
    try {
        if (state === 'dirty') {
            room.status = 'vacant-dirty';
            room.frontStatus = 'vacant-dirty';
            room.housekeepingStatus = 'dirty';
            room.cleaningStatus = 'dirty';
            if (window.PmsAPI?.syncRoomStatusToTask) {

                    note: '예약현황에서 빈방 청소 필요 처리'
                });

            room.frontStatus = 'vacant-dirty';
            room.housekeepingStatus = 'cleaning';
            room.cleaningStatus = 'cleaning';
            if (window.PmsAPI?.syncRoomStatusToTask) {

function applyBoardUrlParams() {
    const params = new URLSearchParams(location.search);
    const filterAliases = { cleaning: 'dirty', clean: 'dirty', vacancy: 'vacant', empty: 'vacant', completed: 'vacant' };
    purgeCompletedBoardFilterChip();
    const rawFilter = params.get('filter');
    const filter = filterAliases[rawFilter] || rawFilter;
    const chips = Array.from(document.querySelectorAll('#boardChips .chip'));
    if (filter && chips.some(chip => chip.dataset.filter === filter)) {
        boardFilter = filter;
        chips.forEach(btn => btn.classList.toggle('active', btn.dataset.filter === filter));
    }
    const query = params.get('query') || params.get('q') || '';
    const search = document.getElementById('boardSearch');
    if (query && search) search.value = query;
}

    reservations = (resData || []).map(res => ({ ...res, status: normalizeStatus(res.status) === 'inhouse' ? 'checkedin' : res.status }));
    groups = groupData || [];
    window.rooms = rooms;
    window.reservations = reservations;
    window.groups = groups;
    applyBoardUrlParams();
    document.getElementById('langSelect')?.addEventListener('change', () => setTimeout(window.applyLocalI18n, 0));
    let searchTimer = null;
    document.getElementById('boardSearch')?.addEventListener('input', () => {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(renderReservationBoard, 180);
    });
    renderReservationBoard();

    const runDailyCleaningRefresh = async () => {
        const changed = await refreshBoardDailyStayCleaning();
        if (changed) renderReservationBoard();
    };
    // Let the operational board paint before applying the once-per-day
    // housekeeping correction, which can trigger a second full render.
    setTimeout(runDailyCleaningRefresh, 1500);
});
</script>
</body>
</html>
