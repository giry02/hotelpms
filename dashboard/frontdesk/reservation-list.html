<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 목록 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.filter-chips{display:none!important}
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{overflow-y:auto;flex:1;padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-count{font-size:.7rem;background:var(--border2);border-radius:10px;padding:2px 8px;color:var(--txt2);font-weight:600}
.bs-option.selected .bs-option-count{background:rgba(99,102,241,.12);color:var(--primary)}
.ops-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ops-tab{height:38px;display:inline-flex;align-items:center;gap:7px;padding:0 14px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.78rem;font-weight:800;cursor:pointer;transition:.15s}
.ops-tab:hover{border-color:var(--primary);color:var(--primary)}
.ops-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.ops-tab .ops-count{min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:var(--border2);color:inherit;font-size:.68rem;padding:0 6px}
.ops-tab.active .ops-count{background:rgba(255,255,255,.24)}
.reservation-filter-bar{padding:12px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px}
.reservation-sort-group{display:inline-flex;align-items:center;gap:6px;margin-left:10px;padding-left:10px;border-left:1px solid var(--border2)}
.sort-btn{height:36px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.75rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:.15s}
.sort-btn i{width:14px;text-align:center}
.sort-btn:hover{border-color:var(--primary);color:var(--primary)}
.sort-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.period-select{height:36px;min-width:132px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.75rem;font-weight:800;padding:0 30px 0 10px;outline:none;flex-shrink:0}
.period-select:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(59,130,246,.08)}
.guest-alerts{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.guest-alert{display:inline-flex;align-items:center;gap:4px;max-width:220px;border-radius:999px;padding:2px 8px;font-size:.68rem;font-weight:800;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-alert.warn{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.guest-alert.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.guest-alert.doc{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}
.guest-alert.empty{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0}
.guest-alert.id-action{border:1px solid #fed7aa;background:#fff7ed;color:#c2410c;cursor:pointer;font-family:var(--font)}
.guest-alert.id-action:hover{border-color:#fb923c;background:#ffedd5;color:#9a3412}
.res-guest-stack{display:flex;flex-direction:column;gap:3px;min-width:0}
.res-guest-primary{display:flex;align-items:center;gap:6px;font-weight:850;color:var(--txt);min-width:0}
.res-guest-primary i{color:var(--primary);font-size:.72rem}
.res-guest-companions{display:flex;flex-direction:column;gap:2px;font-size:.72rem;color:var(--txt3);font-weight:700;max-width:260px;min-width:0}
.res-guest-companion{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-guest-companion:first-child::before{content:"동반 ";color:#94a3b8;font-weight:800;margin-right:2px}
.res-money-stack{display:flex;flex-direction:column;gap:2px;font-weight:800;color:var(--txt)}
.res-money-sub{font-size:.68rem;color:var(--txt3);font-weight:700;line-height:1.35}
.res-date-cell{display:flex;flex-direction:column;gap:3px;align-items:flex-start}
.res-time-meta{display:inline-flex;align-items:center;gap:4px;font-size:.66rem;font-weight:850;color:var(--txt3);white-space:nowrap}
.res-time-meta i{font-size:.62rem;color:var(--primary)}
.late-checkout-pill{display:inline-flex;align-items:center;gap:4px;width:max-content;max-width:100%;border-radius:999px;background:#fff7ed;color:#c2410c;border:1px solid #fed7aa;padding:2px 7px;font-size:.64rem;font-weight:900;white-space:nowrap}
.late-checkout-pill i{font-size:.6rem}
.res-work-action{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:0;border-radius:8px;color:#fff;font-family:var(--font);font-size:.72rem;font-weight:800;cursor:pointer;white-space:nowrap}
.res-work-action.checkin{background:#2563eb}
.res-work-action.checkout{background:#ef4444}
.res-work-action.group{background:#111827}
.res-work-action:disabled{opacity:.45;cursor:not-allowed}
.res-submeta{font-size:.72rem;color:#9ca3af;margin-top:3px}
#resTable{table-layout:fixed;min-width:1480px}
#resTable th:nth-child(1),#resTable td:nth-child(1){width:150px}
#resTable th:nth-child(2),#resTable td:nth-child(2){width:330px}
#resTable th:nth-child(3),#resTable td:nth-child(3){width:110px}
#resTable th:nth-child(4),#resTable td:nth-child(4),#resTable th:nth-child(5),#resTable td:nth-child(5){width:82px}
#resTable th:nth-child(6),#resTable td:nth-child(6){width:72px}
#resTable th:nth-child(7),#resTable td:nth-child(7){width:92px}
#resTable th:nth-child(8),#resTable td:nth-child(8){width:110px}
#resTable th:nth-child(9),#resTable td:nth-child(9){width:100px}
#resTable th:nth-child(10),#resTable td:nth-child(10){width:400px}
.res-room-cell{text-align:left}
.res-room-booking{display:flex;flex-direction:column;align-items:flex-start;gap:5px}
.res-id{display:block;max-width:132px;white-space:normal;overflow:visible;line-height:1.25;word-break:break-word}
.reservation-room-tag{display:inline-flex;align-items:center;justify-content:center;min-width:58px;height:28px;padding:0 10px;border-radius:8px;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;font-size:.78rem;font-weight:900;letter-spacing:.01em}
.reservation-room-tag i{font-size:.72rem;margin-right:5px}
.res-room-change-chip{display:inline-flex;align-items:center;gap:4px;max-width:132px;height:22px;padding:0 7px;border-radius:999px;background:#fff7ed;color:#b45309;border:1px solid #fde68a;font-size:.64rem;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.res-room-change-chip i{font-size:.6rem}
.res-actions-cell{min-width:390px;text-align:right}
.res-action-stack{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;min-width:0}
.stay-flag-panel{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:0;width:100%}
.stay-flag-label{display:none}
.stay-flag-buttons{display:flex;gap:5px;justify-content:flex-end;flex-wrap:nowrap;white-space:nowrap}
.stay-flag-btn{display:inline-flex;align-items:center;gap:4px;height:30px;padding:0 8px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.68rem;font-weight:850;cursor:pointer;transition:.15s;white-space:nowrap}
.stay-flag-btn:hover{border-color:var(--primary);color:var(--primary)}
.stay-flag-btn.active{border-color:#6366f1;background:#eef2ff;box-shadow:0 0 0 2px rgba(99,102,241,.14)}
.stay-flag-btn.dnd i{color:#e11d48}.stay-flag-btn.mur i{color:#10b981}.stay-flag-btn.clean i{color:#059669}.stay-flag-btn.away i{color:#f59e0b}.stay-flag-btn.none i{color:#2563eb}
.stay-flag-btn.clean.active{border-color:#059669;background:#ecfdf5;box-shadow:0 0 0 2px rgba(5,150,105,.14);color:#047857}
.reservation-kind-tag{display:inline-flex;align-items:center;justify-content:center;gap:5px;min-width:46px;height:24px;padding:0 9px;border-radius:8px;font-size:.72rem;font-weight:850;white-space:nowrap}
.reservation-kind-tag.individual{background:#eef2ff;color:#4338ca}
.reservation-kind-tag.group{background:#111827;color:#fff}
.action-btns{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.res-work-action{min-width:82px;justify-content:center}
#resTable tbody tr.res-click-row{cursor:pointer}
#resTable tbody tr.res-click-row:focus-visible{outline:2px solid var(--primary);outline-offset:-2px}
.m-res-card.res-click-card{cursor:pointer}
.m-res-card.res-click-card:focus-visible{outline:2px solid var(--primary);outline-offset:2px}
@media(max-width:1200px){
    #resTable th:nth-child(10),#resTable td:nth-child(10){width:372px}
    .res-actions-cell{min-width:360px}
    .stay-flag-btn{padding:0 6px}
    .res-work-action{min-width:74px}
}
@media(min-width:769px){
    .bottom-sheet,.bottom-sheet-overlay{display:none!important}
    .filter-bar{align-items:center;margin-bottom:14px}
    .filter-left .search-box{width:340px}
}
@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:wrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
    .period-select{min-width:128px}
    .reservation-sort-group{width:100%;margin-left:0;padding-left:0;border-left:0}
    .sort-btn{flex:1;justify-content:center}
    .ops-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;overflow:visible;padding-bottom:0}
    .ops-tab{width:100%;justify-content:center;padding:0 10px}
    .stay-flag-panel{align-items:flex-start;width:100%}
    .stay-flag-label{display:block}
    .stay-flag-buttons{justify-content:flex-start;flex-wrap:nowrap;overflow-x:auto;max-width:100%;padding-bottom:2px}
    .res-action-stack{align-items:flex-start;justify-content:flex-start;flex-direction:column}
    .action-btns{justify-content:flex-start}
    .res-actions-cell{min-width:0;text-align:left}
    .reservation-filter-bar{padding:12px;gap:10px}
    .pagination{width:100%;max-width:100%;overflow:hidden}
    .page-btns{width:100%;max-width:100%;flex-wrap:wrap;justify-content:center}
    .page-btn{width:34px;height:34px}
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-crm.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/privacy-audit.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
</head>
<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
    <header class="topbar"><h1 data-i18n-key="Booking List">예약 목록</h1></header>

    <div class="content">
        <div class="ops-tabs" id="reservationOpsTabs">
            <button class="ops-tab active" data-filter="all" onclick="setFilter(this,'all')"><i class="fa-solid fa-list"></i> <span class="ops-label">전체</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="checkin" onclick="setFilter(this,'checkin')"><i class="fa-solid fa-right-to-bracket"></i> <span class="ops-label">오늘 체크인</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="inhouse" onclick="setFilter(this,'inhouse')"><i class="fa-solid fa-bed"></i> <span class="ops-label">투숙 중</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="checkout" onclick="setFilter(this,'checkout')"><i class="fa-solid fa-right-from-bracket"></i> <span class="ops-label">체크아웃</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="completed" onclick="setFilter(this,'completed')"><i class="fa-solid fa-check-double"></i> <span class="ops-label">완료</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="cancelled" onclick="setFilter(this,'cancelled')"><i class="fa-solid fa-ban"></i> <span class="ops-label">취소/노쇼</span> <span class="ops-count">0</span></button>
        </div>
        <!-- FILTER & SEARCH BAR -->
        <div class="filter-bar reservation-filter-bar">
            <div class="filter-left">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="이름, 객실번호, 예약번호 검색..." oninput="filterTable()">
                </div>
                <select id="periodFilterSelect" class="period-select" onchange="setPeriodFilter(this.value)">
                    <option value="week">1주일</option>
                    <option value="today">오늘</option>
                    <option value="tomorrow">내일</option>
                    <option value="month">이번 달</option>
                    <option value="all">전체 기간</option>
                </select>
                <div class="reservation-sort-group" aria-label="예약 정렬">
                    <button type="button" class="sort-btn active" data-sort="recent" onclick="setReservationSort('recent')" aria-label="최근순 정렬"><i class="fa-solid fa-arrow-down-wide-short" aria-hidden="true"></i> <span class="sort-label">최근순</span></button>
                    <button type="button" class="sort-btn" data-sort="room" onclick="setReservationSort('room')" aria-label="호실 오름차순 정렬"><i class="fa-solid fa-arrow-up-1-9" aria-hidden="true"></i> <span class="sort-label">호실 오름</span></button>
                </div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all" onclick="setFilter(this,'all')">전체 <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="checkin" onclick="setFilter(this,'checkin')">오늘 체크인 <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="inhouse" onclick="setFilter(this,'inhouse')">재실 중 <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="checkout" onclick="setFilter(this,'checkout')">체크아웃 <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="cancelled" onclick="setFilter(this,'cancelled')">취소 <span class="chip-count">0</span></button>
                </div>
                <button class="m-filter-trigger" onclick="openResBS()">
                    <i class="fa-solid fa-filter"></i>
                    <span id="mResFilterLabel">전체</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="exportReservationsToCSV()"><i class="fa-solid fa-download"></i> 엑셀 다운로드</button>
                <button class="btn-primary-sm" onclick="openUnifiedResModal()"><i class="fa-solid fa-plus"></i> 신규 예약</button>
            </div>
        </div>

        <!-- RESERVATION TABLE (desktop) -->
        <div class="card desktop-only" style="margin-top:16px">
            <div class="card-body" style="padding:0">
                <div class="table-wrap">
                    <table id="resTable">
                        <thead>
                            <tr>
                                <th>객실 / 예약번호</th>
                                <th>고객 / 주의사항</th>
                                <th>유형</th>
                                <th>체크인</th>
                                <th>체크아웃</th>
                                <th>숙박</th>
                                <th data-i18n-key="Reservation Kind">구분</th>
                                <th>금액</th>
                                <th>상태</th>
                                <th>관리</th>
                            </tr>
                        </thead>
                        <tbody id="resBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- RESERVATION CARDS (mobile) -->
        <div class="mobile-cards mobile-only" id="resMobileCards">
            <!-- Generated by JS -->
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <span class="page-info" id="pageInfo">총 <b>0건</b> 중 0–0 표시</span>
            <div class="page-btns" id="pageBtns">
                <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet-overlay" id="resBsOverlay" onclick="closeResBS()"></div>
<div class="bottom-sheet" id="resBsPanel">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title" id="resBsTitle">예약 상태 필터</div>
    <div class="bottom-sheet-options">
        <button class="bs-option selected" onclick="selectResFilter(this,'all','전체')">
            <div class="bs-option-icon" style="background:var(--border2);color:var(--txt2)"><i class="fa-solid fa-list"></i></div>
            <span class="bs-option-label">전체</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkin','오늘 체크인')">
            <div class="bs-option-icon" style="background:rgba(16,185,129,.1);color:#059669"><i class="fa-solid fa-circle-check"></i></div>
            <span class="bs-option-label">오늘 체크인</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>

        <button class="bs-option" onclick="selectResFilter(this,'inhouse','투숙 중')">
            <div class="bs-option-icon" style="background:rgba(59,130,246,.1);color:#2563EB"><i class="fa-solid fa-right-to-bracket"></i></div>
            <span class="bs-option-label">재실 중</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkout','체크아웃')">
            <div class="bs-option-icon" style="background:rgba(139,92,246,.1);color:#7C3AED"><i class="fa-solid fa-right-from-bracket"></i></div>
            <span class="bs-option-label">체크아웃</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'cancelled','취소')">
            <div class="bs-option-icon" style="background:rgba(239,68,68,.1);color:#DC2626"><i class="fa-solid fa-ban"></i></div>
            <span class="bs-option-label">취소</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
    </div>
</div>

<script>
// ===== RESERVATION DATA =====

function reservationLang() {
    return (window.currentLang || localStorage.getItem('pms_lang') || document.getElementById('langSelect')?.value || currentLang || 'ko') === 'en' ? 'en' : 'ko';
}

function resText(key) {
    const lang = reservationLang();
    return reservationLabels[lang]?.[key] || reservationLabels.ko[key] || key;
}

function resMessage(key, params = {}) {
    let text = resText(key);
    Object.keys(params).forEach(name => {
        text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
    });
    return text;
}

function statusMeta(status) {
    const key = normalizeListStatus(status);
    const config = statusConfig[key] || statusConfig.confirmed;
    return { cls: config.cls, label: resText(`status.${key}`) };
}

function filterLabel(filter) {
    if (filter === 'checkin') {
        const en = reservationLang() === 'en';
        if (currentPeriodFilter === 'tomorrow') return en ? 'Tomorrow check-ins' : '내일 체크인';
        if (currentPeriodFilter === 'week') return en ? '7-day check-ins' : '1주일 체크인';
    }
    return resText(`filter.${filter}`);
}

function reservationKindMeta(res) {
    const key = (res?.groupId || res?.isGroupPlaceholder) ? 'group' : 'individual';
    return {
        key,
        cls: key,
        icon: key === 'group' ? 'fa-users' : 'fa-user',
        label: resText(`kind.${key}`)
    };
}

function reservationKindBadge(res) {
    const kind = reservationKindMeta(res);
    return `<span class="reservation-kind-tag ${escapeHtml(kind.cls)}"><i class="fa-solid ${escapeHtml(kind.icon)}"></i>${escapeHtml(kind.label)}</span>`;
}

function stayLabel(nights) {
    return reservationLang() === 'en' ? `${nights}${resText('stay.night')}` : `${nights}${resText('stay.night')}`;
}

function normalizeListStatus(status) {
    const key = String(status || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'checkedin';
    if (key === 'checkout') return 'checkout';
    if (['checkedout', 'departed', 'completed'].includes(key)) return 'completed';
    if (key === 'cancelled' || key === 'canceled' || key === 'noshow') return 'cancelled';
    if (key === 'blocked') return 'blocked';
    if (key === 'pending') return 'pending';
    return key || 'confirmed';
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function roomTypeDisplay(value) {
    const text = String(value || '').trim();
    return text || '-';
}

function tierDisplay(value) {
    const text = String(value || '').trim();
    return text;
}

function parseListDate(value) {
    if (!value) return null;
    const text = String(value).trim();
    const md = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (md) {
        const base = window.PmsDate?.today ? window.PmsDate.today() : new Date();
        const date = new Date(base.getFullYear(), Number(md[1]) - 1, Number(md[2]));
        date.setHours(0, 0, 0, 0);
        return date;
    }
    const date = new Date(text);
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function todayDate() {
    const today = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    today.setHours(0, 0, 0, 0);
    return today;
}

function addDays(date, days) {
    const next = new Date(date);
    next.setDate(next.getDate() + days);
    next.setHours(0, 0, 0, 0);
    return next;
}

function periodRange(filter) {
    if (filter === 'all') return null;
    const today = todayDate();
    if (filter === 'today') return { start: today, end: today };
    if (filter === 'tomorrow') {
        const tomorrow = addDays(today, 1);
        return { start: tomorrow, end: tomorrow };
    }
    if (filter === 'month') {
        return {
            start: new Date(today.getFullYear(), today.getMonth(), 1),
            end: new Date(today.getFullYear(), today.getMonth() + 1, 0)
        };
    }
    return { start: today, end: addDays(today, 6) };
}

function dateInRange(date, range) {
    return !!(date && range && date >= range.start && date <= range.end);
}

function sameDate(left, right) {
    return !!(left && right && left.getTime() === right.getTime());
}

function stayOverlapsRange(res, range) {
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    if (start && end) return start <= range.end && end >= range.start;
    return dateInRange(start || end, range);
}

function reservationFallbackDate(res) {
    return parseListDate(res?.createdAt || res?.createdDate || res?.updatedAt || res?.bookingDate || res?.date);
}

function normalizeRoomValue(value) {
    const text = String(value || '').trim().toLowerCase();
    const digits = (text.match(/\d+/g) || []).join('');
    return { text, digits, strippedDigits: digits.replace(/^0+(?=\d)/, '') };
}

function sameRoomValue(left, right) {
    const a = normalizeRoomValue(left);
    const b = normalizeRoomValue(right);
    if (!a.text || !b.text) return false;
    if (a.text === b.text) return true;
    return !!(a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits));
}

function roomMatchesReservation(room, res) {
    const roomValues = [room?.id, room?.fullRoom, room?.roomId, room?.number, room?.roomNo, room?.display, room?.displayName, room?.roomLabel];
    const resValues = [res?.room, res?.fullRoom, res?.roomId, res?.roomNo, res?.roomNumber, res?.roomLabel];
    return roomValues.some(roomValue => resValues.some(resValue => sameRoomValue(roomValue, resValue)));
}

function roomForReservation(res) {
    return rooms.find(room => roomMatchesReservation(room, res));
}

function isRoomInHouse(res) {
    const room = roomForReservation(res);
    return normalizeListStatus(room?.frontStatus || room?.status || room?.housekeepingStatus) === 'checkedin';
}

function checkoutDateIsDue(res, refDate = todayDate()) {
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    return !!end && end <= refDate;
}

function checkinDateIsDue(res, refDate = todayDate()) {
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    return !!start && start <= refDate;
}

function isCurrentStayWindow(res, refDate = todayDate()) {
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    return !!(start && end && start <= refDate && refDate < end);
}

function effectiveRowStatus(res, refDate = todayDate()) {
    let status = normalizeListStatus(res?.status);
    if (['confirmed', 'pending'].includes(status) && isRoomInHouse(res) && isCurrentStayWindow(res, refDate)) status = 'checkedin';
    if (status === 'checkedin' && checkoutDateIsDue(res, refDate)) return 'checkout';
    return status;
}

function guestForReservation(res) {
    const guestId = res?.guestId || res?.roomingGuestId;
    return guestMap.get(guestId) || guests.find(g => g.name && g.name === (res?.guestName || res?.guest || res?.roomingGuestName)) || null;
}

function reservationGuestName(res) {
    return res?.roomingGuestName || res?.guestName || res?.guest || '';
}

function displayGuestName(res) {
    if (normalizeListStatus(res?.status) === 'blocked' || res?.isGroupPlaceholder) {
        return res?.roomingGuestName || res?.guestName || res?.groupName || '단체 블록';
    }
    return reservationGuestName(res) || '-';
}

function reservationGuestNames(res) {
    const primary = reservationGuestName(res);
    const values = [
        primary,
        ...(Array.isArray(res?.roomingGuestNames) ? res.roomingGuestNames : []),
        ...(Array.isArray(res?.companionGuestNames) ? res.companionGuestNames : []),
        ...(Array.isArray(res?.companions) ? res.companions.map(item => typeof item === 'string' ? item : item?.name) : []),
        ...(Array.isArray(res?.roomingGuests) ? res.roomingGuests.map(item => typeof item === 'string' ? item : item?.name) : [])
    ];
    const seen = new Set();
    return values
        .map(name => String(name || '').trim())
        .filter(name => name && !seen.has(name) && seen.add(name));
}

function companionGuestNames(res) {
    const names = reservationGuestNames(res);
    const primary = reservationGuestName(res);
    return names.filter(name => name !== primary);
}

function normalizeReservationTime(value, fallback = '') {
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const match = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
    if (!match) return fallback;
    const hour = Number(match[1]);
    const minute = Number(match[2] || 0);
    if (!Number.isFinite(hour) || !Number.isFinite(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) return fallback;
    return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
}

function reservationCheckInTime(res) {
    return normalizeReservationTime(res?.checkInTime || res?.arrivalTime || res?.stayTimes?.checkInTime || res?.times?.checkIn, '14:00');
}

function reservationCheckOutTime(res) {
    return normalizeReservationTime(res?.checkOutTime || res?.departureTime || res?.stayTimes?.checkOutTime || res?.times?.checkOut, '12:00');
}

function reservationLateCheckoutEnabled(res) {
    return !!(res?.lateCheckout || res?.isLateCheckout || res?.stayTimes?.lateCheckout || res?.lateCheckoutTime || res?.extendedCheckOutTime);
}

function reservationLateCheckoutTime(res) {
    return normalizeReservationTime(res?.lateCheckoutTime || res?.extendedCheckOutTime || res?.stayTimes?.lateCheckoutTime, reservationCheckOutTime(res));
}

function lateCheckoutBadge(res) {
    if (!reservationLateCheckoutEnabled(res)) return '';
    return `<span class="late-checkout-pill"><i class="fa-solid fa-clock"></i>레이트 ${escapeHtml(reservationLateCheckoutTime(res))}</span>`;
}

function reservationDateTimeCell(res, kind) {
    const isIn = kind === 'in';
    const date = isIn ? (res.cin || (res.checkInDate || '').slice(5)) : (res.cout || (res.checkOutDate || '').slice(5));
    const time = isIn ? reservationCheckInTime(res) : reservationCheckOutTime(res);
    return `<div class="res-date-cell">
        <span>${escapeHtml(date || '-')}</span>
        <span class="res-time-meta"><i class="fa-regular fa-clock"></i>${isIn ? '입실' : '퇴실'} ${escapeHtml(time)}</span>
        ${!isIn ? lateCheckoutBadge(res) : ''}
    </div>`;
}

function reservationDateTimeLine(res) {
    const cin = res.cin || (res.checkInDate || '').slice(5) || '-';
    const cout = res.cout || (res.checkOutDate || '').slice(5) || '-';
    return `${escapeHtml(cin)} ${escapeHtml(reservationCheckInTime(res))} &rarr; ${escapeHtml(cout)} ${escapeHtml(reservationCheckOutTime(res))} ${lateCheckoutBadge(res)}`;
}

function reservationGuestStack(res, isVip = false) {
    const primary = displayGuestName(res);
    const companions = companionGuestNames(res);
    const vipIcon = isVip ? ' <i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.6rem"></i>' : '';
    return `<div class="res-guest-stack">
        <div class="res-guest-primary"><i class="fa-solid fa-user"></i><span>${escapeHtml(primary)}</span>${vipIcon}<span style="font-size:.72rem;color:#9CA3AF;margin-left:2px">${escapeHtml(tierDisplay(res.vip))}</span></div>
        ${companions.length ? `<div class="res-guest-companions" title="${escapeHtml(companions.join(', '))}">${companions.map(name => `<div class="res-guest-companion">${escapeHtml(name)}</div>`).join('')}</div>` : ''}
    </div>`;
}

function operationalNotes(res) {
    const guest = guestForReservation(res);
    const notes = [
        res?.specialNotes,
        res?.guestNote,
        res?.roomingGuestNote,
        guest?.specialNotes
    ].map(v => String(v || '').trim()).filter(Boolean);
    return [...new Set(notes)];
}

function documentStatus(res) {
    const guest = guestForReservation(res);
    return res?.docStatus || res?.documentStatus || guest?.documentStatus || guest?.docStatus || guest?.document?.status || '';
}

function documentBadge(res) {
    const guestName = displayGuestName(res);
    if ((res?.isGroupPlaceholder || normalizeListStatus(res?.status) === 'blocked') && (!guestName || guestName === res?.groupName)) {
        return `<span class="guest-alert empty"><i class="fa-solid fa-user-plus"></i>${resText('doc.unassigned')}</span>`;
    }
    const raw = String(documentStatus(res) || '').trim();
    const key = raw.toLowerCase();
    if (['verified', 'approved', 'confirmed', 'checked'].includes(key)) {
        return `<span class="guest-alert doc"><i class="fa-solid fa-id-card"></i>${resText('doc.verified')}</span>`;
    }
    if (['rejected', 'expired', 'invalid'].includes(key)) {
        return `<button type="button" class="guest-alert id-action" title="${resText('doc.actionTitle')}" onclick="verifyReservationDocument('${res.id}', event)"><i class="fa-solid fa-id-card"></i>${resText('doc.recheck')}</button>`;
    }
    if (!raw || ['pending', 'required', 'requested', 'unchecked'].includes(key)) {
        return `<button type="button" class="guest-alert id-action" title="${resText('doc.actionTitle')}" onclick="verifyReservationDocument('${res.id}', event)"><i class="fa-solid fa-id-card"></i>${resText('doc.check')}</button>`;
    }
    return `<span class="guest-alert doc"><i class="fa-solid fa-id-card"></i>${escapeHtml(raw)}</span>`;
}

function alertBadges(res) {
    const notes = operationalNotes(res);
    const noteHtml = notes.length
        ? notes.slice(0, 2).map(note => `<span class="guest-alert warn" title="${escapeHtml(note)}"><i class="fa-solid fa-triangle-exclamation"></i>${escapeHtml(note)}</span>`).join('')
        : `<span class="guest-alert empty"><i class="fa-regular fa-note-sticky"></i>${resText('note.empty')}</span>`;
    const docHtml = documentBadge(res);
    return `<div class="guest-alerts">${noteHtml}${docHtml}</div>`;
}

function formatMoney(res) {
    const currency = 'PHP';
    const amount = Number(res.amount || res.totalAmount?.amount || 0);
    return new Intl.NumberFormat('en-PH', {
        style: 'currency',
        currency,
        maximumFractionDigits: 2
    }).format(amount);
}

function prepaidAmount(res) {
    if (res?.paymentPlan && typeof res.paymentPlan === 'object') return Number(res.paymentPlan.prepaidAmount || 0);
    return Number(res?.prepaidAmount || res?.prepaid || 0);
}

function balanceDueAmount(res) {
    const total = Number(res?.amount || res?.totalAmount?.amount || 0);
    const explicit = Number(res?.balanceDue ?? res?.paymentPlan?.balanceDue);
    if (Number.isFinite(explicit) && explicit >= 0) return explicit;
    return Math.max(total - prepaidAmount(res), 0);
}

function moneyStack(res) {
    const prepaid = prepaidAmount(res);
    const balance = balanceDueAmount(res);
    return `<div class="res-money-stack">
        <div>${formatMoney(res)}</div>
        ${(prepaid || balance) ? `<div class="res-money-sub">선결제 ${formatMoney({ amount: prepaid })}<br>잔액 ${formatMoney({ amount: balance })}</div>` : ''}
    </div>`;
}

function reservationRoomChangeHistory(res) {
    const values = [
        ...(Array.isArray(res?.roomChangeHistory) ? res.roomChangeHistory : []),
        ...(Array.isArray(res?.roomMoveHistory) ? res.roomMoveHistory : [])
    ];
    const seen = new Set();
    return values.map(item => ({
        id: item.id || `${item.changedAt || item.createdAt || ''}-${item.fromRoom || item.fromFullRoom || ''}-${item.toRoom || item.toFullRoom || ''}`,
        fromRoom: item.fromRoom || item.fromRoomNo || item.fromFullRoom || '',
        toRoom: item.toRoom || item.toRoomNo || item.toFullRoom || '',
        changedAt: item.changedAt || item.createdAt || '',
        affectsSettlement: item.affectsSettlement !== false
    })).filter(item => {
        if (!item.fromRoom && !item.toRoom) return false;
        const key = item.id || `${item.changedAt}-${item.fromRoom}-${item.toRoom}`;
        if (seen.has(key)) return false;
        seen.add(key);
        return true;
    }).sort((a, b) => String(b.changedAt || '').localeCompare(String(a.changedAt || '')));
}

function roomChangeBadge(res, mobile = false) {
    const history = reservationRoomChangeHistory(res);
    if (!history.length) return '';
    const latest = history[0];
    const route = `${latest.fromRoom || '-'} -> ${latest.toRoom || '-'}`;
    const text = mobile ? `객실변경 ${route}` : `객실변경 ${history.length}`;
    return `<span class="res-room-change-chip" title="${escapeHtml(route)}"><i class="fa-solid fa-right-left"></i>${escapeHtml(text)}</span>`;
}

function roomChangeSearchText(res) {
    return reservationRoomChangeHistory(res).map(item => `${item.fromRoom || ''} ${item.toRoom || ''}`).join(' ');
}

function operationalBucket(res) {
    const status = effectiveRowStatus(res);
    if (status === 'cancelled') return 'cancelled';
    if (status === 'completed') return 'completed';
    if (status === 'checkout') return 'checkout';
    if (status === 'checkedin') return 'inhouse';
    if (['confirmed', 'pending'].includes(status) && checkinDateIsDue(res)) return 'checkin';
    return status;
}

function periodOperationalBucket(res) {
    const range = periodRange(currentPeriodFilter);
    if (!range) return operationalBucket(res);
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    const isDayRange = range.start && range.end && sameDate(range.start, range.end);
    const refDate = isDayRange ? range.start : todayDate();
    const status = effectiveRowStatus(res, refDate);
    if (status === 'cancelled') return 'cancelled';
    if (status === 'completed') return 'completed';
    if (status === 'checkout') return 'checkout';
    if (isDayRange) {
        const day = range.start;
        if (status === 'checkedin' && end && sameDate(end, day)) return 'checkout';
        if (status === 'checkedin' && isCurrentStayWindow(res, day)) return 'inhouse';
        if (start && sameDate(start, day)) return 'checkin';
        if (end && sameDate(end, day)) return 'checkout';
        if (start && end && start < day && day < end) {
            return status === 'checkedin' ? 'inhouse' : 'confirmed';
        }
        return status;
    }
    if (status === 'checkedin' && isCurrentStayWindow(res)) return 'inhouse';
    if (start && dateInRange(start, range)) return 'checkin';
    if (end && dateInRange(end, range) && ['checkedin', 'checkout'].includes(status)) return 'checkout';
    if (isCurrentStayWindow(res)) return 'inhouse';
    return status;
}

function canCancelReservationRow(res) {
    const status = effectiveRowStatus(res);
    return !['checkedin', 'checkout', 'completed', 'cancelled'].includes(status);
}

function cancelActionButton(res, mobile = false) {
    if (!canCancelReservationRow(res)) {
        return mobile
            ? `<button class="act-btn danger" disabled title="${resText('action.cancelDisabledTitle')}" style="opacity:.45;cursor:not-allowed"><i class="fa-solid fa-lock"></i> ${resText('action.cancelDisabled')}</button>`
            : `<button class="act-btn danger" disabled title="${resText('action.cancelDisabledTitle')}" style="opacity:.45;cursor:not-allowed"><i class="fa-solid fa-lock"></i></button>`;
    }
    return mobile
        ? `<button class="act-btn danger" onclick="window.cancelResAction('${res.id}')"><i class="fa-solid fa-xmark"></i> ${resText('action.cancel')}</button>`
        : `<button class="act-btn danger" title="${resText('action.cancel')}" onclick="window.cancelResAction('${res.id}')"><i class="fa-solid fa-xmark"></i></button>`;
}

let currentFilter = 'all';
let currentPeriodFilter = 'week';
let currentPage = 1;
let currentSort = 'recent';
let currentSortDirection = 'desc';
const itemsPerPage = 10;

function reservationNumericId(res) {
    const text = String(res?.id || res?.reservationId || '');
    const nums = text.match(/\d+/g);
    return nums ? Number(nums.join('').slice(-10)) : 0;
}

function reservationRecentValue(res) {
    const dateValue = res?.createdAt || res?.createdDate || res?.updatedAt || res?.bookingDate || res?.date || '';
    const parsed = Date.parse(dateValue);
    if (!Number.isNaN(parsed)) return parsed;
    return -(Number(res?._listOrder || 0));
}

function roomSortKey(res) {
    const room = String(res?.roomNo || res?.room || res?.roomId || res?.fullRoom || '').toUpperCase();
    const prefix = room.startsWith('PH') ? 0 : room.startsWith('V') ? 2 : 1;
    const nums = room.match(/\d+/g);
    const number = nums ? Number(nums.join('')) : 99999;
    return { prefix, number, room };
}

function compareReservations(left, right) {
    let result;
    if (currentSort === 'room') {
        const a = roomSortKey(left);
        const b = roomSortKey(right);
        if (a.prefix !== b.prefix) result = a.prefix - b.prefix;
        else if (a.number !== b.number) result = a.number - b.number;
        else result = a.room.localeCompare(b.room);
    } else {
        result = reservationRecentValue(left) - reservationRecentValue(right);
        if (!result) result = reservationNumericId(left) - reservationNumericId(right);
    }
    return currentSortDirection === 'asc' ? result : -result;
}

function defaultSortDirection(mode) {
    return mode === 'room' ? 'asc' : 'desc';
}

function sortButtonMeta(mode, direction) {
    const en = reservationLang() === 'en';
    const labels = {
        recent: {
            asc: { label: en ? 'Oldest' : '오래된순', icon: 'fa-arrow-up-wide-short', title: en ? 'Sort by oldest booking first' : '오래된 예약부터 정렬' },
            desc: { label: en ? 'Newest' : '최근순', icon: 'fa-arrow-down-wide-short', title: en ? 'Sort by newest booking first' : '최근 예약부터 정렬' }
        },
        room: {
            asc: { label: en ? 'Room asc' : '호실 오름', icon: 'fa-arrow-up-1-9', title: en ? 'Sort rooms ascending' : '호실 오름차순 정렬' },
            desc: { label: en ? 'Room desc' : '호실 내림', icon: 'fa-arrow-down-9-1', title: en ? 'Sort rooms descending' : '호실 내림차순 정렬' }
        }
    };
    return labels[mode]?.[direction] || labels.recent.desc;
}

function updateSortButtons() {
    document.querySelectorAll('.sort-btn').forEach(btn => {
        const mode = btn.dataset.sort === 'room' ? 'room' : 'recent';
        const active = mode === currentSort;
        const direction = active ? currentSortDirection : defaultSortDirection(mode);
        const meta = sortButtonMeta(mode, direction);
        btn.classList.toggle('active', active);
        btn.dataset.direction = direction;
        btn.setAttribute('aria-label', meta.title);
        btn.setAttribute('title', meta.title);
        const icon = btn.querySelector('i');
        if (icon) icon.className = `fa-solid ${meta.icon}`;
        const label = btn.querySelector('.sort-label');
        if (label) label.textContent = meta.label;
    });
}

function setReservationSort(mode) {
    const nextSort = mode === 'room' ? 'room' : 'recent';
    if (currentSort === nextSort) {
        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
    } else {
        currentSort = nextSort;
        currentSortDirection = defaultSortDirection(nextSort);
    }
    updateSortButtons();
    currentPage = 1;
    renderTable();
}

function setPeriodFilter(filter) {
    currentPeriodFilter = filter || 'week';
    currentPage = 1;
    updateChipCounts();
    renderTable();
}

function rowMatchesFilter(res) {
    if (currentFilter === 'all') return true;
    if (['checkin', 'inhouse', 'checkout', 'completed', 'cancelled'].includes(currentFilter)) {
        return periodOperationalBucket(res) === currentFilter;
    }
    return effectiveRowStatus(res) === currentFilter;
}

function rowMatchesPeriod(res) {
    const range = periodRange(currentPeriodFilter);
    if (!range) return true;
    if (stayOverlapsRange(res, range)) return true;
    const fallback = reservationFallbackDate(res);
    return fallback ? dateInRange(fallback, range) : false;
}

function workActionButton(res, mobile = false) {
    const status = effectiveRowStatus(res);
    const bucket = operationalBucket(res);
    if ((res.isGroupPlaceholder || status === 'blocked') && res.groupId) {
        return `<button class="res-work-action group" onclick="location.href='groups_block_detail.html?id=${encodeURIComponent(res.groupId)}&tab=rooms'"><i class="fa-solid fa-users"></i>${resText('action.group')}</button>`;
    }
    if (bucket === 'checkin') {
        return `<button class="res-work-action checkin" onclick="processReservationRowFlow('${res.id}','checkin')"><i class="fa-solid fa-right-to-bracket"></i>${resText('action.checkin')}</button>`;
    }
    if (status === 'checkedin' || status === 'checkout') {
        return `<button class="res-work-action checkout" onclick="processReservationRowFlow('${res.id}','checkout')"><i class="fa-solid fa-right-from-bracket"></i>${resText('action.checkout')}</button>`;
    }
    return '';
}

function stayoverFlagControls(res) {
    const status = effectiveRowStatus(res);
    if (!['checkedin', 'checkout'].includes(status)) return '';
    const room = roomForReservation(res);
    if (!room) return '';
    const flag = room.guestFlag || res.guestFlag || 'none';
    const roomKey = room.roomId || room.fullRoom || room.id || res.room;
    const cleaningState = normalizedRoomOpsValue(room.housekeepingStatus || room.hkStatus || room.cleaningStatus);
    const isCleanRequested = flag === 'mur' || ['dirty', 'vacantdirty', 'pendingclean', 'needscleaning', 'inspect', 'needsinspection'].includes(cleaningState);
    const isCleanComplete = ['clean', 'vacantclean', 'completed', 'complete', 'done', 'ready'].includes(cleaningState);
    const options = [
        { key: 'dnd', label: resText('flag.dnd'), icon: 'fa-circle', cls: 'dnd', active: flag === 'dnd', action: `setReservationStayoverFlag('${res.id}','dnd','${escapeHtml(roomKey)}')` },
        { key: 'mur', label: resText('flag.mur'), icon: 'fa-circle', cls: 'mur', active: isCleanRequested, action: `setReservationCleaningStatus('${res.id}','request','${escapeHtml(roomKey)}')` },
        { key: 'clean', label: resText('flag.clean'), icon: 'fa-check', cls: 'clean', active: isCleanComplete, action: `setReservationCleaningStatus('${res.id}','complete','${escapeHtml(roomKey)}')` },
        { key: 'away', label: resText('flag.away'), icon: 'fa-person-walking', cls: 'away', active: flag === 'away', action: `setReservationStayoverFlag('${res.id}','away','${escapeHtml(roomKey)}')` },
        { key: 'none', label: resText('flag.none'), icon: 'fa-bed', cls: 'none', active: flag === 'none' && !isCleanRequested, action: `setReservationStayoverFlag('${res.id}','none','${escapeHtml(roomKey)}')` }
    ];
    return `<div class="stay-flag-panel">
        <div class="stay-flag-label">${resText('flag.title')}</div>
        <div class="stay-flag-buttons">
            ${options.map(opt => `<button type="button" class="stay-flag-btn ${opt.cls} ${opt.active ? 'active' : ''}" title="${opt.label}" onclick="${opt.action}"><i class="fa-solid ${opt.icon}"></i>${opt.label}</button>`).join('')}
        </div>
    </div>`;
}

function isReservationInlineAction(target, container) {
    if (!target || !container) return false;
    const interactive = target.closest('button,a,input,select,textarea,label,summary,[contenteditable="true"]');
    return !!(interactive && container.contains(interactive) && interactive !== container);
}

function openReservationRow(event, resId) {
    if (isReservationInlineAction(event.target, event.currentTarget)) return;
    if (typeof window.openUnifiedResModal === 'function' && resId) {
        window.openUnifiedResModal(resId);
    }
}

function handleReservationRowKey(event) {
    if (event.key !== 'Enter' && event.key !== ' ') return;
    if (isReservationInlineAction(event.target, event.currentTarget)) return;
    event.preventDefault();
    openReservationRow(event, event.currentTarget.dataset.resId);
}

function reservationEmptyState() {
    const isEn = (document.getElementById('langSelect')?.value || window.currentLang || localStorage.getItem('pms_lang')) === 'en';
    const hasSearch = !!document.getElementById('searchInput')?.value.trim();
    const labels = isEn
        ? { all: 'reservations', checkin: "today's check-ins", inhouse: 'in-house stays', checkout: 'check-outs', completed: 'completed reservations', cancelled: 'cancelled/no-show reservations' }
        : { all: '예약', checkin: '오늘 체크인 대상', inhouse: '투숙 중 예약', checkout: '체크아웃 대상', completed: '완료 예약', cancelled: '취소/노쇼 예약' };
    const target = labels[currentFilter] || labels.all;
    const title = isEn ? `No ${target} to display.` : `표시할 ${target}이 없습니다.`;
    const desc = hasSearch
        ? (isEn ? 'No results match the current search and filter.' : '현재 검색어와 필터 조건에 맞는 예약이 없습니다.')
        : (isEn ? 'When matching bookings are created, they will appear here.' : '조건에 맞는 예약이 생성되면 이 영역에 표시됩니다.');
    return (typeof window.renderEmptyState === 'function')
        ? window.renderEmptyState({ icon: 'fa-calendar-xmark', title, desc })
        : `<div style="padding:32px;text-align:center;color:var(--txt3)">${title}<br>${desc}</div>`;
}

function renderTable() {
    const tbody = document.getElementById('resBody');
    const mobileContainer = document.getElementById('resMobileCards');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = reservations.filter(r => {
        if (!rowMatchesFilter(r)) return false;
        if (!rowMatchesPeriod(r)) return false;
        const haystack = [
            r.id,
            r.room,
            r.roomLabel,
            r.type,
            reservationKindMeta(r).label,
            r.groupName,
            displayGuestName(r),
            companionGuestNames(r).join(' '),
            reservationCheckInTime(r),
            reservationCheckOutTime(r),
            reservationLateCheckoutEnabled(r) ? `레이트 체크아웃 ${reservationLateCheckoutTime(r)}` : '',
            operationalNotes(r).join(' '),
            roomChangeSearchText(r)
        ].join(' ').toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return true;
    }).sort(compareReservations);

    const totalItems = filtered.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;

    const startIdx = (currentPage - 1) * itemsPerPage;
    const paginated = filtered.slice(startIdx, startIdx + itemsPerPage);

    updatePagination(totalItems, startIdx, paginated.length, totalPages);

    if (paginated.length === 0) {
        const emptyState = reservationEmptyState();
        tbody.innerHTML = `<tr><td colspan="10">${emptyState}</td></tr>`;
        mobileContainer.innerHTML = emptyState;
        return;
    }

    // Desktop table
    tbody.innerHTML = paginated.map(r => {
        const status = effectiveRowStatus(r);
        const st = statusMeta(status);
        const isVip = String(r.vip || '').includes('VIP') || String(r.vip || '').includes('Gold') || r.isVip;
        const displayGuest = displayGuestName(r);
        return `
        <tr class="res-click-row" tabindex="0" data-res-id="${escapeHtml(r.id)}" onclick="openReservationRow(event, this.dataset.resId)" onkeydown="handleReservationRowKey(event)">
            <td class="res-room-cell"><div class="res-room-booking"><span class="reservation-room-tag"><i class="fa-solid fa-door-open"></i>${escapeHtml(r.room)}</span>${roomChangeBadge(r)}<span class="res-id">${r.id}</span></div></td>
            <td>
                <div class="guest-cell">
                    <div>
                        ${reservationGuestStack(r, isVip)}
                        <div class="res-submeta">${escapeHtml(r.groupName || r.companyName || '')}</div>
                        ${alertBadges(r)}
                    </div>
                </div>
            </td>
            <td>${escapeHtml(roomTypeDisplay(r.type))}</td>
            <td>${reservationDateTimeCell(r, 'in')}</td>
            <td>${reservationDateTimeCell(r, 'out')}</td>
            <td>${stayLabel(r.nights)}</td>
            <td>${reservationKindBadge(r)}</td>
            <td>${moneyStack(r)}</td>
            <td><span class="status-badge ${st.cls}">${st.label}</span></td>
            <td class="res-actions-cell">
                <div class="res-action-stack">
                    ${stayoverFlagControls(r)}
                    <div class="action-btns">
                    ${workActionButton(r)}
                    <button class="act-btn" title="${resText('action.manage')}" onclick="window.openUnifiedResModal('${r.id}')"><i class="fa-solid fa-gear"></i></button>
                    ${cancelActionButton(r)}
                    </div>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Mobile cards
    mobileContainer.innerHTML = paginated.map(r => {
        const status = effectiveRowStatus(r);
        const st = statusMeta(status);
        const isVip = String(r.vip || '').includes('VIP') || String(r.vip || '').includes('Gold') || r.isVip;
        const displayGuest = displayGuestName(r);
        return `
        <div class="m-res-card res-click-card" tabindex="0" role="button" data-res-id="${escapeHtml(r.id)}" onclick="openReservationRow(event, this.dataset.resId)" onkeydown="handleReservationRowKey(event)">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div>
                        <div class="m-res-name">${reservationGuestStack(r, isVip)}</div>
                        <div class="m-res-sub">${escapeHtml(tierDisplay(r.vip) || r.groupName || '')}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span class="status-badge ${st.cls}">${st.label}</span>
                    <div class="m-res-amount">${moneyStack(r)}</div>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail"><i class="fa-solid fa-door-open"></i> <span class="room-tag">${escapeHtml(r.room)}</span> ${escapeHtml(roomTypeDisplay(r.type))}</div>
                ${roomChangeBadge(r, true) ? `<div class="m-res-detail">${roomChangeBadge(r, true)}</div>` : ''}
                <div class="m-res-detail"><i class="fa-solid fa-calendar"></i> ${reservationDateTimeLine(r)} (${stayLabel(r.nights)})</div>
                <div class="m-res-detail"><i class="fa-solid fa-user-tag"></i> ${reservationKindBadge(r)}</div>

                ${cancelActionButton(r, true)}

function updatePagination(totalItems, startIdx, currentCount, totalPages) {
    const pageInfo = document.getElementById('pageInfo');
    const pageBtns = document.getElementById('pageBtns');
    
    if (totalItems === 0) {
        pageInfo.innerHTML = resText('page.empty');
        pageBtns.innerHTML = `
            <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
        `;
        return;
    }

    pageInfo.innerHTML = reservationLang() === 'en'
        ? `Showing ${startIdx + 1}–${startIdx + currentCount} of <b>${totalItems}</b>`
        : `총 <b>${totalItems}건</b> 중 ${startIdx + 1}–${startIdx + currentCount} 표시`;
    
    let btnsHtml = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="fa-solid fa-chevron-left"></i></button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        btnsHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    
    btnsHtml += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="fa-solid fa-chevron-right"></i></button>`;
    
    pageBtns.innerHTML = btnsHtml;
}

function changePage(page) {
    currentPage = page;
    renderTable();
}

function refreshReservationLabels() {
    updateSortButtons();
    document.querySelectorAll('.ops-tab').forEach(tab => {
        const filter = tab.getAttribute('data-filter');
        const label = tab.querySelector('.ops-label');
        if (label) label.textContent = filterLabel(filter);
    });
    document.querySelectorAll('.bs-option').forEach(option => {
        const click = option.getAttribute('onclick') || '';
        const filter = ['all', 'checkin', 'inhouse', 'checkout', 'completed', 'cancelled'].find(key => click.includes(`'${key}'`));
        const label = option.querySelector('.bs-option-label');
        if (filter && label) label.textContent = filterLabel(filter);
    });
    const mobileLabel = document.getElementById('mResFilterLabel');
    if (mobileLabel) mobileLabel.textContent = filterLabel(currentFilter);
    const sheetTitle = document.getElementById('resBsTitle');
    if (sheetTitle) sheetTitle.textContent = resText('filter.title');
}

function setFilter(btn, filter) {
    currentFilter = filter;
    currentPage = 1;
    document.querySelectorAll('.filter-chips .chip, .ops-tab').forEach(c => c.classList.toggle('active', c.getAttribute('data-filter') === filter));
    if (btn) btn.classList.add('active');
    const mobileLabel = document.getElementById('mResFilterLabel');
    if (mobileLabel) mobileLabel.textContent = filterLabel(filter) || filter;
    renderTable();
}

function updateChipCounts() {
    const periodReservations = reservations.filter(rowMatchesPeriod);
    const counts = { all: periodReservations.length, checkin: 0, inhouse: 0, checkout: 0, completed: 0, cancelled: 0 };
    periodReservations.forEach(r => { const bucket = periodOperationalBucket(r); if (counts[bucket] !== undefined) counts[bucket]++; });
    
    document.querySelectorAll('.chip, .ops-tab').forEach(c => {
        const f = c.getAttribute('data-filter');
        const label = c.querySelector('.ops-label');
        if (label && f) label.textContent = filterLabel(f);
        const span = c.querySelector('.chip-count, .ops-count');
        if(span && counts[f] !== undefined) span.textContent = counts[f];
    });
    
    document.querySelectorAll('.bs-option').forEach(btn => {
        const span = btn.querySelector('.bs-option-count');
        const onClickStr = btn.getAttribute('onclick');
        for (let key in counts) {
            if (onClickStr && onClickStr.includes(`'${key}'`) && span) {
                span.textContent = counts[key];
            }
        }
    });
}

function filterTable() { 
    currentPage = 1;
    renderTable(); 
}

async function persistDocumentVerification(res, guest) {
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    if (guests.length) localStorage.setItem('pms_guests', JSON.stringify(guests));
    try {
        if (window.PmsMockApi && res?.id) {
            await window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res });
        }
        if (window.PmsMockApi && guest?.id) {
            await window.PmsMockApi.request('PATCH', '/crm/guests', { body: guest });
        }
    } catch(e) {
        console.warn('Document verification save failed', e);
    }
}

window.verifyReservationDocument = async function(resId, evt = null) {
    evt?.preventDefault?.();
    evt?.stopPropagation?.();
    const res = reservations.find(item => item.id === resId);
    if (!res) return;
    const guest = guestForReservation(res);
    const name = displayGuestName(res);
    const message = resMessage('confirm.docVerify', { name });
    const confirmed = window.showConfirm
        ? await window.showConfirm(message)
        : confirm(message);
    if (!confirmed) return;
    res.docStatus = 'verified';
    res.documentStatus = 'verified';
    if (guest) {
        guest.docStatus = 'verified';
        guest.documentStatus = 'verified';
        guest.document = { ...(guest.document || {}), status: 'verified', verifiedAt: new Date().toISOString() };
    }
    await persistDocumentVerification(res, guest);
    renderTable();
    if (window.showToast) window.showToast(resText('toast.docVerified'), 'success');
};

window.setReservationStayoverFlag = async function(resId, flag, roomKey = '') {
    const res = reservations.find(item => item.id === resId);
    const room = roomForReservation(res) || rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey));
    if (!room) {
        if (window.showToast) window.showToast(resText('toast.roomMissing'), 'error');
        return;
    }
    room.guestFlag = flag;
    if (res) res.guestFlag = flag;
    localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    try {
        if (window.PmsAPI?.setGuestFlag) {
            await window.PmsAPI.setGuestFlag(room.roomId || room.fullRoom || room.id, flag);
        } else if (window.PmsMockApi) {
            await window.PmsMockApi.request('PATCH', `/rooms/${encodeURIComponent(room.roomId || room.fullRoom || room.id)}/guest-flag`, { body: { flag } });
        }
    } catch(e) {
        console.warn('Guest flag save failed', e);
    }
    const labels = {
        dnd: resText('flag.dnd'),
        mur: resText('flag.mur'),
        away: resText('flag.away'),
        none: resText('flag.none')
    };
    renderTable();
    if (window.showToast) window.showToast(resMessage('toast.flagSaved', {
        room: room.id || room.number || roomKey,
        flag: labels[flag] || flag
    }), 'success');
};

window.setReservationCleaningStatus = async function(resId, mode, roomKey = '') {
    const res = reservations.find(item => item.id === resId);
    const room = roomForReservation(res) || rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey));
    if (!room) {
        if (window.showToast) window.showToast(resText('toast.roomMissing'), 'error');
        return;
    }
    const roomId = room.roomId || room.fullRoom || room.id || roomKey || res?.room;
    const roomLabel = room.id || room.number || room.roomNo || roomKey || res?.room || '-';
    const isComplete = mode === 'complete';
    room.housekeepingStatus = isComplete ? 'clean' : 'dirty';
    room.cleaningStatus = isComplete ? 'clean' : 'dirty';
    room.guestFlag = isComplete ? 'none' : 'mur';
    if (res) res.guestFlag = room.guestFlag;

    await persistReservationAndRoom(res, room);
    try {
        if (window.PmsAPI?.setGuestFlag) {
            await window.PmsAPI.setGuestFlag(roomId, room.guestFlag);
        } else if (window.PmsMockApi) {
            await window.PmsMockApi.request('PATCH', `/rooms/${encodeURIComponent(roomId)}/guest-flag`, { body: { flag: room.guestFlag } });
        }
    } catch(e) {
        console.warn('Cleaning guest flag save failed', e);
    }
    await syncHousekeepingForReservation(room, isComplete ? 'clean' : 'stayover-dirty', res);

    renderTable();
    if (window.showToast) {
        window.showToast(resMessage(isComplete ? 'toast.cleanCompleteSaved' : 'toast.cleanRequestSaved', { room: roomLabel }), 'success');
    }
};

async function persistReservationAndRoom(res, room) {
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    if (rooms.length) localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    try {
        if (window.PmsMockApi && res?.id) {
            await window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res });
        }
        if (window.PmsMockApi && room) {
            await window.PmsMockApi.request('PATCH', `/rooms/${encodeURIComponent(room.roomId || room.fullRoom || room.id)}`, { body: room });
        }
    } catch(e) {
        console.warn('Mock reservation status update failed', e);
    }
}

async function syncHousekeepingForReservation(room, status, res) {
    if (!room || !window.PmsAPI?.syncRoomStatusToTask) return;
    const roomId = room.roomId || room.fullRoom || room.id || res?.room;
    try {
        await window.PmsAPI.syncRoomStatusToTask(roomId, status, {
            reservationId: res?.id,
            guestName: displayGuestName(res),
            type: status === 'stayover-dirty' ? 'stayover' : undefined,
            source: 'frontdesk'
        });
    } catch(e) {
        console.warn('Housekeeping sync failed', e);
    }
}

function normalizedRoomOpsValue(value) {
    return String(value || '').replace(/[-_\s]/g, '').toLowerCase();
}

function roomOpsStatuses(room) {
    return [room?.frontStatus, room?.status, room?.housekeepingStatus]
        .map(normalizedRoomOpsValue)
        .filter(Boolean);
}

function checkinBlockReasonForRoom(room) {
    if (!room) return resText('block.noRoom');
    const statuses = roomOpsStatuses(room);
    if (statuses.some(status => ['oos', 'outofservice', 'outoforder', 'maintenance'].includes(status))) return resText('block.maintenanceRoom');
    if (statuses.some(status => ['occupied', 'inhouse', 'checkedin'].includes(status))) return resText('block.occupiedRoom');
    return '';
}

function checkinWarningForRoom(room) {
    const statuses = roomOpsStatuses(room);
    return statuses.some(status => ['dirty', 'vacantdirty', 'needscleaning'].includes(status))
        ? resText('warn.dirtyRoom')
        : '';
}

window.processReservationRowFlow = async function(resId, action) {
    const res = reservations.find(item => item.id === resId);
    if (!res) return;
    const status = effectiveRowStatus(res);
    if (action === 'checkin' && (!['confirmed', 'pending'].includes(status) || !checkinDateIsDue(res))) {
        if (window.showToast) window.showToast(resText('toast.checkinNotAllowed'), 'error');
        return;
    }
    if (action === 'checkout' && !['checkedin', 'checkout'].includes(status)) {
        if (window.showToast) window.showToast(resText('toast.checkoutNotAllowed'), 'error');
        return;
    }

    const room = roomForReservation(res);
    let checkinWarning = '';
    if (action === 'checkin') {
        const blockReason = checkinBlockReasonForRoom(room);
        if (blockReason) {
            if (window.showToast) window.showToast(blockReason, 'error');
            return;
        }
        checkinWarning = checkinWarningForRoom(room);
    }

    const label = action === 'checkin' ? resText('action.checkin') : resText('action.checkout');
    const name = displayGuestName(res);
    let message = resMessage('confirm.flow', { name, action: label });
    const confirmOptions = {};
    if (checkinWarning) {
        message = `${checkinWarning}\n\n${message}`;
        confirmOptions.title = resText('warn.dirtyRoomTitle');
        confirmOptions.okText = resText('action.continueCheckin');
    }
    const confirmed = window.showConfirm
        ? await window.showConfirm(message, confirmOptions)
        : confirm(message);
    if (!confirmed) return;

    if (action === 'checkin') {
        res.status = 'checkedin';
        if (room) {
            room.status = 'occupied';
            room.frontStatus = 'in-house';
            room.housekeepingStatus = checkinWarning ? 'dirty' : 'occupied';
            room.guest = name;
        }
    } else {
        res.status = 'completed';
        if (room) {
            room.status = 'vacant-dirty';
            room.frontStatus = 'vacant';
            room.housekeepingStatus = 'dirty';
            room.guest = '';
        }
    }

    await persistReservationAndRoom(res, room);
    if (action === 'checkout') await syncHousekeepingForReservation(room, 'vacant-dirty', res);
    updateChipCounts();
    renderTable();
    if (window.showToast) {
        const toastKey = checkinWarning ? 'toast.flowCompleteRoomNotReady' : 'toast.flowComplete';
        window.showToast(resMessage(toastKey, { action: label }), 'success');
    }
};

function exportReservationsToCSV() {
    if (!reservations || reservations.length === 0) {
        if(window.showToast) window.showToast(resText('toast.noData'));
        return;
    }
    if (window.PmsPrivacyAudit) {
        window.PmsPrivacyAudit.log('reservation.export.download', {
            screen: 'reservation-list',
            exportType: 'csv',
            filters: {
                status: currentFilter,
                sort: currentSort,
                queryApplied: !!document.getElementById('searchInput')?.value.trim()
            },
            fields: ['reservationId', 'guestName', 'room', 'stayDates', 'operationalNotes']
        });
    }
    const headers = ['예약번호', '고객', '객실', '유형', '체크인', '체크아웃', '숙박', '구분', '금액', '상태', '메모'];
    const rows = reservations.map(r => [
        r.id, 
        '"' + displayGuestName(r) + '"', 
        r.room, 
        roomTypeDisplay(r.type),
        r.cin, 
        r.cout, 
        r.nights, 
        reservationKindMeta(r).label,
        formatMoney(r), 
        statusMeta(effectiveRowStatus(r)).label,
        '"' + operationalNotes(r).join(' / ') + '"'
    ]);
    const csvContent = [headers.join(',')].concat(rows.map(e => e.join(','))).join('\n');
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', 'reservations.csv');
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function setupI18n(){
    const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);
    let node; const textNodes=[];
    while(node=walk.nextNode()){
        const orig=node.nodeValue,text=orig.trim();
        if(text&&translations.ko[text]&&!node.parentNode.hasAttribute('data-i18n-key')){
            const span=document.createElement('span');
            span.setAttribute('data-i18n-key',text);span.textContent=text;
            textNodes.push({node,span,originalText:orig});
        }
    }
    textNodes.forEach(({node,span,originalText})=>{
        const frag=document.createDocumentFragment();
        const ls=originalText.match(/^\s+/),ts=originalText.match(/\s+$/);
        if(ls)frag.appendChild(document.createTextNode(ls[0]));
        frag.appendChild(span);
        if(ts)frag.appendChild(document.createTextNode(ts[0]));
        node.parentNode.replaceChild(frag,node);
    });
}
function changeLang(lang){currentLang=lang;window.currentLang=lang;localStorage.setItem('pms_lang', lang);
    const dict = Object.assign({}, window.translations ? window.translations[lang] : {}, translations[lang] || translations.ko);
    document.querySelectorAll('[data-i18n-key]').forEach(el=>{
        const key=el.getAttribute('data-i18n-key');
        if(dict[key])el.textContent=dict[key];
    });
    document.getElementById('searchInput').placeholder = lang==='en' ? 'Search by name, room, booking #...' : '이름, Room번호, Booking # 검색...';
    refreshReservationLabels();
    if (document.getElementById('resBody')) {
        updateChipCounts();
        renderTable();
    }
}

            window.PmsAPI.getAllRooms ? window.PmsAPI.getAllRooms().catch(() => []) : [],

    if (requestedTab && document.querySelector(`[data-filter="${requestedTab}"]`)) {

        const searchInput = document.getElementById('searchInput');

    updateChipCounts();
    renderTable();
});
