<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 목록 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-count{font-size:.7rem;background:var(--border2);border-radius:10px;padding:2px 8px;color:var(--txt2);font-weight:600}
.bs-option.selected .bs-option-count{background:rgba(99,102,241,.12);color:var(--primary)}
@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-chips{display:none!important}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:nowrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
}
</style>
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
</head>
<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1 data-i18n-key="Booking List">예약 목록</h1>
            <span class="date-badge"><i class="fa-regular fa-calendar"></i> 2026년 5월 12일 (월)</span>
        </div>
        <div class="topbar-right">
            <select class="hotel-select">
                <option>🏨 The Grand Saigon</option>
                <option>🏨 Azure Bangkok</option>
                <option>🏨 Pearl Phnom Penh</option>
            </select>
            <select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="margin-left:8px; width:110px">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="content">
        <!-- FILTER & SEARCH BAR -->
        <div class="filter-bar">
            <div class="filter-left">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="이름, 객실번호, 예약번호 검색..." oninput="filterTable()">
                </div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all" onclick="setFilter(this,'all')">All <span class="chip-count">24</span></button>
                    <button class="chip" data-filter="confirmed" onclick="setFilter(this,'confirmed')">Confirmed <span class="chip-count">14</span></button>
                    <button class="chip" data-filter="pending" onclick="setFilter(this,'pending')">Pending <span class="chip-count">4</span></button>
                    <button class="chip" data-filter="checkedin" onclick="setFilter(this,'checkedin')">Check-in <span class="chip-count">3</span></button>
                    <button class="chip" data-filter="checkout" onclick="setFilter(this,'checkout')">Check-out <span class="chip-count">2</span></button>
                    <button class="chip" data-filter="cancelled" onclick="setFilter(this,'cancelled')">Cancel <span class="chip-count">1</span></button>
                </div>
                <button class="m-filter-trigger" onclick="openResBS()">
                    <i class="fa-solid fa-filter"></i>
                    <span id="mResFilterLabel">All</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <button class="btn-outline"><i class="fa-solid fa-download"></i> Export</button>
                <button class="btn-primary-sm" onclick="openModal('newResModal')"><i class="fa-solid fa-plus"></i> New Booking</button>
            </div>
        </div>

        <!-- RESERVATION TABLE (desktop) -->
        <div class="card desktop-only" style="margin-top:16px">
            <div class="card-body" style="padding:0">
                <div class="table-wrap">
                    <table id="resTable">
                        <thead>
                            <tr>
                                <th><input type="checkbox" id="checkAll" onclick="toggleAll()"></th>
                                <th>Booking #</th>
                                <th>Guest</th>
                                <th>Room</th>
                                <th>Type</th>
                                <th>Check-in</th>
                                <th>Check-out</th>
                                <th>Stay</th>
                                <th>Channel</th>
                                <th>Amount(USD)</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="resBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- RESERVATION CARDS (mobile) -->
        <div class="mobile-cards mobile-only" id="resMobileCards">
            <!-- Generated by JS -->
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <span class="page-info">총 <b>24건</b> 중 1–24 표시</span>
            <div class="page-btns">
                <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet-overlay" id="resBsOverlay" onclick="closeResBS()"></div>
<div class="bottom-sheet" id="resBsPanel">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title">예약 Status 필터</div>
    <div class="bottom-sheet-options">
        <button class="bs-option selected" onclick="selectResFilter(this,'all','전체')">
            <div class="bs-option-icon" style="background:var(--border2);color:var(--txt2)"><i class="fa-solid fa-list"></i></div>
            All
            <span class="bs-option-count">24</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'confirmed','확정')">
            <div class="bs-option-icon" style="background:rgba(16,185,129,.1);color:#059669"><i class="fa-solid fa-circle-check"></i></div>
            Confirmed
            <span class="bs-option-count">14</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'pending','대기')">
            <div class="bs-option-icon" style="background:rgba(245,158,11,.1);color:#D97706"><i class="fa-solid fa-clock"></i></div>
            Pending
            <span class="bs-option-count">4</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkedin','체크인')">
            <div class="bs-option-icon" style="background:rgba(59,130,246,.1);color:#2563EB"><i class="fa-solid fa-right-to-bracket"></i></div>
            Check-in
            <span class="bs-option-count">3</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkout','체크아웃')">
            <div class="bs-option-icon" style="background:rgba(139,92,246,.1);color:#7C3AED"><i class="fa-solid fa-right-from-bracket"></i></div>
            Check-out
            <span class="bs-option-count">2</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'cancelled','취소')">
            <div class="bs-option-icon" style="background:rgba(239,68,68,.1);color:#DC2626"><i class="fa-solid fa-ban"></i></div>
            Cancel
            <span class="bs-option-count">1</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
    </div>
</div>

const statusConfig = {
    confirmed: {label:'Confirmed',cls:'confirmed'},
    pending: {label:'Pending',cls:'checkout'},
    checkedin: {label:'Check-in',cls:'checkin'},
    checkout: {label:'Check-out',cls:'vip'},
    cancelled: {label:'Cancel',cls:'cancelled'}
};

let currentFilter = 'all';

function renderTable() {
    const tbody = document.getElementById('resBody');
    const mobileContainer = document.getElementById('resMobileCards');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = reservations.filter(r => {
        if (currentFilter !== 'all' && r.status !== currentFilter) return false;
        if (search && !r.guest.toLowerCase().includes(search) && !r.room.toLowerCase().includes(search) && !r.id.toLowerCase().includes(search)) return false;
        return true;
    });

    // Desktop table
    tbody.innerHTML = filtered.map(r => {
        const st = statusConfig[r.status];
        const isVip = r.vip.includes('VIP') || r.vip.includes('Gold');
        return `
        <tr>
            <td><input type="checkbox" class="row-check"></td>
            <td><span class="res-id">${r.id}</span></td>
            <td>
                <div class="guest-cell">
                    <div class="guest-avatar" style="background:${r.color}">${r.initials}</div>
                    <div>
                        ${r.guest}${isVip ? ' <i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.6rem"></i>' : ''}
                        <span style="font-size:.72rem;color:#9CA3AF;margin-left:6px">${r.vip}</span>
                    </div>
                </div>
            </td>
            <td><span class="room-tag">${r.room}</span></td>
            <td>${r.type}</td>
            <td>${r.cin}</td>
            <td>${r.cout}</td>
            <td>${r.nights}박</td>
            <td><span class="channel-tag ${r.channel.toLowerCase().replace('-','')}">${r.channel}</span></td>
            <td style="font-weight:700">$${r.amount.toLocaleString('en',{minimumFractionDigits:2})}</td>
            <td><span class="status-badge ${st.cls}">${st.label}</span></td>
            <td>
                <div class="action-btns">
                    <button class="act-btn" title="상세보기"><i class="fa-solid fa-eye"></i></button>
                    <button class="act-btn" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="act-btn danger" title="Cancel"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Mobile cards
    mobileContainer.innerHTML = filtered.map(r => {
        const st = statusConfig[r.status];
        const isVip = r.vip.includes('VIP') || r.vip.includes('Gold');
        return `
        <div class="m-res-card">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div class="guest-avatar" style="background:${r.color}">${r.initials}</div>
                    <div>
                        <div class="m-res-name">${r.guest} ${isVip ? '<i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.65rem"></i>' : ''}</div>
                        <div class="m-res-sub">${r.vip}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span class="status-badge ${st.cls}">${st.label}</span>
                    <div class="m-res-amount">$${r.amount.toLocaleString('en',{minimumFractionDigits:2})}</div>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail"><i class="fa-solid fa-door-open"></i> <span class="room-tag">${r.room}</span> ${r.type}</div>
                <div class="m-res-detail"><i class="fa-solid fa-calendar"></i> ${r.cin} → ${r.cout} (${r.nights}박)</div>
                <div class="m-res-detail"><i class="fa-solid fa-globe"></i> <span class="channel-tag ${r.channel.toLowerCase().replace('-','')}">${r.channel}</span></div>
            </div>
            <div class="m-res-actions">
                <button class="act-btn"><i class="fa-solid fa-eye"></i> 상세</button>
                <button class="act-btn"><i class="fa-solid fa-pen"></i> 수정</button>
                <button class="act-btn danger"><i class="fa-solid fa-xmark"></i> Cancel</button>
            </div>
        </div>`;
    }).join('');
}

function setFilter(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

function filterTable() { renderTable(); }
function toggleAll() {
    const checked = document.getElementById('checkAll').checked;
    document.querySelectorAll('.row-check').forEach(c => c.checked = checked);
}

// ===== MOBILE MENU =====
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.sidebar-overlay').classList.toggle('active');
}

// ===== BOTTOM SHEET =====
function openResBS() {
    document.getElementById('resBsOverlay').classList.add('active');
    document.getElementById('resBsPanel').classList.add('active');
}
function closeResBS() {
    document.getElementById('resBsOverlay').classList.remove('active');
    document.getElementById('resBsPanel').classList.remove('active');
}
function selectResFilter(btn, filter, label) {
    currentFilter = filter;
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('mResFilterLabel').textContent = label;
    // Sync desktop chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    const target = document.querySelector(`.chip[data-filter="${filter}"]`);
    if (target) target.classList.add('active');
    closeResBS();
    renderTable();
}

renderTable();

function setupI18n(){
    const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);
    let node; const textNodes=[];
    while(node=walk.nextNode()){
        const orig=node.nodeValue,text=orig.trim();
        if(text&&translations.ko[text]&&!node.parentNode.hasAttribute('data-i18n-key')){
            const span=document.createElement('span');
            span.setAttribute('data-i18n-key',text);span.textContent=text;
            textNodes.push({node,span,originalText:orig});
        }
    }
    textNodes.forEach(({node,span,originalText})=>{
        const frag=document.createDocumentFragment();
        const ls=originalText.match(/^\s+/),ts=originalText.match(/\s+$/);
        if(ls)frag.appendChild(document.createTextNode(ls[0]));
        frag.appendChild(span);
        if(ts)frag.appendChild(document.createTextNode(ts[0]));
        node.parentNode.replaceChild(frag,node);
    });
}
function changeLang(lang){
    currentLang=lang;
    const dict=translations[lang]||translations.ko;
    document.querySelectorAll('[data-i18n-key]').forEach(el=>{
        const key=el.getAttribute('data-i18n-key');
        if(dict[key])el.textContent=dict[key];
    });
    document.getElementById('searchInput').placeholder = lang==='en' ? 'Search by name, room, booking #...' : '이름, Room번호, Booking # 검색...';
}
// 모달 공통 함수
function openModal(id) {
    document.getElementById(id).classList.add('active');
}
function closeModal(id) {
    document.getElementById(id).classList.remove('active');
}
function saveNewRes() {
    alert('새 예약이 성공적으로 Save되었습니다!');
    closeModal('newResModal');
}

document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang);});
</script>
