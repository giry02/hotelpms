<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 관리 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.filter-chips{display:none!important}
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{display:flex;flex-direction:column;position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{overflow-y:auto;flex:1;padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-count{font-size:.7rem;background:var(--border2);border-radius:10px;padding:2px 8px;color:var(--txt2);font-weight:600}
.bs-option.selected .bs-option-count{background:rgba(99,102,241,.12);color:var(--primary)}
.ops-tabs{display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:14px}
.ops-tab{height:38px;display:inline-flex;align-items:center;gap:7px;padding:0 14px;border:1px solid var(--border);border-radius:10px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.78rem;font-weight:800;cursor:pointer;transition:.15s}
.ops-tab:hover{border-color:var(--primary);color:var(--primary)}
.ops-tab.active{background:var(--primary);border-color:var(--primary);color:#fff}
.ops-tab .ops-count{min-width:20px;height:20px;border-radius:10px;display:inline-flex;align-items:center;justify-content:center;background:var(--border2);color:inherit;font-size:.68rem;padding:0 6px}
.ops-tab.active .ops-count{background:rgba(255,255,255,.24)}
.reservation-filter-bar{padding:12px 20px;background:#fff;border:1px solid var(--border);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px}
.reservation-sort-group{display:inline-flex;align-items:center;gap:6px;margin-left:10px;padding-left:10px;border-left:1px solid var(--border2)}
.sort-btn{height:36px;display:inline-flex;align-items:center;gap:6px;padding:0 12px;border:1px solid var(--border);border-radius:9px;background:#fff;color:var(--txt2);font-family:var(--font);font-size:.75rem;font-weight:800;cursor:pointer;white-space:nowrap;transition:.15s}
.sort-btn:hover{border-color:var(--primary);color:var(--primary)}
.sort-btn.active{background:var(--primary);border-color:var(--primary);color:#fff}
.guest-alerts{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.guest-alert{display:inline-flex;align-items:center;gap:4px;max-width:220px;border-radius:999px;padding:2px 8px;font-size:.68rem;font-weight:800;line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.guest-alert.warn{background:#fff7ed;color:#c2410c;border:1px solid #fed7aa}
.guest-alert.info{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.guest-alert.doc{background:#f8fafc;color:#475569;border:1px solid #e2e8f0}
.guest-alert.empty{background:#f8fafc;color:#94a3b8;border:1px solid #e2e8f0}
.guest-alert.id-action{border:1px solid #fed7aa;background:#fff7ed;color:#c2410c;cursor:pointer;font-family:var(--font)}
.guest-alert.id-action:hover{border-color:#fb923c;background:#ffedd5;color:#9a3412}
.res-work-action{display:inline-flex;align-items:center;gap:5px;height:30px;padding:0 10px;border:0;border-radius:8px;color:#fff;font-family:var(--font);font-size:.72rem;font-weight:800;cursor:pointer;white-space:nowrap}
.res-work-action.checkin{background:#2563eb}
.res-work-action.checkout{background:#ef4444}
.res-work-action.group{background:#111827}
.res-work-action:disabled{opacity:.45;cursor:not-allowed}
.res-submeta{font-size:.72rem;color:#9ca3af;margin-top:3px}
#resTable{table-layout:fixed;min-width:1420px}
#resTable th:nth-child(1),#resTable td:nth-child(1){width:150px}
#resTable th:nth-child(2),#resTable td:nth-child(2){width:330px}
#resTable th:nth-child(3),#resTable td:nth-child(3){width:110px}
#resTable th:nth-child(4),#resTable td:nth-child(4),#resTable th:nth-child(5),#resTable td:nth-child(5){width:82px}
#resTable th:nth-child(6),#resTable td:nth-child(6){width:72px}
#resTable th:nth-child(7),#resTable td:nth-child(7){width:92px}
#resTable th:nth-child(8),#resTable td:nth-child(8){width:110px}
#resTable th:nth-child(9),#resTable td:nth-child(9){width:100px}
#resTable th:nth-child(10),#resTable td:nth-child(10){width:280px}
.res-room-cell{text-align:left}
.res-room-booking{display:flex;flex-direction:column;align-items:flex-start;gap:5px}
.res-id{display:block;max-width:132px;white-space:normal;overflow:visible;line-height:1.25;word-break:break-word}
.reservation-room-tag{display:inline-flex;align-items:center;justify-content:center;min-width:58px;height:28px;padding:0 10px;border-radius:8px;background:#dbeafe;color:#1d4ed8;border:1px solid #bfdbfe;font-size:.78rem;font-weight:900;letter-spacing:.01em}
.reservation-room-tag i{font-size:.72rem;margin-right:5px}
.res-actions-cell{min-width:260px;text-align:right}
.res-action-stack{display:flex;flex-direction:column;align-items:flex-end;justify-content:flex-start;gap:6px;min-width:0}
.stay-flag-panel{display:flex;align-items:center;justify-content:flex-end;gap:6px;margin-top:0;width:100%}
.stay-flag-label{display:none}
.stay-flag-buttons{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.stay-flag-btn{display:inline-flex;align-items:center;gap:4px;height:30px;padding:0 8px;border:1px solid var(--border);border-radius:8px;background:#fff;color:var(--txt);font-family:var(--font);font-size:.68rem;font-weight:850;cursor:pointer;transition:.15s;white-space:nowrap}
.stay-flag-btn:hover{border-color:var(--primary);color:var(--primary)}
.stay-flag-btn.active{border-color:#6366f1;background:#eef2ff;box-shadow:0 0 0 2px rgba(99,102,241,.14)}
.stay-flag-btn.dnd i{color:#e11d48}.stay-flag-btn.mur i{color:#10b981}.stay-flag-btn.away i{color:#f59e0b}.stay-flag-btn.none i{color:#2563eb}
.channel-tag.group{background:#111827;color:#fff}
.channel-tag.corporate{background:#F3F4F6;color:#374151}
.channel-tag.ota{background:#E0F2FE;color:#0369A1}
.action-btns{display:flex;gap:5px;justify-content:flex-end;flex-wrap:wrap}
.res-work-action{min-width:82px;justify-content:center}
@media(max-width:1200px){
    .res-actions-cell{min-width:230px}
    .stay-flag-btn{padding:0 7px}
    .res-work-action{min-width:74px}
}
@media(min-width:769px){
    .bottom-sheet,.bottom-sheet-overlay{display:none!important}
    .filter-bar{align-items:center;margin-bottom:14px}
    .filter-left .search-box{width:340px}
}
@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:wrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
    .reservation-sort-group{width:100%;margin-left:0;padding-left:0;border-left:0}
    .sort-btn{flex:1;justify-content:center}
    .ops-tabs{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px;overflow:visible;padding-bottom:0}
    .ops-tab{width:100%;justify-content:center;padding:0 10px}
    .stay-flag-panel{align-items:flex-start;width:100%}
    .stay-flag-label{display:block}
    .stay-flag-buttons{justify-content:flex-start;flex-wrap:wrap}
    .res-action-stack{align-items:flex-start;justify-content:flex-start;flex-direction:column}
    .action-btns{justify-content:flex-start}
    .res-actions-cell{min-width:0;text-align:left}
    .reservation-filter-bar{padding:12px;gap:10px}
}
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-operations.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/api/api-crm.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
</head>
<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
    <header class="topbar"><h1 data-i18n-key="Booking List">예약 관리</h1></header>

    <div class="content">
        <div class="ops-tabs" id="reservationOpsTabs">
            <button class="ops-tab active" data-filter="all" onclick="setFilter(this,'all')"><i class="fa-solid fa-list"></i> <span class="ops-label">전체</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="checkin" onclick="setFilter(this,'checkin')"><i class="fa-solid fa-right-to-bracket"></i> <span class="ops-label">오늘 체크인</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="inhouse" onclick="setFilter(this,'inhouse')"><i class="fa-solid fa-bed"></i> <span class="ops-label">투숙 중</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="checkout" onclick="setFilter(this,'checkout')"><i class="fa-solid fa-right-from-bracket"></i> <span class="ops-label">체크아웃</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="completed" onclick="setFilter(this,'completed')"><i class="fa-solid fa-check-double"></i> <span class="ops-label">완료</span> <span class="ops-count">0</span></button>
            <button class="ops-tab" data-filter="cancelled" onclick="setFilter(this,'cancelled')"><i class="fa-solid fa-ban"></i> <span class="ops-label">취소/노쇼</span> <span class="ops-count">0</span></button>
        </div>
        <!-- FILTER & SEARCH BAR -->
        <div class="filter-bar reservation-filter-bar">
            <div class="filter-left">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="searchInput" placeholder="이름, 객실번호, 예약번호 검색..." oninput="filterTable()">
                </div>
                <div class="reservation-sort-group" aria-label="예약 정렬">
                    <button type="button" class="sort-btn active" data-sort="recent" onclick="setReservationSort('recent')"><i class="fa-solid fa-clock-rotate-left"></i> <span data-i18n-key="Recent Order">최근순</span></button>
                    <button type="button" class="sort-btn" data-sort="room" onclick="setReservationSort('room')"><i class="fa-solid fa-arrow-down-1-9"></i> <span data-i18n-key="Room Order">호실순</span></button>
                </div>
                <div class="filter-chips">
                    <button class="chip active" data-filter="all" onclick="setFilter(this,'all')">All <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="checkin" onclick="setFilter(this,'checkin')">Today Check-in <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="inhouse" onclick="setFilter(this,'inhouse')">In-house <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="checkout" onclick="setFilter(this,'checkout')">Check-out <span class="chip-count">0</span></button>
                    <button class="chip" data-filter="cancelled" onclick="setFilter(this,'cancelled')">Cancel <span class="chip-count">0</span></button>
                </div>
                <button class="m-filter-trigger" onclick="openResBS()">
                    <i class="fa-solid fa-filter"></i>
                    <span id="mResFilterLabel">All</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="exportReservationsToCSV()"><i class="fa-solid fa-download"></i> Export</button>
                <button class="btn-primary-sm" onclick="openUnifiedResModal()"><i class="fa-solid fa-plus"></i> New Booking</button>
            </div>
        </div>

        <!-- RESERVATION TABLE (desktop) -->
        <div class="card desktop-only" style="margin-top:16px">
            <div class="card-body" style="padding:0">
                <div class="table-wrap">
                    <table id="resTable">
                        <thead>
                            <tr>
                                <th>Room / Booking #</th>
                                <th>Guest / 주의사항</th>
                                <th>Type</th>
                                <th>Check-in</th>
                                <th>Check-out</th>
                                <th>Stay</th>
                                <th onclick="sortTable('channel')" style="cursor:pointer" title="클릭하여 채널/B2B 정렬">Channel <i class="fa-solid fa-sort" style="font-size:0.7em; opacity:0.5"></i></th>
                                <th>Amount</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="resBody">
                            <!-- Generated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <!-- RESERVATION CARDS (mobile) -->
        <div class="mobile-cards mobile-only" id="resMobileCards">
            <!-- Generated by JS -->
        </div>

        <!-- PAGINATION -->
        <div class="pagination">
            <span class="page-info" id="pageInfo">총 <b>0건</b> 중 0–0 표시</span>
            <div class="page-btns" id="pageBtns">
                <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
                <button class="page-btn active">1</button>
                <button class="page-btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </div>
    </div>
</div>

<!-- Bottom Sheet -->
<div class="bottom-sheet-overlay" id="resBsOverlay" onclick="closeResBS()"></div>
<div class="bottom-sheet" id="resBsPanel">
    <div class="bottom-sheet-handle"></div>
    <div class="bottom-sheet-title" id="resBsTitle">예약 상태 필터</div>
    <div class="bottom-sheet-options">
        <button class="bs-option selected" onclick="selectResFilter(this,'all','전체')">
            <div class="bs-option-icon" style="background:var(--border2);color:var(--txt2)"><i class="fa-solid fa-list"></i></div>
            <span class="bs-option-label">All</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkin','오늘 체크인')">
            <div class="bs-option-icon" style="background:rgba(16,185,129,.1);color:#059669"><i class="fa-solid fa-circle-check"></i></div>
            <span class="bs-option-label">Today Check-in</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>

        <button class="bs-option" onclick="selectResFilter(this,'inhouse','투숙 중')">
            <div class="bs-option-icon" style="background:rgba(59,130,246,.1);color:#2563EB"><i class="fa-solid fa-right-to-bracket"></i></div>
            <span class="bs-option-label">In-house</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'checkout','체크아웃')">
            <div class="bs-option-icon" style="background:rgba(139,92,246,.1);color:#7C3AED"><i class="fa-solid fa-right-from-bracket"></i></div>
            <span class="bs-option-label">Check-out</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
        <button class="bs-option" onclick="selectResFilter(this,'cancelled','취소')">
            <div class="bs-option-icon" style="background:rgba(239,68,68,.1);color:#DC2626"><i class="fa-solid fa-ban"></i></div>
            <span class="bs-option-label">Cancel</span>
            <span class="bs-option-count">0</span>
            <i class="fa-solid fa-check bs-option-check"></i>
        </button>
    </div>
</div>

<script>
// ===== RESERVATION DATA =====
let reservations = [];
let rooms = [];
let guests = [];
let guestMap = new Map();

const statusConfig = {
    blocked: {cls:'pending'},
    pending: {cls:'pending'},
    confirmed: {cls:'confirmed'},
    checkedin: {cls:'checkin'},
    checkout: {cls:'vip'},
    completed: {cls:'cancelled'},
    cancelled: {cls:'cancelled'}
};

const reservationLabels = {
    ko: {
        'status.blocked': '블록',
        'status.pending': '대기',
        'status.confirmed': '예약 확정',
        'status.checkedin': '투숙 중',

        'channel.direct': '직접',
        'channel.walkin': '방문',
        'channel.corporate': '기업',
        'channel.group': 'B2B',
        'action.group': '단체 관리',
        'action.checkin': '체크인',
        'action.checkout': '체크아웃',
        'action.manage': '관리',
        'action.cancel': '취소',
        'action.cancelDisabled': '취소 불가',
        'action.cancelDisabledTitle': '체크인 이후 취소 불가',
        'flag.title': '상태 설정 (프론트 전용)',

        'doc.actionTitle': '신분증/여권 확인 완료 처리',
        'note.empty': '특이사항 없음',
        'stay.night': '박',
        'page.empty': '총 <b>0건</b>',
        'confirm.docVerify': '{name} 고객의 신분증/여권 확인을 완료 처리할까요?',
        'confirm.flow': '{name} 예약을 {action} 처리하시겠습니까?',
        'toast.noData': '데이터가 없습니다.',
        'toast.docVerified': '신분증/여권 확인 완료로 저장했습니다.',
        'toast.roomMissing': '객실 정보를 찾을 수 없습니다.',
        'toast.flagSaved': '{room} 상태: {flag}',
        'toast.checkinNotAllowed': '체크인은 입실 예정일이 도래한 예약 확정/대기 상태에서만 처리할 수 있습니다.',
        'toast.checkoutNotAllowed': '체크아웃은 투숙 중 예약에서만 처리할 수 있습니다.',
        'toast.flowComplete': '{action} 처리가 완료되었습니다.',
        'block.noRoom': '객실을 먼저 배정해야 체크인할 수 있습니다.',

function reservationLang() {
    return (window.currentLang || localStorage.getItem('pms_lang') || document.getElementById('langSelect')?.value || currentLang || 'ko') === 'en' ? 'en' : 'ko';
}

function resText(key) {
    const lang = reservationLang();
    return reservationLabels[lang]?.[key] || reservationLabels.ko[key] || key;
}

function resMessage(key, params = {}) {
    let text = resText(key);
    Object.keys(params).forEach(name => {
        text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
    });
    return text;
}

function statusMeta(status) {
    const key = normalizeListStatus(status);
    const config = statusConfig[key] || statusConfig.confirmed;
    return { cls: config.cls, label: resText(`status.${key}`) };
}

function filterLabel(filter) {
    return resText(`filter.${filter}`);
}

function normalizedChannelKey(value) {
    const raw = String(value || '').trim().toLowerCase().replace(/[_\s/.-]/g, '');
    if (['direct', 'directbooking'].includes(raw)) return 'direct';
    if (['walkin', 'walk'].includes(raw)) return 'walkin';
    if (['corporate', 'corp'].includes(raw)) return 'corporate';
    if (['group', 'b2b', 'b2bgroup'].includes(raw)) return 'group';
    if (raw.includes('booking')) return 'booking';
    if (raw.includes('agoda')) return 'agoda';
    if (raw.includes('ota')) return 'ota';
    return raw || 'direct';
}

function channelMeta(res) {
    const key = (res?.isB2B || normalizedChannelKey(res?.channel) === 'group') ? 'group' : normalizedChannelKey(res?.channel);
    const fixedLabels = { ota: 'OTA', agoda: 'Agoda', booking: 'Booking.com' };
    return {
        key,
        cls: key,
        label: fixedLabels[key] || resText(`channel.${key}`) || String(res?.channel || '-')
    };
}

function channelBadge(res) {
    const channel = channelMeta(res);
    return `<span class="channel-tag ${escapeHtml(channel.cls)}">${escapeHtml(channel.label)}</span>`;
}

function stayLabel(nights) {
    return reservationLang() === 'en' ? `${nights}${resText('stay.night')}` : `${nights}${resText('stay.night')}`;
}

function normalizeListStatus(status) {
    const key = String(status || '').replace(/[-_\s]/g, '').toLowerCase();
    if (['checkedin', 'inhouse', 'occupied'].includes(key)) return 'checkedin';
    if (key === 'checkout') return 'checkout';
    if (['checkedout', 'departed', 'completed'].includes(key)) return 'completed';
    if (key === 'cancelled' || key === 'canceled' || key === 'noshow') return 'cancelled';
    if (key === 'blocked') return 'blocked';
    if (key === 'pending') return 'pending';
    return key || 'confirmed';
}

function escapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function parseListDate(value) {
    if (!value) return null;
    const text = String(value).trim();
    const md = text.match(/^(\d{1,2})\/(\d{1,2})$/);
    if (md) {
        const date = new Date(new Date().getFullYear(), Number(md[1]) - 1, Number(md[2]));
        date.setHours(0, 0, 0, 0);
        return date;
    }
    const date = new Date(text);
    if (Number.isNaN(date.getTime())) return null;
    date.setHours(0, 0, 0, 0);
    return date;
}

function todayDate() {
    const today = new Date();
    today.setHours(0, 0, 0, 0);
    return today;
}

function normalizeRoomValue(value) {
    const text = String(value || '').trim().toLowerCase();
    const digits = (text.match(/\d+/g) || []).join('');
    return { text, digits, strippedDigits: digits.replace(/^0+(?=\d)/, '') };
}

function sameRoomValue(left, right) {
    const a = normalizeRoomValue(left);
    const b = normalizeRoomValue(right);
    if (!a.text || !b.text) return false;
    if (a.text === b.text) return true;
    return !!(a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits));
}

function roomMatchesReservation(room, res) {
    const roomValues = [room?.id, room?.fullRoom, room?.roomId, room?.number, room?.roomNo, room?.display, room?.displayName, room?.roomLabel];
    const resValues = [res?.room, res?.fullRoom, res?.roomId, res?.roomNo, res?.roomNumber, res?.roomLabel];
    return roomValues.some(roomValue => resValues.some(resValue => sameRoomValue(roomValue, resValue)));
}

function roomForReservation(res) {
    return rooms.find(room => roomMatchesReservation(room, res));
}

function isRoomInHouse(res) {
    const room = roomForReservation(res);
    return normalizeListStatus(room?.frontStatus || room?.status || room?.housekeepingStatus) === 'checkedin';
}

function checkoutDateIsDue(res) {
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    return !!end && end <= todayDate();
}

function checkinDateIsDue(res) {
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    return !!start && start <= todayDate();
}

function isCurrentStayWindow(res) {
    const start = parseListDate(res?.checkInDate || res?.checkin || res?.cin);
    const end = parseListDate(res?.checkOutDate || res?.checkout || res?.cout);
    const today = todayDate();
    return !!(start && end && start <= today && today < end);
}

function effectiveRowStatus(res) {
    let status = normalizeListStatus(res?.status);
    if (['confirmed', 'pending'].includes(status) && isRoomInHouse(res) && isCurrentStayWindow(res)) status = 'checkedin';
    if (status === 'checkedin' && checkoutDateIsDue(res)) return 'checkout';
    return status;
}

function guestForReservation(res) {
    const guestId = res?.guestId || res?.roomingGuestId;
    return guestMap.get(guestId) || guests.find(g => g.name && g.name === (res?.guestName || res?.guest || res?.roomingGuestName)) || null;
}

function reservationGuestName(res) {
    return res?.roomingGuestName || res?.guestName || res?.guest || '';
}

function displayGuestName(res) {
    if (normalizeListStatus(res?.status) === 'blocked' || res?.isGroupPlaceholder) {
        return res?.roomingGuestName || res?.guestName || res?.groupName || res?.channel || '단체 블록';
    }
    return reservationGuestName(res) || '-';
}

function operationalNotes(res) {
    const guest = guestForReservation(res);
    const notes = [
        res?.specialNotes,
        res?.guestNote,
        res?.roomingGuestNote,
        guest?.specialNotes
    ].map(v => String(v || '').trim()).filter(Boolean);
    return [...new Set(notes)];
}

function documentStatus(res) {
    const guest = guestForReservation(res);
    return res?.docStatus || res?.documentStatus || guest?.documentStatus || guest?.docStatus || guest?.document?.status || '';
}

function documentBadge(res) {
    const guestName = displayGuestName(res);
    if ((res?.isGroupPlaceholder || normalizeListStatus(res?.status) === 'blocked') && (!guestName || guestName === res?.groupName)) {
        return `<span class="guest-alert empty"><i class="fa-solid fa-user-plus"></i>${resText('doc.unassigned')}</span>`;
    }
    const raw = String(documentStatus(res) || '').trim();
    const key = raw.toLowerCase();
    if (['verified', 'approved', 'confirmed', 'checked'].includes(key)) {
        return `<span class="guest-alert doc"><i class="fa-solid fa-id-card"></i>${resText('doc.verified')}</span>`;
    }
    if (['rejected', 'expired', 'invalid'].includes(key)) {
        return `<button type="button" class="guest-alert id-action" title="${resText('doc.actionTitle')}" onclick="verifyReservationDocument('${res.id}', event)"><i class="fa-solid fa-id-card"></i>${resText('doc.recheck')}</button>`;
    }
    if (!raw || ['pending', 'required', 'requested', 'unchecked'].includes(key)) {
        return `<button type="button" class="guest-alert id-action" title="${resText('doc.actionTitle')}" onclick="verifyReservationDocument('${res.id}', event)"><i class="fa-solid fa-id-card"></i>${resText('doc.check')}</button>`;
    }
    return `<span class="guest-alert doc"><i class="fa-solid fa-id-card"></i>${escapeHtml(raw)}</span>`;
}

function alertBadges(res) {
    const notes = operationalNotes(res);
    const noteHtml = notes.length
        ? notes.slice(0, 2).map(note => `<span class="guest-alert warn" title="${escapeHtml(note)}"><i class="fa-solid fa-triangle-exclamation"></i>${escapeHtml(note)}</span>`).join('')
        : `<span class="guest-alert empty"><i class="fa-regular fa-note-sticky"></i>${resText('note.empty')}</span>`;
    const docHtml = documentBadge(res);
    return `<div class="guest-alerts">${noteHtml}${docHtml}</div>`;
}

function formatMoney(res) {
    const currency = res.currency || 'USD';
    const amount = Number(res.amount || res.totalAmount?.amount || 0);
    return new Intl.NumberFormat('en-US', {
        style: 'currency',
        currency,
        maximumFractionDigits: currency === 'USD' ? 2 : 0
    }).format(amount);
}

function operationalBucket(res) {
    const status = effectiveRowStatus(res);
    if (status === 'cancelled') return 'cancelled';
    if (status === 'completed') return 'completed';
    if (status === 'checkout') return 'checkout';
    if (status === 'checkedin') return 'inhouse';
    if (['confirmed', 'pending'].includes(status) && checkinDateIsDue(res)) return 'checkin';
    return status;
}

function canCancelReservationRow(res) {
    const status = effectiveRowStatus(res);
    return !['checkedin', 'checkout', 'completed', 'cancelled'].includes(status);
}

function cancelActionButton(res, mobile = false) {
    if (!canCancelReservationRow(res)) {
        return mobile
            ? `<button class="act-btn danger" disabled title="${resText('action.cancelDisabledTitle')}" style="opacity:.45;cursor:not-allowed"><i class="fa-solid fa-lock"></i> ${resText('action.cancelDisabled')}</button>`
            : `<button class="act-btn danger" disabled title="${resText('action.cancelDisabledTitle')}" style="opacity:.45;cursor:not-allowed"><i class="fa-solid fa-lock"></i></button>`;
    }
    return mobile
        ? `<button class="act-btn danger" onclick="window.cancelResAction('${res.id}')"><i class="fa-solid fa-xmark"></i> ${resText('action.cancel')}</button>`
        : `<button class="act-btn danger" title="${resText('action.cancel')}" onclick="window.cancelResAction('${res.id}')"><i class="fa-solid fa-xmark"></i></button>`;
}

let currentFilter = 'all';
let currentPage = 1;
let currentSort = 'recent';
const itemsPerPage = 10;

function reservationNumericId(res) {
    const text = String(res?.id || res?.reservationId || '');
    const nums = text.match(/\d+/g);
    return nums ? Number(nums.join('').slice(-10)) : 0;
}

function reservationRecentValue(res) {
    const dateValue = res?.createdAt || res?.createdDate || res?.updatedAt || res?.bookingDate || res?.date || '';
    const parsed = Date.parse(dateValue);
    if (!Number.isNaN(parsed)) return parsed;
    return -(Number(res?._listOrder || 0));
}

function roomSortKey(res) {
    const room = String(res?.roomNo || res?.room || res?.roomId || res?.fullRoom || '').toUpperCase();
    const prefix = room.startsWith('PH') ? 0 : room.startsWith('V') ? 2 : 1;
    const nums = room.match(/\d+/g);
    const number = nums ? Number(nums.join('')) : 99999;
    return { prefix, number, room };
}

function compareReservations(left, right) {
    if (currentSort === 'room') {
        const a = roomSortKey(left);
        const b = roomSortKey(right);
        if (a.prefix !== b.prefix) return a.prefix - b.prefix;
        if (a.number !== b.number) return a.number - b.number;
        return a.room.localeCompare(b.room);
    }
    const recentDiff = reservationRecentValue(right) - reservationRecentValue(left);
    return recentDiff || (reservationNumericId(right) - reservationNumericId(left));
}

function setReservationSort(mode) {
    currentSort = mode === 'room' ? 'room' : 'recent';
    document.querySelectorAll('.sort-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.sort === currentSort);
    });
    currentPage = 1;
    renderTable();
}

function rowMatchesFilter(res) {
    if (currentFilter === 'all') return true;
    if (['checkin', 'inhouse', 'checkout', 'completed', 'cancelled'].includes(currentFilter)) {
        return operationalBucket(res) === currentFilter;
    }
    return effectiveRowStatus(res) === currentFilter;
}

function workActionButton(res, mobile = false) {
    const status = effectiveRowStatus(res);
    const bucket = operationalBucket(res);
    if ((res.isGroupPlaceholder || status === 'blocked') && res.groupId) {
        return `<button class="res-work-action group" onclick="location.href='groups_block_detail.html?id=${encodeURIComponent(res.groupId)}&tab=rooms'"><i class="fa-solid fa-users"></i>${resText('action.group')}</button>`;
    }
    if (bucket === 'checkin') {
        return `<button class="res-work-action checkin" onclick="processReservationRowFlow('${res.id}','checkin')"><i class="fa-solid fa-right-to-bracket"></i>${resText('action.checkin')}</button>`;
    }
    if (status === 'checkedin' || status === 'checkout') {
        return `<button class="res-work-action checkout" onclick="processReservationRowFlow('${res.id}','checkout')"><i class="fa-solid fa-right-from-bracket"></i>${resText('action.checkout')}</button>`;
    }
    return '';
}

function stayoverFlagControls(res) {
    const status = effectiveRowStatus(res);
    if (!['checkedin', 'checkout'].includes(status)) return '';
    const room = roomForReservation(res);
    if (!room) return '';
    const flag = room.guestFlag || res.guestFlag || 'none';
    const roomKey = room.roomId || room.fullRoom || room.id || res.room;
    const options = [
        { key: 'dnd', label: resText('flag.dnd'), icon: 'fa-circle', cls: 'dnd' },
        { key: 'mur', label: resText('flag.mur'), icon: 'fa-circle', cls: 'mur' },
        { key: 'away', label: resText('flag.away'), icon: 'fa-person-walking', cls: 'away' },
        { key: 'none', label: resText('flag.none'), icon: 'fa-bed', cls: 'none' }
    ];
    return `<div class="stay-flag-panel">
        <div class="stay-flag-label">${resText('flag.title')}</div>
        <div class="stay-flag-buttons">
            ${options.map(opt => `<button type="button" class="stay-flag-btn ${opt.cls} ${flag === opt.key ? 'active' : ''}" title="${opt.label}" onclick="setReservationStayoverFlag('${res.id}','${opt.key}','${escapeHtml(roomKey)}')"><i class="fa-solid ${opt.icon}"></i>${opt.label}</button>`).join('')}
        </div>
    </div>`;
}

function reservationEmptyState() {
    const isEn = (document.getElementById('langSelect')?.value || window.currentLang || localStorage.getItem('pms_lang')) === 'en';
    const hasSearch = !!document.getElementById('searchInput')?.value.trim();
    const labels = isEn
        ? { all: 'reservations', checkin: "today's check-ins", inhouse: 'in-house stays', checkout: 'check-outs', completed: 'completed reservations', cancelled: 'cancelled/no-show reservations' }
        : { all: '예약', checkin: '오늘 체크인 대상', inhouse: '투숙 중 예약', checkout: '체크아웃 대상', completed: '완료 예약', cancelled: '취소/노쇼 예약' };
    const target = labels[currentFilter] || labels.all;
    const title = isEn ? `No ${target} to display.` : `표시할 ${target}이 없습니다.`;
    const desc = hasSearch
        ? (isEn ? 'No results match the current search and filter.' : '현재 검색어와 필터 조건에 맞는 예약이 없습니다.')
        : (isEn ? 'When matching bookings are created, they will appear here.' : '조건에 맞는 예약이 생성되면 이 영역에 표시됩니다.');
    return (typeof window.renderEmptyState === 'function')
        ? window.renderEmptyState({ icon: 'fa-calendar-xmark', title, desc })
        : `<div style="padding:32px;text-align:center;color:var(--txt3)">${title}<br>${desc}</div>`;
}

function renderTable() {
    const tbody = document.getElementById('resBody');
    const mobileContainer = document.getElementById('resMobileCards');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = reservations.filter(r => {
        if (!rowMatchesFilter(r)) return false;
        const haystack = [
            r.id,
            r.room,
            r.roomLabel,
            r.type,
            r.channel,
            channelMeta(r).label,
            r.groupName,
            displayGuestName(r),
            operationalNotes(r).join(' ')
        ].join(' ').toLowerCase();
        if (search && !haystack.includes(search)) return false;
        return true;
    }).sort(compareReservations);

    const totalItems = filtered.length;
    const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
    if (currentPage > totalPages) currentPage = totalPages;

    const startIdx = (currentPage - 1) * itemsPerPage;
    const paginated = filtered.slice(startIdx, startIdx + itemsPerPage);

    updatePagination(totalItems, startIdx, paginated.length, totalPages);

    if (paginated.length === 0) {
        const emptyState = reservationEmptyState();
        tbody.innerHTML = `<tr><td colspan="10">${emptyState}</td></tr>`;
        mobileContainer.innerHTML = emptyState;
        return;
    }

    // Desktop table
    tbody.innerHTML = paginated.map(r => {
        const status = effectiveRowStatus(r);
        const st = statusMeta(status);
        const isVip = String(r.vip || '').includes('VIP') || String(r.vip || '').includes('Gold') || r.isVip;
        const displayGuest = displayGuestName(r);
        const initials = r.initials || displayGuest.substring(0,2).toUpperCase();
        return `
        <tr>
            <td class="res-room-cell"><div class="res-room-booking"><span class="reservation-room-tag"><i class="fa-solid fa-door-open"></i>${escapeHtml(r.room)}</span><span class="res-id">${r.id}</span></div></td>
            <td>
                <div class="guest-cell">
                    <div class="guest-avatar" style="background:${r.color || '#3B82F6'}">${initials}</div>
                    <div>
                        ${escapeHtml(displayGuest)}${isVip ? ' <i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.6rem"></i>' : ''}
                        <span style="font-size:.72rem;color:#9CA3AF;margin-left:6px">${escapeHtml(r.vip || '')}</span>
                        <div class="res-submeta">${escapeHtml(r.groupName || r.companyName || '')}</div>
                        ${alertBadges(r)}
                    </div>
                </div>
            </td>
            <td>${escapeHtml(r.type)}</td>
            <td>${escapeHtml(r.cin)}</td>
            <td>${escapeHtml(r.cout)}</td>
            <td>${stayLabel(r.nights)}</td>
            <td>${channelBadge(r)}</td>
            <td style="font-weight:700">${formatMoney(r)}</td>
            <td><span class="status-badge ${st.cls}">${st.label}</span></td>
            <td class="res-actions-cell">
                <div class="res-action-stack">
                    ${stayoverFlagControls(r)}
                    <div class="action-btns">
                    ${workActionButton(r)}
                    <button class="act-btn" title="${resText('action.manage')}" onclick="window.openUnifiedResModal('${r.id}')"><i class="fa-solid fa-gear"></i></button>
                    ${cancelActionButton(r)}
                    </div>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Mobile cards
    mobileContainer.innerHTML = paginated.map(r => {
        const status = effectiveRowStatus(r);
        const st = statusMeta(status);
        const isVip = String(r.vip || '').includes('VIP') || String(r.vip || '').includes('Gold') || r.isVip;
        const displayGuest = displayGuestName(r);
        const initials = r.initials || displayGuest.substring(0,2).toUpperCase();
        return `
        <div class="m-res-card">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div class="guest-avatar" style="background:${r.color || '#3B82F6'}">${initials}</div>
                    <div>
                        <div class="m-res-name">${escapeHtml(displayGuest)} ${isVip ? '<i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.65rem"></i>' : ''}</div>
                        <div class="m-res-sub">${escapeHtml(r.vip || r.groupName || '')}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span class="status-badge ${st.cls}">${st.label}</span>
                    <div class="m-res-amount">${formatMoney(r)}</div>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail"><i class="fa-solid fa-door-open"></i> <span class="room-tag">${escapeHtml(r.room)}</span> ${escapeHtml(r.type)}</div>
                <div class="m-res-detail"><i class="fa-solid fa-calendar"></i> ${escapeHtml(r.cin)} → ${escapeHtml(r.cout)} (${stayLabel(r.nights)})</div>
                <div class="m-res-detail"><i class="fa-solid fa-globe"></i> ${channelBadge(r)}</div>
                ${alertBadges(r)}
            </div>
            <div class="m-res-actions">
                ${stayoverFlagControls(r)}
                ${workActionButton(r, true)}
                <button class="act-btn" onclick="window.openUnifiedResModal('${r.id}')"><i class="fa-solid fa-gear"></i> ${resText('action.manage')}</button>
                ${cancelActionButton(r, true)}
            </div>
        </div>`;
    }).join('');
}

function updatePagination(totalItems, startIdx, currentCount, totalPages) {
    const pageInfo = document.getElementById('pageInfo');
    const pageBtns = document.getElementById('pageBtns');
    
    if (totalItems === 0) {
        pageInfo.innerHTML = resText('page.empty');
        pageBtns.innerHTML = `
            <button class="page-btn" disabled><i class="fa-solid fa-chevron-left"></i></button>
            <button class="page-btn active">1</button>
            <button class="page-btn" disabled><i class="fa-solid fa-chevron-right"></i></button>
        `;
        return;
    }

    pageInfo.innerHTML = reservationLang() === 'en'
        ? `Showing ${startIdx + 1}–${startIdx + currentCount} of <b>${totalItems}</b>`
        : `총 <b>${totalItems}건</b> 중 ${startIdx + 1}–${startIdx + currentCount} 표시`;
    
    let btnsHtml = `<button class="page-btn" ${currentPage === 1 ? 'disabled' : ''} onclick="changePage(${currentPage - 1})"><i class="fa-solid fa-chevron-left"></i></button>`;
    
    for (let i = 1; i <= totalPages; i++) {
        btnsHtml += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="changePage(${i})">${i}</button>`;
    }
    
    btnsHtml += `<button class="page-btn" ${currentPage === totalPages ? 'disabled' : ''} onclick="changePage(${currentPage + 1})"><i class="fa-solid fa-chevron-right"></i></button>`;
    
    pageBtns.innerHTML = btnsHtml;
}

function updateChipCounts() {
    const counts = { all: reservations.length, checkin: 0, inhouse: 0, checkout: 0, completed: 0, cancelled: 0 };
    reservations.forEach(r => { const bucket = operationalBucket(r); if (counts[bucket] !== undefined) counts[bucket]++; });
    
    document.querySelectorAll('.chip, .ops-tab').forEach(c => {
        const f = c.getAttribute('data-filter');
        const span = c.querySelector('.chip-count, .ops-count');
        if(span && counts[f] !== undefined) span.textContent = counts[f];
    });
    
    document.querySelectorAll('.bs-option').forEach(btn => {
        const span = btn.querySelector('.bs-option-count');
        const onClickStr = btn.getAttribute('onclick');
        for (let key in counts) {
            if (onClickStr && onClickStr.includes(`'${key}'`) && span) {
                span.textContent = counts[key];
            }
        }
    });
}

async function persistDocumentVerification(res, guest) {
    localStorage.setItem('pms_reservations', JSON.stringify(reservations));
    if (guests.length) localStorage.setItem('pms_guests', JSON.stringify(guests));
    try {
        if (window.PmsMockApi && res?.id) {
            await window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res });
        }
        if (window.PmsMockApi && guest?.id) {
            await window.PmsMockApi.request('PATCH', '/crm/guests', { body: guest });
        }
    } catch(e) {
        console.warn('Document verification save failed', e);
    }
}

window.verifyReservationDocument = async function(resId, evt = null) {
    evt?.preventDefault?.();
    evt?.stopPropagation?.();
    const res = reservations.find(item => item.id === resId);
    if (!res) return;
    const guest = guestForReservation(res);
    const name = displayGuestName(res);
    const message = resMessage('confirm.docVerify', { name });
    const confirmed = window.showConfirm
        ? await window.showConfirm(message)
        : confirm(message);
    if (!confirmed) return;
    res.docStatus = 'verified';
    res.documentStatus = 'verified';
    if (guest) {
        guest.docStatus = 'verified';
        guest.documentStatus = 'verified';
        guest.document = { ...(guest.document || {}), status: 'verified', verifiedAt: new Date().toISOString() };
    }
    await persistDocumentVerification(res, guest);
    renderTable();
    if (window.showToast) window.showToast(resText('toast.docVerified'), 'success');
};

window.setReservationStayoverFlag = async function(resId, flag, roomKey = '') {
    const res = reservations.find(item => item.id === resId);
    const room = roomForReservation(res) || rooms.find(item => sameRoomValue(item.id, roomKey) || sameRoomValue(item.roomId, roomKey) || sameRoomValue(item.fullRoom, roomKey));
    if (!room) {
        if (window.showToast) window.showToast(resText('toast.roomMissing'), 'error');
        return;
    }
    room.guestFlag = flag;
    if (res) res.guestFlag = flag;
    localStorage.setItem('pms_rooms', JSON.stringify(rooms));
    try {
        if (window.PmsAPI?.setGuestFlag) {
            await window.PmsAPI.setGuestFlag(room.roomId || room.fullRoom || room.id, flag);
        } else if (window.PmsMockApi) {
            await window.PmsMockApi.request('PATCH', `/rooms/${encodeURIComponent(room.roomId || room.fullRoom || room.id)}/guest-flag`, { body: { flag } });
        }
    } catch(e) {
        console.warn('Guest flag save failed', e);
    }

        dnd: resText('flag.dnd'),
        mur: resText('flag.mur'),

    }), 'success');
};

async function syncHousekeepingForReservation(room, status, res) {
    if (!room || !window.PmsAPI?.syncRoomStatusToTask) return;
    const roomId = room.roomId || room.fullRoom || room.id || res?.room;
    try {
        await window.PmsAPI.syncRoomStatusToTask(roomId, status, {
            reservationId: res?.id,
            guestName: displayGuestName(res)
        });
    } catch(e) {
        console.warn('Housekeeping sync failed', e);
    }
}

function normalizedRoomOpsStatus(room) {
    return String(room?.housekeepingStatus || room?.status || room?.frontStatus || '').replace(/[-_\s]/g, '').toLowerCase();
}

function checkinBlockReasonForRoom(room) {
    if (!room) return resText('block.noRoom');
    const status = normalizedRoomOpsStatus(room);
    if (['dirty', 'vacantdirty'].includes(status)) return resText('block.dirtyRoom');
    if (['oos', 'outofservice', 'maintenance'].includes(status)) return resText('block.maintenanceRoom');
    if (['occupied', 'inhouse', 'checkedin', 'checked-in'].includes(status)) return resText('block.occupiedRoom');
    return '';
}

window.processReservationRowFlow = async function(resId, action) {
    const res = reservations.find(item => item.id === resId);
    if (!res) return;
    const status = effectiveRowStatus(res);
    if (action === 'checkin' && (!['confirmed', 'pending'].includes(status) || !checkinDateIsDue(res))) {
        if (window.showToast) window.showToast(resText('toast.checkinNotAllowed'), 'error');
        return;
    }
    if (action === 'checkout' && !['checkedin', 'checkout'].includes(status)) {
        if (window.showToast) window.showToast(resText('toast.checkoutNotAllowed'), 'error');
        return;
    }

    const room = roomForReservation(res);
    if (action === 'checkin') {
        const blockReason = checkinBlockReasonForRoom(room);
        if (blockReason) {
            if (window.showToast) window.showToast(blockReason, 'error');
            return;
        }
    }

    const label = action === 'checkin' ? resText('action.checkin') : resText('action.checkout');
    const name = displayGuestName(res);
    const message = resMessage('confirm.flow', { name, action: label });
    const confirmed = window.showConfirm
        ? await window.showConfirm(message)
        : confirm(message);
    if (!confirmed) return;

    if (action === 'checkin') {
        res.status = 'checkedin';
        if (room) {
            room.status = 'occupied';
            room.frontStatus = 'in-house';
            room.housekeepingStatus = 'occupied';
            room.guest = name;
        }
    } else {
        res.status = 'completed';
        if (room) {
            room.status = 'vacant-dirty';
            room.frontStatus = 'vacant';
            room.housekeepingStatus = 'dirty';
            room.guest = '';
        }
    }

    await persistReservationAndRoom(res, room);
    if (action === 'checkout') await syncHousekeepingForReservation(room, 'vacant-dirty', res);
    updateChipCounts();
    renderTable();
    if (window.showToast) window.showToast(resMessage('toast.flowComplete', { action: label }), 'success');
};

function exportReservationsToCSV() {
    if (!reservations || reservations.length === 0) {
        if(window.showToast) window.showToast(resText('toast.noData'));
        return;
    }
    const headers = ['Booking #', 'Guest', 'Room', 'Type', 'Check-in', 'Check-out', 'Stay', 'Channel', 'Amount', 'Status', 'Notes'];
    const rows = reservations.map(r => [
        r.id, 
        '"' + displayGuestName(r) + '"', 
        r.room, 
        r.type, 
        r.cin, 
        r.cout, 
        r.nights, 
        channelMeta(r).label,
        formatMoney(r), 
        statusMeta(effectiveRowStatus(r)).label,
        '"' + operationalNotes(r).join(' / ') + '"'
    ]);
    const csvContent = [headers.join(',')].concat(rows.map(e => e.join(','))).join('\n');
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csvContent], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    const url = URL.createObjectURL(blob);
    link.setAttribute('href', url);
    link.setAttribute('download', 'reservations.csv');
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
}

function setupI18n(){
    const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);
    let node; const textNodes=[];
    while(node=walk.nextNode()){
        const orig=node.nodeValue,text=orig.trim();
        if(text&&translations.ko[text]&&!node.parentNode.hasAttribute('data-i18n-key')){
            const span=document.createElement('span');
            span.setAttribute('data-i18n-key',text);span.textContent=text;
            textNodes.push({node,span,originalText:orig});
        }
    }
    textNodes.forEach(({node,span,originalText})=>{
        const frag=document.createDocumentFragment();
        const ls=originalText.match(/^\s+/),ts=originalText.match(/\s+$/);
        if(ls)frag.appendChild(document.createTextNode(ls[0]));
        frag.appendChild(span);
        if(ts)frag.appendChild(document.createTextNode(ts[0]));
        node.parentNode.replaceChild(frag,node);
    });
}

}
