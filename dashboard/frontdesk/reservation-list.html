    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
.m-filter-trigger{display:none;height:36px;padding:0 12px;border:1px solid var(--border);border-radius:var(--radius-sm);background:#fff;font-size:.75rem;font-weight:600;color:var(--txt);cursor:pointer;font-family:var(--font);align-items:center;gap:6px;white-space:nowrap;flex-shrink:0}
.m-filter-trigger i{font-size:.65rem;color:var(--txt3)}
.bottom-sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:9998;opacity:0;pointer-events:none;transition:opacity .3s}
.bottom-sheet-overlay.active{opacity:1;pointer-events:auto}
.bottom-sheet{position:fixed;bottom:0;left:0;right:0;z-index:9999;background:#fff;border-radius:16px 16px 0 0;transform:translateY(100%);transition:transform .35s cubic-bezier(.32,.72,0,1);max-height:70vh;box-shadow:0 -4px 30px rgba(0,0,0,.15)}
.bottom-sheet.active{transform:translateY(0)}
.bottom-sheet-handle{width:36px;height:4px;border-radius:2px;background:var(--border);margin:10px auto 0}
.bottom-sheet-title{padding:16px 20px 8px;font-size:.88rem;font-weight:700;color:var(--txt)}
.bottom-sheet-options{padding:0 12px 20px}
.bs-option{display:flex;align-items:center;gap:12px;padding:13px 12px;border-radius:var(--radius-sm);cursor:pointer;transition:background .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);font-size:.82rem;color:var(--txt)}
.bs-option:hover,.bs-option:active{background:var(--border2)}
.bs-option.selected{background:rgba(99,102,241,.06);color:var(--primary);font-weight:700}
.bs-option-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:.8rem;flex-shrink:0}
.bs-option-check{margin-left:auto;font-size:.8rem;color:var(--primary);opacity:0}
.bs-option.selected .bs-option-check{opacity:1}
.bs-option-count{font-size:.7rem;background:var(--border2);border-radius:10px;padding:2px 8px;color:var(--txt2);font-weight:600}
.bs-option.selected .bs-option-count{background:rgba(99,102,241,.12);color:var(--primary)}
@media(max-width:768px){
    .m-filter-trigger{display:flex}
    .filter-chips{display:none!important}
    .filter-left{flex-direction:row!important;gap:8px!important;flex-wrap:nowrap!important;align-items:center!important}
    .filter-left .search-box{flex:1;min-width:0;width:auto!important}
}
</style>
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>

<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
    <header class="topbar">
        <div class="topbar-left">

            <h1 data-i18n-key="Booking List">예약 목록</h1>

        </div>
        <div class="topbar-right">

    <div class="content">

                <div class="filter-chips">
                    <button class="chip active" data-filter="all" onclick="setFilter(this,'all')">All <span class="chip-count">24</span></button>
                    <button class="chip" data-filter="confirmed" onclick="setFilter(this,'confirmed')">Confirmed <span class="chip-count">14</span></button>
                    <button class="chip" data-filter="pending" onclick="setFilter(this,'pending')">Pending <span class="chip-count">4</span></button>
                    <button class="chip" data-filter="checkedin" onclick="setFilter(this,'checkedin')">Check-in <span class="chip-count">3</span></button>
                    <button class="chip" data-filter="checkout" onclick="setFilter(this,'checkout')">Check-out <span class="chip-count">2</span></button>
                    <button class="chip" data-filter="cancelled" onclick="setFilter(this,'cancelled')">Cancel <span class="chip-count">1</span></button>
                </div>
                <button class="m-filter-trigger" onclick="openResBS()">

                    <span id="mResFilterLabel">All</span>
                    <i class="fa-solid fa-chevron-down"></i>
                </button>
            </div>
            <div class="filter-right">
                <button class="btn-outline" onclick="window.location.href='../download/Export_Data.xlsx'"><i class="fa-solid fa-download"></i> Export</button>

            </div>
        </div>

        <!-- RESERVATION TABLE (desktop) -->
        <div class="card desktop-only" style="margin-top:16px">

                                <th>Booking #</th>
                                <th>Guest</th>
                                <th>Room</th>
                                <th>Type</th>
                                <th>Check-in</th>
                                <th>Check-out</th>
                                <th>Stay</th>

<script>
// ===== RESERVATION DATA =====
let reservations = [];
fetch('../data/reservations.json')
    .then(res => res.json())
    .then(data => {
        reservations = data.map(r => ({
            id: r.id,
            guest: r.guest,
            dates: r.checkIn + ' ~ ' + r.checkOut,
            rt: r.roomType,
            status: r.status,
            channel: r.channel,
            amt: 120000 // default mock amount
        }));
        if(typeof renderList === 'function') renderList();
    })
    .catch(err => console.error(err));


const statusConfig = {
    confirmed: {label:'Confirmed',cls:'confirmed'},
    pending: {label:'Pending',cls:'checkout'},
    checkedin: {label:'Check-in',cls:'checkin'},
    checkout: {label:'Check-out',cls:'vip'},
    cancelled: {label:'Cancel',cls:'cancelled'}
};

let currentFilter = 'all';

function renderTable() {
    const tbody = document.getElementById('resBody');
    const mobileContainer = document.getElementById('resMobileCards');
    const search = document.getElementById('searchInput').value.toLowerCase();
    
    const filtered = reservations.filter(r => {
        if (currentFilter !== 'all' && r.status !== currentFilter) return false;
        if (search && !r.guest.toLowerCase().includes(search) && !r.room.toLowerCase().includes(search) && !r.id.toLowerCase().includes(search)) return false;
        return true;
    });

    // Desktop table
    tbody.innerHTML = filtered.map(r => {
        const st = statusConfig[r.status];
        const isVip = r.vip.includes('VIP') || r.vip.includes('Gold');
        return `
        <tr>
            <td><input type="checkbox" class="row-check"></td>
            <td><span class="res-id">${r.id}</span></td>
            <td>
                <div class="guest-cell">
                    <div class="guest-avatar" style="background:${r.color}">${r.initials}</div>
                    <div>
                        ${r.guest}${isVip ? ' <i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.6rem"></i>' : ''}
                        <span style="font-size:.72rem;color:#9CA3AF;margin-left:6px">${r.vip}</span>
                    </div>
                </div>
            </td>
            <td><span class="room-tag">${r.room}</span></td>
            <td>${r.type}</td>
            <td>${r.cin}</td>
            <td>${r.cout}</td>
            <td>${r.nights}박</td>
            <td><span class="channel-tag ${r.channel.toLowerCase().replace('-','')}">${r.channel}</span></td>
            <td style="font-weight:700">$${r.amount.toLocaleString('en',{minimumFractionDigits:2})}</td>
            <td><span class="status-badge ${st.cls}">${st.label}</span></td>
            <td>
                <div class="action-btns">
                    <button class="act-btn" title="상세보기"><i class="fa-solid fa-eye"></i></button>
                    <button class="act-btn" title="수정"><i class="fa-solid fa-pen"></i></button>
                    <button class="act-btn danger" title="Cancel"><i class="fa-solid fa-xmark"></i></button>
                </div>
            </td>
        </tr>`;
    }).join('');

    // Mobile cards
    mobileContainer.innerHTML = filtered.map(r => {
        const st = statusConfig[r.status];
        const isVip = r.vip.includes('VIP') || r.vip.includes('Gold');
        return `
        <div class="m-res-card">
            <div class="m-res-top">
                <div class="m-res-guest">
                    <div class="guest-avatar" style="background:${r.color}">${r.initials}</div>
                    <div>
                        <div class="m-res-name">${r.guest} ${isVip ? '<i class="fa-solid fa-crown" style="color:#F59E0B;font-size:.65rem"></i>' : ''}</div>
                        <div class="m-res-sub">${r.vip}</div>
                    </div>
                </div>
                <div style="text-align:right">
                    <span class="status-badge ${st.cls}">${st.label}</span>
                    <div class="m-res-amount">$${r.amount.toLocaleString('en',{minimumFractionDigits:2})}</div>
                </div>
            </div>
            <div class="m-res-details">
                <div class="m-res-detail"><i class="fa-solid fa-door-open"></i> <span class="room-tag">${r.room}</span> ${r.type}</div>
                <div class="m-res-detail"><i class="fa-solid fa-calendar"></i> ${r.cin} → ${r.cout} (${r.nights}박)</div>
                <div class="m-res-detail"><i class="fa-solid fa-globe"></i> <span class="channel-tag ${r.channel.toLowerCase().replace('-','')}">${r.channel}</span></div>
            </div>
            <div class="m-res-actions">
                <button class="act-btn"><i class="fa-solid fa-eye"></i> 상세</button>
                <button class="act-btn"><i class="fa-solid fa-pen"></i> 수정</button>
                <button class="act-btn danger"><i class="fa-solid fa-xmark"></i> Cancel</button>
            </div>
        </div>`;
    }).join('');
}

function setFilter(btn, filter) {
    currentFilter = filter;
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    btn.classList.add('active');
    renderTable();
}

function filterTable() { renderTable(); }
function toggleAll() {
    const checked = document.getElementById('checkAll').checked;
    document.querySelectorAll('.row-check').forEach(c => c.checked = checked);
}

// ===== MOBILE MENU =====
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.sidebar-overlay').classList.toggle('active');
}

// ===== BOTTOM SHEET =====
function openResBS() {
    document.getElementById('resBsOverlay').classList.add('active');
    document.getElementById('resBsPanel').classList.add('active');
}
function closeResBS() {
    document.getElementById('resBsOverlay').classList.remove('active');
    document.getElementById('resBsPanel').classList.remove('active');
}
function selectResFilter(btn, filter, label) {
    currentFilter = filter;
    document.querySelectorAll('.bs-option').forEach(o => o.classList.remove('selected'));
    btn.classList.add('selected');
    document.getElementById('mResFilterLabel').textContent = label;
    // Sync desktop chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    const target = document.querySelector(`.chip[data-filter="${filter}"]`);
    if (target) target.classList.add('active');
    closeResBS();
    renderTable();
}

renderTable();

function setupI18n(){
    const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);
    let node; const textNodes=[];
    while(node=walk.nextNode()){
        const orig=node.nodeValue,text=orig.trim();
        if(text&&translations.ko[text]&&!node.parentNode.hasAttribute('data-i18n-key')){
            const span=document.createElement('span');
            span.setAttribute('data-i18n-key',text);span.textContent=text;
            textNodes.push({node,span,originalText:orig});
        }
    }
    textNodes.forEach(({node,span,originalText})=>{
        const frag=document.createDocumentFragment();
        const ls=originalText.match(/^\s+/),ts=originalText.match(/\s+$/);
        if(ls)frag.appendChild(document.createTextNode(ls[0]));
        frag.appendChild(span);
        if(ts)frag.appendChild(document.createTextNode(ts[0]));
        node.parentNode.replaceChild(frag,node);
    });
}
function changeLang(lang){
    currentLang=lang;
    const dict=translations[lang]||translations.ko;
    document.querySelectorAll('[data-i18n-key]').forEach(el=>{
        const key=el.getAttribute('data-i18n-key');
        if(dict[key])el.textContent=dict[key];
    });
    document.getElementById('searchInput').placeholder = lang==='en' ? 'Search by name, room, booking #...' : '이름, Room번호, Booking # 검색...';
}

<!-- NEW RESERVATION MODAL -->
<!-- New Booking Stepper Modal -->
<div class="modal-overlay" id="newResModal" onclick="if(event.target===this) closeModal('newResModal')">
    <div class="modal-card" style="max-width:700px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">신규 예약 등록 (New Booking)</h3>
            <button class="modal-close" onclick="closeModal('newResModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:16px;max-height:60vh;overflow-y:auto">
            
            <!-- STEP 1: Guest Search -->
            <div id="step1-content">
                <div style="display:flex;gap:10px;margin-bottom:16px">
                    <input type="text" id="resGuestSearch" style="flex:1;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font)" placeholder="이름, 이메일, 전화번호 검색...">
                    <button class="btn-primary-sm" onclick="searchGuest()"><i class="fa-solid fa-magnifying-glass"></i> 검색</button>
                </div>
                
                <div id="guestSearchResults" style="border:1px solid var(--border);border-radius:4px;padding:16px;background:#f8fafc;text-align:center;color:var(--txt2)">
                    검색어를 입력해 주세요.
                </div>
                
                <div id="newGuestForm" style="display:none;margin-top:16px;border:1px solid var(--primary);border-radius:4px;padding:16px;background:#eff6ff">
                    <h4 style="margin-bottom:12px;color:var(--primary)"><i class="fa-solid fa-user-plus"></i> 신규 고객 등록</h4>
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                        <div>
                            <label style="font-size:0.75rem;font-weight:600;color:var(--txt2)">이름 (First Name)*</label>
                            <input type="text" id="newGFName" style="width:100%;height:34px;border:1px solid var(--border);border-radius:4px;padding:0 8px">
                        </div>
                        <div>
                            <label style="font-size:0.75rem;font-weight:600;color:var(--txt2)">성 (Last Name)*</label>
                            <input type="text" id="newGLName" style="width:100%;height:34px;border:1px solid var(--border);border-radius:4px;padding:0 8px">
                        </div>
                        <div>
                            <label style="font-size:0.75rem;font-weight:600;color:var(--txt2)">연락처*</label>
                            <input type="text" id="newGPhone" style="width:100%;height:34px;border:1px solid var(--border);border-radius:4px;padding:0 8px">
                        </div>
                        <div>
                            <label style="font-size:0.75rem;font-weight:600;color:var(--txt2)">국적</label>
                            <input type="text" id="newGNation" style="width:100%;height:34px;border:1px solid var(--border);border-radius:4px;padding:0 8px">
                        </div>
                    </div>
                    <div style="margin-top:12px;display:flex;justify-content:flex-end">
                        <button class="btn-primary-sm" onclick="saveNewGuest()">저장 및 선택</button>
                    </div>
                </div>
            </div>

            <!-- STEP 2: Stay Details -->
            <div id="step2-content" style="display:block;margin-top:24px;padding-top:24px;border-top:1px dashed var(--border)">
                <div style="background:var(--bg);padding:12px;border-radius:4px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border)">
                    <div>
                        <span style="font-size:0.75rem;color:var(--txt3)">선택된 고객:</span>
                        <strong id="selectedGuestName" style="margin-left:8px;font-size:1.05rem;color:var(--txt)">-</strong>
                        <span id="selectedGuestTier" class="role-badge" style="background:var(--primary-lt);color:var(--primary);margin-left:8px"></span>
                    </div>
                    <button class="btn-outline-sm" onclick="goToStep(1)">변경</button>
                </div>
                
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
                    <div>
                        <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Check-in *</label>
                        <input type="date" style="width:100%;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font)">
                    </div>
                    <div>
                        <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Check-out *</label>
                        <input type="date" style="width:100%;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font)">
                    </div>
                    <div>
                        <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">Room Type *</label>
                        <select style="width:100%;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                            <option>Standard Double</option>
                            <option>Deluxe King</option>
                            <option>Executive Suite</option>
                        </select>
                    </div>
                    <div>
                        <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">요금제 (Rate Plan) *</label>
                        <select style="width:100%;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff">
                            <option>BAR (Best Available Rate)</option>
                            <option>Corporate Rate</option>
                            <option>OTA Promo</option>
                        </select>
                    </div>
                </div>
            </div>

            <!-- STEP 3: Confirm -->
            <div id="step3-content" style="display:block;margin-top:24px;padding-top:24px;border-top:1px dashed var(--border)">
                <div style="background:#f8fafc;padding:20px;border-radius:4px;border:1px solid var(--border)">
                    <h4 style="margin-bottom:16px">요금 및 결제 정보</h4>
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                        <span>객실 요금 (Total Room Rate)</span>
                        <strong style="color:var(--txt)">₩ 240,000</strong>
                    </div>
                    <div style="display:flex;justify-content:space-between;margin-bottom:8px">
                        <span>세금 및 봉사료 (Tax & Svc)</span>
                        <strong style="color:var(--txt)">₩ 24,000</strong>
                    </div>
                    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
                    <div style="display:flex;justify-content:space-between;font-size:1.1rem;font-weight:700">
                        <span>총 결제 예정 금액</span>
                        <span style="color:var(--primary)">₩ 264,000</span>
                    </div>
                    <div style="margin-top:20px">
                        <label style="font-size:.8rem;font-weight:600;color:var(--txt2)">보증금(Deposit) 결제 방식</label>
                        <select style="width:100%;height:38px;border:1px solid var(--border);border-radius:4px;padding:0 10px;font-family:var(--font);background:#fff;margin-top:6px">
                            <option>카드 결제 (현장)</option>
                            <option>온라인 결제 완료 (OTA)</option>
                            <option>보증금 없음 (무통장)</option>
                        </select>
                    </div>
                </div>
            </div>

        </div>
        
        <div class="modal-footer" style="padding:16px 20px;border-top:1px solid var(--border2);display:flex;justify-content:space-between;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeModal('newResModal')">취소 (Cancel)</button>
            <div>
                
                
                <button id="btnSubmit" class="btn-primary-sm" onclick="submitReservation()"><i class="fa-solid fa-check"></i> 예약 확정</button>
            </div>
        </div>
    </div>
</div>


<script>
let currentStep = 1;
let selectedGuest = null;

function searchGuest() {
    const q = document.getElementById('resGuestSearch').value;
    const res = document.getElementById('guestSearchResults');
    if(q.trim() === '') {
        res.innerHTML = '검색어를 입력해 주세요.';
        return;
    }
    
    // Dummy Search Logic
    if(q.includes('Tran') || q.includes('Lin')) {
        res.innerHTML = `
            <div style="display:flex;justify-content:space-between;align-items:center;padding:12px;background:#fff;border:1px solid var(--border);border-radius:4px;text-align:left">
                <div>
                    <strong>Tran Linh</strong> <span class="role-badge" style="background:var(--purple-lt);color:var(--purple);margin-left:6px">Diamond</span><br>
                    <span style="font-size:0.8rem;color:var(--txt2)">+84 91 888 9999 | Vietnam | 방문 24회</span>
                </div>
                <button class="btn-primary-sm" onclick="selectGuest('Tran Linh', 'Diamond')">선택</button>
            </div>
        `;
        document.getElementById('newGuestForm').style.display = 'none';
    } else {
        res.innerHTML = `<div style="color:var(--danger);margin-bottom:12px">검색 결과가 없습니다.</div>
            <button class="btn-outline-sm" onclick="document.getElementById('newGuestForm').style.display='block'">신규 고객 등록하기</button>`;
    }
}

function selectGuest(name, tier) {
    selectedGuest = { name, tier };
    document.getElementById('selectedGuestName').textContent = name;
    document.getElementById('selectedGuestTier').textContent = tier;
    
    showToast(`${name} 고객이 선택되었습니다.`);
}

function saveNewGuest() {
    const fn = document.getElementById('newGFName').value;
    const ln = document.getElementById('newGLName').value;
    if(!fn || !ln) {
        showToast('이름과 성을 입력해주세요.', 'error');
        return;
    }
    const fullName = `${fn} ${ln}`;
    selectGuest(fullName, 'Standard');
    document.getElementById('newGuestForm').style.display = 'none';
    document.getElementById('resGuestSearch').value = fullName;
    document.getElementById('guestSearchResults').innerHTML = `<div style="color:var(--success);font-weight:600">신규 고객 등록 완료</div>`;
}

function goToStep(step) {
    currentStep = step;
    
    // Update Tabs
    [1,2,3].forEach(i => {
        const t = document.getElementById(`step${i}-tab`);
        if(i === step) {
            t.style.color = 'var(--primary)';
            t.style.fontWeight = '700';
            t.querySelector('i').style.background = 'var(--primary)';
        } else {
            t.style.color = 'var(--txt3)';
            t.style.fontWeight = '600';
            t.querySelector('i').style.background = 'var(--txt3)';
        }
        document.getElementById(`step${i}-content`).style.display = (i === step) ? 'block' : 'none';
    });

    // Update Buttons
    document.getElementById('btnPrev').style.display = (step > 1) ? 'inline-block' : 'none';
    if(step === 3) {
        document.getElementById('btnNext').style.display = 'none';
        document.getElementById('btnSubmit').style.display = 'inline-block';
    } else {
        document.getElementById('btnNext').style.display = 'inline-block';
        document.getElementById('btnSubmit').style.display = 'none';
    }
}

function goNext() { if(currentStep < 3) goToStep(currentStep + 1); }
function goPrev() { if(currentStep > 1) goToStep(currentStep - 1); }

function submitReservation() {
    showToast('예약이 성공적으로 등록되었습니다.');
    closeModal('newResModal');
    // Reset stepper
    setTimeout(() => {
        goToStep(1);
        selectedGuest = null;
        
        document.getElementById('resGuestSearch').value = '';
        document.getElementById('guestSearchResults').innerHTML = '검색어를 입력해 주세요.';
    }, 500);
}
</script>
</body>
</html>
