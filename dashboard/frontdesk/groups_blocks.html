<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>단체/행사 목록 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
    <style>
        .filter-bar-mt {
            display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
            padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
        }
        .filter-left { display: flex; align-items: center; gap: 12px; flex: 1; flex-wrap: nowrap; overflow-x: visible; -webkit-overflow-scrolling: touch; }
        .filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
        .search-box-mt {
            display: flex; align-items: center; gap: 8px;
            padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
            background: #fff; transition: border-color .2s; width: 210px;
        }
        .search-box-mt:focus-within { border-color: var(--primary); }
        .search-box-mt i { color: var(--txt3); font-size: .85rem; }
        .search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
        @media(max-width:768px){
            .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
            .search-box-mt { flex: 1; min-width: 0; width: auto; }
            .filter-left { flex-direction: column; align-items: stretch; overflow: visible; gap: 10px; }
            .filter-left > div { width: 100%; }
            .filter-chips { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 8px; }
            .filter-chips .chip { justify-content: center; min-width: 0; padding-inline: 8px; }
            .filter-right { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); width: 100%; }
            .filter-right .btn-outline,
            .filter-right .btn-primary-sm { justify-content: center; width: 100%; padding-inline: 10px !important; }
        }

        .modal-overlay {
            position: fixed; inset: 0;
            background: rgba(0,0,0,.45);
            z-index: 500;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; visibility: hidden;
            transition: opacity .2s, visibility .2s;
            backdrop-filter: blur(3px);
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal-card {
            background: #fff; border-radius: 12px;
            width: 560px; max-width: 95vw; max-height: 90vh;
            display: flex; flex-direction: column;
            box-shadow: 0 20px 60px rgba(0,0,0,.2);
            transform: scale(.95); transition: transform .2s;
        }
        .modal-overlay.active .modal-card { transform: scale(1); }
        .modal-header { padding: 18px 20px; border-bottom: 1px solid var(--border2); display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
        .modal-header h3 { font-size: 1rem; font-weight: 700; margin: 0; }
        .modal-close { width: 28px; height: 28px; border: none; background: none; color: var(--txt3); cursor: pointer; font-size: .9rem; display: flex; align-items: center; justify-content: center; border-radius: 6px; }
        .modal-close:hover { background: var(--border2); }
        .modal-body { padding: 20px; overflow-y: auto; flex: 1; }
        .modal-footer { padding: 14px 20px; border-top: 1px solid var(--border2); display: flex; justify-content: flex-end; gap: 8px; flex-shrink: 0; }

        .group-card {
            background: #fff; border: 1px solid var(--border); border-radius: 12px;
            padding: 20px; display: flex; flex-direction: column; gap: 16px;
            transition: box-shadow 0.2s;
        }
        .group-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.07); }
        .group-card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; }
        .group-name { font-size: 1rem; font-weight: 700; color: var(--txt); }
        .group-type { font-size: 0.75rem; color: var(--txt3); font-weight: 500; }
        .group-meta { display: flex; flex-wrap: wrap; gap: 10px; }
        .group-meta-item { display: flex; align-items: center; gap: 6px; font-size: 0.8rem; color: var(--txt2); }
        .group-meta-item i { color: var(--txt3); width: 14px; }
        .group-card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border2); padding-top: 14px; }
        .group-rooms { display: flex; gap: 16px; }
        .group-room-stat { text-align: center; }
        .group-room-stat .val { font-size: 1.2rem; font-weight: 800; color: var(--primary); }
        .group-room-stat .lbl { font-size: 0.7rem; color: var(--txt3); font-weight: 500; }
        .progress-bar { height: 6px; background: var(--border2); border-radius: 99px; overflow: hidden; margin-top: 4px; }
        .progress-fill { height: 100%; background: var(--primary); border-radius: 99px; transition: width 0.4s; }
        .status-pill {
            display: inline-flex; align-items: center; gap: 5px;
            padding: 4px 12px; border-radius: 20px;
            font-size: 0.72rem; font-weight: 700;
        }
        .pill-confirmed { background: #EFF6FF; color: #2563EB; }
        .pill-inhouse   { background: #ECFDF5; color: #059669; }
        .pill-pending   { background: #FEF3C7; color: #D97706; }
        .pill-departed  { background: #F1F5F9; color: #64748B; }
        .kpi-grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
        @media(max-width: 768px) { .kpi-grid-4 { grid-template-columns: repeat(2, 1fr); } }
    </style>
</head>
<body>
    <div class="main">
        <header class="topbar">
            <div class="topbar-left">
                <button class="mobile-menu-btn" onclick="PMS_Sidebar.toggleMenu()">
                    <i class="fa-solid fa-bars"></i>
                </button>
                <h1 data-i18n-key="Group Events">단체/행사 목록</h1>
            </div>
            <div class="topbar-right">
                <div class="search-box">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" placeholder="예약번호, 고객명 검색..." id="global-search-input">
                </div>
                <button class="btn-icon" title="알림"><i class="fa-regular fa-bell"></i><span class="badge">3</span></button>
                <button class="btn-icon" title="설정"><i class="fa-solid fa-gear"></i></button>
                <select id="langSelect" class="lang-select" onchange="changeLang(this.value)">
                    <option value="ko">한국어</option>
                    <option value="en">English</option>
                </select>
            </div>
        </header>

        <div class="content">
            <!-- KPI Cards -->
            <div class="kpi-grid-4">
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#EFF6FF;color:#2563EB"><i class="fa-solid fa-users-rectangle"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-label">전체 행사</div>
                        <div class="kpi-value" id="kpiTotalGroups">5</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#ECFDF5;color:#059669"><i class="fa-solid fa-bed"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-label">현재 투숙 중</div>
                        <div class="kpi-value" id="kpiInhouse">2</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#F5F3FF;color:#7C3AED"><i class="fa-solid fa-door-open"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-label">블록 배정 객실</div>
                        <div class="kpi-value" id="kpiBlocks">128</div>
                    </div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-icon" style="background:#FFF7ED;color:#EA580C"><i class="fa-solid fa-file-invoice-dollar"></i></div>
                    <div class="kpi-info">
                        <div class="kpi-label">미정산 단체</div>
                        <div class="kpi-value" id="kpiUnpaid">1</div>
                    </div>
                </div>
            </div>

            <!-- Filter Bar -->
            <div class="filter-bar-mt">
                <div class="filter-left">
                    <div style="display:flex;align-items:center;gap:8px">
                        <div class="search-box-mt">
                            <i class="fa-solid fa-magnifying-glass"></i>
                            <input type="text" placeholder="행사(블록)명 검색..." oninput="searchGroups(this.value)">
                        </div>
                    </div>
                    <div class="filter-chips">
                        <button class="chip active" onclick="filterGroups('all', this)" id="chip-all">전체 <span class="chip-count">0</span></button>
                        <button class="chip" onclick="filterGroups('confirmed', this)" id="chip-confirmed">확정 <span class="chip-count">0</span></button>
                        <button class="chip" onclick="filterGroups('inhouse', this)" id="chip-inhouse">투숙 중 <span class="chip-count">0</span></button>
                        <button class="chip" onclick="filterGroups('pending', this)" id="chip-pending">대기 <span class="chip-count">0</span></button>
                        <button class="chip" onclick="filterGroups('departed', this)" id="chip-departed">체크아웃 <span class="chip-count">0</span></button>
                    </div>
                </div>
                <div class="filter-right">
                    <button class="btn-outline" style="height:38px" onclick="showToast('다운로드 되었습니다.')"><i class="fa-solid fa-download"></i> 다운로드</button>
                    <button class="btn-primary-sm" style="height:38px;padding:0 16px" onclick="createGroupEvent()">
                        <i class="fa-solid fa-plus"></i> 신규 행사 생성
                    </button>
                </div>
            </div>

            <!-- Group Cards Grid -->
            <div id="groupGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(440px,1fr));gap:16px">
            </div>
            <div id="emptyState" style="display:none;text-align:center;padding:60px 20px;color:var(--txt3)">
                <i class="fa-solid fa-users-slash" style="font-size:2.5rem;margin-bottom:12px;display:block"></i>
                해당 조건의 단체 예약이 없습니다.
            </div>

        </div>
    </div>

    <!-- 신규 행사(블록) 등록 Modal -->
    <div class="modal-overlay" id="newGroupModal" onclick="if(event.target===this)closeModal('newGroupModal')">
        <div class="modal-card" style="max-width:560px;width:95vw">
            <div class="modal-header">
                <h3 class="modal-title" id="ngModalTitle">신규 객실 배정</h3>
                <input type="hidden" id="ngId" value="">
                <button class="modal-close" onclick="closeModal('newGroupModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
                <div>
                    <label class="form-label">행사(블록)명 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="ngName" class="form-input" style="width:100%" placeholder="예: Samsung Tech Conference 2026" data-ko="예: Samsung Tech Conference 2026" data-en="E.g. Samsung Tech Conference 2026">
                </div>
                <div>
                    <label class="form-label">주관 업체 (Agency / Corporate) <span style="color:var(--danger)">*</span></label>
                    <select id="ngAgency" class="form-input" style="width:100%">
                        <!-- Dynamically populated -->
                    </select>
                </div>
                <div>
                    <label class="form-label">행사 유형</label>
                    <select id="ngType" class="form-input" style="width:100%">
                        <option value="기업 행사 / 컨퍼런스" data-ko="기업 행사 / 컨퍼런스" data-en="Corporate Event / Conference">기업 행사 / 컨퍼런스</option>
                        <option value="결혼식 / 웨딩" data-ko="결혼식 / 웨딩" data-en="Wedding">결혼식 / 웨딩</option>
                        <option value="여행사 단체" data-ko="여행사 단체" data-en="Travel Agency Group">여행사 단체</option>
                        <option value="스포츠팀" data-ko="스포츠팀" data-en="Sports Team">스포츠팀</option>
                        <option value="기타" data-ko="기타" data-en="Other">기타</option>
                    </select>
                </div>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div>
                        <label class="form-label">체크인 <span style="color:var(--danger)">*</span></label>
                        <input type="date" id="ngCheckin" class="form-input" style="width:100%">
                    </div>
                    <div>
                        <label class="form-label">체크아웃 <span style="color:var(--danger)">*</span></label>
                        <input type="date" id="ngCheckout" class="form-input" style="width:100%">
                    </div>
                </div>
                <!-- Dynamic Room Allocation -->
                <div style="background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:12px;">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <label class="form-label" style="margin:0;">객실 할당 및 가변 단가 설정 <span style="color:var(--danger)">*</span></label>
                        <button class="btn-outline-sm" onclick="addAllocationRow()" type="button"><i class="fa-solid fa-plus"></i> 객실 추가</button>
                    </div>
                    <div id="allocationContainer" style="display:flex; flex-direction:column; gap:8px;">
                        <!-- Rows will be added here via JS -->
                    </div>
                    <div style="margin-top:12px; font-weight:600; font-size:0.85rem; color:var(--txt);">
                        총 할당 객실 수: <span id="ngTotalBlock" style="color:var(--primary); font-size:1rem;">0</span> 객실
                    </div>
                </div>
                <div>
                    <label class="form-label">총 인원</label>
                    <input type="number" id="ngPax" class="form-input" style="width:100%" min="1" placeholder="20">
                </div>
                <div>
                    <label class="form-label">결제 방식</label>
                    <select id="ngRouting" class="form-input" style="width:100%">
                        <option value="단체 일괄 정산" data-ko="단체 일괄 정산" data-en="Group Batch Settlement">단체 일괄 정산</option>
                        <option value="개별 정산" data-ko="개별 정산" data-en="Individual Settlement">개별 정산</option>
                        <option value="혼합 정산" data-ko="혼합 정산" data-en="Mixed Settlement">혼합 정산</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">담당자 연락처</label>
                    <input type="text" id="ngContact" class="form-input" style="width:100%" placeholder="예: 홍길동 / 010-1234-5678" data-ko="예: 홍길동 / 010-1234-5678" data-en="E.g. Hong Gil-dong / 010-1234-5678">
                </div>
                <div>
                    <label class="form-label">특이사항 / 메모</label>
                    <textarea id="ngNote" class="form-input" style="width:100%;min-height:70px;resize:vertical" placeholder="VIP 요청, 조식 포함, 특별 케이터링 등..." data-ko="VIP 요청, 조식 포함, 특별 케이터링 등..." data-en="VIP requests, breakfast included, special catering, etc."></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal('newGroupModal')">취소</button>
                <button class="btn-primary-sm" onclick="saveGroup()"><i class="fa-solid fa-check"></i> 저장</button>
            </div>
        </div>
    </div>

    <!-- 행사 상세 Modal -->
    <div class="modal-overlay" id="groupDetailModal" onclick="if(event.target===this)closeModal('groupDetailModal')">
        <div class="modal-card" style="max-width:600px;width:95vw">
            <div class="modal-header">
                <h3 class="modal-title" id="detailGroupName">행사 상세</h3>
                <button class="modal-close" onclick="closeModal('groupDetailModal')"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body" id="detailBody" style="padding:0">
            </div>
            <div class="modal-footer">
                <button class="btn-outline" onclick="closeModal('groupDetailModal')">닫기</button>
                <button class="btn-primary-sm" onclick="showToast('단체 일괄 정산 화면으로 이동합니다.')"><i class="fa-solid fa-file-invoice-dollar"></i> <span data-ko="정산 보기" data-en="View Settlement">정산 보기</span></button>
            </div>
        </div>
    </div>

<script>
function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

const statusMap = {
    confirmed: { label: '확정',      cls: 'pill-confirmed' },
    inhouse:   { label: '투숙 중',   cls: 'pill-inhouse' },
    pending:   { label: '대기',      cls: 'pill-pending' },
    departed:  { label: '체크아웃',  cls: 'pill-departed' },
};

function groupText(key, params = {}) {
    const catalogKey = `group.${key}`;
    if (typeof window.t === 'function') {
        const translated = window.t(catalogKey, params);
        if (translated && translated !== catalogKey) return translated;
    }
    const fallback = {
        'delete.confirm': '[{name}] 행사를 취소/삭제하시겠습니까? 관련 예약에 영향을 줄 수 있습니다.',
        'delete.done': '행사가 취소/삭제되었습니다.'
    };
    let text = fallback[key] || key;
    Object.keys(params).forEach(name => {
        text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
    });
    return text;
}

let groups = [];
let currentFilter = 'all';

function groupCompanyLang() {
    return localStorage.getItem('pms_lang') || window.currentLang || 'ko';
}

function groupCompanyTypeKey(value) {
    const type = String(value || '').trim().toLowerCase();
    if (['corporate', 'corporation', 'company', 'enterprise', '기업', '일반 기업'].includes(type)) return 'Corporate';
    if (['agency', 'travel agency', 'travel_agency', 'ota', '여행사'].includes(type)) return 'Travel Agency';
    if (['government', 'gov', 'public', 'government/public', '정부', '공공기관', '정부/공공기관'].includes(type)) return 'Government';
    if (['other', '기타', '기타 단체'].includes(type)) return 'Other';
    return '';
}

function groupCompanyTypeLabel(value) {
    const key = groupCompanyTypeKey(value);
    const labels = {
        ko: {
            Corporate: '일반 기업',
            'Travel Agency': '여행사',
            Government: '정부/공공기관',
            Other: '기타'
        },
        en: {
            Corporate: 'Corporate',
            'Travel Agency': 'Travel Agency',
            Government: 'Government',
            Other: 'Other'
        }
    };
    if (!key) return String(value || '').trim() || labels[groupCompanyLang()]?.Other || labels.en.Other;
    return (labels[groupCompanyLang()] && labels[groupCompanyLang()][key]) || labels.en[key] || key;
}

function groupEventTypeLabel(value) {
    const raw = String(value || '').trim();
    const key = raw.toLowerCase();
    const ko = {
        'corporate-conference': '기업 행사 / 컨퍼런스',
        'corporate-meeting': '기업 행사 / 컨퍼런스',
        'travel-agency': '여행사 단체',
        'private-group': '일반인 단체',
        'wedding-banquet': '웨딩 / 연회',
        'sports-team': '스포츠팀'
    };
    const en = {
        'corporate-conference': 'Corporate Conference',
        'corporate-meeting': 'Corporate Meeting',
        'travel-agency': 'Travel Agency Group',
        'private-group': 'Private Group',
        'wedding-banquet': 'Wedding / Banquet',
        'sports-team': 'Sports Team'
    };
    if (groupCompanyLang() === 'en') return en[key] || raw || '-';
    return ko[key] || raw || '-';
}

function groupBillingLabel(value) {
    const raw = String(value || '').trim();
    const key = raw.toLowerCase();
    const ko = {
        'master-folio': '단체 일괄 정산',
        'master folio': '단체 일괄 정산',
        'agency-credit': '단체 후불',
        'company-card': '법인카드 정산',
        'frontdesk-prepaid': '프런트 선결제',
        'frontdesk prepaid': '프런트 선결제',
        individual: '개별 결제'
    };
    const en = {
        'master-folio': 'Master Folio',
        'master folio': 'Master Folio',
        'agency-credit': 'Agency Credit',
        'company-card': 'Company Card',
        'frontdesk-prepaid': 'Front Desk Prepaid',
        'frontdesk prepaid': 'Front Desk Prepaid',
        individual: 'Individual Payment'
    };
    if (groupCompanyLang() === 'en') return en[key] || raw || '-';
    return ko[key] || raw.replace(/업체 후불/g, '단체 후불') || '-';
}

function isLegacyGroupSeed(list) {
    return Array.isArray(list) && list.length === 1 && list[0]?.id === 'GRP-1001';
}

function isStaleSamsungGroup(item) {
    return item?.id === 'GRP-2605-01' && item?.name === 'Samsung Tech Conference 2026';
}

function readPersistedGroups() {
    try {
        const stored = JSON.parse(localStorage.getItem('pms_groups') || '[]');
        if (isLegacyGroupSeed(stored)) {
            localStorage.removeItem('pms_groups');
            return [];
        }
        if (!Array.isArray(stored)) return [];
        const cleaned = stored.filter(item => !isStaleSamsungGroup(item));
        if (cleaned.length !== stored.length) localStorage.setItem('pms_groups', JSON.stringify(cleaned));
        return cleaned;
    } catch(e) {
        return [];
    }
}

function mergeGroupsById(...lists) {
    const merged = new Map();
    lists.flat().forEach(item => {
        if (isStaleSamsungGroup(item)) return;
        if (item?.id) merged.set(item.id, item);
    });
    return [...merged.values()];
}

document.addEventListener('DOMContentLoaded', async () => {
    const storedGroups = readPersistedGroups();
    try {
        if (window.PmsAPI?.getGroups) {
            const apiGroups = await window.PmsAPI.getGroups();
            groups = mergeGroupsById(storedGroups, apiGroups);
        }
    } catch(e) {
        console.warn('Group mock load failed', e);
    }
    if (!groups.length) groups = storedGroups;
    updateFilterCounts();
    renderGroups();

    // Auto open logic
    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('newBlock') === 'true') {
        const comp = urlParams.get('comp');
        location.href = `groups_block_detail.html?mode=new${comp ? `&companyId=${encodeURIComponent(comp)}` : ''}`;
        return;
    }
});

});

async function loadCompaniesForDropdown() {
    const stored = localStorage.getItem('pms_companies');
    const sel = document.getElementById('ngAgency');

    sel.innerHTML = '<option value="">주관 업체를 선택하세요</option>';

}

function updateFilterCounts() {
    document.getElementById('chip-all').innerHTML = `전체 <span class="chip-count">${groups.length}</span>`;
    document.getElementById('chip-confirmed').innerHTML = `확정 <span class="chip-count">${groups.filter(g=>g.status==='confirmed').length}</span>`;
    document.getElementById('chip-inhouse').innerHTML = `투숙 중 <span class="chip-count">${groups.filter(g=>g.status==='inhouse').length}</span>`;
    document.getElementById('chip-pending').innerHTML = `대기 <span class="chip-count">${groups.filter(g=>g.status==='pending').length}</span>`;
    document.getElementById('chip-departed').innerHTML = `체크아웃 <span class="chip-count">${groups.filter(g=>g.status==='departed').length}</span>`;

    const inhouseCount = groups.filter(g=>g.status==='inhouse').length;
    const totalBlocks = groups.reduce((sum, g) => sum + (g.block || 0), 0);
    const unpaidCount = groups.filter(g=>g.status!=='departed').length;

    document.getElementById('kpiTotalGroups').textContent = groups.length;
    document.getElementById('kpiInhouse').textContent = inhouseCount;
    document.getElementById('kpiBlocks').textContent = totalBlocks;
    document.getElementById('kpiUnpaid').textContent = unpaidCount;
}

function addAllocationRow(type='Standard Double', count=1, rate='') {
    const container = document.getElementById('allocationContainer');
    const row = document.createElement('div');
    row.style.display = 'grid';
    row.style.gridTemplateColumns = '2fr 1fr 1.5fr auto';
    row.style.gap = '8px';
    row.style.alignItems = 'center';
    
    row.innerHTML = `
        <select class="form-input alloc-type" style="width:100%; padding:6px 10px; font-size:0.85rem;">
            <option ${type==='Standard Double'?'selected':''}>Standard Double</option>
            <option ${type==='Deluxe Twin'?'selected':''}>Deluxe Twin</option>
            <option ${type==='Suite'?'selected':''}>Suite</option>
        </select>
        <input type="number" class="form-input alloc-count" style="width:100%; padding:6px 10px; font-size:0.85rem;" min="1" value="${count}" onchange="calcTotalBlock()" placeholder="수량">
        <input type="number" class="form-input alloc-rate" style="width:100%; padding:6px 10px; font-size:0.85rem;" value="${rate}" placeholder="특별단가(USD)">
        <button type="button" class="btn-outline-sm" style="color:var(--danger); border-color:var(--danger); padding:4px 8px;" onclick="this.parentElement.remove(); calcTotalBlock();"><i class="fa-solid fa-trash"></i></button>
    `;
    container.appendChild(row);
    calcTotalBlock();
}

function calcTotalBlock() {
    const counts = document.querySelectorAll('.alloc-count');
    let total = 0;
    counts.forEach(c => total += parseInt(c.value || 0));
    document.getElementById('ngTotalBlock').textContent = total;
}

function saveGroup() {
    const id = document.getElementById('ngId').value;
    const name = document.getElementById('ngName').value;
    if (!name) { showToast('행사(블록)명을 입력하세요.', 'error'); return; }
    
    const agency = document.getElementById('ngAgency').value;
    const type = document.getElementById('ngType').value;
    const checkin = document.getElementById('ngCheckin').value;
    const checkout = document.getElementById('ngCheckout').value;
    const pax = document.getElementById('ngPax').value || 0;
    const routing = document.getElementById('ngRouting').value;
    const sales = '';
    const contact = document.getElementById('ngContact').value;
    const note = document.getElementById('ngNote').value;

    const allocRows = document.getElementById('allocationContainer').children;
    let allocations = [];
    let block = 0;
    for(let i=0; i<allocRows.length; i++) {
        const row = allocRows[i];
        const rType = row.querySelector('.alloc-type').value;
        const rCount = parseInt(row.querySelector('.alloc-count').value || 0);
        const rRate = parseInt(row.querySelector('.alloc-rate').value || 0);
        if (rCount > 0) {
            allocations.push({ type: rType, count: rCount, rate: rRate });
            block += rCount;
        }
    }
    
    if (block === 0) { showToast('최소 1개 이상의 객실을 할당해야 합니다.', 'error'); return; }

    let toastMessage = '';
    if (id) {
        const g = groups.find(x => x.id === id);
        if (g) {
            g.name = name; g.agency = agency; g.type = type; g.checkin = checkin; g.checkout = checkout;
            g.block = block; g.allocations = allocations; g.pax = parseInt(pax); g.routing = routing;
            g.sales = sales; g.contact = contact; g.note = note;
        }
        toastMessage = '행사 정보가 수정되었습니다.';
    } else {
        const newId = 'GRP-' + Math.floor(Math.random()*10000);
        groups.unshift({
            id: newId, name, agency, type, checkin, checkout, block: block, allocations: allocations,
            pax: parseInt(pax), routing, sales, contact, note,
            status: 'confirmed', pickup: 0
        });
        toastMessage = '신규 객실 배정이 등록되었습니다.';
    }
    
    localStorage.setItem('pms_groups', JSON.stringify(groups));
    closeModal('newGroupModal');
    updateFilterCounts();
    renderGroups();
    showToast(toastMessage);
}

function editGroup(id) {
    loadCompaniesForDropdown();
    const g = groups.find(x => x.id === id);
    if (!g) return;
    document.getElementById('ngModalTitle').textContent = '객실 배정 수정';
    document.getElementById('ngId').value = g.id;
    document.getElementById('ngName').value = g.name || '';
    
    if(g.agency) {
        const agencySel = document.getElementById('ngAgency');
        const aMatch = Array.from(agencySel.options).find(o => o.value.includes(g.agency) || g.agency.includes(o.value));
        if (aMatch) agencySel.value = aMatch.value;
    }
    
    document.getElementById('ngType').value = groupEventTypeLabel(g.type) || '기업 행사 / 컨퍼런스';
    document.getElementById('ngCheckin').value = g.checkin || '';
    document.getElementById('ngCheckout').value = g.checkout || '';
    document.getElementById('ngPax').value = g.pax || '';
    
    const routingSel = document.getElementById('ngRouting');
    const routingLabel = groupBillingLabel(g.routing);
    const rMatch = Array.from(routingSel.options).find(o => o.value.includes(routingLabel) || routingLabel.includes(o.value));
    if (rMatch) routingSel.value = rMatch.value;


    document.getElementById('ngContact').value = g.contact || '';
    document.getElementById('ngNote').value = g.note || '';
    
    document.getElementById('allocationContainer').innerHTML = '';
    if (g.allocations && g.allocations.length > 0) {
        g.allocations.forEach(a => {
            addAllocationRow(a.type, a.count, a.rate);
        });
    } else {
        addAllocationRow('Standard Double', g.block || 1, '');
    }
    
    openModal('newGroupModal');
}

async function deleteGroup(id) {
    const g = groups.find(x => x.id === id);
    if (!g) return;
    if (await showConfirm(groupText('delete.confirm', { name: g.name }))) {
        groups = groups.filter(x => x.id !== id);
        localStorage.setItem('pms_groups', JSON.stringify(groups));
        showToast(groupText('delete.done'));
        updateFilterCounts();
        renderGroups();
    }
}
</script>
<script>
(function(){
    let eventStatusFilter = 'all';

    function parseStored(key) {
        try {
            const data = JSON.parse(localStorage.getItem(key) || '[]');
            return Array.isArray(data) ? data : [];
        } catch(e) {
            return [];
        }
    }
    function companiesData() {
        return parseStored('pms_companies');
    }
    function reservationsData() {
        return Array.isArray(window.reservations) ? window.reservations : parseStored('pms_reservations');
    }
    function roomLabelFromAllocation(a) {
        return a.roomLabel || a.roomId || a.room || a.id || '';
    }
    function assignedRoomsOf(g) {
        const source = Array.isArray(g.roomAllocations) && g.roomAllocations.length ? g.roomAllocations : (Array.isArray(g.allocations) ? g.allocations : []);
        return source.filter(a => a && (a.roomId || a.room || a.id)).map(a => ({
            roomId: a.roomId || a.room || a.id,
            roomLabel: roomLabelFromAllocation(a),
            type: a.type || 'Standard'
        }));
    }
    function groupReservationsOf(groupId) {
        return reservationsData().filter(r => r.groupId === groupId && r.status !== 'cancelled');
    }
    function parseDate(value) {
        if (!value) return null;
        const baseYear = (window.PmsDate?.today ? window.PmsDate.today() : new Date()).getFullYear();
        const d = value.includes('-') ? new Date(value) : new Date(`${baseYear}/${value}`);
        if (Number.isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
    }
    function today() {
        const d = window.PmsDate?.today ? window.PmsDate.today() : new Date();
        d.setHours(0,0,0,0);
        return d;
    }
    function stageOf(g) {
        const now = today();
        const cin = parseDate(g.checkin);
        const cout = parseDate(g.checkout);
        const departedOrPast = g.status === 'departed' || (cout && cout <= now);
        const unsettled = g.settlementStatus === 'pending' || g.settlementStatus === 'unpaid' || (departedOrPast && g.settlementStatus !== 'paid');
        if (unsettled && departedOrPast) return { key:'settlement', label:'정산 필요', cls:'stage-settle' };
        if (cin && cin.getTime() === now.getTime()) return { key:'today', label:'오늘 체크인', cls:'stage-today' };
        if (cin && cout && cin <= now && cout > now) return { key:'active', label:'투숙 중', cls:'stage-live' };
        if (cin && cin > now) return { key:'upcoming', label:'예정', cls:'stage-upcoming' };
        if (cout && cout <= now) return { key:'past', label:'지난 행사', cls:'stage-past' };
        if (g.status === 'inhouse') return { key:'active', label:'투숙 중', cls:'stage-live' };
        if (g.status === 'departed') return { key:'past', label:'지난 행사', cls:'stage-past' };
        return { key:'upcoming', label:'예정', cls:'stage-upcoming' };
    }
    function dday(g) {
        const cin = parseDate(g.checkin);
        if (!cin) return '-';
        const diff = Math.round((cin - today()) / 86400000);
        if (diff === 0) return 'D-Day';
        return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
    }
    function companyOf(g) {
        const companies = companiesData();
        if (g.agencyId) {
            const c = companies.find(x => x.id === g.agencyId);
            if (c) return c;
        }
        if (g.agency) {
            const c = companies.find(x => x.name === g.agency || g.agency.includes(x.name) || x.name.includes(g.agency));
            if (c) return c;
        }
        return null;
    }
    function ensureEventToolbar() {
        const title = document.querySelector('.topbar-left h1');
        if (title) title.textContent = '단체/행사 목록';
        const chips = document.querySelector('.filter-chips');
        if (chips) {
            chips.innerHTML = `
                <button class="chip ${eventStatusFilter === 'all' ? 'active' : ''}" onclick="filterGroups('all', this)">전체</button>
                <button class="chip ${eventStatusFilter === 'today' ? 'active' : ''}" onclick="filterGroups('today', this)">오늘 체크인</button>
                <button class="chip ${eventStatusFilter === 'active' ? 'active' : ''}" onclick="filterGroups('active', this)">투숙 중</button>
                <button class="chip ${eventStatusFilter === 'upcoming' ? 'active' : ''}" onclick="filterGroups('upcoming', this)">예정</button>
                <button class="chip ${eventStatusFilter === 'past' ? 'active' : ''}" onclick="filterGroups('past', this)">지난 행사</button>
                <button class="chip ${eventStatusFilter === 'settlement' ? 'active' : ''}" onclick="filterGroups('settlement', this)">정산 필요</button>`;
        }
        const companySelect = document.getElementById('companyFilter');
        if (companySelect) {
            companySelect.remove();
        }
        const filterRight = document.querySelector('.filter-right');
        if (filterRight) {
            filterRight.innerHTML = `
                <button class="btn-outline" style="height:38px" onclick="location.href='groups_companies.html'"><i class="fa-solid fa-building"></i> 업체 관리</button>
                <button class="btn-primary-sm" style="height:38px;padding:0 16px" onclick="location.href='groups_block_detail.html?mode=new'"><i class="fa-solid fa-plus"></i> 신규 행사 생성</button>`;
        }
    }
    function updateEventKpis() {
        const list = groups || [];
        const inhouse = list.filter(g => stageOf(g).key === 'active').length;
        const rooms = list.reduce((sum, g) => sum + assignedRoomsOf(g).length, 0);
        const settle = list.filter(g => stageOf(g).key === 'settlement' || (stageOf(g).key === 'past' && g.settlementStatus !== 'paid')).length;
        const total = document.getElementById('kpiTotalGroups');
        const live = document.getElementById('kpiInhouse');
        const block = document.getElementById('kpiBlocks');
        const unpaid = document.getElementById('kpiUnpaid');
        if (total) total.textContent = list.length;
        if (live) live.textContent = inhouse;
        if (block) block.textContent = rooms;
        if (unpaid) unpaid.textContent = settle;
    }
    window.filterGroups = function(status, btn) {
        eventStatusFilter = status || 'all';
        currentFilter = eventStatusFilter;
        btn?.closest('.filter-chips')?.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn?.classList.add('active');
        window.renderGroups(document.querySelector('.search-box-mt input')?.value || '');
    };
    window.searchGroups = function(value) {
        window.renderGroups(value || '');
    };
    window.updateFilterCounts = function() {
        updateEventKpis();
    };
    window.renderGroups = function(search = '') {
        ensureEventToolbar();
        updateEventKpis();
        const grid = document.getElementById('groupGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;
        const q = String(search || '').toLowerCase();
        const list = (groups || []).filter(g => {
            const stage = stageOf(g);
            const statusMatch = eventStatusFilter === 'all' || stage.key === eventStatusFilter;
            const roomText = assignedRoomsOf(g).map(r => `${r.roomId} ${r.roomLabel}`).join(' ').toLowerCase();
            const text = [g.name, g.agency, companyOf(g)?.name, g.contact, g.id].filter(Boolean).join(' ').toLowerCase();
            return statusMatch && (!q || text.includes(q) || roomText.includes(q));
        }).sort((a,b) => {
            const order = { today:0, active:1, settlement:2, upcoming:3, past:4 };
            const sa = stageOf(a);
            const sb = stageOf(b);
            if ((order[sa.key] ?? 9) !== (order[sb.key] ?? 9)) return (order[sa.key] ?? 9) - (order[sb.key] ?? 9);
            return (parseDate(a.checkin)?.getTime() || 0) - (parseDate(b.checkin)?.getTime() || 0);
        });
        if (!list.length) {
            grid.style.display = 'none';
            if (empty) {
                empty.style.display = 'block';
                empty.innerHTML = '<i class="fa-solid fa-calendar-xmark" style="font-size:2.5rem;margin-bottom:12px;display:block"></i>해당 조건의 행사가 없습니다.';
            }
            return;
        }
        if (empty) empty.style.display = 'none';
        grid.style.display = 'block';
        grid.innerHTML = `
            <div class="event-register">
                <div class="event-head">
                    <div>운영 상태</div><div>행사 / 업체</div><div>기간</div><div>D-Day</div><div>객실</div><div>투숙객</div><div>정산</div><div></div>
                </div>
                ${list.map(g => {
                    const assigned = assignedRoomsOf(g);
                    const reservations = groupReservationsOf(g.id);
                    const guests = Array.isArray(g.roomingList) ? g.roomingList.length : 0;
                    const stage = stageOf(g);
                    const settlement = g.settlementStatus === 'paid' ? '완료' : (stage.key === 'past' || stage.key === 'settlement' ? '확인 필요' : '진행 전');
                    return `<div class="event-row" role="button" tabindex="0" style="cursor:pointer" onclick="openGroupDetail('${g.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGroupDetail('${g.id}')}">
                        <div data-label="운영 상태"><span class="stage-pill ${stage.cls}">${stage.label}</span></div>
                        <div class="event-main"><div class="event-name">${g.name || '-'}</div><div class="event-company">${g.agency || '등록 단체 필요'} · ${g.id || '-'}</div></div>
                        <div data-label="기간"><div class="event-metric">${g.checkin || '-'} ~ ${g.checkout || '-'}</div><div class="event-sub">${groupEventTypeLabel(g.type)}</div></div>
                        <div data-label="D-Day"><div class="event-metric">${dday(g)}</div></div>
                        <div data-label="객실"><div class="event-metric">${reservations.length}/${assigned.length}실<small>예약/배정</small></div></div>
                        <div data-label="투숙객"><div class="event-metric">${guests}/${g.pax || 0}명<small>등록/총 인원</small></div></div>
                        <div data-label="정산"><div class="event-metric">${settlement}</div></div>
                        <div><button class="btn-outline-sm" onclick="event.stopPropagation(); openGroupDetail('${g.id}')" style="padding:0 14px"><i class="fa-solid fa-gear"></i> 관리</button></div>
                    </div>`;
                }).join('')}
            </div>`;
    };
    document.addEventListener('DOMContentLoaded', () => setTimeout(() => {
        ensureEventToolbar();
        window.renderGroups(document.querySelector('.search-box-mt input')?.value || '');
    }, 20));
})();
</script>
<script>
(function(){
    const labels = {
        modalNew: '신규 객실 배정',
        modalEdit: '객실 배정 수정',
        roomSection: '배정 호실',
        addRoom: '호실 추가',
        roomRequired: '최소 1개 이상의 호실을 배정해야 합니다.',
        nameRequired: '행사(블록)명을 입력하세요.',
        dateRequired: '체크인/체크아웃 날짜를 입력하세요.',
        duplicateRoom: '같은 호실이 중복 배정되었습니다.',
        saved: '객실 배정이 저장되었습니다.',
        updated: '객실 배정이 수정되었습니다.',
        noRooms: '배정 가능한 객실 정보가 없습니다.',
        rooms: '호실',
        roomsAssigned: '배정 호실',
        pickup: '예약 진행',
        reserve: '예약',
        view: '상세',
        edit: '수정',
        folio: '정산',
        blocked: '블록',
        noAssignment: '배정된 호실이 없습니다.'
    };

    let blockRooms = [];
    let blockReservations = [];

    function injectRoomBlockStyles() {
        if (document.getElementById('roomBlockPatchStyles')) return;
        const style = document.createElement('style');
        style.id = 'roomBlockPatchStyles';
        style.textContent = `
            .room-block-panel{background:#f8fafc;border:1px solid var(--border);border-radius:8px;padding:12px}
            .room-block-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px}
            .room-block-title{font-size:.82rem;font-weight:800;color:var(--txt);display:flex;align-items:center;gap:6px}
            .room-alloc-row{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:start;background:#fff;border:1px solid #e2e8f0;border-radius:8px;padding:10px}
            .room-alloc-row + .room-alloc-row{margin-top:8px}
            .room-alloc-row .form-input{padding:8px 10px;font-size:.82rem}
            .room-rate-line{grid-column:1/-1;display:grid;grid-template-columns:1fr 1fr 1.1fr;gap:8px;align-items:center}
            .room-rate-chip{min-height:36px;display:flex;align-items:center;gap:6px;border:1px solid #e2e8f0;background:#f8fafc;border-radius:7px;padding:0 10px;font-size:.72rem;color:#475569;font-weight:700}
            .room-rate-chip strong{color:#0f172a}
            .room-chip-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
            .room-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border:1px solid #dbe3ee;border-radius:7px;background:#fff;color:#334155;font-size:.72rem;font-weight:700}
            .room-chip small{font-size:.66rem;color:#64748b;font-weight:600}
            .room-chip.blocked{border-color:#bfdbfe;background:#eff6ff;color:#1d4ed8}
            .room-summary-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px}
            .room-summary-tile{border:1px solid var(--border2);background:#fff;border-radius:8px;padding:10px}
            .room-summary-tile .num{font-size:1rem;font-weight:800;color:var(--primary)}
            .room-summary-tile .cap{font-size:.68rem;color:var(--txt3);font-weight:700;margin-top:2px}
            .room-assignment-table{width:100%;border-collapse:collapse;font-size:.78rem}
            .room-assignment-table th,.room-assignment-table td{padding:8px;border-bottom:1px solid #edf2f7;text-align:left}
            .room-assignment-table th{background:#f8fafc;color:#64748b;font-size:.7rem}
            .room-action-btn{height:28px;padding:0 9px;border-radius:6px;border:1px solid var(--border);background:#fff;font-family:var(--font);font-size:.72rem;font-weight:700;color:var(--txt);cursor:pointer;display:inline-flex;align-items:center;gap:5px}
            .room-action-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
            @media(max-width:768px){
                #groupGrid{grid-template-columns:1fr!important}
                .room-alloc-row{grid-template-columns:1fr}
                .room-summary-grid{grid-template-columns:1fr 1fr}
                .room-rate-line{grid-template-columns:1fr}
            }
        `;
        document.head.appendChild(style);
    }

    function roomKey(room) {
        return room.id || room.fullRoom || room.display || room.number || '';
    }

    function roomLabel(room) {
        const id = roomKey(room);
        const bldg = room.building || room.bldgCode || '';
        const number = room.number || room.display || id;
        return bldg ? `${bldg} ${number}` : number;
    }

    function roomType(room) {
        return room.type || 'Standard';
    }

    function getCurrency() {
        return { code: 'PHP', symbol: '₱' };
    }

    function money(value) {
        const cur = getCurrency();
        const n = Number(value || 0);
        return `${cur.symbol}${n.toLocaleString()}`;
    }

    function getRoomTypesConfig() {
        try {
            const saved = localStorage.getItem('pms_room_types_config');
            if (saved) return JSON.parse(saved);
        } catch(e) {}
        return [
            { id: 'Standard', name: 'Standard Double', basePrice: 100 },
            { id: 'Deluxe', name: 'Deluxe King', basePrice: 150 },
            { id: 'Premier', name: 'Premier Twin', basePrice: 180 },
            { id: 'Suite', name: 'Executive Suite', basePrice: 300 },
            { id: 'Penthouse', name: 'Penthouse', basePrice: 800 }
        ];
    }

    function getBaseRateForRoom(room) {
        const date = document.getElementById('ngCheckin')?.value || (window.PmsDate?.todayIso ? window.PmsDate.todayIso() : new Date().toISOString().slice(0,10));
        const type = roomType(room);
        let dailyRates = {};
        try { dailyRates = JSON.parse(localStorage.getItem('pms_daily_rates') || '{}'); } catch(e) {}
        const typeConfig = getRoomTypesConfig().find(rt => rt.id === type || rt.name === type || type.includes(rt.id) || rt.name.includes(type));
        const typeId = typeConfig ? typeConfig.id : type;
        let rate = dailyRates[date] && dailyRates[date][typeId] !== undefined ? Number(dailyRates[date][typeId]) : Number(typeConfig?.basePrice || 0);
        return rate;
    }

    function getSelectedCompany() {
        const agencySel = document.getElementById('ngAgency');
        const id = agencySel?.value || '';
        try {
            const companies = getCompanies();
            return companies.find(c => c.id === id || c.name === id || (agencySel?.selectedOptions[0]?.textContent || '').includes(c.name));
        } catch(e) {
            return null;
        }
    }

    function getCompanies() {
        let companies = [];
        try { companies = JSON.parse(localStorage.getItem('pms_companies') || '[]'); } catch(e) {}
        if (!Array.isArray(companies) || !companies.length) {
            companies = [
                { id: 'COMP-1001', name: '삼성전자 (Samsung)', type: 'Corporate', status: 'active', groupDiscount: 15, rate: '객실 15% 할인' },
                { id: 'COMP-1002', name: '하나투어 (Hana Tour)', type: 'Travel Agency', status: 'active', groupDiscount: 10, rate: '객실 10% 할인' },
                { id: 'COMP-1003', name: '한화이글스', type: 'Other', status: 'active', groupDiscount: 8, rate: '객실 8% 할인' }
            ];
            localStorage.setItem('pms_companies', JSON.stringify(companies));
        }
        return companies;
    }

    window.loadCompaniesForDropdown = function() {
        const sel = document.getElementById('ngAgency');
        if (!sel) return;
        sel.innerHTML = '<option value="">주관 업체를 선택하세요</option>';
        getCompanies().forEach(c => {
            const opt = document.createElement('option');
            opt.value = c.id;
            const discountLabel = groupCompanyLang() === 'en' ? 'Discount' : '할인';
            opt.textContent = `${c.name} (${groupCompanyTypeLabel(c.type)}) · ${discountLabel} ${parseDiscount(c)}%`;
            sel.appendChild(opt);
        });
    };

    function parseDiscount(company) {
        if (!company) return 0;
        if (company.groupDiscount !== undefined) return Number(company.groupDiscount || 0);
        const text = String(company.rate || '');
        const match = text.match(/(\d+(?:\.\d+)?)\s*%/);
        return match ? Number(match[1]) : 0;
    }

    function normalizeRoom(room) {
        const id = roomKey(room);
        return {
            id,
            roomId: id,
            roomLabel: roomLabel(room),
            type: roomType(room),
            building: room.building || room.bldgCode || '',
            rate: 0
        };
    }

    function getAssignedRooms(g) {
        if (Array.isArray(g.roomAllocations) && g.roomAllocations.length) {
            return g.roomAllocations.map(a => ({
                roomId: a.roomId || a.id || a.room || '',
                roomLabel: a.roomLabel || a.display || a.room || a.roomId || '',
                type: a.type || 'Standard',
                building: a.building || '',
                baseRate: Number(a.baseRate || 0),
                discountPercent: Number(a.discountPercent || 0),
                rate: Number(a.rate || 0)
            })).filter(a => a.roomId);
        }
        if (Array.isArray(g.allocations) && g.allocations.some(a => a.roomId || a.room)) {
            return g.allocations.map(a => ({
                roomId: a.roomId || a.room,
                roomLabel: a.roomLabel || a.room || a.roomId,
                type: a.type || 'Standard',
                building: a.building || '',
                baseRate: Number(a.baseRate || 0),
                discountPercent: Number(a.discountPercent || 0),
                rate: Number(a.rate || 0)
            })).filter(a => a.roomId);
        }
        return [];
    }

    function migrateCountAllocations(g) {
        if (getAssignedRooms(g).length) return g;
        const selected = [];
        const used = new Set((groups || []).flatMap(x => getAssignedRooms(x).map(a => a.roomId)));
        (g.allocations || []).forEach(a => {
            const need = Number(a.count || 0);
            const typePrefix = String(a.type || '').split(' ')[0].toLowerCase();
            const matches = blockRooms.filter(r => {
                const id = roomKey(r);
                const type = roomType(r).toLowerCase();
                return id && !used.has(id) && (!typePrefix || type.includes(typePrefix));
            }).slice(0, need);
            matches.forEach(r => {
                const normalized = normalizeRoom(r);
                normalized.rate = Number(a.rate || 0);
                selected.push(normalized);
                used.add(normalized.roomId);
            });
        });
        if (selected.length) {
            g.roomAllocations = selected;
            g.block = selected.length;
        }
        return g;
    }

    function syncLegacyGroups() {
        let touched = false;
        (groups || []).forEach(g => {
            const before = getAssignedRooms(g).length;
            migrateCountAllocations(g);
            const after = getAssignedRooms(g).length;
            if (after && after !== before) touched = true;
        });
        if (touched) localStorage.setItem('pms_groups', JSON.stringify(groups));
    }

    function formatDateMD(dateStr) {
        if (!dateStr) return '';
        const d = new Date(dateStr);
        if (Number.isNaN(d.getTime())) return dateStr;
        return `${d.getMonth()+1}/${d.getDate()}`;
    }

    function getGroupReservations(groupId) {
        return (blockReservations || []).filter(r => r.groupId === groupId && r.status !== 'cancelled');
    }

    function setRoomOptions(select, selectedRoomId) {
        const selectedInForm = Array.from(document.querySelectorAll('.alloc-room'))
            .map(el => el.value)
            .filter(Boolean)
            .filter(id => id !== selectedRoomId);

        select.innerHTML = `<option value="">호실 선택</option>`;
        const grouped = {};
        blockRooms.forEach(room => {
            const id = roomKey(room);
            if (!id) return;
            const disabled = selectedInForm.includes(id);
            const key = roomType(room);
            if (!grouped[key]) grouped[key] = [];
            grouped[key].push({ room, disabled });
        });

        Object.keys(grouped).sort().forEach(type => {
            const og = document.createElement('optgroup');
            og.label = type;
            grouped[type].forEach(({room, disabled}) => {
                const opt = document.createElement('option');
                opt.value = roomKey(room);
                opt.textContent = `${roomLabel(room)} · ${roomType(room)}`;
                opt.disabled = disabled;
                if (opt.value === selectedRoomId) opt.selected = true;
                og.appendChild(opt);
            });
            select.appendChild(og);
        });
    }

    function refreshAllRoomOptions() {
        document.querySelectorAll('.alloc-room').forEach(select => setRoomOptions(select, select.value));
    }

    function updateAllocationRow(row, keepManualRate = false) {
        const select = row.querySelector('.alloc-room');
        const room = blockRooms.find(r => roomKey(r) === select.value);
        const baseRateEl = row.querySelector('.alloc-base-rate');
        const discountEl = row.querySelector('.alloc-discount');
        const rateInput = row.querySelector('.alloc-rate');
        const company = getSelectedCompany();
        const discount = parseDiscount(company);

        if (!room) {
            baseRateEl.textContent = `기준가: -`;
            discountEl.textContent = `단체 할인: ${discount}%`;
            if (!keepManualRate) rateInput.value = '';
            return;
        }

        const baseRate = getBaseRateForRoom(room);
        const finalRate = Math.round(baseRate * (100 - discount) / 100);
        row.dataset.baseRate = String(baseRate);
        row.dataset.discount = String(discount);
        baseRateEl.textContent = `기준가: ${money(baseRate)}`;
        discountEl.textContent = `단체 할인: ${discount}%`;
        if (!keepManualRate || !rateInput.value) rateInput.value = finalRate || '';
    }

    function refreshAllocationRates() {
        document.querySelectorAll('.room-alloc-row').forEach(row => updateAllocationRow(row, false));
    }

    window.addAllocationRow = function(roomId = '', rate = '') {
        const container = document.getElementById('allocationContainer');
        if (!container) return;
        const row = document.createElement('div');
        row.className = 'room-alloc-row';
        row.innerHTML = `
            <select class="form-input alloc-room"></select>
            <button type="button" class="btn-outline-sm" style="color:var(--danger);border-color:var(--danger);padding:4px 8px" title="삭제"><i class="fa-solid fa-trash"></i></button>
            <div class="room-rate-line">
                <div class="room-rate-chip alloc-base-rate">기준가: -</div>
                <div class="room-rate-chip alloc-discount">단체 할인: 0%</div>
                <input type="number" class="form-input alloc-rate" min="0" value="${rate || ''}" placeholder="최종 적용가">
            </div>
        `;
        const select = row.querySelector('.alloc-room');
        setRoomOptions(select, roomId);
        const updateType = () => {
            updateAllocationRow(row, false);
            calcTotalBlock();
            refreshAllRoomOptions();
        };
        select.addEventListener('change', updateType);
        row.querySelector('button').onclick = () => {
            row.remove();
            calcTotalBlock();
            refreshAllRoomOptions();
        };
        container.prepend(row);
        if (rate) row.querySelector('.alloc-rate').value = rate;
        updateType();
    };

    window.calcTotalBlock = function() {
        const ids = Array.from(document.querySelectorAll('.alloc-room')).map(s => s.value).filter(Boolean);
        const el = document.getElementById('ngTotalBlock');
        if (el) el.textContent = ids.length;
    };

    function collectRoomAllocations() {
        const rows = Array.from(document.querySelectorAll('.room-alloc-row'));
        return rows.map(row => {
            const roomId = row.querySelector('.alloc-room')?.value || '';
            if (!roomId) return null;
            const room = blockRooms.find(r => roomKey(r) === roomId) || {};
            return {
                roomId,
                roomLabel: roomLabel(room) || roomId,
                type: roomType(room),
                building: room.building || room.bldgCode || '',
                baseRate: Number(row.dataset.baseRate || 0),
                discountPercent: Number(row.dataset.discount || 0),
                rate: Number(row.querySelector('.alloc-rate')?.value || 0)
            };
        }).filter(Boolean);
    }

    function hydrateRoomPanelText() {
        const panel = document.getElementById('allocationContainer')?.closest('div[style*="background"]');
        if (!panel || panel.classList.contains('room-block-panel')) return;
        panel.className = 'room-block-panel';
        const head = panel.querySelector('div[style*="justify-content"]');
        if (head) {
            head.className = 'room-block-head';
            head.removeAttribute('style');
            const label = head.querySelector('label');
            if (label) {
                label.className = 'room-block-title';
                label.innerHTML = `<i class="fa-solid fa-door-open"></i> ${labels.roomSection} <span style="color:var(--danger)">*</span>`;
            }
            const btn = head.querySelector('button');
            if (btn) btn.innerHTML = `<i class="fa-solid fa-plus"></i> ${labels.addRoom}`;
        }
    }

    window.openNewGroupModal = function() {
        loadCompaniesForDropdown();
        hydrateRoomPanelText();
        document.getElementById('ngModalTitle').textContent = labels.modalNew;
        document.getElementById('ngId').value = '';
        document.getElementById('ngName').value = '';
        document.getElementById('ngAgency').selectedIndex = 0;
        document.getElementById('ngCheckin').value = '';
        document.getElementById('ngCheckout').value = '';
        document.getElementById('ngPax').value = '';
        document.getElementById('ngContact').value = '';
        document.getElementById('ngNote').value = '';
        document.getElementById('allocationContainer').innerHTML = '';
        addAllocationRow();

        const urlParams = new URLSearchParams(window.location.search);
        const preComp = urlParams.get('comp');
        if (preComp) setTimeout(() => { document.getElementById('ngAgency').value = preComp; refreshAllocationRates(); }, 50);
        openModal('newGroupModal');
    };

    window.saveGroup = function() {
        const id = document.getElementById('ngId').value;
        const name = document.getElementById('ngName').value.trim();
        const checkin = document.getElementById('ngCheckin').value;
        const checkout = document.getElementById('ngCheckout').value;
        if (!name) { showToast(labels.nameRequired, 'error'); return; }
        if (!checkin || !checkout) { showToast(labels.dateRequired, 'error'); return; }

        const roomAllocations = collectRoomAllocations();
        if (!roomAllocations.length) { showToast(labels.roomRequired, 'error'); return; }
        const ids = roomAllocations.map(a => a.roomId);
        if (new Set(ids).size !== ids.length) { showToast(labels.duplicateRoom, 'error'); return; }

        const type = document.getElementById('ngType').value;
        const agencySelect = document.getElementById('ngAgency');
        const agencyId = agencySelect.value;
        const agency = agencySelect.options[agencySelect.selectedIndex]?.textContent || agencySelect.value || '';
        const pax = parseInt(document.getElementById('ngPax').value || 0, 10);
        const routing = document.getElementById('ngRouting').value;
        const sales = '';
        const contact = document.getElementById('ngContact').value;
        const note = document.getElementById('ngNote').value;

        const allocations = roomAllocations.map(a => ({
            type: a.type,
            roomId: a.roomId,
            roomLabel: a.roomLabel,
            building: a.building,
            baseRate: a.baseRate,
            discountPercent: a.discountPercent,
            rate: a.rate
        }));
        if (id) {
            const g = groups.find(x => x.id === id);
            if (g) Object.assign(g, { name, agencyId, agency, type, checkin, checkout, block: roomAllocations.length, roomAllocations, allocations, pax, routing, sales, contact, note });
            showToast(labels.updated);
        } else {
            const newId = 'GRP-' + Math.floor(1000 + Math.random()*9000);
            groups.unshift({ id: newId, name, agencyId, agency, type, checkin, checkout, block: roomAllocations.length, roomAllocations, allocations, pax, routing, sales, contact, note, status: 'confirmed', pickup: 0 });
            showToast(labels.saved);
        }
        localStorage.setItem('pms_groups', JSON.stringify(groups));
        closeModal('newGroupModal');
        updateFilterCounts();
        refreshReservations().then(renderGroups);
    };

    window.editGroup = function(id) {
        loadCompaniesForDropdown();
        hydrateRoomPanelText();
        const g = groups.find(x => x.id === id);
        if (!g) return;
        document.getElementById('ngModalTitle').textContent = labels.modalEdit;
        document.getElementById('ngId').value = g.id;
        document.getElementById('ngName').value = g.name || '';
        const agencySel = document.getElementById('ngAgency');
        if (agencySel && g.agencyId) agencySel.value = g.agencyId;
        document.getElementById('ngType').value = groupEventTypeLabel(g.type) || document.getElementById('ngType').options[0].value;
        document.getElementById('ngCheckin').value = g.checkin || '';
        document.getElementById('ngCheckout').value = g.checkout || '';
        document.getElementById('ngPax').value = g.pax || '';
        document.getElementById('ngContact').value = g.contact || '';
        document.getElementById('ngNote').value = g.note || '';

        const allocationContainer = document.getElementById('allocationContainer');
        allocationContainer.innerHTML = '';
        const assigned = getAssignedRooms(g);
        if (assigned.length) assigned.forEach(a => addAllocationRow(a.roomId, a.rate));
        else addAllocationRow();
        openModal('newGroupModal');
    };

    window.renderGroups = function(search = '') {
        const grid = document.getElementById('groupGrid');
        const empty = document.getElementById('emptyState');
        const filtered = (groups || []).filter(g => {
            const statusMatch = currentFilter === 'all' || g.status === currentFilter;
            const assigned = getAssignedRooms(g).map(a => `${a.roomLabel} ${a.roomId}`).join(' ').toLowerCase();
            const q = search.toLowerCase();
            const searchMatch = !q || (g.name || '').toLowerCase().includes(q) || assigned.includes(q);
            return statusMatch && searchMatch;
        });

        if (!filtered.length) {
            grid.style.display = 'none';
            empty.style.display = 'block';
            return;
        }
        grid.style.display = 'grid';
        empty.style.display = 'none';

        grid.innerHTML = filtered.map(g => {
            const assigned = getAssignedRooms(g);
            const resCount = getGroupReservations(g.id).length;
            const pct = assigned.length ? Math.round((resCount / assigned.length) * 100) : 0;
            const s = statusMap[g.status] || statusMap.confirmed;
            return `
            <div class="group-card" role="button" tabindex="0" style="cursor:pointer" onclick="openGroupDetail('${g.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGroupDetail('${g.id}')}">
                <div class="group-card-header">
                    <div>
                        <div class="group-name">${g.name}</div>
                        <div class="group-type">${groupEventTypeLabel(g.type)} · ${g.id}</div>
                    </div>
                    <span class="status-pill ${s.cls}">${s.label}</span>
                </div>
                <div class="group-meta">
                    <div class="group-meta-item"><i class="fa-solid fa-calendar-check"></i> ${g.checkin || '-'} ~ ${g.checkout || '-'}</div>
                    <div class="group-meta-item"><i class="fa-solid fa-person"></i> ${g.pax || 0}명</div>
                    <div class="group-meta-item"><i class="fa-solid fa-building"></i> ${g.agency || '-'}</div>
                    <div class="group-meta-item"><i class="fa-solid fa-phone"></i> ${g.contact || '-'}</div>
                </div>
                <div class="room-summary-grid">
                    <div class="room-summary-tile"><div class="num">${assigned.length}</div><div class="cap">${labels.roomsAssigned}</div></div>
                    <div class="room-summary-tile"><div class="num">${resCount}</div><div class="cap">${labels.pickup}</div></div>
                    <div class="room-summary-tile"><div class="num">${pct}%</div><div class="cap">진행률</div></div>
                </div>
                <div>
                    <div style="font-size:.78rem;font-weight:800;color:var(--txt);margin:12px 0 6px">${labels.rooms}</div>
                    <div class="room-chip-list">
                        ${assigned.length ? assigned.map(a => `<span class="room-chip blocked"><i class="fa-solid fa-door-closed"></i>${a.roomLabel || a.roomId}<small>${a.type}</small></span>`).join('') : `<span style="font-size:.76rem;color:var(--txt3)">${labels.noAssignment}</span>`}
                    </div>
                </div>
                <div style="margin-top:12px">
                    <div style="display:flex;justify-content:space-between;font-size:.78rem;color:var(--txt2);margin-bottom:6px">
                        <span>${labels.pickup}</span>
                        <span style="font-weight:700;color:var(--primary)">${resCount} / ${assigned.length}실 (${pct}%)</span>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
                </div>
                <div class="group-card-footer">
                    <div></div>
                    <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
                        <button class="btn-outline-sm" onclick="event.stopPropagation(); openGroupDetail('${g.id}')" style="padding:0 14px"><i class="fa-solid fa-gear"></i> 관리</button>
                    </div>
                </div>
            </div>`;
        }).join('');
    };

    window.openGroupDetail = function(id) {
        const selected = (groups || []).find(g => g.id === id);
        if (selected) {
            try { sessionStorage.setItem('pms_selected_group', JSON.stringify(selected)); } catch(e) {}
        }
        location.href = `groups_block_detail.html?id=${encodeURIComponent(id)}`;
    };

    window.showDetail = function(id) {
        const g = groups.find(x => x.id === id);
        if (!g) return;
        const assigned = getAssignedRooms(g);
        const reservations = getGroupReservations(g.id);
        document.getElementById('detailGroupName').textContent = g.name;
        const s = statusMap[g.status] || statusMap.confirmed;
        document.getElementById('detailBody').innerHTML = `
            <div style="padding:20px;display:flex;flex-direction:column;gap:14px">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">주관 업체</div><div style="font-weight:700">${g.agency || '-'}</div></div>
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">상태</div><span class="status-pill ${s.cls}">${s.label}</span></div>
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">체크인</div><div style="font-weight:700">${g.checkin || '-'}</div></div>
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">체크아웃</div><div style="font-weight:700">${g.checkout || '-'}</div></div>
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">총 인원</div><div style="font-weight:700">${g.pax || 0}명</div></div>
                    <div><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">정산</div><div style="font-weight:700">${groupBillingLabel(g.routing)}</div></div>
                    <div style="grid-column:1/-1"><div style="font-size:.75rem;color:var(--txt3);font-weight:700;margin-bottom:4px">메모</div><div style="font-weight:500;color:var(--txt2)">${g.note || '없음'}</div></div>
                </div>
                <div style="border-top:1px solid var(--border);padding-top:14px">
                    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
                        <div style="font-size:.86rem;font-weight:800">배정 호실별 예약</div>
                        <button class="room-action-btn primary" onclick="openGroupRoomReservation('${g.id}')"><i class="fa-solid fa-plus"></i> 예약 추가</button>
                    </div>
                    <table class="room-assignment-table">
                        <thead><tr><th>호실</th><th>타입</th><th>기준가</th><th>할인</th><th>최종가</th><th>예약</th><th></th></tr></thead>
                        <tbody>
                            ${assigned.length ? assigned.map(a => {
                                const res = reservations.find(r => r.room === a.roomId || r.fullRoom === a.roomId);
                                return `<tr>
                                    <td><span class="room-chip blocked">${a.roomLabel || a.roomId}</span></td>
                                    <td>${a.type || '-'}</td>
                                    <td>${a.baseRate ? money(a.baseRate) : '-'}</td>
                                    <td>${a.discountPercent || 0}%</td>
                                    <td>${a.rate ? money(a.rate) : '-'}</td>
                                    <td>${res ? `${res.guest || '-'} · ${res.status || '-'}` : labels.blocked}</td>
                                    <td><button class="room-action-btn ${res ? '' : 'primary'}" onclick="openGroupRoomReservation('${g.id}','${a.roomId}')"><i class="fa-solid fa-calendar-plus"></i>${res ? '수정' : labels.reserve}</button></td>
                                </tr>`;
                            }).join('') : `<tr><td colspan="7">${labels.noAssignment}</td></tr>`}
                        </tbody>
                    </table>
                </div>
            </div>`;
        openModal('groupDetailModal');
    };

    window.openGroupRoomReservation = async function(groupId, roomId = '') {
        const g = groups.find(x => x.id === groupId);
        if (!g) return;
        await refreshReservations();
        const targetRoom = roomId || getAssignedRooms(g)[0]?.roomId || '';
        const existing = blockReservations.find(r => r.groupId === groupId && (!targetRoom || r.room === targetRoom || r.fullRoom === targetRoom));
        if (existing) {
            window.openUnifiedResModal(existing.id);
            return;
        }
        if (typeof window.openUnifiedResModal === 'function') {
            window.openUnifiedResModal({
                groupId,
                room: targetRoom,
                checkin: formatDateMD(g.checkin),
                checkout: formatDateMD(g.checkout),
                sourceName: g.name
            });
        }
    };

    async function refreshRooms() {
        if (window.PmsAPI && window.PmsAPI.getAllRooms) {
            blockRooms = await window.PmsAPI.getAllRooms();
            window.rooms = blockRooms;
        }
        if (!Array.isArray(blockRooms)) blockRooms = [];
    }

    async function refreshReservations() {
        if (window.PmsAPI && window.PmsAPI.getReservations) {
            blockReservations = await window.PmsAPI.getReservations();
            window.reservations = blockReservations;
            const syncedGroups = readPersistedGroups();
            if (syncedGroups.length) groups = mergeGroupsById(groups, syncedGroups);
        }
        if (!Array.isArray(blockReservations)) blockReservations = [];
        return blockReservations;
    }

    document.addEventListener('DOMContentLoaded', async () => {
        injectRoomBlockStyles();
        hydrateRoomPanelText();
        await refreshRooms();
        syncLegacyGroups();
        await refreshReservations();
        updateFilterCounts();
        renderGroups();

        document.getElementById('ngAgency')?.addEventListener('change', refreshAllocationRates);
        document.getElementById('ngCheckin')?.addEventListener('change', refreshAllocationRates);

        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('newBlock') === 'true') {
            const comp = urlParams.get('comp');
            location.href = `groups_block_detail.html?mode=new${comp ? `&companyId=${encodeURIComponent(comp)}` : ''}`;
            return;
        }
        const editGroupId = urlParams.get('editGroup');
        if (editGroupId) {
            setTimeout(() => window.editGroup(editGroupId), 250);
        }
    });
})();
</script>
