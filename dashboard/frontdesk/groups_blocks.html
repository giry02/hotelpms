<script>
(function(){
    const originalSearchGroups = window.searchGroups;

    function parseDate(value) {
        if (!value) return null;
        const baseYear = (window.PmsDate?.today ? window.PmsDate.today() : new Date()).getFullYear();
        const d = value.includes('-') ? new Date(value) : new Date(`${baseYear}/${value}`);
        if (Number.isNaN(d.getTime())) return null;
        d.setHours(0,0,0,0);
        return d;
    }
    function today() {
        const d = window.PmsDate?.today ? window.PmsDate.today() : new Date();
        d.setHours(0,0,0,0);
        return d;
    }
    function stageOf(g) {
        const now = today();
        const cin = parseDate(g.checkin);
        const cout = parseDate(g.checkout);
        const departedOrPast = g.status === 'departed' || (cout && cout <= now);
        const unsettled = g.settlementStatus === 'pending' || g.settlementStatus === 'unpaid' || (departedOrPast && g.settlementStatus !== 'paid');
        if (unsettled && departedOrPast) return { key:'settlement', label:'정산 필요', cls:'stage-settle' };
        if (cin && cin.getTime() === now.getTime()) return { key:'today', label:'오늘 체크인', cls:'stage-today' };
        if (cin && cout && cin <= now && cout > now) return { key:'active', label:'투숙 중', cls:'stage-live' };
        if (cin && cin > now) return { key:'upcoming', label:'예정', cls:'stage-upcoming' };
        if (cout && cout <= now) return { key:'past', label:'지난 행사', cls:'stage-past' };
        return { key:g.status || 'upcoming', label:'예정', cls:'stage-upcoming' };
    }
    function dday(g) {
        const cin = parseDate(g.checkin);
        if (!cin) return '-';
        const diff = Math.round((cin - today()) / 86400000);
        if (diff === 0) return 'D-Day';
        return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
    }
    function enhanceToolbar() {
        const filterRight = document.querySelector('.filter-right');
        const chips = document.querySelector('.filter-chips');
        if (chips && !chips.dataset.operational) {
            chips.dataset.operational = '1';
            chips.innerHTML = `
                <button class="chip active" onclick="filterGroups('all', this)" id="chip-all">전체</button>
                <button class="chip" onclick="filterGroups('today', this)">오늘 체크인</button>
                <button class="chip" onclick="filterGroups('active', this)">투숙 중</button>
                <button class="chip" onclick="filterGroups('upcoming', this)">예정</button>
                <button class="chip" onclick="filterGroups('past', this)">지난 행사</button>
                <button class="chip" onclick="filterGroups('settlement', this)">정산 필요</button>`;
        }
        const companySelect = document.getElementById('companyFilter');
        if (companySelect) companySelect.remove();
        if (filterRight && !filterRight.dataset.eventActions) {
            filterRight.dataset.eventActions = '1';
            filterRight.innerHTML = `
                <button class="btn-outline" style="height:38px" onclick="location.href='groups_companies.html'"><i class="fa-solid fa-building"></i> 업체 관리</button>
                <button class="btn-primary-sm" style="height:38px;padding:0 16px" onclick="location.href='groups_block_detail.html?mode=new'"><i class="fa-solid fa-plus"></i> 신규 행사 생성</button>`;
        }
    }
    window.filterGroups = function(status, btn) {
        currentFilter = status;
        btn?.closest('.filter-chips')?.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        btn?.classList.add('active');
        window.renderGroups(document.querySelector('.search-box-mt input')?.value || '');
    };
    window.searchGroups = function(value) {
        window.renderGroups(value || '');
        if (typeof originalSearchGroups === 'function' && originalSearchGroups !== window.searchGroups) {}
    };
    window.renderGroups = function(search = '') {
        enhanceToolbar();
        const grid = document.getElementById('groupGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;
        grid.style.display = 'block';
        const query = String(search || '').toLowerCase();
        const list = (groups || []).filter(g => {
            const stage = stageOf(g);
            const stageMatch = currentFilter === 'all' || stage.key === currentFilter;
            const roomsText = getAssignedRooms(g).map(a => `${a.roomLabel} ${a.roomId}`).join(' ').toLowerCase();
            const searchMatch = !query || [g.name, g.agency, g.contact, g.id].filter(Boolean).join(' ').toLowerCase().includes(query) || roomsText.includes(query);
            return stageMatch && searchMatch;
        }).sort((a,b) => {
            const order = {today:0, active:1, settlement:2, upcoming:3, past:4};
            const sa = stageOf(a), sb = stageOf(b);
            if (order[sa.key] !== order[sb.key]) return (order[sa.key] ?? 9) - (order[sb.key] ?? 9);
            return (parseDate(a.checkin)?.getTime() || 0) - (parseDate(b.checkin)?.getTime() || 0);
        });
        if (!list.length) {
            grid.style.display = 'none';
            if (empty) empty.style.display = 'block';
            return;
        }
        if (empty) empty.style.display = 'none';
        grid.innerHTML = `
            <div class="event-register">
                <div class="event-head">
                    <div>운영 상태</div><div>행사 / 단체</div><div>기간</div><div>D-Day</div><div>객실</div><div>투숙객</div><div>정산</div><div></div>
                </div>
                ${list.map(g => {
                    const assigned = getAssignedRooms(g);
                    const resCount = getGroupReservations(g.id).length;
                    const guests = Array.isArray(g.roomingList) ? g.roomingList.length : 0;
                    const stage = stageOf(g);
                    const settlement = g.settlementStatus === 'paid' ? '완료' : (stage.key === 'past' || stage.key === 'settlement' ? '확인 필요' : '진행 전');
                    return `<div class="event-row" role="button" tabindex="0" style="cursor:pointer" onclick="openGroupDetail('${g.id}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGroupDetail('${g.id}')}">
                        <div data-label="운영 상태"><span class="stage-pill ${stage.cls}">${stage.label}</span></div>
                        <div class="event-main"><div class="event-name">${g.name || '-'}</div><div class="event-company">${g.agency || '등록 단체 필요'} · ${g.id || '-'}</div></div>
                        <div data-label="기간"><div class="event-metric">${g.checkin || '-'} ~ ${g.checkout || '-'}</div><div class="event-sub">${groupEventTypeLabel(g.type)}</div></div>
                        <div data-label="D-Day"><div class="event-metric">${dday(g)}</div></div>
                        <div data-label="객실"><div class="event-metric">${resCount}/${assigned.length}실<small>예약/배정</small></div></div>
                        <div data-label="투숙객"><div class="event-metric">${guests}/${g.pax || 0}명<small>투숙객</small></div></div>
                        <div data-label="정산"><div class="event-metric">${settlement}</div></div>
                        <div><button class="btn-outline-sm" onclick="event.stopPropagation(); openGroupDetail('${g.id}')" style="padding:0 14px"><i class="fa-solid fa-gear"></i> 관리</button></div>
                    </div>`;
                }).join('')}
            </div>`;
    };
    document.addEventListener('DOMContentLoaded', () => setTimeout(() => {
        enhanceToolbar();
        if (typeof window.renderGroups === 'function') window.renderGroups();
    }, 0));
})();
</script>
<script>
(function(){
    let eventStatus = 'all';
    const T = {
        title: '\uB2E8\uCCB4/\uD589\uC0AC \uBAA9\uB85D',
        all: '\uC804\uCCB4',
        today: '\uC624\uB298 \uCCB4\uD06C\uC778',
        active: '\uD22C\uC219 \uC911',
        upcoming: '\uC608\uC815',
        past: '\uC9C0\uB09C \uD589\uC0AC',
        settlement: '\uC815\uC0B0 \uD544\uC694',
        companyManage: '\uB2E8\uCCB4 \uAD00\uB9AC',
        newEvent: '\uC2E0\uADDC \uD589\uC0AC \uC0DD\uC131',
        state: '\uC6B4\uC601 \uC0C1\uD0DC',
        eventCompany: '\uD589\uC0AC / \uB2E8\uCCB4',
        period: '\uAE30\uAC04',
        rooms: '\uAC1D\uC2E4',
        guests: '\uD22C\uC219\uAC1D',
        billing: '\uC815\uC0B0',
        noCompany: '\uB4F1\uB85D \uB2E8\uCCB4 \uD544\uC694',
        bookedAssigned: '\uC608\uC57D/\uBC30\uC815',
        registeredPax: '\uB4F1\uB85D/\uCD1D \uC778\uC6D0',
        paid: '\uC644\uB8CC',
        needCheck: '\uD655\uC778 \uD544\uC694',
        inProgress: '\uC9C4\uD589 \uC911',
        manage: '\uAD00\uB9AC',
        noEvents: '\uD574\uB2F9 \uC870\uAC74\uC758 \uD589\uC0AC\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.'
    };

    function html(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
    }

    function readArray(key) {
        try {
            const data = JSON.parse(localStorage.getItem(key) || '[]');
            return Array.isArray(data) ? data : [];
        } catch(e) {
            return [];
        }
    }

    function eventData() {
        const stored = typeof readPersistedGroups === 'function' ? readPersistedGroups() : readArray('pms_groups');
        let memory = [];
        try { memory = Array.isArray(groups) ? groups : []; } catch(e) {}
        const merged = new Map();
        [...stored, ...memory].forEach(group => {
            if (group?.id) merged.set(group.id, group);
        });
        const list = [...merged.values()];
        try { groups = list; } catch(e) {}
        return list;
    }

    function companyData() {
        return readArray('pms_companies');
    }

    function reservationData() {
        return Array.isArray(window.reservations) ? window.reservations : readArray('pms_reservations');
    }

    function parseDate(value) {
        if (!value) return null;
        const raw = String(value).trim();
        const currentYear = (window.PmsDate?.today ? window.PmsDate.today() : new Date()).getFullYear();
        const date = raw.includes('-') ? new Date(raw) : new Date(`${currentYear}/${raw}`);
        if (Number.isNaN(date.getTime())) return null;
        date.setHours(0, 0, 0, 0);
        return date;
    }

    function todayDate() {
        const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
        date.setHours(0, 0, 0, 0);
        return date;
    }

    function normalizedGroupStatus(group) {
        return String(group?.status || '').toLowerCase().replace(/[_\s]/g, '-');
    }

    function normalizedSettlementStatus(group) {
        return String(group?.settlementStatus || group?.settlement || '').toLowerCase().replace(/[_\s]/g, '-');
    }

    function isPastEvent(group) {
        const checkout = parseDate(group.checkout);
        const status = normalizedGroupStatus(group);
        return ['departed', 'completed', 'checked-out', 'checkout'].includes(status) || !!(checkout && checkout <= todayDate());
    }

    function isSettlementNeeded(group) {
        const settlement = normalizedSettlementStatus(group);
        if (['paid', 'settled', 'complete', 'completed'].includes(settlement)) return false;
        return isPastEvent(group);
    }

    function stageOf(group) {
        const now = todayDate();
        const checkin = parseDate(group.checkin);
        const checkout = parseDate(group.checkout);
        const status = normalizedGroupStatus(group);
        if (isSettlementNeeded(group) && isPastEvent(group)) return { key: 'settlement', label: T.settlement, cls: 'stage-settle' };
        if (checkin && checkin.getTime() === now.getTime()) return { key: 'today', label: T.today, cls: 'stage-today' };
        if (checkin && checkout && checkin <= now && checkout > now) return { key: 'active', label: T.active, cls: 'stage-live' };
        if (checkin && checkin > now) return { key: 'upcoming', label: T.upcoming, cls: 'stage-upcoming' };
        if (checkout && checkout <= now) return { key: 'past', label: T.past, cls: 'stage-past' };
        if (status === 'inhouse' || status === 'in-house') return { key: 'active', label: T.active, cls: 'stage-live' };
        if (['departed', 'completed', 'checked-out', 'checkout'].includes(status)) return { key: 'past', label: T.past, cls: 'stage-past' };
        return { key: 'upcoming', label: T.upcoming, cls: 'stage-upcoming' };
    }

    function dday(group) {
        const checkin = parseDate(group.checkin);
        if (!checkin) return '-';
        const diff = Math.round((checkin - todayDate()) / 86400000);
        if (diff === 0) return 'D-Day';
        return diff > 0 ? `D-${diff}` : `D+${Math.abs(diff)}`;
    }

    function companyOf(group) {
        const companies = companyData();
        if (group.agencyId) {
            const found = companies.find(company => company.id === group.agencyId);
            if (found) return found;
        }
        if (!group.agency) return null;
        return companies.find(company =>
            company.name === group.agency ||
            String(group.agency).includes(company.name) ||
            String(company.name).includes(group.agency)
        ) || null;
    }

    function companyKey(group) {
        return group.agencyId || companyOf(group)?.id || group.agency || '';
    }

    function assignedRooms(group) {
        const source = Array.isArray(group.roomAllocations) && group.roomAllocations.length
            ? group.roomAllocations
            : (Array.isArray(group.allocations) ? group.allocations : []);
        return source
            .filter(item => item && (item.roomId || item.room || item.id))
            .map(item => ({
                roomId: item.roomId || item.room || item.id,
                roomLabel: item.roomLabel || item.fullRoom || item.roomName || item.room || item.roomId || item.id,
                type: item.type || item.roomType || 'Standard'
            }));
    }

    function reservationsFor(groupId) {
        return reservationData().filter(res => res.groupId === groupId && res.status !== 'cancelled');
    }

    function guestNameFromReservation(res) {
        if (!res) return '';
        if (res.roomingGuestName) return res.roomingGuestName;
        if (res.isGroupPlaceholder && !res.guestName && !res.guest) return '';
        return res.roomingGuestName || res.guestName || res.guest || '';
    }

    function guestCountFor(group) {
        const keys = new Set();
        (Array.isArray(group.roomingList) ? group.roomingList : []).forEach(guest => {
            const key = guest.id || `${guest.name || ''}-${guest.roomId || ''}`;
            if (guest.name || guest.id) keys.add(key);
        });
        reservationsFor(group.id).forEach(res => {
            const name = guestNameFromReservation(res);
            if (!name) return;
            keys.add(res.roomingGuestId || res.guestId || `${name}-${res.room || res.fullRoom || ''}`);
        });
        return keys.size;
    }

    function matchesCompanyFilter(group) {
        return true;
    }

    function matchesSearchFilter(group, query) {
        if (!query) return true;
        const roomText = assignedRooms(group).map(room => `${room.roomId} ${room.roomLabel} ${room.type}`).join(' ').toLowerCase();
        const searchText = [group.name, group.agency, companyOf(group)?.name, group.contact, group.id]
            .filter(Boolean).join(' ').toLowerCase();
        return searchText.includes(query) || roomText.includes(query);
    }

    function filterCounts(list, search = '') {
        const query = String(search || '').toLowerCase();
        const counts = { all: 0, today: 0, active: 0, upcoming: 0, past: 0, settlement: 0 };
        list.forEach(group => {
            if (!matchesCompanyFilter(group) || !matchesSearchFilter(group, query)) return;
            counts.all += 1;
            const key = stageOf(group).key;
            if (Object.prototype.hasOwnProperty.call(counts, key)) counts[key] += 1;
            if (key !== 'past' && isPastEvent(group)) counts.past += 1;
            if (key !== 'settlement' && isSettlementNeeded(group)) counts.settlement += 1;
        });
        return counts;
    }

    function ensureToolbar(list = eventData(), search = '') {
        const title = document.querySelector('.topbar-left h1');
        if (title) title.textContent = T.title;

        const chips = document.querySelector('.filter-chips');
        const select = document.getElementById('companyFilter');
        if (select) select.remove();

        if (chips) {
            const counts = filterCounts(list, search);
            const chip = (key, label) => `
                <button class="chip ${eventStatus === key ? 'active' : ''}" data-filter="${key}" onclick="filterGroups('${key}', this)">
                    ${label} <span class="chip-count">${counts[key] || 0}</span>
                </button>`;
            chips.innerHTML = [
                chip('all', T.all),
                chip('today', T.today),
                chip('active', T.active),
                chip('upcoming', T.upcoming),
                chip('past', T.past),
                chip('settlement', T.settlement)
            ].join('');
        }

        const filterRight = document.querySelector('.filter-right');
        if (filterRight) {
            filterRight.innerHTML = `
                <button class="btn-outline" style="height:38px" onclick="location.href='groups_companies.html'"><i class="fa-solid fa-building"></i> ${T.companyManage}</button>
                <button class="btn-primary-sm" style="height:38px;padding:0 16px" onclick="createGroupEvent()"><i class="fa-solid fa-plus"></i> ${T.newEvent}</button>`;
        }
    }

    window.createGroupEvent = function() {
        location.href = 'groups_block_detail.html?mode=new';
    };

    function updateKpis(list = eventData()) {
        const activeCount = list.filter(group => stageOf(group).key === 'active').length;
        const roomCount = list.reduce((sum, group) => sum + assignedRooms(group).length, 0);
        const settlementCount = list.filter(isSettlementNeeded).length;
        const total = document.getElementById('kpiTotalGroups');
        const live = document.getElementById('kpiInhouse');
        const blocks = document.getElementById('kpiBlocks');
        const unpaid = document.getElementById('kpiUnpaid');
        if (total) total.textContent = list.length;
        if (live) live.textContent = activeCount;
        if (blocks) blocks.textContent = roomCount;
        if (unpaid) unpaid.textContent = settlementCount;
    }

    window.filterGroups = function(status, button) {
        eventStatus = status || 'all';
        try { currentFilter = eventStatus; } catch(e) {}
        button?.closest('.filter-chips')?.querySelectorAll('.chip').forEach(chip => chip.classList.remove('active'));
        button?.classList.add('active');
        window.renderGroups(document.querySelector('.search-box-mt input')?.value || '');
    };

    window.searchGroups = function(value) {
        window.renderGroups(value || '');
    };

    window.updateFilterCounts = function() {
        updateKpis();
    };

    window.renderGroups = function(search = '') {
        const list = eventData();
        ensureToolbar(list, search);
        updateKpis(list);

        const grid = document.getElementById('groupGrid');
        const empty = document.getElementById('emptyState');
        if (!grid) return;

        const query = String(search || '').toLowerCase();
        const filtered = list.filter(group => {
            const stage = stageOf(group);
            const statusMatches = eventStatus === 'all'
                || stage.key === eventStatus
                || (eventStatus === 'past' && isPastEvent(group))
                || (eventStatus === 'settlement' && isSettlementNeeded(group));
            return statusMatches && matchesCompanyFilter(group) && matchesSearchFilter(group, query);
        }).sort((a, b) => {
            const order = { today: 0, active: 1, settlement: 2, upcoming: 3, past: 4 };
            const stageA = stageOf(a);
            const stageB = stageOf(b);
            if ((order[stageA.key] ?? 9) !== (order[stageB.key] ?? 9)) return (order[stageA.key] ?? 9) - (order[stageB.key] ?? 9);
            return (parseDate(a.checkin)?.getTime() || 0) - (parseDate(b.checkin)?.getTime() || 0);
        });

        if (!filtered.length) {
            grid.style.display = 'none';
            if (empty) {
                empty.style.display = 'block';
                empty.innerHTML = `<i class="fa-solid fa-calendar-xmark" style="font-size:2.5rem;margin-bottom:12px;display:block"></i>${T.noEvents}`;
            }
            return;
        }

        if (empty) empty.style.display = 'none';
        grid.style.display = 'block';
        grid.innerHTML = `
            <div class="event-register">
                <div class="event-head">
                    <div>${T.state}</div><div>${T.eventCompany}</div><div>${T.period}</div><div>D-Day</div><div>${T.rooms}</div><div>${T.guests}</div><div>${T.billing}</div><div></div>
                </div>
                ${filtered.map(group => {
                    const stage = stageOf(group);
                    const rooms = assignedRooms(group);
                    const reservations = reservationsFor(group.id);
                    const guests = guestCountFor(group);
                    const settlement = group.settlementStatus === 'paid'
                        ? T.paid
                        : (stage.key === 'past' || stage.key === 'settlement' ? T.needCheck : T.inProgress);
                    return `<div class="event-row" role="button" tabindex="0" style="cursor:pointer" onclick="openGroupDetail('${html(group.id)}')" onkeydown="if(event.key==='Enter'||event.key===' '){event.preventDefault();openGroupDetail('${html(group.id)}')}">
                        <div data-label="${T.state}"><span class="stage-pill ${stage.cls}">${stage.label}</span></div>
                        <div class="event-main"><div class="event-name">${html(group.name || '-')}</div><div class="event-company">${html(group.agency || T.noCompany)} · ${html(group.id || '-')}</div></div>
                        <div data-label="${T.period}"><div class="event-metric">${html(group.checkin || '-')} ~ ${html(group.checkout || '-')}</div><div class="event-sub">${html(groupEventTypeLabel(group.type))}</div></div>
                        <div data-label="D-Day"><div class="event-metric">${dday(group)}</div></div>
                        <div data-label="${T.rooms}"><div class="event-metric">${reservations.length}/${rooms.length}<small>${T.bookedAssigned}</small></div></div>
                        <div data-label="${T.guests}"><div class="event-metric">${guests}/${html(group.pax || 0)}<small>${T.registeredPax}</small></div></div>
                        <div data-label="${T.billing}"><div class="event-metric">${settlement}</div></div>
                        <div><button class="btn-outline-sm" onclick="event.stopPropagation(); openGroupDetail('${html(group.id)}')" style="padding:0 14px"><i class="fa-solid fa-gear"></i> ${T.manage}</button></div>
                    </div>`;
                }).join('')}
            </div>`;
    };

    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => window.renderGroups(document.querySelector('.search-box-mt input')?.value || ''), 40);
    });
})();
</script>
</body>
</html>
