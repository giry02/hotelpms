<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>행사 등록/관리 - Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/i18n-catalog.js"></script>
<script src="../common/js/i18n.js"></script>
    <script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
    <style>
        .detail-shell{display:flex;flex-direction:column;gap:18px}
        .breadcrumb-row{display:flex;justify-content:space-between;gap:12px;align-items:center}
        .breadcrumb{font-size:.78rem;color:var(--txt3);font-weight:700}
        .detail-hero{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px;display:grid;grid-template-columns:1fr auto;gap:16px;align-items:start}
        .detail-title{font-size:1.25rem;font-weight:800;color:var(--txt);margin-bottom:6px}
        .detail-sub{display:flex;flex-wrap:wrap;gap:10px;font-size:.78rem;color:var(--txt2)}
        .detail-sub span{display:inline-flex;align-items:center;gap:6px}
        .status-pill{display:inline-flex;align-items:center;gap:5px;padding:4px 12px;border-radius:20px;font-size:.72rem;font-weight:800}
        .pill-confirmed{background:#eff6ff;color:#2563eb}.pill-inhouse{background:#ecfdf5;color:#059669}.pill-pending{background:#fef3c7;color:#d97706}.pill-departed{background:#f1f5f9;color:#64748b}
        .summary-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:12px}
        .summary-card{background:#fff;border:1px solid var(--border);border-radius:9px;padding:14px}
        .summary-card .label{font-size:.7rem;color:var(--txt3);font-weight:800;margin-bottom:6px}
        .summary-card .value{font-size:1.2rem;color:var(--txt);font-weight:850}
        .local-tabs{display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--border)}
        .local-tab{height:38px;padding:0 14px;border:none;background:transparent;border-bottom:2px solid transparent;font-family:var(--font);font-size:.82rem;font-weight:800;color:var(--txt2);cursor:pointer}
        .local-tab.active{color:var(--primary);border-bottom-color:var(--primary)}
        .tab-panel{display:none}.tab-panel.active{display:block}
        .panel{background:#fff;border:1px solid var(--border);border-radius:10px;padding:18px}
        .section-title{font-size:.94rem;font-weight:850;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:8px}
        .info-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .info-item{border:1px solid var(--border2);border-radius:8px;padding:12px;background:#f8fafc}
        .info-item .k{font-size:.7rem;color:var(--txt3);font-weight:800;margin-bottom:5px}
        .info-item .v{font-size:.86rem;color:var(--txt);font-weight:700}
        .data-table{width:100%;border-collapse:collapse;font-size:.8rem}
        .data-table th,.data-table td{padding:10px 8px;border-bottom:1px solid #edf2f7;text-align:left;vertical-align:middle}
        .data-table th{background:#f8fafc;color:#64748b;font-size:.72rem;font-weight:800}
        .room-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:7px;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe;font-size:.72rem;font-weight:800}
        .mini-btn{height:30px;padding:0 10px;border-radius:7px;border:1px solid var(--border);background:#fff;color:var(--txt);font-family:var(--font);font-size:.74rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;gap:6px}
        .mini-btn.primary{background:var(--primary);border-color:var(--primary);color:#fff}
        .mini-btn.danger{border-color:#fecaca;color:#dc2626;background:#fff1f2}
        .topbar-back-btn{height:32px;min-width:32px;padding:4px 8px;margin-right:8px;border:none;box-shadow:none;border-radius:6px;background:transparent;color:var(--txt);font-family:var(--font);font-size:.95rem;font-weight:800;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;transition:all .18s}
        .topbar-back-btn:hover{color:var(--primary);background:var(--border2)}
        .room-assignment-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:flex-start;margin-bottom:14px}
        .room-assignment-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end}
        .room-assignment-table{table-layout:fixed}
        .room-assignment-table td{overflow:hidden}
        .room-assignment-table th:last-child,.room-assignment-table td:last-child{text-align:right}
        .room-assignment-table td[colspan]{text-align:center!important;padding:22px 12px;color:var(--txt2);font-weight:800}
        .room-assignment-table th:nth-child(1){width:16%}
        .room-assignment-table th:nth-child(2){width:34%}
        .room-assignment-table th:nth-child(3){width:9%}
        .room-assignment-table th:nth-child(4){width:11%}
        .room-assignment-table th:nth-child(5){width:12%}
        .room-assignment-table th:nth-child(6){width:18%}
        .room-assignment-table td:nth-child(2),.room-assignment-table .event-metric{white-space:normal;overflow-wrap:anywhere;line-height:1.35}
        .room-only-assignment-table th:nth-child(1){width:30%}
        .room-only-assignment-table th:nth-child(2){width:26%}
        .room-only-assignment-table th:nth-child(3){width:20%}
        .room-only-assignment-table th:nth-child(4){width:24%}
        .room-only-assignment-table td:nth-child(2){white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .rooming-list-table th:nth-child(1){width:14%}
        .rooming-list-table th:nth-child(2){width:18%}
        .rooming-list-table th:nth-child(3){width:12%}
        .rooming-list-table th:nth-child(4){width:11%}
        .rooming-list-table th:nth-child(5){width:13%}
        .rooming-list-table th:nth-child(6){width:20%}
        .rooming-list-table th:nth-child(7){width:12%}
        .rooming-room-table th:nth-child(1){width:18%}
        .rooming-room-table th:nth-child(2){width:39%}
        .rooming-room-table th:nth-child(3){width:12%}
        .rooming-room-table th:nth-child(4){width:13%}
        .rooming-room-table th:nth-child(5){width:18%}
        .rooming-room-title{display:flex;flex-direction:column;gap:4px}
        .rooming-room-title small{font-size:.7rem;color:var(--txt3);font-weight:800;line-height:1.3}
        .rooming-room-status{display:flex;flex-direction:column;gap:4px;font-size:.72rem;color:var(--txt3);font-weight:850}
        .rooming-room-status strong{font-size:.84rem;color:var(--txt);font-weight:950}
        .room-note{display:block;margin-top:3px;color:#dc2626;font-weight:850;line-height:1.35;overflow-wrap:anywhere}
        .room-action-buttons{display:inline-flex;gap:8px;justify-content:flex-end;align-items:center;flex-wrap:wrap}
        .room-action-buttons .mini-btn{white-space:nowrap}
        .rooming-tools{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:12px}
        .progress{height:7px;background:#eef2f7;border-radius:99px;overflow:hidden}.progress>div{height:100%;background:var(--primary)}
        .form-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
        .form-grid .wide{grid-column:1/-1}
        .management-actions{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;margin-top:14px}
        .allocation-editor{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
        .allocation-editor-row{display:grid;grid-template-columns:minmax(180px,1fr) 120px 120px 44px;gap:8px;align-items:end;border:1px solid var(--border2);border-radius:8px;background:#f8fafc;padding:8px}
        .allocation-editor-row>.mini-btn.danger{width:40px;height:40px;min-width:40px;padding:0;justify-content:center;align-self:end}
        .empty-guide{border:1px dashed var(--border);border-radius:10px;padding:18px;text-align:center;color:var(--txt2);font-size:.86rem;font-weight:700;background:#f8fafc}
        @media(max-width:900px){.detail-hero{grid-template-columns:1fr}.summary-grid{grid-template-columns:repeat(2,1fr)}.info-grid{grid-template-columns:1fr}.panel{overflow-x:auto}.room-assignment-toolbar{flex-direction:column}.room-assignment-actions{width:100%;justify-content:flex-start}.room-assignment-table{min-width:920px}.allocation-editor-row>.mini-btn.danger{width:40px}}
        .detail-sticky-actions{position:sticky;bottom:0;z-index:20;margin-top:14px;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:rgba(255,255,255,.97);box-shadow:0 -8px 24px rgba(15,23,42,.08);display:flex;align-items:center;justify-content:space-between;gap:12px}
        .detail-sticky-actions .hint{font-size:.76rem;color:var(--txt2);font-weight:800}
        .rooming-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px;margin-bottom:12px}
        .rooming-summary-item{border:1px solid var(--border2);border-radius:8px;background:#f8fafc;padding:11px 12px}
        .rooming-summary-item .k{font-size:.7rem;color:var(--txt3);font-weight:850;margin-bottom:4px}
        .rooming-summary-item .v{font-size:1rem;color:var(--txt);font-weight:900}
        .group-folio-summary{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin:12px 0}
        .group-folio-card{border:1px solid var(--border2);border-radius:10px;background:#f8fafc;padding:12px}
        .group-folio-card .k{display:flex;align-items:center;gap:6px;color:var(--txt3);font-size:.7rem;font-weight:900;margin-bottom:7px}
        .group-folio-card .k i{color:var(--primary)}
        .group-folio-card .v{color:var(--txt);font-size:1.04rem;font-weight:950}
        .group-folio-card.total{background:#eff6ff;border-color:#bfdbfe}
        .group-folio-card.total .k,.group-folio-card.total .v{color:#1d4ed8}
        .group-folio-table th:nth-child(1){width:13%}
        .group-folio-table th:nth-child(2){width:34%}
        .group-folio-table th:nth-child(3){width:18%}
        .group-folio-table th:nth-child(4){width:13%;text-align:right}
        .group-folio-table th:nth-child(5){width:12%}
        .group-folio-table th:nth-child(6){width:10%;text-align:right}
        .group-folio-table td:nth-child(4),.group-folio-table td:nth-child(6){text-align:right;font-weight:900}
        .group-folio-kind{display:inline-flex;align-items:center;gap:5px;padding:4px 8px;border-radius:999px;background:#f8fafc;border:1px solid var(--border);font-size:.7rem;font-weight:900;color:var(--txt2);white-space:nowrap}
        .group-folio-kind i{color:var(--primary)}
        .group-folio-desc{font-weight:900;color:var(--txt);line-height:1.35}
        .group-folio-sub{display:block;color:var(--txt3);font-size:.7rem;font-weight:800;margin-top:3px}
        .group-folio-status{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:3px 8px;background:#ecfdf5;color:#047857;font-size:.68rem;font-weight:900}
        .group-folio-print-actions{display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap;margin-top:12px}
        @media(max-width:900px){.group-folio-summary{grid-template-columns:repeat(2,minmax(0,1fr))}.group-folio-table{min-width:980px}}
        .group-room-guests{display:flex;flex-direction:column;gap:6px;min-width:0}
        .group-room-guest{display:grid;grid-template-columns:auto minmax(120px,1fr) auto;gap:7px;align-items:center;border:1px solid var(--border2);border-radius:8px;background:#fff;padding:7px 8px;min-width:0}
        .group-room-guest .name{font-size:.78rem;font-weight:900;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .role-pill{display:inline-flex;align-items:center;justify-content:center;border-radius:999px;padding:2px 7px;font-size:.64rem;font-weight:900;white-space:nowrap}
        .role-pill.primary{background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
        .role-pill.companion{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0}
        .inline-guest-actions{display:inline-flex;align-items:center;gap:4px;justify-content:flex-end;flex-wrap:wrap}
        .icon-mini{width:26px;height:26px;border:1px solid var(--border);border-radius:7px;background:#fff;color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;cursor:pointer}
        .icon-mini:hover{border-color:var(--primary);color:var(--primary);background:#eff6ff}
        .icon-mini.danger:hover{border-color:#fecaca;color:#dc2626;background:#fff1f2}
        .room-guest-empty{font-size:.76rem;font-weight:850;color:var(--txt3);padding:8px 0}
        .company-picker{display:flex;flex-direction:column;gap:8px}
        .company-picker-row{display:grid;grid-template-columns:minmax(220px,1fr) auto;gap:8px;align-items:center}
        .company-picker-search{height:38px;border:1px solid var(--border);border-radius:8px;background:#fff;display:flex;align-items:center;gap:8px;padding:0 0 0 10px;overflow:hidden}
        .company-picker-search:focus-within{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.1)}
        .company-picker-search > i{color:var(--txt3);font-size:.8rem;flex:0 0 auto}
        .company-picker-search input{border:0;outline:0;background:transparent;width:100%;min-width:0;font-family:var(--font);font-size:.8rem;font-weight:750;color:var(--txt)}
        .company-picker-search .pms-search-button{align-self:stretch;height:38px;min-width:72px;border-radius:0 8px 8px 0;border:0;border-left:1px solid #2563eb;margin:0;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;gap:6px;white-space:nowrap}
        .company-picker-row .mini-btn{height:38px;min-width:84px;padding:0 14px;display:inline-flex;align-items:center;justify-content:center;white-space:nowrap;border-radius:8px}
        .company-picker-row .company-create-btn{min-width:108px}
        .company-picker-selected,.company-picker-empty{border:1px solid var(--border2);border-radius:9px;background:#f8fafc;padding:10px 12px;font-size:.76rem;font-weight:800;color:var(--txt2);line-height:1.35}
        .company-picker-selected{display:flex;justify-content:space-between;align-items:center;gap:12px;background:#eff6ff;border-color:#bfdbfe;color:#1e3a8a}
        .company-picker-selected strong{display:block;font-size:.86rem;color:#1d4ed8;margin-bottom:2px}
        .company-picker-selected span{display:block;color:#475569}
        .company-picker-results{display:grid;gap:6px;max-height:190px;overflow-y:auto}
        .company-picker-result{border:1px solid var(--border2);border-radius:9px;background:#fff;padding:9px 10px;display:grid;grid-template-columns:minmax(0,1fr) auto;gap:10px;align-items:center;cursor:pointer;text-align:left}
        .company-picker-result:hover,.company-picker-result:focus{border-color:#bfdbfe;background:#eff6ff;outline:0}
        .company-picker-result .name{font-size:.82rem;font-weight:900;color:var(--txt);margin-bottom:2px}
        .company-picker-result .meta{font-size:.72rem;font-weight:800;color:var(--txt3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .company-picker-result .badge{display:inline-flex;align-items:center;border-radius:999px;background:#f1f5f9;color:#475569;font-size:.66rem;font-weight:900;padding:3px 7px;white-space:nowrap}
        .company-picker-empty button{margin-top:8px}
        @media(max-width:900px){.detail-sticky-actions{align-items:stretch;flex-direction:column}.detail-sticky-actions .mini-btn{justify-content:center}.rooming-summary-grid{grid-template-columns:1fr}}
        @media(max-width:900px){.company-picker-row{grid-template-columns:1fr}.company-picker-row .mini-btn{justify-content:center;width:100%;height:38px}.company-picker-selected{align-items:flex-start;flex-direction:column}}
    </style>
</head>
<body>
<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="PMS_Sidebar.toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <button class="topbar-back-btn" onclick="location.href='groups_blocks.html'" title="목록으로"><i class="fa-solid fa-arrow-left"></i></button>
            <h1>행사 등록/관리</h1>
        </div>
    </header>
    <div class="content">
        <div class="detail-shell">
            <div class="breadcrumb-row">
                <div class="breadcrumb">단체 관리 &gt; 행사 목록 &gt; <span id="bcName">상세</span></div>
                <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end">
                    <button class="mini-btn primary" onclick="switchTabById('rooms')"><i class="fa-solid fa-bed"></i> 객실 배정</button>
                </div>
            </div>

            <div class="detail-hero">
                <div>
                    <div class="detail-title" id="groupName">-</div>
                    <div class="detail-sub">
                        <span><i class="fa-solid fa-building"></i><span id="agencyText">-</span></span>
                        <span><i class="fa-solid fa-calendar"></i><span id="dateText">-</span></span>
                        <span><i class="fa-solid fa-user-tie"></i><span id="salesText">-</span></span>
                    </div>
                </div>
                <span id="statusPill" class="status-pill pill-confirmed">확정</span>
            </div>

            <div class="summary-grid" id="summaryGrid"></div>

            <div class="local-tabs">
                <button class="local-tab active" onclick="switchTab('overview', this)">개요</button>
                <button class="local-tab" onclick="switchTab('rooms', this)">객실 배정</button>
                <button class="local-tab" onclick="switchTab('rooming', this)">투숙객 명단</button>
                <button class="local-tab" onclick="switchTab('folio', this)">정산</button>
                <button class="local-tab" onclick="switchTab('history', this)">변경 이력</button>
            </div>

            <div id="overview" class="tab-panel active panel"></div>
            <div id="rooms" class="tab-panel panel"></div>
            <div id="rooming" class="tab-panel panel"></div>
            <div id="folio" class="tab-panel panel"></div>
            <div id="history" class="tab-panel panel"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="roomingModal" onclick="if(event.target===this)closeModal('roomingModal')">
    <div class="modal-card" style="max-width:520px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title">투숙객 등록</h3>
            <button class="modal-close" onclick="closeModal('roomingModal')"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="display:flex;flex-direction:column;gap:14px">
            <input type="hidden" id="guestEditId">
            <div>
                <label class="form-label">이름 <span style="color:var(--danger)">*</span></label>
                <input id="guestNameInput" class="form-input" style="width:100%" placeholder="예: Tran Linh">
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label class="form-label">호실</label>
                    <select id="guestRoomInput" class="form-input" style="width:100%"></select>
                </div>
                <div>
                    <label class="form-label">구분</label>
                    <select id="guestRoleInput" class="form-input" style="width:100%">
                        <option value="primary">대표 투숙객</option>
                        <option value="companion">동반 투숙객</option>
                    </select>
                </div>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
                <div>
                    <label class="form-label">국적</label>
                    <select id="guestNationInput" class="form-input" style="width:100%">
                        <option value="">국적 선택</option>
                        <option value="Australia">호주</option>
                        <option value="Brazil">브라질</option>
                        <option value="Canada">캐나다</option>
                        <option value="China">중국</option>
                        <option value="France">프랑스</option>
                        <option value="Germany">독일</option>
                        <option value="Hong Kong">홍콩</option>
                        <option value="India">인도</option>
                        <option value="Indonesia">인도네시아</option>
                        <option value="Italy">이탈리아</option>
                        <option value="Japan">일본</option>
                        <option value="Korea">한국</option>
                        <option value="Malaysia">말레이시아</option>
                        <option value="Philippines">필리핀</option>
                        <option value="Singapore">싱가포르</option>
                        <option value="Taiwan">대만</option>
                        <option value="Thailand">태국</option>
                        <option value="UAE">아랍에미리트</option>
                        <option value="United Kingdom">영국</option>
                        <option value="USA">미국</option>
                        <option value="Vietnam">베트남</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">여권/신분증 확인</label>
                    <select id="guestDocInput" class="form-input" style="width:100%">
                        <option value="pending">미확인</option>
                        <option value="verified">확인 완료</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal('roomingModal')">취소</button>

<script>
function openModal(id) {
    const modal = document.getElementById(id);
    if (!modal) return;
    modal.classList.add('active');
    document.body.style.overflow = 'hidden';
}

function closeModal(id) {
    const modal = document.getElementById(id);
    if (!modal) return;
    modal.classList.remove('active');
    document.body.style.overflow = '';
}

function ensureTopbarBackButton() {
    const topbarLeft = document.querySelector('.topbar-left');
    const title = topbarLeft?.querySelector('h1');
    if (!topbarLeft || !title || topbarLeft.querySelector('.topbar-back-btn')) return;
    const button = document.createElement('button');
    button.type = 'button';
    button.className = 'topbar-back-btn';
    button.title = '목록으로';
    button.innerHTML = '<i class="fa-solid fa-arrow-left"></i>';
    button.onclick = () => { location.href = 'groups_blocks.html'; };
    topbarLeft.insertBefore(button, title);
}

document.addEventListener('DOMContentLoaded', () => {
    setTimeout(ensureTopbarBackButton, 0);
    setTimeout(ensureTopbarBackButton, 200);
});

let group = null;
let groups = [];
let reservations = [];
let rooms = [];

function isStaleSamsungGroup(item) {
    return item?.id === 'GRP-2605-01' && item?.name === 'Samsung Tech Conference 2026';
}

function cleanPersistedGroups(list) {
    if (!Array.isArray(list)) return [];
    return list.filter(item => !isStaleSamsungGroup(item));
}

const statusMap = {
    confirmed:{label:'확정', cls:'pill-confirmed'},
    inhouse:{label:'투숙 중', cls:'pill-inhouse'},
    pending:{label:'대기', cls:'pill-pending'},
    departed:{label:'체크아웃', cls:'pill-departed'}
};

function companyTypeLabel(value) {
    const key = String(value || '').trim().toLowerCase();
    return {
        corporate: '기업 단체',
        company: '기업 단체',
        agency: '여행사 단체',
        travel: '여행사 단체',
        individual: '일반인 대표',
        private: '일반인 대표'
    }[key] || String(value || '').trim();
}

function billingTermLabel(value) {
    const key = String(value || '').trim().toLowerCase();
    return {
        'master-folio': '단체 일괄 정산',
        'master folio': '단체 일괄 정산',
        'agency-credit': '단체 후불',
        'company-card': '법인카드 정산',
        'frontdesk-prepaid': '프런트 선결제',
        'frontdesk prepaid': '프런트 선결제',
        individual: '개별 결제'
    }[key] || String(value || '').replace(/업체 후불/g, '단체 후불');
}

function eventTypeLabel(value) {
    const key = String(value || '').trim().toLowerCase();
    return {
        'corporate-conference': '기업 행사 / 컨퍼런스',
        'corporate-meeting': '기업 행사 / 컨퍼런스',
        'travel-agency': '여행사 단체',
        'private-group': '일반인 단체',
        'wedding-banquet': '웨딩 / 연회',
        'sports-team': '스포츠팀'
    }[key] || String(value || '').trim();
}

function groupRoutingOptions() {
    return ['단체 일괄 정산', '단체 후불', '법인카드 정산', '프런트 선결제', '개별 정산', '혼합 정산'];
}

function getId() {
    return new URLSearchParams(location.search).get('id');
}

function roomId(room) {
    return room.id || room.roomId || room.fullRoom || room.display || room.number || '';
}

function isPendingAssignmentName(value) {
    return /(pending assignment|투숙객\s*미배정|미배정|미지정|등록\s*대기)/i.test(String(value || ''));
}

function amountNumber(value) {
    if (value && typeof value === 'object') return Number(value.amount || value.value || 0);
    const n = Number(String(value ?? '').replace(/[^\d.-]/g, ''));
    return Number.isFinite(n) ? n : 0;
}

function escapeText(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function getAssignedRooms(g) {
    const source = Array.isArray(g?.roomAllocations) && g.roomAllocations.length ? g.roomAllocations : (g?.allocations || []);
    return source.filter(a => a && (a.roomId || a.room || a.id)).map(a => {
        const id = a.roomId || a.room || a.id;
        const rm = rooms.find(r => roomId(r) === id) || {};
        return {
            roomId: id,
            roomLabel: a.roomLabel || rm.display || rm.number || id,
            type: a.type || rm.type || 'Standard',
            building: a.buildingName || a.building || rm.buildingName || rm.building || rm.bldgCode || '',
            baseRate: amountNumber(a.baseRate || a.rackRate || rm.baseRate || 0),
            discountPercent: Number(a.discountPercent || 0),
            rate: amountNumber(a.rate ?? a.finalRate ?? a.amount ?? 0)
        };
    });
}

function roomDisplayName(a) {
    const label = a.roomLabel || a.roomId || '';
    return a.building && !label.includes(a.building) ? `${a.building} ${label}` : label;
}

function getCurrency() {
    return { code: 'PHP', symbol: '₱' };
}

function money(value) {
    const cur = getCurrency();
    return `${cur.symbol}${amountNumber(value).toLocaleString()}`;
}

function nights() {
    const cin = new Date(group.checkin);
    const cout = new Date(group.checkout);
    if (Number.isNaN(cin.getTime()) || Number.isNaN(cout.getTime())) return 1;
    return Math.max(1, Math.round((cout - cin) / 86400000));
}

function groupReservations() {
    return reservations.filter(r => r.groupId === group.id && r.status !== 'cancelled');
}

function roomingList() {
    if (!Array.isArray(group.roomingList)) group.roomingList = [];
    return group.roomingList;
}

function saveGroup() {
    const idx = groups.findIndex(g => g.id === group.id);
    if (idx >= 0) groups[idx] = group;
    else if (group.id) groups.unshift(group);
    try {
        if (window.PmsMockApi && group?.id) window.PmsMockApi.request('PATCH', `/groups/events/${encodeURIComponent(group.id)}`, { body: group });
    } catch(e) {
        console.warn('Mock group save failed', e);
    }
    localStorage.setItem('pms_groups', JSON.stringify(groups));
}

function switchTab(id, btn) {
    document.querySelectorAll('.local-tab').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById(id).classList.add('active');
}

function switchTabById(id) {
    const btn = Array.from(document.querySelectorAll('.local-tab')).find(b => (b.getAttribute('onclick') || '').includes(`'${id}'`));
    if (btn) switchTab(id, btn);
}

function isDraftGroup() {
    return !group || !group.id;
}

function createDraftGroup() {
    return {
        id: '',
        name: '',
        agency: '',
        agencyId: '',
        type: '기업 행사 / 컨퍼런스',
        status: 'pending',
        checkin: '',
        checkout: '',
        block: 0,
        pickup: 0,
        pax: 0,
        routing: '단체 일괄 정산',
        sales: '',
        contact: '',
        note: '',
        roomAllocations: [],
        allocations: [],
        roomingList: [],
        history: []
    };
}

function nextGroupId() {
    const today = new Date().toISOString().slice(2,10).replace(/-/g, '');
    const prefix = `GRP-${today}`;
    const count = groups.filter(g => String(g.id || '').startsWith(prefix)).length + 1;
    return `${prefix}-${String(count).padStart(2, '0')}`;
}

function renderHeader() {
    const s = statusMap[group.status] || statusMap.confirmed;
    const title = group.name || '신규 단체 관리';
    document.getElementById('bcName').textContent = title;
    document.getElementById('groupName').textContent = title;
    document.getElementById('agencyText').textContent = group.agency || '-';
    document.getElementById('dateText').textContent = `${group.checkin || '-'} ~ ${group.checkout || '-'}`;
    document.getElementById('salesText').textContent = group.sales || '-';
    document.getElementById('statusPill').textContent = isDraftGroup() ? '신규 작성' : s.label;
    document.getElementById('statusPill').className = `status-pill ${s.cls}`;
}

function renderSummary() {
    const assigned = getAssignedRooms(group);
    const guests = roomingList();
    const verified = guests.filter(g => g.docStatus === 'verified').length;
    const pax = Number(group.pax || 0);
    const guestPct = pax ? Math.round(guests.length / pax * 100) : 0;
    document.getElementById('summaryGrid').innerHTML = [
        ['배정 호실', `${assigned.length}실`],
        ['객실 일정', assigned.length ? `${group.checkin || '-'} ~ ${group.checkout || '-'}` : '-'],
        ['총 인원', `${pax}명`],
        ['등록 투숙객', `${guests.length}명 (${guestPct}%)`],
        ['여권/신분증 확인', `${verified}명`]
    ].map(([label,value]) => `<div class="summary-card"><div class="label">${label}</div><div class="value">${value}</div></div>`).join('');
}

function renderOverview() {
    document.getElementById('overview').innerHTML = `
        <div class="section-title"><i class="fa-solid fa-circle-info"></i> 기본 정보</div>
        <div class="info-grid">
            <div class="info-item"><div class="k">행사 유형</div><div class="v">${eventTypeLabel(group.type) || '-'}</div></div>
            <div class="info-item"><div class="k">정산 방식</div><div class="v">${billingTermLabel(group.routing) || '-'}</div></div>
            <div class="info-item"><div class="k">행사 연락 담당자</div><div class="v">${group.contact || '-'}</div></div>
            <div class="info-item"><div class="k">행사 담당 영업 직원</div><div class="v">${group.sales || '-'}</div></div>
            <div class="info-item" style="grid-column:1/-1"><div class="k">메모</div><div class="v">${group.note || '없음'}</div></div>
        </div>`;
}

function renderRooms() {
    const assigned = getAssignedRooms(group);
    const guests = roomingList();
    document.getElementById('rooms').innerHTML = `
        <div class="section-title"><i class="fa-solid fa-bed"></i> 객실/투숙객 배정</div>
        <table class="data-table">
            <thead><tr><th>호실</th><th>타입</th><th>요금</th><th>대표 투숙객</th><th></th></tr></thead>
            <tbody>
                ${assigned.map(a => {
                    const primary = guests.find(g => g.roomId === a.roomId && g.role === 'primary');
                    return `<tr>
                        <td><span class="room-chip">${roomDisplayName(a)}</span></td>
                        <td>${a.type}</td>
                        <td>${money(a.rate)} <span style="color:var(--txt3);font-size:.7rem">(${a.discountPercent || 0}% 할인)</span></td>
                        <td>${primary ? primary.name : '-'}</td>
                        <td><button class="mini-btn primary" onclick="openRoomingModal('${a.roomId}', '${primary?.id || ''}')"><i class="fa-solid fa-user-plus"></i> ${primary ? '투숙객 수정' : '투숙객 등록'}</button></td>
                    </tr>`;
                }).join('') || '<tr><td colspan="5">배정된 호실이 없습니다.</td></tr>'}
            </tbody>
        </table>`;
}

function renderRooming() {
    const guests = roomingList();
    const pax = Number(group.pax || 0);
    const pct = pax ? Math.min(100, Math.round(guests.length / pax * 100)) : 0;
    document.getElementById('rooming').innerHTML = `
        <div class="rooming-tools">
            <div>
                <div class="section-title" style="margin-bottom:6px"><i class="fa-solid fa-users"></i> 투숙객 명단</div>
                <div style="font-size:.76rem;color:var(--txt3);font-weight:700">${guests.length}/${pax || 0}명 등록</div>
            </div>
            <button class="mini-btn primary" onclick="openRoomingModal()"><i class="fa-solid fa-user-plus"></i> 투숙객 추가</button>
        </div>
        <div class="progress" style="margin-bottom:12px"><div style="width:${pct}%"></div></div>
        <table class="data-table">
            <thead><tr><th>이름</th><th>호실</th><th>구분</th><th>국적</th><th>여권/신분증</th><th></th></tr></thead>
            <tbody>
                ${guests.map(g => `<tr>
                    <td>${g.name}</td>
                    <td>${g.roomId || '-'}</td>
                    <td>${g.role === 'primary' ? '대표' : '동반'}</td>
                    <td>${g.nation || '-'}</td>
                    <td>${g.docStatus === 'verified' ? '확인 완료' : '미확인'}</td>
                    <td><button class="mini-btn danger" onclick="removeRoomingGuest('${g.id}')"><i class="fa-solid fa-trash"></i> 삭제</button></td>
                </tr>`).join('') || '<tr><td colspan="6">등록된 투숙객이 없습니다. 엑셀 업로드/일괄 등록은 다음 단계에서 붙일 수 있습니다.</td></tr>'}
            </tbody>
        </table>`;
}

const groupSettlementMeta = {
    room: { label: '객실', icon: 'fa-bed' },
    pos: { label: '통합 POS', icon: 'fa-cash-register' },
    rentacar: { label: '렌터카', icon: 'fa-car' },
    car: { label: '렌터카', icon: 'fa-car' },
    golf: { label: '골프장', icon: 'fa-golf-ball-tee' }
};

function groupSettlementType(type) {
    const key = String(type || '').toLowerCase();
    if (['fnb', 'retail', 'restaurant', 'pos'].includes(key)) return 'pos';
    if (['rentacar', 'rentalcar', 'car', 'rental'].includes(key)) return 'rentacar';
    if (key === 'golf') return 'golf';
    return key || 'pos';
}

function groupSettlementTypeMeta(type) {
    return groupSettlementMeta[groupSettlementType(type)] || { label: '기타', icon: 'fa-receipt' };
}

function groupStoredSettlementItems() {
    const source = Array.isArray(group.settlementItems)
        ? group.settlementItems
        : (Array.isArray(group.folioItems) ? group.folioItems : []);
    return source.map((item, index) => {
        const type = groupSettlementType(item.type || item.category);
        return {
            id: item.id || `GROUP-SVC-${index + 1}`,
            type,
            desc: item.desc || item.label || item.name || groupSettlementTypeMeta(type).label,
            ref: item.ref || item.source || item.orderId || item.roomId || '단체 공용',
            qty: Number(item.qty || item.quantity || 1),
            amount: amountNumber(item.amount || item.total || item.price || 0),
            status: item.status || 'pending'
        };
    }).filter(item => item.amount > 0);
}

function fallbackGroupServiceItems() {
    if (groupStoredSettlementItems().length) return [];
    return [
        { id: 'GROUP-POS-001', type: 'pos', desc: '행사 커피 브레이크 / 식음료 일괄', ref: group.name || '단체 공용', qty: 1, amount: 220, status: 'pending' },
        { id: 'GROUP-RENT-001', type: 'rentacar', desc: 'VIP 스피커 공항 픽업 렌터카', ref: 'OT 1401', qty: 1, amount: 180, status: 'pending' },
        { id: 'GROUP-GOLF-001', type: 'golf', desc: '임원 골프장 제휴 예약', ref: 'FT 0801', qty: 1, amount: 300, status: 'pending' }
    ];
}

function groupSettlementLines() {
    const n = nights();
    const roomLines = getAssignedRooms(group).map(room => ({
        id: `ROOM-${room.roomId}`,
        type: 'room',
        desc: `${roomDisplayName(room)} 객실료`,
        ref: `${room.type || '-'} · ${n}박`,
        qty: n,
        amount: amountNumber(room.rate) * n,
        status: 'pending'
    }));
    return [...roomLines, ...groupStoredSettlementItems(), ...fallbackGroupServiceItems()];
}

function groupSettlementTotals(lines) {
    return lines.reduce((acc, item) => {
        const type = groupSettlementType(item.type);
        acc[type] = (acc[type] || 0) + amountNumber(item.amount);
        acc.total += amountNumber(item.amount);
        return acc;
    }, { total: 0 });
}

function groupSettlementStatusLabel(status) {
    if (status === 'paid' || status === 'closed') return '정산 완료';
    if (status === 'posted') return '전표 반영';
    return '미정산';
}

function renderFolio() {
    const n = nights();
    const lines = groupSettlementLines();
    const totals = groupSettlementTotals(lines);
    const categoryKeys = ['room', 'pos', 'rentacar', 'golf'];
    document.getElementById('folio').innerHTML = `
        <div class="section-title"><i class="fa-solid fa-file-invoice-dollar"></i> 정산 요약</div>
        <div class="info-grid">
            <div class="info-item"><div class="k">정산 방식</div><div class="v">${billingTermLabel(group.routing) || '-'}</div></div>
            <div class="info-item"><div class="k">숙박 일수</div><div class="v">${n}박</div></div>
            <div class="info-item"><div class="k">업체</div><div class="v">${group.agency || group.companyName || '-'}</div></div>
            <div class="info-item"><div class="k">총 정산 예정</div><div class="v">${money(totals.total)}</div></div>
        </div>
        <div class="group-folio-summary">
            ${categoryKeys.map(type => {
                const meta = groupSettlementTypeMeta(type);
                return `<div class="group-folio-card ${type === 'room' ? 'total' : ''}">
                    <div class="k"><i class="fa-solid ${meta.icon}"></i>${meta.label}</div>
                    <div class="v">${money(totals[type] || 0)}</div>
                </div>`;
            }).join('')}
        </div>
        <table class="data-table group-folio-table">
            <thead><tr><th>구분</th><th>항목</th><th>연결</th><th>수량/일수</th><th>상태</th><th>금액</th></tr></thead>
            <tbody>
                ${lines.map(item => {
                    const meta = groupSettlementTypeMeta(item.type);
                    return `<tr>

    try {

        }
        if (window.PmsAPI?.getReservations) {
            window.reservations = reservations = await PmsAPI.getReservations();
        }
        if (typeof window.openUnifiedResModal !== 'function') {
            showToast('예약 모달을 불러오지 못했습니다. 페이지를 새로고침 후 다시 시도해주세요.', 'error');
            return;
        }
        const existing = groupReservations().find(r => r.room === roomIdValue || r.fullRoom === roomIdValue);
        if (existing) {
            await window.openUnifiedResModal(existing.id);
            return;
        }
        const a = getAssignedRooms(group).find(x => x.roomId === roomIdValue);
        await window.openUnifiedResModal({
            groupId: group.id,
            room: roomIdValue,
            type: a?.type,

function formatMD(value) {
    const d = new Date(value);
    if (Number.isNaN(d.getTime())) return value || '';
    return `${d.getMonth()+1}/${d.getDate()}`;
}

        const rm = rooms.find(r => roomId(r) === id) || {};

        const discountPercent = Number(row.querySelector('.detail-discount').value || 0);

            roomId: id,
            roomLabel: `${rm.bldgCode || rm.building || ''} ${rm.display || rm.number || id}`.trim(),

            building: rm.bldgCode || rm.building || '',
            baseRate,
            discountPercent,
            rate: Math.round(baseRate * (100 - discountPercent) / 100)
        };
    }).filter(a => a.roomId);
    const ids = allocations.map(a => a.roomId);
    if (new Set(ids).size !== ids.length) { showToast('같은 호실이 중복되었습니다.', 'error'); return; }

    group.allocations = allocations;

document.addEventListener('DOMContentLoaded', async () => {
    try {
        rooms = await PmsAPI.getAllRooms();
        const stored = localStorage.getItem('pms_groups');
        const rawGroups = stored ? JSON.parse(stored) : [];
        groups = cleanPersistedGroups(rawGroups);
        if (groups.length !== rawGroups.length) localStorage.setItem('pms_groups', JSON.stringify(groups));
        try {
            if (window.PmsAPI?.getGroups) {
                const apiGroups = await window.PmsAPI.getGroups();
                const merged = new Map();
                [...apiGroups, ...groups].forEach(item => {
                    if (isStaleSamsungGroup(item)) return;
                    if (item?.id) merged.set(item.id, item);
                });
                groups = [...merged.values()];
                localStorage.setItem('pms_groups', JSON.stringify(groups));
            }
        } catch(e) {
            console.warn('Group mock detail load failed', e);
        }
        if ((!Array.isArray(groups) || groups.length === 0) && PmsAPI.getGroups) {
            groups = await PmsAPI.getGroups();
            localStorage.setItem('pms_groups', JSON.stringify(groups));
        }
        const params = new URLSearchParams(location.search);
        if (params.get('mode') === 'new') {
            group = createDraftGroup();
            window.reservations = reservations = [];
            renderAll();
            switchTabById('overview');
            return;
        }
        const id = getId();
        group = groups.find(g => g.id === id);
        if (!group) {
            try {
                const selected = JSON.parse(sessionStorage.getItem('pms_selected_group') || 'null');
                if (selected && selected.id === id) {
                    group = selected;
                    groups.unshift(group);
                }
            } catch(e) {}
        }
        if (!group) {
            document.querySelector('.detail-shell').innerHTML = `<div class="panel">단체/행사를 찾을 수 없습니다. <button class="mini-btn" onclick="location.href='groups_blocks.html'">목록으로</button></div>`;
            return;
        }
        window.reservations = reservations = await PmsAPI.getReservations();
        try {
            const syncedGroups = cleanPersistedGroups(JSON.parse(localStorage.getItem('pms_groups') || '[]'));
            const syncedGroup = syncedGroups.find(g => g.id === id);
            if (syncedGroup) {
                groups = syncedGroups;
                group = syncedGroup;
            }
        } catch(e) {}
        renderAll();
        const initialTab = new URLSearchParams(location.search).get('tab');
        if (initialTab) {
            const tabBtn = Array.from(document.querySelectorAll('.local-tab')).find(btn => (btn.getAttribute('onclick') || '').includes(`'${initialTab}'`));
            if (tabBtn && document.getElementById(initialTab)) switchTab(initialTab, tabBtn);
        }
    } catch(e) {
        console.error(e);
        document.querySelector('.detail-shell').innerHTML = `<div class="panel" style="color:var(--danger)">상세 화면을 불러오지 못했습니다: ${e.message}</div>`;
    }
});

<script>
(function(){
    let detailCompanies = [];
    let detailCompaniesHydrating = null;
    function safeAttr(value) {
        return String(value || '').replaceAll('&', '&amp;').replaceAll('"', '&quot;').replaceAll('<', '&lt;').replaceAll('>', '&gt;');
    }
    function normalizeCompanyRecord(company = {}) {
        const contact = company.contact || {};
        const rawBilling = company.billing && typeof company.billing === 'object'
            ? company.billing.paymentTerm
            : company.billing;
        const billing = billingTermLabel(rawBilling);
        const typeLabel = companyTypeLabel(company.type);
        const discount = Number(company.groupDiscount ?? company.discountPercent ?? 0);
        const id = company.id || company.companyId || '';
        const name = company.name || company.companyName || company.displayName || company.label || id;
        return {
            ...company,
            id,
            name,
            displayName: company.displayName || company.label || name,
            label: company.label || company.displayName || name,
            rawType: company.rawType || company.type || '',
            typeLabel,
            contactName: company.contactName || contact.name || '',
            phone: company.phone || contact.phone || '',
            email: company.email || contact.email || '',
            billing,
            groupDiscount: company.groupDiscount ?? discount,
            discountPercent: company.discountPercent ?? discount,
            rate: company.rate || (discount ? `객실 ${discount}% 할인` : '')
        };
    }
    function setDetailCompanies(list) {
        detailCompanies = (Array.isArray(list) ? list : []).map(normalizeCompanyRecord).filter(c => c.id);
        if (detailCompanies.length) localStorage.setItem('pms_companies', JSON.stringify(detailCompanies));
        return detailCompanies;
    }
    function loadDetailCompanies() {
        try {
            const stored = JSON.parse(localStorage.getItem('pms_companies') || '[]');
            if (Array.isArray(stored) && stored.length) return setDetailCompanies(stored);
        } catch(e) {}
        if (!detailCompanies.length && !detailCompaniesHydrating) hydrateDetailCompanies();
        return detailCompanies;
    }
    async function fetchStaticCompanies() {
        try {
            const response = await fetch('../data/api/v1/b2b/companies.json', { cache: 'no-store' });
            if (!response.ok) return [];
            const payload = await response.json();
            return payload?.data?.items || payload?.items || [];
        } catch(e) {
            return [];
        }
    }
    async function hydrateDetailCompanies() {
        if (detailCompaniesHydrating) return detailCompaniesHydrating;
        detailCompaniesHydrating = (async () => {
            let companies = [];
            try {
                if (window.PmsAPI?.getCompanies) companies = await window.PmsAPI.getCompanies();
            } catch(e) {}
            if (!Array.isArray(companies) || !companies.length) companies = await fetchStaticCompanies();
            const normalized = setDetailCompanies(companies);
            reconcileGroupCompany();
            return normalized;
        })().finally(() => { detailCompaniesHydrating = null; });

    function companyById(id) {

    function companyForGroup() {
        const companies = loadDetailCompanies();
        const groupCompanyId = group?.agencyId || group?.companyId;
        if (groupCompanyId) {
            const byId = companies.find(c => String(c.id) === String(groupCompanyId) || String(c.companyId || '') === String(groupCompanyId));
            if (byId) return byId;
        }
        const agency = String(group?.agency || group?.companyName || '').toLowerCase();
        if (agency) {
            return companies.find(c => companyNames(c).some(name => name === agency || agency.includes(name) || name.includes(agency)));
        }
        return null;
    }
    function reconcileGroupCompany() {
        if (!group) return null;
        const params = new URLSearchParams(location.search);
        const paramCompanyId = params.get('companyId') || '';
        const company = companyById(group.agencyId || group.companyId || paramCompanyId) || companyForGroup();
        if (!company) return null;
        group.agencyId = company.id;
        group.companyId = group.companyId || company.id;
        group.agency = group.agency || group.companyName || company.name || company.displayName || '';
        group.companyName = group.companyName || group.agency;
        if ((!group.routing || group.routing === 'Master Folio' || group.routing === 'Master Folio (단체 일괄)') && company.billing) group.routing = company.billing;
        if (!group.contact) group.contact = [company.contactName, company.phone].filter(Boolean).join(' / ');
        if (group.eventDiscountPercent === undefined || group.eventDiscountPercent === null || group.eventDiscountPercent === '') {
            group.eventDiscountPercent = eventDiscountPercent();
        }
        return company;
    }
    function discountFromCompany(c) {
        if (!c) return 0;
        if (c.groupDiscount !== undefined) return Number(c.groupDiscount || 0);
        if (c.discountPercent !== undefined) return Number(c.discountPercent || 0);
        const m = String(c.rate || '').match(/(\d+(?:\.\d+)?)\s*%/);
        return m ? Number(m[1]) : 0;
    }
    function companyDiscount() {
        return discountFromCompany(companyForGroup());
    }
    function allocationDiscountSnapshot() {
        const allocations = Array.isArray(group?.roomAllocations) && group.roomAllocations.length ? group.roomAllocations : (group?.allocations || []);
        const values = allocations.map(a => Number(a?.discountPercent)).filter(v => Number.isFinite(v) && v >= 0);
        if (!values.length) return null;
        return Math.round(values.reduce((sum, value) => sum + value, 0) / values.length * 10) / 10;
    }
    function eventDiscountPercent() {
        const field = document.getElementById('detailEventDiscount');
        if (field && field.value !== '') return Number(field.value || 0);
        const explicit = group?.eventDiscountPercent ?? group?.appliedDiscountPercent;
        if (explicit !== undefined && explicit !== null && explicit !== '') return Number(explicit || 0);
        const snapshot = allocationDiscountSnapshot();
        if (snapshot !== null) return snapshot;
        return companyDiscount();
    }

    function isValidDetailCompanyPhone(value, required = false) {

            <input type="number" class="form-input detail-discount" placeholder="할인율" value="${allocation.discountPercent ?? eventDiscountPercent()}">
            <button class="mini-btn danger" type="button" onclick="this.closest('.allocation-editor-row').remove()"><i class="fa-solid fa-trash"></i></button>`;
        wrap.prepend(row);
    };
})();
</script>
<script>
(function(){
    const style = document.createElement('style');
    style.textContent = `
        .allocation-editor-row{grid-template-columns:minmax(240px,1fr) 140px 120px 140px 44px}
        .alloc-field{display:flex;flex-direction:column;gap:4px;min-width:0}
        .alloc-field label{font-size:.68rem;font-weight:850;color:var(--txt3)}
        .alloc-field .form-input[readonly]{background:#eef2f7;color:#475569;font-weight:800}
        @media(max-width:900px){.allocation-editor-row{grid-template-columns:1fr}.allocation-editor-row .mini-btn{width:max-content}}
    `;
    document.head.appendChild(style);

    function typeConfigs() {
        try {
            const saved = JSON.parse(localStorage.getItem('pms_room_types_config') || '[]');
            return Array.isArray(saved) ? saved : [];
        } catch(e) {
            return [];
        }
    }
    function baseRateFor(room, allocation = {}) {
        if (Number(allocation.baseRate || 0) > 0) return Number(allocation.baseRate);
        const direct = Number(room?.baseRate || room?.rate || room?.price || room?.defaultRate || room?.rackRate || 0);
        if (direct > 0) return direct;
        const type = String(room?.type || allocation.type || '').toLowerCase();
        const cfg = typeConfigs().find(t => {
            const keys = [t.id, t.code, t.name, t.type, t.label].filter(Boolean).map(v => String(v).toLowerCase());
            return keys.some(k => k === type || k.includes(type) || type.includes(k));
        });
        const cfgRate = Number(cfg?.basePrice || cfg?.baseRate || cfg?.rate || cfg?.price || 0);
        if (cfgRate > 0) return cfgRate;
        if (type.includes('penthouse')) return 500000;
        if (type.includes('suite')) return 250000;
        if (type.includes('deluxe')) return 150000;
        return type ? 100000 : 0;
    }
    function defaultDiscount() {
        const eventDiscount = window.groupEventDiscountPercent?.();
        if (Number.isFinite(Number(eventDiscount))) return Number(eventDiscount);
        try {
            const companies = JSON.parse(localStorage.getItem('pms_companies') || '[]');
            const c = companies.find(x => x.id === group?.agencyId || x.name === group?.agency || (group?.agency || '').includes(x.name));
            if (!c) return 0;
            if (c.groupDiscount !== undefined) return Number(c.groupDiscount || 0);
            const m = String(c.rate || '').match(/(\d+(?:\.\d+)?)\s*%/);
            return m ? Number(m[1]) : 0;
        } catch(e) {
            return 0;
        }
    }
    function moneyNumber(value) {
        return Number(value || 0);
    }
    window.recalcAllocationRow = function(row, keepFinal = false) {
        const roomValue = row.querySelector('.detail-room')?.value || '';
        const room = (rooms || []).find(r => roomId(r) === roomValue) || {};
        const base = baseRateFor(room);
        const discount = Number(row.querySelector('.detail-discount')?.value || 0);
        const baseInput = row.querySelector('.detail-base-rate');
        const finalInput = row.querySelector('.detail-final-rate');
        if (baseInput) baseInput.value = base || '';
        if (finalInput && !keepFinal) finalInput.value = base ? Math.round(base * (100 - discount) / 100) : '';
    };
    window.refreshAllocationRoomOptions = function() {
        const rows = Array.from(document.querySelectorAll('.allocation-editor-row'));
        const rawSelected = rows.map(row => row.querySelector('.detail-room')?.value || '');
        const firstRowForValue = new Map();
        rows.forEach((row, index) => {
            const value = rawSelected[index];
            if (value && !firstRowForValue.has(value)) firstRowForValue.set(value, row);
        });
        rows.forEach(row => {
            const select = row.querySelector('.detail-room');
            if (!select) return;
            const rawCurrent = select.value || '';
            const current = rawCurrent && firstRowForValue.get(rawCurrent) === row ? rawCurrent : '';
            const unavailable = new Set(rawSelected.filter(value => value && value !== current));
            select.innerHTML = allocationOptions(current, unavailable);
            select.value = current;
            if (rawCurrent && !current) window.recalcAllocationRow(row);
        });
    };
    window.removeAllocationRow = function(button) {
        button?.closest('.allocation-editor-row')?.remove();
        window.refreshAllocationRoomOptions();
    };
    window.addDetailAllocationRow = function(allocation = {}) {
        const wrap = document.getElementById('detailAllocationEditor');
        if (!wrap) return;
        const room = (rooms || []).find(r => roomId(r) === allocation.roomId) || {};
        const base = baseRateFor(room, allocation);
        const discount = allocation.discountPercent ?? defaultDiscount();
        const finalRate = allocation.rate || (base ? Math.round(base * (100 - Number(discount || 0)) / 100) : '');
        const row = document.createElement('div');
        row.className = 'allocation-editor-row';
        row.dataset.originalRoomId = allocation.roomId || '';
        row.innerHTML = `
            <div class="alloc-field">
                <label>호실</label>
                <select class="form-input detail-room" style="width:100%">${allocationOptions(allocation.roomId)}</select>
            </div>
            <div class="alloc-field">
                <label>기준 단가</label>
                <input type="number" class="form-input detail-base-rate" readonly value="${base || ''}">
            </div>
            <div class="alloc-field">
                <label>할인율(%)</label>
                <input type="number" class="form-input detail-discount" min="0" max="100" step="1" value="${discount}">
            </div>
            <div class="alloc-field">
                <label>최종 단가</label>
                <input type="number" class="form-input detail-final-rate" min="0" value="${finalRate}">
            </div>
            <button class="mini-btn danger" type="button" title="삭제" onclick="removeAllocationRow(this)"><i class="fa-solid fa-trash"></i></button>`;
        row.querySelector('.detail-room').addEventListener('change', () => {
            window.recalcAllocationRow(row);
            window.refreshAllocationRoomOptions();
        });
        row.querySelector('.detail-discount').addEventListener('input', () => window.recalcAllocationRow(row));
        wrap.prepend(row);
        window.refreshAllocationRoomOptions();
    };
    window.saveRoomAllocationsFromDetail = async function() {
        if (isDraftGroup()) { showToast('기본 정보를 먼저 저장해주세요.', 'error'); switchTabById('overview'); return; }
        const rows = Array.from(document.querySelectorAll('.allocation-editor-row'));
        const allocations = rows.map(row => {
            const id = row.querySelector('.detail-room').value;
            const rm = (rooms || []).find(r => roomId(r) === id) || {};
            const baseRate = moneyNumber(row.querySelector('.detail-base-rate').value || baseRateFor(rm));
            const discountPercent = Number(row.querySelector('.detail-discount').value || 0);
            const rate = moneyNumber(row.querySelector('.detail-final-rate').value || Math.round(baseRate * (100 - discountPercent) / 100));
            return {
                roomId: id,
                roomLabel: `${rm.bldgCode || rm.building || ''} ${rm.display || rm.number || id}`.trim(),
                type: rm.type || 'Standard',
                building: rm.bldgCode || rm.building || '',
                baseRate,
                discountPercent,
                rate
            };
        }).filter(a => a.roomId);
        const ids = allocations.map(a => a.roomId);
        if (new Set(ids).size !== ids.length) { showToast('같은 호실이 중복되었습니다.', 'error'); return; }
        group.roomAllocations = allocations;
        group.allocations = allocations;
        group.block = allocations.length;
        group.history = group.history || [];
        group.history.unshift({ at: new Date().toLocaleString('ko-KR'), action: '객실 배정 수정', note: `${allocations.length}실` });
        saveGroup();
        if (window.PmsAPI?.getReservations) window.reservations = reservations = await PmsAPI.getReservations();
        renderAll();
        switchTabById('rooms');
        showToast('객실 배정이 저장되었습니다.');
    };
})();
</script>

                <thead><tr><th>호실</th><th>투숙객</th><th>등록</th><th>신분증</th><th>요금</th><th>관리</th></tr></thead>
                <tbody>

                                    <button class="mini-btn primary" onclick="openRoomingModal('${a.roomId}', '${guest?.id || ''}')"><i class="fa-solid fa-user-plus"></i> ${guest ? '투숙객 수정' : '투숙객 등록'}</button>

                    }).join('') || '<tr><td colspan="6">배정된 호실이 없습니다. 상단에서 호실을 추가하세요.</td></tr>'}
                </tbody>

        assigned.forEach(a => addDetailAllocationRow(a));

    window.renderRooming = function() {
        const panel = document.getElementById('rooming');
        if (panel) panel.innerHTML = '';
        const tab = Array.from(document.querySelectorAll('.local-tab')).find(btn => (btn.getAttribute('onclick') || '').includes("'rooming'"));
        if (tab) tab.style.display = 'none';
        const roomsTab = Array.from(document.querySelectorAll('.local-tab')).find(btn => (btn.getAttribute('onclick') || '').includes("'rooms'"));
        if (roomsTab) roomsTab.textContent = '객실/투숙객 배정';
    };
    window.openRoomingModal = function(roomIdValue = '', guestId = '') {
        populateGuestRooms();
        const guest = guestId ? roomingList().find(g => g.id === guestId) : primaryGuest(roomIdValue);
        const title = document.querySelector('#roomingModal .modal-title');
        if (title) title.textContent = guest ? '투숙객 정보 수정' : '투숙객 등록';
        document.getElementById('guestEditId').value = guest?.id || '';
        document.getElementById('guestNameInput').value = guest?.name || '';
        document.getElementById('guestRoomInput').value = guest?.roomId || roomIdValue || '';
        document.getElementById('guestRoleInput').value = guest?.role || 'primary';
        document.getElementById('guestNationInput').value = guest?.nation || '';
        document.getElementById('guestDocInput').value = guest?.docStatus || 'pending';
        openModal('roomingModal');
    };
    window.saveRoomingGuest = function() {
        const name = document.getElementById('guestNameInput').value.trim();
        if (!name) { showToast('이름을 입력하세요.', 'error'); return; }
        const editId = document.getElementById('guestEditId').value;
        const roomIdValue = document.getElementById('guestRoomInput').value;
        const data = {
            id: editId || 'GG-' + Date.now(),
            groupId: group.id,

            roomId: roomIdValue,

})();

<script>
(function(){
    function readArray(key) {
        try {
            const data = JSON.parse(localStorage.getItem(key) || '[]');
            return Array.isArray(data) ? data : [];
        } catch(e) {
            return [];
        }
    }

    function safe(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
    }

    function roomMatches(res, roomIdValue) {
        return res && (res.room === roomIdValue || res.fullRoom === roomIdValue || res.roomId === roomIdValue);
    }

    function reservationForAssignedRoom(roomIdValue) {
        return groupReservations().find(res => roomMatches(res, roomIdValue));
    }

    function reservationGuestName(res) {
        if (!res) return '';
        if (res.roomingGuestName && !isPendingAssignmentName(res.roomingGuestName)) return res.roomingGuestName;
        if (res.isGroupPlaceholder && !res.guest && !res.guestName) return '';
        const name = res.guestName || res.guest || '';
        return isPendingAssignmentName(name) ? '' : name;
    }

    function guestForRoom(roomIdValue) {
        const direct = roomingList().find(guest => guest.roomId === roomIdValue && guest.role === 'primary' && !isPendingAssignmentName(guest.name)) ||
            roomingList().find(guest => guest.roomId === roomIdValue && !isPendingAssignmentName(guest.name));
        if (direct) return direct;

        const res = reservationForAssignedRoom(roomIdValue);
        const name = reservationGuestName(res);
        if (!name) return null;
        return {
            id: res.roomingGuestId || res.guestId || `RES-${res.id || roomIdValue}`,
            groupId: group.id,
            roomId: roomIdValue,
            role: 'primary',
            name,
            nation: res.nation || res.nationality || '',
            docStatus: res.docStatus || res.documentStatus || 'pending',
            note: res.roomingGuestNote || res.guestNote || res.specialNotes || res.allergy || res.note || '',
            specialNotes: res.roomingGuestNote || res.guestNote || res.specialNotes || res.allergy || res.note || '',
            sourceReservation: true
        };
    }

    function guestsForRoom(roomIdValue) {
        const direct = allGuestRows()
            .filter(guest => guest.roomId === roomIdValue && !isPendingAssignmentName(guest.name))
            .sort((a, b) => (a.role === 'primary' ? 0 : 1) - (b.role === 'primary' ? 0 : 1));
        if (direct.length) return direct;
        const fallback = guestForRoom(roomIdValue);
        return fallback ? [fallback] : [];
    }

    function allGuestRows() {
        const guests = new Map();
        roomingList().forEach(guest => {
            if (!guest?.name && !guest?.id) return;
            if (isPendingAssignmentName(guest?.name)) return;
            guests.set(guest.id || `${guest.name}-${guest.roomId || ''}`, guest);
        });
        groupReservations().forEach(res => {
            const name = reservationGuestName(res);
            if (!name) return;
            const key = res.roomingGuestId || res.guestId || `${name}-${res.room || res.fullRoom || ''}`;
            if (!guests.has(key)) {
                guests.set(key, {
                    id: key,
                    groupId: group.id,
                    roomId: res.room || res.fullRoom || '',
                    role: 'primary',
                    name,
                    nation: res.nation || res.nationality || '',
                    docStatus: res.docStatus || res.documentStatus || 'pending',
                    sourceReservation: true
                });
            }
        });
        return [...guests.values()];
    }

    function guestStatusCell(guest) {
        return guest
            ? '<span class="stage-pill stage-live">등록</span>'
            : '<span class="stage-pill stage-past">미등록</span>';
    }

    function docStatusCell(guest) {
        if (!guest) return '<span style="color:var(--txt3);font-weight:800">-</span>';
        return guest.docStatus === 'verified'
            ? '<span class="stage-pill stage-live">확인 완료</span>'
            : '<span class="stage-pill stage-upcoming">미확인</span>';
    }

    window.saveGroup = function() {
        if (!group?.id) return;
        const stored = readArray('pms_groups');
        const memory = Array.isArray(groups) ? groups : [];
        const merged = new Map();
        [...stored, ...memory].forEach(item => {
            if (item?.id) merged.set(item.id, item);
        });
        merged.set(group.id, group);
        groups = [...merged.values()];
        let mockSave = null;
        try {
            if (window.PmsMockApi) mockSave = window.PmsMockApi.request('PATCH', `/groups/events/${encodeURIComponent(group.id)}`, { body: group });
        } catch(e) {
            console.warn('Mock group save failed', e);
        }
        localStorage.setItem('pms_groups', JSON.stringify(groups));
        try { sessionStorage.setItem('pms_selected_group', JSON.stringify(group)); } catch(e) {}
        return mockSave || Promise.resolve(group);
    };
    try { saveGroup = window.saveGroup; } catch(e) {}

    window.populateGuestRooms = function() {
        const select = document.getElementById('guestRoomInput');
        if (!select) return;
        const assigned = getAssignedRooms(group);
        select.innerHTML = '<option value="">호실 선택</option>' + assigned.map(room =>
            `<option value="${safe(room.roomId)}">${safe(roomDisplayName(room))} · ${safe(room.type)}</option>`
        ).join('');
    };
    try { populateGuestRooms = window.populateGuestRooms; } catch(e) {}

    window.renderSummary = function() {
        const assigned = getAssignedRooms(group);
        const guests = allGuestRows();
        const verified = guests.filter(guest => guest.docStatus === 'verified').length;
        const pax = Number(group.pax || 0);
        const guestPct = pax ? Math.round(guests.length / pax * 100) : 0;
        document.getElementById('summaryGrid').innerHTML = [
            ['배정 호실', `${assigned.length}실`],
            ['객실 일정', assigned.length ? `${group.checkin || '-'} ~ ${group.checkout || '-'}` : '-'],
            ['총 인원', `${pax}명`],
            ['등록 투숙객', `${guests.length}명 (${guestPct}%)`],
            ['여권/신분증 확인', `${verified}명`]
        ].map(([label, value]) => `<div class="summary-card"><div class="label">${label}</div><div class="value">${value}</div></div>`).join('');
    };
    try { renderSummary = window.renderSummary; } catch(e) {}

    window.renderRooms = function() {
        if (isDraftGroup()) {
            document.getElementById('rooms').innerHTML = '<div class="empty-guide">기본 정보를 저장하면 객실 배정과 투숙객 등록을 시작할 수 있습니다.</div>';
            return;
        }

        const assigned = getAssignedRooms(group);
        const guests = allGuestRows();
        const assignedIds = new Set(assigned.map(room => room.roomId));
        const registered = assigned.filter(room => guestForRoom(room.roomId)).length;
        const unassignedGuests = guests.filter(guest => !guest.roomId || !assignedIds.has(guest.roomId));
        const unassignedHtml = unassignedGuests.length ? `
            <div class="empty-guide" style="margin-top:12px;text-align:left">
                <strong>호실 미연결 투숙객</strong>
                <div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap">
                    ${unassignedGuests.map(guest => `<span class="room-chip">${safe(guest.name)} · ${safe(guest.roomId || '호실 미정')}</span>`).join('')}
                </div>
            </div>` : '';

        document.getElementById('rooms').innerHTML = `
            <div class="room-assignment-toolbar">
                <div>
                    <div class="section-title" style="margin-bottom:4px"><i class="fa-solid fa-bed"></i> 객실 / 투숙객 배정</div>
                    <div style="font-size:.76rem;color:var(--txt3);font-weight:800">투숙객 등록 ${registered}/${assigned.length}실 · 전체 명단 ${guests.length}/${group.pax || 0}명</div>
                </div>
                <div class="room-assignment-actions">
                    <button class="mini-btn" onclick="addDetailAllocationRow()"><i class="fa-solid fa-plus"></i> 호실 추가</button>

        const editId = document.getElementById('guestEditId').value;

            docStatus: document.getElementById('guestDocInput').value
        };
        const list = roomingList();
        let idx = editId ? list.findIndex(guest => guest.id === editId) : -1;
        if (idx < 0) idx = list.findIndex(guest => guest.roomId === roomIdValue && guest.role === data.role);
        if (idx >= 0) list[idx] = data;
        else list.push(data);

        const res = reservationForAssignedRoom(roomIdValue);
        if (res) {

            if (!res.isGroupPlaceholder) res.guest = data.name;

<script>
(function(){
    const ROOMING_PREFIX = 'Rooming';

    function escapeText(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
    }

    function assignedRoomList() {
        try {
            return getAssignedRooms(group);
        } catch(e) {
            return [];
        }
    }

    function currentGuestForRoom(roomIdValue) {
        const list = typeof roomingList === 'function' ? roomingList() : [];
        const direct = list.find(guest => guest.roomId === roomIdValue && guest.role === 'primary') ||
            list.find(guest => guest.roomId === roomIdValue);
        if (direct) return direct;

        const res = typeof groupReservations === 'function'
            ? groupReservations().find(item => item.room === roomIdValue || item.fullRoom === roomIdValue || item.roomId === roomIdValue)
            : null;
        const rawName = res?.roomingGuestName || res?.guestName || (!res?.isGroupPlaceholder ? res?.guest : '');
        const name = isPendingAssignmentName(rawName) ? '' : rawName;
        if (!name) return null;
        return {
            id: res.roomingGuestId || res.guestId || '',
            guestId: res.guestId || '',
            name,
            roomId: roomIdValue,
            role: 'primary',
            phone: res.phone || '',
            email: res.email || '',
            nation: res.nation || res.nationality || '',
            docStatus: res.docStatus || res.documentStatus || 'pending',
            note: res.roomingGuestNote || res.guestNote || res.specialNotes || res.allergy || res.note || '',
            specialNotes: res.roomingGuestNote || res.guestNote || res.specialNotes || res.allergy || res.note || '',
            sourceReservation: true
        };
    }

    function roomOptions(selectedRoomId = '') {
        const options = assignedRoomList().map(room => {
            const label = [roomDisplayName(room), room.type].filter(Boolean).join(' · ');
            return `<option value="${escapeText(room.roomId)}" ${room.roomId === selectedRoomId ? 'selected' : ''}>${escapeText(label)}</option>`;
        }).join('');
        return `<option value="">호실 선택</option>${options}`;
    }

    const ROOMING_NATIONALITIES = [
        'Australia', 'Brazil', 'Canada', 'China', 'France', 'Germany',
        'Hong Kong', 'India', 'Indonesia', 'Italy', 'Japan', 'Korea',
        'Malaysia', 'Philippines', 'Singapore', 'Taiwan', 'Thailand',
        'UAE', 'United Kingdom', 'USA', 'Vietnam'
    ];
    const ROOMING_NATIONALITY_LABELS = {
        Australia: '호주',
        Brazil: '브라질',
        Canada: '캐나다',
        China: '중국',
        France: '프랑스',
        Germany: '독일',
        'Hong Kong': '홍콩',
        India: '인도',
        Indonesia: '인도네시아',
        Italy: '이탈리아',
        Japan: '일본',
        Korea: '한국',
        Malaysia: '말레이시아',
        Philippines: '필리핀',
        Singapore: '싱가포르',
        Taiwan: '대만',
        Thailand: '태국',
        UAE: '아랍에미리트',
        'United Kingdom': '영국',
        USA: '미국',
        Vietnam: '베트남'
    };

    function normalizeRoomingNationality(value) {
        if (typeof window.normalizeGuestNationality === 'function') return window.normalizeGuestNationality(value);
        const raw = String(value || '').trim();
        if (!raw) return '';
        if (ROOMING_NATIONALITIES.includes(raw)) return raw;
        const byLabel = Object.entries(ROOMING_NATIONALITY_LABELS).find(([, label]) => label === raw);
        return byLabel ? byLabel[0] : raw;
    }

    function roomingNationalityOptions(selected = '') {
        const current = normalizeRoomingNationality(selected);
        const values = Array.from(new Set([...ROOMING_NATIONALITIES, current].filter(Boolean)));
        return `<option value="">국적 선택</option>` + values.map(country => {
            const label = ROOMING_NATIONALITY_LABELS[country] || country;
            return `<option value="${escapeText(country)}" ${country === current ? 'selected' : ''}>${escapeText(label)}</option>`;
        }).join('');
    }

    function setRoomingNationalityValue(input, value) {
        if (!input) return;
        const normalized = normalizeRoomingNationality(value);
        if (input.tagName === 'SELECT') {
            if (normalized && !Array.from(input.options).some(option => option.value === normalized)) {
                input.add(new Option(ROOMING_NATIONALITY_LABELS[normalized] || normalized, normalized));
            }
            input.value = normalized;
            return;
        }
        input.value = normalized || String(value || '');
    }

    window.normalizeRoomingNationality = window.normalizeRoomingNationality || normalizeRoomingNationality;
    window.setRoomingNationalityValue = window.setRoomingNationalityValue || setRoomingNationalityValue;

    function normalizeRoomingPhone(value) {
        if (typeof window.normalizeGuestPhone === 'function') return window.normalizeGuestPhone(value);
        let text = String(value || '').replace(/[^\d+\-\s()]/g, '');
        text = text.replace(/(?!^)\+/g, '');
        return text.replace(/\s+/g, ' ').trim();
    }

    function isValidRoomingPhone(value, required = false) {
        if (typeof window.isValidGuestPhone === 'function') return window.isValidGuestPhone(value, { required });
        const digits = String(value || '').replace(/\D/g, '');
        if (!digits) return !required;
        return digits.length >= 7 && digits.length <= 15;
    }

    function attachRoomingPhoneGuard(input) {
        if (!input) return;
        if (typeof window.attachGuestPhoneGuard === 'function') {
            window.attachGuestPhoneGuard(input);
            return;
        }
        if (input.dataset.phoneGuardBound === 'true') return;
        input.dataset.phoneGuardBound = 'true';
        input.type = 'tel';
        input.inputMode = 'tel';
        input.addEventListener('beforeinput', event => {
            if (!event.data || event.inputType === 'deleteContentBackward' || event.inputType === 'deleteContentForward') return;
            if (/[^\d+\-\s()]/.test(event.data)) event.preventDefault();
        });
        input.addEventListener('input', () => {
            const normalized = normalizeRoomingPhone(input.value);
            if (input.value !== normalized) input.value = normalized;
        });
    }

    window.normalizeRoomingPhone = window.normalizeRoomingPhone || normalizeRoomingPhone;
    window.isValidRoomingPhone = window.isValidRoomingPhone || isValidRoomingPhone;
    window.attachRoomingPhoneGuard = window.attachRoomingPhoneGuard || attachRoomingPhoneGuard;

    function guestSearchFallback() {
        return `
            <div id="newGuestForm${ROOMING_PREFIX}" style="display:block">
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                    <div style="display:flex;flex-direction:column;gap:5px">
                        <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">투숙객 이름 <span style="color:var(--danger)">*</span></label>
                        <input type="text" id="nrGuest${ROOMING_PREFIX}" class="form-input" placeholder="예: 홍길동">
                    </div>
                    <div style="display:flex;flex-direction:column;gap:5px">
                        <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">연락처</label>
                        <input type="tel" inputmode="tel" autocomplete="tel" id="nrPhone${ROOMING_PREFIX}" class="form-input" placeholder="+84 000 0000">
                    </div>
                    <div style="display:flex;flex-direction:column;gap:5px">
                        <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">이메일</label>
                        <input type="email" id="nrEmail${ROOMING_PREFIX}" class="form-input" placeholder="guest@email.com">
                    </div>
                    <div style="display:flex;flex-direction:column;gap:5px">
                        <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">국적</label>
                        <select id="nrNation${ROOMING_PREFIX}" class="form-input">
                            ${roomingNationalityOptions()}
                        </select>
                    </div>
                </div>
            </div>`;
    }

    function ensureRoomingModalLayout() {
        const modal = document.getElementById('roomingModal');
        if (!modal) return;
        const card = modal.querySelector('.modal-card');
        if (!card) return;
        card.style.maxWidth = '760px';
        card.style.width = '95vw';

        const list = roomingList();
