<script>
(function(){
    const previousOpenRoomingModal = window.openRoomingModal;

    function html(value) {
        return String(value ?? '').replace(/[&<>"']/g, ch => ({
            '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
        }[ch]));
    }

    function asMoneyNumber(value) {
        const n = Number(String(value ?? '').replace(/[^\d.-]/g, ''));
        return Number.isFinite(n) ? n : 0;
    }

    function assignedRooms() {
        try { return getAssignedRooms(group); } catch(e) { return []; }
    }

    function roomLabel(roomIdValue) {
        const room = assignedRooms().find(item => item.roomId === roomIdValue);
        return room ? (typeof roomDisplayName === 'function' ? roomDisplayName(room) : (room.roomLabel || room.roomId)) : roomIdValue;
    }

    function groupReservationForRoom(roomIdValue) {
        const list = typeof groupReservations === 'function' ? groupReservations() : [];
        return list.find(res => res.room === roomIdValue || res.fullRoom === roomIdValue || res.roomId === roomIdValue) || null;
    }

    function cleanGuestName(name) {
        const text = String(name || '').trim();
        return typeof isPendingAssignmentName === 'function' && isPendingAssignmentName(text) ? '' : text;
    }

    function isPlaceholderGuest(guest) {
        if (!guest) return true;
        const name = String(guest.name || guest.guestName || guest.roomingGuestName || guest.guest || '').trim();
        return !cleanGuestName(name) || guest.isGroupPlaceholder === true;
    }

    function reservationGuests(roomIdValue) {
        const res = groupReservationForRoom(roomIdValue);
        if (!res) return [];
        const rows = [];
        if (Array.isArray(res.roomingGuests) && res.roomingGuests.length) {
            res.roomingGuests.forEach((item, index) => {
                const name = cleanGuestName(item?.name || item?.guestName || item?.roomingGuestName || item?.guest);
                if (!name) return;
                rows.push({
                    id: item.id || item.guestId || item.roomingGuestId || `RES-${res.id}-${index}`,
                    guestId: item.guestId || item.id || item.roomingGuestId || '',
                    groupId: group.id,
                    roomId: roomIdValue,
                    role: item.role || (index === 0 ? 'primary' : 'companion'),
                    name,
                    phone: item.phone || '',
                    email: item.email || '',
                    nation: item.nation || item.country || res.nation || '',
                    docStatus: item.docStatus || res.docStatus || 'pending',
                    note: item.note || item.specialNotes || res.roomingGuestNote || '',
                    specialNotes: item.specialNotes || item.note || '',
                    sourceReservation: true
                });
            });
        }
        const primaryName = cleanGuestName(res.roomingGuestName || res.guestName || (!res.isGroupPlaceholder ? res.guest : ''));
        if (primaryName) {
            rows.push({
                id: res.roomingGuestId || res.guestId || `RES-${res.id}-primary`,
                guestId: res.guestId || '',
                groupId: group.id,
                roomId: roomIdValue,
                role: 'primary',
                name: primaryName,
                phone: res.phone || '',
                email: res.email || '',
                nation: res.nation || res.nationality || '',
                docStatus: res.docStatus || res.documentStatus || 'pending',
                note: res.roomingGuestNote || res.guestNote || res.specialNotes || '',
                specialNotes: res.roomingGuestNote || res.guestNote || res.specialNotes || '',
                sourceReservation: true
            });
        }
        const companionNames = [
            ...(Array.isArray(res.companionGuestNames) ? res.companionGuestNames : []),
            ...(Array.isArray(res.companions) ? res.companions.map(item => typeof item === 'string' ? item : item?.name) : [])
        ];
        companionNames.forEach((name, index) => {
            const clean = cleanGuestName(name);
            if (!clean) return;
            rows.push({
                id: (Array.isArray(res.companionGuestIds) && res.companionGuestIds[index]) || `RES-${res.id}-companion-${index}`,
                guestId: (Array.isArray(res.companionGuestIds) && res.companionGuestIds[index]) || '',
                groupId: group.id,
                roomId: roomIdValue,
                role: 'companion',
                name: clean,
                nation: res.nation || res.nationality || '',
                docStatus: res.docStatus || res.documentStatus || 'pending',
                sourceReservation: true
            });
        });
        return rows;
    }

    function guestMergeKey(guest, fallbackRoomId = '') {
        const roomIdValue = String(guest?.roomId || fallbackRoomId || '').trim().toLowerCase();
        const guestId = String(guest?.guestId || '').trim().toLowerCase();
        const name = cleanGuestName(guest?.name).toLowerCase();
        const role = String(guest?.role || '').trim().toLowerCase();
        if (name) return `${roomIdValue}|${role || 'guest'}:${name}`;
        if (guestId) return `${roomIdValue}|guest:${guestId}`;
        return `${roomIdValue}|id:${String(guest?.id || '').trim().toLowerCase()}`;
    }

    function roomGuests(roomIdValue) {
        const merged = new Map();
        reservationGuests(roomIdValue).forEach(guest => {
            merged.set(guestMergeKey(guest, roomIdValue), guest);
        });
        roomingList().filter(guest => guest.roomId === roomIdValue && cleanGuestName(guest.name)).forEach(guest => {
            merged.set(guestMergeKey(guest, roomIdValue), guest);
        });
        const list = [...merged.values()];
        return list.sort((a, b) => {
            const roleA = a.role === 'primary' ? 0 : 1;
            const roleB = b.role === 'primary' ? 0 : 1;
            return roleA - roleB || String(a.name || '').localeCompare(String(b.name || ''));
        });
    }

    function allGroupGuests() {
        const merged = new Map();
        assignedRooms().forEach(room => {
            roomGuests(room.roomId).forEach(guest => merged.set(guestMergeKey(guest, room.roomId), guest));
        });
        roomingList().filter(guest => cleanGuestName(guest.name)).forEach(guest => {
            merged.set(guestMergeKey(guest, guest.roomId), guest);
        });
        return [...merged.values()];
    }

    function primaryForRoom(roomIdValue) {
        const guests = roomGuests(roomIdValue);
        return guests.find(guest => guest.role === 'primary') || guests[0] || null;
    }

    function guestById(roomIdValue, guestId) {
        if (!guestId) return null;
        return roomGuests(roomIdValue).find(guest => String(guest.id) === String(guestId) || String(guest.guestId || '') === String(guestId)) ||
            roomingList().find(guest => String(guest.id) === String(guestId) || String(guest.guestId || '') === String(guestId)) ||
            null;
    }

    function guestDocCell(guest) {
        if (!guest) return '<span style="color:var(--txt3);font-weight:800">-</span>';
        return guest.docStatus === 'verified'
            ? '<span class="stage-pill stage-live">확인 완료</span>'
            : '<span class="stage-pill stage-upcoming">미확인</span>';
    }

    function guestListHtml(roomIdValue) {
        const guests = roomGuests(roomIdValue);
        if (!guests.length) return '<div class="room-guest-empty">등록된 투숙객 없음</div>';
        return `<div class="group-room-guests">${guests.map(guest => {
            const isStored = !guest.sourceReservation;
            return `<div class="group-room-guest">
                <span class="role-pill ${guest.role === 'primary' ? 'primary' : 'companion'}">${guest.role === 'primary' ? '대표' : '동반'}</span>
                <span class="name" title="${html(guest.name)}">${html(guest.name)}</span>
                <span class="inline-guest-actions">
                    <button class="icon-mini" title="투숙객 편집" onclick="openRoomingModal('${html(roomIdValue)}','${html(guest.id || '')}','${html(guest.role || 'primary')}')"><i class="fa-solid fa-pen"></i></button>
                    ${guest.role !== 'primary' ? `<button class="icon-mini" title="대표로 설정" onclick="setGroupRoomPrimary('${html(roomIdValue)}','${html(guest.id || '')}')"><i class="fa-solid fa-star"></i></button>` : ''}
                    ${isStored ? `<button class="icon-mini danger" title="삭제" onclick="removeRoomingGuest('${html(guest.id || '')}')"><i class="fa-solid fa-trash"></i></button>` : ''}
                </span>
            </div>`;
        }).join('')}</div>`;
    }

    function syncReservationRoomGuests(roomIdValue) {
        const res = groupReservationForRoom(roomIdValue);
        if (!res) return null;
        const guests = roomGuests(roomIdValue);
        const primary = guests.find(guest => guest.role === 'primary') || guests[0] || null;
        const companions = guests.filter(guest => guest !== primary);
        res.roomingGuests = guests.map(guest => ({
            id: guest.id,
            guestId: guest.guestId || guest.id || '',
            name: guest.name,
            phone: guest.phone || '',
            email: guest.email || '',
            nation: guest.nation || '',
            docStatus: guest.docStatus || 'pending',
            note: guest.note || guest.specialNotes || '',
            specialNotes: guest.specialNotes || guest.note || '',
            role: guest === primary ? 'primary' : (guest.role || 'companion')
        }));
        res.roomingGuestNames = res.roomingGuests.map(guest => guest.name);
        res.companionGuestNames = companions.map(guest => guest.name);
        res.companionGuestIds = companions.map(guest => guest.guestId || guest.id || '');
        res.companions = companions.map(guest => ({
            guestId: guest.guestId || guest.id || '',
            name: guest.name,
            phone: guest.phone || '',
            email: guest.email || ''
        }));
        if (primary) {
            res.roomingGuestId = primary.id || primary.guestId || '';
            res.guestId = primary.guestId || res.guestId || primary.id || '';
            res.roomingGuestName = primary.name;
            res.guestName = primary.name;
            res.guest = primary.name;
            res.phone = primary.phone || res.phone || '';
            res.email = primary.email || res.email || '';
            res.nation = primary.nation || res.nation || '';
            res.docStatus = primary.docStatus || res.docStatus || 'pending';
            res.roomingGuestNote = primary.note || primary.specialNotes || '';
            res.guestNote = primary.note || primary.specialNotes || '';
            res.specialNotes = primary.specialNotes || primary.note || '';
            res.initials = primary.name.substring(0, 2).toUpperCase();
            res.isGroupPlaceholder = false;
            res.groupAssigned = true;
            if (!res.status || res.status === 'blocked') res.status = 'confirmed';
            if (!res.color || res.color === '#111827') res.color = '#2563EB';
        }
        return res;
    }

    function persistRoomReservation(roomIdValue) {
        const res = syncReservationRoomGuests(roomIdValue);
        window.reservations = reservations;
        localStorage.setItem('pms_reservations', JSON.stringify(reservations || []));
        let mockSave = null;
        if (window.PmsMockApi && res?.id) {
            mockSave = window.PmsMockApi.request('PATCH', `/reservations/${encodeURIComponent(res.id)}`, { body: res })
                .catch(err => console.warn('Mock reservation rooming update failed', err));
        }
        return mockSave || Promise.resolve(res);
    }

    function recordHistory(action, note, extra = {}) {
        group.history = Array.isArray(group.history) ? group.history : [];
        group.history.unshift({
            at: new Date().toLocaleString('ko-KR'),
            action,
            note,
            ...extra
        });
    }

    function compactRoomingValue(value) {
        const text = String(value ?? '').trim();
        return text && text !== '-' ? text : '';
    }

    function roomingGuestPhone(value) {
        return window.normalizeRoomingPhone
            ? window.normalizeRoomingPhone(value)
            : String(value || '').replace(/[^\d+\-\s()]/g, '').replace(/(?!^)\+/g, '').replace(/\s+/g, ' ').trim();
    }

    function roomingGuestPhoneDigits(value) {
        return roomingGuestPhone(value).replace(/\D/g, '');
    }

    function roomingGuestInitials(name) {
        const initials = String(name || '')
            .trim()
            .split(/\s+/)
            .map(part => part[0])
            .join('')
            .slice(0, 2)
            .toUpperCase();
        return initials || 'G';
    }

    async function roomingGuestRecords() {
        try {
            if (typeof window.loadGuestDb === 'function') {
                const loaded = await window.loadGuestDb(true);
                if (Array.isArray(loaded) && loaded.length) return loaded;
            }
        } catch(e) {
            console.warn('Rooming guest DB refresh failed', e);
        }
        if (Array.isArray(window.GUEST_DB) && window.GUEST_DB.length) return window.GUEST_DB;
        if (Array.isArray(window.guests) && window.guests.length) return window.guests;
        try {
            if (window.PmsAPI?.getGuests) {
                const guests = await window.PmsAPI.getGuests();
                if (Array.isArray(guests)) return guests;
            }
        } catch(e) {
            console.warn('Rooming guest API lookup failed', e);
        }
        try {
            if (window.PmsMockApi) {
                const env = await window.PmsMockApi.request('GET', '/crm/guests');
                const items = window.PmsMockApi.items ? window.PmsMockApi.items(env) : env?.data?.items;
                if (Array.isArray(items)) return items;
            }
        } catch(e) {
            console.warn('Rooming guest mock lookup failed', e);
        }
        return [];
    }

    function findPersistedRoomingGuest(raw, guestList = []) {
        const item = raw || {};
        const guestId = compactRoomingValue(item.guestId || item.id || item.roomingGuestId);
        const email = compactRoomingValue(item.email || item.guestEmail).toLowerCase();
        const name = compactRoomingValue(item.name || item.guestName || item.roomingGuestName || item.guest).toLowerCase();
        const phoneDigits = roomingGuestPhoneDigits(item.phone || item.mobile || item.guestPhone);
        return guestList.find(guest => guestId && String(guest.id || guest.guestId || '') === guestId)
            || guestList.find(guest => email && String(guest.email || '').toLowerCase() === email)
            || guestList.find(guest => {
                const guestName = compactRoomingValue(guest.name || guest.guestName).toLowerCase();
                const guestPhoneDigits = roomingGuestPhoneDigits(guest.phone || guest.mobile || '');
                return name && phoneDigits && guestName === name && guestPhoneDigits === phoneDigits;
            })
            || null;
    }

    function upsertRoomingGuestCache(guest) {
        if (!guest?.id) return;
        const upsert = (list, normalize = item => item) => {
            if (!Array.isArray(list)) return list;
            const idx = list.findIndex(item => String(item.id || item.guestId || '') === String(guest.id));
            const next = normalize(guest);
            if (idx >= 0) list[idx] = { ...list[idx], ...next };
            else list.unshift(next);
            return list;
        };
        window.guests = upsert(window.guests, item => item) || window.guests;
        window.GUEST_DB = upsert(window.GUEST_DB, item => ({
            ...item,
            country: item.country || item.nationality || item.nation || '',
            tier: item.tier || item.vip || 'standard',
            spend: Number(item.spend || item.totalSpend?.amount || 0)
        })) || window.GUEST_DB;
        if (Array.isArray(window.guests)) {
            try { localStorage.setItem('pms_guests', JSON.stringify(window.guests)); } catch(e) {}
        }
    }

    async function ensurePersistedRoomingGuest(entry, selected = null) {
        const selectedId = compactRoomingValue(selected?.id || selected?.guestId);
        const phone = roomingGuestPhone(entry?.phone || selected?.phone || selected?.mobile || '');
        const nationality = compactRoomingValue(entry?.nation || selected?.country || selected?.nationality || selected?.nation);
        const candidate = {
            ...entry,
            id: selectedId || entry?.id,
            guestId: selectedId || entry?.guestId,
            phone,
            nation: nationality,
            email: compactRoomingValue(entry?.email || selected?.email),
            name: compactRoomingValue(entry?.name || selected?.name)
        };
        const guestList = await roomingGuestRecords();
        const matched = findPersistedRoomingGuest(candidate, guestList);
        if (matched) {
            upsertRoomingGuestCache(matched);
            return matched;
        }
        if (selectedId) {
            upsertRoomingGuestCache({ ...selected, id: selectedId, guestId: selectedId });
            return { ...selected, id: selectedId, guestId: selectedId };
        }
        const nowIso = window.PmsDate?.nowIso ? window.PmsDate.nowIso() : new Date().toISOString();
        const id = `G-${nowIso.replace(/\D/g, '').slice(0, 14)}-${Math.floor(Math.random() * 1000)}`;
        const guest = {
            id,
            guestId: id,
            name: candidate.name,
            init: roomingGuestInitials(candidate.name),
            color: '#3B82F6',
            nationality,
            nation: nationality,
            country: nationality,
            tier: 'standard',
            vip: 'standard',
            visits: 0,
            phone,
            email: candidate.email,
            status: 'active',
            document: { type: '', maskedNumber: '', status: 'pending' },
            docStatus: 'pending',
            documentStatus: 'pending',
            specialNotes: entry?.note || entry?.specialNotes || '',
            lastStayDate: '',
            totalSpend: { amount: 0, currency: 'PHP' },
            spend: 0,
            tags: ['group-rooming'],
            createdAt: nowIso,
            source: 'group-rooming'
        };
        if (window.PmsMockApi) await window.PmsMockApi.request('POST', '/crm/guests', { body: guest });
        upsertRoomingGuestCache(guest);
        try {
            if (typeof window.loadGuestDb === 'function') await window.loadGuestDb(true);
        } catch(e) {
            console.warn('Rooming guest search cache refresh failed', e);
        }
        return guest;
    }

    function collectRoomAllocations() {
        return Array.from(document.querySelectorAll('.allocation-editor-row')).map(row => {
            const id = row.querySelector('.detail-room')?.value || '';
            const rm = (rooms || []).find(r => roomId(r) === id) || {};
            const baseRate = asMoneyNumber(row.querySelector('.detail-base-rate')?.value || row.querySelector('.detail-rate')?.value || 0);
            const discountPercent = Number(row.querySelector('.detail-discount')?.value || 0);
            const finalInput = row.querySelector('.detail-final-rate') || row.querySelector('.detail-rate');
            const rate = asMoneyNumber(finalInput?.value || Math.round(baseRate * (100 - discountPercent) / 100));
            return {
                roomId: id,
                roomLabel: `${rm.bldgCode || rm.building || ''} ${rm.display || rm.number || id}`.trim(),
                type: rm.type || 'Standard',
                building: rm.bldgCode || rm.building || '',
                baseRate,
                discountPercent,
                rate
            };
        }).filter(item => item.roomId);
    }

    function roomSummary(list) {
        return (list || []).map(item => item.roomLabel || item.roomId).filter(Boolean).join(', ') || '-';
    }

    function allocationRoomMoves(rows) {
        return rows.map(row => ({
            from: String(row.dataset.originalRoomId || '').trim(),
            to: String(row.querySelector('.detail-room')?.value || '').trim()
        })).filter(move => move.from && move.to && move.from !== move.to);
    }

    function applyRoomingRoomMoves(moves) {
        if (!moves.length) return { movedCount: 0, rooms: [], moves: [] };
        const moveByRoom = new Map(moves.map(move => [move.from, move.to]));
        const touchedRooms = new Set();
        let movedCount = 0;
        roomingList().forEach(guest => {
            const currentRoom = String(guest.roomId || '').trim();
            const nextRoom = moveByRoom.get(currentRoom);
            if (!nextRoom) return;
            guest.roomId = nextRoom;
            touchedRooms.add(currentRoom);
            touchedRooms.add(nextRoom);
            movedCount += 1;
        });
        return { movedCount, rooms: [...touchedRooms], moves };
    }

    window.saveRoomAllocationsFromDetail = async function() {
        if (isDraftGroup()) {
            showToast('기본 정보를 먼저 저장해주세요.', 'error');
            switchTabById('overview');
            return;
        }
        const before = assignedRooms();
        const allocations = collectRoomAllocations();
        const ids = allocations.map(item => item.roomId);
        if (new Set(ids).size !== ids.length) {
            showToast('같은 호실이 중복되었습니다.', 'error');
            return;
        }
        const roomingMoveResult = applyRoomingRoomMoves(allocationRoomMoves(Array.from(document.querySelectorAll('.allocation-editor-row'))));
        group.roomAllocations = allocations;
        group.allocations = allocations;
        group.block = allocations.length;
        const beforeIds = new Set(before.map(item => item.roomId));
        const afterIds = new Set(allocations.map(item => item.roomId));
        const added = allocations.filter(item => !beforeIds.has(item.roomId));
        const removed = before.filter(item => !afterIds.has(item.roomId));
        recordHistory(
            '객실 배정 수정',
            `변경 전: ${roomSummary(before)} / 변경 후: ${roomSummary(allocations)}${added.length ? ` / 추가: ${roomSummary(added)}` : ''}${removed.length ? ` / 제외: ${roomSummary(removed)}` : ''}`,
            {
                type: 'room-allocation-update',
                beforeRooms: before.map(item => item.roomId),
                afterRooms: allocations.map(item => item.roomId),
                addedRooms: added.map(item => item.roomId),
                removedRooms: removed.map(item => item.roomId),
                roomGuestMoves: roomingMoveResult.moves
            }
        );
        saveGroup();
        await Promise.all(roomingMoveResult.rooms.map(roomIdValue => Promise.resolve(persistRoomReservation(roomIdValue))));
        if (window.PmsAPI?.getReservations) window.reservations = reservations = await PmsAPI.getReservations();
        renderAll();
        switchTabById('rooms');
        showToast('객실 배정이 저장되었습니다.');
    };

    window.renderRooms = function() {
        const panel = document.getElementById('rooms');
        if (!panel) return;
        if (isDraftGroup()) {
            panel.innerHTML = '<div class="empty-guide">기본 정보를 저장하면 객실 배정을 시작할 수 있습니다.</div>';
            return;
        }
        const assigned = assignedRooms();
        const discount = group.eventDiscountPercent ?? group.discountPercent ?? group.discount ?? 0;
        panel.innerHTML = `
            <div class="room-assignment-toolbar">
                <div>
                    <div class="section-title" style="margin-bottom:4px"><i class="fa-solid fa-bed"></i> 객실 배정</div>
                    <div style="font-size:.76rem;color:var(--txt3);font-weight:800">배정 ${assigned.length}실 · 행사 할인 ${html(discount || 0)}% · 객실과 요금만 관리합니다.</div>
                </div>
                <div class="room-assignment-actions">
                    <button class="mini-btn" onclick="addDetailAllocationRow()"><i class="fa-solid fa-plus"></i> 호실 추가</button>
                    <button class="mini-btn primary" onclick="saveRoomAllocationsFromDetail()"><i class="fa-solid fa-check"></i> 객실 배정 저장</button>
                </div>
            </div>
            <div id="detailAllocationEditor" class="allocation-editor"></div>
            <div class="detail-sticky-actions">
                <div class="hint"><i class="fa-solid fa-clock-rotate-left"></i> 객실 배정 수정은 변경 이력에 남습니다.</div>
                <button class="mini-btn" onclick="switchTabById('rooming')"><i class="fa-solid fa-users"></i> 투숙객 명단에서 관리</button>
            </div>`;
        assigned.forEach(room => addDetailAllocationRow(room));
    };
    try { renderRooms = window.renderRooms; } catch(e) {}

    window.renderRooming = function() {
        const panel = document.getElementById('rooming');
        if (!panel) return;
        if (isDraftGroup()) {
            panel.innerHTML = '<div class="empty-guide">기본 정보를 저장한 뒤 투숙객 명단을 등록할 수 있습니다.</div>';
            return;
        }
        const assigned = assignedRooms();
        const guests = allGroupGuests();
        const missingDoc = guests.filter(guest => guest.docStatus !== 'verified').length;
        const assignedIds = new Set(assigned.map(room => room.roomId));
        const roomRows = assigned.length ? assigned.map(room => {
            const roomId = room.roomId || '';
            const list = roomGuests(roomId);
            const primary = list.find(guest => guest.role === 'primary') || list[0] || null;
            const verified = list.filter(guest => guest.docStatus === 'verified').length;
            const docText = list.length ? `${verified}/${list.length} 확인` : '-';
            const primaryStoredId = primary && !primary.sourceReservation ? primary.id : '';
            return `<tr>
                <td>
                    <div class="rooming-room-title">
                        <span class="room-chip">${html(roomLabel(roomId))}</span>
                        <small>${html([room.type, room.rate ? `₱${room.rate}` : ''].filter(Boolean).join(' · '))}</small>
                    </div>
                </td>
                <td>${guestListHtml(roomId)}</td>
                <td><div class="rooming-room-status"><strong>${list.length}명</strong><span>${primary ? '대표 등록' : '대표 미등록'}</span></div></td>
                <td>${docText}</td>
                <td class="room-actions-cell">
                    <div class="room-action-buttons">
                        <button class="mini-btn primary" onclick="openRoomingModal('${html(roomId)}','${html(primaryStoredId)}','primary')"><i class="fa-solid fa-user-check"></i> ${primary ? '대표 수정' : '대표 등록'}</button>
                        <button class="mini-btn" onclick="openRoomingModal('${html(roomId)}','','companion')"><i class="fa-solid fa-user-plus"></i> 동반 추가</button>
                    </div>
                </td>
            </tr>`;
        }).join('') : '<tr><td colspan="5">배정된 객실이 없습니다. 객실 배정 탭에서 객실을 먼저 배정하세요.</td></tr>';
        const unassignedGuests = guests.filter(guest => !guest.roomId || !assignedIds.has(guest.roomId));
        const unassignedHtml = unassignedGuests.length ? `
            <div class="empty-guide" style="margin-top:12px;text-align:left">
                <strong style="display:block;margin-bottom:8px">미배정 투숙객</strong>
                <div style="display:flex;flex-wrap:wrap;gap:8px">
                    ${unassignedGuests.map(guest => `<span class="room-chip">${html(guest.name)} · ${html(guest.roomId || '객실 미정')}</span>`).join('')}
                </div>
            </div>` : '';
        panel.innerHTML = `
            <div class="rooming-tools">
                <div>
                    <div class="section-title" style="margin-bottom:4px"><i class="fa-solid fa-users"></i> 투숙객 명단</div>
                    <div style="font-size:.76rem;color:var(--txt3);font-weight:800">객실별로 대표/동반 투숙객을 바로 등록합니다 · 전체 ${guests.length}/${group.pax || 0}명</div>
                </div>
            </div>
            <div class="rooming-summary-grid">
                <div class="rooming-summary-item"><div class="k">배정 객실</div><div class="v">${assigned.length}실</div></div>
                <div class="rooming-summary-item"><div class="k">등록 투숙객</div><div class="v">${guests.length}명</div></div>
                <div class="rooming-summary-item"><div class="k">신분증 미확인</div><div class="v">${missingDoc}건</div></div>
            </div>
            <table class="data-table room-assignment-table rooming-room-table">
                <thead><tr><th>객실</th><th>투숙객</th><th>등록</th><th>신분증</th><th>관리</th></tr></thead>
                <tbody>${roomRows}</tbody>
            </table>
            ${unassignedHtml}
            <div class="detail-sticky-actions">
                <div class="hint"><i class="fa-solid fa-user-check"></i> 대표/동반 변경은 예약 데이터와 함께 동기화됩니다.</div>
                <button class="mini-btn" onclick="switchTabById('rooms')"><i class="fa-solid fa-bed"></i> 객실 배정으로 이동</button>
            </div>`;
    };
    try { renderRooming = window.renderRooming; } catch(e) {}

    window.openRoomingModal = function(roomIdValue = '', guestId = '', preferredRole = 'primary') {
        const shouldLoadExisting = !!guestId || preferredRole !== 'companion';
        const rawGuest = shouldLoadExisting ? (guestById(roomIdValue, guestId) || (!guestId ? primaryForRoom(roomIdValue) : null)) : null;
        const guest = isPlaceholderGuest(rawGuest) ? null : rawGuest;
        if (typeof previousOpenRoomingModal === 'function') previousOpenRoomingModal(guest ? roomIdValue : '', guest && !guest.sourceReservation ? guest.id : '');
        setTimeout(() => {
            const title = document.querySelector('#roomingModal .modal-title, #roomingModalTitle');
            if (title) title.textContent = guest ? '투숙객 정보 수정' : '투숙객 등록';
            const edit = document.getElementById('guestEditId');
            const room = document.getElementById('guestRoomInput');
            const role = document.getElementById('guestRoleInput');
            const doc = document.getElementById('guestDocInput');
            const note = document.getElementById('guestNoteInput');
            if (edit) edit.value = guest && !guest.sourceReservation ? (guest.id || '') : '';
            if (room) {
                const targetRoomId = guest?.roomId || roomIdValue || '';
                if (targetRoomId && !Array.from(room.options || []).some(option => option.value === targetRoomId)) {
                    room.innerHTML = roomOptions(targetRoomId);
                }
                room.value = targetRoomId;
            }
            if (role) role.value = guest?.role || preferredRole || 'primary';
            if (doc) doc.value = guest?.docStatus || 'pending';
            if (note) note.value = guest?.note || guest?.specialNotes || '';
            const nameInput = document.getElementById('nrGuestRooming') || document.getElementById('guestNameInput');
            const phoneInput = document.getElementById('nrPhoneRooming');
            const emailInput = document.getElementById('nrEmailRooming');
            const nationInput = document.getElementById('nrNationRooming') || document.getElementById('guestNationInput');
            if (!guest && window._roomingGuestWidget?.reset) window._roomingGuestWidget.reset();
            if (nameInput) nameInput.value = guest?.name || '';
            window.attachRoomingPhoneGuard?.(phoneInput);
            if (phoneInput) phoneInput.value = window.normalizeRoomingPhone ? window.normalizeRoomingPhone(guest?.phone || '') : (guest?.phone || '');
            if (emailInput) emailInput.value = guest?.email || '';
            window.setRoomingNationalityValue?.(nationInput, guest?.nation || guest?.country || '');
        }, 0);
    };

    window.saveRoomingGuest = async function() {
        const widget = window._roomingGuestWidget;
        const selectedRaw = widget?.getSelectedGuest?.();
        const selected = isPlaceholderGuest(selectedRaw) ? null : selectedRaw;
        const nameInput = document.getElementById('nrGuestRooming') || document.getElementById('guestNameInput');
        const phoneInput = document.getElementById('nrPhoneRooming');
        const emailInput = document.getElementById('nrEmailRooming');
        const nationInput = document.getElementById('nrNationRooming') || document.getElementById('guestNationInput');
        const roomIdValue = document.getElementById('guestRoomInput')?.value || '';
        const role = document.getElementById('guestRoleInput')?.value || 'primary';
        const editId = document.getElementById('guestEditId')?.value || '';
        const name = selected?.name || widget?.getGuestName?.() || nameInput?.value?.trim() || '';
        if (!roomIdValue) { showToast('호실을 선택하세요.', 'error'); return; }
        if (!name) { showToast('투숙객 이름을 입력하거나 기존 고객을 선택하세요.', 'error'); return; }
        const phone = window.normalizeRoomingPhone ? window.normalizeRoomingPhone(selected?.phone || phoneInput?.value || '') : (selected?.phone || phoneInput?.value || '').trim();
        const phoneValid = window.isValidRoomingPhone ? window.isValidRoomingPhone(phone, true) : !!phone;
        if (!selected && !phoneValid) {
            showToast('연락처는 숫자와 +, -, 괄호만 입력해 주세요.', 'error');
            phoneInput?.focus();
            return;
        }
        if (phoneInput) phoneInput.value = phone;
        const noteValue = document.getElementById('guestNoteInput')?.value.trim() || '';
        let persistedGuest = null;
        try {
            persistedGuest = await ensurePersistedRoomingGuest({
                name,
                phone,
                email: selected?.email || emailInput?.value?.trim() || '',
                nation: selected?.country || selected?.nation || nationInput?.value?.trim() || '',
                note: noteValue
            }, selected);
        } catch(e) {
            console.warn('Rooming guest persistence failed', e);
            showToast('투숙객 고객 등록에 실패했습니다. 다시 시도해주세요.', 'error');
            return;
        }
        const persistedGuestId = compactRoomingValue(persistedGuest?.id || persistedGuest?.guestId || selected?.id || selected?.guestId);
        const resolvedPhone = roomingGuestPhone(persistedGuest?.phone || phone);
        const resolvedNation = compactRoomingValue(persistedGuest?.country || persistedGuest?.nationality || persistedGuest?.nation || selected?.country || selected?.nation || nationInput?.value);
        const data = {
            id: editId || persistedGuestId || selected?.id || 'GG-' + Date.now(),
            guestId: persistedGuestId || selected?.id || '',
            groupId: group.id,
            name: compactRoomingValue(persistedGuest?.name || selected?.name || name),
            phone: resolvedPhone,
            email: compactRoomingValue(persistedGuest?.email || selected?.email || emailInput?.value?.trim() || ''),
            nation: resolvedNation,
            roomId: roomIdValue,
            role,
            docStatus: document.getElementById('guestDocInput')?.value || 'pending',
            note: noteValue,
            specialNotes: noteValue
        };
        const list = roomingList();
        let idx = editId ? list.findIndex(item => item.id === editId) : -1;
        if (idx < 0 && data.guestId) idx = list.findIndex(item => item.guestId === data.guestId && item.roomId === roomIdValue);
        if (idx < 0 && role === 'primary') idx = list.findIndex(item => item.roomId === roomIdValue && item.role === 'primary');
        if (idx < 0 && role === 'companion') idx = list.findIndex(item => item.roomId === roomIdValue && item.role === 'companion' && item.name === data.name);
        if (idx >= 0) list[idx] = data;
        else list.push(data);
        if (role === 'primary') {
            list.forEach(item => {
                if (item.roomId === roomIdValue && item.id !== data.id && item.role === 'primary') item.role = 'companion';
            });
        }
        const reservationSave = persistRoomReservation(roomIdValue);
        recordHistory(role === 'primary' ? (editId ? '대표 투숙객 수정' : '대표 투숙객 등록') : (editId ? '동반 투숙객 수정' : '동반 투숙객 등록'), `${roomLabel(roomIdValue)} · ${data.name}`);
        const groupSave = saveGroup();
        try {
            await Promise.all([Promise.resolve(reservationSave), Promise.resolve(groupSave)]);
        } catch(e) {
            console.warn('Rooming save synchronization failed', e);
        }
        closeModal('roomingModal');
        renderAll();
        switchTabById('rooming');
        showToast(editId ? '투숙객 정보가 수정되었습니다.' : '투숙객이 등록되었습니다.');
    };
    try { saveRoomingGuest = window.saveRoomingGuest; } catch(e) {}

    window.setGroupRoomPrimary = function(roomIdValue, guestId) {
        const guest = guestById(roomIdValue, guestId);
        if (!guest) return;
        const list = roomingList();
        let stored = list.find(item => item.id === guest.id || item.guestId === guest.guestId);
        if (!stored) {
            stored = { ...guest, sourceReservation: false };
            list.push(stored);
        }
        list.forEach(item => {
            if (item.roomId === roomIdValue) item.role = item.id === stored.id ? 'primary' : 'companion';
        });
        persistRoomReservation(roomIdValue);
        recordHistory('대표 투숙객 변경', `${roomLabel(roomIdValue)} · ${stored.name}`);
        saveGroup();
        renderAll();
        switchTabById('rooming');
        showToast('대표 투숙객이 변경되었습니다.');
    };

    const previousRemoveRoomingGuest = window.removeRoomingGuest;
    window.removeRoomingGuest = async function(id) {
        const guest = roomingList().find(item => item.id === id);
        if (!guest) {
            if (typeof previousRemoveRoomingGuest === 'function') return previousRemoveRoomingGuest(id);
            return;
        }
        const ok = await window.showConfirm(`[${guest.name}] 투숙객을 삭제하시겠습니까?`);
        if (!ok) return;
        group.roomingList = roomingList().filter(item => item.id !== id);
        persistRoomReservation(guest.roomId);
        recordHistory('투숙객 삭제', `${roomLabel(guest.roomId)} · ${guest.name}`);
        saveGroup();
        renderAll();
        switchTabById('rooming');
    };

    document.addEventListener('DOMContentLoaded', () => {
        setTimeout(() => {
            try {
                if (group) {
                    renderAll();
                    const initialTab = new URLSearchParams(location.search).get('tab');
                    if (initialTab) switchTabById(initialTab);
                }
            } catch(e) {
                console.warn('Group rooming enhancement render failed', e);
            }
        }, 80);
    });
})();
</script>
</body>
