/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;

}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-right { justify-content: flex-start; }
}

<script>
// ===== ROOM & RESERVATION DATA =====
let rooms = [];
let timelineGroups = [];

window.reservations = [];

const DAYS = 14;
function timelineTodayDate() {
    const date = window.PmsDate?.today ? window.PmsDate.today() : new Date();
    date.setHours(0, 0, 0, 0);
    return date;
}
let baseDate = timelineTodayDate();
baseDate.setHours(0,0,0,0);
const EPOCH = timelineTodayDate();

const TL_TEXT = {
    ko: {
        pageTitle: '예약 타임라인 - Hotel PMS',
        checkinTarget: '체크인 대상(잔여)',
        inHouse: '투숙 중',
        checkoutTarget: '체크아웃 대상(잔여)',
        groupGuests: '단체 고객',
        confirmed: '예약 확정',
        checkoutLegend: '체크아웃 대상',
        previous: '체크아웃 완료 / 점검',
        groupBlock: '단체 블록',
        groupBooking: '단체 예약',
        checkinDone: '체크인 완료',
        checkoutDue: '체크아웃 예정',
        completed: '완료',
        group: '단체',
        primaryGuest: '대표',
        companionGuest: '동반',
        block: '블록',
        booking: '예약',
        occupied: '점유 중',
        available: '공실',
        nights: '박',
        todayToast: '오늘 날짜로 이동했습니다.',
        dayNames: ['일','월','화','수','목','금','토']
    },
    en: {
        pageTitle: 'Reservations - Hotel PMS',
        checkinTarget: 'Check-in Due',
        inHouse: 'In-house',
        checkoutTarget: 'Check-out Due',
        groupGuests: 'Group Guests',
        confirmed: 'Confirmed',
        checkoutLegend: 'Check-out Due',
        previous: 'Completed / OOS',
        groupBlock: 'Group Block',
        groupBooking: 'Group Booking',
        checkinDone: 'Checked in',
        checkoutDue: 'Check-out Due',
        completed: 'Completed',
        group: 'Group',
        primaryGuest: 'Primary',
        companionGuest: 'Guest',
        block: 'Block',
        booking: 'Booking',
        occupied: 'Occupied',
        available: 'Available',
        nights: 'N',
        todayToast: 'Moved to today.',
        dayNames: ['Sun','Mon','Tue','Wed','Thu','Fri','Sat']
    }
};

function timelineLang() {
    return document.getElementById('langSelect')?.value || window.currentLang || localStorage.getItem('pms_lang') || 'ko';
}

function timelineText(key) {
    const lang = timelineLang() === 'en' ? 'en' : 'ko';
    return (TL_TEXT[lang] && TL_TEXT[lang][key]) || TL_TEXT.ko[key] || key;
}

function timelineRoomType(type) {
    const text = String(type || '').trim();
    return text || '-';
}

function timelineRoomNumberValue(room) {
    const raw = String(room?.roomNo || room?.number || room?.display || room?.id || '').trim();
    const digits = (raw.match(/\d+/g) || []).join('');
    return digits ? Number(digits) : Number.MAX_SAFE_INTEGER;
}

function timelineRoomSuffixValue(room) {
    const raw = String(room?.roomNo || room?.number || room?.display || room?.id || '').trim();
    return raw.replace(/\d+/g, '').toLowerCase();
}

function timelineSortRooms(list) {
    const buildingOrder = { OT: 1, FT: 2, LV: 3 };
    return [...(list || [])].sort((a, b) => {
        const buildingA = buildingOrder[a?.bldgCode || a?.buildingId] || 99;
        const buildingB = buildingOrder[b?.bldgCode || b?.buildingId] || 99;
        const floorA = Number(a?.floor ?? -1);
        const floorB = Number(b?.floor ?? -1);
        return buildingA - buildingB
            || floorB - floorA
            || timelineRoomNumberValue(a) - timelineRoomNumberValue(b)
            || timelineRoomSuffixValue(a).localeCompare(timelineRoomSuffixValue(b), undefined, { numeric: true })
            || String(a?.id || '').localeCompare(String(b?.id || ''), undefined, { numeric: true });
    });
}

function formatTimelineRangeDate(date) {
    if (timelineLang() === 'en') {
        return date.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    }
    return `${date.getMonth() + 1}월 ${date.getDate()}일`;
}

function formatTimelineShortDate(date) {
    return `${date.getMonth() + 1}/${date.getDate()}`;
}

function setTimelineText(id, key) {
    const el = document.getElementById(id);
    if (el) el.textContent = timelineText(key);
}

function applyTimelineStaticLabels() {
    document.title = timelineText('pageTitle');
    setTimelineText('kpiConfirmedLabel', 'checkinTarget');
    setTimelineText('kpiCheckedinLabel', 'inHouse');
    setTimelineText('kpiCheckoutLabel', 'checkoutTarget');
    setTimelineText('kpiB2BLabel', 'groupGuests');
    setTimelineText('legendConfirmedLabel', 'confirmed');
    setTimelineText('legendCheckedinLabel', 'inHouse');
    setTimelineText('legendCheckoutLabel', 'checkoutLegend');
    setTimelineText('legendPreviousLabel', 'previous');
    setTimelineText('legendGroupLabel', 'groupBlock');
}

function applyTimelineLanguage() {
    applyTimelineStaticLabels();
    if (document.getElementById('tlRange')) updateDateRangeText();
    if (rooms.length) {
        buildTimeline();
        buildMobileView();
    }
}

function cleanTimelineGuestName(value) {
    const text = String(value || '').trim();
    if (!text || text === 'undefined' || text === 'null' || text === '-') return '';
    if (text.includes('객실 블록') || text.includes('(단체)')) return '';
    return text;
}

function timelineEscapeHtml(value) {
    return String(value ?? '').replace(/[&<>"']/g, ch => ({
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;'
    }[ch]));
}

function normalizeReservationStatus(res) {
    let safeStatus = res && res.status ? String(res.status).replace(/[- _]/g, '').toLowerCase() : 'confirmed';
    if (['inhouse', 'occupied'].includes(safeStatus)) return 'checkedin';
    if (['checkedout', 'departed'].includes(safeStatus)) return 'completed';
    return safeStatus === 'vip' ? 'confirmed' : safeStatus;
}

function normalizeTimelineRoomValue(value) {
    const text = String(value || '').trim().toLowerCase();
    const digits = (text.match(/\d+/g) || []).join('');
    return {
        text,
        digits,
        strippedDigits: digits.replace(/^0+(?=\d)/, '')
    };
}

function sameTimelineRoomValue(left, right) {
    const a = normalizeTimelineRoomValue(left);
    const b = normalizeTimelineRoomValue(right);
    if (!a.text || !b.text) return false;
    if (a.text === b.text) return true;
    return !!(a.digits && b.digits && (a.digits === b.digits || a.strippedDigits === b.strippedDigits));
}

function timelineStoredGroups() {
    const merged = new Map();
    (Array.isArray(timelineGroups) ? timelineGroups : []).forEach(group => {
        if (group?.id) merged.set(group.id, group);
    });
    try {
        const stored = JSON.parse(localStorage.getItem('pms_groups') || '[]');
        if (Array.isArray(stored)) {
            stored.forEach(group => {
                if (group?.id) merged.set(group.id, { ...(merged.get(group.id) || {}), ...group });
            });
        }
    } catch(e) {}
    return [...merged.values()];
}

function timelineRoomMatchesReservation(room, res) {
    const roomValues = [
        room?.id,
        room?.fullRoom,
        room?.roomId,
        room?.number,
        room?.roomNo,
        room?.display,
        room?.displayName,
        room?.roomLabel
    ];
    const reservationValues = [
        res?.room,
        res?.fullRoom,
        res?.roomId,
        res?.roomNo,
        res?.roomNumber,
        res?.roomLabel
    ];
    return roomValues.some(roomValue => reservationValues.some(resValue => sameTimelineRoomValue(roomValue, resValue)));
}

function timelineRoomForReservation(res) {
    if (!res) return null;
    return rooms.find(room => timelineRoomMatchesReservation(room, res));
}

function parseTimelineDate(value) {
    if (!value) return null;
    const text = String(value).trim();
    const parts = text.split('/');
    if (parts.length === 2) {
        const base = timelineTodayDate();
        const date = new Date(base.getFullYear(), parseInt(parts[0], 10) - 1, parseInt(parts[1], 10));
        date.setHours(0, 0, 0, 0);
        return date;
    }
    const date = new Date(text);
    if (!Number.isNaN(date.getTime())) {
        date.setHours(0, 0, 0, 0);
        return date;
    }
    return null;
}

function timelineVisualEndDate(endDate) {
    if (!endDate) return null;
    const visualEnd = new Date(endDate);
    visualEnd.setDate(visualEnd.getDate() + 1);
    visualEnd.setHours(0, 0, 0, 0);
    return visualEnd;
}

function timelineReservationStartDate(res) {
    return parseTimelineDate(res?.checkInDate || res?.checkin || res?.cin);
}

function timelineReservationCheckoutDate(res) {
    return parseTimelineDate(res?.checkOutDate || res?.checkout || res?.cout);
}

function timelineHasSameDayRoomHandoff(res, room) {
    const checkoutDate = timelineReservationCheckoutDate(res);
    if (!checkoutDate || !room) return false;
    const resId = res?.id || res?.reservationId || '';
    return reservations.some(other => {
        if (!other || other === res) return false;
        const otherId = other.id || other.reservationId || '';
        if (resId && otherId && resId === otherId) return false;
        if (!timelineRoomMatchesReservation(room, other)) return false;
        const startDate = timelineReservationStartDate(other);
        return !!startDate && startDate.getTime() === checkoutDate.getTime();
    });
}

function timelineReservationRenderSortValue(res) {
    const startDate = timelineReservationStartDate(res);
    if (startDate && !Number.isNaN(startDate.getTime())) return startDate.getTime();
    return EPOCH.getTime() + (Number(res?.start || 0) * 86400000);
}

function timelineReservationsForRender() {
    return [...reservations].sort((a, b) => {
        const roomA = timelineRoomForReservation(a);
        const roomB = timelineRoomForReservation(b);
        const roomIdxA = roomA ? rooms.indexOf(roomA) : Number.MAX_SAFE_INTEGER;
        const roomIdxB = roomB ? rooms.indexOf(roomB) : Number.MAX_SAFE_INTEGER;
        return roomIdxA - roomIdxB
            || timelineReservationRenderSortValue(a) - timelineReservationRenderSortValue(b)
            || String(a.id || a.reservationId || '').localeCompare(String(b.id || b.reservationId || ''));
    });
}

function isTimelineCurrentStay(res) {
    const start = timelineReservationStartDate(res);
    const end = timelineReservationCheckoutDate(res);
    if (!start || !end) return false;
    const today = timelineTodayDate();
    return start <= today && today < end;
}

function isTimelineRoomInHouse(res) {
    const room = timelineRoomForReservation(res);
    const status = String(room?.frontStatus || room?.status || room?.housekeepingStatus || '').replace(/[- _]/g, '').toLowerCase();
    return ['inhouse', 'checkedin', 'occupied'].includes(status);
}

function effectiveTimelineStatus(res) {
    let safeStatus = normalizeReservationStatus(res);
    if (safeStatus === 'confirmed' && isTimelineRoomInHouse(res) && isTimelineCurrentStay(res)) safeStatus = 'checkedin';
    const checkoutDate = parseTimelineDate(res?.checkOutDate || res?.checkout || res?.cout);
    const today = timelineTodayDate();
    if (checkoutDate && safeStatus === 'checkedin') {
        if (checkoutDate < today) return 'completed';
        if (checkoutDate.getTime() === today.getTime()) return 'checkout';
    }
    return safeStatus;
}

function timelineGuestName(res) {
    if (!res) return '';
    const primary = timelinePrimaryGuestEntry(res);
    if (primary) return primary.name;
    if (res.isGroupPlaceholder || normalizeReservationStatus(res) === 'blocked') return '';
    return cleanTimelineGuestName(res.guest);
}

function timelineGroupRoomingEntries(res) {
    if (!res?.groupId) return [];
    const groups = timelineStoredGroups();
    const group = groups.find(item => item && item.id === res.groupId);
    const source = Array.isArray(group?.roomingList) ? group.roomingList : (Array.isArray(group?.rooming) ? group.rooming : []);
    const roomValues = [res.room, res.fullRoom, res.roomId, res.roomNo, res.roomNumber, res.roomLabel].filter(Boolean);
    return source
        .filter(item => roomValues.some(value =>
            sameTimelineRoomValue(item?.roomId, value) ||
            sameTimelineRoomValue(item?.roomNo, value) ||
            sameTimelineRoomValue(item?.roomNumber, value) ||
            sameTimelineRoomValue(item?.roomLabel, value) ||
            sameTimelineRoomValue(item?.room, value) ||
            sameTimelineRoomValue(item?.fullRoom, value)
        ))
        .map((item, index) => ({
            id: item?.guestId || item?.id || item?.roomingGuestId || '',
            name: cleanTimelineGuestName(item?.name || item?.guestName || item?.roomingGuestName || item?.guest),
            role: item?.role || (index === 0 ? 'primary' : 'companion'),
            source: 'group-rooming',
            index
        }))
        .filter(item => item.name);
}

function timelineGuestEntries(res) {
    if (!res) return [];
    const entries = [];
    const addEntry = (raw, fallbackRole = 'companion', source = 'reservation', index = 0) => {
        const item = typeof raw === 'string' ? { name: raw } : (raw || {});
        const name = cleanTimelineGuestName(item.name || item.guestName || item.roomingGuestName || item.guest);
        if (!name) return;
        const id = String(item.guestId || item.id || item.roomingGuestId || '').trim();
        const role = item.role || fallbackRole;
        if (id && entries.some(entry => entry.id && entry.id === id)) return;
        if (id) {
            const sameNameWithoutId = entries.findIndex(entry => !entry.id && entry.name === name);
            if (sameNameWithoutId >= 0) {
                entries[sameNameWithoutId] = { id, name, role, source, index };
                return;
            }
        }
        const isDerivedSource = ['primary-fields', 'roomingGuestNames', 'companionGuestNames', 'companions'].includes(source);
        if (isDerivedSource && entries.some(entry => entry.name === name && (!id || !entry.id || entry.id === id))) return;
        if (!id && entries.some(entry => !entry.id && entry.name === name && entry.source === source)) return;
        entries.push({ id, name, role, source, index });
    };

    if (Array.isArray(res.roomingGuests)) {
        res.roomingGuests.forEach((item, index) => addEntry(item, index === 0 ? 'primary' : 'companion', 'roomingGuests', index));
    }
    timelineGroupRoomingEntries(res).forEach((item, index) => addEntry(item, item.role || (index === 0 ? 'primary' : 'companion'), 'group-rooming', index));

    if (!entries.some(item => item.role === 'primary')) {
        addEntry({
            guestId: res.guestId || res.roomingGuestId,
            name: res.roomingGuestName || res.guestName || res.guest
        }, 'primary', 'primary-fields', 0);
    }
    if (Array.isArray(res.roomingGuestNames)) {
        res.roomingGuestNames.forEach((name, index) => addEntry({ name }, index === 0 ? 'primary' : 'companion', 'roomingGuestNames', index));
    }
    if (Array.isArray(res.companionGuestNames)) {
        const ids = Array.isArray(res.companionGuestIds) ? res.companionGuestIds : [];
        res.companionGuestNames.forEach((name, index) => addEntry({ name, guestId: ids[index] || '' }, 'companion', 'companionGuestNames', index));
    }
    if (Array.isArray(res.companions)) {
        res.companions.forEach((item, index) => addEntry(item, 'companion', 'companions', index));
    }

    const primary = entries.find(item => item.role === 'primary');
    if (!primary && entries[0]) entries[0].role = 'primary';
    return entries;
}

function timelineGuestNames(res) {
    return timelineGuestEntries(res).map(item => item.name);
}

function timelinePrimaryGuestEntry(res) {
    const entries = timelineGuestEntries(res);
    return entries.find(item => item.role === 'primary') || entries[0] || null;
}

function timelinePrimaryGuestName(res) {
    return timelinePrimaryGuestEntry(res)?.name || '';
}

function timelineCompanionGuestNames(res) {
    const entries = timelineGuestEntries(res);
    const primary = entries.find(item => item.role === 'primary') || entries[0] || null;
    return entries
        .filter(item => item && item !== primary)
        .map(item => item.name);
}

function timelineGuestLabel(res) {
    return timelineGuestNames(res).join(' / ');
}

function timelineGroupForReservation(res) {
    if (!res?.groupId) return null;
    return timelineStoredGroups().find(group => group && group.id === res.groupId) || null;
}

function timelineCompanyLabel(res) {
    if (!res) return timelineText('group');
    const channel = String(res.channel || '').trim();
    const agency = String(res.agency || res.companyName || res.company || '').trim();
    const groupName = String(res.groupName || '').trim();
    const group = timelineGroupForReservation(res);
    const storedGroupName = String(group?.name || group?.displayName || '').trim();
    if (res.groupId) return groupName || storedGroupName || agency || channel || timelineText('group');
    if (channel && channel !== 'Group') return channel.split(' ')[0];
    if (agency) return agency;
    if (groupName) return groupName;
    return timelineText('group');
}

function hasTimelineGroupGuest(res) {
    return !!(res && res.groupId && timelineGuestNames(res).length);
}

function renderTimelineStatus(res, safeStatus) {
    if (hasTimelineGroupGuest(res) && (res.isGroupPlaceholder || ['blocked', 'confirmed', 'pending'].includes(safeStatus))) return 'group-assigned';
    return safeStatus;
}

function timelineDisplayName(res) {
    const guestName = timelineGuestLabel(res) || timelineGuestName(res);
    if (res && res.groupId && guestName) return `${timelineCompanyLabel(res)} · ${guestName}`;
    if (res && res.groupId && (normalizeReservationStatus(res) === 'blocked' || res.isGroupPlaceholder)) {
        return res.groupName || res.channel || timelineText('groupBlock');
    }
    return guestName || (res && (res.guest || res.groupName)) || timelineText('booking');
}

function normalizeReservationTime(value, fallback = '') {
    const text = String(value ?? '').trim();
    if (!text) return fallback;
    const match = text.match(/^(\d{1,2})(?::?(\d{2}))?$/);
    if (!match) return fallback;
    const hour = Number(match[1]);
    const minute = Number(match[2] || 0);
    if (!Number.isFinite(hour) || !Number.isFinite(minute) || hour < 0 || hour > 23 || minute < 0 || minute > 59) return fallback;
    return `${String(hour).padStart(2, '0')}:${String(minute).padStart(2, '0')}`;
}

function timelineCheckInTime(res) {
    return normalizeReservationTime(res?.checkInTime || res?.arrivalTime || res?.stayTimes?.checkInTime || res?.times?.checkIn, '14:00');
}

function timelineCheckOutTime(res) {
    return normalizeReservationTime(res?.checkOutTime || res?.departureTime || res?.stayTimes?.checkOutTime || res?.times?.checkOut, '12:00');
}

function timelineLateCheckoutEnabled(res) {
    return !!(res?.lateCheckout || res?.isLateCheckout || res?.stayTimes?.lateCheckout || res?.lateCheckoutTime || res?.extendedCheckOutTime);
}

function timelineLateCheckoutTime(res) {
    return normalizeReservationTime(res?.lateCheckoutTime || res?.extendedCheckOutTime || res?.stayTimes?.lateCheckoutTime, timelineCheckOutTime(res));
}

function timelineStayTimeRow(res) {
    const late = timelineLateCheckoutEnabled(res);
    const text = late
        ? `입실 ${timelineCheckInTime(res)} · 레이트 ${timelineLateCheckoutTime(res)}`
        : `입실 ${timelineCheckInTime(res)} · 퇴실 ${timelineCheckOutTime(res)}`;
    return `<span class="tl-time-row"><i class="fa-regular fa-clock"></i><span>${timelineEscapeHtml(text)}</span></span>`;
}

function timelineVipRow(isVip) {
    return isVip ? '<span class="tl-vip-row"><i class="fa-solid fa-crown"></i><span>VIP</span></span>' : '';
}

function timelineBlockContent(res, groupBadge, isVip) {
    const primary = timelinePrimaryGuestName(res);
    const companions = timelineCompanionGuestNames(res);
    if (primary) {
        const groupTitle = res?.groupId
            ? `<span class="tl-group-title">${groupBadge}<span class="tl-group-name">${timelineEscapeHtml(timelineCompanyLabel(res))}</span></span>`
            : '';
        const companionLine = companions.length
            ? `<span class="tl-companion-guest">${timelineEscapeHtml(companions.join(', '))}</span>`
            : '';
        const guestRows = [
            groupTitle,
            timelineVipRow(isVip),
            `<span class="tl-guest-stack">${res?.groupId ? '' : groupBadge}<span class="tl-primary-guest"><i class="fa-solid fa-user"></i><span>${timelineEscapeHtml(primary)}</span></span>${companionLine}</span>`,
            timelineStayTimeRow(res)
        ].filter(Boolean).join('');
        return `<span class="tl-block-text">
            ${guestRows}
        </span>`;
    }
    return `<span class="tl-block-text">${timelineVipRow(isVip)}<span class="tl-block-label">${groupBadge}${timelineEscapeHtml(timelineDisplayName(res))}</span>${timelineStayTimeRow(res)}</span>`;
}

function timelineGroupBadge(res) {
    if (!res || !(res.groupId || res.isGroupPlaceholder)) return '';
    const label = res.groupId && !timelineGuestNames(res).length ? timelineText('block') : timelineText('group');
    return `<span class="tl-group-badge"><i class="fa-solid fa-users"></i>${label}</span>`;
}

function timelineReservationPriority(res, index) {
    const status = effectiveTimelineStatus(res);
    const groupScore = res?.groupId ? 0 : 20;
    const assignedScore = timelineGuestNames(res).length ? 0 : 4;
    const statusScore = status === 'checkedin' ? 0 : status === 'checkout' ? 1 : status === 'confirmed' ? 2 : status === 'pending' ? 3 : status === 'blocked' ? 4 : 5;
    return groupScore + assignedScore + statusScore + (Number.isFinite(index) ? index / 10000 : 0);
}

function dedupeTimelineReservations(list) {
    const occupied = new Map();
    const source = (list || []).map((res, index) => ({ res, index }));
    source.sort((a, b) => timelineReservationPriority(a.res, a.index) - timelineReservationPriority(b.res, b.index));
    const kept = [];
    source.forEach(({ res }) => {
        const room = timelineRoomForReservation(res);
        if (!room) return;
        const cin = parseTimelineDate(res.checkInDate || res.checkin || res.cin);
        const cout = parseTimelineDate(res.checkOutDate || res.checkout || res.cout);
        if (!cin || !cout || cout <= cin) return;
        const roomKey = room.fullRoom || room.roomId || room.id;
        const days = [];
        for (const day = new Date(cin); day < cout; day.setDate(day.getDate() + 1)) {
            days.push(`${roomKey}|${day.toISOString().slice(0, 10)}`);
        }
        if (days.some(day => occupied.has(day))) return;
        days.forEach(day => occupied.set(day, res.id));
        kept.push(res);
    });
    const keepIds = new Set(kept.map(res => res.id));
    return (list || []).filter(res => keepIds.has(res.id));
}

function buildTimeline() {
    const grid = document.getElementById('tlGrid');
    grid.innerHTML = '';

    let cntConfirmed=0, cntCheckedin=0, cntCheckout=0, cntVip=0, cntB2B=0;

    // Count assigned group guests only; unassigned group block rooms are inventory, not guests.
    timelineReservationsForRender().forEach(res => {
        const isB2BGuest = !!(res.groupId && timelineGuestName(res));
        const isVip = res.isVip || (res.vip && res.vip.toLowerCase().includes('vip'));
        const effectiveStatus = effectiveTimelineStatus(res);
        if(isVip) cntVip++;
        if(isB2BGuest) cntB2B++;
        if(effectiveStatus === 'confirmed') cntConfirmed++;
        else if(effectiveStatus === 'checkedin') cntCheckedin++;
        else if(effectiveStatus === 'checkout') cntCheckout++;
    });

    // Header row
    let headerHTML = '<div class="tl-room-header">Room</div>';
    const todayDate = timelineTodayDate();
    for (let d = 0; d < DAYS; d++) {
        const date = new Date(baseDate);
        date.setDate(date.getDate() + d);
        const dayName = timelineText('dayNames')[date.getDay()];
        const isToday = date.getTime() === todayDate.getTime();
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        headerHTML += `<div class="tl-date-header ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}">${date.getDate()}<span class="tl-day-name">${dayName}</span></div>`;
    }
    grid.innerHTML += `<div class="tl-header-row">${headerHTML}</div>`;

    // Room rows
    rooms.forEach(room => {
        let rowHTML = `<div class="tl-room-cell"><span class="tl-room-num">${room.id}</span><span class="tl-room-type">${timelineRoomType(room.type)}</span></div>`;
        
        // Create date cells
        for (let d = 0; d < DAYS; d++) {
            const isWeekend = (() => {
                const date = new Date(baseDate);
                date.setDate(date.getDate() + d);
                return date.getDay() === 0 || date.getDay() === 6;
            })();
            rowHTML += `<div class="tl-cell ${isWeekend ? 'weekend' : ''}" data-room="${room.id}" data-day="${d}"></div>`;
        }

        grid.innerHTML += `<div class="tl-row">${rowHTML}</div>`;
    });

    // Track levels for each room to handle overlapping blocks
    const roomLevels = {};

    const appendTimelineBlock = ({ row, res, level, clipStart, clipEnd, renderStatus }) => {
        if (clipEnd <= clipStart) return;
        const block = document.createElement('div');
        block.className = `tl-block ${renderStatus}`;

        const renderLen = clipEnd - clipStart;
        block.style.position = 'absolute';
        const isVip = res.isVip || (res.vip && res.vip.toLowerCase().includes('vip'));
        const hasCompanions = timelineCompanionGuestNames(res).length > 0;
        const guestLineCount = 1 + (hasCompanions ? 1 : 0) + (isVip ? 1 : 0) + (res.groupId ? 1 : 0);
        const blockHeight = Math.min(82, Math.max(36, Math.ceil(9 + (guestLineCount * 11.5))));
        const levelStep = 88;
        block.style.top = `${8 + (level * levelStep)}px`;
        block.style.left = `calc(140px + ${clipStart} * ((100% - 140px) / ${DAYS}) + 3px)`;
        block.style.width = `calc(${renderLen} * ((100% - 140px) / ${DAYS}) - 6px)`;
        block.style.minHeight = `${blockHeight}px`;

        const requiredHeight = 14 + (level * levelStep) + blockHeight;
        const currentHeight = parseInt(row.style.getPropertyValue('--tl-row-height') || row.style.height || 52);
        if (currentHeight < requiredHeight) {
            row.style.setProperty('--tl-row-height', `${requiredHeight}px`);
            row.style.minHeight = `${requiredHeight}px`;
        }

        const displayName = timelineDisplayName(res);
        const groupBadge = timelineGroupBadge(res);
        const companionTitle = timelineCompanionGuestNames(res).join(', ');
        const timeTitle = timelineLateCheckoutEnabled(res)
            ? `입실 ${timelineCheckInTime(res)} / 레이트 ${timelineLateCheckoutTime(res)}`
            : `입실 ${timelineCheckInTime(res)} / 퇴실 ${timelineCheckOutTime(res)}`;
        block.title = [displayName, companionTitle, timeTitle].filter(Boolean).join(' / ');
        block.innerHTML = timelineBlockContent(res, groupBadge, isVip);

        block.onclick = () => openTimelineReservation(res);
        row.style.position = 'relative';
        row.appendChild(block);
    };

    timelineReservationsForRender().forEach(res => {
        const matchedRoom = timelineRoomForReservation(res);
        const roomIdx = matchedRoom ? rooms.indexOf(matchedRoom) : -1;
        if (roomIdx === -1) return;
        
        const row = grid.querySelectorAll('.tl-row')[roomIdx];
        if (!row) return;

        let renderStart, renderEnd;
        if (res.cin && res.cout) {
            try {
                const rCinDate = parseTimelineDate(res.cin);
                const rCoutDate = parseTimelineDate(res.cout);
                if (!rCinDate || !rCoutDate) throw new Error('invalid timeline dates');
                renderStart = Math.round((rCinDate - baseDate) / 86400000);
                const shouldCompactHandoff = timelineHasSameDayRoomHandoff(res, matchedRoom);
                const visualEndDate = shouldCompactHandoff ? rCoutDate : timelineVisualEndDate(rCoutDate);
                renderEnd = Math.round((visualEndDate - baseDate) / 86400000);
            } catch(e) {
                const offset = Math.round((baseDate - EPOCH) / 86400000);
                renderStart = res.start - offset;
                renderEnd = renderStart + Number(res.len || res.nights || 1) + 1;
                if (timelineHasSameDayRoomHandoff(res, matchedRoom)) {
                    renderEnd = renderStart + Number(res.len || res.nights || 1);
                }
            }
        } else {
            const offset = Math.round((baseDate - EPOCH) / 86400000);
            renderStart = res.start - offset;
            renderEnd = renderStart + Number(res.len || res.nights || 1) + 1;
            if (timelineHasSameDayRoomHandoff(res, matchedRoom)) {
                renderEnd = renderStart + Number(res.len || res.nights || 1);
            }
        }

        const visibilityStatus = effectiveTimelineStatus(res);
        if (renderEnd <= 0 && visibilityStatus === 'checkout') {
            renderStart = 0;
            renderEnd = 1;
        }
        if (renderEnd <= 0 || renderStart >= DAYS) return; // out of view

        // Find available level to avoid overlapping
        if (!roomLevels[roomIdx]) roomLevels[roomIdx] = [];
        let level = 0;
        // Check if there is an overlapping reservation in this level.
        // We use > instead of >= so back-to-back reservations (checkout/checkin on same day) don't overlap vertically
        while (roomLevels[roomIdx][level] !== undefined && roomLevels[roomIdx][level] > renderStart) {
            level++;
        }
        roomLevels[roomIdx][level] = renderEnd;

        let safeStatus = effectiveTimelineStatus(res);
        const clipStart = Math.max(0, renderStart);
        const clipEnd = Math.min(DAYS, renderEnd);
        const todayOffset = Math.round((timelineTodayDate() - baseDate) / 86400000);
        const splitCurrentStay = safeStatus === 'checkedin'
            && todayOffset >= 0
            && todayOffset < DAYS
            && renderStart <= todayOffset
            && renderEnd > todayOffset + 1;

        if (splitCurrentStay) {
            appendTimelineBlock({
                row,
                res,
                level,
                clipStart,
                clipEnd: Math.min(clipEnd, todayOffset + 1),
                renderStatus: renderTimelineStatus(res, 'checkedin')
            });
            appendTimelineBlock({
                row,
                res,
                level,
                clipStart: Math.max(clipStart, todayOffset + 1),
                clipEnd,
                renderStatus: renderTimelineStatus(res, 'confirmed')
            });
        } else {
            appendTimelineBlock({
                row,
                res,
                level,
                clipStart,
                clipEnd,
                renderStatus: renderTimelineStatus(res, safeStatus)
            });
        }
    });

    document.getElementById('kpiConfirmed').textContent = cntConfirmed;
    document.getElementById('kpiCheckedin').textContent = cntCheckedin;
        document.getElementById('kpiCheckout').textContent = cntCheckout;
    document.getElementById('kpiVip').textContent = cntVip;
    if (document.getElementById('kpiB2B')) document.getElementById('kpiB2B').textContent = cntB2B;
}

function calcEstimate() {
    const cin = new Date(document.getElementById('nrCheckin').value);
    const cout = new Date(document.getElementById('nrCheckout').value);
    const rate = parseInt(document.getElementById('nrRoomType').value);
    const typeName = document.getElementById('nrRoomType').options[document.getElementById('nrRoomType').selectedIndex].text.split(' —')[0];
    let nights = Math.max(1, Math.round((cout - cin) / 86400000));
    const total = rate * nights;
    const formattedTotal = typeof window.pmsFormatCurrency === 'function'
        ? window.pmsFormatCurrency(total, { forceDecimals: true })
        : `₱${total.toLocaleString('en',{minimumFractionDigits:2})}`;
    const formattedRate = typeof window.pmsFormatCurrency === 'function'
        ? window.pmsFormatCurrency(rate)
        : `₱${rate.toLocaleString('en')}`;
    document.getElementById('nrEstimate').textContent = formattedTotal;
    document.getElementById('nrCalcDetail').textContent = `${typeName} ${formattedRate} × ${nights}${timelineText('nights')}`;
}
function updateDateRangeText() {
    const end = new Date(baseDate);
    end.setDate(end.getDate() + DAYS - 1);
    document.getElementById('tlRange').innerText = `${formatTimelineRangeDate(baseDate)} — ${formatTimelineRangeDate(end)}`;
}

function shiftWeek(dir) {
    baseDate.setDate(baseDate.getDate() + dir * 7);
    updateDateRangeText();
    buildTimeline();
    buildMobileView();
}
function goToday() {
    baseDate = timelineTodayDate();
    updateDateRangeText();
    buildTimeline();
    buildMobileView();
    if (window.showToast) showToast(timelineText('todayToast'), 'success');
}

function reservationWindow(res) {
    if (res.cin && res.cout) {
        try {
            const start = parseTimelineDate(res.cin);
            const end = parseTimelineDate(res.cout);
            return {
                start,
                end: timelineVisualEndDate(end)
            };
        } catch(e) {}
    }
    const start = new Date(EPOCH);
    start.setDate(start.getDate() + Number(res.start || 0));
    const end = new Date(start);
    end.setDate(end.getDate() + Number(res.len || res.nights || 1) + 1);
    return { start, end };
}

function hasVisibleGroupBlock() {
    const rangeEnd = new Date(baseDate);
    rangeEnd.setDate(rangeEnd.getDate() + DAYS);
    return reservations.some(res => {
        if (res.status !== 'blocked' && !res.isGroupPlaceholder) return false;
        const win = reservationWindow(res);
        return win.start < rangeEnd && win.end > baseDate;
    });
}

function alignTimelineToFirstGroupBlock() {
    if (hasVisibleGroupBlock()) return;
    const firstBlock = reservations
        .filter(res => res.status === 'blocked' || res.isGroupPlaceholder)
        .map(res => ({ res, win: reservationWindow(res) }))
        .filter(item => item.win.start && !Number.isNaN(item.win.start.getTime()))
        .sort((a, b) => a.win.start - b.win.start)[0];
    if (!firstBlock) return;
    baseDate = new Date(firstBlock.win.start);
    baseDate.setHours(0,0,0,0);
}

function openTimelineReservation(res) {
    if (!res) return;
    if (res.groupId) {
        try {
            const groups = JSON.parse(localStorage.getItem('pms_groups') || '[]');
            const selected = groups.find(g => g.id === res.groupId);
            if (selected) sessionStorage.setItem('pms_selected_group', JSON.stringify(selected));
        } catch(e) {}
    }
    window.openUnifiedResModal(res.id);
}

function buildMobileView() {
    const container = document.getElementById('tlMobileView');
    const statusMap = {
        blocked: timelineText('groupBlock'),
        'group-assigned': timelineText('groupBooking'),
        confirmed: timelineText('confirmed'),
        checkedin: timelineText('checkinDone'),
        checkout: timelineText('checkoutDue'),
        completed: timelineText('completed'),
        vip: 'VIP'
    };
    const colorMap = {blocked:'#111827','group-assigned':'#2563EB',confirmed:'#3B82F6',checkedin:'#10B981',checkout:'#F97316',completed:'#94A3B8',vip:'#8B5CF6'};
    const iconMap = {blocked:'fa-building','group-assigned':'fa-users',confirmed:'fa-check',checkedin:'fa-right-to-bracket',checkout:'fa-right-from-bracket',completed:'fa-check-double',vip:'fa-crown'};

    let html = '';
    rooms.forEach(room => {
        const offset = Math.round((baseDate - EPOCH) / 86400000);
        const roomRes = reservations.filter(r => timelineRoomMatchesReservation(room, r));
        const hasToday = roomRes.some(r => {
            let renderStart, renderEnd;
            if (r.cin && r.cout) {
                try {
                    const rCinDate = parseTimelineDate(r.cin);
                    const rCoutDate = parseTimelineDate(r.cout);
                    if (!rCinDate || !rCoutDate) throw new Error('invalid timeline dates');
                    renderStart = Math.round((rCinDate - baseDate) / 86400000);
                    renderEnd = Math.round((rCoutDate - baseDate) / 86400000);
                } catch(e) {
                    renderStart = r.start - offset; renderEnd = renderStart + r.len;
                }
            } else {
                renderStart = r.start - offset; renderEnd = renderStart + r.len;
            }
            return renderStart <= 0 && renderEnd > 0;
        });

        html += `<div class="m-room-card ${hasToday ? '' : 'vacant'}">
            <div class="m-room-header">
                <div class="m-room-id">
                    <span class="room-tag">${room.id}</span>
                    <span class="m-room-type">${timelineRoomType(room.type)}</span>
                </div>
                <span class="m-room-status ${hasToday ? 'occupied' : 'available'}">${hasToday ? timelineText('occupied') : timelineText('available')}</span>
            </div>`;

        if (roomRes.length > 0) {
            html += '<div class="m-room-bookings">';
            roomRes.forEach(res => {
                const cin = new Date(EPOCH);
                cin.setDate(cin.getDate() + res.start);
                const cout = new Date(cin);
                cout.setDate(cout.getDate() + res.len);
                const renderStatus = renderTimelineStatus(res, effectiveTimelineStatus(res));
                const color = colorMap[renderStatus] || colorMap.confirmed;
                html += `
                <div class="m-booking-item" style="border-left:3px solid ${color}" onclick="openTimelineReservation(reservations.find(r => r.id === '${res.id}'))">
                    <div class="m-booking-top">
                        <div class="m-booking-guest">
                            <i class="fa-solid ${iconMap[renderStatus] || iconMap.confirmed}" style="color:${color}"></i>
                            <strong>${timelinePrimaryGuestName(res) || timelineDisplayName(res)}</strong>
                        </div>
                        <span class="status-badge ${renderStatus === 'checkedin' ? 'checkin' : renderStatus}">${statusMap[renderStatus] || statusMap.confirmed}</span>
                    </div>
                    ${timelineCompanionGuestNames(res).length ? `<div class="m-booking-meta" style="margin-top:2px;padding-left:20px">동반 ${timelineCompanionGuestNames(res).join(', ')}</div>` : ''}
                    <div class="m-booking-meta">
                        ${formatTimelineShortDate(cin)} → ${formatTimelineShortDate(cout)} (${res.len}${timelineText('nights')}) · ${res.channel}
                    </div>
                </div>`;
            });
            html += '</div>';
        }
        html += '</div>';
    });
    container.innerHTML = html;
}

window.addEventListener('languagechange', applyTimelineLanguage);
// Timeline will be built after data load
// Removed conflicting local i18n logic
</script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        // Clear cached local storage to ensure fresh fallback data is used
        localStorage.removeItem('pms_rooms');
        localStorage.removeItem('pms_timeline_res');
        // removed init

        const [rmData, resData, groupData] = await Promise.all([
            PmsAPI.getAllRooms(),
            PmsAPI.getTimelineReservations(),
            PmsAPI.getGroups ? PmsAPI.getGroups().catch(() => []) : []
        ]);
        rooms = timelineSortRooms(rmData);
        timelineGroups = Array.isArray(groupData) ? groupData : [];
        timelineGroups = timelineStoredGroups();
        if (timelineGroups.length) localStorage.setItem('pms_groups', JSON.stringify(timelineGroups));
        window.reservations = dedupeTimelineReservations(resData);
        alignTimelineToFirstGroupBlock();

        applyTimelineStaticLabels();
        buildTimeline();
        buildMobileView();
        if(typeof updateDateRangeText === 'function') updateDateRangeText();

        if (typeof window.changeLang === 'function') {
            window.changeLang(document.getElementById('langSelect')?.value || localStorage.getItem('pms_lang') || 'ko');
        } else {
            applyTimelineLanguage();
        }
    } catch(e) { 
        console.error(e); 
        const container = document.querySelector('.tl-container');
        if(container) {
            container.innerHTML = `<div style="padding:20px;color:red;font-weight:bold;background:#fee2e2;border:1px solid #ef4444;border-radius:8px;">
                <h3>JS Execution Error in timeline.html</h3>
                <p>${e.message}</p>
                <pre style="font-size:10px;margin-top:10px;white-space:pre-wrap;">${e.stack}</pre>
            </div>`;
        }
    }
});
</script>
<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
</body>
</html>
