<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reservations — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
/* Thin scrollbar for modal */
#newResModal .modal-body{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
#newResModal .modal-body::-webkit-scrollbar{width:4px}
#newResModal .modal-body::-webkit-scrollbar-track{background:transparent}
#newResModal .modal-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}

@media(max-width:768px){
    #newResModal .modal-card{width:100%!important;max-width:100%!important;margin:0 8px;border-radius:12px}
    #newResModal .modal-body{padding:16px!important;gap:14px!important}
    #newResModal .modal-body > div[style*="grid-template-columns"]{grid-template-columns:1fr!important;gap:10px!important}
    #newResModal input,#newResModal select,#newResModal textarea{font-size:.8rem!important;max-width:100%!important;box-sizing:border-box!important}
    #newResModal .modal-footer{flex-direction:column;gap:8px}
    #newResModal .modal-footer button{width:100%}
}
</style>
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
</head>
<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
    <header class="topbar">
        <div class="topbar-left">
            <button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
            <h1>Reservations</h1>
            <span class="date-badge"><i class="fa-regular fa-calendar"></i> 2026년 5월 12일 (월)</span>
        </div>
        <div class="topbar-right">
            <select class="hotel-select">
                <option>🏨 The Grand Saigon</option>
                <option>🏨 Azure Bangkok</option>
                <option>🏨 Pearl Phnom Penh</option>
            </select>
            <select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="margin-left:8px; width:110px">
                <option value="ko">🇰🇷 한국어</option>
                <option value="en">🇺🇸 English</option>
            </select>
        </div>
    </header>

    <div class="content">
        <!-- TOOLBAR -->
        <div class="tl-toolbar">
            <div class="tl-toolbar-left">
                <button class="tl-nav-btn" onclick="shiftWeek(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="tl-range" id="tlRange">5월 12일 — 5월 25일</span>
                <button class="tl-nav-btn" onclick="shiftWeek(1)"><i class="fa-solid fa-chevron-right"></i></button>
                <button class="tl-today-btn" onclick="goToday()">Today</button>
            </div>
            <div class="tl-toolbar-right">
                <div class="tl-legend">
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#3B82F6"></span> Confirmed</span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#F59E0B"></span> Pending</span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#10B981"></span> Check-in</span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#8B5CF6"></span> VIP</span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#9CA3AF"></span> OOS</span>
                </div>
                <button class="btn-primary-sm" onclick="openNewReservation()"><i class="fa-solid fa-plus"></i> New Booking</button>
            </div>
        </div>

        <!-- TIMELINE GRID (desktop) -->
        <div class="tl-container desktop-only">
            <div class="tl-grid" id="tlGrid">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- MOBILE ROOM LIST VIEW -->
        <div class="mobile-only" id="tlMobileView">
            <!-- Generated by JS -->
        </div>

        <!-- ROOM STATUS SUMMARY -->
        <div class="room-summary-row">
            <div class="room-sum-card">
                <div class="room-sum-icon" style="background:var(--primary-lt);color:var(--primary)"><i class="fa-solid fa-bed"></i></div>
                <div><div class="room-sum-val">120</div><div class="room-sum-label">Total Rooms</div></div>
            </div>
            <div class="room-sum-card">
                <div class="room-sum-icon" style="background:var(--success-lt);color:var(--success)"><i class="fa-solid fa-check-circle"></i></div>
                <div><div class="room-sum-val">99</div><div class="room-sum-label">Occupied</div></div>
            </div>
            <div class="room-sum-card">
                <div class="room-sum-icon" style="background:var(--warning-lt);color:var(--warning)"><i class="fa-solid fa-clock"></i></div>
                <div><div class="room-sum-val">15</div><div class="room-sum-label">Available</div></div>
            </div>
            <div class="room-sum-card">
                <div class="room-sum-icon" style="background:var(--danger-lt);color:var(--danger)"><i class="fa-solid fa-wrench"></i></div>
                <div><div class="room-sum-val">3</div><div class="room-sum-label">OOS</div></div>
            </div>
            <div class="room-sum-card">
                <div class="room-sum-icon" style="background:var(--purple-lt);color:var(--purple)"><i class="fa-solid fa-crown"></i></div>
                <div><div class="room-sum-val">6</div><div class="room-sum-label">VIP Guests</div></div>
            </div>
        </div>
    </div>
</div>

<!-- RESERVATION DETAIL MODAL -->
<div class="modal-overlay" id="resModal">
    <div class="modal-card">
        <div class="modal-header">
            <h3 id="modalTitle">Booking Detail</h3>
            <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" id="modalBody">
            <!-- Filled by JS -->
        </div>
        <div class="modal-footer">
            <button class="btn-outline" onclick="closeModal()">Close</button>
            <button class="btn-primary-sm">Process Check-in</button>
        </div>
    </div>
</div>

<!-- NEW RESERVATION MODAL -->
<div class="modal-overlay" id="newResModal" onclick="if(event.target===this) closeNewRes()">
    <div class="modal-card" style="max-width:640px;width:95vw">
        <div class="modal-header">
            <h3 class="modal-title"><i class="fa-solid fa-plus" style="color:var(--primary)"></i> New Booking 등록</h3>
            <button class="modal-close" onclick="closeNewRes()"><i class="fa-solid fa-xmark"></i></button>
        </div>
        <div class="modal-body" style="padding:20px;display:flex;flex-direction:column;gap:18px;max-height:65vh;overflow-y:auto">
            <!-- Guest Info -->
            <div style="display:flex;align-items:center;gap:8px;padding-bottom:4px;border-bottom:2px solid var(--primary);margin-bottom:-8px">
                <i class="fa-solid fa-user" style="color:var(--primary);font-size:.8rem"></i>
                <span style="font-weight:700;font-size:.82rem;color:var(--primary)">Guest 정보</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Guest 이름 <span style="color:var(--danger)">*</span></label>
                    <input type="text" id="nrGuest" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-family:var(--font);font-size:.82rem" placeholder="예: John Doe">
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Contact</label>
                    <input type="text" id="nrPhone" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-family:var(--font);font-size:.82rem" placeholder="+84 000 0000">
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">이메일</label>
                    <input type="email" id="nrEmail" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 12px;font-family:var(--font);font-size:.82rem" placeholder="guest@email.com">
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Country</label>
                    <select id="nrNation" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option value="">선택</option>
                        <option>🇻🇳 Vietnam</option><option>🇰🇷 South Korea</option><option>🇯🇵 Japan</option>
                        <option>🇺🇸 USA</option><option>🇨🇳 China</option><option>🇩🇪 Germany</option><option>🇫🇷 France</option>
                        <option>🇬🇧 UK</option><option>🇦🇺 Australia</option><option>기타</option>
                    </select>
                </div>
            </div>

            <!-- Stay Info -->
            <div style="display:flex;align-items:center;gap:8px;padding-bottom:4px;border-bottom:2px solid var(--success);margin-bottom:-8px;margin-top:6px">
                <i class="fa-solid fa-calendar-check" style="color:var(--success);font-size:.8rem"></i>
                <span style="font-weight:700;font-size:.82rem;color:var(--success)">Stay 정보</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Check-in <span style="color:var(--danger)">*</span></label>
                    <input type="date" id="nrCheckin" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem" value="2026-05-12">
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Check-out <span style="color:var(--danger)">*</span></label>
                    <input type="date" id="nrCheckout" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem" value="2026-05-15">
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Room 타입 <span style="color:var(--danger)">*</span></label>
                    <select id="nrRoomType" onchange="calcEstimate()" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option value="95">Standard — $95/박</option>
                        <option value="130" selected>Deluxe — $130/박</option>
                        <option value="260">Suite — $260/박</option>
                        <option value="250">Premier — $250/박</option>
                        <option value="600">Penthouse — $600/박</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Room 배정</label>
                    <select id="nrRoom" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option value="">자동 배정</option>
                        <option>0301</option><option>0302</option><option>0303</option>
                        <option>0501</option><option>0502</option><option>0503</option>
                        <option>0701</option><option>0702</option><option>0703</option>
                        <option>0801</option><option>0805</option><option>0807</option>
                        <option>1001</option><option>1002</option>
                        <option>1201</option><option>1205</option>
                        <option>1401</option><option>1402</option>
                        <option>PH01</option><option>PH02</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">인원 (성인/아동)</label>
                    <div style="display:flex;gap:8px">
                        <select style="flex:1;height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                            <option>성인 1</option><option selected>성인 2</option><option>성인 3</option><option>성인 4</option>
                        </select>
                        <select style="flex:1;height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                            <option selected>아동 0</option><option>아동 1</option><option>아동 2</option>
                        </select>
                    </div>
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">예약 Channel</label>
                    <select id="nrChannel" style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option>Direct (직접 예약)</option>
                        <option>Agoda</option><option>Booking.com</option>
                        <option>Expedia</option><option>Walk-in</option>
                    </select>
                </div>
            </div>

            <!-- Additional -->
            <div style="display:flex;align-items:center;gap:8px;padding-bottom:4px;border-bottom:2px solid var(--warning);margin-bottom:-8px;margin-top:6px">
                <i class="fa-solid fa-concierge-bell" style="color:var(--warning);font-size:.8rem"></i>
                <span style="font-weight:700;font-size:.82rem;color:var(--warning)">부가 서비스</span>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">식사 플랜</label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option>없음</option><option>조식 포함 (+$15/박)</option><option>조/석식 포함 (+$35/박)</option>
                    </select>
                </div>
                <div style="display:flex;flex-direction:column;gap:5px">
                    <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">Airport Pickup</label>
                    <select style="height:38px;border:1px solid var(--border);border-radius:6px;padding:0 10px;font-family:var(--font);font-size:.82rem;background:#fff">
                        <option>불필요</option><option>편도 ($35)</option><option>왕복 ($60)</option>
                    </select>
                </div>
            </div>
            <div style="display:flex;flex-direction:column;gap:5px">
                <label style="font-size:.75rem;font-weight:600;color:var(--txt2)">특별 요청사항</label>
                <textarea id="nrNote" style="min-height:70px;border:1px solid var(--border);border-radius:6px;padding:10px 12px;font-family:var(--font);font-size:.82rem;width:100%;resize:vertical" placeholder="얼리 체크인, 고층 선호, 알레르기 등..."></textarea>
            </div>

            <!-- Estimate -->
            <div style="background:var(--border2);border-radius:8px;padding:14px 16px;display:flex;justify-content:space-between;align-items:center">
                <div>
                    <div style="font-size:.72rem;color:var(--txt3)">예상 Stay료</div>
                    <div style="font-size:.72rem;color:var(--txt3);margin-top:2px" id="nrCalcDetail">Deluxe $130 × 3박</div>
                </div>
                <div style="font-size:1.3rem;font-weight:800;color:var(--primary)" id="nrEstimate">$390.00</div>
            </div>
        </div>
        <div class="modal-footer" style="padding:14px 20px;border-top:1px solid var(--border2);display:flex;justify-content:flex-end;gap:10px;background:#f8fafc;border-radius:0 0 var(--radius-sm) var(--radius-sm)">
            <button class="btn-outline" onclick="closeNewRes()">Cancel</button>
            <button class="btn-primary-sm" onclick="saveNewRes()"><i class="fa-solid fa-check"></i> 예약 Save</button>
        </div>
    </div>
</div>

<script>
// ===== ROOM & RESERVATION DATA =====
const rooms = [
    {id:'0301',type:'Standard',floor:3},{id:'0302',type:'Standard',floor:3},{id:'0303',type:'Standard',floor:3},
    {id:'0501',type:'Standard',floor:5},{id:'0502',type:'Standard',floor:5},{id:'0503',type:'Standard',floor:5},
    {id:'0701',type:'Deluxe',floor:7},{id:'0702',type:'Deluxe',floor:7},{id:'0703',type:'Deluxe',floor:7},
    {id:'0801',type:'Deluxe',floor:8},{id:'0805',type:'Suite',floor:8},{id:'0807',type:'Suite',floor:8},
    {id:'1001',type:'Suite',floor:10},{id:'1002',type:'Suite',floor:10},
    {id:'1201',type:'Deluxe',floor:12},{id:'1205',type:'Deluxe',floor:12},
    {id:'1401',type:'Premier',floor:14},{id:'1402',type:'Premier',floor:14},
    {id:'PH01',type:'Penthouse',floor:20},{id:'PH02',type:'Penthouse',floor:20}
];

const reservations = [
    {room:'0301',guest:'Park Soo',start:0,len:3,status:'confirmed',channel:'Direct'},
    {room:'0302',guest:'Lee Min',start:1,len:4,status:'confirmed',channel:'Agoda'},
    {room:'0303',guest:'Tran Van',start:2,len:2,status:'pending',channel:'Walk-in'},
    {room:'0501',guest:'Kim Da',start:0,len:5,status:'checkedin',channel:'Booking'},
    {room:'0502',guest:'Pham Anh',start:3,len:3,status:'confirmed',channel:'Direct'},
    {room:'0503',guest:'Park Kyung',start:0,len:1,status:'confirmed',channel:'Direct'},
    {room:'0701',guest:'Chen Wei',start:1,len:6,status:'confirmed',channel:'Agoda'},
    {room:'0702',guest:'Nguyen Ha',start:0,len:3,status:'checkedin',channel:'Direct'},
    {room:'0703',guest:'Tanaka Y.',start:4,len:4,status:'confirmed',channel:'Booking'},
    {room:'0801',guest:'Smith J.',start:0,len:2,status:'checkedin',channel:'Direct'},
    {room:'0805',guest:'John Smith',start:0,len:2,status:'checkedin',channel:'Direct'},
    {room:'0807',guest:'Wong Li',start:2,len:5,status:'confirmed',channel:'Agoda'},
    {room:'1001',guest:'Garcia M.',start:0,len:7,status:'vip',channel:'Direct'},
    {room:'1002',guest:'Mueller K.',start:1,len:3,status:'confirmed',channel:'Booking'},
    {room:'1201',guest:'Sato Yuki',start:3,len:4,status:'pending',channel:'Agoda'},
    {room:'1205',guest:'Nguyen Thi',start:0,len:3,status:'confirmed',channel:'Direct'},
    {room:'1401',guest:'Kim Jun',start:0,len:1,status:'checkedin',channel:'Direct'},
    {room:'1402',guest:'Lee Hana',start:2,len:5,status:'vip',channel:'Direct'},
    {room:'PH01',guest:'Tran Linh',start:0,len:4,status:'vip',channel:'Direct'},
    {room:'PH02',guest:'Al Rashid',start:5,len:5,status:'confirmed',channel:'Booking'},
    {room:'0301',guest:'Vo Duc',start:5,len:4,status:'confirmed',channel:'Agoda'},
    {room:'0503',guest:'Bui Tien',start:2,len:3,status:'pending',channel:'Walk-in'},
    {room:'0801',guest:'Nakamura',start:4,len:3,status:'confirmed',channel:'Booking'},
    {room:'1401',guest:'David C.',start:3,len:4,status:'vip',channel:'Direct'},
];

const DAYS = 14;
const baseDate = new Date(2026, 4, 12); // May 12, 2026

function buildTimeline() {
    const grid = document.getElementById('tlGrid');
    grid.innerHTML = '';

    // Header row
    let headerHTML = '<div class="tl-room-header">Room</div>';
    for (let d = 0; d < DAYS; d++) {
        const date = new Date(baseDate);
        date.setDate(date.getDate() + d);
        const dayName = ['일','월','화','수','목','금','토'][date.getDay()];
        const isToday = d === 0;
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        headerHTML += `<div class="tl-date-header ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}">${date.getDate()}<span class="tl-day-name">${dayName}</span></div>`;
    }
    grid.innerHTML += `<div class="tl-header-row">${headerHTML}</div>`;

    // Room rows
    rooms.forEach(room => {
        let rowHTML = `<div class="tl-room-cell"><span class="tl-room-num">${room.id}</span><span class="tl-room-type">${room.type}</span></div>`;
        
        // Create date cells
        for (let d = 0; d < DAYS; d++) {
            const isWeekend = (() => {
                const date = new Date(baseDate);
                date.setDate(date.getDate() + d);
                return date.getDay() === 0 || date.getDay() === 6;
            })();
            rowHTML += `<div class="tl-cell ${isWeekend ? 'weekend' : ''}" data-room="${room.id}" data-day="${d}"></div>`;
        }

        grid.innerHTML += `<div class="tl-row">${rowHTML}</div>`;
    });

    // Place reservation blocks
    reservations.forEach(res => {
        const roomIdx = rooms.findIndex(r => r.id === res.room);
        if (roomIdx === -1) return;
        
        const row = grid.querySelectorAll('.tl-row')[roomIdx];
        if (!row) return;

        const block = document.createElement('div');
        block.className = `tl-block ${res.status}`;
        block.style.left = `calc(140px + ${res.start} * ((100% - 140px) / ${DAYS}) + 3px)`;
        block.style.width = `calc(${res.len} * ((100% - 140px) / ${DAYS}) - 6px)`;
        block.innerHTML = `<span class="tl-block-text">${res.guest}</span>`;
        block.onclick = () => showDetail(res);
        row.style.position = 'relative';
        row.appendChild(block);
    });
}

function showDetail(res) {
    const statusMap = {confirmed:'Confirmed',pending:'Pending',checkedin:'Check-in',vip:'VIP'};
    const colorMap = {confirmed:'var(--primary)',pending:'var(--warning)',checkedin:'var(--success)',vip:'var(--purple)'};
    const checkIn = new Date(baseDate);
    checkIn.setDate(checkIn.getDate() + res.start);
    const checkOut = new Date(checkIn);
    checkOut.setDate(checkOut.getDate() + res.len);

    document.getElementById('modalTitle').textContent = `${res.room}호 — ${res.guest}`;
    document.getElementById('modalBody').innerHTML = `
        <div class="modal-detail-grid">
            <div class="md-item"><div class="md-label">Status</div><div class="md-value"><span class="status-dot" style="background:${colorMap[res.status]}"></span> ${statusMap[res.status]}</div></div>
            <div class="md-item"><div class="md-label">Channel</div><div class="md-value">${res.channel}</div></div>
            <div class="md-item"><div class="md-label">Check-in</div><div class="md-value">${checkIn.getMonth()+1}/${checkIn.getDate()}</div></div>
            <div class="md-item"><div class="md-label">Check-out</div><div class="md-value">${checkOut.getMonth()+1}/${checkOut.getDate()}</div></div>
            <div class="md-item"><div class="md-label">Stay일</div><div class="md-value">${res.len}박</div></div>
            <div class="md-item"><div class="md-label">RoomType</div><div class="md-value">${rooms.find(r=>r.id===res.room)?.type||'-'}</div></div>
        </div>
    `;
    document.getElementById('resModal').classList.add('active');
}

function closeModal() { document.getElementById('resModal').classList.remove('active'); }
function openNewReservation() { document.getElementById('newResModal').classList.add('active'); calcEstimate(); }
function closeNewRes() { document.getElementById('newResModal').classList.remove('active'); }
function saveNewRes() {
    const guest = document.getElementById('nrGuest').value.trim();
    if (!guest) { alert('Guest 이름을 입력해 주세요.'); return; }
    alert(`${guest} 님의 예약이 성공적으로 등록되었습니다!`);
    closeNewRes();
}
function calcEstimate() {
    const cin = new Date(document.getElementById('nrCheckin').value);
    const cout = new Date(document.getElementById('nrCheckout').value);
    const rate = parseInt(document.getElementById('nrRoomType').value);
    const typeName = document.getElementById('nrRoomType').options[document.getElementById('nrRoomType').selectedIndex].text.split(' —')[0];
    let nights = Math.max(1, Math.round((cout - cin) / 86400000));
    const total = rate * nights;
    document.getElementById('nrEstimate').textContent = `$${total.toLocaleString('en',{minimumFractionDigits:2})}`;
    document.getElementById('nrCalcDetail').textContent = `${typeName} $${rate} × ${nights}박`;
}

function buildMobileView() {
    const container = document.getElementById('tlMobileView');
    const statusMap = {confirmed:'Confirmed',pending:'Pending',checkedin:'Check-in',vip:'VIP'};
    const colorMap = {confirmed:'#3B82F6',pending:'#F59E0B',checkedin:'#10B981',vip:'#8B5CF6'};
    const iconMap = {confirmed:'fa-check',pending:'fa-clock',checkedin:'fa-right-to-bracket',vip:'fa-crown'};

    let html = '';
    rooms.forEach(room => {
        const roomRes = reservations.filter(r => r.room === room.id);
        const hasToday = roomRes.some(r => r.start === 0);

        html += `<div class="m-room-card ${hasToday ? '' : 'vacant'}">
            <div class="m-room-header">
                <div class="m-room-id">
                    <span class="room-tag">${room.id}</span>
                    <span class="m-room-type">${room.type}</span>
                </div>
                <span class="m-room-status ${hasToday ? 'occupied' : 'available'}">${hasToday ? 'Occupied' : '공실'}</span>
            </div>`;

        if (roomRes.length > 0) {
            html += '<div class="m-room-bookings">';
            roomRes.forEach(res => {
                const cin = new Date(baseDate);
                cin.setDate(cin.getDate() + res.start);
                const cout = new Date(cin);
                cout.setDate(cout.getDate() + res.len);
                const color = colorMap[res.status];
                html += `
                <div class="m-booking-item" style="border-left:3px solid ${color}" onclick="showDetail({room:'${res.room}',guest:'${res.guest}',start:${res.start},len:${res.len},status:'${res.status}',channel:'${res.channel}'})">
                    <div class="m-booking-top">
                        <div class="m-booking-guest">
                            <i class="fa-solid ${iconMap[res.status]}" style="color:${color}"></i>
                            <strong>${res.guest}</strong>
                        </div>
                        <span class="status-badge ${res.status === 'checkedin' ? 'checkin' : res.status}">${statusMap[res.status]}</span>
                    </div>
                    <div class="m-booking-meta">
                        ${cin.getMonth()+1}/${cin.getDate()} → ${cout.getMonth()+1}/${cout.getDate()} (${res.len}박) · ${res.channel}
                    </div>
                </div>`;
            });
            html += '</div>';
        }
        html += '</div>';
    });
    container.innerHTML = html;
}

buildTimeline();
buildMobileView();

function setupI18n(){
    const walk=document.createTreeWalker(document.body,NodeFilter.SHOW_TEXT,null,false);
    let node; const textNodes=[];
    while(node=walk.nextNode()){
        const orig=node.nodeValue,text=orig.trim();
        if(text&&translations.ko[text]&&!node.parentNode.hasAttribute('data-i18n-key')){
            const span=document.createElement('span');
            span.setAttribute('data-i18n-key',text);span.textContent=text;
            textNodes.push({node,span,originalText:orig});
        }
    }
    textNodes.forEach(({node,span,originalText})=>{
        const frag=document.createDocumentFragment();
        const ls=originalText.match(/^\s+/),ts=originalText.match(/\s+$/);
        if(ls)frag.appendChild(document.createTextNode(ls[0]));
        frag.appendChild(span);
        if(ts)frag.appendChild(document.createTextNode(ts[0]));
        node.parentNode.replaceChild(frag,node);
    });
}
function changeLang(lang){
    currentLang=lang;
    const dict=translations[lang]||translations.ko;
    document.querySelectorAll('[data-i18n-key]').forEach(el=>{
        const key=el.getAttribute('data-i18n-key');
        if(dict[key])el.textContent=dict[key];
    });
}
document.addEventListener('DOMContentLoaded',()=>{setupI18n();changeLang(currentLang);});
