<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>예약 타임라인 — Hotel PMS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Noto+Sans+KR:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="../common/css/dashboard.css">
    <link rel="stylesheet" href="../common/css/frontdesk.css">
<style>
/* Thin scrollbar for modal */
#newResModal .modal-body{scrollbar-width:thin;scrollbar-color:rgba(0,0,0,.15) transparent}
#newResModal .modal-body::-webkit-scrollbar{width:4px}
#newResModal .modal-body::-webkit-scrollbar-track{background:transparent}
#newResModal .modal-body::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:4px}

@media(max-width:768px){
    #newResModal .modal-card{width:100%!important;max-width:100%!important;margin:0 8px;border-radius:12px}
    #newResModal .modal-body{padding:16px!important;gap:14px!important}
    #newResModal .modal-body > div[style*="grid-template-columns"]{grid-template-columns:1fr!important;gap:10px!important}
    #newResModal input,#newResModal select,#newResModal textarea{font-size:.8rem!important;max-width:100%!important;box-sizing:border-box!important}
    #newResModal .modal-footer{flex-direction:column;gap:8px}
    #newResModal .modal-footer button{width:100%}
}
/* Filter Bar Styling */
.filter-bar-mt {
    display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 24px;
    padding: 12px 20px; background: #fff; border: 1px solid var(--border); border-radius: 14px;
}
.filter-left { display: flex; align-items: center; gap: 12px; flex: 1; overflow-x: auto; -webkit-overflow-scrolling: touch; }
.filter-right { display: flex; align-items: center; gap: 10px; flex-shrink: 0; flex-wrap: wrap; justify-content: flex-end; }
.search-container { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.search-box-mt {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; border: 1.5px solid var(--border); border-radius: 8px;
    background: #fff; transition: border-color .2s; width: 220px;
}
.search-box-mt:focus-within { border-color: var(--primary); }
.search-box-mt i { color: var(--txt3); font-size: .85rem; }
.search-box-mt input { border: none; outline: none; font-family: var(--font); font-size: .82rem; color: var(--txt); width: 100%; background: transparent; padding: 0; margin: 0; }
.btn-search {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px; border-radius: 8px; border: none; cursor: pointer;
    background: var(--primary); color: #fff; font-family: var(--font);
    font-size: .8rem; font-weight: 600; transition: background .2s;
}
.btn-search:hover { background: #1D4ED8; }
.filter-divider { width: 1px; height: 24px; background: var(--border2); flex-shrink: 0; }
.filter-chips { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

@media(max-width:768px){
    .filter-bar-mt { flex-direction: column; align-items: stretch; padding: 12px; gap: 10px; }
    .filter-left { flex-wrap: wrap; gap: 10px; }
    .search-container { width: 100%; display: flex; gap: 8px; flex: 1; }
    .search-box-mt { flex: 1; min-width: 0; width: auto; }
    .filter-right { justify-content: flex-start; }
}

/* Fallback & Override for Timeline Blocks to bypass CSS Cache */
.tl-block { background-color: #64748B !important; color: #fff !important; }
.tl-block.confirmed { background: #3B82F6 !important; }
.tl-block.pending { background: #F59E0B !important; }
.tl-block.checkedin { background: #10B981 !important; }
.tl-block.checkout, .tl-block.checkedout { background: #8B5CF6 !important; }
.tl-block.cancelled { background: #EF4444 !important; }
.tl-block.vip { background: linear-gradient(135deg, #8B5CF6, #A78BFA) !important; }
</style>
    <script src="../common/js/api/api-core.js"></script>
    <script src="../common/js/api/api-frontdesk.js"></script>
    <script src="../common/js/i18n.js"></script>
<script src="../common/js/sidebar.js"></script>
    <script src="../common/js/ui-components.js"></script>
    <script src="../common/js/topbar.js"></script>
    <script src="../common/js/guest-search.js"></script>
    <script src="../common/js/reservation-actions.js"></script>
</head>
<body>

<!-- MOBILE OVERLAY -->

<!-- ===== MAIN ===== -->
<div class="main">
        <header class="topbar"><h1 data-i18n-key="Reservations">예약 타임라인</h1></header>

    <div class="content">
        <!-- ROOM STATUS SUMMARY -->
        <div class="kpi-grid kpi-grid-5" style="margin-bottom:20px">
            <div class="kpi-card blue" style="cursor:pointer" onclick="openUnifiedResModal()">
                <div class="kpi-icon"><i class="fa-solid fa-calendar-check"></i></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiConfirmed">0</div><div class="kpi-label">체크인 대상(잔여)</div></div>
            </div>
            <div class="kpi-card green">
                <div class="kpi-icon"><i class="fa-solid fa-bed"></i></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiCheckedin">0</div><div class="kpi-label" data-i18n-key="투숙 중">투숙 중</div></div>
            </div>
            <div class="kpi-card red">
                <div class="kpi-icon"><i class="fa-solid fa-right-from-bracket"></i></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiCheckout">0</div><div class="kpi-label">체크아웃 대상(잔여)</div></div>
            </div>
            <div class="kpi-card purple">
                <div class="kpi-icon"><i class="fa-solid fa-crown"></i></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiVip">0</div><div class="kpi-label" data-i18n-key="VIP">VIP</div></div>
            </div>
            <div class="kpi-card" style="border-left: 4px solid #111827">
                <div class="kpi-icon" style="background:rgba(17,24,39,0.1); color:#111827"><i class="fa-solid fa-building"></i></div>
                <div class="kpi-body"><div class="kpi-value" id="kpiB2B">0</div><div class="kpi-label">단체 고객</div></div>
            </div>
        </div>

        <!-- TOOLBAR -->
        <div class="filter-bar-mt">
            <div class="filter-left">
                <button class="tl-nav-btn" onclick="shiftWeek(-1)"><i class="fa-solid fa-chevron-left"></i></button>
                <span class="tl-range" id="tlRange">5월 12일 — 5월 25일</span>
                <button class="tl-nav-btn" onclick="shiftWeek(1)"><i class="fa-solid fa-chevron-right"></i></button>
                <button class="tl-today-btn" onclick="goToday()" data-i18n-key="Today">오늘</button>
            </div>
            <div class="filter-right">
                <div class="tl-legend">
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#3B82F6"></span> <span data-i18n-key="예약 확정">예약 확정</span></span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#10B981"></span> <span data-i18n-key="체크인 완료">체크인 완료</span></span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#8B5CF6"></span> <span data-i18n-key="VIP">VIP</span></span>
                    <span class="tl-leg-item"><span class="tl-leg-dot" style="background:#9CA3AF"></span> OOS</span>
                </div>
                <button class="btn-primary-sm" onclick="openUnifiedResModal()"><i class="fa-solid fa-plus"></i> <span data-i18n-key="New Booking">New Booking</span></button>
            </div>
        </div>

        <!-- TIMELINE GRID (desktop) -->
        <div class="tl-container desktop-only">
            <div class="tl-grid" id="tlGrid">
                <!-- Generated by JS -->
            </div>
        </div>

        <!-- MOBILE ROOM LIST VIEW -->
        <div class="mobile-only" id="tlMobileView">
            <!-- Generated by JS -->
        </div>
    </div>
</div>




<script>
// ===== ROOM & RESERVATION DATA =====
let rooms = [];

window.reservations = [];

const DAYS = 14;
const EPOCH = new Date(2026, 4, 12); // Base reference date
let baseDate = new Date(2026, 4, 12); // Start view on May 12 where data exists

function buildTimeline() {
    const grid = document.getElementById('tlGrid');
    grid.innerHTML = '';

    let cntConfirmed=0, cntCheckedin=0, cntCheckout=0, cntVip=0, cntB2B=0;

    // Count all reservations to maintain consistency with other views
    reservations.forEach(res => {
        const isB2B = res.isB2B;
        const isVip = res.isVip || (res.vip && res.vip.toLowerCase().includes('vip'));
        if(isVip) cntVip++;
        if(isB2B) cntB2B++;
        if(res.status === 'confirmed') cntConfirmed++; // 남은 체크인 대상
        else if(res.status === 'checkedin' || res.status === 'checked-in') {
            cntCheckedin++; 
            cntCheckout++; // 투숙중인 사람 = 오늘 나가야 할 잠재적 대상
        }
    });

    // Header row
    let headerHTML = '<div class="tl-room-header">Room</div>';
    for (let d = 0; d < DAYS; d++) {
        const date = new Date(baseDate);
        date.setDate(date.getDate() + d);
        const dayName = ['일','월','화','수','목','금','토'][date.getDay()];
        const isToday = d === 0;
        const isWeekend = date.getDay() === 0 || date.getDay() === 6;
        headerHTML += `<div class="tl-date-header ${isToday ? 'today' : ''} ${isWeekend ? 'weekend' : ''}">${date.getDate()}<span class="tl-day-name">${dayName}</span></div>`;
    }
    grid.innerHTML += `<div class="tl-header-row">${headerHTML}</div>`;

    // Room rows
    rooms.forEach(room => {
        let rowHTML = `<div class="tl-room-cell"><span class="tl-room-num">${room.id}</span><span class="tl-room-type">${room.type}</span></div>`;
        
        // Create date cells
        for (let d = 0; d < DAYS; d++) {
            const isWeekend = (() => {
                const date = new Date(baseDate);
                date.setDate(date.getDate() + d);
                return date.getDay() === 0 || date.getDay() === 6;
            })();
            rowHTML += `<div class="tl-cell ${isWeekend ? 'weekend' : ''}" data-room="${room.id}" data-day="${d}"></div>`;
        }

        grid.innerHTML += `<div class="tl-row">${rowHTML}</div>`;
    });

    // Track levels for each room to handle overlapping blocks
    const roomLevels = {};

    reservations.forEach(res => {
        const roomIdx = rooms.findIndex(r => r.id === res.room || r.id === res.fullRoom || (r.number && r.number === res.room) || (r.display && r.display === res.room));
        if (roomIdx === -1) return;
        
        const row = grid.querySelectorAll('.tl-row')[roomIdx];
        if (!row) return;

        let renderStart, renderEnd;
        if (res.cin && res.cout) {
            try {
                const cinParts = res.cin.split('/');
                const coutParts = res.cout.split('/');
                const rCinDate = new Date(2026, parseInt(cinParts[0])-1, parseInt(cinParts[1]));
                const rCoutDate = new Date(2026, parseInt(coutParts[0])-1, parseInt(coutParts[1]));
                renderStart = Math.round((rCinDate - baseDate) / 86400000);
                renderEnd = Math.round((rCoutDate - baseDate) / 86400000);
            } catch(e) {
                const offset = Math.round((baseDate - EPOCH) / 86400000);
                renderStart = res.start - offset;
                renderEnd = renderStart + res.len;
            }
        } else {
            const offset = Math.round((baseDate - EPOCH) / 86400000);
            renderStart = res.start - offset;
            renderEnd = renderStart + res.len;
        }

        if (renderEnd <= 0 || renderStart >= DAYS) return; // out of view

        // Find available level to avoid overlapping
        if (!roomLevels[roomIdx]) roomLevels[roomIdx] = [];
        let level = 0;
        // Check if there is an overlapping reservation in this level.
        // We use > instead of >= so back-to-back reservations (checkout/checkin on same day) don't overlap vertically
        while (roomLevels[roomIdx][level] !== undefined && roomLevels[roomIdx][level] > renderStart) {
            level++;
        }
        roomLevels[roomIdx][level] = renderEnd;

        const block = document.createElement('div');
        const safeStatus = res.status ? res.status.replace(/[- _]/g, '').toLowerCase() : 'confirmed';
        block.className = `tl-block ${safeStatus}`;
        
        const clipStart = Math.max(0, renderStart);
        const clipEnd = Math.min(DAYS, renderEnd);
        const renderLen = clipEnd - clipStart;

        block.style.position = 'absolute';
        block.style.top = `${8 + (level * 36)}px`;
        block.style.left = `calc(140px + ${clipStart} * ((100% - 140px) / ${DAYS}) + 3px)`;
        block.style.width = `calc(${renderLen} * ((100% - 140px) / ${DAYS}) - 6px)`;
        
        // Adjust row height if multiple levels are used
        const requiredHeight = 52 + (level * 36);
        const currentHeight = parseInt(row.style.height || 52);
        if (currentHeight < requiredHeight) {
            row.style.height = `${requiredHeight}px`;
        }
        
        const isB2B = res.isB2B;
        const isVip = res.isVip || (res.vip && res.vip.toLowerCase().includes('vip'));

        const b2bBadge = isB2B ? `<span style="background:#111827;color:#fff;font-size:0.6rem;padding:2px 4px;border-radius:4px;margin-right:4px;box-shadow:0 1px 2px rgba(0,0,0,0.2)">${res.channel.split(' ')[0]}</span>` : '';
        const vipIcon = isVip ? `<i class="fa-solid fa-crown" style="color:#F59E0B; margin-right:4px; font-size:0.7rem;"></i>` : '';
        block.innerHTML = `<span class="tl-block-text">${b2bBadge}${vipIcon}${res.guest}</span>`;

        block.onclick = () => window.openUnifiedResModal(res.id);
        row.style.position = 'relative';
        row.appendChild(block);
    });

    document.getElementById('kpiConfirmed').textContent = cntConfirmed;
    document.getElementById('kpiCheckedin').textContent = cntCheckedin;
        document.getElementById('kpiCheckout').textContent = cntCheckout;
    document.getElementById('kpiVip').textContent = cntVip;
    if (document.getElementById('kpiB2B')) document.getElementById('kpiB2B').textContent = cntB2B;
}


// ===== GUEST SEARCH (공통 모듈 사용) =====
let _gsWidget = null;

// Guest 섹션 동적 렌더 + 위젯 초기화
(function initGuestSection() {
    const container = document.getElementById('guestSectionTL');
    if (container) {
        container.innerHTML = renderGuestSearchHTML('');
        _gsWidget = initGuestSearch('');
    }
})();



function calcEstimate() {
    const cin = new Date(document.getElementById('nrCheckin').value);
    const cout = new Date(document.getElementById('nrCheckout').value);
    const rate = parseInt(document.getElementById('nrRoomType').value);
    const typeName = document.getElementById('nrRoomType').options[document.getElementById('nrRoomType').selectedIndex].text.split(' —')[0];
    let nights = Math.max(1, Math.round((cout - cin) / 86400000));
    const total = rate * nights;
    document.getElementById('nrEstimate').textContent = `$${total.toLocaleString('en',{minimumFractionDigits:2})}`;
    document.getElementById('nrCalcDetail').textContent = `${typeName} $${rate} × ${nights}박`;
}
function updateDateRangeText() {
    const end = new Date(baseDate);
    end.setDate(end.getDate() + DAYS - 1);
    const m1 = baseDate.getMonth() + 1;
    const d1 = baseDate.getDate();
    const m2 = end.getMonth() + 1;
    const d2 = end.getDate();
    document.getElementById('tlRange').innerText = `${m1}월 ${d1}일 — ${m2}월 ${d2}일`;
}

function shiftWeek(dir) {
    baseDate.setDate(baseDate.getDate() + dir * 7);
    updateDateRangeText();
    buildTimeline();
    buildMobileView();
}
function goToday() {
    baseDate = new Date();
    baseDate.setHours(0,0,0,0);
    updateDateRangeText();
    buildTimeline();
    buildMobileView();
}

// ===== MOBILE MENU =====
function toggleMenu() {
    document.querySelector('.sidebar').classList.toggle('active');
    document.querySelector('.sidebar-overlay').classList.toggle('active');
}

// ===== MOBILE ROOM LIST VIEW =====
function buildMobileView() {
    const container = document.getElementById('tlMobileView');
    const isEn = typeof window.currentLang !== 'undefined' ? window.currentLang === 'en' : false;
    const statusMap = isEn ? 
        {confirmed:'Confirmed',checkedin:'Check-in',vip:'VIP'} : 
        {confirmed:'예약 확정',checkedin:'체크인 완료',vip:'VIP'};
    const colorMap = {confirmed:'#3B82F6',checkedin:'#10B981',vip:'#8B5CF6'};
    const iconMap = {confirmed:'fa-check',checkedin:'fa-right-to-bracket',vip:'fa-crown'};

    let html = '';
    rooms.forEach(room => {
        const offset = Math.round((baseDate - EPOCH) / 86400000);
        const roomRes = reservations.filter(r => r.room === room.id || r.fullRoom === room.id || (room.number && r.room === room.number) || (room.display && r.room === room.display));
        const hasToday = roomRes.some(r => {
            let renderStart, renderEnd;
            if (r.cin && r.cout) {
                try {
                    const cinParts = r.cin.split('/');
                    const coutParts = r.cout.split('/');
                    const rCinDate = new Date(2026, parseInt(cinParts[0])-1, parseInt(cinParts[1]));
                    const rCoutDate = new Date(2026, parseInt(coutParts[0])-1, parseInt(coutParts[1]));
                    renderStart = Math.round((rCinDate - baseDate) / 86400000);
                    renderEnd = Math.round((rCoutDate - baseDate) / 86400000);
                } catch(e) {
                    renderStart = r.start - offset; renderEnd = renderStart + r.len;
                }
            } else {
                renderStart = r.start - offset; renderEnd = renderStart + r.len;
            }
            return renderStart <= 0 && renderEnd > 0;
        });

        html += `<div class="m-room-card ${hasToday ? '' : 'vacant'}">
            <div class="m-room-header">
                <div class="m-room-id">
                    <span class="room-tag">${room.id}</span>
                    <span class="m-room-type">${room.type}</span>
                </div>
                <span class="m-room-status ${hasToday ? 'occupied' : 'available'}">${hasToday ? (isEn?'Occupied':'점유 중') : (isEn?'Available':'공실')}</span>
            </div>`;

        if (roomRes.length > 0) {
            html += '<div class="m-room-bookings">';
            roomRes.forEach(res => {
                const cin = new Date(EPOCH);
                cin.setDate(cin.getDate() + res.start);
                const cout = new Date(cin);
                cout.setDate(cout.getDate() + res.len);
                const color = colorMap[res.status];
                html += `
                <div class="m-booking-item" style="border-left:3px solid ${color}" onclick="window.openUnifiedResModal('${res.id}')">
                    <div class="m-booking-top">
                        <div class="m-booking-guest">
                            <i class="fa-solid ${iconMap[res.status]}" style="color:${color}"></i>
                            <strong>${res.guest}</strong>
                        </div>
                        <span class="status-badge ${res.status === 'checkedin' ? 'checkin' : res.status}">${statusMap[res.status]}</span>
                    </div>
                    <div class="m-booking-meta">
                        ${cin.getMonth()+1}/${cin.getDate()} → ${cout.getMonth()+1}/${cout.getDate()} (${res.len}박) · ${res.channel}
                    </div>
                </div>`;
            });
            html += '</div>';
        }
        html += '</div>';
    });
    container.innerHTML = html;
}
// Timeline will be built after data load
// Removed conflicting local i18n logic
</script>

<script>
document.addEventListener('DOMContentLoaded', async () => {
    try {
        const container = document.querySelector('.tl-container');
        // Visual debug start
        if(container) container.innerHTML += '<div id="debugLog" style="padding:10px;color:red;font-size:12px;">[Debug] Init...</div>';
        
        const log = (msg) => {
            const d = document.getElementById('debugLog');
            if(d) d.innerHTML += `<div>${msg}</div>`;
        };
        
        // Clear cached local storage to ensure fresh fallback data is used
        localStorage.removeItem('pms_rooms');
        localStorage.removeItem('pms_timeline_res');
        // removed init
        
        log('Fetching rooms...');
        const [rmData, resData] = await Promise.all([
            PmsAPI.getAllRooms(),
            PmsAPI.getTimelineReservations()
        ]);
        rooms = rmData;
        window.reservations = resData;
        log(`Fetched ${rooms ? rooms.length : 0} rooms.`);
        log(`Fetched ${reservations ? reservations.length : 0} reservations.`);
        
        log('Building timeline...');
        buildTimeline();
        buildMobileView();
        if(typeof updateDateRangeText === 'function') updateDateRangeText();
        log('Timeline built.');
        
        log('Building mobile view...');
        buildMobileView();
        log('Mobile view built.');
        
        // Remove debug if successful
        const d = document.getElementById('debugLog');
        if(d) d.remove();

        if (typeof window.changeLang === 'function') {
            window.changeLang(document.getElementById('langSelect')?.value || 'ko');
        }
    } catch(e) { 
        console.error(e); 
        const container = document.querySelector('.tl-container');
        if(container) {
            container.innerHTML = `<div style="padding:20px;color:red;font-weight:bold;background:#fee2e2;border:1px solid #ef4444;border-radius:8px;">
                <h3>JS Execution Error in timeline.html</h3>
                <p>${e.message}</p>
                <pre style="font-size:10px;margin-top:10px;white-space:pre-wrap;">${e.stack}</pre>
            </div>`;
        }
    }
});
</script>
<script>
// Sync language selector to stored preference
(function(){
    var sel = document.getElementById('langSelect');
    if(sel) sel.value = localStorage.getItem('pms_lang') || 'ko';
})();
</script>
</body>
