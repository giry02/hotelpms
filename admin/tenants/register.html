<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>신규 입점 등록 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-sidebar.js"></script>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<a class="btn-outline btn-sm" href="list.html" style="margin-right:8px; border:none; box-shadow:none; padding:4px 8px" title="뒤로 가기"><i class="fa-solid fa-arrow-left"></i></a>
<h1>신규 입점 등록</h1>
</div>
<div class="topbar-right">
<select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px">
<option value="ko">한국어</option>
<option value="en">English</option>
</select>
</div>
</header>
<div class="content">
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-building"></i> <span>호텔 기본 정보</span></h3></div>
<div class="config-panel-body">
<div class="grid-2">
<div class="form-group"><label class="form-label">호텔명</label><input class="form-control" placeholder="예: Seoul Tower Hotel" type="text"/></div>
<div class="form-group"><label class="form-label">국가/도시</label>
<div style="display:flex;gap:8px">
<select class="form-control" style="flex:1"><option>Vietnam</option><option>South Korea</option><option>Thailand</option></select>
<input class="form-control" placeholder="City" style="flex:1" type="text"/>
</div>
</div>
<div class="form-group"><label class="form-label">타임존</label><select class="form-control"><option>Asia/Ho_Chi_Minh (UTC+7)</option><option>Asia/Seoul (UTC+9)</option><option>Asia/Bangkok (UTC+7)</option></select></div>
<div class="form-group"><label class="form-label" data-i18n="common.currency">Currency</label><select class="form-control"><option selected>PHP (₱)</option><option>VND</option><option>THB</option><option>JPY</option></select></div>
<div class="form-group"><label class="form-label">객실 수</label><input class="form-control" placeholder="0" type="number"/></div>
<div class="form-group"><label class="form-label">대표 이메일</label><input class="form-control" placeholder="admin@hotel.com" type="email"/></div>
</div>
</div>
</div>
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-file-contract"></i> <span>계약 정보</span></h3></div>
<div class="config-panel-body">
<div class="grid-2">
<div class="form-group"><label class="form-label">플랜</label><select class="form-control"><option>Free (무료 체험)</option><option>Standard ($99/월)</option><option>Premium ($299/월)</option></select></div>
<div class="form-group"><label class="form-label">계약 기간</label>
<div style="display:flex;gap:8px;align-items:center"><input class="form-control" style="flex:1" type="date"/> <span>~</span> <input class="form-control" style="flex:1" type="date"/></div>
</div>
</div>
</div>
</div>
<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
<a class="btn-outline" href="list.html">취소</a>
<button class="btn-primary" onclick="alert('등록 완료! Hotel ID가 발급되었습니다.')"><i class="fa-solid fa-check"></i> <span>등록하기</span></button>
</div>
</div>
</div>
</body>
</html>
