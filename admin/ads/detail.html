<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>캠페인 상세 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/><link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><a class="btn-outline btn-sm" href="campaigns.html" style="margin-right:8px; border:none; box-shadow:none; padding:4px 8px" title="뒤로 가기"><i class="fa-solid fa-arrow-left"></i></a><h1> Vietnam Golf Tour</h1><span class="status-badge active" style="margin-left:8px">진행 중</span></div>
<div class="topbar-right">
<a class="btn-outline" href="targeting.html"><i class="fa-solid fa-crosshairs"></i> <span>타겟팅 설정</span></a>
<select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px"><option value="ko">한국어</option><option value="en"> English</option></select>
</div>
</header>
<div class="content">
<div class="kpi-grid">
<div class="kpi-card indigo"><div class="kpi-icon"><i class="fa-solid fa-eye"></i></div><div class="kpi-body"><div class="kpi-value">245.8K</div><div class="kpi-label">총 노출수</div></div></div>
<div class="kpi-card green"><div class="kpi-icon"><i class="fa-solid fa-mouse-pointer"></i></div><div class="kpi-body"><div class="kpi-value">9,340</div><div class="kpi-label">클릭수</div></div></div>
<div class="kpi-card orange"><div class="kpi-icon"><i class="fa-solid fa-percent"></i></div><div class="kpi-body"><div class="kpi-value">3.8%</div><div class="kpi-label">CTR</div></div></div>
<div class="kpi-card purple"><div class="kpi-icon"><i class="fa-solid fa-dollar-sign"></i></div><div class="kpi-body"><div class="kpi-value">$4,203</div><div class="kpi-label">청구액</div></div></div>
</div>
<!-- 노출/클릭 차트 -->
<div class="card">
<div class="card-header"><div class="card-title"><i class="fa-solid fa-chart-line"></i> 노출 / 클릭 추이</div></div>
<div class="card-body">
<div style="display:flex;align-items:flex-end;gap:6px;height:180px">
<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center"><div style="background:var(--primary);border-radius:3px 3px 0 0;width:100%;height:60px"></div><div style="background:var(--success);border-radius:3px 3px 0 0;width:60%;height:20px"></div></div><span style="font-size:.65rem;color:var(--txt3)">W1</span></div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center"><div style="background:var(--primary);border-radius:3px 3px 0 0;width:100%;height:80px"></div><div style="background:var(--success);border-radius:3px 3px 0 0;width:60%;height:28px"></div></div><span style="font-size:.65rem;color:var(--txt3)">W2</span></div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center"><div style="background:var(--primary);border-radius:3px 3px 0 0;width:100%;height:100px"></div><div style="background:var(--success);border-radius:3px 3px 0 0;width:60%;height:36px"></div></div><span style="font-size:.65rem;color:var(--txt3)">W3</span></div>
<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px"><div style="width:100%;display:flex;flex-direction:column;gap:2px;align-items:center"><div style="background:var(--primary);border-radius:3px 3px 0 0;width:100%;height:120px"></div><div style="background:var(--success);border-radius:3px 3px 0 0;width:60%;height:45px"></div></div><span style="font-size:.65rem;color:var(--txt3)">W4</span></div>
</div>
<div style="display:flex;gap:16px;justify-content:center;margin-top:12px">
<span style="font-size:.72rem;display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--primary);border-radius:2px"></span> 노출수</span>
<span style="font-size:.72rem;display:flex;align-items:center;gap:4px"><span style="width:10px;height:10px;background:var(--success);border-radius:2px"></span> 클릭수</span>
</div>
</div>
</div>
<div class="grid-2">
<!-- 캠페인 상세 정보 -->
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-info-circle"></i> 캠페인 상세 정보</h3></div>
<div class="config-panel-body">
<div class="config-row"><div class="config-label"><div class="cl-title">광고주</div></div><span>VN Golf Corp</span></div>
<div class="config-row"><div class="config-label"><div class="cl-title">과금 방식</div></div><span>CPC (클릭당 $0.45)</span></div>
<div class="config-row"><div class="config-label"><div class="cl-title">계약 기간</div></div><span>2026.05.01 ~ 2026.06.30</span></div>
<div class="config-row"><div class="config-label"><div class="cl-title">랜딩 URL</div></div><span style="font-size:.78rem;color:var(--primary)">https://vngolf.com/tour</span></div>
</div>
</div>
<!-- 광고 배너 소재 -->
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-image"></i> 광고 배너 소재</h3><button class="btn-outline btn-sm"><i class="fa-solid fa-pen"></i> <span>수정</span></button></div>
<div class="config-panel-body">
<div style="background:linear-gradient(135deg,#065F46,#10B981);border-radius:var(--radius-sm);padding:20px;color:#fff;text-align:center">
<div style="font-size:1.1rem;font-weight:800;margin-bottom:4px"> Vietnam Golf Tour 2026</div>
<div style="font-size:.78rem;opacity:.8">리조트 골프 패키지 $199부터</div>
<div style="margin-top:10px;background:rgba(255,255,255,.2);display:inline-block;padding:6px 16px;border-radius:20px;font-size:.75rem;font-weight:600">예약하기</div>
</div>
<div style="font-size:.72rem;color:var(--txt3);margin-top:8px;text-align:center">728 x 90 배너 (한국어 버전)</div>
</div>
</div>
</div>
</div>
</div>
<script>
document.addEventListener('DOMContentLoaded', () => {
    const editButton = document.querySelector('.config-panel-header .btn-outline.btn-sm');
    if (editButton) {
        editButton.addEventListener('click', () => alert('광고 소재 수정 화면을 준비했습니다.'));
    }
});
</script>
</body>
</html>
