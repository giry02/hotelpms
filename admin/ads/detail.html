<!DOCTYPE html>
<html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>&#52896;&#54168;&#51064; &#49345;&#49464; - Super Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/><link rel="stylesheet" href="../common/css/admin-base.css"/><link rel="stylesheet" href="../common/css/admin-pages.css"/>
<script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script><script src="../common/js/admin-i18n.js"></script>
<style>.detail-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}.detail-field{border:1px solid var(--line);border-radius:8px;padding:12px}.detail-field label{display:block;color:var(--txt3);font-size:.75rem;margin-bottom:5px}.detail-field strong{word-break:break-word}.creative-view{min-height:220px;border:1px solid var(--line);border-radius:8px;background:#f8fafc;display:grid;place-items:center;overflow:hidden}.creative-view img{width:100%;height:100%;max-height:340px;object-fit:cover}.detail-error{padding:48px;text-align:center;color:var(--danger)}.content-copy{white-space:pre-wrap;line-height:1.7}.detail-actions{display:flex;gap:8px;flex-wrap:wrap}@media(max-width:760px){.detail-grid{grid-template-columns:1fr}.creative-view{min-height:160px}}</style>
</head><body><div class="main"><header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><a class="btn-outline btn-sm" href="campaigns.html" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></a><h1 id="detailTitle" data-ko="&#52896;&#54168;&#51064; &#49345;&#49464;" data-en="Campaign Details">&#52896;&#54168;&#51064; &#49345;&#49464;</h1><span class="status-badge" id="detailStatus"></span></div><div class="topbar-right"><a class="btn-outline" id="targetingLink" href="targeting.html"><i class="fa-solid fa-crosshairs"></i> <span data-ko="&#53440;&#44191; &#49444;&#51221;" data-en="Targeting">&#53440;&#44191; &#49444;&#51221;</span></a><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">KR &#54620;&#44397;&#50612;</option><option value="en">EN English</option></select></div></header><div class="content" id="detailContent"></div></div>
<div class="modal-overlay" id="editModal"><div class="modal-card" style="width:650px;max-width:94vw"><div class="modal-header"><h3 class="modal-title" data-ko="&#52896;&#54168;&#51064; &#49688;&#51221;" data-en="Edit Campaign">&#52896;&#54168;&#51064; &#49688;&#51221;</h3><button class="modal-close" id="closeEditButton" type="button"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="grid-2"><div class="form-group"><label class="form-label" data-ko="&#52896;&#54168;&#51064;&#47749;" data-en="Campaign Name">&#52896;&#54168;&#51064;&#47749;</label><input class="form-control" id="editName"/></div><div class="form-group"><label class="form-label" data-ko="&#49345;&#53468;" data-en="Status">&#49345;&#53468;</label><select class="form-control" id="editStatus"><option value="draft">Draft</option><option value="scheduled">Scheduled</option><option value="active">Active</option><option value="paused">Paused</option><option value="ended">Ended</option></select></div><div class="form-group"><label class="form-label" data-ko="&#49884;&#51089;&#51068;" data-en="Start Date">&#49884;&#51089;&#51068;</label><input class="form-control" id="editStart" type="date"/></div><div class="form-group"><label class="form-label" data-ko="&#51333;&#47308;&#51068;" data-en="End Date">&#51333;&#47308;&#51068;</label><input class="form-control" id="editEnd" type="date"/></div></div><div class="form-group"><label class="form-label" data-ko="&#49345;&#49464; &#45236;&#50857;" data-en="Details">&#49345;&#49464; &#45236;&#50857;</label><textarea class="form-control" id="editBody" rows="6"></textarea></div></div><div class="modal-footer"><button class="btn-outline" id="cancelEditButton" type="button" data-ko="&#52712;&#49548;" data-en="Cancel">&#52712;&#49548;</button><button class="btn-primary" id="saveEditButton" type="button" data-ko="&#51200;&#51109;" data-en="Save">&#51200;&#51109;</button></div></div></div>
<script>
const queryId=new URLSearchParams(location.search).get('id');let campaign=null;const lang=()=>window.currentLang||localStorage.getItem('pms_admin_lang')||'ko';const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function rows(){return AdminStore.read('adCampaigns',window.AdminData?.adCampaigns||[])}function statusLabel(value){const en=lang()==='en';return ({active:en?'Active':'\uC9C4\uD589 \uC911',scheduled:en?'Scheduled':'\uC608\uC815',paused:en?'Paused':'\uC911\uC9C0',draft:en?'Draft':'\uC784\uC2DC \uC800\uC7A5',ended:en?'Ended':'\uC885\uB8CC',archived:en?'Archived':'\uBCF4\uAD00'})[value]||value}function typeLabel(value){const en=lang()==='en';return ({golf:en?'Golf':'\uACE8\uD504\uC7A5',rentacar:en?'Rent-a-car':'\uB80C\uD130\uCE74',restaurant:en?'Restaurant':'\uC74C\uC2DD\uC810',other:en?'Other':'\uAE30\uD0C0'})[String(value||'other').toLowerCase()]}
function render(){campaign=rows().find(row=>String(row.id)===String(queryId));const root=document.getElementById('detailContent');if(!queryId||!campaign){document.getElementById('detailStatus').textContent='';root.innerHTML=`<section class="card"><div class="detail-error"><i class="fa-solid fa-triangle-exclamation"></i><p>${lang()==='en'?'The requested campaign was not found. Return to the list and select it again.':'\uC694\uCCAD\uD55C \uCEA0\uD398\uC778\uC744 \uCC3E\uC744 \uC218 \uC5C6\uC2B5\uB2C8\uB2E4. \uBAA9\uB85D\uC5D0\uC11C \uB2E4\uC2DC \uC120\uD0DD\uD558\uC138\uC694.'}</p><a class="btn-primary" href="campaigns.html">${lang()==='en'?'Back to Campaigns':'\uCEA0\uD398\uC778 \uBAA9\uB85D'}</a></div></section>`;return}document.getElementById('detailTitle').textContent=campaign.name||campaign.nameEn||campaign.id;document.getElementById('detailStatus').textContent=statusLabel(campaign.status);document.getElementById('detailStatus').className=`status-badge ${campaign.status==='active'?'active':campaign.status==='ended'?'inactive':'pending'}`;document.getElementById('targetingLink').href=`targeting.html?id=${encodeURIComponent(campaign.id)}`;const metrics={views:Number(campaign.views??campaign.metrics?.detailViews??0),leads:Number(campaign.leads??campaign.metrics?.contractLeads??0)},image=campaign.imageUrl||campaign.bannerUrl||campaign.creativeUrl||'';root.innerHTML=`<div class="kpi-grid"><div class="kpi-card indigo"><div class="kpi-body"><div class="kpi-value">${metrics.views.toLocaleString()}</div><div class="kpi-label">${lang()==='en'?'Detail Views':'\uC0C1\uC138 \uC870\uD68C'}</div></div></div><div class="kpi-card green"><div class="kpi-body"><div class="kpi-value">${metrics.leads.toLocaleString()}</div><div class="kpi-label">${lang()==='en'?'Contract Leads':'\uACC4\uC57D \uBB38\uC758'}</div></div></div><div class="kpi-card orange"><div class="kpi-body"><div class="kpi-value">${esc(campaign.currency||'PHP')} ${Number(campaign.budget||0).toLocaleString()}</div><div class="kpi-label">${lang()==='en'?'Budget':'\uC608\uC0B0'}</div></div></div></div><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-circle-info"></i> ${lang()==='en'?'Campaign Information':'\uCEA0\uD398\uC778 \uC815\uBCF4'}</div><div class="detail-actions"><button class="btn-primary" id="editCampaignButton" type="button"><i class="fa-solid fa-pen"></i> ${lang()==='en'?'Edit':'\uC218\uC815'}</button></div></div><div class="card-body"><div class="detail-grid"><div class="detail-field"><label>${lang()==='en'?'Campaign ID':'\uCEA0\uD398\uC778 ID'}</label><strong>${esc(campaign.id)}</strong></div><div class="detail-field"><label>${lang()==='en'?'Advertiser':'\uAD11\uACE0\uC8FC'}</label><strong>${esc(campaign.advertiser||campaign.advertiserEn||'-')}</strong></div><div class="detail-field"><label>${lang()==='en'?'Service':'\uC11C\uBE44\uC2A4'}</label><strong>${typeLabel(campaign.type||campaign.serviceArea)}</strong></div><div class="detail-field"><label>${lang()==='en'?'Placement':'\uB178\uCD9C \uC704\uCE58'}</label><strong>${esc(campaign.placement||'-')}</strong></div><div class="detail-field"><label>${lang()==='en'?'Period':'\uAE30\uAC04'}</label><strong>${esc(campaign.startDate||campaign.period?.start||'-')} ~ ${esc(campaign.endDate||campaign.period?.end||'-')}</strong></div><div class="detail-field"><label>${lang()==='en'?'Manager / Contact':'\uB2F4\uB2F9\uC790 / \uC5F0\uB77D\uCC98'}</label><strong>${esc(campaign.manager||'-')} / ${esc(campaign.phone||'-')}</strong></div></div></div></section><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-image"></i> ${lang()==='en'?'Creative and Details':'\uAD11\uACE0 \uC774\uBBF8\uC9C0\uC640 \uC0C1\uC138 \uB0B4\uC6A9'}</div></div><div class="card-body"><div class="creative-view" id="creativeView">${image?`<img src="${esc(image)}" alt="" onerror="this.parentElement.textContent='${lang()==='en'?'Image unavailable':'\uC774\uBBF8\uC9C0\uB97C \uBD88\uB7EC\uC62C \uC218 \uC5C6\uC2B5\uB2C8\uB2E4.'}"/>`:`<span>${lang()==='en'?'No image registered.':'\uB4F1\uB85D\uB41C \uC774\uBBF8\uC9C0\uAC00 \uC5C6\uC2B5\uB2C8\uB2E4.'}</span>`}</div><p class="content-copy">${esc(campaign.details||campaign.description||campaign.content||'-')}</p></div></section>`;document.getElementById('editCampaignButton').onclick=openEdit}
function openEdit(){document.getElementById('editName').value=campaign.name||campaign.nameEn||'';document.getElementById('editStatus').value=campaign.status||'draft';document.getElementById('editStart').value=campaign.startDate||campaign.period?.start||'';document.getElementById('editEnd').value=campaign.endDate||campaign.period?.end||'';document.getElementById('editBody').value=campaign.details||campaign.description||campaign.content||'';document.getElementById('editModal').classList.add('active')}
function closeEdit(){document.getElementById('editModal').classList.remove('active')}
function saveEdit(){const start=document.getElementById('editStart').value,end=document.getElementById('editEnd').value,name=document.getElementById('editName').value.trim();if(!name||!start||!end||start>end)return false;const all=rows(),index=all.findIndex(row=>String(row.id)===String(queryId)),before=all[index];all[index]={...before,name,status:document.getElementById('editStatus').value,startDate:start,endDate:end,details:document.getElementById('editBody').value,updatedAt:new Date().toISOString()};AdminStore.write('adCampaigns',all);AdminStore.audit('campaign.update',queryId,JSON.stringify({before,after:all[index]}),'Medium');closeEdit();render();return true}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('closeEditButton').onclick=closeEdit;document.getElementById('cancelEditButton').onclick=closeEdit;document.getElementById('saveEditButton').onclick=saveEdit;render()});window.addEventListener('AdminStoreChanged',event=>{if(event.detail.key==='adCampaigns')render()});window.applyLocalI18n=function(value){document.documentElement.lang=value;document.querySelectorAll('[data-ko][data-en]').forEach(el=>el.textContent=el.getAttribute(value==='en'?'data-en':'data-ko'));render()};
</script></body></html>
