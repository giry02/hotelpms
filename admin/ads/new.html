<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>캠페인 등록 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/><link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><a class="btn-outline btn-sm" href="campaigns.html" style="margin-right:8px; border:none; box-shadow:none; padding:4px 8px" title="뒤로 가기"><i class="fa-solid fa-arrow-left"></i></a><h1>캠페인 등록</h1></div>
<div class="topbar-right"><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px"><option value="ko">한국어</option><option value="en"> English</option></select></div>
</header>
<div class="content">
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-rectangle-ad"></i> 캠페인 기본 정보</h3></div>
<div class="config-panel-body">
<div class="grid-2">
<div class="form-group"><label class="form-label">캠페인명</label><input class="form-control" placeholder="예: 여름 프로모션 캠페인" type="text"/></div>
<div class="form-group"><label class="form-label">광고주</label><input class="form-control" placeholder="예: 사이공 골프 클럽" type="text"/></div>
<div class="form-group"><label class="form-label">서비스 영역</label><select class="form-control"><option>골프장</option><option>렌터카</option><option>통합 POS</option><option>지역 이벤트</option><option>외부 제휴</option></select></div>
<div class="form-group"><label class="form-label">노출 위치</label><select class="form-control"><option>대시보드 배너</option><option>골프 예약 추천</option><option>렌터카 예약 추천</option><option>통합 POS 추천</option><option>대시보드 배너 + 예약 추천</option></select></div>
<div class="form-group"><label class="form-label">단가/방식</label><select class="form-control"><option>CPM (노출당)</option><option>CPC (클릭당)</option></select></div>
<div class="form-group"><label class="form-label">단가 (USD)</label><input class="form-control" placeholder="0.00" step="0.01" type="number"/></div>
<div class="form-group"><label class="form-label">시작일</label><input class="form-control" type="date"/></div>
<div class="form-group"><label class="form-label">종료일</label><input class="form-control" type="date"/></div>
<div class="form-group" style="grid-column:1/-1"><label class="form-label">랜딩 URL</label><input class="form-control" placeholder="https://advertiser.com/landing" type="url"/></div>
</div>
</div>
</div>
<div class="config-panel">
<div class="config-panel-header"><h3><i class="fa-solid fa-image"></i> 광고 배너 업로드</h3></div>
<div class="config-panel-body">
<div class="grid-3">
<div class="form-group">
<label class="form-label">한국어 배너</label>
<div style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 16px;text-align:center;color:var(--txt3);cursor:pointer">
<i class="fa-solid fa-cloud-arrow-up" style="font-size:1.5rem;margin-bottom:8px;display:block"></i>
<span style="font-size:.78rem">728x90 or 300x250</span>
</div>
</div>
<div class="form-group">
<label class="form-label">영어 배너</label>
<div style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 16px;text-align:center;color:var(--txt3);cursor:pointer">
<i class="fa-solid fa-cloud-arrow-up" style="font-size:1.5rem;margin-bottom:8px;display:block"></i>
<span style="font-size:.78rem">728x90 or 300x250</span>
</div>
</div>
<div class="form-group">
<label class="form-label">일본어 배너</label>
<div style="border:2px dashed var(--border);border-radius:var(--radius-sm);padding:32px 16px;text-align:center;color:var(--txt3);cursor:pointer">
<i class="fa-solid fa-cloud-arrow-up" style="font-size:1.5rem;margin-bottom:8px;display:block"></i>
<span style="font-size:.78rem">728x90 or 300x250</span>
</div>
</div>
</div>
</div>
</div>
<div style="display:flex;justify-content:flex-end;gap:10px;margin-top:8px">
<a class="btn-outline" href="campaigns.html">취소</a>
<button class="btn-primary" onclick="alert('캠페인이 등록되었습니다.'); window.location.href='campaigns.html'"><i class="fa-solid fa-check"></i> <span>저장</span></button>
</div>
</div>
</div>
</body>
</html>
