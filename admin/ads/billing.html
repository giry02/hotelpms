<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>&#44305;&#44256; &#52397;&#44396; - Super Admin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/><link rel="stylesheet" href="../common/css/admin-base.css"/><link rel="stylesheet" href="../common/css/admin-pages.css"/><script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script><script src="../common/js/admin-i18n.js"></script><style>.bill-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.bill-tools .form-control{width:auto;min-width:150px}.money-lines{display:flex;flex-direction:column;gap:3px}.bill-actions{display:flex;gap:5px;flex-wrap:wrap}.empty-row{text-align:center;padding:34px;color:var(--txt3)}@media(max-width:760px){.bill-tools>*{flex:1 1 140px}.table-wrap{overflow-x:auto}}</style></head><body><div class="main"><header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><h1 data-ko="&#44305;&#44256; &#52397;&#44396;" data-en="Ad Billing">&#44305;&#44256; &#52397;&#44396;</h1></div><div class="topbar-right"><button class="btn-primary" id="openBillButton" type="button"><i class="fa-solid fa-plus"></i> <span data-ko="&#52397;&#44396; &#49373;&#49457;" data-en="Create Bill">&#52397;&#44396; &#49373;&#49457;</span></button><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">KR &#54620;&#44397;&#50612;</option><option value="en">EN English</option></select></div></header><div class="content"><div class="kpi-grid"><div class="kpi-card indigo"><div class="kpi-body"><div class="kpi-value money-lines" id="billingTotal"></div><div class="kpi-label" data-ko="&#52509; &#52397;&#44396;" data-en="Total Billing">&#52509; &#52397;&#44396;</div></div></div><div class="kpi-card green"><div class="kpi-body"><div class="kpi-value money-lines" id="billingSettled"></div><div class="kpi-label" data-ko="&#49688;&#45225; &#50756;&#47308;" data-en="Settled">&#49688;&#45225; &#50756;&#47308;</div></div></div><div class="kpi-card orange"><div class="kpi-body"><div class="kpi-value money-lines" id="billingPending"></div><div class="kpi-label" data-ko="&#48120;&#49688;" data-en="Pending">&#48120;&#49688;</div></div></div></div><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-list"></i> <span data-ko="&#44305;&#44256; &#52397;&#44396; &#45236;&#50669;" data-en="Ad Billing Items">&#44305;&#44256; &#52397;&#44396; &#45236;&#50669;</span></div><div class="bill-tools"><input class="form-control" id="billSearch" data-ko-placeholder="&#52896;&#54168;&#51064;, &#44305;&#44256;&#51452; &#44160;&#49353;" data-en-placeholder="Search campaign or advertiser" placeholder="&#52896;&#54168;&#51064;, &#44305;&#44256;&#51452; &#44160;&#49353;"/><select class="form-control" id="billStatus"><option value="all" data-ko="&#51204;&#52404; &#49345;&#53468;" data-en="All Statuses">&#51204;&#52404; &#49345;&#53468;</option><option value="pending" data-ko="&#48120;&#49688;" data-en="Pending">&#48120;&#49688;</option><option value="settled" data-ko="&#49688;&#45225; &#50756;&#47308;" data-en="Settled">&#49688;&#45225; &#50756;&#47308;</option><option value="refunded" data-ko="&#54872;&#48520;" data-en="Refunded">&#54872;&#48520;</option><option value="cancelled" data-ko="&#52712;&#49548;" data-en="Cancelled">&#52712;&#49548;</option></select><button class="btn-outline" id="downloadBillsButton" type="button"><i class="fa-solid fa-download"></i> <span data-ko="&#45796;&#50868;&#47196;&#46300;" data-en="Download">&#45796;&#50868;&#47196;&#46300;</span></button></div></div><div class="card-body"><div class="table-wrap"><table><thead><tr><th data-ko="&#52896;&#54168;&#51064;" data-en="Campaign">&#52896;&#54168;&#51064;</th><th data-ko="&#44305;&#44256;&#51452;" data-en="Advertiser">&#44305;&#44256;&#51452;</th><th data-ko="&#52397;&#44396; &#44592;&#44036;" data-en="Billing Period">&#52397;&#44396; &#44592;&#44036;</th><th data-ko="&#53685;&#54868;" data-en="Currency">&#53685;&#54868;</th><th data-ko="&#44552;&#50529; / &#51092;&#50529;" data-en="Amount / Balance">&#44552;&#50529; / &#51092;&#50529;</th><th data-ko="&#49345;&#53468;" data-en="Status">&#49345;&#53468;</th><th data-ko="&#44288;&#47532;" data-en="Actions">&#44288;&#47532;</th></tr></thead><tbody id="adBillBody"></tbody></table></div></div></section></div></div>
<div class="modal-overlay" id="billModal"><div class="modal-card" style="width:520px;max-width:94vw"><div class="modal-header"><h3 class="modal-title" data-ko="&#44305;&#44256; &#52397;&#44396; &#49373;&#49457;" data-en="Create Ad Bill">&#44305;&#44256; &#52397;&#44396; &#49373;&#49457;</h3><button class="modal-close" id="closeBillButton" type="button"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label" data-ko="&#52896;&#54168;&#51064;" data-en="Campaign">&#52896;&#54168;&#51064;</label><select class="form-control" id="billCampaign"></select></div><div class="grid-2"><div class="form-group"><label class="form-label" data-ko="&#49884;&#51089;&#51068;" data-en="Start Date">&#49884;&#51089;&#51068;</label><input class="form-control" id="billStart" type="date" required/></div><div class="form-group"><label class="form-label" data-ko="&#51333;&#47308;&#51068;" data-en="End Date">&#51333;&#47308;&#51068;</label><input class="form-control" id="billEnd" type="date" required/></div><div class="form-group"><label class="form-label" data-ko="&#44552;&#50529;" data-en="Amount">&#44552;&#50529;</label><input class="form-control" id="billAmount" type="number" min="0.01" step="0.01" required/></div><div class="form-group"><label class="form-label" data-ko="&#53685;&#54868;" data-en="Currency">&#53685;&#54868;</label><select class="form-control" id="billCurrency"><option>PHP</option><option>USD</option><option>KRW</option><option>VND</option></select></div></div></div><div class="modal-footer"><button class="btn-outline" id="cancelBillButton" type="button" data-ko="&#52712;&#49548;" data-en="Cancel">&#52712;&#49548;</button><button class="btn-primary" id="saveBillButton" type="button" data-ko="&#51200;&#51109;" data-en="Save">&#51200;&#51109;</button></div></div></div>
<script>
let campaignRows=[];const lang=()=>window.currentLang||localStorage.getItem('pms_admin_lang')||'ko';const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const money=(amount,currency)=>new Intl.NumberFormat('en-US',{style:'currency',currency:currency||'PHP',maximumFractionDigits:2}).format(Number(amount)||0);function bills(){return AdminStore.read('adBilling',[])}function balance(row){return Math.max(0,Number(row.amount||0)-Number(row.paid||0)+Number(row.refunded||0))}function totals(rows){return rows.reduce((map,row)=>{if(row.status!=='cancelled')map[row.currency]=(map[row.currency]||0)+Number(row.amount||0);return map},{})}function displayTotals(element,map){element.innerHTML=Object.keys(map).length?Object.entries(map).map(([currency,value])=>`<span>${esc(currency)} ${esc(money(value,currency))}</span>`).join(''):'<span>0</span>'}function statusLabel(value){const en=lang()==='en';return ({pending:en?'Pending':'\uBBF8\uC218',settled:en?'Settled':'\uC218\uB0A9 \uC644\uB8CC',refunded:en?'Refunded':'\uD658\uBD88',cancelled:en?'Cancelled':'\uCDE8\uC18C'})[value]||value}
function filtered(){const query=document.getElementById('billSearch').value.trim().toLowerCase(),status=document.getElementById('billStatus').value;return bills().filter(row=>(status==='all'||row.status===status)&&(!query||`${row.campaignName||''} ${row.advertiser||''}`.toLowerCase().includes(query)))}
function render(){const all=bills(),rows=filtered();displayTotals(document.getElementById('billingTotal'),totals(all));displayTotals(document.getElementById('billingSettled'),totals(all.filter(row=>row.status==='settled')));const pending={};all.filter(row=>row.status==='pending').forEach(row=>pending[row.currency]=(pending[row.currency]||0)+balance(row));displayTotals(document.getElementById('billingPending'),pending);document.getElementById('adBillBody').innerHTML=rows.length?rows.map(row=>`<tr data-bill-id="${esc(row.id)}"><td><strong>${esc(row.campaignName)}</strong><div>${esc(row.campaignId)}</div></td><td>${esc(row.advertiser||'-')}</td><td>${esc(row.startDate)} ~ ${esc(row.endDate)}</td><td>${esc(row.currency)}</td><td><strong>${esc(money(row.amount,row.currency))}</strong><div>${lang()==='en'?'Balance':'\uC794\uC561'} ${esc(money(balance(row),row.currency))}</div></td><td><span class="status-badge ${row.status==='settled'?'active':row.status==='cancelled'?'inactive':'pending'}">${statusLabel(row.status)}</span></td><td><div class="bill-actions">${row.status==='pending'?`<button class="btn-primary btn-sm settle-bill" data-id="${esc(row.id)}" type="button">${lang()==='en'?'Receive':'\uC218\uB0A9'}</button><button class="btn-outline btn-sm cancel-bill" data-id="${esc(row.id)}" type="button">${lang()==='en'?'Cancel':'\uCDE8\uC18C'}</button>`:''}${row.status==='settled'?`<button class="btn-outline btn-sm refund-bill" data-id="${esc(row.id)}" type="button">${lang()==='en'?'Refund':'\uD658\uBD88'}</button>`:''}</div></td></tr>`).join(''):`<tr><td colspan="7" class="empty-row">${lang()==='en'?'No billing records.':'\uCCAD\uAD6C \uB0B4\uC5ED\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.'}</td></tr>`;bindRows()}
function openBill(){campaignRows=AdminStore.read('adCampaigns',window.AdminData?.adCampaigns||[]);document.getElementById('billCampaign').innerHTML=campaignRows.map(row=>`<option value="${esc(row.id)}">${esc(row.name||row.nameEn||row.id)} (${esc(row.id)})</option>`).join('');document.getElementById('billModal').classList.add('active')}function closeBill(){document.getElementById('billModal').classList.remove('active')}
function saveBill(){const campaignId=document.getElementById('billCampaign').value,start=document.getElementById('billStart').value,end=document.getElementById('billEnd').value,amount=Number(document.getElementById('billAmount').value),currency=document.getElementById('billCurrency').value,campaign=campaignRows.find(row=>String(row.id)===campaignId);if(!campaign||!start||!end||start>end||!Number.isFinite(amount)||amount<=0)return false;const rows=bills();if(rows.some(row=>String(row.campaignId)===campaignId&&row.startDate===start&&row.endDate===end&&row.status!=='cancelled'))return false;const item={id:`ADB-${Date.now()}`,campaignId,campaignName:campaign.name||campaign.nameEn||campaign.id,advertiser:campaign.advertiser||campaign.advertiserEn||'',startDate:start,endDate:end,amount,paid:0,refunded:0,currency,status:'pending',history:[],createdAt:new Date().toISOString()};AdminStore.write('adBilling',[item,...rows]);AdminStore.audit('ad_billing.create',item.id,JSON.stringify({before:null,after:item}),'Medium');closeBill();render();return true}
function mutate(id,action){const rows=bills(),index=rows.findIndex(row=>String(row.id)===String(id));if(index<0)return false;const before={...rows[index]},now=new Date().toISOString();if(action==='settle'){rows[index].paid=Number(rows[index].amount);rows[index].status='settled'}if(action==='refund'){rows[index].refunded=Number(rows[index].paid||rows[index].amount);rows[index].status='refunded'}if(action==='cancel'){rows[index].status='cancelled'}rows[index].history=[...(rows[index].history||[]),{action,at:now,amount:rows[index].amount,currency:rows[index].currency}];rows[index].updatedAt=now;AdminStore.write('adBilling',rows);AdminStore.audit(`ad_billing.${action}`,id,JSON.stringify({before,after:rows[index]}),'High');render();return true}
function bindRows(){document.querySelectorAll('.settle-bill').forEach(button=>button.onclick=()=>mutate(button.dataset.id,'settle'));document.querySelectorAll('.refund-bill').forEach(button=>button.onclick=()=>mutate(button.dataset.id,'refund'));document.querySelectorAll('.cancel-bill').forEach(button=>button.onclick=()=>mutate(button.dataset.id,'cancel'))}
function downloadBills(){const rows=filtered(),csv=['campaign,advertiser,start,end,currency,amount,balance,status',...rows.map(row=>[row.campaignName,row.advertiser,row.startDate,row.endDate,row.currency,row.amount,balance(row),row.status].map(value=>`"${String(value??'').replace(/"/g,'""')}"`).join(','))].join('\n');const link=document.createElement('a');link.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8'}));link.download='ad-billing.csv';link.click();URL.revokeObjectURL(link.href)}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('openBillButton').onclick=openBill;document.getElementById('closeBillButton').onclick=closeBill;document.getElementById('cancelBillButton').onclick=closeBill;document.getElementById('saveBillButton').onclick=saveBill;document.getElementById('downloadBillsButton').onclick=downloadBills;document.getElementById('billSearch').oninput=render;document.getElementById('billStatus').onchange=render;render()});window.addEventListener('AdminStoreChanged',event=>{if(event.detail.key==='adBilling')render()});window.applyLocalI18n=function(value){document.documentElement.lang=value;document.querySelectorAll('[data-ko][data-en]').forEach(el=>el.textContent=el.getAttribute(value==='en'?'data-en':'data-ko'));document.querySelectorAll('[data-ko-placeholder][data-en-placeholder]').forEach(el=>el.placeholder=el.getAttribute(value==='en'?'data-en-placeholder':'data-ko-placeholder'));render()};
</script></body></html>
