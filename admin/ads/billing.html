<script>
window.applyLocalI18n = function(lang) {
  document.querySelectorAll('[data-ko][data-en]').forEach(el => { el.textContent = el.getAttribute(lang === 'en' ? 'data-en' : 'data-ko'); });
  const pairs = {
    '썬밸리 CC 제휴 광고':'Sun Valley CC Partner Ad',
    '썬밸리 CC':'Sun Valley CC',
    '골프장':'Golf Course',
    '스카이72 골프 패키지':'Sky72 Golf Package',
    '스카이72 골프':'Sky72 Golf',
    '롯데렌터카 공항 픽업 제휴':'Lotte Rent-a-car Airport Pickup',
    '롯데렌터카 베트남':'Lotte Rent-a-car Vietnam',
    '렌터카':'Rent-a-car',
    '미남 리버 크루즈 제휴':'Saigon River Cruise Partner Ad',
    '지역 제휴':'Local Partner'
  };
  const reverse = Object.fromEntries(Object.entries(pairs).map(([ko, en]) => [en, ko]));
  const map = lang === 'en' ? pairs : reverse;
  const walker = document.createTreeWalker(document.body, NodeFilter.SHOW_TEXT, {
    acceptNode(node) {
      const parent = node.parentElement;
      if (!parent || ['SCRIPT', 'STYLE', 'TEXTAREA', 'INPUT'].includes(parent.tagName)) return NodeFilter.FILTER_REJECT;
      return map[node.nodeValue.trim()] ? NodeFilter.FILTER_ACCEPT : NodeFilter.FILTER_REJECT;
    }
  });
  const nodes = [];
  while (walker.nextNode()) nodes.push(walker.currentNode);
  nodes.forEach(node => { node.nodeValue = node.nodeValue.replace(node.nodeValue.trim(), map[node.nodeValue.trim()]); });
};
document.addEventListener('DOMContentLoaded', () => window.applyLocalI18n(window.currentLang || localStorage.getItem('pms_lang') || 'ko'));
</script>
