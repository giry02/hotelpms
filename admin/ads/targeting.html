<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/><meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>타겟팅 설정 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/><link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/><link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><a class="btn-outline btn-sm" href="detail.html" style="margin-right:8px; border:none; box-shadow:none; padding:4px 8px" title="뒤로 가기"><i class="fa-solid fa-arrow-left"></i></a><h1>타겟팅 설정</h1><span class="date-badge"> Vietnam Golf Tour</span></div>
<div class="topbar-right">
<button class="btn-primary" onclick="alert('타겟팅 설정이 저장되었습니다.'); window.location.href='detail.html'"><i class="fa-solid fa-check"></i> <span>저장</span></button>
<select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px"><option value="ko">한국어</option><option value="en"> English</option></select>
</div>
</header>
<div class="content">
<!-- 타겟팅 목록 -->
<div class="card">
<div class="card-header">
<div class="card-title"><i class="fa-solid fa-crosshairs"></i> 타겟팅 설정 (국가 &gt; 도시)</div>
<button class="btn-outline" onclick="document.getElementById('addTargetRow').style.display='flex'"><i class="fa-solid fa-plus"></i> <span>타겟 추가</span></button>
</div>
<div class="card-body"><div class="table-wrap"><table>
<thead><tr><th>국가</th><th>도시</th><th>대상 호텔</th><th>가중치 (1~10)</th><th>관리</th></tr></thead>
<tbody>
<tr><td> Vietnam</td><td>Ho Chi Minh</td><td style="font-weight:600">The Grand Saigon</td><td><input max="10" min="1" style="width:100px" type="range" value="8"/> <span style="font-weight:700;color:var(--primary)">8</span></td><td><button class="btn-outline btn-sm" style="color:var(--danger)"><i class="fa-solid fa-trash"></i></button></td></tr>
<tr><td> Vietnam</td><td>Da Nang</td><td style="font-weight:600">Da Nang Beach Resort</td><td><input max="10" min="1" style="width:100px" type="range" value="10"/> <span style="font-weight:700;color:var(--primary)">10</span></td><td><button class="btn-outline btn-sm" style="color:var(--danger)"><i class="fa-solid fa-trash"></i></button></td></tr>
<tr><td> Vietnam</td><td>Phu Quoc</td><td style="font-weight:600">Phu Quoc Paradise</td><td><input max="10" min="1" style="width:100px" type="range" value="6"/> <span style="font-weight:700;color:var(--primary)">6</span></td><td><button class="btn-outline btn-sm" style="color:var(--danger)"><i class="fa-solid fa-trash"></i></button></td></tr>
<tr><td> Vietnam</td><td>Hanoi</td><td style="font-weight:600">Hanoi Lakeside</td><td><input max="10" min="1" style="width:100px" type="range" value="4"/> <span style="font-weight:700;color:var(--primary)">4</span></td><td><button class="btn-outline btn-sm" style="color:var(--danger)"><i class="fa-solid fa-trash"></i></button></td></tr>
<!-- 추가 행 (숨김) -->
<tr id="addTargetRow" style="display:none;background:var(--primary-lt)">
<td><select class="form-control" style="height:32px;font-size:.78rem"><option>Vietnam</option><option>South Korea</option><option>Thailand</option></select></td>
<td><input class="form-control" placeholder="City" style="height:32px;font-size:.78rem" type="text"/></td>
<td><select class="form-control" style="height:32px;font-size:.78rem;min-width:140px"><option data-ko="전체 호텔" data-en="All hotels">전체 호텔</option><option>The Grand Saigon</option><option>Hanoi Lakeside</option></select></td>
<td><input class="form-control" max="10" min="1" style="width:60px;height:32px;font-size:.78rem;text-align:center" type="number" value="5"/></td>
<td><button class="btn-primary btn-sm" onclick="alert('타겟팅 규칙이 추가되었습니다.'); document.getElementById('addTargetRow').style.display='none';"><i class="fa-solid fa-check"></i></button></td>
</tr>
</tbody>
</table></div></div>
</div>
<!-- 가중치 시각화 -->
<div class="card">
<div class="card-header"><div class="card-title"><i class="fa-solid fa-chart-bar"></i> 가중치 분포</div></div>
<div class="card-body">
<div style="display:flex;flex-direction:column;gap:12px">
<div style="display:flex;align-items:center;gap:12px"><span style="width:140px;font-size:.82rem;font-weight:600">Da Nang Beach</span><div style="flex:1;height:28px;background:var(--border2);border-radius:4px;overflow:hidden"><div style="width:100%;height:100%;background:var(--primary);border-radius:4px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:.72rem;font-weight:700">10</div></div></div>
<div style="display:flex;align-items:center;gap:12px"><span style="width:140px;font-size:.82rem;font-weight:600">Grand Saigon</span><div style="flex:1;height:28px;background:var(--border2);border-radius:4px;overflow:hidden"><div style="width:80%;height:100%;background:var(--success);border-radius:4px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:.72rem;font-weight:700">8</div></div></div>
<div style="display:flex;align-items:center;gap:12px"><span style="width:140px;font-size:.82rem;font-weight:600">Phu Quoc Paradise</span><div style="flex:1;height:28px;background:var(--border2);border-radius:4px;overflow:hidden"><div style="width:60%;height:100%;background:var(--warning);border-radius:4px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:.72rem;font-weight:700">6</div></div></div>
<div style="display:flex;align-items:center;gap:12px"><span style="width:140px;font-size:.82rem;font-weight:600">Hanoi Lakeside</span><div style="flex:1;height:28px;background:var(--border2);border-radius:4px;overflow:hidden"><div style="width:40%;height:100%;background:var(--txt3);border-radius:4px;display:flex;align-items:center;padding-left:8px;color:#fff;font-size:.72rem;font-weight:700">4</div></div></div>
</div>
</div>
</div>
</div>
</div>
</body>
</html>
