<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>&#44305;&#44256; &#53440;&#44191; &#49444;&#51221; - Super Admin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/><link rel="stylesheet" href="../common/css/admin-base.css"/><link rel="stylesheet" href="../common/css/admin-pages.css"/><script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script><script src="../common/js/admin-i18n.js"></script><style>.target-actions{display:flex;gap:8px;align-items:center;flex-wrap:wrap}.target-actions .form-control{width:auto;min-width:160px}.target-preview{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}.target-preview-item{border:1px solid var(--line);border-radius:8px;padding:12px}.weight-wrap{display:flex;align-items:center;gap:8px}.weight-wrap input{width:100px}.empty-target{padding:28px;text-align:center;color:var(--txt3)}@media(max-width:720px){.target-actions>*{flex:1 1 150px}.table-wrap{overflow-x:auto}.target-preview{grid-template-columns:1fr}}</style></head><body><div class="main"><header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><a class="btn-outline btn-sm" id="backToCampaign" href="campaigns.html" aria-label="Back"><i class="fa-solid fa-arrow-left"></i></a><h1 data-ko="&#44305;&#44256; &#53440;&#44191; &#49444;&#51221;" data-en="Ad Targeting">&#44305;&#44256; &#53440;&#44191; &#49444;&#51221;</h1></div><div class="topbar-right"><button class="btn-primary" id="openTargetModalButton" type="button"><i class="fa-solid fa-plus"></i> <span data-ko="&#51312;&#44148; &#52628;&#44032;" data-en="Add Rule">&#51312;&#44148; &#52628;&#44032;</span></button><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">KR &#54620;&#44397;&#50612;</option><option value="en">EN English</option></select></div></header><div class="content"><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-crosshairs"></i> <span data-ko="&#53440;&#44191; &#51312;&#44148;" data-en="Targeting Rules">&#53440;&#44191; &#51312;&#44148;</span></div><button class="btn-primary" id="saveTargetsButton" type="button"><i class="fa-solid fa-check"></i> <span data-ko="&#51200;&#51109;" data-en="Save">&#51200;&#51109;</span></button></div><div class="card-body"><div class="filter-bar target-actions"><input class="form-control" id="targetSearch" data-ko-placeholder="&#51312;&#44148;, &#54840;&#53588;, &#51648;&#50669; &#44160;&#49353;" data-en-placeholder="Search rule, hotel, or region" placeholder="&#51312;&#44148;, &#54840;&#53588;, &#51648;&#50669; &#44160;&#49353;"/><select class="form-control" id="targetModeFilter"><option value="all" data-ko="&#51204;&#52404; &#51312;&#44148;" data-en="All Rules">&#51204;&#52404; &#51312;&#44148;</option><option value="include" data-ko="&#54252;&#54632;" data-en="Include">&#54252;&#54632;</option><option value="exclude" data-ko="&#51228;&#50808;" data-en="Exclude">&#51228;&#50808;</option></select><span id="targetCountLabel"></span></div><div class="table-wrap"><table><thead><tr><th data-ko="&#51312;&#44148;" data-en="Rule">&#51312;&#44148;</th><th data-ko="&#48276;&#50948;" data-en="Scope">&#48276;&#50948;</th><th data-ko="&#49440;&#53469;&#44050;" data-en="Value">&#49440;&#53469;&#44050;</th><th data-ko="&#44032;&#51473;&#52824;" data-en="Weight">&#44032;&#51473;&#52824;</th><th data-ko="&#44288;&#47532;" data-en="Actions">&#44288;&#47532;</th></tr></thead><tbody id="targetTableBody"></tbody></table></div></div></section><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-hotel"></i> <span data-ko="&#49892;&#51228; &#45432;&#52636; &#45824;&#49345;" data-en="Effective Audience">&#49892;&#51228; &#45432;&#52636; &#45824;&#49345;</span></div><span class="status-badge active" id="previewCount"></span></div><div class="card-body"><div class="target-preview" id="targetPreview"></div></div></section></div></div>
<div class="modal-overlay" id="targetModal"><div class="modal-card" style="width:620px;max-width:94vw"><div class="modal-header"><h3 class="modal-title" data-ko="&#53440;&#44191; &#51312;&#44148; &#52628;&#44032;" data-en="Add Targeting Rule">&#53440;&#44191; &#51312;&#44148; &#52628;&#44032;</h3><button class="modal-close" id="closeTargetModalButton" type="button"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="grid-2"><div class="form-group"><label class="form-label" data-ko="&#51312;&#44148;" data-en="Rule">&#51312;&#44148;</label><select class="form-control" id="targetMode"><option value="include" data-ko="&#54252;&#54632;" data-en="Include">&#54252;&#54632;</option><option value="exclude" data-ko="&#51228;&#50808;" data-en="Exclude">&#51228;&#50808;</option></select></div><div class="form-group"><label class="form-label" data-ko="&#48276;&#50948;" data-en="Scope">&#48276;&#50948;</label><select class="form-control" id="targetScope"><option value="all" data-ko="&#51204;&#52404; &#54840;&#53588;" data-en="All Hotels">&#51204;&#52404; &#54840;&#53588;</option><option value="hotel" data-ko="&#44060;&#48324; &#54840;&#53588;" data-en="Hotel">&#44060;&#48324; &#54840;&#53588;</option><option value="region" data-ko="&#51648;&#50669;" data-en="Region">&#51648;&#50669;</option><option value="tier" data-ko="&#46321;&#44553;" data-en="Tier">&#46321;&#44553;</option></select></div><div class="form-group" id="countryGroup"><label class="form-label" data-ko="&#44397;&#44032;" data-en="Country">&#44397;&#44032;</label><select class="form-control" id="targetCountry"><option value="Vietnam">Vietnam</option><option value="South Korea">South Korea</option><option value="Philippines">Philippines</option><option value="Thailand">Thailand</option></select></div><div class="form-group" id="cityGroup"><label class="form-label" data-ko="&#46020;&#49884;" data-en="City">&#46020;&#49884;</label><input class="form-control" id="targetCity"/></div><div class="form-group" id="hotelGroup"><label class="form-label" data-ko="&#54840;&#53588;" data-en="Hotel">&#54840;&#53588;</label><select class="form-control" id="targetHotel"></select></div><div class="form-group" id="tierGroup"><label class="form-label" data-ko="&#46321;&#44553;" data-en="Tier">&#46321;&#44553;</label><select class="form-control" id="targetTier"><option value="Free">Free</option><option value="Basic">Basic</option><option value="Pro">Pro</option><option value="Enterprise">Enterprise</option></select></div><div class="form-group"><label class="form-label" data-ko="&#44032;&#51473;&#52824;" data-en="Weight">&#44032;&#51473;&#52824;</label><input class="form-control" id="targetWeight" type="number" min="1" max="10" value="5"/></div></div></div><div class="modal-footer"><button class="btn-outline" id="cancelTargetButton" type="button" data-ko="&#52712;&#49548;" data-en="Cancel">&#52712;&#49548;</button><button class="btn-primary" id="addTargetButton" type="button" data-ko="&#52628;&#44032;" data-en="Add">&#52628;&#44032;</button></div></div></div>
<script>
let targets=[];const campaignId=new URLSearchParams(location.search).get('id')||'ADS-TARGETING';const lang=()=>window.currentLang||localStorage.getItem('pms_admin_lang')||'ko';const esc=value=>String(value??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));function hotels(){return AdminStore.read('tenants',window.AdminData?.tenants||[])}function activeHotels(){return hotels().filter(row=>!['suspended','inactive','terminated','deleted'].includes(String(row.status).toLowerCase()))}function normalize(rule){return {...rule,scope:rule.scope||'hotel'}}function matches(rule,hotel){if(rule.scope==='all')return true;if(rule.scope==='hotel')return String(rule.hotelId)===String(hotel.id);if(rule.scope==='region')return (!rule.country||rule.country===hotel.country)&&(!rule.city||String(rule.city).toLowerCase()===String(hotel.city||'').toLowerCase());if(rule.scope==='tier')return String(rule.tier||rule.value)===String(hotel.tier||hotel.plan||'');return false}function effectiveTargets(){const result=new Map(),active=activeHotels();targets.map(normalize).filter(rule=>rule.mode==='include').forEach(rule=>active.filter(hotel=>matches(rule,hotel)).forEach(hotel=>result.set(String(hotel.id),{hotelId:hotel.id,hotelName:hotel.hotelName||hotel.name,hotelCode:hotel.code||hotel.id,hotelType:hotel.type||hotel.propertyType||'PMS',city:hotel.city||'',country:hotel.country||'',weight:Number(rule.weight)||1})));targets.map(normalize).filter(rule=>rule.mode==='exclude').forEach(rule=>active.filter(hotel=>matches(rule,hotel)).forEach(hotel=>result.delete(String(hotel.id))));return [...result.values()]}
function scopeLabel(value){const en=lang()==='en';return ({all:en?'All Hotels':'\uC804\uCCB4 \uD638\uD154',hotel:en?'Hotel':'\uAC1C\uBCC4 \uD638\uD154',region:en?'Region':'\uC9C0\uC5ED',tier:en?'Tier':'\uB4F1\uAE09'})[value]||value}function valueLabel(rule){if((rule.scope||'hotel')==='all')return lang()==='en'?'All active hotels':'\uBAA8\uB4E0 \uD65C\uC131 \uD638\uD154';if((rule.scope||'hotel')==='hotel')return `${rule.hotelName||rule.hotelId} (${rule.hotelCode||rule.hotelId})`;if(rule.scope==='region')return `${rule.country||'-'} / ${rule.city||'*'}`;return rule.tier||rule.value||'-'}
function renderPreview(){const effective=effectiveTargets();document.getElementById('previewCount').textContent=lang()==='en'?`${effective.length} hotels`:`${effective.length}\uAC1C \uD638\uD154`;document.getElementById('targetPreview').innerHTML=effective.length?effective.map(row=>`<article class="target-preview-item"><strong>${esc(row.hotelName)}</strong><div>${esc(row.hotelCode)} · ${esc(row.hotelType)}</div><small>${esc(row.country)} ${esc(row.city)} · ${lang()==='en'?'Weight':'\uAC00\uC911\uCE58'} ${row.weight}</small></article>`).join(''):`<div class="empty-target">${lang()==='en'?'No eligible hotels. Publishing is blocked.':'\uB178\uCD9C \uAC00\uB2A5\uD55C \uD638\uD154\uC774 \uC5C6\uC2B5\uB2C8\uB2E4. \uAC8C\uC2DC\uAC00 \uCC28\uB2E8\uB429\uB2C8\uB2E4.'}</div>`}
function render(){const query=document.getElementById('targetSearch').value.trim().toLowerCase(),mode=document.getElementById('targetModeFilter').value,visible=targets.map(normalize).filter(rule=>(mode==='all'||rule.mode===mode)&&(!query||`${scopeLabel(rule.scope)} ${valueLabel(rule)}`.toLowerCase().includes(query)));document.getElementById('targetCountLabel').textContent=lang()==='en'?`${visible.length} rules`:`${visible.length}\uAC1C \uADDC\uCE59`;document.getElementById('targetTableBody').innerHTML=visible.length?visible.map(rule=>`<tr data-id="${esc(rule.id)}"><td><span class="status-badge ${rule.mode==='include'?'active':'pending'}">${rule.mode==='include'?(lang()==='en'?'Include':'\uD3EC\uD568'):(lang()==='en'?'Exclude':'\uC81C\uC678')}</span></td><td>${scopeLabel(rule.scope)}</td><td><strong>${esc(valueLabel(rule))}</strong></td><td><div class="weight-wrap"><input class="target-weight" type="range" min="1" max="10" value="${Number(rule.weight)||1}"/><strong>${Number(rule.weight)||1}</strong></div></td><td><button class="btn-outline btn-sm delete-target" type="button" aria-label="Delete"><i class="fa-solid fa-trash"></i></button></td></tr>`).join(''):`<tr><td colspan="5" class="empty-target">${lang()==='en'?'No targeting rules.':'\uD0C0\uAC9F \uADDC\uCE59\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.'}</td></tr>`;bindRows();renderPreview()}
function updateScope(){const scope=document.getElementById('targetScope').value;document.getElementById('hotelGroup').style.display=scope==='hotel'?'block':'none';document.getElementById('countryGroup').style.display=scope==='region'?'block':'none';document.getElementById('cityGroup').style.display=scope==='region'?'block':'none';document.getElementById('tierGroup').style.display=scope==='tier'?'block':'none'}function openTargetModal(){const list=activeHotels();document.getElementById('targetHotel').innerHTML=list.map(row=>`<option value="${esc(row.id)}" data-name="${esc(row.hotelName||row.name)}" data-code="${esc(row.code||row.id)}">${esc(row.hotelName||row.name)} (${esc(row.code||row.id)})</option>`).join('');document.getElementById('targetModal').classList.add('active');updateScope()}function closeTargetModal(){document.getElementById('targetModal').classList.remove('active')}
function addTarget(){const scope=document.getElementById('targetScope').value,select=document.getElementById('targetHotel'),option=select.selectedOptions[0],city=document.getElementById('targetCity').value.trim();if(scope==='hotel'&&!select.value)return false;if(scope==='region'&&!document.getElementById('targetCountry').value)return false;const rule={id:`TGT-${Date.now()}`,campaignId,mode:document.getElementById('targetMode').value,scope,weight:Number(document.getElementById('targetWeight').value)||1};if(scope==='hotel')Object.assign(rule,{hotelId:select.value,hotelName:option?.dataset.name||option?.textContent,hotelCode:option?.dataset.code||select.value});if(scope==='region')Object.assign(rule,{country:document.getElementById('targetCountry').value,city});if(scope==='tier')Object.assign(rule,{tier:document.getElementById('targetTier').value});targets.push(rule);closeTargetModal();render();return true}function saveTargets(){if(!effectiveTargets().length)return false;AdminStore.write('adTargets',targets);AdminStore.audit('campaign.targeting_update',campaignId,JSON.stringify({rules:targets.length,effective:effectiveTargets().length}),'Medium');return true}
function bindRows(){document.querySelectorAll('#targetTableBody tr').forEach(row=>{const id=row.dataset.id,input=row.querySelector('.target-weight'),output=row.querySelector('.weight-wrap strong'),button=row.querySelector('.delete-target');if(input)input.oninput=()=>{const target=targets.find(item=>String(item.id)===String(id));if(target)target.weight=Number(input.value);output.textContent=input.value;renderPreview()};if(button)button.onclick=()=>{targets=targets.filter(item=>String(item.id)!==String(id));render()}})}function setup(){targets=AdminStore.read('adTargets',[]);document.getElementById('backToCampaign').href=campaignId==='ADS-TARGETING'?'campaigns.html':`detail.html?id=${encodeURIComponent(campaignId)}`;document.getElementById('openTargetModalButton').onclick=openTargetModal;document.getElementById('closeTargetModalButton').onclick=closeTargetModal;document.getElementById('cancelTargetButton').onclick=closeTargetModal;document.getElementById('addTargetButton').onclick=addTarget;document.getElementById('saveTargetsButton').onclick=saveTargets;document.getElementById('targetScope').onchange=updateScope;document.getElementById('targetSearch').oninput=render;document.getElementById('targetModeFilter').onchange=render;render()}
document.addEventListener('DOMContentLoaded',setup);window.applyLocalI18n=function(value){document.documentElement.lang=value;document.querySelectorAll('[data-ko][data-en]').forEach(el=>el.textContent=el.getAttribute(value==='en'?'data-en':'data-ko'));document.querySelectorAll('[data-ko-placeholder][data-en-placeholder]').forEach(el=>el.placeholder=el.getAttribute(value==='en'?'data-en-placeholder':'data-ko-placeholder'));render()};
</script></body></html>
