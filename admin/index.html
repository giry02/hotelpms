<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Super Admin Redirecting...</title>
<style>
    body { margin: 0; padding: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background: #020617; color: #f8fafc; font-family: sans-serif; }
    .spinner { width: 30px; height: 30px; border: 3px solid rgba(255,255,255,0.2); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="spinner" aria-hidden="true"></div>
<p style="position:absolute;top:calc(50% + 34px);left:0;right:0;text-align:center;margin:0;font-size:13px;color:#cbd5e1">Redirecting to admin console.</p>
<script>
    // Check login status and route accordingly.
    setTimeout(() => {
        const isLoggedIn = sessionStorage.getItem('admin_logged_in') === 'true';
        if (isLoggedIn) {
            window.location.replace('admin.html');
        } else {
            window.location.replace('login.html');
        }
    }, 80);
</script>
</body>
</html>
