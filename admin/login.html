<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>관리자 로그인 - Hotel PMS</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="common/css/admin-login.css" rel="stylesheet"/>
</head>
<body>
<!-- LEFT HERO -->
<div class="login-hero">
<div class="hero-content">
<div class="hero-logo"><i class="fa-solid fa-server"></i></div>
<h1 class="hero-title">플랫폼 관리 센터</h1>
<p class="hero-sub">플랫폼 전체 시스템을 관리하고<br/> 모든 테넌트와 리소스를 모니터링하세요.</p>
</div>
</div>
<!-- RIGHT PANEL -->
<div class="login-panel">
<!-- === LOGIN FORM === -->
<div class="login-form" id="loginForm">
<div class="form-header">
<h2>시스템 관리자 로그인</h2>
<p>관리자 계정으로 로그인하세요.</p>
</div>
<div class="form-error" id="loginError">
<i class="fa-solid fa-circle-exclamation"></i>
<span>로그인 정보가 올바르지 않습니다.</span>
</div>
<div class="form-group">
<label class="form-label" for="email">관리자 ID / 이메일</label>
<input autocomplete="username" class="form-input" id="email" placeholder="admin@platform.sys" type="text"/>
<span class="error-msg" id="emailError">이메일을 입력해주세요.</span>
</div>
<div class="form-group">
<label class="form-label" for="password">비밀번호</label>
<div class="input-wrap">
<input autocomplete="current-password" class="form-input" id="password" placeholder="" type="password"/>
<button class="toggle-pw" onclick="togglePw()" type="button"><i class="fa-regular fa-eye"></i></button>
</div>
<span class="error-msg" id="pwError">비밀번호를 입력해주세요.</span>
</div>
<div class="form-options">
<label><input type="checkbox"/> <span>로그인 상태 유지</span></label>
<a href="#" onclick="alert('등록된 이메일로 비밀번호 재설정 링크가 발송됩니다.');return false;" style="color:var(--txt2);text-decoration:none">비밀번호 재설정</a>
</div>
<button class="btn-login" id="btnLogin" onclick="handleLogin()">
<span class="btn-text">로그인</span>
<span class="spinner"></span>
</button>
<div style="margin-top:22px;padding-top:18px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px;font-size:.82rem;color:var(--txt2)">
<span>호텔 입점을 원하시나요?</span>
<a href="tenants/apply.html" style="color:#fff;text-decoration:none;font-weight:700">입점 신청</a>
</div>
</div>
</div>
<script>
function togglePw(){
	const pw = document.getElementById('password');
	const icon = pw.nextElementSibling.querySelector('i');
	if(pw.type === 'password'){
		pw.type = 'text';
		icon.className = 'fa-regular fa-eye-slash';
	} else {
		pw.type = 'password';
		icon.className = 'fa-regular fa-eye';
	}
}

function handleLogin(){
	const btn = document.getElementById('btnLogin');
	const err = document.getElementById('loginError');
	const email = document.getElementById('email').value;
	const pw = document.getElementById('password').value;

	err.classList.remove('show');
	
	if(!email || !pw){
		if(!email) document.getElementById('email').classList.add('error');
		if(!pw) document.getElementById('password').classList.add('error');
		return;
	}

	btn.classList.add('loading');
	
	setTimeout(() => {
		// 로그인 성공
		sessionStorage.setItem('admin_logged_in', 'true');
		window.location.href = 'admin.html';
	}, 1000);
}

document.getElementById('email').addEventListener('input', function() {
	this.classList.remove('error');
});
document.getElementById('password').addEventListener('input', function() {
	this.classList.remove('error');
});

document.getElementById('password').addEventListener('keydown', e => {
	if(e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
