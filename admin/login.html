<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>관리자 로그인 - Hotel PMS</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="common/css/admin-login.css" rel="stylesheet"/>
</head>
<body class="admin-login-page">
<!-- RIGHT PANEL -->
<div class="login-panel">
<!-- === LOGIN FORM === -->
<div class="login-form" id="loginForm">
<div class="form-header">
<h2>시스템 관리자 로그인</h2>
<p>관리자 계정으로 로그인하세요.</p>
</div>
<div class="form-error" id="loginError">
<i class="fa-solid fa-circle-exclamation"></i>
<span>로그인 정보가 올바르지 않습니다.</span>
</div>
<div class="form-group">
<label class="form-label" for="email">관리자 ID / 이메일</label>
<input autocomplete="username" class="form-input" id="email" placeholder="admin@platform.sys" type="text" value="superadmin@platform.example"/>
<span class="error-msg" id="emailError">이메일을 입력해주세요.</span>
</div>
<div class="form-group">
<label class="form-label" for="password">비밀번호</label>
<div class="input-wrap">
<input autocomplete="current-password" class="form-input" id="password" placeholder="" type="password" value="admin1234"/>
<button class="toggle-pw" onclick="togglePw()" type="button"><i class="fa-regular fa-eye"></i></button>
</div>
<span class="error-msg" id="pwError">비밀번호를 입력해주세요.</span>
</div>
<div class="form-options">
<label><input type="checkbox"/> <span>로그인 상태 유지</span></label>
<a href="#" onclick="alert('등록된 이메일로 비밀번호 재설정 링크가 발송됩니다.');return false;" style="color:var(--txt2);text-decoration:none">비밀번호 재설정</a>
</div>
<button class="btn-login" id="btnLogin" onclick="handleLogin()">
<span class="btn-text">로그인</span>
<span class="spinner"></span>
</button>
</div>
</div>
<script src="common/js/admin-i18n-catalog.js"></script>
<script src="common/js/admin-i18n.js"></script>
<script>
(function bindAdminLoginI18nKeys(){
    const pairs = [
        ['.form-header h2', 'admin.login.formTitle'],
        ['.form-header p', 'admin.login.formSub'],
        ['label[for="email"]', 'admin.login.email'],
        ['label[for="password"]', 'admin.login.password'],
        ['.form-options label span', 'admin.login.keep'],
        ['.form-options a', 'admin.login.reset'],
        ['.btn-text', 'admin.login.submit']
    ];
    pairs.forEach(([selector, key]) => {
        const el = document.querySelector(selector);
        if(el) el.setAttribute('data-i18n', key);
    });
    if(typeof window.changeLang === 'function') window.changeLang(localStorage.getItem('pms_lang') || window.currentLang || 'ko');
})();
</script>
<script>
function togglePw(){
	const pw = document.getElementById('password');
	const icon = pw.nextElementSibling.querySelector('i');
	if(pw.type === 'password'){
		pw.type = 'text';
		icon.className = 'fa-regular fa-eye-slash';
	} else {
		pw.type = 'password';
		icon.className = 'fa-regular fa-eye';
	}
}

function handleLogin(){
	const btn = document.getElementById('btnLogin');
	const err = document.getElementById('loginError');
	const email = document.getElementById('email').value;
	const pw = document.getElementById('password').value;

	err.classList.remove('show');
	
	if(!email || !pw){
		if(!email) document.getElementById('email').classList.add('error');
		if(!pw) document.getElementById('password').classList.add('error');
		return;
	}

	const defaultUsers = [
		{ id: 'ADM-001', name: 'Super Admin', email: 'superadmin@platform.example', password: 'admin1234', role: 'Platform Owner', status: 'active' },
		{ id: 'ADM-002', name: 'Ops Manager', email: 'ops@platform.example', password: 'ops12345', role: 'Operations', status: 'active' }
	];
	let storedUsers = [];
	try { storedUsers = JSON.parse(localStorage.getItem('pms_admin_store:users') || '[]'); } catch (_) {}
	const users = [
		...storedUsers.map(user => {
			const seed = defaultUsers.find(item => item.email === user.email);
			return seed ? { ...seed, ...user, password: user.password || seed.password } : user;
		}),
		...defaultUsers.filter(seed => !storedUsers.some(user => user.email === seed.email))
	];
	const user = users.find(candidate => String(candidate.email).toLowerCase() === email.trim().toLowerCase());
	const active = user && !['inactive', 'locked', 'suspended', 'retired', 'leave'].includes(String(user.status || '').toLowerCase());
	if (!user || user.password !== pw || !active) {
		err.classList.add('show');
		btn.classList.remove('loading');
		try {
			const key = 'pms_admin_store:auditLogs';
			const logs = JSON.parse(localStorage.getItem(key) || '[]');
			logs.unshift({ id: `AUD-${Date.now()}`, actor: email || '-', action: active === false ? 'Blocked Access' : 'Failed Login', target: email || '-', details: active === false ? `status=${user?.status || 'unknown'}` : 'invalid credentials', ip: '127.0.0.1', createdAt: new Date().toISOString(), risk: 'High' });
			localStorage.setItem(key, JSON.stringify(logs));
		} catch (_) {}
		return;
	}

	btn.classList.add('loading');
	setTimeout(() => {
		const session = { id: user.id, name: user.name, email: user.email, role: user.role, expiresAt: Date.now() + (8 * 60 * 60 * 1000) };
		sessionStorage.setItem('admin_logged_in', 'true');
		sessionStorage.setItem('admin_session', JSON.stringify(session));
		const returnTo = sessionStorage.getItem('admin_return_to');
		sessionStorage.removeItem('admin_return_to');
		window.location.href = returnTo || 'admin.html';
	}, 120);
}

document.getElementById('email').addEventListener('input', function() {
	this.classList.remove('error');
});
document.getElementById('password').addEventListener('input', function() {
	this.classList.remove('error');
});

document.getElementById('password').addEventListener('keydown', e => {
	if(e.key === 'Enter') handleLogin();
});
</script>
</body>
</html>
