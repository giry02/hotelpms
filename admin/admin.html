<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Admin Dashboard - Super Admin</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
<link rel="stylesheet" href="common/css/admin-base.css"/>
<link rel="stylesheet" href="common/css/admin-pages.css"/>
<script src="common/js/admin-sidebar.js"></script>
<script src="common/js/admin-i18n-catalog.js"></script>
<script src="common/js/admin-i18n.js"></script>
<style>
.dashboard-toolbar{display:flex;justify-content:space-between;gap:12px;align-items:center;margin-bottom:18px}.dashboard-kpis{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:14px;margin-bottom:18px}.dashboard-kpi{display:flex;gap:13px;align-items:center;background:#fff;border:1px solid var(--line);border-radius:8px;padding:17px;text-decoration:none;color:inherit;min-width:0}.dashboard-kpi i{width:40px;height:40px;border-radius:8px;display:grid;place-items:center;background:var(--primary-lt);color:var(--primary)}.dashboard-kpi strong{display:block;font-size:1.35rem}.dashboard-kpi span{font-size:.75rem;color:var(--txt3);font-weight:700}.dashboard-grid{display:grid;grid-template-columns:1.1fr .9fr;gap:18px;margin-bottom:18px}.property-kind{display:inline-flex;align-items:center;gap:5px;border-radius:999px;padding:4px 8px;font-size:.72rem;font-weight:800}.property-kind.pms{background:#dcfce7;color:#047857}.property-kind.partner{background:#ede9fe;color:#6d28d9}.integration-warning{display:flex;gap:12px;align-items:flex-start;padding:13px;border:1px solid #fed7aa;background:#fff7ed;border-radius:8px;margin-bottom:9px}.integration-warning i{color:#c2410c;margin-top:3px}.dashboard-empty{padding:32px;text-align:center;color:var(--txt3)}.dashboard-status-list{display:grid;gap:9px}.dashboard-status-row{display:grid;grid-template-columns:minmax(0,1.5fr) minmax(110px,.7fr) minmax(90px,.5fr);gap:10px;align-items:center;padding:12px;border:1px solid var(--line);border-radius:8px}.dashboard-status-row strong{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}.metric-list{display:grid;gap:10px}.metric-row{display:flex;justify-content:space-between;gap:12px;padding:11px 0;border-bottom:1px solid var(--line)}@media(max-width:1100px){.dashboard-kpis{grid-template-columns:repeat(3,minmax(0,1fr))}}@media(max-width:760px){.dashboard-toolbar{align-items:stretch;flex-direction:column}.dashboard-grid{grid-template-columns:1fr}.dashboard-kpis{grid-template-columns:repeat(2,minmax(0,1fr))}.dashboard-status-row{grid-template-columns:1fr auto}.dashboard-status-row .status-badge{grid-column:1/-1;justify-self:start}}@media(max-width:430px){.dashboard-kpis{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="main"><header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><h1 data-ko="&#54540;&#47019;&#54268; &#50868;&#50689; &#54788;&#54889;" data-en="Platform Dashboard">&#54540;&#47019;&#54268; &#50868;&#50689; &#54788;&#54889;</h1></div><div class="topbar-right"><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">KR &#54620;&#44397;&#50612;</option><option value="en">EN English</option></select></div></header>
<main class="content"><div class="dashboard-toolbar"><div><h2 style="margin:0 0 5px" data-ko="&#53685;&#54633; &#50868;&#50689; &#45824;&#49884;&#48372;&#46300;" data-en="Unified Operations Dashboard">&#53685;&#54633; &#50868;&#50689; &#45824;&#49884;&#48372;&#46300;</h2><p style="margin:0;color:var(--txt3)" data-ko="PMS &#49324;&#50857; &#54840;&#53588;&#44284; &#54028;&#53944;&#45320; &#54252;&#53560; &#49324;&#50857; &#50629;&#52404;&#47484; &#44396;&#48516;&#54644; &#48372;&#50668;&#51469;&#45768;&#45796;." data-en="PMS properties and partner-portal properties are shown separately.">PMS &#49324;&#50857; &#54840;&#53588;&#44284; &#54028;&#53944;&#45320; &#54252;&#53560; &#49324;&#50857; &#50629;&#52404;&#47484; &#44396;&#48516;&#54644; &#48372;&#50668;&#51469;&#45768;&#45796;.</p></div><select class="form-control" id="dashboardPeriod" style="width:170px"><option value="all" data-ko="&#51204;&#52404; &#44592;&#44036;" data-en="All Time">&#51204;&#52404; &#44592;&#44036;</option><option value="30" data-ko="&#52572;&#44540; 30&#51068;" data-en="Last 30 Days">&#52572;&#44540; 30&#51068;</option><option value="90" data-ko="&#52572;&#44540; 90&#51068;" data-en="Last 90 Days">&#52572;&#44540; 90&#51068;</option><option value="365" data-ko="&#52572;&#44540; 1&#45380;" data-en="Last Year">&#52572;&#44540; 1&#45380;</option></select></div>
<section class="dashboard-kpis" id="dashboardKpis"></section>
<section id="integrationWarnings"></section>
<div class="dashboard-grid"><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-building"></i> <span data-ko="&#54840;&#53588; / &#54028;&#53944;&#45320; &#50672;&#44208; &#54788;&#54889;" data-en="Property Connection Status">&#54840;&#53588; / &#54028;&#53944;&#45320; &#50672;&#44208; &#54788;&#54889;</span></div><a href="tenants/list.html" class="btn-outline btn-sm"><i class="fa-solid fa-arrow-right"></i></a></div><div class="card-body"><div class="dashboard-status-list" id="propertyStatusList"></div></div></section><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-file-invoice-dollar"></i> <span data-ko="&#52397;&#44396; &#50836;&#50557;" data-en="Billing Summary">&#52397;&#44396; &#50836;&#50557;</span></div><a href="system/billing.html" class="btn-outline btn-sm"><i class="fa-solid fa-arrow-right"></i></a></div><div class="card-body"><div class="metric-list" id="billingSummary"></div></div></section></div>
<div class="dashboard-grid"><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-rectangle-ad"></i> <span data-ko="&#52896;&#54168;&#51064; &#54788;&#54889;" data-en="Campaign Status">&#52896;&#54168;&#51064; &#54788;&#54889;</span></div><a href="ads/campaigns.html" class="btn-outline btn-sm"><i class="fa-solid fa-arrow-right"></i></a></div><div class="card-body"><div class="metric-list" id="campaignSummary"></div></div></section><section class="card"><div class="card-header"><div class="card-title"><i class="fa-solid fa-clock-rotate-left"></i> <span data-ko="&#52572;&#44540; &#54876;&#46041;" data-en="Recent Activity">&#52572;&#44540; &#54876;&#46041;</span></div><a href="system/audit-logs.html" class="btn-outline btn-sm"><i class="fa-solid fa-arrow-right"></i></a></div><div class="card-body"><div class="metric-list" id="recentActivity"></div></div></section></div></main></div>
<script>
(function(){
const esc=value=>String(value??'').replace(/[&<>"']/g,char=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[char]));const lang=()=>window.currentLang||localStorage.getItem('pms_admin_lang')||'ko';const tx=(ko,en)=>lang()==='en'?en:ko;const read=(key,fallback=[])=>window.AdminStore?AdminStore.read(key,window.AdminData?.[key]||fallback):(window.AdminData?.[key]||fallback);
function kindOf(row){return row.type==='partner'||row.pmsEnabled===false||String(row.id||'').startsWith('PARTNER-')?'partner':'pms'}function activeOf(row){return !['suspended','terminated','deleted','rejected'].includes(String(row.status||'active').toLowerCase())}function inPeriod(row){const days=document.getElementById('dashboardPeriod').value;if(days==='all')return true;const raw=row.updatedAt||row.createdAt||row.issuedAt||row.startDate||row.periodStart;if(!raw)return true;return new Date(raw).getTime()>=Date.now()-Number(days)*86400000}
function moneyMap(rows,key='amount'){return rows.reduce((map,row)=>{const currency=row.currency||'PHP';map[currency]=(map[currency]||0)+Number(row[key]||0);return map},{})}function moneyLines(map){return Object.keys(map).length?Object.entries(map).map(([currency,value])=>`<div class="metric-row"><span>${esc(currency)}</span><strong>${esc(new Intl.NumberFormat('en-US').format(value))}</strong></div>`).join(''):`<div class="dashboard-empty">${tx('&#45936;&#51060;&#53552;&#44032; &#50630;&#49845;&#45768;&#45796;.','No data.')}</div>`}
function render(){const tenants=read('tenants',[]),applications=read('tenantApplications',[]),campaigns=read('adCampaigns',[]).filter(inPeriod),billing=read('billing',[]).filter(inPeriod),integrations=read('integrations',[]),logs=read('auditLogs',[]).filter(inPeriod),pms=tenants.filter(row=>kindOf(row)==='pms'),partners=tenants.filter(row=>kindOf(row)==='partner'),active=tenants.filter(activeOf);const kpis=[['fa-building',tenants.length,tx('&#51204;&#52404; &#50629;&#52404;','All Properties'),'tenants/list.html'],['fa-hotel',pms.length,tx('PMS &#54840;&#53588;','PMS Hotels'),'tenants/list.html?type=pms'],['fa-handshake',partners.length,tx('&#54028;&#53944;&#45320; &#54252;&#53560;','Partner Portal'),'tenants/list.html?type=partner'],['fa-file-circle-question',applications.filter(row=>row.status==='pending').length,tx('&#49888;&#52397; &#45824;&#44592;','Pending Applications'),'tenants/list.html?tab=applications'],['fa-rectangle-ad',campaigns.filter(row=>['active','scheduled'].includes(row.status)).length,tx('&#50868;&#50689; &#52896;&#54168;&#51064;','Running Campaigns'),'ads/campaigns.html']];document.getElementById('dashboardKpis').innerHTML=kpis.map(([icon,value,label,href])=>`<a class="dashboard-kpi" href="${href}"><i class="fa-solid ${icon}"></i><div><strong>${value}</strong><span>${label}</span></div></a>`).join('');
document.getElementById('propertyStatusList').innerHTML=tenants.length?tenants.map(row=>{const kind=kindOf(row),status=String(row.status||'active');return`<a class="dashboard-status-row" href="tenants/detail.html?id=${encodeURIComponent(row.id)}" data-property-id="${esc(row.id)}"><strong>${esc(row.hotelName||row.name||row.id)}</strong><span class="property-kind ${kind}">${kind==='pms'?tx('PMS &#50672;&#44208;','PMS Connected'):tx('&#54028;&#53944;&#45320; &#54252;&#53560;','Partner Portal')}</span><span class="status-badge ${activeOf(row)?'active':'inactive'}">${esc(status)}</span></a>`}).join(''):`<div class="dashboard-empty">${tx('&#46321;&#47197;&#46108; &#50629;&#52404;&#44032; &#50630;&#49845;&#45768;&#45796;.','No properties registered.')}</div>`;
const errors=integrations.filter(row=>row.active!==false&&['error','failed','disconnected'].includes(String(row.status||'').toLowerCase()));document.getElementById('integrationWarnings').innerHTML=errors.map(row=>`<a class="integration-warning" href="system/integrations.html" data-integration-id="${esc(row.id)}"><i class="fa-solid fa-triangle-exclamation"></i><div><strong>${esc(row.name||row.id)}</strong><div>${tx('&#50672;&#46041; &#51109;&#50528;&#44032; &#45824;&#49884;&#48372;&#46300;&#50640; &#51204;&#54028;&#46104;&#50632;&#49845;&#45768;&#45796;.','Integration failure propagated to the dashboard.')} ${esc(row.lastError||row.status)}</div></div></a>`).join('');
document.getElementById('billingSummary').innerHTML=moneyLines(moneyMap(billing.filter(row=>row.status!=='cancelled')));const statuses=['active','scheduled','draft','paused','ended'];document.getElementById('campaignSummary').innerHTML=statuses.map(status=>`<div class="metric-row"><span>${esc(status)}</span><strong>${campaigns.filter(row=>row.status===status).length}</strong></div>`).join('');document.getElementById('recentActivity').innerHTML=logs.length?logs.slice(0,5).map(row=>`<div class="metric-row"><span><strong>${esc(row.action)}</strong><br><small>${esc(row.actor||row.actorId||'-')}</small></span><span>${esc(row.target||'-')}</span></div>`).join(''):`<div class="dashboard-empty">${tx('&#52572;&#44540; &#54876;&#46041;&#51060; &#50630;&#49845;&#45768;&#45796;.','No recent activity.')}</div>`;document.body.dataset.tenantCount=tenants.length;document.body.dataset.activeTenantCount=active.length}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('dashboardPeriod').onchange=render;if(window.adminDataReady)render();else window.addEventListener('DataReady',render,{once:true})});window.addEventListener('AdminStoreChanged',render);window.renderAdminDashboard=render;window.applyLocalI18n=function(next){document.documentElement.lang=next;document.querySelectorAll('[data-ko][data-en]').forEach(el=>el.textContent=el.getAttribute(next==='en'?'data-en':'data-ko'));render()}
})();
</script>
</body>
</html>
