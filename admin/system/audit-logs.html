<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>감사 로그 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<h1>감사 로그</h1>
</div>
<div class="topbar-right">
<a class="btn-outline" download="" href="../common/downloads/global_audit_logs.xlsx" style="padding:6px 12px;font-size:0.8rem;text-decoration:none;"><i class="fa-solid fa-download"></i> 엑셀 다운로드</a>
</div>
</header>
<div class="content">
<div class="card">
<div class="card-header">
<h2>감사 이벤트</h2>
<div class="filter-chips">
<button class="chip active">전체</button>
<button class="chip">로그인</button>
<button class="chip">기기</button>
<button class="chip" style="color:var(--danger);border-color:var(--danger-lt);">위험</button>
</div>
</div>
<div class="card-body">
<div class="table-wrap">
<table class="data-table">
<thead>
<tr>
<th>로그 ID</th>
<th>시간</th>
<th>관리자</th>
<th>작업 유형</th>
<th>상세</th>
<th>접속 IP</th>
<th>위험도</th>
</tr>
</thead>
<tbody id="auditTableBody">
<!-- JS Inject -->
</tbody>
</table>
</div>
</div>
</div>
</div>
</div>
<script>
	function renderAuditLogs() {
		const logs = window.AdminData?.auditLogs || [];
		const tbody = document.getElementById('auditTableBody');
		const actionLabel = {
			'Device Registered': '신뢰 기기 등록',
			'Failed Login': '로그인 실패',
			'Permission Change': '권한 변경',
			'Device Revoked': '기기 해제',
			'Blocked Access': '접근 차단',
			'tenant.approve': '입점 승인',
			'user.password_reset': '비밀번호 초기화'
		};
		const riskLabel = { Low: '낮음', Medium: '보통', High: '높음', Critical: '위험' };

		const normalizeLog = (log) => ({
			id: log.id || log.logId || '-',
			time: log.time || log.createdAt || '-',
			adminId: log.adminId || log.actor || log.actorId || '-',
			action: log.action || '-',
			details: log.details || log.target || log.message || '-',
			ip: log.ip || '-',
			risk: log.risk || (/fail|blocked|error/i.test(log.action || '') ? 'High' : 'Low')
		});

		const escapeAdminAuditHtml = (value) => String(value ?? '').replace(/[&<>"']/g, ch => ({
			'&': '&amp;',
			'<': '&lt;',
			'>': '&gt;',
			'"': '&quot;',
			"'": '&#39;'
		}[ch]));
		
		const renderLogs = (filter = 'all') => {
			const filteredLogs = logs.map(normalizeLog).filter(l => {
				if (filter === 'login') return /Login/i.test(l.action);
				if (filter === 'device') return /Device/i.test(l.action);
				if (filter === 'risk') return l.risk === 'High' || l.risk === 'Critical';
				return true;
			});
			if (!filteredLogs.length) {
				tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--txt3);padding:28px;">표시할 감사 로그가 없습니다.</td></tr>';
				return;
			}
			tbody.innerHTML = filteredLogs.map(l => {
			let riskBadge = 'gray';
			if (l.risk === 'Critical') riskBadge = 'red';
			else if (l.risk === 'High') riskBadge = 'orange';
			else if (l.risk === 'Medium') riskBadge = 'indigo';
			
			return `
			<tr>
				<td style="font-size:0.75rem;color:var(--txt3);">${escapeAdminAuditHtml(l.id)}</td>
				<td style="font-size:0.8rem;">${escapeAdminAuditHtml(l.time)}</td>
				<td style="font-weight:600;">${escapeAdminAuditHtml(l.adminId)}</td>
				<td><span class="badge ${riskBadge === 'red' ? 'red' : 'gray'}">${escapeAdminAuditHtml(actionLabel[l.action] || l.action)}</span></td>
				<td style="max-width:250px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;" title="${escapeAdminAuditHtml(l.details)}">${escapeAdminAuditHtml(l.details)}</td>
				<td style="font-family:monospace;">${escapeAdminAuditHtml(l.ip)}</td>
				<td><span class="badge ${riskBadge}">${escapeAdminAuditHtml(riskLabel[l.risk] || l.risk)}</span></td>
			</tr>
			`;
			}).join('');
		};

		document.querySelectorAll('.filter-chips .chip').forEach((button, index) => {
			const filters = ['all', 'login', 'device', 'risk'];
			button.addEventListener('click', () => {
				document.querySelectorAll('.filter-chips .chip').forEach(chip => chip.classList.remove('active'));
				button.classList.add('active');
				renderLogs(filters[index] || 'all');
			});
		});
		renderLogs();
	}

	if (window.onAdminDataReady) window.onAdminDataReady(renderAuditLogs);
	else window.addEventListener('DataReady', renderAuditLogs);
</script>
</body>
</html>
