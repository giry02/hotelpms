<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프로필 설정 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
<style>
		.profile-layout { display: grid; grid-template-columns: 320px 1fr; gap: 24px; }
		.profile-card { background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; text-align: center; }
		.profile-avatar { width: 80px; height: 80px; border-radius: 50%; background: var(--primary); color: #fff; font-size: 2rem; font-weight: 700; display: inline-flex; align-items: center; justify-content: center; margin-bottom: 16px; }
		.profile-name { font-size: 1.2rem; font-weight: 700; margin-bottom: 4px; }
		.profile-role { font-size: 0.85rem; color: var(--txt2); margin-bottom: 20px; }
		.profile-info { text-align: left; font-size: 0.85rem; border-top: 1px solid var(--border2); padding-top: 20px; display: flex; flex-direction: column; gap: 12px; }
		.pi-row { display: flex; justify-content: space-between; }
		
		.device-card { border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 16px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; transition: border-color 0.2s; }
		.device-card:hover { border-color: var(--primary-lt); }
		.device-card.current { border-color: var(--primary); background: var(--primary-lt); }
		.dev-info { display: flex; align-items: center; gap: 16px; }
		.dev-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--border2); display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: var(--txt2); }
		.device-card.current .dev-icon { background: var(--primary); color: #fff; }
		.dev-details h4 { font-size: 0.95rem; font-weight: 700; margin-bottom: 4px; display: flex; align-items: center; gap: 8px; }
		.dev-details p { font-size: 0.75rem; color: var(--txt3); margin-bottom: 2px; }
		
		@media(max-width: 900px) {
			.profile-layout { grid-template-columns: 1fr; }
		}
	</style>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<h1>프로필 설정</h1>
</div>
</header>
<div class="content">
<div class="profile-layout">
<!-- PROFILE INFO -->
<div>
<div class="profile-card">
<div class="profile-avatar">SA</div>
<div class="profile-name">슈퍼 관리자</div>
<div class="profile-role">플랫폼 운영자</div>
<button class="btn-outline" style="width:100%;margin-bottom:20px;" onclick="alert(adminText('profile.passwordChange.sent'))">비밀번호 변경</button>
<div class="profile-info">
<div class="pi-row"><span style="color:var(--txt3)"> ID</span><strong>ADM-001</strong></div>
<div class="pi-row"><span style="color:var(--txt3)">이메일</span><strong>admin@platform.sys</strong></div>
<div class="pi-row"><span style="color:var(--txt3)">2단계 인증 (2FA)</span><strong style="color:var(--success)">활성</strong></div>
</div>
</div>
</div>
<!-- TRUSTED DEVICES -->
<div class="card">
<div class="card-header">
<h2><i class="fa-solid fa-laptop-medical"></i> 등록된 기기 관리</h2>
</div>
<div class="card-body">
<p style="font-size:0.85rem;color:var(--txt2);margin-bottom:24px;line-height:1.5;">
						관리자 계정에 연결된 신뢰 기기 목록입니다. 분실했거나 더 이상 사용하지 않는 기기는 즉시 해제하세요.
					</p>
<div id="deviceList">
<!-- JS inject -->
</div>
</div>
</div>
</div>
</div>
</div>
<script>
	function adminText(key, params = {}) {
		if (typeof window.t === 'function') {
			const translated = window.t(key, params);
			if (translated && translated !== key) return translated;
		}
		const fallback = {
			'profile.passwordChange.sent': '등록된 이메일로 비밀번호 변경 링크가 발송됩니다.',
			'profile.device.revoke.done': '연결이 해제되었습니다. 해당 기기에서 로그아웃됩니다.',
			'profile.device.revoked': '해제됨'
		};
		let text = fallback[key] || key;
		Object.keys(params).forEach(name => {
			text = text.replace(new RegExp(`\\{${name}\\}`, 'g'), params[name]);
		});
		return text;
	}

	function renderProfileDevices() {
		const devices = window.AdminData?.devices || [];
		const listEl = document.getElementById('deviceList');

		if (!devices.length) {
			listEl.innerHTML = '<div class="device-card"><div class="dev-info"><div class="dev-icon"><i class="fa-solid fa-laptop"></i></div><div class="dev-details"><h4>등록된 신뢰 기기가 없습니다.</h4><p>관리자 로그인 후 기기를 등록하면 이곳에 표시됩니다.</p></div></div></div>';
			return;
		}
		
		listEl.innerHTML = devices.map(d => {
			const icon = d.name.includes('iPhone') || d.name.includes('Galaxy') ? 'fa-mobile-screen' : 'fa-laptop';
			const revokeBtn = d.current 
				? `<span class="badge green">현재 기기</span>`
				: (d.status === 'active' 
				? `<button class="btn-danger btn-sm" onclick="alert(adminText('profile.device.revoke.done'));this.parentElement.innerHTML='<span class=\\'badge gray\\'>'+adminText('profile.device.revoked')+'</span>';"><i class="fa-solid fa-ban"></i> 기기 해제</button>`
					: `<span class="badge gray">만료됨</span>`);
			
			return `
			<div class="device-card ${d.current ? 'current' : ''}">
				<div class="dev-info">
					<div class="dev-icon"><i class="fa-solid ${icon}"></i></div>
					<div class="dev-details">
						<h4>${d.name} ${d.current ? '<span class="badge indigo" style="font-size:0.6rem;padding:2px 4px;">현재 기기</span>' : ''}</h4>
						<p>IP: ${d.ip}</p>
						<p>최근 활동: ${d.lastActive} | 등록일: ${d.addedAt}</p>
					</div>
				</div>
				<div class="dev-action">
					${revokeBtn}
				</div>
			</div>
			`;
		}).join('');
	}

	if (window.onAdminDataReady) window.onAdminDataReady(renderProfileDevices);
	else window.addEventListener('DataReady', renderProfileDevices);
</script>
</body>
</html>
