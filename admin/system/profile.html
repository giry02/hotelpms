<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>프로필 설정 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
<style>
.profile-layout{display:grid;grid-template-columns:320px 1fr;gap:24px}.profile-card{background:var(--card);border-radius:var(--radius);border:1px solid var(--border);padding:24px;text-align:center}.profile-avatar{width:80px;height:80px;border-radius:50%;background:var(--primary);color:#fff;font-size:2rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center;margin-bottom:16px}.profile-name{font-size:1.2rem;font-weight:700;margin-bottom:4px}.profile-role{font-size:.85rem;color:var(--txt2);margin-bottom:20px}.profile-info{text-align:left;font-size:.85rem;border-top:1px solid var(--border2);padding-top:20px;display:flex;flex-direction:column;gap:12px}.pi-row{display:flex;justify-content:space-between}.device-card{border:1px solid var(--border);border-radius:var(--radius-sm);padding:16px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;transition:border-color .2s}.device-card:hover{border-color:var(--primary-lt)}.device-card.current{border-color:var(--primary);background:var(--primary-lt)}.dev-info{display:flex;align-items:center;gap:16px}.dev-icon{width:40px;height:40px;border-radius:8px;background:var(--border2);display:flex;align-items:center;justify-content:center;font-size:1.2rem;color:var(--txt2)}.device-card.current .dev-icon{background:var(--primary);color:#fff}.dev-details h4{font-size:.95rem;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:8px}.dev-details p{font-size:.75rem;color:var(--txt3);margin-bottom:2px}@media(max-width:900px){.profile-layout{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="main">
<header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><h1 data-ko="프로필 설정" data-en="Profile Settings">프로필 설정</h1></div></header>
<div class="content"><div class="profile-layout">
<div><div class="profile-card">
<div class="profile-avatar">SA</div><div class="profile-name" data-ko="슈퍼 관리자" data-en="Super Admin">슈퍼 관리자</div><div class="profile-role" data-ko="플랫폼 운영자" data-en="Platform Operator">플랫폼 운영자</div>
<button class="btn-outline" id="changePasswordButton" style="width:100%;margin-bottom:20px" onclick="openProfilePasswordModal()" data-ko="비밀번호 변경" data-en="Change Password">비밀번호 변경</button>
<div class="profile-info"><div class="pi-row"><span style="color:var(--txt3)">ID</span><strong>ADM-001</strong></div><div class="pi-row"><span style="color:var(--txt3)" data-ko="이메일" data-en="Email">이메일</span><strong>admin@platform.sys</strong></div><div class="pi-row"><span style="color:var(--txt3)" data-ko="2단계 인증 (2FA)" data-en="Two-factor authentication (2FA)">2단계 인증 (2FA)</span><strong style="color:var(--success)" data-ko="활성" data-en="Active">활성</strong></div></div>
</div></div>
<div class="card"><div class="card-header"><h2><i class="fa-solid fa-laptop-medical"></i> <span data-ko="등록된 기기 관리" data-en="Trusted Devices">등록된 기기 관리</span></h2></div><div class="card-body">
<div class="grid-2" style="margin-bottom:24px"><div class="form-group"><label class="form-label" data-ko="이름" data-en="Name">이름</label><input class="form-control" id="profileName" required/></div><div class="form-group"><label class="form-label" data-ko="이메일" data-en="Email">이메일</label><input class="form-control" id="profileEmail" required type="email"/></div><div class="form-group"><label class="form-label" data-ko="기본 언어" data-en="Default Language">기본 언어</label><select class="form-control" id="profileLanguage"><option value="ko" data-ko="한국어" data-en="Korean">한국어</option><option value="en">English</option></select></div><div class="form-group"><label class="form-label" data-ko="알림" data-en="Notifications">알림</label><label style="display:flex;align-items:center;gap:8px;height:40px"><input id="profileNotifications" type="checkbox"/> <span data-ko="이메일 알림 수신" data-en="Receive email notifications">이메일 알림 수신</span></label></div><div style="grid-column:1/-1;text-align:right"><button class="btn-primary" id="saveProfileButton" onclick="saveProfile()"><i class="fa-solid fa-floppy-disk"></i> <span data-ko="저장" data-en="Save">저장</span></button></div></div>
<p style="font-size:.85rem;color:var(--txt2);margin-bottom:24px;line-height:1.5" data-ko="관리자 계정에 연결된 신뢰 기기 목록입니다. 분실했거나 더 이상 사용하지 않는 기기는 즉시 해제하세요." data-en="Devices trusted by this administrator account. Revoke lost or unused devices immediately.">관리자 계정에 연결된 신뢰 기기 목록입니다. 분실했거나 더 이상 사용하지 않는 기기는 즉시 해제하세요.</p>
<div id="deviceList"></div></div></div>
</div></div></div>
<div class="modal-overlay" id="profilePasswordModal" onclick="if(event.target===this) closeProfilePasswordModal()"><div class="modal" style="max-width:520px"><div class="modal-header"><h3 data-ko="비밀번호 변경" data-en="Change Password">비밀번호 변경</h3><button class="modal-close" onclick="closeProfilePasswordModal()"><i class="fa-solid fa-xmark"></i></button></div><div class="modal-body"><div class="form-group"><label class="form-label" data-ko="현재 비밀번호" data-en="Current Password">현재 비밀번호</label><input class="form-control" id="currentProfilePassword" type="password"/></div><div class="form-group"><label class="form-label" data-ko="새 비밀번호" data-en="New Password">새 비밀번호</label><input class="form-control" id="newProfilePassword" minlength="8" type="password"/></div><div class="form-group"><label class="form-label" data-ko="새 비밀번호 확인" data-en="Confirm New Password">새 비밀번호 확인</label><input class="form-control" id="confirmProfilePassword" minlength="8" type="password"/></div></div><div class="modal-footer"><button class="btn-outline" onclick="closeProfilePasswordModal()" data-ko="취소" data-en="Cancel">취소</button><button class="btn-primary" id="saveProfilePasswordButton" onclick="saveProfilePassword()" data-ko="저장" data-en="Save">저장</button></div></div></div>
<script>
function profileText(ko,en){return window.currentLang==='en'?en:ko}
function renderProfileDevices(){const devices=window.AdminStore?AdminStore.read('devices',window.AdminData?.devices||[]):(window.AdminData?.devices||[]);const listEl=document.getElementById('deviceList');if(!devices.length){listEl.innerHTML=`<div class="device-card"><div class="dev-info"><div class="dev-icon"><i class="fa-solid fa-laptop"></i></div><div class="dev-details"><h4>${profileText('등록된 신뢰 기기가 없습니다.','No trusted devices are registered.')}</h4><p>${profileText('관리자 로그인 후 기기를 등록하면 이곳에 표시됩니다.','Registered administrator devices appear here.')}</p></div></div></div>`;return}listEl.innerHTML=devices.map(d=>{const icon=d.name.includes('iPhone')||d.name.includes('Galaxy')?'fa-mobile-screen':'fa-laptop';const id=String(d.id||d.name).replace(/'/g,"\\'");const state=d.current?`<span class="badge green">${profileText('현재 기기','Current device')}</span>`:d.status==='active'?`<button class="btn-danger btn-sm" onclick="revokeProfileDevice('${id}')"><i class="fa-solid fa-ban"></i> ${profileText('기기 해제','Revoke')}</button>`:`<span class="badge gray">${profileText('해제됨','Revoked')}</span>`;const lastActive=d.current?profileText('현재 접속 중','Currently active'):d.lastActive;return `<div class="device-card ${d.current?'current':''}"><div class="dev-info"><div class="dev-icon"><i class="fa-solid ${icon}"></i></div><div class="dev-details"><h4>${d.name}</h4><p>IP: ${d.ip}</p><p>${profileText('최근 활동','Last active')}: ${lastActive} | ${profileText('등록일','Added')}: ${d.addedAt}</p></div></div><div class="dev-action">${state}</div></div>`}).join('')}
function revokeProfileDevice(id){const devices=AdminStore.read('devices',window.AdminData?.devices||[]);const device=devices.find(item=>String(item.id||item.name)===String(id));if(!device||device.current)return;device.status='revoked';device.revokedAt=new Date().toISOString();AdminStore.write('devices',devices);AdminStore.audit('profile.device_revoke',id,device.name||id,'High');renderProfileDevices();alert(profileText('연결이 해제되었습니다. 해당 기기에서 로그아웃됩니다.','The device was revoked and will be signed out.'))}
function getProfileSession(){try{return JSON.parse(sessionStorage.getItem('admin_session')||'{}')}catch(_){return{}}}
function initProfileForm(){const session=getProfileSession();const stored=AdminStore.read('profile',{});document.getElementById('profileName').value=stored.name||session.name||'Super Admin';document.getElementById('profileEmail').value=stored.email||session.email||'superadmin@platform.example';document.getElementById('profileLanguage').value=stored.language||localStorage.getItem('pms_admin_lang')||localStorage.getItem('pms_lang')||'ko';document.getElementById('profileNotifications').checked=stored.notifications!==false}
function saveProfile(){const nameInput=document.getElementById('profileName');const emailInput=document.getElementById('profileEmail');if(!nameInput.checkValidity())return nameInput.reportValidity();if(!emailInput.checkValidity())return emailInput.reportValidity();const session=getProfileSession();const users=AdminStore.read('users',[]);const email=emailInput.value.trim().toLowerCase();if(users.some(user=>String(user.email||'').toLowerCase()===email&&String(user.id)!==String(session.id))){emailInput.setCustomValidity(profileText('이미 사용 중인 이메일입니다.','This email is already in use.'));return emailInput.reportValidity()}emailInput.setCustomValidity('');const profile={name:nameInput.value.trim(),email,language:document.getElementById('profileLanguage').value,notifications:document.getElementById('profileNotifications').checked};AdminStore.write('profile',profile);const user=users.find(row=>String(row.id)===String(session.id));if(user){user.name=profile.name;user.email=profile.email;AdminStore.write('users',users)}sessionStorage.setItem('admin_session',JSON.stringify({...session,name:profile.name,email:profile.email}));localStorage.setItem('pms_lang',profile.language);localStorage.setItem('pms_admin_lang',profile.language);AdminStore.audit('profile.update',session.id||'ADM-001',`${profile.email} / lang=${profile.language}`);if(typeof window.changeLang==='function')window.changeLang(profile.language);alert(profileText('내 정보가 저장되었습니다.','Your profile was saved.'));return true}
function openProfilePasswordModal(){document.getElementById('profilePasswordModal').classList.add('active')}
function closeProfilePasswordModal(){document.getElementById('profilePasswordModal').classList.remove('active')}
function saveProfilePassword(){const current=document.getElementById('currentProfilePassword').value;const next=document.getElementById('newProfilePassword').value;const confirmValue=document.getElementById('confirmProfilePassword').value;const session=getProfileSession();const users=AdminStore.read('users',[]);const user=users.find(row=>String(row.id)===String(session.id)||row.email===session.email);const currentPassword=user?.password||'admin1234';if(current!==currentPassword)return alert(profileText('현재 비밀번호가 일치하지 않습니다.','The current password is incorrect.'));if(next.length<8)return alert(profileText('새 비밀번호는 8자 이상이어야 합니다.','The new password must be at least 8 characters.'));if(next!==confirmValue)return alert(profileText('새 비밀번호 확인이 일치하지 않습니다.','The password confirmation does not match.'));if(user)user.password=next;else users.push({id:session.id||'ADM-001',name:session.name||'Super Admin',email:session.email||'superadmin@platform.example',role:session.role||'Platform Owner',status:'active',password:next});AdminStore.write('users',users);AdminStore.audit('profile.password_change',session.id||'ADM-001','password changed','Medium');closeProfilePasswordModal();alert(profileText('비밀번호가 변경되었습니다.','The password was changed.'));return true}
if(window.onAdminDataReady){window.onAdminDataReady(()=>{renderProfileDevices();initProfileForm()})}else window.addEventListener('DataReady',()=>{renderProfileDevices();initProfileForm()});window.addEventListener('languagechange',renderProfileDevices)
</script>
</body>
</html>
