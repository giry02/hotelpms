<!DOCTYPE html><html lang="ko"><head><meta charset="utf-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/><title>고객지원 티켓 - Super Admin</title><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/><link rel="stylesheet" href="../common/css/admin-base.css"/><link rel="stylesheet" href="../common/css/admin-pages.css"/><script src="../common/js/admin-sidebar.js"></script><script src="../common/js/admin-i18n-catalog.js"></script><script src="../common/js/admin-i18n.js"></script><style>.help-layout{display:grid;grid-template-columns:minmax(300px,380px) 1fr;gap:16px}.ticket-list,.ticket-detail{background:#fff;border:1px solid var(--border);border-radius:8px}.ticket-list-body{max-height:680px;overflow:auto}.ticket-row{padding:14px;border-bottom:1px solid var(--border2);cursor:pointer}.ticket-row.active{background:var(--primary-lt);box-shadow:inset 3px 0 var(--primary)}.ticket-row:hover{background:var(--bg)}.ticket-message{padding:12px;border:1px solid var(--border);border-radius:8px;margin-bottom:10px}.ticket-message.admin{background:var(--primary-lt)}.ticket-history{max-height:380px;overflow:auto}.ticket-controls{display:grid;grid-template-columns:1fr 1fr;gap:10px}.detail-empty{padding:50px;text-align:center;color:var(--txt3)}@media(max-width:760px){.help-layout{grid-template-columns:1fr}.ticket-detail{display:none}.ticket-detail.mobile-open{display:block;position:fixed;inset:12px;z-index:1002;overflow:auto;box-shadow:0 20px 50px rgba(0,0,0,.25)}.ticket-detail .card-body{padding-bottom:90px}.mobile-detail-close{display:inline-flex!important}}.mobile-detail-close{display:none}</style></head>
<body><div class="main"><header class="topbar"><div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><h1 data-ko="고객지원 티켓" data-en="Helpdesk Tickets">고객지원 티켓</h1></div><div class="topbar-right"><select class="hotel-select" id="langSelect" onchange="changeLang(this.value)"><option value="ko">한국어</option><option value="en">English</option></select></div></header><main class="content"><div class="filter-bar"><input class="form-control" id="ticketSearch" data-ko-placeholder="티켓, 호텔, 요청자 검색" data-en-placeholder="Search ticket, hotel, requester" placeholder="티켓, 호텔, 요청자 검색"/><select class="form-control" id="ticketStatusFilter"><option value="all" data-ko="전체 상태" data-en="All Statuses">전체 상태</option><option value="open" data-ko="접수" data-en="Open">접수</option><option value="in_progress" data-ko="처리 중" data-en="In Progress">처리 중</option><option value="resolved" data-ko="해결" data-en="Resolved">해결</option><option value="closed" data-ko="종료" data-en="Closed">종료</option></select></div><div class="help-layout"><section class="ticket-list"><div class="card-header"><div class="card-title" data-ko="티켓 목록" data-en="Ticket List">티켓 목록</div><strong id="ticketCount"></strong></div><div class="ticket-list-body" id="ticketList"></div></section><section class="ticket-detail" id="ticketDetail"><div class="detail-empty" data-ko="티켓을 선택하세요." data-en="Select a ticket.">티켓을 선택하세요.</div></section></div></main></div>
<script>
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));const language=()=>window.currentLang||localStorage.getItem('pms_admin_lang')||localStorage.getItem('pms_lang')||'ko';let tickets=[];let selectedId='';const seed=[{id:'TCK-1001',hotelId:'TENANT-GRAND-SAIGON',hotelName:'The Grand Saigon',requester:'Sarah Connor',email:'desk@hotel.example',subject:'Settlement status does not update',priority:'high',status:'open',assignee:'',createdAt:'2026-07-18T08:00:00.000Z',slaDue:'2026-07-19T08:00:00.000Z',messages:[{id:'MSG-1',author:'Sarah Connor',role:'requester',text:'Completed settlement still appears as pending.',createdAt:'2026-07-18T08:00:00.000Z'}],attachments:[{name:'settlement.png',url:'#',allowedRoles:['Platform Owner','Operations']}]},{id:'TCK-1002',hotelId:'TENANT-DANANG',hotelName:'Da Nang Beach Resort',requester:'Minh Le',email:'manager@danang.example',subject:'Cannot edit a staff member',priority:'medium',status:'in_progress',assignee:'Ops Manager',createdAt:'2026-07-17T04:00:00.000Z',slaDue:'2026-07-20T04:00:00.000Z',messages:[],attachments:[]}];
function statusLabel(status){const en=language()==='en';return{open:en?'Open':'접수',in_progress:en?'In Progress':'처리 중',resolved:en?'Resolved':'해결',closed:en?'Closed':'종료'}[status]||status}function renderList(){const q=document.getElementById('ticketSearch').value.trim().toLowerCase(),status=document.getElementById('ticketStatusFilter').value;const rows=tickets.filter(t=>(status==='all'||t.status===status)&&(!q||`${t.id} ${t.hotelName} ${t.requester} ${t.subject}`.toLowerCase().includes(q)));document.getElementById('ticketCount').textContent=language()==='en'?`${rows.length} tickets`:`${rows.length}건`;document.getElementById('ticketList').innerHTML=rows.length?rows.map(t=>`<article class="ticket-row ${t.id===selectedId?'active':''}" data-id="${esc(t.id)}"><div style="display:flex;justify-content:space-between;gap:8px"><strong>${esc(t.subject)}</strong><span class="status-badge ${t.status==='resolved'||t.status==='closed'?'active':'pending'}">${esc(statusLabel(t.status))}</span></div><div class="app-meta">${esc(t.id)} · ${esc(t.hotelName)}</div><div class="app-meta">${esc(t.requester)} · ${esc(t.priority)}</div></article>`).join(''):`<div class="detail-empty">${language()==='en'?'No tickets.':'티켓이 없습니다.'}</div>`;document.querySelectorAll('.ticket-row').forEach(row=>row.onclick=()=>selectTicket(row.dataset.id))}
function selectTicket(id){selectedId=id;renderList();renderDetail();document.getElementById('ticketDetail').classList.add('mobile-open')}
function allowedTransition(from,to){return{open:['in_progress','closed'],in_progress:['resolved','open'],resolved:['closed','in_progress'],closed:['open']}[from]?.includes(to)||from===to}
function renderDetail(){const t=tickets.find(x=>x.id===selectedId);const detail=document.getElementById('ticketDetail');if(!t){detail.innerHTML=`<div class="detail-empty">${language()==='en'?'Select a ticket.':'티켓을 선택하세요.'}</div>`;return}const session=JSON.parse(sessionStorage.getItem('admin_session')||'{}');const role=session.role||'Platform Owner';const attachments=(t.attachments||[]).filter(a=>!a.allowedRoles||a.allowedRoles.includes(role));detail.innerHTML=`<div class="card-header"><div><div class="card-title">${esc(t.subject)}</div><div class="app-meta">${esc(t.id)} · ${esc(t.hotelName)} · ${esc(t.requester)}</div></div><button class="btn-outline btn-sm mobile-detail-close" id="mobileTicketClose"><i class="fa-solid fa-xmark"></i></button></div><div class="card-body"><div class="ticket-controls"><div class="form-group"><label class="form-label">${language()==='en'?'Status':'상태'}</label><select class="form-control" id="ticketStatus">${['open','in_progress','resolved','closed'].map(s=>`<option value="${s}" ${s===t.status?'selected':''}>${statusLabel(s)}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">${language()==='en'?'Assignee':'담당자'}</label><select class="form-control" id="ticketAssignee"><option value="">${language()==='en'?'Unassigned':'미배정'}</option><option ${t.assignee==='Ops Manager'?'selected':''}>Ops Manager</option><option ${t.assignee==='Super Admin'?'selected':''}>Super Admin</option></select></div></div><div class="app-meta">SLA: ${esc(t.slaDue)} · ${language()==='en'?'Priority':'우선순위'}: ${esc(t.priority)}</div><h4>${language()==='en'?'Conversation':'처리 이력'}</h4><div class="ticket-history">${(t.messages||[]).map(m=>`<div class="ticket-message ${m.role==='admin'?'admin':''}"><strong>${esc(m.author)}</strong><div>${esc(m.text)}</div><small>${esc(m.createdAt)}</small></div>`).join('')||`<div class="detail-empty">${language()==='en'?'No messages.':'메시지가 없습니다.'}</div>`}</div>${attachments.length?`<div class="form-group"><label class="form-label">${language()==='en'?'Attachments':'첨부 파일'}</label>${attachments.map(a=>`<button class="btn-outline attachment-button" data-name="${esc(a.name)}"><i class="fa-solid fa-paperclip"></i> ${esc(a.name)}</button>`).join('')}</div>`:''}<div class="form-group"><label class="form-label">${language()==='en'?'Reply':'답변'}</label><textarea class="form-control" id="ticketReply" rows="4"></textarea></div><button class="btn-primary" id="saveTicketButton"><i class="fa-solid fa-paper-plane"></i> ${language()==='en'?'Save & Reply':'저장 및 답변'}</button></div>`;document.getElementById('mobileTicketClose').onclick=()=>detail.classList.remove('mobile-open');document.getElementById('saveTicketButton').onclick=saveTicket;document.querySelectorAll('.attachment-button').forEach(b=>b.onclick=()=>AdminStore.audit('helpdesk.attachment_view',t.id,b.dataset.name,'Medium'))}
function saveTicket(){const t=tickets.find(x=>x.id===selectedId),nextStatus=document.getElementById('ticketStatus').value;if(!allowedTransition(t.status,nextStatus)){window.showToast?showToast(language()==='en'?'This status transition is not allowed.':'허용되지 않는 상태 전이입니다.','error'):null;return false}const oldStatus=t.status;t.status=nextStatus;t.assignee=document.getElementById('ticketAssignee').value;const reply=document.getElementById('ticketReply').value.trim();if(reply)t.messages.push({id:`MSG-${Date.now()}`,author:JSON.parse(sessionStorage.getItem('admin_session')||'{}').name||'Super Admin',role:'admin',text:reply,createdAt:new Date().toISOString()});t.updatedAt=new Date().toISOString();AdminStore.write('tickets',tickets);AdminStore.audit('helpdesk.update',t.id,`${oldStatus}->${t.status} / ${t.assignee||'unassigned'} / reply=${!!reply}`);renderList();renderDetail();return true}
window.applyLocalI18n=function(next){document.querySelectorAll('[data-ko][data-en]').forEach(el=>el.textContent=el.getAttribute(next==='en'?'data-en':'data-ko'));document.querySelectorAll('[data-ko-placeholder][data-en-placeholder]').forEach(el=>el.placeholder=el.getAttribute(next==='en'?'data-en-placeholder':'data-ko-placeholder'));renderList();renderDetail()};document.addEventListener('DOMContentLoaded',()=>{tickets=AdminStore.read('tickets',seed);document.getElementById('ticketSearch').oninput=renderList;document.getElementById('ticketStatusFilter').onchange=renderList;window.applyLocalI18n(language())});
</script></body></html>
