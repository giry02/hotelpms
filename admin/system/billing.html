<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>결제 관리 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
<style>
		.action-btn { font-size: 0.75rem; padding: 4px 10px; border-radius: 6px; font-weight: 600; cursor: pointer; border: none; display: inline-flex; align-items: center; gap: 4px; }
		.btn-alert { background: var(--warning-lt); color: var(--warning); border: 1px solid rgba(245,158,11,0.3); }
		.btn-promo { background: var(--purple-lt); color: var(--purple); border: 1px solid rgba(139,92,246,0.3); }
	</style>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<h1>과금 현황 (Billing)</h1>
</div>
</header>
<div class="content">
<!-- KPI -->
<div class="kpi-grid">
<div class="kpi-card green"><div class="kpi-icon"><i class="fa-solid fa-money-bill-trend-up"></i></div><div class="kpi-body"><div class="kpi-value">$125,000</div><div class="kpi-label">이번 달 결제 완료</div></div></div>
<div class="kpi-card orange"><div class="kpi-icon"><i class="fa-solid fa-clock"></i></div><div class="kpi-body"><div class="kpi-value">$18,400</div><div class="kpi-label">미납 및 연체</div></div></div>
<div class="kpi-card red"><div class="kpi-icon"><i class="fa-solid fa-user-slash"></i></div><div class="kpi-body"><div class="kpi-value">2</div><div class="kpi-label">정지된 테넌트 (이탈)</div></div></div>
</div>
<div class="card">
<div class="card-header" style="flex-direction:column; align-items:flex-start; gap:16px;">
<h2 style="font-size:1.1rem; font-weight:700;">All 결제 내역</h2>
<div class="filter-chips">
<button class="chip active" onclick="filterTable('all', this)">전체</button>
<button class="chip" onclick="filterTable('overdue', this)" style="color:var(--danger);border-color:var(--danger-lt);">미납/연체</button>
<button class="chip" onclick="filterTable('expiring', this)">만료 임박 (D-3)</button>
<button class="chip" onclick="filterTable('expired', this)">만료됨</button>
</div>
</div>
<div class="card-body">
<table class="data-table">
<thead>
<tr>
<th>호텔</th>
<th>플랜</th>
<th>결제 주기</th>
<th>금액</th>
<th>갱신일</th>
<th>상태</th>
<th>관리</th>
</tr>
</thead>
<tbody id="billingTableBody">
<!-- JS Inject -->
</tbody>
</table>
</div>
</div>
</div>
</div>
<!-- Promo Modal -->
<div class="modal-overlay" id="promoModal">
<div class="modal-card" style="max-width:400px">
<div class="modal-header">
<div class="modal-title"><i class="fa-solid fa-gift" style="color:var(--purple)"></i> 프로모션 메일 발송</div>
<button class="modal-close" onclick="closeModal('promoModal')"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="modal-body">
<p style="font-size:0.85rem;color:var(--txt2);margin-bottom:20px;">만료된 호텔(이탈 Guest)을 다시 유치하기 위해 특별 할인을 제안합니다.</p>
<div class="form-group" style="margin-bottom:16px;">
<label class="form-label">할인 금액 ($)</label>
<div style="display:flex;align-items:center;gap:10px;">
<span style="font-weight:600;color:var(--txt2)">- $</span>
<input class="form-control" placeholder="예: 50" type="number" value="50"/>
<span style="font-size:0.8rem;color:var(--txt3)">/ 월</span>
</div>
</div>
<div class="form-group" style="margin-bottom:20px;">
<label class="form-label">연장 기간</label>
<select class="form-control">
<option value="3">3개월</option>
<option value="6">6개월</option>
<option value="12">1년 연장 (추천)</option>
</select>
</div>
</div>
<div class="modal-footer">
<button class="btn-outline" onclick="closeModal('promoModal')">취소</button>
<button class="btn-purple" onclick="alert('프로모션 메일이 발송되었습니다!');closeModal('promoModal');"><i class="fa-solid fa-paper-plane"></i> 메일 발송</button>
</div>
</div>
</div>
<!-- Alert Modal -->
<div class="modal-overlay" id="alertModal">
<div class="modal-card" style="max-width:400px">
<div class="modal-header">
<div class="modal-title"><i class="fa-solid fa-bell" style="color:var(--warning)"></i> 만료 임박 안내 발송</div>
<button class="modal-close" onclick="closeModal('alertModal')"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="modal-body">
<p style="font-size:0.85rem;color:var(--txt2);margin-bottom:10px;">만료가 3일 이내로 다가온 테넌트에게 카드 확인 및 갱신 안내 알림을 발송합니다.</p>
<div style="background:var(--warning-lt);padding:12px;border-radius:8px;font-size:0.8rem;color:#92400e;margin-top:10px;">
				발송 Channel : <strong>이메일 및 앱 푸시 알림</strong>
</div>
</div>
<div class="modal-footer">
<button class="btn-outline" onclick="closeModal('alertModal')">취소</button>
<button class="btn-warning" onclick="alert('안내 알림이 발송되었습니다.');closeModal('alertModal');"><i class="fa-solid fa-paper-plane"></i> 안내 발송</button>
</div>
</div>
</div>
<script>
	let currentFilter = 'all';

	function normalizeBillingStatus(invoice) {
		const rawStatus = invoice.status || 'open';
		if (['paid', 'overdue', 'expiring', 'expired'].includes(rawStatus)) return rawStatus;
		if (rawStatus === 'cancelled' || rawStatus === 'canceled') return 'expired';

		const dueAt = invoice.dueAt || invoice.date || invoice.renewalDate;
		if (dueAt) {
			const today = new Date('2026-06-01T00:00:00+09:00');
			const dueDate = new Date(`${dueAt}T00:00:00+09:00`);
			const diffDays = Math.ceil((dueDate - today) / 86400000);
			invoice.dday = diffDays;
			if (diffDays < 0) return 'overdue';
			if (diffDays <= 3) return 'expiring';
		}
		return 'open';
	}

	function formatMoney(amount, currency) {
		const value = Number(amount?.amount ?? amount ?? 0);
		return new Intl.NumberFormat('en-PH', { style: 'currency', currency: 'PHP', maximumFractionDigits: 2 }).format(value);
	}

	function normalizeInvoice(invoice) {
		return {
			id: invoice.id || invoice.invoiceId || invoice.tenantId || '-',
			hotel: invoice.hotel || invoice.hotelName || invoice.tenantName || invoice.tenantId || '-',
			plan: invoice.plan || 'Standard',
			cycle: invoice.cycle || invoice.billingCycle || 'Monthly',
			amount: invoice.amount,
			currency: 'PHP',
			date: invoice.date || invoice.dueAt || invoice.renewalDate || invoice.issuedAt || '-',
			status: normalizeBillingStatus(invoice),
			dday: invoice.dday
		};
	}

	function escapeAdminBillingHtml(value) {
		return String(value ?? '').replace(/[&<>"']/g, ch => ({
			'&': '&amp;',
			'<': '&lt;',
			'>': '&gt;',
			'"': '&quot;',
			"'": '&#39;'
		}[ch]));
	}

	function renderTable() {
		const invoices = (window.AdminData?.billing || []).map(normalizeInvoice);
		const tbody = document.getElementById('billingTableBody');
		
		const filtered = invoices.filter(i => {
			if (currentFilter === 'all') return true;
			return i.status === currentFilter;
		});

		if (!filtered.length) {
			tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--txt3);padding:28px;">표시할 결제 내역이 없습니다.</td></tr>';
			return;
		}

		tbody.innerHTML = filtered.map(i => {
			let badgeColor = 'gray';
			let statusLabel = i.status;
			let actionBtn = '-';
			
			if (i.status === 'paid') { badgeColor = 'green'; statusLabel = '결제 완료'; }
			if (i.status === 'open') { badgeColor = 'orange'; statusLabel = '미결제'; }
			if (i.status === 'overdue') { badgeColor = 'red'; statusLabel = '연체'; }
			if (i.status === 'expiring') { 
				badgeColor = 'orange'; 
				statusLabel = `만료 임박 (D-${i.dday})`; 
				actionBtn = `<button class="action-btn btn-alert" onclick="openModal('alertModal')"><i class="fa-solid fa-bell"></i> 갱신 안내</button>`;
			}
			if (i.status === 'expired') { 
				badgeColor = 'gray'; 
				statusLabel = '만료됨'; 
				actionBtn = `<button class="action-btn btn-promo" onclick="openModal('promoModal')"><i class="fa-solid fa-gift"></i> 프로모션</button>`;
			}

			return `
			<tr>
				<td><strong style="font-weight:600;">${escapeAdminBillingHtml(i.hotel)}</strong><br><span style="font-size:0.7rem;color:var(--txt3)">${escapeAdminBillingHtml(i.id)}</span></td>
				<td><span class="badge ${i.plan === 'Premium' ? 'purple' : 'gray'}">${escapeAdminBillingHtml(i.plan)}</span></td>
				<td>${i.cycle === 'Yearly' ? '<span class="badge indigo">연간</span>' : '<span class="badge gray">월간</span>'}</td>
				<td style="font-weight:600;">${formatMoney(i.amount, i.currency)}</td>
				<td>${escapeAdminBillingHtml(i.date)}</td>
				<td><span class="badge ${badgeColor}">${escapeAdminBillingHtml(statusLabel)}</span></td>
				<td>${actionBtn}</td>
			</tr>
			`;
		}).join('');
	}

	function filterTable(status, btn) {
		currentFilter = status;
		document.querySelectorAll('.chip').forEach(t => t.classList.remove('active'));
		if (btn) btn.classList.add('active');
		renderTable();
	}

	function openModal(id) { document.getElementById(id).classList.add('active'); }
	function closeModal(id) { document.getElementById(id).classList.remove('active'); }

	if (window.onAdminDataReady) window.onAdminDataReady(renderTable);
	else window.addEventListener('DataReady', renderTable);
</script>
</body>
</html>
