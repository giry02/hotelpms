<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>	Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<h1> </h1>
</div>
<div class="topbar-right">
<button class="btn-primary" style="padding:8px 16px; font-size:0.85rem;"><i class="fa-solid fa-user-plus"></i> </button>
</div>
</header>
<div class="content">
<div class="card">
<div class="card-header">
<h2>ü  </h2>
</div>
<div class="card-body">
<table class="data-table">
<thead>
<tr>
<th>ID</th>
<th>Name</th>
<th>Role</th>
<th>Email</th>
<th>Status</th>
<th>Last Login</th>
<th>Action</th>
</tr>
</thead>
<tbody id="userTableBody">
</tbody>
</table>
</div>
</div>
</div>
</div>
<script>
	window.addEventListener('DataReady', () => {
		const users = window.AdminData?.users || [];
		const tbody = document.getElementById('userTableBody');
		
		tbody.innerHTML = users.map(u => `
			<tr>
				<td><strong>${u.id}</strong></td>
				<td>${u.name}</td>
				<td><span class="badge ${u.role === 'System Admin' ? 'indigo' : 'gray'}">${u.role}</span></td>
				<td>${u.email}</td>
				<td><span class="badge ${u.status === 'active' ? 'green' : 'red'}">${u.status}</span></td>
				<td>${u.lastLogin}</td>
				<td>
					<button class="btn-outline" style="padding:4px 8px;font-size:0.75rem;">Edit</button>
				</td>
			</tr>
		`).join('');
	});
</script>
</body>
</html>
