<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>사용자 관리 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-i18n-catalog.js"></script>
<script src="../common/js/admin-i18n.js"></script>
<script src="../common/js/admin-sidebar.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left">
<button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button>
<h1>사용자 관리</h1>
</div>
<div class="topbar-right">
<button class="btn-primary" style="padding:8px 16px; font-size:0.85rem;" onclick="alert('신규 관리자 초대 메일을 발송하는 화면으로 연결됩니다.')"><i class="fa-solid fa-user-plus"></i> 신규 관리자 초대</button>
</div>
</header>
<div class="content">
<div class="card">
<div class="card-header">
<h2>사용자 목록</h2>
</div>
<div class="card-body">
<table class="data-table">
<thead>
<tr>
<th>ID</th>
<th>이름</th>
<th>역할</th>
<th>이메일</th>
<th>상태</th>
<th>최근 로그인</th>
<th>관리</th>
</tr>
</thead>
<tbody id="userTableBody">
</tbody>
</table>
</div>
</div>
</div>
</div>
<script>
	function escapeAdminUserHtml(value) {
		return String(value ?? '').replace(/[&<>"']/g, ch => ({
			'&': '&amp;',
			'<': '&lt;',
			'>': '&gt;',
			'"': '&quot;',
			"'": '&#39;'
		}[ch]));
	}

	function escapeAdminUserJs(value) {
		return String(value ?? '').replace(/\\/g, '\\\\').replace(/'/g, "\\'").replace(/[\r\n]/g, ' ');
	}

	function renderUsers() {
		const users = window.AdminData?.users || [];
		const tbody = document.getElementById('userTableBody');
		const roleLabel = {
			'System Admin': '시스템 관리자',
			'Sales Manager': '영업 관리자',
			'Support Specialist': '지원 담당자',
			'Platform Owner': '플랫폼 최고 관리자',
			'Operations': '운영 관리자'
		};
		const statusLabel = { active: '활성', inactive: '비활성' };

		if (!users.length) {
			tbody.innerHTML = '<tr><td colspan="7" style="text-align:center;color:var(--txt3);padding:28px;">표시할 관리자 계정이 없습니다.</td></tr>';
			return;
		}
		
		tbody.innerHTML = users.map(u => {
			const role = u.role || '-';
			const status = u.status || '-';
			const email = u.email || '-';
			return `
			<tr>
				<td><strong>${escapeAdminUserHtml(u.id || '-')}</strong></td>
				<td>${escapeAdminUserHtml(u.name || '-')}</td>
				<td><span class="badge ${role === 'System Admin' ? 'indigo' : 'gray'}">${escapeAdminUserHtml(roleLabel[role] || role)}</span></td>
				<td>${escapeAdminUserHtml(email)}</td>
				<td><span class="badge ${status === 'active' ? 'green' : 'red'}">${escapeAdminUserHtml(statusLabel[status] || status)}</span></td>
				<td>${escapeAdminUserHtml(u.lastLogin || '-')}</td>
				<td>
					<button class="btn-outline" style="padding:4px 8px;font-size:0.75rem;" onclick="alert('${escapeAdminUserJs(email)} 계정 편집 화면을 엽니다.')">수정</button>
					<button class="btn-outline" style="padding:4px 8px;font-size:0.75rem;color:var(--primary);border-color:var(--primary)" onclick="sendAdminPasswordReset('${escapeAdminUserJs(email)}')"><i class="fa-solid fa-envelope"></i> 비밀번호 초기화</button>
				</td>
			</tr>
		`;
		}).join('');
	}

	if (window.onAdminDataReady) window.onAdminDataReady(renderUsers);
	else window.addEventListener('DataReady', renderUsers);

	function sendAdminPasswordReset(email) {
		alert(`${email}로 비밀번호 재설정 링크가 발송되었습니다.`);
	}
</script>
</body>
</html>
