<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>공지사항 관리 - Super Admin</title>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&amp;family=Noto+Sans+KR:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet"/>
<link href="../common/css/admin-base.css" rel="stylesheet"/>
<link href="../common/css/admin-pages.css" rel="stylesheet"/>
<script src="../common/js/admin-sidebar.js"></script>
<script src="../common/js/admin-i18n.js"></script>
</head>
<body>
<div class="main">
<header class="topbar">
<div class="topbar-left"><button class="mobile-menu-btn" onclick="toggleMenu()"><i class="fa-solid fa-bars"></i></button><h1>공지사항 Actions</h1></div>
<div class="topbar-right">
<button class="btn-primary" onclick="openNoticeModal(false)"><i class="fa-solid fa-plus"></i> <span>새 공지 작성</span></button>
<select class="hotel-select" id="langSelect" onchange="changeLang(this.value)" style="width:110px"><option value="ko">한국어</option><option value="en">English</option></select>
</div>
</header>
<div class="content">
<div class="filter-bar">
<div class="filter-left">
<div class="filter-chips">
<button class="chip active">All</button>
<button class="chip">발행됨</button>
<button class="chip">미발행</button>
</div>
</div>
</div>
<div class="card">
<div class="card-body"><div class="table-wrap"><table>
<thead><tr><th>제목</th><th>대상 사용자</th><th>국가/지역</th><th>조회 수</th><th data-i18n="status">Status</th><th>Actions</th></tr></thead>
<tbody>
<tr><td style="font-weight:600">시스템 점검 안내 (5/25 02:00~06:00 UTC)</td><td><span class="status-badge info">All</span></td><td><span class="status-badge" style="background:var(--border2);color:var(--txt2)">Global</span></td><td>1,204</td><td><span class="status-badge active">발행됨</span></td><td><button class="btn-outline btn-sm" onclick="openNoticeModal(true)"><i class="fa-solid fa-pen"></i></button></td></tr>
<tr><td style="font-weight:600">베트남 지역 Folio & Billing 시스템 업데이트 안내</td><td><span class="status-badge" style="background:var(--purple-lt);color:var(--purple)">Hotel Admin</span></td><td><span class="status-badge" style="background:var(--primary-lt);color:var(--primary)">Vietnam</span></td><td>342</td><td><span class="status-badge active">발행됨</span></td><td><button class="btn-outline btn-sm" onclick="openNoticeModal(true)"><i class="fa-solid fa-pen"></i></button></td></tr>
<tr><td style="font-weight:600">한국 지역 카카오 알림톡 연동 안내</td><td><span class="status-badge" style="background:var(--purple-lt);color:var(--purple)">Hotel Admin</span></td><td><span class="status-badge" style="background:var(--success-lt);color:var(--success)">South Korea</span></td><td>89</td><td><span class="status-badge active">발행됨</span></td><td><button class="btn-outline btn-sm" onclick="openNoticeModal(true)"><i class="fa-solid fa-pen"></i></button></td></tr>
<tr><td style="font-weight:600">6월 글로벌 프로모션 캠페인 신청 안내</td><td><span class="status-badge" style="background:var(--purple-lt);color:var(--purple)">Hotel Admin</span></td><td><span class="status-badge" style="background:var(--border2);color:var(--txt2)">Global</span></td><td>0</td><td><span class="status-badge pending">미발행</span></td><td><button class="btn-outline btn-sm" onclick="openNoticeModal(true)"><i class="fa-solid fa-pen"></i></button></td></tr>
<tr><td style="font-weight:600">유럽 지역 GDPR 데이터 처리 방침 업데이트</td><td><span class="status-badge info">All</span></td><td><span class="status-badge" style="background:var(--border2);color:var(--txt2)">Global</span></td><td>0</td><td><span class="status-badge pending">미발행</span></td><td><button class="btn-outline btn-sm" onclick="openNoticeModal(true)"><i class="fa-solid fa-pen"></i></button></td></tr>
</tbody>
</table></div></div>
</div>
</div>
</div>

<!-- NOTICE EDITOR MODAL -->
<div class="modal-overlay" id="noticeModal" onclick="if(event.target===this) closeModal('noticeModal')">
<div class="modal-card" style="width:700px;max-width:95vw">
<div class="modal-header">
<h3 class="modal-title"><i class="fa-solid fa-bullhorn"></i> <span id="noticeModalTitle">공지 작성</span></h3>
<button class="modal-close" onclick="closeModal('noticeModal')"><i class="fa-solid fa-xmark"></i></button>
</div>
<div class="modal-body" style="display:flex;flex-direction:column;gap:16px">
<div class="form-group full">
<label class="form-label">제목 <span style="color:var(--danger)">*</span></label>
<input class="form-control" placeholder="제목을 입력하세요" type="text"/>
</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
<div class="form-group">
<label class="form-label">대상 사용자</label>
<select class="form-control">
<option>All (All Users)</option>
<option>호텔 Management (Hotel Admin)</option>
<option>일반 스태프 (Staff)</option>
</select>
</div>
<div class="form-group">
<label class="form-label">대상 지역</label>
<select class="form-control">
<option>Global (All)</option>
<option>South Korea</option>
<option>Vietnam</option>
<option>Thailand</option>
</select>
</div>
</div>
<div class="form-group full">
<label style="display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.85rem;font-weight:600;color:var(--txt)">
<input style="width:16px;height:16px" type="checkbox"/>
					상단에 고정하기 (중요 공지)
				</label>
</div>
<div class="form-group full" style="flex:1">
<label class="form-label">공지 내용 (본문) <span style="color:var(--danger)">*</span></label>
<!-- Mock Editor Toolbar -->
<div style="border:1px solid var(--border);border-bottom:none;border-radius:var(--radius-sm) var(--radius-sm) 0 0;padding:8px;background:var(--bg);display:flex;gap:8px">
<button onclick="this.style.background=this.style.background==='var(--primary-lt)'?'transparent':'var(--primary-lt)';this.style.color=this.style.color==='var(--primary)'?'var(--txt2)':'var(--primary)'" style="border:none;background:transparent;cursor:pointer;color:var(--txt2);padding:4px 8px;border-radius:4px;transition:0.2s;" title="Bold" type="button"><i class="fa-solid fa-bold"></i></button>
<button onclick="this.style.background=this.style.background==='var(--primary-lt)'?'transparent':'var(--primary-lt)';this.style.color=this.style.color==='var(--primary)'?'var(--txt2)':'var(--primary)'" style="border:none;background:transparent;cursor:pointer;color:var(--txt2);padding:4px 8px;border-radius:4px;transition:0.2s;" title="Italic" type="button"><i class="fa-solid fa-italic"></i></button>
<button onclick="prompt('URL 입력:');" style="border:none;background:transparent;cursor:pointer;color:var(--txt2);padding:4px 8px;border-radius:4px;transition:0.2s;" title="Link" type="button"><i class="fa-solid fa-link"></i></button>
<button onclick="alert('이미지 업로드 창이 열립니다.');" style="border:none;background:transparent;cursor:pointer;color:var(--txt2);padding:4px 8px;border-radius:4px;transition:0.2s;" title="Image" type="button"><i class="fa-solid fa-image"></i></button>
</div>
<textarea class="form-control" placeholder="내용을 입력하세요..." style="min-height:200px;border-radius:0 0 var(--radius-sm) var(--radius-sm);resize:vertical"></textarea>
</div>
</div>
<div class="modal-footer">
<button class="btn-outline" onclick="closeModal('noticeModal')">Cancel</button>
<button class="btn-outline" onclick="saveNotice(false)" style="color:var(--primary);border-color:var(--primary)">임시Save</button>
<button class="btn-primary" onclick="saveNotice(true)">발행하기</button>
</div>
</div>
</div>
<script>
document.querySelectorAll('.chip').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));b.classList.add('active')})});

function openModal(id) { document.getElementById(id).classList.add('active'); }
function closeModal(id) { document.getElementById(id).classList.remove('active'); }

function openNoticeModal(isEdit) {
	document.getElementById('noticeModalTitle').textContent = isEdit ? '공지사항 수정' : '새 공지 작성';
	openModal('noticeModal');
}

function saveNotice(isPublish) {
	if(isPublish) {
		alert('성공적으로 발행되었습니다.');
	} else {
		alert('임시Save 되었습니다.');
	}
	closeModal('noticeModal');
}
</script>
</body>
</html>
