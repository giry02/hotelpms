<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel PMS Admin Manual</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<link rel="stylesheet" href="assets/manual.css">
</head>
<body>
<div class="manual-shell">
    <aside class="manual-sidebar">
        <div class="brand">
            <h1 class="brand-title">Admin Manual</h1>
            <div class="brand-subtitle" data-i18n-ui="subtitle">어드민 사용 매뉴얼</div>
        </div>
        <div class="manual-toolbar">
            <button type="button" class="lang-btn active" data-lang="ko">KR</button>
            <button type="button" class="lang-btn" data-lang="en">EN</button>
            <button type="button" class="print-btn" data-print><i class="fa-solid fa-print"></i></button>
        </div>
        <div class="manual-search">
            <input data-manual-search type="search" placeholder="화면, 기능, 팝업 검색">
        </div>
        <nav class="nav-tree" aria-label="Admin manual table of contents" data-manual-nav></nav>
    </aside>

    <main class="manual-content">
        <header class="cover admin-cover">
            <div>
                <h1 data-i18n-ui="title">Hotel PMS 어드민 매뉴얼</h1>
                <p data-i18n-ui="intro">플랫폼 운영자가 사용하는 관리자 화면과 팝업을 별도로 정리했습니다.</p>
            </div>
            <div class="doc-meta">
                <span data-i18n-ui="docType">ADMIN MANUAL</span><br>
                <strong data-screen-count>0</strong> <span data-i18n-ui="screenUnit">screens</span><br>
                <strong data-popup-count>0</strong> <span data-i18n-ui="popupUnit">popups</span>
            </div>
        </header>

        <article class="page">
            <section class="section overview-section" data-search-target data-keywords="overview manual screenshots popup language admin platform">
                <div class="lead" data-i18n-ui="lead">
                    좌측 목차에서 어드민 화면을 선택하거나 검색어로 화면/팝업을 찾을 수 있습니다. 호텔 운영 화면과 분리해 플랫폼 관리 기준으로 확인합니다.
                </div>
                <div class="summary-grid" data-summary-grid></div>
            </section>
            <div data-manual-content></div>
            <section class="section popup-index-section" id="popup-index" data-search-target data-keywords="popup modal dialog index admin">
                <h2 data-i18n-ui="popupIndex">팝업/모달 전체 색인</h2>
                <div class="popup-index-grid" data-popup-index></div>
            </section>
            <div class="empty-search" data-empty-search>검색 결과가 없습니다. 다른 키워드로 다시 검색해 주세요.</div>
        </article>
    </main>
</div>
<script>window.MANUAL_SCOPE = 'admin';</script>
<script src="assets/manual-data.js"></script>
<script src="assets/manual.js"></script>
</body>
</html>
