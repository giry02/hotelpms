<!doctype html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hotel PMS Manual</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Noto+Sans+KR:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="assets/manual.css">
</head>
<body>
    <div class="manual-shell">
        <aside class="manual-nav">
            <div class="brand">
                <div class="brand-icon"><i class="fa-solid fa-hotel"></i></div>
                <div>
                    <div class="brand-title">Hotel PMS</div>
                    <div class="brand-sub" data-ui="manualSubtitle">운영 매뉴얼</div>
                </div>
            </div>

            <label class="search-box" for="manualSearch">
                <i class="fa-solid fa-magnifying-glass"></i>
                <input id="manualSearch" type="search" autocomplete="off" data-ui-placeholder="searchPlaceholder" placeholder="화면, 기능, 팝업 검색">
            </label>

            <div class="nav-actions">
                <button class="lang-btn active" type="button" data-lang="ko">KR</button>
                <button class="lang-btn" type="button" data-lang="en">EN</button>
                <button class="print-btn" type="button" id="printManual"><i class="fa-solid fa-print"></i></button>
            </div>

            <nav id="manualTree" class="manual-tree" aria-label="Manual navigation"></nav>
        </aside>

        <main class="manual-main">
            <section class="hero">
                <div>
                    <p class="eyebrow" data-ui="eyebrow">HOTEL PMS MANUAL</p>
                    <h1 data-ui="title">호텔 PMS 통합 운영 매뉴얼</h1>
                    <p data-ui="intro">프론트, 객실, 정산, 부가서비스, CRM, 설정, 관리자 화면과 주요 팝업을 한 곳에서 확인합니다.</p>
                </div>
                <div class="hero-panel">
                    <div>
                        <span data-ui="screenCountLabel">화면</span>
                        <strong id="screenCount">0</strong>
                    </div>
                    <div>
                        <span data-ui="popupCountLabel">팝업</span>
                        <strong id="popupCount">0</strong>
                    </div>
                    <div>
                        <span data-ui="languageLabel">언어</span>
                        <strong id="languageName">한국어</strong>
                    </div>
                </div>
            </section>

            <section class="guide-card" id="quickGuide"></section>
            <section class="manual-content" id="manualContent"></section>
            <section class="manual-content" id="popupIndex"></section>
        </main>
    </div>

    <button class="to-top" type="button" id="toTop" aria-label="Top"><i class="fa-solid fa-arrow-up"></i></button>

    <script src="assets/manual-data.js"></script>
    <script src="assets/manual.js"></script>
</body>
</html>
