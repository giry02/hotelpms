name: JSON Validation

on:
  push:
    paths:
      - 'dashboard/data/**/*.json'
  pull_request:
    paths:
      - 'dashboard/data/**/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save --no-package-lock ajv@^8

      - name: Run JSON validation
        run: node scripts/validate-json.js
