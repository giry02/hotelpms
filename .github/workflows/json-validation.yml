name: JSON Validation

on:
  push:
    paths:
      - 'dashboard/data/**/*.json'
  pull_request:
    paths:
      - 'dashboard/data/**/*.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          npm init -y
          npm install ajv

      - name: Run JSON validation
        run: node scripts/validate-json.js
